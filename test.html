<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HAIS Test</title>
</head>
<body style="font-family:sans-serif;padding:20px;background:#5344b5;color:white">
<h2>HAIS Debug Page</h2>
<div id="log" style="background:rgba(0,0,0,0.3);padding:15px;border-radius:8px;margin-top:10px;font-size:13px;line-height:2"></div>

<script>
var log = document.getElementById('log');
function add(msg, color) {
  var p = document.createElement('p');
  p.style.color = color || 'white';
  p.textContent = msg;
  log.appendChild(p);
}

add('✅ HTML লোড হয়েছে');

// Test React
try {
  var s1 = document.createElement('script');
  s1.src = 'https://unpkg.com/react@18.2.0/umd/react.production.min.js';
  s1.onload = function() { add('✅ React লোড হয়েছে', '#90ff90'); }
  s1.onerror = function() { add('❌ React লোড ব্যর্থ — CDN সমস্যা', '#ff9090'); }
  document.head.appendChild(s1);
} catch(e) { add('❌ React error: ' + e.message, '#ff9090'); }

// Test Babel
try {
  var s2 = document.createElement('script');
  s2.src = 'https://unpkg.com/@babel/standalone@7.23.2/babel.min.js';
  s2.onload = function() { add('✅ Babel লোড হয়েছে', '#90ff90'); }
  s2.onerror = function() { add('❌ Babel লোড ব্যর্থ — CDN সমস্যা', '#ff9090'); }
  document.head.appendChild(s2);
} catch(e) { add('❌ Babel error: ' + e.message, '#ff9090'); }

// Test Firebase
try {
  var s3 = document.createElement('script');
  s3.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
  s3.onload = function() { add('✅ Firebase লোড হয়েছে', '#90ff90'); }
  s3.onerror = function() { add('❌ Firebase লোড ব্যর্থ', '#ff9090'); }
  document.head.appendChild(s3);
} catch(e) { add('❌ Firebase error: ' + e.message, '#ff9090'); }

add('⏳ CDN লোড চেক হচ্ছে...');
</script>
</body>
</html>
