  // ধাপ ২: PIN যাচাই করো
  const handleVerifyPin=async()=>{
    if(!pin){setErr("PIN লিখুন");return;}
    setLoading(true);
    const ok=await CredStore.verifyPin(pin);
    setLoading(false);
    if(!ok){setErr("❌ PIN ভুল হয়েছে");return;}
    setStep("reset");setErr("");setPin("");
  };

  // ধাপ ৩: নতুন পাসওয়ার্ড সেট করো
  const handleReset=async()=>{
    const strength=checkPasswordStrength(newPass);
    if(!strength.ok){setErr(strength.msg);return;}
    if(newPass!==confirmPass){setErr("পাসওয়ার্ড দুটি মিলছে না");return;}
    setLoading(true);
    await CredStore.change(ADMIN_TEACHER,newPass);
    setLoading(false);
    setDone(true);
    setTimeout(()=>{onSuccess&&onSuccess();onClose();},1800);
  };

  return(
    <div style={overlayStyle}>
      <div style={boxStyle}>
        <div style={{fontWeight:700,fontSize:16,color:"#5344b5",marginBottom:16}}>
          {step==="setup"?"🔐 রিকভারি PIN সেটআপ":step==="verify"?"🔑 রিকভারি PIN যাচাই":"🔒 নতুন পাসওয়ার্ড"}
        </div>

        {done?(
          <div style={{textAlign:"center",color:"#3b6d11",fontWeight:700,fontSize:14,padding:16}}>
            ✅ {step==="setup"?"PIN সেটআপ সম্পন্ন!":"পাসওয়ার্ড রিসেট সম্পন্ন!"}
          </div>
        ):step==="setup"?(
          <>
            <div style={{fontSize:12,color:"#6b6b8a",background:"#f8f7ff",borderRadius:8,padding:"8px 10px",marginBottom:14,lineHeight:1.6}}>
              💡 রিকভারি PIN একটি গোপন কোড যা দিয়ে পাসওয়ার্ড ভুলে গেলে রিসেট করা যাবে। এই PIN মনে রাখুন বা নিরাপদ জায়গায় লিখে রাখুন।
            </div>
            <div style={{fontSize:12,color:"#6b6b8a",fontWeight:600,marginBottom:4}}>নতুন PIN (কমপক্ষে ৪ সংখ্যা)</div>
            <input type="password" inputMode="numeric" placeholder="• • • •" value={pin}
              onChange={e=>{setPin(e.target.value.replace(/\D/g,"").slice(0,8));setErr("");}} style={inputStyle}/>
            <div style={{fontSize:12,color:"#6b6b8a",fontWeight:600,marginBottom:4,marginTop:10}}>PIN নিশ্চিত করুন</div>
            <input type="password" inputMode="numeric" placeholder="• • • •" value={newPin}
              onChange={e=>{setNewPin(e.target.value.replace(/\D/g,"").slice(0,8));setErr("");}} style={inputStyle}/>
            {err&&<div style={{color:"#a32d2d",fontSize:12,fontWeight:600,marginTop:8}}>⚠ {err}</div>}
            <button onClick={handleSetupPin} disabled={loading} style={btnPrimary}>
              {loading?"সেভ হচ্ছে...":"✓ PIN সেটআপ করুন"}
            </button>
            <button onClick={onClose} style={btnSecondary}>বাতিল</button>
          </>
        ):step==="verify"?(
          <>
            <div style={{fontSize:12,color:"#6b6b8a",marginBottom:12,lineHeight:1.6}}>
              আপনার সেট করা রিকভারি PIN দিন। সফল হলে অ্যাডমিন পাসওয়ার্ড রিসেট করতে পারবেন।
            </div>
            <div style={{fontSize:12,color:"#6b6b8a",fontWeight:600,marginBottom:4}}>রিকভারি PIN</div>
            <input type="password" inputMode="numeric" placeholder="• • • •" value={pin}
              onChange={e=>{setPin(e.target.value.replace(/\D/g,"").slice(0,8));setErr("");}}
              onKeyDown={e=>e.key==="Enter"&&handleVerifyPin()} style={inputStyle}/>
            {err&&<div style={{color:"#a32d2d",fontSize:12,fontWeight:600,marginTop:8}}>{err}</div>}
            <button onClick={handleVerifyPin} disabled={loading} style={btnPrimary}>
              {loading?"যাচাই হচ্ছে...":"✓ PIN যাচাই করুন"}
            </button>
            <button onClick={onClose} style={btnSecondary}>বাতিল</button>
          </>
        ):(
          <>
            <div style={{fontSize:12,color:"#6b6b8a",marginBottom:12}}>
              PIN যাচাই সফল! এখন অ্যাডমিনের নতুন পাসওয়ার্ড দিন।
            </div>
            <div style={{fontSize:12,color:"#6b6b8a",fontWeight:600,marginBottom:4}}>নতুন পাসওয়ার্ড</div>
            <input type="password" placeholder="নতুন পাসওয়ার্ড..." value={newPass}
              onChange={e=>{setNewPass(e.target.value);setErr("");}}
              style={{...inputStyle,letterSpacing:1,textAlign:"left"}}/>
            <div style={{fontSize:12,color:"#6b6b8a",fontWeight:600,marginBottom:4,marginTop:10}}>পাসওয়ার্ড নিশ্চিত করুন</div>
            <input type="password" placeholder="আবার লিখুন..." value={confirmPass}
              onChange={e=>{setConfirmPass(e.target.value);setErr("");}}
              style={{...inputStyle,letterSpacing:1,textAlign:"left"}}/>
            <div style={{fontSize:11,color:"#6b6b8a",background:"#f8f7ff",borderRadius:8,padding:"6px 10px",marginTop:8}}>
              💡 কমপক্ষে ৮ অক্ষর, একটি বড় হাতের অক্ষর ও একটি সংখ্যা
            </div>
            {err&&<div style={{color:"#a32d2d",fontSize:12,fontWeight:600,marginTop:8}}>⚠ {err}</div>}
            <button onClick={handleReset} disabled={loading} style={btnPrimary}>
              {loading?"রিসেট হচ্ছে...":"🔄 পাসওয়ার্ড রিসেট করুন"}
            </button>
            <button onClick={onClose} style={btnSecondary}>বাতিল</button>
          </>
        )}
      </div>
    </div>
  );
}

function ChangePasswordModal({currentUser,onClose}){
  const [oldPass,setOldPass]=useState("");
  const [newPass,setNewPass]=useState("");
  const [confirmPass,setConfirmPass]=useState("");
  const [err,setErr]=useState("");
  const [success,setSuccess]=useState(false);
  const [loading,setLoading]=useState(false);
  const [showPinSetup,setShowPinSetup]=useState(false);
  const [pinExists,setPinExists]=useState(false);
  const isAdminUser=(currentUser===ADMIN_TEACHER);
  useEffect(()=>{if(isAdminUser)CredStore.hasPin().then(setPinExists);},[isAdminUser]);

  const handleChange=async()=>{
    setErr("");
    const strength=checkPasswordStrength(newPass);
    if(!strength.ok){setErr(strength.msg);return;}
    if(newPass!==confirmPass){setErr("নতুন পাসওয়ার্ড দুটি মিলছে না");return;}
    setLoading(true);
    const ok=await CredStore.verify(currentUser,oldPass);
    if(!ok){setErr("বর্তমান পাসওয়ার্ড ভুল");setLoading(false);return;}
    await CredStore.change(currentUser,newPass);
    setSuccess(true);setLoading(false);
    setTimeout(()=>onClose(),1800);
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:16,padding:24,maxWidth:340,width:"100%",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
        <div style={{fontWeight:700,fontSize:16,color:"#5344b5",marginBottom:16}}>🔑 পাসওয়ার্ড পরিবর্তন</div>
        {success?(
          <div style={{textAlign:"center",color:"#3b6d11",fontWeight:700,fontSize:14,padding:16}}>✅ পাসওয়ার্ড সফলভাবে পরিবর্তিত হয়েছে!</div>
        ):(
          <>
            {["বর্তমান পাসওয়ার্ড","নতুন পাসওয়ার্ড","নতুন পাসওয়ার্ড নিশ্চিত করুন"].map((label,i)=>{
              const vals=[oldPass,newPass,confirmPass];
              const setters=[setOldPass,setNewPass,setConfirmPass];
              return(
                <div key={i} style={{marginBottom:12}}>
                  <div style={{fontSize:12,color:"#6b6b8a",marginBottom:4,fontWeight:600}}>{label}</div>
                  <input type="password" value={vals[i]} onChange={e=>{setters[i](e.target.value);setErr("");}}
                    style={{width:"100%",padding:"9px 12px",border:`2px solid ${err&&i===0&&err.includes("বর্তমান")?"#a32d2d":"#ede9fd"}`,borderRadius:9,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                </div>
              );
            })}
            <div style={{fontSize:11,color:"#6b6b8a",background:"#f8f7ff",borderRadius:8,padding:"7px 10px",marginBottom:12}}>
              💡 শক্তিশালী পাসওয়ার্ডে থাকবে: কমপক্ষে ৮ অক্ষর, একটি বড় হাতের অক্ষর ও একটি সংখ্যা
            </div>
            {err&&<div style={{color:"#a32d2d",fontSize:12,fontWeight:600,marginBottom:10}}>⚠ {err}</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={handleChange} disabled={loading}
                style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#5344b5,#7c3aed)",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13,opacity:loading?0.7:1}}>
                {loading?"যাচাই হচ্ছে...":"✓ পরিবর্তন করুন"}
              </button>
              <button onClick={onClose}
                style={{padding:"10px 14px",borderRadius:10,border:"1px solid #ede9fd",background:"transparent",cursor:"pointer",fontSize:13,color:"#6b6b8a"}}>
                বাতিল
              </button>
            </div>
            {isAdminUser&&(
              <div style={{textAlign:"center",marginTop:10}}>
                <button onClick={()=>setShowPinSetup(true)}
                  style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:pinExists?"#3b6d11":"#7c3aed",textDecoration:"underline"}}>
                  {pinExists?"✅ রিকভারি PIN আছে — পরিবর্তন করুন":"⚠ রিকভারি PIN সেটআপ করুন (পাসওয়ার্ড ভুলে গেলে কাজে আসবে)"}
                </button>
              </div>
            )}
          </>
        )}
      </div>
      {showPinSetup&&(
        <ForgotPasswordModal
          onClose={()=>setShowPinSetup(false)}
          onSuccess={()=>setShowPinSetup(false)}
        />
      )}
    </div>
  );
}

function LoginScreen({onLogin}){
  const [mode,setMode]=useState("login"); // login | register | verify | forgot
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [confirmPass,setConfirmPass]=useState("");
  const [teacherName,setTeacherName]=useState(TEACHERS[0]);
  const [err,setErr]=useState("");
  const [msg,setMsg]=useState("");
  const [showPass,setShowPass]=useState(false);
  const [loading,setLoading]=useState(false);

  const ADMIN_EMAIL="sayedhps299@gmail.com";

  /* ── whitelist চেক — Firebase DB-তে আছে কিনা ── */
  const checkWhitelist=async(emailVal)=>{
    if(!window.__fbReady)return false;
    /* admin সবসময় অনুমোদিত */
    if(emailVal===ADMIN_EMAIL)return true;
    try{
      const snap=await window.__fbDB.ref("hais_whitelist/"+emailVal.replace(/\./g,"_").replace(/@/g,"__at__")).once("value");
      return snap.exists();
    }catch(e){return false;}
  };

  /* ── লগইন ── */
  const handleLogin=async()=>{
    if(loading)return;
    if(!email.trim()){setErr("ইমেইল লিখুন");return;}
    if(!password){setErr("পাসওয়ার্ড লিখুন");return;}
    setErr("");setLoading(true);
    try{
      const cred=await window.__fbAuth.signInWithEmailAndPassword(email.trim(),password);
      const fbUser=cred.user;
      if(!fbUser.emailVerified&&fbUser.email!==ADMIN_EMAIL){
        await window.__fbAuth.signOut();
        setLoading(false);
        setMode("verify");
        setMsg("আপনার email verify করা হয়নি। নিচের বাটনে চাপুন।");
        return;
      }
      /* displayName থেকে শিক্ষকের নাম */
      const name=fbUser.displayName||TEACHERS.find(t=>
        fbUser.email.toLowerCase().includes(t.split(" ").pop().toLowerCase())
      )||fbUser.email;
      const isAdminUser=fbUser.email===ADMIN_EMAIL;
      onLogin(isAdminUser?ADMIN_TEACHER:name, fbUser);
    }catch(e){
      setLoading(false);
      if(e.code==="auth/user-not-found"||e.code==="auth/wrong-password"||e.code==="auth/invalid-credential"){
        setErr("❌ ইমেইল বা পাসওয়ার্ড ভুল।");
      }else if(e.code==="auth/too-many-requests"){
        setErr("🔒 অনেকবার ভুল চেষ্টা। কিছুক্ষণ পরে আবার চেষ্টা করুন।");
      }else{
        setErr("❌ লগইন হয়নি। আবার চেষ্টা করুন।");
      }
    }
  };

  /* ── রেজিস্ট্রেশন ── */
  const handleRegister=async()=>{
    if(loading)return;
    if(!email.trim()){setErr("ইমেইল লিখুন");return;}
    if(password.length<8){setErr("পাসওয়ার্ড কমপক্ষে ৮ অক্ষরের হতে হবে");return;}
    if(password!==confirmPass){setErr("পাসওয়ার্ড দুটি মিলছে না");return;}
    setErr("");setLoading(true);
    /* whitelist যাচাই */
    const allowed=await checkWhitelist(email.trim());
    if(!allowed){
      setLoading(false);
      setErr("❌ এই ইমেইল অনুমোদিত নয়। অ্যাডমিনকে আপনার ইমেইল জানান।");
      return;
    }
    try{
      const cred=await window.__fbAuth.createUserWithEmailAndPassword(email.trim(),password);
      /* displayName সেট করো */
      await cred.user.updateProfile({displayName:teacherName});
      /* email verification পাঠাও */
      await cred.user.sendEmailVerification();
      await window.__fbAuth.signOut();
      setLoading(false);
      setMode("verify");
      setMsg(`✅ ${email}-এ একটি verification link পাঠানো হয়েছে। Email খুলে confirm করুন, তারপর লগইন করুন।`);
    }catch(e){
      setLoading(false);
      if(e.code==="auth/email-already-in-use"){
        setErr("এই ইমেইলে আগেই account আছে। লগইন করুন।");
      }else if(e.code==="auth/invalid-email"){
        setErr("ইমেইল ঠিকানাটি সঠিক নয়।");
      }else{
        setErr("❌ রেজিস্ট্রেশন হয়নি। আবার চেষ্টা করুন।");
      }
    }
  };

  /* ── verification email পুনরায় পাঠানো ── */
  const resendVerification=async()=>{
    if(!email||!password){setMode("login");return;}
    setLoading(true);
    try{
      const cred=await window.__fbAuth.signInWithEmailAndPassword(email.trim(),password);
      await cred.user.sendEmailVerification();
      await window.__fbAuth.signOut();
      setMsg("✅ আবার verification email পাঠানো হয়েছে। inbox চেক করুন।");
    }catch(e){
      setMsg("❌ পাঠানো যায়নি। লগইন পেজে গিয়ে আবার চেষ্টা করুন।");
    }
    setLoading(false);
  };

  /* ── পাসওয়ার্ড ভুলে গেছি ── */
  const handleForgot=async()=>{
    if(!email.trim()){setErr("আগে ইমেইল লিখুন");return;}
    setLoading(true);
    try{
      await window.__fbAuth.sendPasswordResetEmail(email.trim());
      setMsg(`✅ ${email}-এ password reset link পাঠানো হয়েছে।`);
      setErr("");
    }catch(e){
      setErr("❌ এই ইমেইলে কোনো account নেই।");
    }
    setLoading(false);
  };

  const inp=(type,placeholder,val,onChange)=>(
    <input type={type} placeholder={placeholder} value={val} onChange={onChange}
      onKeyDown={e=>e.key==="Enter"&&(mode==="login"?handleLogin():mode==="register"?handleRegister():null)}
      style={{width:"100%",padding:"10px 12px",border:`2px solid ${err?"#a32d2d":"#ede9fd"}`,borderRadius:10,fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:10}}/>
  );

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#5344b5 0%,#7c3aed 50%,#0f6e56 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:16,fontFamily:"sans-serif"}}>
      <div style={{background:"#fff",borderRadius:20,padding:28,maxWidth:380,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>

        {/* হেডার */}
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:40,marginBottom:6}}>🏫</div>
          <div style={{fontWeight:800,fontSize:20,color:"#5344b5",letterSpacing:1}}>HAIS</div>
          <div style={{fontSize:11,color:"#6b6b8a"}}>Heritage Academic Intelligence System</div>
        </div>

        {/* ট্যাব — login / register */}
        {(mode==="login"||mode==="register")&&(
          <div style={{display:"flex",borderRadius:10,overflow:"hidden",border:"1px solid #ede9fd",marginBottom:18}}>
            {[["login","🔐 লগইন"],["register","📝 নতুন Account"]].map(([m,label])=>(
              <button key={m} onClick={()=>{setMode(m);setErr("");setMsg("");}}
                style={{flex:1,padding:"9px",border:"none",background:mode===m?"#5344b5":"transparent",color:mode===m?"#fff":"#6b6b8a",fontWeight:mode===m?700:400,cursor:"pointer",fontSize:12}}>
                {label}
              </button>
            ))}
          </div>
        )}

        {/* Email verification স্ক্রিন */}
        {mode==="verify"&&(
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>📧</div>
            <div style={{fontWeight:700,fontSize:15,color:"#5344b5",marginBottom:8}}>Email Verify করুন</div>
            {msg&&<div style={{background:"#e1f5ee",border:"1px solid #0f6e5630",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#0f6e56",marginBottom:12,lineHeight:1.6}}>{msg}</div>}
            <button onClick={resendVerification} disabled={loading}
              style={{width:"100%",padding:"11px",borderRadius:10,border:"none",background:"#5344b5",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13,marginBottom:8}}>
              {loading?"🔄 পাঠানো হচ্ছে...":"📨 আবার Email পাঠান"}
            </button>
            <button onClick={()=>{setMode("login");setErr("");setMsg("");}}
              style={{width:"100%",padding:"9px",borderRadius:10,border:"1px solid #ede9fd",background:"transparent",cursor:"pointer",fontSize:12,color:"#6b6b8a"}}>
              ← লগইন পেজে যান
            </button>
          </div>
        )}

        {/* লগইন ফর্ম */}
        {mode==="login"&&(<div>
          <div style={{fontSize:12,color:"#6b6b8a",marginBottom:4,fontWeight:600}}>ইমেইল</div>
          {inp("email","আপনার ইমেইল...",email,e=>{setEmail(e.target.value);setErr("");})}
          <div style={{fontSize:12,color:"#6b6b8a",marginBottom:4,fontWeight:600}}>পাসওয়ার্ড</div>
          <div style={{position:"relative",marginBottom:10}}>
            <input type={showPass?"text":"password"} placeholder="পাসওয়ার্ড..."
              value={password} onChange={e=>{setPassword(e.target.value);setErr("");}}
              onKeyDown={e=>e.key==="Enter"&&handleLogin()}
              style={{width:"100%",padding:"10px 40px 10px 12px",border:`2px solid ${err?"#a32d2d":"#ede9fd"}`,borderRadius:10,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
            <button onClick={()=>setShowPass(p=>!p)}

/* ══ WEEKLY LESSON PLAN FORM COMPONENT ══ */
function WeeklyLPForm({teacher,assignment,weekDays,weekLabel,onSubmit,onCancel,existingPlan=null}){
  // প্রতিটি দিনের জন্য {lessonPlan:"", hw:""} state
  const initRows=weekDays.map(d=>({
    date:d.date,
    dayLabel:d.label,
    lessonPlan:existingPlan?.rows?.find(r=>r.date===d.date)?.lessonPlan||"",
    hw:existingPlan?.rows?.find(r=>r.date===d.date)?.hw||""
  }));
  const [rows,setRows]=React.useState(initRows);
  const [err,setErr]=React.useState("");

  const updateRow=(i,field,val)=>{
    setRows(prev=>prev.map((r,idx)=>idx===i?{...r,[field]:val}:r));
  };

  const submit=()=>{
    const filled=rows.filter(r=>r.lessonPlan.trim());
    if(!filled.length){setErr("কমপক্ষে একটি দিনের পাঠ পরিকল্পনা লিখুন।");return;}
    setErr("");
    onSubmit({
      id:existingPlan?.id||Date.now().toString(),
      teacher,
      cls:assignment.cls,
      subject:assignment.sub,
      weekLabel,
      rows,
      status:LP_STATUS.PENDING,
      submittedAt:new Date().toISOString(),
      reviewedAt:null,
      adminNote:"",
      type:"weekly"
    });
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:600,overflowY:"auto",padding:"14px 10px"}}>
      <div style={{background:"#fff",borderRadius:16,maxWidth:600,margin:"0 auto",boxShadow:"0 8px 32px rgba(83,68,181,0.2)",overflow:"hidden"}}>
        {/* হেডার */}
        <div style={{background:"linear-gradient(135deg,#5344b5,#7c3aed)",padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{color:"#fff",fontWeight:800,fontSize:15}}>📋 সাপ্তাহিক পাঠ পরিকল্পনা</div>
            <div style={{color:"rgba(255,255,255,0.8)",fontSize:11,marginTop:2}}>
              {assignment.cls?"শ্রেণি "+assignment.cls+" • ":""}{assignment.sub} • {weekLabel}
            </div>
          </div>
          <button onClick={onCancel} style={{border:"none",background:"rgba(255,255,255,0.2)",color:"#fff",borderRadius:8,padding:"5px 11px",cursor:"pointer",fontWeight:700,fontSize:14}}>✕</button>
        </div>

        <div style={{padding:"14px 16px"}}>
          {/* শিক্ষক তথ্য */}
          <div style={{background:"#f3eeff",borderRadius:10,padding:"8px 12px",marginBottom:14,fontSize:12,color:"#5344b5",fontWeight:600}}>
            👤 {teacher}
          </div>

          {/* ছক */}
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={{background:"#ede9fd"}}>
                  <th style={{padding:"8px 10px",textAlign:"left",color:"#5344b5",fontWeight:700,border:"1px solid #e0d9f7",width:"28%"}}>তারিখ ও বার</th>
                  <th style={{padding:"8px 10px",textAlign:"left",color:"#5344b5",fontWeight:700,border:"1px solid #e0d9f7",width:"46%"}}>পাঠ পরিকল্পনা</th>
                  <th style={{padding:"8px 10px",textAlign:"left",color:"#5344b5",fontWeight:700,border:"1px solid #e0d9f7",width:"26%"}}>H.W</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((row,i)=>(
                  <tr key={i} style={{background:i%2===0?"#fff":"#fafafe"}}>
                    <td style={{padding:"8px 10px",border:"1px solid #e0d9f7",fontSize:11,color:"#444",fontWeight:600,verticalAlign:"top"}}>{row.dayLabel}</td>
                    <td style={{padding:"6px 8px",border:"1px solid #e0d9f7",verticalAlign:"top"}}>
                      <textarea value={row.lessonPlan} onChange={e=>updateRow(i,"lessonPlan",e.target.value)}

                        style={{width:"100%",minHeight:54,padding:"5px 7px",border:"1px solid #ddd",borderRadius:6,fontSize:11,fontFamily:"sans-serif",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
                    </td>
                    <td style={{padding:"6px 8px",border:"1px solid #e0d9f7",verticalAlign:"top"}}>
                      <textarea value={row.hw} onChange={e=>updateRow(i,"hw",e.target.value)}
                        placeholder="গৃহকাজ..."
                        style={{width:"100%",minHeight:54,padding:"5px 7px",border:"1px solid #ddd",borderRadius:6,fontSize:11,fontFamily:"sans-serif",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
                    </td>

                ))}
              </tbody>
            </table>
          </div>

          {err&&<div style={{background:"#fff0f0",border:"1px solid #f8717140",borderRadius:8,padding:"8px 12px",marginTop:10,fontSize:12,color:"#ef4444",fontWeight:600}}>⚠ {err}</div>}

          <div style={{display:"flex",gap:10,marginTop:14}}>

              বাতিল
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function LPSubmitForm({currentUser,onSubmit,onCancel,initial=null,teacherSubjects={}}){
  const today=new Date().toLocaleDateString("bn-BD");
  const [teacher,setTeacher]=useState(initial?.teacher||(currentUser==="ADMIN"?TEACHERS[0]:currentUser)||TEACHERS[0]);
  const [cls,setCls]=useState(initial?.cls||"VI");
  const isAdmin=(currentUser==="ADMIN");
  const selTeacher=isAdmin?teacher:currentUser;
  const clsSubjects=SUBJECTS_BY_CLASS[cls]||SUBJECTS;
  const allowedSubjects=useMemo(()=>{
    const mapped=teacherSubjects[selTeacher];
    if(!mapped||!mapped.length)return clsSubjects;
    if(typeof mapped[0]==="object"){
      const forCls=mapped.filter(x=>x.cls===cls).map(x=>x.sub);
      return forCls.length?clsSubjects.filter(s=>forCls.includes(s)):clsSubjects;
    }
    return clsSubjects.filter(s=>mapped.includes(s));
  },[clsSubjects,teacherSubjects,selTeacher,cls]);
  const [sub,setSub]=useState(initial?.subject||allowedSubjects[0]||(SUBJECTS_BY_CLASS["VI"]||SUBJECTS)[0]);

  useEffect(()=>{
    if(allowedSubjects.length&&!allowedSubjects.includes(sub))setSub(allowedSubjects[0]);
  },[allowedSubjects]);

  const handleClsChange=(c)=>{
    setCls(c);
    setSub((SUBJECTS_BY_CLASS[c]||SUBJECTS)[0]);
  };
  const [week,setWeek]=useState(initial?.week||"");
  const [topic,setTopic]=useState(initial?.topic||"");
  const [objectives,setObjectives]=useState(initial?.objectives||"");
  const [methodology,setMethodology]=useState(initial?.methodology||"");
  const [materials,setMaterials]=useState(initial?.materials||"");
  const [activities,setActivities]=useState(initial?.activities||"");
  const [assessment,setAssessment]=useState(initial?.assessment||"");
  const [homework,setHomework]=useState(initial?.homework||"");
  const [reflection,setReflection]=useState(initial?.reflection||"");
  const [err,setErr]=useState("");

  const validate=()=>{
    if(!topic.trim())return"পাঠের শিরোনাম আবশ্যক";
    if(!week.trim())return"সপ্তাহ/তারিখ আবশ্যক";
    if(!objectives.trim())return"শিক্ষার উদ্দেশ্য আবশ্যক";
    if(!methodology.trim())return"শিক্ষণ পদ্ধতি আবশ্যক";
    if(!activities.trim())return"পাঠ কার্যক্রম আবশ্যক";
    if(!assessment.trim())return"মূল্যায়ন পদ্ধতি আবশ্যক";
    return null;
  };

  const submit=()=>{
    const e=validate();
    if(e){setErr(e);return;}
    setErr("");
    onSubmit({
      id:initial?.id||Date.now().toString(),
      teacher:selTeacher,cls,subject:sub,week,topic,
      objectives,methodology,materials,activities,
      assessment,homework,reflection,
      status:LP_STATUS.PENDING,
      adminNote:"",
      submittedAt:new Date().toISOString(),
      reviewedAt:null
    });
  };

  const FLabel=({children,req})=><div style={{fontSize:11,color:C.mu,marginBottom:3}}>{children}{req&&<span style={{color:C.re}}> *</span>}</div>;
  const TA=({val,onChange,placeholder,rows=2})=>(
    <textarea value={val} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
      style={{width:"100%",padding:"8px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13,fontFamily:"sans-serif",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
  );

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:500,overflowY:"auto",padding:"16px 12px"}}>
      <div style={{background:"#fff",borderRadius:16,padding:18,maxWidth:560,margin:"0 auto",boxShadow:"0 8px 32px rgba(83,68,181,0.18)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <div style={{fontWeight:700,fontSize:16,color:C.pu}}>📋 লেসন প্ল্যান ফর্ম</div>
            <div style={{fontSize:11,color:C.mu,marginTop:2}}>Heritage Public School • আন্তর্জাতিক মানের পাঠ পরিকল্পনা</div>
          </div>
          <button onClick={onCancel} style={{border:"none",background:C.reL,color:C.re,borderRadius:8,padding:"5px 11px",cursor:"pointer",fontWeight:700,fontSize:14}}>✕</button>
        </div>

        {/* ── সেকশন ১: পরিচিতি ── */}
        <div style={{background:C.puL,borderRadius:10,padding:"12px",marginBottom:14,border:`1px solid ${C.pu}25`}}>
          <div style={{fontWeight:700,fontSize:12,color:C.pu,marginBottom:10}}>① মূল তথ্য</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            {isAdmin?(
              <div><FLabel req>শিক্ষক</FLabel>
                <select value={teacher} onChange={e=>setTeacher(e.target.value)} style={{width:"100%",padding:"8px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13}}>
                  {TEACHERS.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
            ):(
              <div><FLabel>শিক্ষক</FLabel>
                <div style={{padding:"8px 10px",background:"#f5f5f5",borderRadius:8,fontSize:13,fontWeight:600,color:C.pu}}>{currentUser}</div>
              </div>
            )}
            <div><FLabel req>শ্রেণি</FLabel>
              <select value={cls} onChange={e=>handleClsChange(e.target.value)} style={{width:"100%",padding:"8px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13}}>

              <select value={sub} onChange={e=>setSub(e.target.value)} style={{width:"100%",padding:"8px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13}}>

              </select>
            </div>
            <div><FLabel req>সপ্তাহ / তারিখ</FLabel>

          <TA val={activities} onChange={setActivities} rows={4}

        {/* ── সেকশন ৫: মূল্যায়ন ও গৃহকাজ ── */}
        <div style={{background:"#faf0f0",borderRadius:10,padding:"12px",marginBottom:14,border:`1px solid ${C.co}25`}}>

          <div>

            <TA val={homework} onChange={setHomework} placeholder="পরবর্তী ক্লাসের আগে শিক্ষার্থীরা কী করবে..."/>

        {/* ── সেকশন ৬: প্রতিফলন ── */}
        <div style={{background:"#e8f5e9",borderRadius:10,padding:"12px",marginBottom:14,border:`1px solid ${C.gr}20`}}>
          <div style={{fontWeight:700,fontSize:12,color:C.te,marginBottom:10}}>⑥ পাঠ প্রতিফলন (Self-Reflection)</div>
          <FLabel>পাঠ দেওয়ার পরের অনুভূতি ও উন্নতির পরিকল্পনা</FLabel>
          <TA val={reflection} onChange={setReflection} placeholder="কী ভালো হয়েছে? কোথায় উন্নতি দরকার? পরের বার কীভাবে ভালো করব?"/>
        </div>

        {err&&<div style={{background:C.reL,border:`1px solid ${C.re}40`,borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:13,color:C.re,fontWeight:600}}>⚠ {err}</div>}

        <div style={{display:"flex",gap:10}}>
          <button onClick={submit} style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:C.pu,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14}}>
            📤 জমা দিন (Submit)
          </button>
          <button onClick={onCancel} style={{padding:"11px 16px",borderRadius:10,border:`1px solid ${C.bd}`,background:"transparent",cursor:"pointer",color:C.mu,fontSize:13}}>বাতিল</button>
        </div>
      </div>
    </div>
  );
}

// মূল LessonPlans কম্পোনেন্ট — Dynamic Weekly সিস্টেম
function LessonPlans({lessonPlans,setLessonPlans,lpRole,setLpRole,teacherSubjects={},STUDENTS}){
  STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const [viewPlan,setViewPlan]=useState(null);
  const [showForm,setShowForm]=useState(null); // {assignment:{cls,sub}}
  const [tab,setTab]=useState("weekly"); // "weekly" | "history"
  const [filterTeacher,setFilterTeacher]=useState("সব");
  const [filterStatus,setFilterStatus]=useState("সব");
  const [msg,setMsg]=useState(null);
  const [tick,setTick]=useState(0);

  const isAdmin=(lpRole===LP_ROLES.ADMIN);
  const currentTeacher=isAdmin?null:lpRole;

  // প্রতি মিনিটে রি-রেন্ডার (উইন্ডো টাইমার আপডেটের জন্য)
  useEffect(()=>{
    const iv=setInterval(()=>setTick(t=>t+1),60000);
    return()=>clearInterval(iv);
  },[]);

  const {windowOpen,windowStart,windowEnd,targetWeekStart}=getWeeklyLPWindow();
  const weekDays=targetWeekStart?getWeekDays(targetWeekStart):[];
  const weekLabel=targetWeekStart?(()=>{
    const s=weekDays[0]?.date||"";
    const e=weekDays[5]?.date||"";
    return`${s} – ${e}`;
  })():"";

  const flash=(text,type="success")=>{setMsg({text,type});setTimeout(()=>setMsg(null),4000);};

  // সব weekly plan
  const allPlans=useMemo(()=>(lessonPlans._v2||[]).filter(p=>p.type==="weekly"),[lessonPlans]);
  // পুরনো (non-weekly) plan
  const oldPlans=useMemo(()=>(lessonPlans._v2||[]).filter(p=>p.type!=="weekly"),[lessonPlans]);

  // শিক্ষকের নির্ধারিত বিষয়+শ্রেণি
  const myAssignments=useMemo(()=>{
    if(isAdmin)return[];
    return getTeacherAssignments(currentTeacher,teacherSubjects);
  },[isAdmin,currentTeacher,teacherSubjects]);

  // এই সপ্তাহে শিক্ষক ইতিমধ্যে কোন বিষয়ে জমা দিয়েছেন?
  const submittedThisWeek=useMemo(()=>{
    if(!currentTeacher)return{};
    const map={};
    allPlans.filter(p=>p.teacher===currentTeacher&&p.weekLabel===weekLabel).forEach(p=>{
      map[`${p.cls}__${p.subject}`]=p;
    });
    return map;
  },[allPlans,currentTeacher,weekLabel]);

  // জমা দেওয়া
  const handleSubmit=(plan)=>{
    // একই সপ্তাহে একই বিষয়ে আগে জমা থাকলে replace
    setLessonPlans(prev=>{
      const existing=(prev._v2||[]);
      const filtered=existing.filter(p=>!(p.type==="weekly"&&p.teacher===plan.teacher&&p.cls===plan.cls&&p.subject===plan.subject&&p.weekLabel===plan.weekLabel));
      return{...prev,_v2:[...filtered,plan]};
    });
    setShowForm(null);
    flash("✓ পাঠ পরিকল্পনা সফলভাবে জমা দেওয়া হয়েছে! অনুমোদনের জন্য অপেক্ষা করুন।");
  };

  // Admin অনুমোদন
  const handleApprove=(id)=>{
    setLessonPlans(prev=>({...prev,_v2:(prev._v2||[]).map(p=>p.id===id?{...p,status:LP_STATUS.APPROVED,reviewedAt:new Date().toISOString()}:p)}));
    setViewPlan(null);
    flash("✅ পাঠ পরিকল্পনা অনুমোদন করা হয়েছে।");
  };

  // ফিল্টার (history tab)
  const filteredHistory=useMemo(()=>{
    let list=[...allPlans].reverse();
    if(!isAdmin)list=list.filter(p=>p.teacher===currentTeacher);
    if(filterTeacher!=="সব")list=list.filter(p=>p.teacher===filterTeacher);
    if(filterStatus!=="সব")list=list.filter(p=>p.status===filterStatus);
    return list;
  },[allPlans,isAdmin,currentTeacher,filterTeacher,filterStatus]);

  const pendingCount=allPlans.filter(p=>p.status===LP_STATUS.PENDING).length;
  const myPendingCount=isAdmin?pendingCount:allPlans.filter(p=>p.teacher===currentTeacher&&p.status===LP_STATUS.PENDING).length;

  const statusColor={pending:"#f59e0b",approved:"#22c55e",rejected:"#ef4444"};
  const statusLabel={pending:"⏳ অপেক্ষমান",approved:"✅ অনুমোদিত",rejected:"✗ প্রত্যাখ্যাত"};

  // সময় বাকি / পর্যন্ত
  const now=new Date();
  const timeInfo=(()=>{
    if(windowOpen){
      const ms=windowEnd-now;
      return{text:`সাবমিশন বন্ধ হবে ${formatCountdown(ms)} পরে`,color:"#22c55e",open:true};
    } else {
      const ms=windowStart-now;
      if(ms>0)return{text:`পরবর্তী উইন্ডো ${formatCountdown(ms)} পরে (বৃহস্পতিবার ৪:০০ PM)`,color:"#f59e0b",open:false};
      return{text:"উইন্ডো বন্ধ",color:"#ef4444",open:false};
    }
  })();

  return(<div>
    {/* ফর্ম মোডাল */}
    {showForm&&windowOpen&&(
      <WeeklyLPForm
        teacher={currentTeacher}
        assignment={showForm.assignment}
        weekDays={weekDays}
        weekLabel={weekLabel}
        existingPlan={showForm.existing||null}
        onSubmit={handleSubmit}
        onCancel={()=>setShowForm(null)}/>
    )}

    {/* ভিউ মোডাল */}
    {viewPlan&&(
      <WeeklyLPViewModal
        plan={viewPlan}
        onClose={()=>setViewPlan(null)}
        isAdmin={isAdmin}
        onApprove={handleApprove}/>
    )}

    <H2>📚 লেসন প্ল্যান ব্যবস্থাপনা</H2>

    {msg&&(
      <div style={{background:msg.type==="success"?"#f0fdf4":"#fff0f0",border:`1px solid ${msg.type==="success"?"#22c55e":"#ef4444"}40`,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,fontWeight:600,color:msg.type==="success"?"#16a34a":"#dc2626"}}>
        {msg.text}
      </div>
    )}

    {/* লগইন কার্ড */}

/* ══════════════════════════════════════════════

function KPI({results,lessonPlans,obsData={},deadlines=[],dlSubmissions={},STUDENTS}){STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const [tab,setTab]=useState("ranking");
  const [selTeacher,setSelTeacher]=useState("");
  const [selProfile,setSelProfile]=useState(null);
  const allRes=Object.values(results).flat();

  // সব শিক্ষকের KPI গণনা
  const kpiAll=useMemo(()=>
    TEACHERS.map(teacher=>({teacher,...calcKPI(teacher,allRes,lessonPlans,obsData,deadlines,dlSubmissions)}))
      .sort((a,b)=>b.score-a.score)
  ,[allRes,lessonPlans,obsData,deadlines,dlSubmissions]);

  const gradeColor=g=>g==="A+"?C.gr:g==="A"?C.te:g==="B"?C.am:g==="C"||g==="D"?C.co:C.mu;

  // নির্বাচিত শিক্ষকের বিস্তারিত তথ্য
  const detail=selTeacher?kpiAll.find(k=>k.teacher===selTeacher):null;
  const detailRes=selTeacher?allRes.filter(r=>r.teacher===selTeacher):[];

  // নির্বাচিত শিক্ষকের ছাত্রভিত্তিক উন্নতি
  const studentImprovements=useMemo(()=>{
    if(!selTeacher)return[];
    const map={};
    detailRes.forEach(r=>{
      const key=`${r.name}__${r.subject}`;
      if(!map[key])map[key]=[];
      map[key].push(r);
    });
    return Object.values(map).filter(e=>e.length>=2).map(entries=>{
      const sorted=[...entries].sort((a,b)=>(a.examOrder||1)-(b.examOrder||1));
      const first=sorted[0].marks,last=sorted[sorted.length-1].marks,imp=last-first;
      return{name:sorted[0].name,subject:sorted[0].subject,first,last,imp};
    }).sort((a,b)=>b.imp-a.imp);
  },[selTeacher,detailRes]);

  const subjectPerf=useMemo(()=>{
    if(!selTeacher)return[];
    return SUBJECTS.map(sub=>{
      const sr=detailRes.filter(r=>r.subject===sub);
      if(!sr.length)return null;
      const avg=Math.round(sr.reduce((a,b)=>a+b.marks,0)/sr.length);
      const srP=sr.filter(r=>!r.absent);const pass=srP.filter(r=>r.marks>=(r.passMarks||33)).length;
      return{sub,avg,pass,fail:sr.length-pass,count:sr.length};
    }).filter(Boolean);
  },[selTeacher,detailRes]);

  const tabs=[{id:"ranking",label:"🏆 র‍্যাংকিং"},{id:"scorecard",label:"📊 স্কোরকার্ড"},{id:"detail",label:"🔍 বিস্তারিত"}];

  return(<div>
    <H2>⭐ শিক্ষক KPI সিস্টেম</H2>

    {/* KPI নিয়মের ব্যাখ্যা */}
    <Card style={{background:"linear-gradient(135deg,#5344b515,#0f6e5615)",border:`1px solid ${C.pu}30`}}>
      <H3 style={{color:C.pu}}>KPI গণনার পদ্ধতি</H3>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {[["🎯 ছাত্র উন্নতি","২৮%","দুর্বল ছাত্রের উন্নতিতে বেশি ক্রেডিট",C.gr],["💪 দুর্বল ছাত্র বোনাস","১৮%","ফেল→পাস = সর্বোচ্চ পুরস্কার",C.co],["📈 ধারাবাহিকতা","১৪%","গড় নম্বর বজায় রাখা",C.te],["📚 পাঠ পরিকল্পনা","৫%","নিয়মিত পাঠ সাবমিট",C.pu],["🔔 ডেডলাইন পালন","১০%","সময়মতো জমা না দিলে পেনাল্টি",C.re],["📅 উপস্থিতি","৫%","সময়মতো উপস্থিতি",C.am],["🔍 পরিদর্শন","৫%","ক্লাস পর্যবেক্ষণ স্কোর",C.pu],["📖 সিলেবাস","৫%","বাস্তব কভারেজ হার",C.te],["⭐ ফিডব্যাক","৫%","ছাত্রদের রেটিং",C.gr],["🎓 প্রশিক্ষণ","৫%","ওয়ার্কশপ অংশগ্রহণ",C.co]].map(([t,w,d,c])=>(
          <div key={t} style={{background:c+"12",border:`1px solid ${c}25`,borderRadius:8,padding:"8px 10px"}}>
            <div style={{fontWeight:700,fontSize:12,color:c}}>{t} <span style={{background:c,color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:10}}>{w}</span></div>
            <div style={{fontSize:11,color:C.mu,marginTop:3}}>{d}</div>
          </div>
        ))}
      </div>
      <div style={{marginTop:10,padding:"7px 10px",background:C.reL,borderRadius:7,border:`1px solid ${C.re}30`}}>
        <span style={{color:C.re,fontWeight:700,fontSize:12}}>★ বিশেষ নিয়ম: </span>
        <span style={{fontSize:12}}>পর্যবেক্ষণ ডেটা না থাকলে পুরনো ৪-মেট্রিক পদ্ধতিতে হিসাব হবে</span>
      </div>
    </Card>

    {/* ট্যাব বার */}
    <div style={{display:"flex",gap:4,marginBottom:10}}>
      {tabs.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"7px 12px",borderRadius:16,border:`1px solid ${tab===t.id?C.pu:C.bd}`,background:tab===t.id?C.puL:"transparent",color:tab===t.id?C.pu:C.mu,cursor:"pointer",fontSize:12,fontWeight:tab===t.id?700:400,flexShrink:0}}>{t.label}</button>))}
    </div>

    {/* ── র‍্যাংকিং ট্যাব ── */}
    {tab==="ranking"&&(<div>
      {selProfile&&<TeacherProfile name={selProfile} results={results} lessonPlans={lessonPlans} obsData={obsData} onClose={()=>setSelProfile(null)}/>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <Stat label="সেরা KPI" value={kpiAll[0]?.score||0} color={C.gr} sub={kpiAll[0]?.teacher.split(" ").pop()}/>
        <Stat label="গড় KPI স্কোর" value={Math.round(kpiAll.filter(k=>k.score>0).reduce((a,b)=>a+b.score,0)/(kpiAll.filter(k=>k.score>0).length||1))||0} color={C.pu} sub="সক্রিয় শিক্ষক"/>
        <Stat label="A+ গ্রেড" value={kpiAll.filter(k=>k.grade==="A+").length} color={C.gr} sub="শিক্ষক"/>
        <Stat label="ডেটা নেই" value={kpiAll.filter(k=>k.score===0).length} color={C.mu} sub="ফলাফল এন্ট্রি নেই"/>
      </div>
      <Card>
        <H3>শিক্ষক KPI র‍্যাংকিং</H3>
        <div style={{fontSize:11,color:C.mu,marginBottom:8}}>👆 নামে ক্লিক করলে প্রোফাইল দেখা যাবে</div>
        <table>
          <thead><tr><th>র‍্যাংক</th><th>শিক্ষক</th><th>স্কোর</th><th>গ্রেড</th></tr></thead>
          <tbody>
            {kpiAll.map(({teacher,score,grade,count,lp,dlMissed,dlTotal},i)=>{
              const gc=gradeColor(grade);

/* ইভেন্ট টেমপ্লেট — একটি ইভেন্টের মধ্যে একাধিক sub-task থাকতে পারে */
/* প্রতিটি sub-task একজন বা একাধিক শিক্ষকের জন্য, নির্দিষ্ট deadline সহ */

const EVENT_TYPES=[
  {id:"exam",         label:"পরীক্ষা",              emoji:"📝", color:"#993c1d"},
  {id:"lesson_plan",  label:"লেসন প্ল্যান জমা",     emoji:"📚", color:"#5344b5"},
  {id:"meeting",      label:"সভা / মিটিং",           emoji:"🤝", color:"#0f6e56"},
  {id:"training",     label:"প্রশিক্ষণ",             emoji:"🎓", color:"#854f0b"},
  {id:"result",       label:"ফলাফল প্রকাশ",          emoji:"📊", color:"#3b6d11"},
  {id:"other",        label:"অন্যান্য",               emoji:"📋", color:"#6b6b8a"},
];
function evtTypeInfo(id){return EVENT_TYPES.find(d=>d.id===id)||EVENT_TYPES[5];}

/* sub-task ধরন — একটি ইভেন্টে বিভিন্ন কাজ থাকতে পারে */
const TASK_TYPES=[
  {id:"question",    label:"প্রশ্নপত্র জমা",   emoji:"❓"},
  {id:"script",      label:"খাতা জমা",          emoji:"📃"},
  {id:"marks",       label:"নম্বর জমা",         emoji:"🔢"},
  {id:"lesson_plan", label:"লেসন প্ল্যান",      emoji:"📚"},
  {id:"attend",      label:"উপস্থিত থাকা",      emoji:"✋"},
  {id:"other",       label:"অন্যান্য",           emoji:"📋"},
];
function taskTypeInfo(id){return TASK_TYPES.find(t=>t.id===id)||TASK_TYPES[5];}

/* একটি ইভেন্টের সব task-এর অবস্থা বের করা */
function evtSummary(event, dlSubmissions, today){
  const tasks=event.tasks||[];
  let totalAssignments=0, doneCount=0, overdueCount=0, upcomingCount=0;
  tasks.forEach(task=>{
    const teachers=task.teachers||[];
    const subs=dlSubmissions[task.id]||{};
    const due=new Date(task.dueDate); due.setHours(0,0,0,0);
    const isPast=due<today;
    teachers.forEach(t=>{
      totalAssignments++;
      const st=subs[t];
      if(st==="done"||st==="late_approved") doneCount++;
      else if(isPast) overdueCount++;
      else upcomingCount++;
    });
  });
  const pct=totalAssignments?Math.round(doneCount/totalAssignments*100):0;
  return{totalAssignments,doneCount,overdueCount,upcomingCount,pct};
}

/* KPI penalty for upcoming events — same logic as deadlines but event-aware */
function calcEventKPI(teacher, deadlines, dlSubmissions){
  /* deadlines এবং events উভয়ের task মিলিয়ে হিসাব */
  return calcDeadlinePenalty(teacher,deadlines,dlSubmissions);
}

/* ── EventTaskSubmissionStatus — KPI এ যা প্রভাব ফেলবে ── */
/* done = সময়মতো, late_approved = অনুমতি সাপেক্ষে দেরিতে, missed = জমা হয়নি */

function UpcomingEventCard({event, dlSubmissions, setDlSubmissions, isAdmin, currentUser, onEdit, onDelete}){

  const daysToEvent=Math.round((evtDate-today)/(1000*60*60*24));
  const typeInfo=evtTypeInfo(event.type);
  const {totalAssignments,doneCount,overdueCount,pct}=evtSummary(event,dlSubmissions,today);

  /* এই শিক্ষকের যে task গুলো আছে */
  const myTasks=(event.tasks||[]).filter(task=>task.teachers&&task.teachers.includes(currentUser));

    setDlSubmissions(prev=>({...prev,[taskId]:{...(prev[taskId]||{}),[teacher]:status}}));
  };

    <div style={{background:"#fff",border:`1px solid ${typeInfo.color}30`,borderLeft:`4px solid ${typeInfo.color}`,borderRadius:12,marginBottom:10,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>

          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:14,color:typeInfo.color}}>{typeInfo.emoji} {event.title}</div>
            <div style={{fontSize:11,color:C.mu,marginTop:3}}>

            </div>
            {event.description&&<div style={{fontSize:11,color:C.mu,marginTop:2,fontStyle:"italic"}}>📌 {event.description}</div>}

          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>

          </div>
        </div>
        {/* প্রগ্রেস বার */}
        {totalAssignments>0&&(
          <div style={{marginTop:8}}>
            <div style={{height:5,background:"#eee",borderRadius:3}}>
              <div style={{width:`${pct}%`,height:"100%",background:overdueCount>0?C.re:pct===100?C.gr:C.pu,borderRadius:3,transition:"width 0.4s"}}/>
            </div>
            {overdueCount>0&&<div style={{fontSize:10,color:C.re,marginTop:2}}>⚠ {overdueCount}টি কাজ মিস হয়েছে</div>}

        <div style={{borderTop:`1px solid ${C.bd}`,padding:"12px 14px",background:"#fafaff"}}>

                  {taskTeachers.map(t=>{
                    const st=subs[t];
                    const isDone=st==="done";

                    const bgColor=isDone?C.grL:isLate?C.amL:isPast?C.reL:C.puL;

                        {isAdmin&&isPast&&!isDone&&!isLate&&(

  return(
    <div style={{background:C.puL,border:`2px solid ${C.pu}40`,borderRadius:14,padding:14,marginBottom:12}}>
      <H3>{isEdit?"✏️ ইভেন্ট সম্পাদনা":"➕ নতুন ইভেন্ট তৈরি করুন"}</H3>

      {/* ইভেন্টের মূল তথ্য */}
      <div style={{marginBottom:8}}>
        <div style={{fontSize:11,color:C.mu,marginBottom:3}}>ইভেন্টের নাম *</div>
        <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="যেমন: পাক্ষিক পরীক্ষা, লেসন প্ল্যান জমা..." style={{width:"100%"}}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div>
          <div style={{fontSize:11,color:C.mu,marginBottom:3}}>ইভেন্টের ধরন *</div>
          <select value={type} onChange={e=>setType(e.target.value)} style={{width:"100%"}}>
            {EVENT_TYPES.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.label}</option>)}
          </select>
        </div>
        <div>
          <div style={{fontSize:11,color:C.mu,marginBottom:3}}>ইভেন্টের তারিখ *</div>
          <input type="date" value={eventDate} onChange={e=>setEventDate(e.target.value)} style={{width:"100%"}}/>
        </div>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:C.mu,marginBottom:3}}>বিবরণ (ঐচ্ছিক)</div>
        <textarea value={description} onChange={e=>setDescription(e.target.value)} rows={2}
          placeholder="ইভেন্ট সম্পর্কে বিশেষ নির্দেশনা..."
          style={{width:"100%",padding:"8px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13,fontFamily:"sans-serif",resize:"vertical"}}/>
      </div>

      {/* কাজের তালিকা */}
      <div style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontWeight:700,fontSize:12,color:C.tx}}>📋 কাজের তালিকা ({tasks.length}টি)</div>
          <button onClick={()=>setShowTaskForm(p=>!p)}
            style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${C.pu}`,background:C.pu,color:"#fff",cursor:"pointer",fontSize:11,fontWeight:700}}>
            {showTaskForm?"বাতিল":"+ কাজ যোগ করুন"}
          </button>
        </div>

        {/* নতুন কাজ ফর্ম */}
        {showTaskForm&&(
          <div style={{background:"#fff",border:`1px solid ${C.bd}`,borderRadius:10,padding:12,marginBottom:8}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div>
                <div style={{fontSize:10,color:C.mu,marginBottom:3}}>কাজের ধরন</div>
                <select value={taskForm.type} onChange={e=>setTaskForm(p=>({...p,type:e.target.value}))} style={{width:"100%",fontSize:12}}>
                  {TASK_TYPES.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.label}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:10,color:C.mu,marginBottom:3}}>ডেডলাইন তারিখ *</div>
                <input type="date" value={taskForm.dueDate} onChange={e=>setTaskForm(p=>({...p,dueDate:e.target.value}))} style={{width:"100%"}}/>
              </div>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:10,color:C.mu,marginBottom:3}}>কাজের শিরোনাম (ঐচ্ছিক)</div>
              <input type="text" value={taskForm.title} onChange={e=>setTaskForm(p=>({...p,title:e.target.value}))} placeholder="খালি রাখলে ধরন থেকে নেওয়া হবে" style={{width:"100%"}}/>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:10,color:C.mu,marginBottom:3}}>নির্দেশনা (ঐচ্ছিক)</div>
              <input type="text" value={taskForm.note} onChange={e=>setTaskForm(p=>({...p,note:e.target.value}))} placeholder="বিশেষ নির্দেশ..." style={{width:"100%"}}/>
            </div>
            {/* শিক্ষক নির্বাচন */}
            <div style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <div style={{fontSize:10,color:C.mu}}>সংশ্লিষ্ট শিক্ষক *</div>
                <div style={{display:"flex",gap:4}}>
                  <button onClick={selectAllTeachers} style={{fontSize:9,padding:"2px 6px",borderRadius:6,border:`1px solid ${C.pu}`,background:C.puL,color:C.pu,cursor:"pointer"}}>সবাই</button>
                  <button onClick={clearTeachers} style={{fontSize:9,padding:"2px 6px",borderRadius:6,border:`1px solid ${C.re}`,background:C.reL,color:C.re,cursor:"pointer"}}>বাতিল</button>
                </div>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4,maxHeight:120,overflowY:"auto",padding:4,background:"#f8f7ff",borderRadius:8,border:`1px solid ${C.bd}`}}>
                {TEACHERS.map(t=>{
                  const sel=taskForm.teachers.includes(t);
                  return(<button key={t} onClick={()=>toggleTeacher(t)}
                    style={{padding:"3px 8px",borderRadius:10,border:`1px solid ${sel?C.pu:C.bd}`,background:sel?C.puL:"#fff",color:sel?C.pu:C.mu,cursor:"pointer",fontSize:10,fontWeight:sel?700:400}}>
                    {sel?"✓ ":""}{t.split(" ").slice(-1)[0]}
                  </button>);
                })}
              </div>
              <div style={{fontSize:10,color:C.mu,marginTop:3}}>{taskForm.teachers.length} জন শিক্ষক নির্বাচিত</div>
            </div>
            <button onClick={addTask}
              style={{width:"100%",padding:"8px",borderRadius:8,border:"none",background:C.te,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12}}>
              ✓ কাজ যোগ করুন
            </button>
          </div>
        )}

        {/* কাজের তালিকা প্রিভিউ */}
        {tasks.map((task,i)=>{
          const tInfo=taskTypeInfo(task.type);
          return(
            <div key={task.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",background:"#fff",borderRadius:8,marginBottom:5,border:`1px solid ${C.bd}`}}>
              <div>
                <span style={{fontSize:12,fontWeight:600}}>{tInfo.emoji} {task.title}</span>
                <span style={{fontSize:10,color:C.mu,marginLeft:6}}>ডেডলাইন: {new Date(task.dueDate).toLocaleDateString("bn-BD")}</span>
                <span style={{fontSize:10,color:C.pu,marginLeft:6}}>{task.teachers.length} জন শিক্ষক</span>
              </div>
              <button onClick={()=>removeTask(task.id)}
                style={{padding:"3px 8px",borderRadius:6,border:`1px solid ${C.re}30`,background:C.reL,color:C.re,cursor:"pointer",fontSize:10}}>✕</button>
            </div>
          );
        })}
        {tasks.length===0&&!showTaskForm&&<div style={{textAlign:"center",color:C.mu,fontSize:11,padding:8}}>এখনো কোনো কাজ যোগ করা হয়নি</div>}
      </div>

      {err&&<div style={{color:C.re,fontSize:12,marginBottom:8,fontWeight:600}}>⚠ {err}</div>}
      <div style={{display:"flex",gap:8}}>
        <button onClick={save}
          style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:C.pu,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>
          ✓ {isEdit?"পরিবর্তন সংরক্ষণ করুন":"ইভেন্ট তৈরি করুন"}
        </button>
        <button onClick={onCancel}
          style={{padding:"10px 16px",borderRadius:10,border:`1px solid ${C.bd}`,background:"transparent",cursor:"pointer",fontSize:13}}>
          বাতিল
        </button>
      </div>
    </div>
  );
}

function UpcomingEvents({deadlines, setDeadlines, dlSubmissions, setDlSubmissions, currentUser, isAdmin}){
  /* events আলাদা state হিসেবে deadlines এর মধ্যে _events key তে রাখা হবে */
  /* এতে Firebase sync সহজ থাকে এবং KPI সংযোগ রক্ষা হয় */
  const [events, setEvents]=useState([]);
  const [eventsLoaded,setEventsLoaded]=useState(false);

  /* IndexedDB থেকে events লোড */
  useEffect(()=>{
    HAISDB.get("hais_events_v1").then(data=>{
      if(data&&Array.isArray(data)&&data.length>0){setEvents(data);}
      else{
        // localStorage থেকে এক-বার মাইগ্রেট
        try{const ls=localStorage.getItem("hais_events_v1");if(ls){const p=JSON.parse(ls);setEvents(p);localStorage.removeItem("hais_events_v1");}}catch(e){}
      }
      setEventsLoaded(true);
    });
  },[]);

  /* events IndexedDB এ সংরক্ষণ */
  useEffect(()=>{
    if(!eventsLoaded)return;
    HAISDB.setSync("hais_events_v1",events);
    /* Firebase এও সংরক্ষণ করি */
    if(window.__fbReady){
      window.__fbDB.ref("hais_events_v1").set(events).catch(e=>console.error("Events FB save:",e));
    }
  },[events,eventsLoaded]);

  /* Firebase থেকে events লোড */
  useEffect(()=>{
    if(!window.__fbReady)return;
    window.__fbDB.ref("hais_events_v1").once("value").then(snap=>{
      if(snap.exists()&&Array.isArray(snap.val())&&snap.val().length>0){
        setEvents(prev=>{
          if(prev.length>0)return prev; // local data থাকলে override করব না
          return snap.val();
        });
      }
    }).catch(e=>console.error("Events FB load:",e));
  },[]);

  const [showForm,setShowForm]=useState(false);
  const [editEvent,setEditEvent]=useState(null);
  const [filterType,setFilterType]=useState("সব");
  const [viewMode,setViewMode]=useState("upcoming"); /* upcoming / all / my */

  const today=new Date(); today.setHours(0,0,0,0);

  /* ফিল্টার ও সাজানো */
  const filteredEvents=useMemo(()=>{
    let list=[...events];
    if(filterType!=="সব") list=list.filter(e=>e.type===filterType);
    if(viewMode==="upcoming") list=list.filter(e=>{
      const d=new Date(e.eventDate); d.setHours(0,0,0,0);
      return d>=today;
    });
    if(viewMode==="my"&&!isAdmin){
      list=list.filter(e=>(e.tasks||[]).some(t=>t.teachers&&t.teachers.includes(currentUser)));
    }
    /* তারিখের ক্রমানুসারে সাজানো */
    list.sort((a,b)=>new Date(a.eventDate)-new Date(b.eventDate));
    return list;
  },[events,filterType,viewMode,currentUser,isAdmin]);

  /* আমার pending task গুলো */
  const myPendingTasks=useMemo(()=>{
    const result=[];
    events.forEach(evt=>{
      (evt.tasks||[]).forEach(task=>{
        if(!task.teachers||!task.teachers.includes(currentUser))return;
        const subs=dlSubmissions[task.id]||{};
        const st=subs[currentUser];
        if(st==="done"||st==="late_approved")return;
        const due=new Date(task.dueDate); due.setHours(0,0,0,0);
        result.push({...task, eventTitle:evt.title, eventId:evt.id, daysLeft:Math.round((due-today)/(1000*60*60*24))});
      });
    });
    return result.sort((a,b)=>a.daysLeft-b.daysLeft);
  },[events,dlSubmissions,currentUser]);

  /* সামগ্রিক পরিসংখ্যান */
  const stats=useMemo(()=>{
    const upcomingEvts=events.filter(e=>{const d=new Date(e.eventDate);d.setHours(0,0,0,0);return d>=today;});
    let totalTasks=0, doneTasks=0, overdueTasks=0;
    events.forEach(evt=>{
      (evt.tasks||[]).forEach(task=>{
        const subs=dlSubmissions[task.id]||{};
        const due=new Date(task.dueDate); due.setHours(0,0,0,0);
        (task.teachers||[]).forEach(t=>{
          totalTasks++;
          const st=subs[t];
          if(st==="done"||st==="late_approved") doneTasks++;
          else if(due<today) overdueTasks++;
        });
      });
    });
    return{upcoming:upcomingEvts.length,total:events.length,totalTasks,doneTasks,overdueTasks};
  },[events,dlSubmissions]);

  const saveEvent=(evt)=>{
    setEvents(prev=>{
      const idx=prev.findIndex(e=>e.id===evt.id);
      if(idx>=0){const upd=[...prev];upd[idx]=evt;return upd;}
      return [...prev,evt];
    });
    /* ইভেন্টের task গুলোকে deadline penalty system-এ যুক্ত করতে deadlines-এ sync */
    syncEventTasksToDeadlines(evt);
    setShowForm(false);
    setEditEvent(null);
  };

  /* task গুলোকে deadlines format এ sync করি — KPI এ প্রভাব ফেলার জন্য */
  const syncEventTasksToDeadlines=(evt)=>{
    setDeadlines(prev=>{
      /* এই ইভেন্টের পুরনো deadline গুলো সরাই */
      const filtered=prev.filter(d=>!d._eventId||d._eventId!==evt.id);
      /* নতুন task deadline গুলো যোগ করি */
      const newDls=(evt.tasks||[]).map(task=>({
        id:task.id,
        title:`${evt.title} — ${task.title}`,
        type:task.type==="lesson_plan"?"lesson_plan":task.type==="marks"?"marks":task.type==="question"?"question":task.type==="script"?"exam_script":"other",
        dueDate:task.dueDate,
        note:task.note,
        teachers:task.teachers,
        _eventId:evt.id,
        createdAt:evt.createdAt
      }));
      return [...filtered,...newDls];
    });
  };

  const deleteEvent=(id)=>{
    if(!window.confirm("এই ইভেন্টটি মুছে ফেলবেন? সব কাজের ডেটাও মুছে যাবে।"))return;
    setEvents(prev=>prev.filter(e=>e.id!==id));
    setDeadlines(prev=>prev.filter(d=>d._eventId!==id));
  };

  return(<div>
    <H2>📅 আপকামিং ইভেন্ট</H2>

    {/* সারসংক্ষেপ */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      {isAdmin?(
        <>
          <Stat label="আসন্ন ইভেন্ট" value={stats.upcoming} color={C.pu} sub="ভবিষ্যতের"/>
          <Stat label="মোট কাজ" value={stats.totalTasks} color={C.te} sub="সব শিক্ষকের"/>
          <Stat label="সম্পন্ন" value={stats.doneTasks} color={C.gr} sub="জমা দিয়েছেন"/>
          <Stat label="মিস" value={stats.overdueTasks} color={stats.overdueTasks>0?C.re:C.gr} sub="সময় পেরিয়েছে"/>
        </>
      ):(
        <>
          <Stat label="আমার বাকি কাজ" value={myPendingTasks.filter(t=>t.daysLeft>=0).length} color={C.am} sub="জমা দিতে হবে"/>
          <Stat label="মিস হয়েছে" value={myPendingTasks.filter(t=>t.daysLeft<0).length} color={myPendingTasks.filter(t=>t.daysLeft<0).length>0?C.re:C.gr} sub="সময় পেরিয়েছে"/>
        </>
      )}
    </div>

    {/* শিক্ষকের জন্য: আমার বাকি কাজ সংক্ষেপ */}
    {!isAdmin&&myPendingTasks.length>0&&(
      <Card style={{border:`2px solid ${C.am}40`,background:C.amL,marginBottom:10}}>
        <div style={{fontWeight:700,color:C.am,marginBottom:8}}>⚡ আমার আসন্ন কাজ</div>
        {myPendingTasks.slice(0,5).map(task=>{
          const tInfo=taskTypeInfo(task.type);
          const urgColor=task.daysLeft<0?C.re:task.daysLeft===0?C.co:task.daysLeft<=3?C.am:C.pu;
          const subs=dlSubmissions[task.id]||{};
          const done=subs[currentUser]==="done"||subs[currentUser]==="late_approved";
          return(
            <div key={task.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.bd}`,gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:700}}>{tInfo.emoji} {task.title}</div>
                <div style={{fontSize:10,color:C.mu}}>📅 {task.eventTitle}</div>
                {task.note&&<div style={{fontSize:10,color:C.mu,fontStyle:"italic"}}>📌 {task.note}</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                <span style={{fontSize:10,fontWeight:700,color:urgColor}}>
                  {task.daysLeft<0?`${Math.abs(task.daysLeft)}দিন আগে`:task.daysLeft===0?"আজই!":task.daysLeft<=3?`${task.daysLeft}দিন বাকি`:`${task.daysLeft}দিন বাকি`}
                </span>
                {!done&&(
                  <button onClick={()=>setDlSubmissions(prev=>({...prev,[task.id]:{...(prev[task.id]||{}),[currentUser]:"done"}}))}
                    style={{padding:"4px 10px",borderRadius:8,border:"none",background:C.gr,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:11}}>
                    ✓ জমা দিয়েছি
                  </button>
                )}
                {done&&<span style={{fontSize:11,color:C.gr,fontWeight:700}}>✅ জমা দিয়েছেন</span>}
              </div>
            </div>
          );
        })}
        {myPendingTasks.length>5&&<div style={{textAlign:"center",fontSize:11,color:C.mu,marginTop:6}}>আরও {myPendingTasks.length-5}টি কাজ বাকি...</div>}
      </Card>
    )}

    {/* ট্যাব ও ফিল্টার */}
    <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
      {["upcoming","all",...(!isAdmin?["my"]:[])].map(v=>{
        const labels={upcoming:"📅 আসন্ন",all:"📋 সব ইভেন্ট",my:"👤 আমার"};
        return(<button key={v} onClick={()=>setViewMode(v)}
          style={{padding:"6px 12px",borderRadius:14,border:`1px solid ${viewMode===v?C.pu:C.bd}`,background:viewMode===v?C.puL:"transparent",color:viewMode===v?C.pu:C.mu,cursor:"pointer",fontSize:12,fontWeight:viewMode===v?700:400}}>
          {labels[v]}
        </button>);
      })}
      <select value={filterType} onChange={e=>setFilterType(e.target.value)}
        style={{padding:"6px 10px",borderRadius:12,border:`1px solid ${C.bd}`,fontSize:11,marginLeft:"auto"}}>
        <option value="সব">সব ধরন</option>
        {EVENT_TYPES.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.label}</option>)}
      </select>
    </div>

    {/* অ্যাডমিন: নতুন ইভেন্ট বোতাম */}
    {isAdmin&&!showForm&&!editEvent&&(
      <button onClick={()=>setShowForm(true)}
        style={{width:"100%",padding:"10px",borderRadius:10,border:`2px dashed ${C.pu}60`,background:C.puL,color:C.pu,cursor:"pointer",fontWeight:700,fontSize:13,marginBottom:12}}>
        ＋ নতুন ইভেন্ট তৈরি করুন
      </button>
    )}

    {/* ইভেন্ট ফর্ম */}
    {isAdmin&&showForm&&<EventForm onSave={saveEvent} onCancel={()=>setShowForm(false)}/>}
    {isAdmin&&editEvent&&<EventForm event={editEvent} onSave={saveEvent} onCancel={()=>setEditEvent(null)}/>}

    {/* ইভেন্ট তালিকা */}
    {filteredEvents.length===0?(
      <Card><div style={{textAlign:"center",color:C.mu,padding:24,fontSize:13}}>
        {viewMode==="upcoming"?"কোনো আসন্ন ইভেন্ট নেই।":viewMode==="my"?"আপনার জন্য কোনো ইভেন্ট নেই।":"কোনো ইভেন্ট নেই।"}
        {isAdmin&&<div style={{fontSize:11,marginTop:4}}>উপরে ＋ বোতামে ক্লিক করে নতুন ইভেন্ট তৈরি করুন।</div>}
      </div></Card>
    ):(
      filteredEvents.map(evt=>(
        <UpcomingEventCard
          key={evt.id}
          event={evt}
          dlSubmissions={dlSubmissions}
          setDlSubmissions={setDlSubmissions}
          isAdmin={isAdmin}
          currentUser={currentUser}
          onEdit={(e)=>{setEditEvent(e);setShowForm(false);}}
          onDelete={deleteEvent}
        />
      ))
    )}
  </div>);
}

const DL_TYPES=[
  {id:"lesson_plan", label:"লেসন প্ল্যান জমা", emoji:"📚", color:"#5344b5"},
  {id:"exam_script", label:"পরীক্ষার খাতা জমা", emoji:"📝", color:"#0f6e56"},
  {id:"question",    label:"প্রশ্নপত্র জমা",    emoji:"❓", color:"#993c1d"},
  {id:"marks",       label:"নম্বর এন্ট্রি জমা",  emoji:"🔢", color:"#854f0b"},
  {id:"other",       label:"অন্যান্য",            emoji:"📋", color:"#6b6b8a"},
];

function dlTypeInfo(id){return DL_TYPES.find(d=>d.id===id)||DL_TYPES[4];}

// deadline status: upcoming / due_today / overdue / completed
function dlStatus(deadline, dlSubmissions){
  const key=deadline.id;
  const subs=dlSubmissions[key]||{};
  const today=new Date(); today.setHours(0,0,0,0);
  const due=new Date(deadline.dueDate); due.setHours(0,0,0,0);
  const diff=Math.round((due-today)/(1000*60*60*24));

  const targetTeachers=deadline.teachers&&deadline.teachers.length>0?deadline.teachers:TEACHERS;
  const totalTargets=targetTeachers.length;
  const submittedCount=targetTeachers.filter(t=>subs[t]==="done").length;
  const allDone=submittedCount===totalTargets;

  if(allDone)return{status:"completed",diff,submittedCount,totalTargets,color:C.gr,label:"সম্পন্ন"};
  if(diff<0)return{status:"overdue",diff,submittedCount,totalTargets,color:C.re,label:`${Math.abs(diff)} দিন অতিক্রান্ত`};
  if(diff===0)return{status:"due_today",diff,submittedCount,totalTargets,color:C.co,label:"আজই ডেডলাইন"};
  if(diff<=3)return{status:"urgent",diff,submittedCount,totalTargets,color:C.am,label:`${diff} দিন বাকি`};
  return{status:"upcoming",diff,submittedCount,totalTargets,color:C.pu,label:`${diff} দিন বাকি`};
}

// KPI penalty হিসাব: কোনো শিক্ষক কতটি deadline miss করেছেন
function calcDeadlinePenalty(teacher, deadlines, dlSubmissions){
  let missed=0, total=0;
  const today=new Date(); today.setHours(0,0,0,0);
  deadlines.forEach(dl=>{
    const targetTeachers=dl.teachers&&dl.teachers.length>0?dl.teachers:TEACHERS;
    if(!targetTeachers.includes(teacher))return;
    const due=new Date(dl.dueDate); due.setHours(0,0,0,0);
    if(due>=today)return; // ভবিষ্যতের deadline গোনে না
    total++;
    const subs=dlSubmissions[dl.id]||{};
    if(subs[teacher]!=="done")missed++;
  });
  return{missed,total,rate:total?Math.round((total-missed)/total*100):100};
}

function NotificationPanel({deadline, dlSubmissions, onClose}){
  const info=dlTypeInfo(deadline.type);
  const targetTeachers=deadline.teachers&&deadline.teachers.length>0?deadline.teachers:TEACHERS;
  const subs=dlSubmissions[deadline.id]||{};
  const {diff,submittedCount,totalTargets}=dlStatus(deadline,dlSubmissions);
  const pending=targetTeachers.filter(t=>subs[t]!=="done");
  const done=targetTeachers.filter(t=>subs[t]==="done");

  const copyNotice=()=>{
    const due=new Date(deadline.dueDate).toLocaleDateString("bn-BD");
    const lines=[
      `📢 Heritage Public School — ${info.emoji} ${info.label} নোটিশ`,
      ``,
      `বিষয়: ${deadline.title}`,
      `ডেডলাইন: ${due}`,
      deadline.note?`বিশেষ নির্দেশ: ${deadline.note}`:"",
      ``,
      `⚠️ এখনো জমা দেননি:`,
      ...pending.map(t=>`• ${t}`),
      ``,
      `অনুগ্রহ করে নির্ধারিত সময়ের মধ্যে জমা দিন।`,
      `— একাডেমিক ইনচার্জ, Heritage Public School`,
    ].filter(l=>l!==undefined&&!(l===""&&lines&&lines[lines.length-1]==="")).join("\n");
    navigator.clipboard.writeText(lines).then(()=>alert("✓ নোটিশ কপি হয়েছে! WhatsApp/বার্তায় পেস্ট করুন।"));
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:700,overflowY:"auto",padding:"16px 12px"}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:16,padding:18,maxWidth:500,margin:"0 auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <div style={{fontWeight:700,fontSize:15,color:info.color}}>{info.emoji} {deadline.title}</div>
            <div style={{fontSize:12,color:C.mu,marginTop:3}}>{info.label} • ডেডলাইন: {new Date(deadline.dueDate).toLocaleDateString("bn-BD")}</div>
            <div style={{fontSize:12,marginTop:4,fontWeight:700,color:diff<0?C.re:diff===0?C.co:C.am}}>
              {diff<0?`⚠️ ${Math.abs(diff)} দিন অতিক্রান্ত হয়েছে`:diff===0?"🔴 আজই শেষ দিন":`🟡 ${diff} দিন বাকি`}
            </div>
          </div>
          <button onClick={onClose} style={{border:"none",background:C.reL,color:C.re,borderRadius:8,padding:"5px 10px",cursor:"pointer",fontWeight:700}}>✕</button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          <div style={{background:C.grL,border:`1px solid ${C.gr}30`,borderRadius:8,padding:"10px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:700,color:C.gr}}>{submittedCount}</div>
            <div style={{fontSize:11,color:C.mu}}>জমা দিয়েছেন</div>
          </div>
          <div style={{background:C.reL,border:`1px solid ${C.re}30`,borderRadius:8,padding:"10px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:700,color:C.re}}>{pending.length}</div>
            <div style={{fontSize:11,color:C.mu}}>বাকি আছেন</div>
          </div>
        </div>

        {pending.length>0&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:C.re,marginBottom:6}}>⏳ এখনো জমা দেননি ({pending.length} জন):</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {pending.map(t=><span key={t} style={{fontSize:11,background:C.reL,color:C.re,padding:"3px 8px",borderRadius:12,border:`1px solid ${C.re}30`}}>{t.split(" ").pop()}</span>)}
            </div>
          </div>
        )}

        {done.length>0&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:C.gr,marginBottom:6}}>✅ জমা দিয়েছেন ({done.length} জন):</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {done.map(t=><span key={t} style={{fontSize:11,background:C.grL,color:C.gr,padding:"3px 8px",borderRadius:12,border:`1px solid ${C.gr}30`}}>{t.split(" ").pop()}</span>)}
            </div>
          </div>
        )}

        {deadline.note&&(
          <div style={{background:C.amL,border:`1px solid ${C.am}30`,borderRadius:8,padding:"8px 10px",marginBottom:14,fontSize:12,color:C.am}}>
            <span style={{fontWeight:700}}>📌 নির্দেশনা: </span>{deadline.note}
          </div>
        )}

        <div style={{display:"flex",gap:8}}>
          {pending.length>0&&(
            <button onClick={copyNotice}
              style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#25d366,#128c7e)",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>
              📋 নোটিশ কপি করুন (WhatsApp)
            </button>
          )}
          {pending.length===0&&(
            <div style={{flex:1,padding:"10px",borderRadius:10,background:C.grL,color:C.gr,fontWeight:700,fontSize:13,textAlign:"center"}}>
              ✅ সবাই জমা দিয়েছেন
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function DeadlineModule({deadlines,setDeadlines,dlSubmissions,setDlSubmissions,currentUser,isAdmin}){
  const [tab,setTab]=useState(isAdmin?"manage":"my");
  const [showForm,setShowForm]=useState(false);
  const [notifDl,setNotifDl]=useState(null);
  const [filterType,setFilterType]=useState("সব");

  // নতুন deadline ফর্ম state
  const [form,setForm]=useState({title:"",type:"lesson_plan",dueDate:"",note:"",teachers:[]});
  const [formErr,setFormErr]=useState("");

  const today=new Date(); today.setHours(0,0,0,0);

  // শিক্ষক যেসব deadline-এ আছেন
  const myDeadlines=useMemo(()=>{
    if(isAdmin)return deadlines;
    return deadlines.filter(dl=>{
      const t=dl.teachers&&dl.teachers.length>0?dl.teachers:TEACHERS;
      return t.includes(currentUser);
    });
  },[deadlines,currentUser,isAdmin]);

  const filtered=filterType==="সব"?myDeadlines:myDeadlines.filter(d=>d.type===filterType);
  const sorted=[...filtered].sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));

  // আমার জন্য pending deadline
  const myPending=myDeadlines.filter(dl=>{
    const subs=dlSubmissions[dl.id]||{};
    const due=new Date(dl.dueDate); due.setHours(0,0,0,0);
    return !isAdmin&&subs[currentUser]!=="done"&&due>=today;
  });
  const myOverdue=myDeadlines.filter(dl=>{
    const subs=dlSubmissions[dl.id]||{};
    const due=new Date(dl.dueDate); due.setHours(0,0,0,0);
    return !isAdmin&&subs[currentUser]!=="done"&&due<today;
  });

  const submitDeadline=()=>{
    if(!form.title.trim()){setFormErr("শিরোনাম আবশ্যক");return;}
    if(!form.dueDate){setFormErr("তারিখ আবশ্যক");return;}
    setFormErr("");
    const newDl={
      id:Date.now().toString(),
      title:form.title,
      type:form.type,
      dueDate:form.dueDate,
      note:form.note,
      teachers:form.teachers,
      createdAt:new Date().toISOString(),
      createdBy:currentUser
    };
    setDeadlines(prev=>[...prev,newDl]);
    setForm({title:"",type:"lesson_plan",dueDate:"",note:"",teachers:[]});
    setShowForm(false);
  };

  const markDone=(dlId,teacher)=>{
    setDlSubmissions(prev=>({...prev,[dlId]:{...(prev[dlId]||{}),[teacher]:"done"}}));
  };
  const markUndone=(dlId,teacher)=>{
    setDlSubmissions(prev=>{
      const copy={...prev,[dlId]:{...(prev[dlId]||{})}};
      delete copy[dlId][teacher];
      return copy;
    });
  };
  const deleteDl=(id)=>{
    if(!window.confirm("এই ডেডলাইনটি মুছে ফেলবেন?"))return;
    setDeadlines(prev=>prev.filter(d=>d.id!==id));
    setDlSubmissions(prev=>{const c={...prev};delete c[id];return c;});
  };

  const toggleTeacher=(t)=>{
    setForm(prev=>({...prev,teachers:prev.teachers.includes(t)?prev.teachers.filter(x=>x!==t):[...prev.teachers,t]}));
  };

  // admin stats
  const overdueCount=deadlines.filter(dl=>{
    const due=new Date(dl.dueDate); due.setHours(0,0,0,0);
    const subs=dlSubmissions[dl.id]||{};
    const targets=dl.teachers&&dl.teachers.length>0?dl.teachers:TEACHERS;
    return due<today&&targets.some(t=>subs[t]!=="done");
  }).length;
  const todayCount=deadlines.filter(dl=>{
    const due=new Date(dl.dueDate); due.setHours(0,0,0,0);
    return due.getTime()===today.getTime();
  }).length;

  return(<div>
    {notifDl&&<NotificationPanel deadline={notifDl} dlSubmissions={dlSubmissions} onClose={()=>setNotifDl(null)}/>}

    <H2>🔔 ডেডলাইন ব্যবস্থাপনা</H2>

    {/* সারসংক্ষেপ */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      {isAdmin?(
        <>
          <Stat label="মোট ডেডলাইন" value={deadlines.length} color={C.pu} sub="সক্রিয়"/>
          <Stat label="অতিক্রান্ত" value={overdueCount} color={overdueCount>0?C.re:C.gr} sub="সময় পেরিয়ে গেছে"/>
          <Stat label="আজকের ডেডলাইন" value={todayCount} color={todayCount>0?C.co:C.gr} sub="আজকে শেষ"/>
          <Stat label="সম্পন্ন" value={deadlines.filter(dl=>{const targets=dl.teachers&&dl.teachers.length>0?dl.teachers:TEACHERS;const subs=dlSubmissions[dl.id]||{};return targets.every(t=>subs[t]==="done");}).length} color={C.te} sub="সবাই জমা দিয়েছেন"/>
        </>
      ):(
        <>
          <Stat label="আমার বাকি" value={myPending.length} color={myPending.length>0?C.am:C.gr} sub="জমা দিতে হবে"/>
          <Stat label="সময় পেরিয়েছে" value={myOverdue.length} color={myOverdue.length>0?C.re:C.gr} sub="মিস হয়েছে"/>

    <div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap"}}>
      {isAdmin&&<button onClick={()=>setTab("manage")} style={{padding:"6px 12px",borderRadius:14,border:`1px solid ${tab==="manage"?C.pu:C.bd}`,background:tab==="manage"?C.puL:"transparent",color:tab==="manage"?C.pu:C.mu,cursor:"pointer",fontSize:12,fontWeight:tab==="manage"?700:400}}>📋 ডেডলাইন পরিচালনা</button>}

        </div>

/* ── Whitelist Manager — Admin শিক্ষকদের email অনুমোদন করবেন ── */
function WhitelistManager(){
  const [emails,setEmails]=useState([]);
  const [newEmail,setNewEmail]=useState("");
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState("");

  const fbKey=(email)=>email.replace(/\./g,"_").replace(/@/g,"__at__");

  /* Firebase থেকে whitelist লোড */
  useEffect(()=>{
    if(!window.__fbReady)return;
    window.__fbDB.ref("hais_whitelist").once("value").then(snap=>{
      if(snap.exists()){
        setEmails(Object.keys(snap.val()).map(k=>k.replace(/__at__/g,"@").replace(/_/g,".")));
      }
    });
  },[]);

  const addEmail=async()=>{
    if(!newEmail.trim()||!newEmail.includes("@")){setMsg("❌ সঠিক ইমেইল লিখুন");return;}
    setLoading(true);
    try{
      await window.__fbDB.ref("hais_whitelist/"+fbKey(newEmail.trim())).set({addedAt:new Date().toISOString()});
      setEmails(prev=>[...prev,newEmail.trim()]);
      setNewEmail("");
      setMsg("✅ ইমেইল যোগ করা হয়েছে");
      setTimeout(()=>setMsg(""),3000);
    }catch(e){setMsg("❌ যোগ করা যায়নি");}
    setLoading(false);
  };

  const removeEmail=async(email)=>{
    if(!window.confirm(`${email} মুছে ফেলবেন?`))return;
    await window.__fbDB.ref("hais_whitelist/"+fbKey(email)).remove();
    setEmails(prev=>prev.filter(e=>e!==email));
  };

  return(
    <div>
      <H2>📋 অনুমোদিত ইমেইল তালিকা</H2>
      <Card>
        <div style={{fontSize:12,color:C.mu,marginBottom:10,lineHeight:1.6}}>
          এখানে যোগ করা ইমেইল দিয়েই শিক্ষকরা নতুন account খুলতে পারবেন। অন্য কেউ চেষ্টা করলে বাধা পাবে।
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input type="email" placeholder="শিক্ষকের ইমেইল যোগ করুন..." value={newEmail}
            onChange={e=>setNewEmail(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&addEmail()}
            style={{flex:1,padding:"9px 12px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13,outline:"none"}}/>
          <button onClick={addEmail} disabled={loading}
            style={{padding:"9px 16px",borderRadius:8,border:"none",background:C.pu,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13,flexShrink:0}}>
            {loading?"...":"+ যোগ করুন"}
          </button>
        </div>
        {msg&&<div style={{fontSize:12,color:msg.includes("✅")?C.gr:C.re,marginBottom:8,fontWeight:600}}>{msg}</div>}
        {emails.length===0?(
          <div style={{textAlign:"center",color:C.mu,padding:16,fontSize:12}}>এখনো কোনো ইমেইল যোগ করা হয়নি</div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {emails.map(email=>(
              <div key={email} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:C.puL,borderRadius:8,border:`1px solid ${C.pu}20`}}>
                <div style={{fontSize:13,color:C.tx}}>📧 {email}</div>
                <button onClick={()=>removeEmail(email)}
                  style={{border:"none",background:C.reL,color:C.re,borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>
                  ✕ মুছুন
                </button>
              </div>
            ))}
          </div>
        )}
      </Card>
    </div>
  );
}
