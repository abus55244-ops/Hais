/* প্রতিদিন রাত ১২টায় carry-forward processing — carry status এর item থাকলে নতুন দিনে status open করে দেয়,
   scheduled status এর item আজকের তারিখে পৌঁছালে status open করে দেয় */
const processDailyCarryForward=(items,lastProcessedDate)=>{
  const today=new Date().toISOString().slice(0,10);
  if(lastProcessedDate===today)return{items,changed:false}; // আজ ইতিমধ্যে প্রসেস হয়েছে
  let changed=false;
  const updated=items.map(it=>{
    if(it.status==="carry"){changed=true;return{...it,status:"open"};}
    if(it.status==="scheduled"&&it.scheduledDate<=today){changed=true;return{...it,status:"open",scheduledDate:null};}
    return it;
  });
  return{items:updated,changed:true,today};
};

function DailyRoutineScheduler({dailyRoutine,setDailyRoutine,meetingAgenda,setMeetingAgenda,specialTasks,setSpecialTasks,routineSubtasks,setRoutineSubtasks,lastCarryDate,setLastCarryDate,appPendingLP=0,appPendingDL=0}){
  const [showMeeting,setShowMeeting]=useState(false);
  const [showSubBlock,setShowSubBlock]=useState(null); // route block id
  const [newSubtask,setNewSubtask]=useState("");
  const [notifPerm,setNotifPerm]=useState(window.Notification?Notification.permission:"denied");

  // দিন পরিবর্তনে carry-forward প্রসেস
  React.useEffect(()=>{
    const todayStr=new Date().toISOString().slice(0,10);
    if(lastCarryDate!==todayStr){
      const r1=processDailyCarryForward(meetingAgenda,lastCarryDate);
      const r2=processDailyCarryForward(specialTasks,lastCarryDate);
      if(r1.changed)setMeetingAgenda(r1.items);
      if(r2.changed)setSpecialTasks(r2.items);
      // রুটিন রিসেট (নতুন দিন)
      setDailyRoutine(prev=>prev.map(t=>({...t,done:false})));
      setLastCarryDate(todayStr);
    }
  },[]);

  const toMin=(t)=>{const [h,m]=(t||"00:00").split(":").map(Number);return h*60+m;};
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  const isCurrentBlock=(start,end)=>{
    const s=toMin(start),e=toMin(end);
    if(e<s)return nowMin>=s||nowMin<e; // midnight cross (ঘুমের ব্লক)
    return nowMin>=s&&nowMin<e;
  };

  const toggleDone=(id)=>{
    setDailyRoutine(prev=>prev.map(t=>t.id===id?{...t,done:!t.done}:t));
  };

  const toggleSubtask=(blockId,subName)=>{
    setRoutineSubtasks(prev=>{
      const key=blockId;
      const list=prev[key]||[];
      const exists=list.includes(subName);
      return{...prev,[key]:exists?list.filter(s=>s!==subName):[...list,subName]};
    });
  };

  const addCustomSubtask=(blockId)=>{
    if(!newSubtask.trim())return;
    setDailyRoutine(prev=>prev.map(t=>t.id===blockId?{...t,subtasks:[...(t.subtasks||[]),newSubtask.trim()]}:t));
    setNewSubtask("");
  };

  // Push notification schedule
  const requestNotif=async()=>{
    if(!window.Notification){alert("আপনার ব্রাউজার notification সমর্থন করে না");return;}
    const perm=await Notification.requestPermission();
    setNotifPerm(perm);
    if(perm==="granted"){
      new Notification("HAIS — দৈনিক রুটিন নোটিফিকেশন সক্রিয়",{body:"প্রতিটি কাজের সময় হলে আপনি notification পাবেন"});
      dailyRoutine.forEach(block=>{
        if(block.done)return;
        const [h,m]=block.start.split(":").map(Number);
        const target=new Date();target.setHours(h,m,0,0);
        if(target<new Date())target.setDate(target.getDate()+1);
        const delay=target-new Date()-5*60*1000;
        if(delay>0&&delay<24*60*60*1000){
          setTimeout(()=>{
            if(Notification.permission==="granted"){
              new Notification(`⏰ ${block.start} — ${block.task}`,{body:"শুরু হতে ৫ মিনিট বাকি",tag:block.id});
            }
          },delay);
        }
      });
      // সকাল ৯টা ও রাত ৯টা summary notification schedule (এই session এর জন্য)
      scheduleDailySummaryNotif();
      alert("✅ Notification schedule সম্পন্ন!");
    }
  };

  const scheduleDailySummaryNotif=()=>{
    const scheduleAt=(h,m,label)=>{
      const target=new Date();target.setHours(h,m,0,0);
      if(target<new Date())target.setDate(target.getDate()+1);
      const delay=target-new Date();
      setTimeout(()=>{
        if(Notification.permission==="granted"){
          const pendingRoutine=dailyRoutine.filter(t=>!t.done).length;
          const pendingSpecial=specialTasks.filter(t=>t.status!=="done"&&t.text.trim()).length;
          new Notification(label,{body:`রুটিনের বাকি কাজ: ${pendingRoutine}টি, বিশেষ কাজ বাকি: ${pendingSpecial}টি`});
        }
      },delay);
    };
    scheduleAt(9,0,"☀️ সকালের সারসংক্ষেপ — আজকের বাকি কাজ");
    scheduleAt(21,0,"🌙 রাতের সারসংক্ষেপ — আগামীকালের কাজ");
  };

  const doneCount=dailyRoutine.filter(t=>t.done).length;
  const pct=dailyRoutine.length?Math.round(doneCount/dailyRoutine.length*100):0;

  return(
    <div style={{marginTop:16}}>
      <div style={{background:"linear-gradient(135deg,#1a1a2e,#16213e)",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{color:"#fff",fontWeight:800,fontSize:15}}>📋 ব্যক্তিগত দৈনিক রুটিন</div>
            <div style={{color:"rgba(255,255,255,0.6)",fontSize:11,marginTop:2}}>শুধুমাত্র একাডেমিক ইনচার্জের জন্য</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{color:"#f59e0b",fontWeight:800,fontSize:22}}>{pct}%</div>
            <div style={{color:"rgba(255,255,255,0.6)",fontSize:10}}>{doneCount}/{dailyRoutine.length} সম্পন্ন</div>
          </div>
        </div>
        <div style={{height:4,background:"rgba(255,255,255,0.15)",borderRadius:2,marginTop:8}}>
          <div style={{width:`${pct}%`,height:"100%",background:"#f59e0b",borderRadius:2,transition:"width 0.4s"}}/>
        </div>
      </div>

      {notifPerm!=="granted"?(
        <button onClick={requestNotif}
          style={{width:"100%",padding:"8px",borderRadius:8,border:"1px solid #f59e0b",background:"#fffbeb",color:"#d97706",cursor:"pointer",fontSize:12,fontWeight:700,marginBottom:10}}>
          🔔 Notification চালু করুন (প্রতিটি কাজের ৫ মিনিট আগে + দৈনিক সারসংক্ষেপ)
        </button>
      ):(
        <div style={{fontSize:11,color:"#22c55e",fontWeight:700,marginBottom:10,textAlign:"center"}}>🔔 Notification চালু আছে</div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {dailyRoutine.map(block=>{
          const current=isCurrentBlock(block.start,block.end);
          return(
            <div key={block.id}>
              <div onClick={()=>{
                  if(block.type==="meeting")setShowMeeting(true);
                  else if(block.type==="subtasks")setShowSubBlock(showSubBlock===block.id?null:block.id);
                }}
                style={{
                  background:block.done?"#f0fdf4":current?"#fffbeb":"#fff",
                  border:`1.5px solid ${block.done?"#22c55e40":current?"#f59e0b":"#e5e7eb"}`,
                  borderLeft:`4px solid ${block.done?"#22c55e":current?"#f59e0b":"#6366f1"}`,
                  borderRadius:9,padding:"9px 10px",cursor:block.type!=="simple"?"pointer":"default",
                  display:"flex",alignItems:"center",gap:8
                }}>
                {block.type==="simple"&&(
                  <input type="checkbox" checked={!!block.done} onClick={e=>e.stopPropagation()} onChange={()=>toggleDone(block.id)}
                    style={{width:17,height:17,cursor:"pointer",accentColor:"#22c55e",flexShrink:0}}/>
                )}
                {block.type!=="simple"&&<span style={{fontSize:14,flexShrink:0}}>{block.type==="meeting"?"👥":"📂"}</span>}
                <span style={{fontSize:11,fontWeight:700,color:current?"#d97706":"#888",flexShrink:0,minWidth:78}}>
                  {block.start}–{block.end}
                </span>
                {current&&<span style={{fontSize:9,background:"#f59e0b",color:"#fff",borderRadius:8,padding:"1px 6px",fontWeight:700,flexShrink:0}}>এখন</span>}
                <span style={{flex:1,fontSize:12,color:block.done?"#22c55e":"#1a1a2e",textDecoration:block.done?"line-through":"none",fontWeight:current?700:400}}>
                  {block.task}
                </span>
                {block.type!=="simple"&&<span style={{fontSize:11,color:"#888"}}>{showSubBlock===block.id?"▲":"▶"}</span>}
              </div>
              {/* সাব-টাস্ক ব্লক */}
              {block.type==="subtasks"&&showSubBlock===block.id&&(
                <div style={{background:"#fafafe",border:"1px solid #e5e7eb",borderRadius:9,padding:"8px 10px",marginTop:3,marginLeft:14}}>
                  {(block.subtasks||[]).map(sub=>{
                    const checked=(routineSubtasks[block.id]||[]).includes(sub);
                    const isAppTask=sub==="অ্যাপের বিভিন্ন কাজ";
                    const pendingTotal=appPendingLP+appPendingDL;
                    return(
                      <label key={sub} style={{display:"flex",alignItems:"center",gap:7,padding:"4px 0",cursor:"pointer"}}>
                        <input type="checkbox" checked={checked} onChange={()=>toggleSubtask(block.id,sub)}
                          style={{width:15,height:15,cursor:"pointer",accentColor:"#6366f1"}}/>
                        <span style={{fontSize:12,color:checked?"#22c55e":"#444",textDecoration:checked?"line-through":"none",flex:1}}>{sub}</span>
                        {isAppTask&&pendingTotal>0&&(
                          <span style={{fontSize:10,background:"#ef444422",color:"#ef4444",border:"1px solid #ef444455",borderRadius:10,padding:"1px 7px",fontWeight:700}}>
                            {pendingTotal} বাকি
                          </span>
                        )}
                      </label>
                    );
                  })}
                  {block.subtasks&&block.subtasks.includes("অ্যাপের বিভিন্ন কাজ")&&(appPendingLP>0||appPendingDL>0)&&(
                    <div style={{fontSize:11,color:"#888",marginTop:4,paddingLeft:22}}>
                      {appPendingLP>0&&<div>📋 লেসন প্ল্যান অনুমোদন বাকি: {appPendingLP}টি</div>}
                      {appPendingDL>0&&<div>⏰ Deadline জমা বাকি: {appPendingDL}টি</div>}
                    </div>
                  )}
                  <div style={{display:"flex",gap:6,marginTop:6}}>
                    <input type="text" value={newSubtask} onChange={e=>setNewSubtask(e.target.value)}
                      placeholder="নতুন কাজ যুক্ত করুন..."
                      style={{flex:1,padding:"4px 7px",border:"1px solid #ddd",borderRadius:6,fontSize:12}}/>
                    <button onClick={()=>addCustomSubtask(block.id)}
                      style={{padding:"4px 10px",borderRadius:6,border:"none",background:"#6366f1",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>＋</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {showMeeting&&<MeetingAgendaModal agenda={meetingAgenda} setAgenda={setMeetingAgenda} onClose={()=>setShowMeeting(false)}/>}
    </div>
  );
}

/* ══ EXAM SCHEDULE MODAL ══ */
function ExamScheduleModal({examSchedule,setExamSchedule,isAdmin,onClose}){
  const today=new Date().toISOString().slice(0,10);
  // এই সপ্তাহ নির্ধারণ
  const getWeekRange=()=>{
    const d=new Date();
    const day=d.getDay();
    const diff=d.getDate()-day+(day===0?-6:1);
    const mon=new Date(d.setDate(diff));
    const sat=new Date(mon);sat.setDate(mon.getDate()+5);
    return{start:mon.toISOString().slice(0,10),end:sat.toISOString().slice(0,10)};
  };
  const {start,end}=getWeekRange();
  const [filter,setFilter]=React.useState("week"); // "week" | "all"
  const displayed=filter==="week"
    ?examSchedule.filter(e=>e.date>=start&&e.date<=end)
    :examSchedule;
  const sorted=[...displayed].sort((a,b)=>a.date.localeCompare(b.date));

  const STATUS_CONFIG={
    pending:{label:"অপেক্ষমান",color:"#f59e0b",icon:"⏳"},
    taken:{label:"পরীক্ষা নিয়েছেন",color:"#22c55e",icon:"✅"},
    nottaken:{label:"পরীক্ষা নেননি",color:"#ef4444",icon:"❌"},
    excused:{label:"যৌক্তিক কারণ",color:"#6366f1",icon:"⚠️"},
  };

  const updateStatus=(id,status)=>{
    if(!isAdmin)return;
    setExamSchedule(prev=>prev.map(e=>e.id===id?{...e,status,updatedAt:new Date().toISOString()}:e));
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:700,overflowY:"auto",padding:"14px 10px"}}>
      <div style={{background:"#fff",borderRadius:16,maxWidth:640,margin:"0 auto",boxShadow:"0 8px 32px rgba(83,68,181,0.2)",overflow:"hidden"}}>
        {/* হেডার */}
        <div style={{background:"linear-gradient(135deg,#e67e22,#f39c12)",padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{color:"#fff",fontWeight:800,fontSize:15}}>📝 পরীক্ষার সময়সূচি</div>
            <div style={{color:"rgba(255,255,255,0.85)",fontSize:11,marginTop:2}}>Approved Lesson Plan থেকে সংগৃহীত</div>
          </div>
          <button onClick={onClose} style={{border:"none",background:"rgba(255,255,255,0.25)",color:"#fff",borderRadius:8,padding:"5px 11px",cursor:"pointer",fontWeight:700,fontSize:14}}>✕</button>
        </div>

        <div style={{padding:"14px 16px"}}>
          {/* ফিল্টার */}
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {["week","all"].map(f=>(
              <button key={f} onClick={()=>setFilter(f)}
                style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,
                  background:filter===f?"#e67e22":"#f5f5f5",color:filter===f?"#fff":"#555"}}>
                {f==="week"?"এই সপ্তাহ":"সব পরীক্ষা"}
              </button>
            ))}
            <span style={{marginLeft:"auto",fontSize:12,color:"#888",alignSelf:"center"}}>{sorted.length}টি পরীক্ষা</span>
          </div>

          {/* সারসংক্ষেপ ব্যাজ */}
          {(()=>{
            const counts={taken:0,nottaken:0,excused:0,pending:0};
            sorted.forEach(e=>{counts[e.status]=(counts[e.status]||0)+1;});
            return(
              <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
                {Object.entries(STATUS_CONFIG).map(([k,v])=>(
                  counts[k]>0&&<span key={k} style={{background:v.color+"22",color:v.color,border:`1px solid ${v.color}55`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>

          {/* তালিকা */}

                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:"#1a1a2e"}}>{exam.dayLabel}</div>
                    <div style={{fontSize:11,color:"#666",marginTop:2}}>
                      👤 {exam.teacher}
                      {exam.cls&&<span> • শ্রেণি {exam.cls}</span>}
                      {exam.subject&&<span> • {exam.subject}</span>}
                    </div>
                    {exam.examNote&&<div style={{fontSize:11,color:"#e67e22",marginTop:2}}>📝 {exam.examNote}</div>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{background:sc.color+"22",color:sc.color,border:`1px solid ${sc.color}55`,borderRadius:20,padding:"3px 8px",fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>
                      {sc.icon} {sc.label}
                    </span>

                {isAdmin&&(
                  <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                    {[["taken","✅ পরীক্ষা নিয়েছেন","#22c55e"],["nottaken","❌ পরীক্ষা নেননি","#ef4444"],["excused","⚠️ যৌক্তিক কারণ","#6366f1"]].map(([s,label,color])=>(
                      <button key={s} onClick={()=>updateStatus(exam.id,s)}
                        style={{padding:"4px 10px",borderRadius:8,border:`1px solid ${color}`,
                          background:exam.status===s?color:"transparent",
                          color:exam.status===s?"#fff":color,
                          cursor:"pointer",fontSize:11,fontWeight:700}}>
                        {label}
                      </button>

          {!isAdmin&&sorted.length>0&&(
            <div style={{background:"#f0eeff",borderRadius:8,padding:"8px 12px",fontSize:11,color:"#5344b5",marginTop:8}}>
              🔒 Status পরিবর্তন শুধুমাত্র একাডেমিক ইনচার্জ করতে পারবেন
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── আপেক্ষিক গ্রুপ-সমন্বয় (subject কাঠিন্য ও ক্লাস-আকার উভয়ের জন্য ব্যবহৃত) ──
   গণিত/ইংরেজির মতো তুলনামূলক কঠিন বিষয়ে নম্বর বাড়ানো বাংলার চেয়ে কঠিন — এবং ২৪ জনের
   ক্লাসে সবার গড় ভালো রাখা ১০ জনের ক্লাসের চেয়ে কঠিন (কম ছাত্র = বেশি ব্যক্তিগত মনোযোগ,
   বেশি ছাত্র = গড় নামিয়ে আনার প্রবণতা বেশি)। তাই "উন্নতি", "দুর্বল ছাত্র বোনাস" ও
   "ধারাবাহিকতা" — এই তিনটি ছাত্র-পারফরম্যান্স স্কোর কাঁচা নম্বরের বদলে প্রতিটি গ্রুপের
   (বিষয় অথবা শ্রেণি) স্কুল-জুড়ে গড়ের সাপেক্ষে (আপেক্ষিক) মাপা হয়। যে গ্রুপে স্কুল-গড় কম
   (কঠিন), সেখানে বোনাস-গুণক (factor>1), যে গ্রুপে গড় বেশি (তুলনামূলক সহজ), সেখানে
   ছাড়-গুণক (factor<1)। কোনো গ্রুপে এন্ট্রি সংখ্যা কম থাকলে (অবিশ্বস্ত নমুনা) shrinkage
   দিয়ে গুণক ১.০-এর কাছাকাছি টেনে আনা হয়। */
const clampFactor=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
function computeGroupFactors(allRes, groupKeyFn){
  const SHRINK_K=15; // এত এন্ট্রি থাকলে গ্রুপ-গড়ে পূর্ণ আস্থা
  const FACTOR_MIN=0.75, FACTOR_MAX=1.35; // চরম মান ঠেকাতে সীমা
  const groupStats={};
  const byGroupStudent={};
  const groupTeachers={}; // FIX #6: প্রতিটি গ্রুপে কতজন ভিন্ন শিক্ষক পড়ান তা ট্র্যাক করা
  allRes.filter(r=>!r.absent).forEach(r=>{
    const g=groupKeyFn(r);
    const key=`${g}__${r.name}__${r.subject}`;
    (byGroupStudent[key]=byGroupStudent[key]||[]).push(r);
    (groupTeachers[g]=groupTeachers[g]||new Set()).add(r.teacher);
  });
  Object.values(byGroupStudent).forEach(entries=>{
    const g=groupKeyFn(entries[0]);
    if(!groupStats[g])groupStats[g]={impSum:0,impCount:0,weakSum:0,consSum:0,consCount:0};
    const st=groupStats[g];
    if(entries.length>=2){
      const sorted=[...entries].sort((a,b)=>(a.examOrder||1)-(b.examOrder||1));
      const first=sorted[0].marks, last=sorted[sorted.length-1].marks;
      const imp=last-first;
      let base=0;
      if(imp>0){
        if(first<33) base=imp*2.5;
        else if(first<50) base=imp*2.0;
        else if(first<70) base=imp*1.2;
        else base=imp*0.5;
      }
      st.impSum+=Math.min(100,base); st.impCount++;
      if(first<40&&imp>10) st.weakSum+=25;
      else if(first<33&&imp>0) st.weakSum+=15;
      const avg=sorted.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/sorted.length;
      st.consSum+=Math.min(100,avg); st.consCount++;
    } else if(entries.length===1){
      const r0=entries[0];
      const pct=Math.round(r0.marks/(r0.fullMarks||100)*100);
      st.consSum+=Math.min(100,pct); st.consCount++;
    }
  });
  let anchorImpSum=0,anchorImpCnt=0,anchorWeakSum=0,anchorConsSum=0,anchorConsCnt=0;
  Object.values(groupStats).forEach(st=>{
    anchorImpSum+=st.impSum; anchorImpCnt+=st.impCount;
    anchorWeakSum+=st.weakSum; anchorConsSum+=st.consSum; anchorConsCnt+=st.consCount;
  });
  const anchorImp=anchorImpCnt?anchorImpSum/anchorImpCnt:0;
  const anchorWeak=anchorImpCnt?anchorWeakSum/anchorImpCnt:0;
  const anchorCons=anchorConsCnt?anchorConsSum/anchorConsCnt:0;
  return function groupFactor(g,type){
    const st=groupStats[g];
    if(!st)return 1;
    // ── FIX #6: self-referential normalization প্রতিরোধ ──
    // যদি একটা বিষয়/ক্লাসে মাত্র ১ জন শিক্ষক পড়ান, তাহলে সেই গ্রুপের "গড়" আসলে তার নিজেরই
    // পারফরম্যান্স। তখন factor হিসাব করলে শিক্ষক নিজের সাথে নিজেকে তুলনা করে ফ্যাক্টর পেয়ে যান —
    // যা "বিষয়টা কঠিন/সহজ" বনাম "এই শিক্ষক দুর্বল/ভালো" — এই দুটোকে আলাদা করতে পারে না। তাই অন্তত
    // ২ জন ভিন্ন শিক্ষক না থাকলে কোনো সমন্বয় (factor=1, অর্থাৎ নিরপেক্ষ) করা হবে না।
    const distinctTeachers=(groupTeachers[g]||new Set()).size;
    if(distinctTeachers<2)return 1;
    let cnt=0,anchor=0,gAvg=0;
    if(type==="imp"){cnt=st.impCount;anchor=anchorImp;gAvg=st.impCount?st.impSum/st.impCount:0;}
    else if(type==="weak"){cnt=st.impCount;anchor=anchorWeak;gAvg=st.impCount?st.weakSum/st.impCount:0;}
    else{cnt=st.consCount;anchor=anchorCons;gAvg=st.consCount?st.consSum/st.consCount:0;}
    let raw=1;
    if(gAvg>0.01) raw=clampFactor(anchor/gAvg,FACTOR_MIN,FACTOR_MAX);
    const conf=Math.min(1,cnt/SHRINK_K);
    return raw*conf+1*(1-conf);
  };
}
function computeSubjectFactors(allRes){ return computeGroupFactors(allRes, r=>r.subject); }
function computeClassFactors(allRes){ return computeGroupFactors(allRes, r=>r.cls); }

/* ══════════════════════════════════════════════════════════════
   ★★★ ছাত্র র‍্যাংকিং ইঞ্জিন — "শ্রেণি র‍্যাংক" + "স্কুল র‍্যাংক (SPI)" ★★★
   ══════════════════════════════════════════════════════════════
   মূলনীতি:
   ১. শ্রেণি র‍্যাংক (Class Rank) — raw % দিয়ে, কারণ একই শ্রেণির মধ্যে raw%
      তুলনা ন্যায্য (একই সিলেবাস, একই পরীক্ষা-কাঠামো)।
   ২. স্কুল র‍্যাংক (School Rank) — raw % দিয়ে কখনো না, কারণ Class IV আর Class X-এর
      পরীক্ষার কঠিনতা আলাদা। তার বদলে Standardized Performance Index (SPI) —
      প্রতিটি ছাত্রকে তার নিজের কোহোর্টের (শ্রেণি/বিভাগ) গড় ও স্ট্যান্ডার্ড ডেভিয়েশনের
      সাপেক্ষে z-score-এ রূপান্তর করে, তারপর সব কোহোর্টের z-score একসাথে র‍্যাংক করা হয়।
      এটাই standardized testing-এর মূলনীতি (যেমন বিভিন্ন সেট প্রশ্নের স্কোর তুলনা করার পদ্ধতি)।
   ৩. SSC (Class X) ছাত্রদের জন্য বিজ্ঞান/মানবিক/ব্যবসায় শিক্ষা — প্রতিটি আলাদা কোহোর্ট
      (নিজ বিভাগের মধ্যেই normalize, কারণ বিভাগভেদে বিষয় ও কঠিনতা ভিন্ন)। বিভাগ
      নির্ধারিত না থাকলে ছাত্রকে "অবিভাজিত" আলাদা cohort-এ রাখা হয় — কখনো অনুমান
      করে ভুল cohort-এ বসানো হয় না।
   ৪. Tie হলে যুগ্ম-র‍্যাংক (dense rank) — কাউকে arbitrary ভাবে ওপরে-নিচে বসানো হয় না।
   ৫. কম ডেটা থাকা ছাত্রের জন্য confidence স্কোর — UI-তে "⚠️ সীমিত ডেটা" দেখানোর জন্য।
   ══════════════════════════════════════════════════════════════ */
const RANK_SHRINK_K=4; // এই সংখ্যক পরীক্ষার ফলাফল থাকলে "পূর্ণ আস্থা" (confidence=100%) ধরা হবে

// SSC ছাত্রের বিভাগ-cohort key — বিভাগ না জানা থাকলে "অবিভাজিত" আলাদা cohort
function studentCohortKey(cls,name,studentDepartments={}){
  if(GROUP_CLASSES.includes(cls)){
    const dept=studentDepartments[name];
    return dept?`${cls}__${dept}`:`${cls}__অবিভাজিত`;
  }
  return cls;
}

// রেজাল্ট এন্ট্রি নির্দিষ্ট সময়সীমার (মাসিক/বাৎসরিক) মধ্যে পড়ে কিনা
function inRankPeriod(examDateStr,period,refDate){
  if(!examDateStr){
    return period==="yearly";
  }
  const d=new Date(examDateStr);
  if(isNaN(d.getTime()))return period==="yearly";
  if(period==="monthly")return d.getFullYear()===refDate.getFullYear()&&d.getMonth()===refDate.getMonth();
  return d.getFullYear()===refDate.getFullYear();
}

// dense/joint rank — সমান মান হলে একই র‍্যাংক পাবে
function denseRank(arr,key){
  const sorted=[...arr].sort((a,b)=>b[key]-a[key]);
  let rank=0,lastVal=null,seen=0;
  return sorted.map(s=>{
    seen++;
    if(lastVal===null||Math.abs(s[key]-lastVal)>1e-9){rank=seen;lastVal=s[key];}
    return{...s,_rank:rank,_total:arr.length};
  });
}

/**
 * প্রধান ফাংশন — নির্দিষ্ট সময়কালের (period) জন্য সব ছাত্রের Class Rank ও School Rank(SPI) গণনা করে।
 */
function computeStudentRankings(allRes,studentDepartments={},period="yearly",refDate=new Date()){
  const periodRes=allRes.filter(r=>!r.absent&&r.marks!=null&&inRankPeriod(r.examDate,period,refDate));
  const map={};
  periodRes.forEach(r=>{
    const key=r.name+"||"+r.cls;
    if(!map[key])map[key]={name:r.name,cls:r.cls,sum:0,count:0};
    map[key].sum+=r.marks/(r.fullMarks||100)*100;
    map[key].count++;
  });
  const students=Object.values(map).map(s=>({...s,avg:s.sum/s.count,cohort:studentCohortKey(s.cls,s.name,studentDepartments)}));
  if(!students.length)return{byKey:{},cohortStats:{},count:0};

  const cohortGroups={};
  students.forEach(s=>{(cohortGroups[s.cohort]=cohortGroups[s.cohort]||[]).push(s);});
  const cohortStats={};
  Object.entries(cohortGroups).forEach(([cohort,arr])=>{
    const n=arr.length;
    const mean=arr.reduce((a,b)=>a+b.avg,0)/n;
    const variance=n>1?arr.reduce((a,b)=>a+(b.avg-mean)**2,0)/(n-1):0;
    cohortStats[cohort]={n,mean,sd:Math.sqrt(variance)};
  });
  students.forEach(s=>{
    const cst=cohortStats[s.cohort];
    s.cohortN=cst.n;
    s.confidence=Math.min(1,s.count/RANK_SHRINK_K);
    s.spi=cst.sd>0.01?(s.avg-cst.mean)/cst.sd:0;
  });

  const clsGroups={};
  students.forEach(s=>{(clsGroups[s.cls]=clsGroups[s.cls]||[]).push(s);});
  const byKey={};
  Object.values(clsGroups).forEach(arr=>{
    denseRank(arr,"avg").forEach(s=>{
      byKey[s.name+"||"+s.cls]={...s,classRank:s._rank,classTotal:s._total};
    });
  });

  const schoolRanked=denseRank(Object.values(byKey),"spi");
  schoolRanked.forEach(s=>{
    const k=s.name+"||"+s.cls;
    byKey[k]={...byKey[k],schoolRank:s._rank,schoolTotal:s._total};
  });

  return{byKey,cohortStats,count:students.length};
}

/* KPI গণনা ফাংশন — কেন্দ্রীয় */
function calcKPI(teacher, allRes, lessonPlans, obsData={}, deadlines=[], dlSubmissions={}, examSchedule=[], teacherSubjects={}){
  const tr=allRes.filter(r=>r.teacher===teacher&&!r.absent);
  const subjFactor=computeSubjectFactors(allRes);
  const clsFactor=computeClassFactors(allRes);
  // নতুন v2 ফরম্যাট থেকে approved plan গণনা
  // weekly approved plans — নতুন সিস্টেম
  const weeklyApproved=(lessonPlans._v2||[]).filter(p=>p.teacher===teacher&&p.type==="weekly"&&p.status==="approved");
  // non-weekly approved plans (v2 পুরনো)
  const v2Plans=(lessonPlans._v2||[]).filter(p=>p.teacher===teacher&&p.type!=="weekly"&&p.status==="approved");
  // পুরনো ফরম্যাট (backward compat)
  const oldPlans=(lessonPlans[teacher]||[]);
  // weekly missed (submitted but not approved yet OR not submitted at all) — KPI penalty
  // এই সপ্তাহের উইন্ডো বন্ধ হওয়ার পরে না দিলে missed
  const weeklyMissed=(lessonPlans._weeklyMissed||{})[teacher]||0;
  const lp=weeklyApproved.length*2+v2Plans.length+oldPlans.length; // weekly approved = double credit
  // ── ওয়ার্কলোড (assignment সংখ্যা) — যার সাবজেক্ট বেশি, তার প্রতি সপ্তাহে জমা দেওয়ার প্ল্যানও বেশি,
  // তাই raw সংখ্যা দিয়ে বিচার করলে বেশি-সাবজেক্টের শিক্ষক অন্যায্যভাবে দ্রুত ক্যাপে পৌঁছে যান ──
  const assignmentCount=Math.max(1,(teacherSubjects[teacher]||[]).length);
  const obs=obsData[teacher]||{};
  // ── AIC (একাডেমিক ইনচার্জ) ব্যক্তিগত পর্যবেক্ষণ ──
  // শুধুমাত্র ADMIN_TEACHER (একাডেমিক ইনচার্জ) নিজে এই ডেটা দিতে/দেখতে পারেন। প্রতি ১০ দিনে
  // সর্বোচ্চ একবার এন্ট্রি হয়; সাম্প্রতিক ৩টি এন্ট্রি (~৩০ দিনের চক্র) নিয়ে গড় করা হয়।
  const aicList=obs.aicObservations||[];
  const sortedAic=[...aicList].sort((a,b)=>new Date(b.dateISO)-new Date(a.dateISO));
  const recentAic=sortedAic.slice(0,3);
  const hasAicData=recentAic.length>0;
  const aicScore=hasAicData?Math.round(recentAic.reduce((a,b)=>a+(b.score||0),0)/recentAic.length):0;

  // ডেডলাইন পেনাল্টি
  const {missed:dlMissed,total:dlTotal,rate:dlRate}=calcDeadlinePenalty(teacher,deadlines,dlSubmissions);
  const dlScore=dlTotal>0?dlRate:100; // ডেটা না থাকলে ১০০%

  // পরীক্ষা সময়সূচি KPI — না নিলে penalty, যৌক্তিক কারণে ছাড়
  const teacherExams=examSchedule.filter(e=>e.teacher===teacher);
  const examTaken=teacherExams.filter(e=>e.status==="taken").length;
  const examNotTaken=teacherExams.filter(e=>e.status==="nottaken").length;
  const examExcused=teacherExams.filter(e=>e.status==="excused").length;
  const examPending=teacherExams.filter(e=>e.status==="pending").length;
  // ── হার-ভিত্তিক (rate-based) বোনাস/পেনাল্টি ──
  // আগে ছিল প্রতি পরীক্ষায় সরাসরি +2/-3, যাতে যার পরীক্ষা কম নির্ধারিত (যেমন ৩টা) সে ১০০% নিয়েও
  // সর্বোচ্চ বোনাসে (+10) পৌঁছাতে পারতো না, কিন্তু যার ১০টা নির্ধারিত সে সহজেই পারতো — একই দায়িত্বশীলতা
  // দেখিয়েও অসম ফল। এখন সম্পন্ন/মিস হওয়ার হার (rate) দিয়ে হিসাব হয়, তাই ১০০% সম্পন্ন করলে (৩টা হোক
  // বা ১০টা) সবসময় একই সর্বোচ্চ বোনাস পাওয়া যায়।
  const totalScheduled=teacherExams.length;
  const examBonus=totalScheduled?Math.round((examTaken/totalScheduled)*10):0;   // সর্বোচ্চ +10 (হার-ভিত্তিক)
  const examPenalty=totalScheduled?Math.round((examNotTaken/totalScheduled)*15):0; // সর্বোচ্চ -15 (হার-ভিত্তিক)

  // ছাত্রভিত্তিক গ্রুপ করা
  const studentMap={};
  tr.forEach(r=>{
    const key=`${r.name}__${r.subject}`;
    if(!studentMap[key])studentMap[key]=[];
    studentMap[key].push(r);
  });

  let improvementScore=0, weakStudentBonus=0, consistencyScore=0, entryCount=0;

  Object.values(studentMap).forEach(entries=>{
    if(entries.length<2)return;
    const subject=entries[0].subject, cls=entries[0].cls;
    const impF=clampFactor(subjFactor(subject,"imp")*clsFactor(cls,"imp"),0.65,1.55);
    const weakF=clampFactor(subjFactor(subject,"weak")*clsFactor(cls,"weak"),0.65,1.55);
    const consF=clampFactor(subjFactor(subject,"cons")*clsFactor(cls,"cons"),0.65,1.55);
    const sorted=[...entries].sort((a,b)=>(a.examOrder||1)-(b.examOrder||1));
    const first=sorted[0].marks, last=sorted[sorted.length-1].marks;
    const imp=last-first;

    // উন্নতি স্কোর (দুর্বল ছাত্রে বেশি ক্রেডিট) — বিষয় ও ক্লাস-আকার অনুযায়ী সমন্বিত
    let baseImpScore=0;
    if(imp>0){
      if(first<33) baseImpScore=imp*2.5;
      else if(first<50) baseImpScore=imp*2.0;
      else if(first<70) baseImpScore=imp*1.2;
      else baseImpScore=imp*0.5;
    }
    improvementScore+=Math.min(100,baseImpScore*impF);

    // দুর্বল ছাত্র বোনাস — বিষয় ও ক্লাস-আকার অনুযায়ী সমন্বিত
    if(first<40 && imp>10) weakStudentBonus+=25*weakF;
    else if(first<33 && imp>0) weakStudentBonus+=15*weakF;

    // ধারাবাহিকতা স্কোর — বিষয় ও ক্লাস-আকার অনুযায়ী সমন্বিত
    const avg=sorted.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/sorted.length;
    consistencyScore+=Math.min(100,avg*consF);
    entryCount++;
  });

  // পর্যবেক্ষণ স্কোর
  const attList=obs.attendance||[];
  const presentDays=attList.filter(a=>a.status==="present").length;
  const lateCount=attList.filter(a=>a.status==="late").length;
  const leaveDays=attList.filter(a=>a.status==="leave").length; // ছুটি — KPI তে গণনা হবে না
  const totalDays=attList.length-leaveDays; // ছুটির দিন বাদ দিয়ে মোট কার্যদিবস
  const attScore=totalDays?Math.min(100,Math.round((presentDays+lateCount*0.5)/totalDays*100)):0;

  const insList=obs.inspections||[];
  const insScore=insList.length?Math.min(100,Math.round(insList.reduce((a,b)=>a+(b.score||0),0)/insList.length*10)):0;

  const sylList=obs.syllabus||[];
  const coveredTopics=sylList.filter(s=>s.covered).length;
  const totalTopics=sylList.length;
  const sylScore=totalTopics?Math.min(100,Math.round(coveredTopics/totalTopics*100)):0;

  const fbList=obs.feedback||[];
  const fbScore=fbList.length?Math.min(100,Math.round(fbList.reduce((a,b)=>a+(b.rating||0),0)/fbList.length*20)):0;

  const trainingList=obs.trainings||[];
  const trainingScore=Math.min(100,trainingList.length*20);

  const hasObsData=(attList.length+insList.length+sylList.length+fbList.length+trainingList.length)>0;
  const hasDlData=dlTotal>0;
  // ── FIX: obsAvg শুধু যেসব ক্যাটাগরিতে আসলে ডেটা আছে, শুধু সেগুলোর গড় হবে ──
  // আগে ৫টা ক্যাটাগরির গড় নেওয়া হতো, ডেটা-না-থাকা ক্যাটাগরিকে ০ ধরে — ফলে আংশিক পর্যবেক্ষণ
  // ডেটা থাকা শিক্ষক (যেমন শুধু সিলেবাস এন্ট্রি আছে) শাস্তি পেতেন, আর কোনো ডেটাই না-থাকা শিক্ষক
  // (যিনি এই ২৫% ওজন থেকে সম্পূর্ণ বাদ পড়তেন) তুলনামূলক লাভবান হতেন। এখন শুধু বিদ্যমান
  // ক্যাটাগরিগুলোর গড় নেওয়া হয়, তাই কম পর্যবেক্ষিত হওয়া আর সুবিধাজনক নয়।
  const obsComponents=[];
  if(attList.length>0)obsComponents.push(attScore);
  if(insList.length>0)obsComponents.push(insScore);
  if(sylList.length>0)obsComponents.push(sylScore);
  if(fbList.length>0)obsComponents.push(fbScore);
  if(trainingList.length>0)obsComponents.push(trainingScore);

  // ── পিয়ার ক্লাস পর্যবেক্ষণ (peerObservations) ──
  const peerObs=obsData.peerObservations||[];
  // এই শিক্ষক পর্যবেক্ষক হিসেবে — গত ৭ দিনে অন্তত ১টি পর্যবেক্ষণ করলে বোনাস, না করলে পেনাল্টি
  const sevenDaysAgo=Date.now()-7*86400000;
  const myObserverEntries=peerObs.filter(o=>o.observerTeacher===teacher);
  const observedThisWeek=myObserverEntries.some(o=>{
    const t=o.dateISO?new Date(o.dateISO).getTime():0;
    return t>=sevenDaysAgo;
  });
  const hasAnyPeerObsData=peerObs.length>0;
  // ── FIX #4: রোটেশন-নির্ভরতা ──
  // আগে peerObsParticipationScore নির্ভর করত hasAnyPeerObsData-এর উপর — স্কুলে যেকারো একটা
  // পর্যবেক্ষণ থাকলেই সবাই এই ±৫-এর আওতায় পড়ে যেতেন, এমনকি যার পর্যবেক্ষক হওয়ার পালাই ছিল না।
  // এখন এটা শুধু তাদের ক্ষেত্রে প্রযোজ্য যারা অতীতে অন্তত একবার পর্যবেক্ষক হিসেবে অংশ নিয়েছেন
  // (প্রমাণ করে তিনি এই রোটেশনের অংশ) — অন্য কারো করা পর্যবেক্ষণের ভিত্তিতে নয়।
  const hasEverObserved=myObserverEntries.length>0;
  const peerObsParticipationScore=hasEverObserved?(observedThisWeek?5:-5):0;

  // এই শিক্ষক পর্যবেক্ষিত হিসেবে — প্রাপ্ত সব পর্যবেক্ষণের গড় স্কোর ("ক্লাস মান")
  const myReceivedEntries=peerObs.filter(o=>o.observedTeacher===teacher);
  const rawClassQualityScore=myReceivedEntries.length?Math.round(myReceivedEntries.reduce((a,b)=>a+(b.totalScore||0),0)/myReceivedEntries.length):null;
  const hasClassQualityData=rawClassQualityScore!==null;
  // ── FIX: sample-size শ্রিংকেজ — avgImp/avgCons এর মতোই ──
  // আগে ১টা মাত্র পিয়ার-পর্যবেক্ষণও সরাসরি ১৫% ওজন পেত, যা এলোমেলো/একবারের রায়ের উপর
  // ভিত্তি করে র‍্যাংকিং বদলে দিতে পারত। এখন কম পর্যবেক্ষণ সংখ্যা থাকলে একটা নিরপেক্ষ
  // বেসলাইনের (৫৫) দিকে টানা হয় — যত বেশি পর্যবেক্ষণ, তত বেশি আস্থা।
  const CQ_SHRINK_K=5, CQ_NEUTRAL=55;
  const cqConf=hasClassQualityData?Math.min(1,myReceivedEntries.length/CQ_SHRINK_K):0;
  const classQualityScore=hasClassQualityData?Math.round(rawClassQualityScore*cqConf+CQ_NEUTRAL*(1-cqConf)):null;

  // একটিমাত্র এন্ট্রি থাকলেও consistency স্কোর হিসাব (improvement-এর জন্য ২টি লাগে)
  const singleEntries=Object.values(studentMap).filter(e=>e.length===1);
  let singleConsScore=0;
  singleEntries.forEach(entries=>{
    const r=entries[0];
    const consF=clampFactor(subjFactor(r.subject,"cons")*clsFactor(r.cls,"cons"),0.65,1.55);
    const pct=Math.round(r.marks/(r.fullMarks||100)*100);
    singleConsScore+=Math.min(100,pct*consF);
  });
  const totalEntryCount=entryCount+singleEntries.length;
  const totalConsScore=consistencyScore+singleConsScore;

  if(totalEntryCount===0&&lp===0&&!hasObsData&&!hasAnyPeerObsData&&!hasAicData)return{score:0,grade:"—",impScore:0,weakBonus:0,consScore:0,lpScore:0,attScore:0,insScore:0,sylScore:0,fbScore:0,trainingScore:0,dlScore:100,dlMissed:0,dlTotal:0,count:tr.length,lp,breakdown:[]};

  const avgImpRaw=entryCount?Math.min(100,Math.round(improvementScore/entryCount)):0;
  const avgWeakRaw=entryCount?Math.min(100,Math.round(weakStudentBonus/entryCount)):0;
  // consistency: পেয়ারড + সিঙ্গেল উভয় এন্ট্রির গড়
  const avgConsRaw=totalEntryCount?Math.min(100,Math.round(totalConsScore/totalEntryCount)):0;

  // ── স্যাম্পল-সাইজ শ্রিংকেজ ──
  // কম ছাত্র-এন্ট্রি (যেমন ১ জনের ক্লাস) থাকলে ফলাফল সম্পূর্ণ ঐ ১-২ জনের উপর নির্ভর করে, যেটা এলোমেলো
  // ওঠানামার ঝুঁকিতে থাকে। তাই কম এন্ট্রি থাকলে স্কোরকে আংশিকভাবে একটা নিরপেক্ষ বেসলাইনের দিকে টেনে আনা
  // হয় — যত বেশি এন্ট্রি, তত কম শ্রিংকেজ (আস্থা তত বেশি)। ফলে ১ জন বনাম ২৪ জনের ক্লাসের শিক্ষককে
  // একই মাত্রার নিশ্চয়তায় তুলনা করা হয় না।
  const SHRINK_K=5; // এই সংখ্যক এন্ট্রি থাকলে পূর্ণ আস্থা (কনফিডেন্স = ১০০%) ধরা হবে
  const NEUTRAL_IMP=40;   // উন্নতির নিরপেক্ষ বেসলাইন (প্রমাণ কম থাকলে "গড়পড়তা" ধরে নেওয়া হয়)
  const NEUTRAL_CONS=50;  // ধারাবাহিকতার নিরপেক্ষ বেসলাইন
  const impConf=Math.min(1,entryCount/SHRINK_K);
  const consConf=Math.min(1,totalEntryCount/SHRINK_K);
  const avgImp=entryCount?Math.round(avgImpRaw*impConf+NEUTRAL_IMP*(1-impConf)):0;
  const avgWeak=entryCount?Math.round(avgWeakRaw*impConf):0; // এটা বোনাস — প্রমাণ কম থাকলে বেসলাইন শূন্য (কোনো বোনাস না)
  const avgCons=totalEntryCount?Math.round(avgConsRaw*consConf+NEUTRAL_CONS*(1-consConf)):0;
  const lowSample=entryCount>0&&entryCount<SHRINK_K; // ভবিষ্যতে UI-তে "⚠️ কম ডেটা" ব্যাজ দেখাতে ব্যবহারযোগ্য
  // ── হার-ভিত্তিক lpScore: আগে lp*10 ছিল, যেখানে ১০টা সাবজেক্টের শিক্ষক প্রতি সপ্তাহে ১০টা প্ল্যান
  // জমা দিয়ে দ্রুত ১০০-তে ক্যাপ পৌঁছাতেন, কিন্তু ২টা সাবজেক্টের শিক্ষক একই "সততা" দেখিয়েও ৫গুণ বেশি
  // সময় লাগাতেন। এখন assignmentCount (কতগুলো শ্রেণি-বিষয় দায়িত্বে আছেন) দিয়ে টার্গেট নির্ধারণ হয়,
  // ফলে "৫ সপ্তাহ পূর্ণ, নিয়মিত জমা" — এই একই মানদণ্ডে সবাই ১০০ পাবেন, সাবজেক্ট সংখ্যা যাই হোক না কেন।
  const lpTarget=10*assignmentCount;
  const lpScore=Math.min(100,Math.round((lp/lpTarget)*100));

  // ── FIX: ডেডলাইন পেনাল্টি ডাবল-কাউন্ট হচ্ছিল ──
  // আগে dlScore একবার ওজনভিত্তিক গড়ে ১০% হিসেবে ঢুকত, তারপর আলাদাভাবে আরও সরাসরি
  // (100-dlScore)*0.15 পয়েন্ট কাটা হতো — মানে সম্পূর্ণ ডেডলাইন মিস করলে মোট ~২৫ পয়েন্ট ক্ষতি
  // হতো, যেখানে ওজন অনুযায়ী তার প্রাপ্য ছিল ১০ পয়েন্ট। এখন dlScore শুধু একবারই, তার নির্ধারিত
  // ১০% ওজনে, চূড়ান্ত স্কোরে প্রভাব ফেলে।

  // ওজনভিত্তিক চূড়ান্ত স্কোর (obs data যুক্ত হলে ওজন পুনর্বণ্টন)
  let rawScore;
  if(hasObsData){
    const obsAvg=obsComponents.length?Math.round(obsComponents.reduce((a,b)=>a+b,0)/obsComponents.length):0;
    rawScore=Math.min(100,Math.round(avgImp*0.28+avgWeak*0.18+avgCons*0.14+lpScore*0.05+obsAvg*0.25+dlScore*0.10));
  } else {
    rawScore=Math.min(100,Math.round(avgImp*0.38+avgWeak*0.28+avgCons*0.19+lpScore*0.05+dlScore*0.10));
  }
  const finalScoreBase=rawScore;

  // ক্লাস মান (peer observation গড় স্কোর) — ১৫% ওজনে যুক্ত হবে
  const finalScoreWithQuality=hasClassQualityData
    ?Math.round(finalScoreBase*0.85+classQualityScore*0.15)
    :finalScoreBase;

  // পরীক্ষা সময়সূচি bonus/penalty
  const examNetScore=Math.min(10,examBonus)-Math.min(15,examPenalty); // সর্বোচ্চ +10, সর্বনিম্ন -15

  // ── কর্মভার (workload) স্বীকৃতি বোনাস ──
  // এতদিন আমরা assignmentCount দিয়ে শুধু lpScore-কে "নিরপেক্ষ" করেছি, যাতে বেশি-সাবজেক্টের শিক্ষক
  // অন্যায্য সুবিধা না পান। কিন্তু বেশি ক্লাস/বিষয় সামলানো সত্যিকারের বাড়তি পরিশ্রম — সেটা উপেক্ষা করাও
  // ঠিক না। তাই স্কুলের গড় ওয়ার্কলোডের তুলনায় যিনি বেশি দায়িত্বে আছেন, তিনি একটা ছোট, আলাদা বোনাস
  // পাবেন — মূল যোগ্যতা-স্কোর (avgImp/avgCons ইত্যাদি) অপরিবর্তিত রেখে। ইচ্ছাকৃতভাবে ছোট রাখা হয়েছে
  // (সর্বোচ্চ +৬, সর্বনিম্ন ০ — নিচে ফিক্স #৫ দ্রষ্টব্য), যাতে "বেশি ক্লাস নিলেই ভালো শিক্ষক" — এই ভুল বার্তা না যায়; এটা স্বীকৃতি,
  // যোগ্যতার বিকল্প না।
  const allAssignmentCounts=TEACHERS.map(t=>(teacherSubjects[t]||[]).length).filter(c=>c>0);
  const avgAssignment=allAssignmentCounts.length?allAssignmentCounts.reduce((a,b)=>a+b,0)/allAssignmentCounts.length:assignmentCount;
  const workloadRatio=avgAssignment>0?assignmentCount/avgAssignment:1;
  // ── FIX #5: workloadBonus আর penalty দেবে না, শুধু bonus ──
  // সাবজেক্ট/ক্লাস কতগুলো বরাদ্দ হবে সেটা প্রশাসন ঠিক করে, শিক্ষক নিজে বেছে নেন না। তাই স্কুল-গড়ের
  // চেয়ে কম দায়িত্বে থাকা শিক্ষককে -৩ পয়েন্ট শাস্তি দেওয়াটা তার নিয়ন্ত্রণের বাইরের একটা বিষয়ের জন্য
  // পেনাল্টি — এটা অন্যায্য। বেশি দায়িত্ব পালনের জন্য বোনাস (+৬ পর্যন্ত) থাকবে, কিন্তু কম দায়িত্বের জন্য
  // আর কোনো নেতিবাচক প্রভাব পড়বে না (floor = ০)।
  const workloadBonus=Math.max(0,Math.min(6,Math.round((workloadRatio-1)*6)));

  // ── "পড়া করে আসেনি" রিপোর্ট বোনাস ──
  // শিক্ষক নিয়মিত হোমওয়ার্ক-না-করা রিপোর্ট দিলে ছোট বোনাস পাবেন (প্রতি রিপোর্টে +১, সর্বোচ্চ +৫)।
  // স্পষ্টভাবে সিদ্ধান্ত অনুযায়ী: রিপোর্ট না দিলে কোনো পেনাল্টি নেই — শুধু বোনাস মিস হবে।
  const homeworkReportCount=(obsData.homeworkIncidents||[]).filter(inc=>inc.teacher===teacher).length;
  const homeworkReportBonus=Math.min(5,homeworkReportCount);

  // পর্যবেক্ষণ অংশগ্রহণ বোনাস/পেনাল্টি (+5/-5) + পরীক্ষা নেওয়া বোনাস/পেনাল্টি + কর্মভার বোনাস + হোমওয়ার্ক-রিপোর্ট বোনাস
  const finalScore=Math.max(0,Math.min(100,finalScoreWithQuality+peerObsParticipationScore+examNetScore+workloadBonus+homeworkReportBonus));

  // ── AIC (একাডেমিক ইনচার্জ) পর্যবেক্ষণ — ৯০/১০ ব্লেন্ড ──
  // এই ডেটা গোপনীয় — শুধু ADMIN_TEACHER দেন ও দেখেন, তাই ইচ্ছাকৃতভাবে breakdown-এ যুক্ত করা হয়নি
  // (KPI পেজ অন্য অ্যাডমিনরাও দেখেন)। তবে চূড়ান্ত স্কোরে এর প্রভাব থাকবে, যেহেতু র‍্যাংকিং সবাই দেখেন।
  const finalScoreWithAic=hasAicData
    ?Math.max(0,Math.min(100,Math.round(finalScore*0.90+aicScore*0.10)))
    :finalScore;

  const grade=finalScoreWithAic>=85?"A+":finalScoreWithAic>=70?"A":finalScoreWithAic>=55?"B":finalScoreWithAic>=40?"C":finalScoreWithAic>0?"D":"—";

  const breakdown=[
    {label:"ছাত্র উন্নতি",value:avgImp,weight:hasObsData?28:38,color:C.gr},
    {label:"দুর্বল ছাত্র বোনাস",value:avgWeak,weight:hasObsData?18:28,color:C.co},
    {label:"ধারাবাহিকতা",value:avgCons,weight:hasObsData?14:19,color:C.te},
    {label:"পাঠ পরিকল্পনা",value:lpScore,weight:5,color:C.pu},
    {label:"ডেডলাইন পালন",value:dlScore,weight:10,color:dlScore>=90?C.gr:dlScore>=70?C.am:C.re},
  ];
  if(hasObsData){
    breakdown.push({label:"উপস্থিতি",value:attScore,weight:5,color:C.am});
    breakdown.push({label:"পরিদর্শন স্কোর",value:insScore,weight:5,color:C.pu});
    breakdown.push({label:"সিলেবাস কভারেজ",value:sylScore,weight:5,color:C.te});
    breakdown.push({label:"ছাত্র ফিডব্যাক",value:fbScore,weight:5,color:C.gr});
    breakdown.push({label:"প্রশিক্ষণ",value:trainingScore,weight:5,color:C.co});
  }
  if(hasClassQualityData){
    breakdown.push({label:"ক্লাস মান (পিয়ার পর্যবেক্ষণ)",value:classQualityScore,weight:15,color:classQualityScore>=70?C.gr:classQualityScore>=50?C.am:C.re});
  }
  if(hasEverObserved){
    breakdown.push({label:"পর্যবেক্ষণ অংশগ্রহণ",value:peerObsParticipationScore,weight:0,color:peerObsParticipationScore>0?C.gr:C.re,isBonus:true});
  }
  if(teacherExams.length>0){
    breakdown.push({label:"পরীক্ষা নেওয়া",value:examNetScore,weight:0,
      color:examNetScore>0?C.gr:examNetScore<0?C.re:C.mu,isBonus:true,
      sub:`নিয়েছেন:${examTaken} নেননি:${examNotTaken} ছাড়:${examExcused}`});
  }
  if(allAssignmentCounts.length>1){
    breakdown.push({label:"কর্মভার স্বীকৃতি",value:workloadBonus,weight:0,
      color:workloadBonus>0?C.gr:workloadBonus<0?C.re:C.mu,isBonus:true,
      sub:`${assignmentCount}টি দায়িত্ব (স্কুল গড়: ${avgAssignment.toFixed(1)}টি)`});
  }
  if(homeworkReportCount>0){
    breakdown.push({label:"পড়া-না-করা রিপোর্ট বোনাস",value:homeworkReportBonus,weight:0,
      color:C.gr,isBonus:true,
      sub:`${homeworkReportCount}টি রিপোর্ট জমা দিয়েছেন`});
  }

  return{score:finalScoreWithAic,grade,impScore:avgImp,weakBonus:avgWeak,consScore:avgCons,lpScore,
    attScore,insScore,sylScore,fbScore,trainingScore,dlScore,dlMissed,dlTotal,hasObsData,hasDlData,
    classQualityScore,hasClassQualityData,peerObsParticipationScore,hasAnyPeerObsData,hasEverObserved,observedThisWeek,
    examTaken,examNotTaken,examExcused,examPending,examNetScore,
    assignmentCount,avgAssignment,workloadBonus,
    homeworkReportCount,homeworkReportBonus,
    hasAicData,aicScore,preAicScore:finalScore,
    entryCount,totalEntryCount,lowSample,sampleConfidence:Math.round(Math.min(impConf,consConf)*100),
    count:tr.length,lp,breakdown};
}

/* টপ পারফর্মার — শ্রেণিভিত্তিক সেরা ৩ ছাত্র + ট্রেন্ড অ্যারো */
function TopStudentPerformers({STUDENTS,allRes}){
  const [selCls,setSelCls]=useState("all");
  const classes=Object.keys(STUDENTS);

  const rows=useMemo(()=>{
    const allStudents=Object.entries(STUDENTS).flatMap(([cls,names])=>names.map(n=>({name:n,cls})));
    return allStudents.map(({name,cls})=>{
      const sr=allRes.filter(r=>r.name===name&&!r.absent&&r.marks!=null);
      if(!sr.length)return null;
      const avg=Math.round(sr.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/sr.length);
      // ট্রেন্ড: সর্বশেষ পরীক্ষার নম্বর - প্রথম পরীক্ষার নম্বর (% হিসেবে)
      const sorted=[...sr].sort((a,b)=>(a.examOrder||1)-(b.examOrder||1));
      const first=Math.round(sorted[0].marks/(sorted[0].fullMarks||100)*100);
      const last=Math.round(sorted[sorted.length-1].marks/(sorted[sorted.length-1].fullMarks||100)*100);
      const trend=sorted.length>=2?last-first:null;
      const [grade,gc]=getGrade(avg,100,33);
      return{name,cls,avg,trend,grade,gc,count:sr.length};
    }).filter(Boolean);
  },[allRes,STUDENTS]);

  const filtered=selCls==="all"?rows:rows.filter(r=>r.cls===selCls);
  const top=filtered.sort((a,b)=>b.avg-a.avg).slice(0,5);

  if(!rows.length)return(<div style={{fontSize:12,color:C.mu,textAlign:"center",padding:12}}>এখনো কোনো ফলাফল নেই</div>);

  const trendIcon=(t)=>{
    if(t===null)return<span style={{fontSize:11,color:C.mu}}>—</span>;
    if(t>5)return<span style={{fontSize:12,fontWeight:700,color:C.gr}}>▲{t}</span>;
    if(t>0)return<span style={{fontSize:12,fontWeight:700,color:"#7bc47b"}}>↗{t}</span>;
    if(t===0)return<span style={{fontSize:12,color:C.mu}}>→</span>;
    if(t>-5)return<span style={{fontSize:12,fontWeight:700,color:C.co}}>↘{Math.abs(t)}</span>;
    return<span style={{fontSize:12,fontWeight:700,color:C.re}}>▼{Math.abs(t)}</span>;
  };

  return(<div>
    {/* শ্রেণি ফিল্টার */}
    <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
      <button onClick={()=>setSelCls("all")} style={{padding:"3px 10px",borderRadius:14,border:`1px solid ${selCls==="all"?C.pu:C.bd}`,background:selCls==="all"?C.puL:"transparent",color:selCls==="all"?C.pu:C.mu,cursor:"pointer",fontSize:11,fontWeight:selCls==="all"?700:400}}>সব</button>
      {classes.map(cls=>(
        <button key={cls} onClick={()=>setSelCls(cls)} style={{padding:"3px 10px",borderRadius:14,border:`1px solid ${selCls===cls?C.pu:C.bd}`,background:selCls===cls?C.puL:"transparent",color:selCls===cls?C.pu:C.mu,cursor:"pointer",fontSize:11,fontWeight:selCls===cls?700:400}}>{cls}</button>
      ))}
    </div>
    {/* তালিকা */}
    {top.length===0&&<div style={{fontSize:12,color:C.mu,textAlign:"center",padding:8}}>এই শ্রেণিতে ডেটা নেই</div>}
    {top.map((s,i)=>(
      <div key={s.name+s.cls} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 6px",borderBottom:`1px solid ${C.bd}`,borderRadius:i===0?8:0,background:i===0?"linear-gradient(90deg,#ede9fd55,transparent)":"transparent"}}>
        {/* র‍্যাংক */}
        <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,
          background:i===0?"#ffd700":i===1?"#e8e8e8":i===2?"#cd7f32":C.puL,
          color:i===0?"#7a5c00":i===1?"#666":i===2?"#7a3d00":C.pu,flexShrink:0}}>
          {i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}
        </div>
        {/* নাম ও শ্রেণি */}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
          <div style={{fontSize:10,color:C.mu}}>শ্রেণি {s.cls} • {s.count}টি পরীক্ষা</div>
        </div>
        {/* ট্রেন্ড অ্যারো */}
        <div style={{minWidth:32,textAlign:"center"}}>{trendIcon(s.trend)}</div>
        {/* গড় স্কোর */}
        <div style={{textAlign:"right",minWidth:40}}>
          <div style={{fontWeight:800,fontSize:14,color:s.gc}}>{s.avg}%</div>
          {badge(s.gc,s.grade)}
        </div>
      </div>
    ))}
  </div>);
}

/* স্কুলের সামগ্রিক পরীক্ষাভিত্তিক ট্রেন্ড প্যানেল — অ্যানালিটিক্যাল লাইন-এরিয়া চার্ট */
function SchoolTrendPanel({allRes}){
  const examOrder={"Chapter Final":1,"First Term":2,"Fortnightly Exam":2,"Second Term":3,"Half-Yearly Exam":3,"Third Term":4,"Annual Exam":4};

  const trendByExam=useMemo(()=>{
    const examMap={};
    allRes.filter(r=>!r.absent&&r.marks!=null).forEach(r=>{
      const key=r.examType||"অজানা";
      if(!examMap[key])examMap[key]={total:0,count:0,order:examOrder[key]||9};
      examMap[key].total+=Math.round(r.marks/(r.fullMarks||100)*100);
      examMap[key].count++;
    });
    return Object.entries(examMap)
      .map(([exam,{total,count,order}])=>({exam,avg:Math.round(total/count),count,order}))
      .sort((a,b)=>a.order-b.order);
  },[allRes]);

  if(trendByExam.length<2)return null;

  const vals=trendByExam.map(e=>e.avg);
  // ── ডেটা-চালিত স্কেল: আসল গড় নম্বর যেখানেই থাকুক (২০% হোক বা ৯৫%), চার্ট সবসময় সঠিক অনুপাতে আঁকা হবে ──
  const dataMin=Math.min(...vals), dataMax=Math.max(...vals);
  const mn=Math.max(0,dataMin-8), mx=Math.min(100,dataMax+8);
  const range=(mx-mn)||1;
  const avgAll=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);

  const first=trendByExam[0].avg;
  const last=trendByExam[trendByExam.length-1].avg;
  const overallTrend=last-first;
  const trendColor=overallTrend>0?C.gr:overallTrend<0?C.re:C.mu;
  const trendText=overallTrend>0?`▲ সামগ্রিক উন্নতি +${overallTrend}%`:overallTrend<0?`▼ সামগ্রিক হ্রাস ${overallTrend}%`:"→ স্থিতিশীল";

  // viewBox-ভিত্তিক SVG — width শুধু "100%", কোনো ফিক্সড পিক্সেল হাইট নেই, তাই কখনোই কার্ডের বাইরে উপচে পড়বে না
  const W=300,H=100,padTop=20,padBottom=10,padX=14;
  const n=trendByExam.length;
  const px=i=>n>1?padX+(i/(n-1))*(W-padX*2):W/2;
  const py=v=>padTop+(1-((v-mn)/range))*(H-padTop-padBottom);
  const pts=trendByExam.map((e,i)=>({...e,x:px(i),y:py(e.avg)}));
  const lineD=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const areaD=`${lineD} L${pts[n-1].x.toFixed(1)},${(H-padBottom).toFixed(1)} L${pts[0].x.toFixed(1)},${(H-padBottom).toFixed(1)} Z`;
  const avgY=py(avgAll);
  const gid="sttGrad_"+n+"_"+dataMax; // একাধিক প্যানেল থাকলেও গ্রেডিয়েন্ট আইডি সংঘর্ষ এড়াতে

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div style={{fontSize:11,color:C.mu}}>{trendByExam.length}টি পরীক্ষার তুলনামূলক বিশ্লেষণ</div>
      <div style={{fontSize:12,fontWeight:700,color:trendColor}}>{trendText}</div>
    </div>

    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={trendColor} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={trendColor} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      {/* গ্রিডলাইন (উপরে, মাঝে, নিচে) */}
      {[0,0.5,1].map((f,gi)=>(
        <line key={gi} x1={0} y1={padTop+f*(H-padTop-padBottom)} x2={W} y2={padTop+f*(H-padTop-padBottom)} stroke={C.bd} strokeWidth={0.7} strokeDasharray="3,3"/>
      ))}
      {/* গড় রেফারেন্স লাইন — সামগ্রিক গড়ের সাথে প্রতিটি পরীক্ষা তুলনা করার জন্য */}
      <line x1={0} y1={avgY} x2={W} y2={avgY} stroke={C.pu} strokeWidth={1} strokeDasharray="4,3" opacity={0.55}/>
      <text x={W} y={avgY-3} textAnchor="end" fontSize={7.5} fontWeight={700} fill={C.pu}>গড় {avgAll}%</text>
      {/* এরিয়া ফিল */}
      <path d={areaD} fill={`url(#${gid})`} stroke="none"/>
      {/* ট্রেন্ড লাইন */}
      <path d={lineD} fill="none" stroke={trendColor} strokeWidth={2.4} strokeLinejoin="round" strokeLinecap="round"/>
      {/* ডেটা পয়েন্ট + মান লেবেল */}
      {pts.map((p,i)=>{
        const prev=i>0?pts[i-1].avg:null;
        const dc=prev===null?C.pu:p.avg>prev?C.gr:p.avg<prev?C.re:C.am;
        const arrow=prev!==null&&p.avg!==prev?(p.avg>prev?" ↑":" ↓"):"";
        return(<g key={p.exam}>
          <circle cx={p.x} cy={p.y} r={3.4} fill="#fff" stroke={dc} strokeWidth={2.2}/>
          <text x={p.x} y={p.y-9} textAnchor="middle" fontSize={9} fontWeight={700} fill={dc}>{p.avg}%{arrow}</text>
        </g>);
      })}
    </svg>

    {/* এক্স-অ্যাক্সিস: পরীক্ষার নাম */}
    <div style={{display:"flex",gap:4,marginTop:2}}>
      {trendByExam.map(e=>(
        <div key={e.exam} style={{flex:1,fontSize:8,color:C.mu,textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={e.exam}>
          {e.exam.replace(" পত্র","").split(" ")[0]}
        </div>
      ))}
    </div>
    {/* অংশগ্রহণ সংখ্যা */}
    <div style={{display:"flex",gap:4,marginTop:2}}>
      {trendByExam.map(e=>(
        <div key={e.exam} style={{flex:1,fontSize:8,color:C.bd,textAlign:"center"}}>{e.count} জন</div>
      ))}
    </div>
  </div>);
}

function HealthGauge({value,color,label}){
  const size=140,stroke=14,r=(size-stroke)/2,cx=size/2,cy=size/2;
  const circ=2*Math.PI*r;
  const pct=Math.max(0,Math.min(100,value));
  const offset=circ-(pct/100)*circ;
  return(
    <div style={{position:"relative",width:size,height:size}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#eee" strokeWidth={stroke}/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={offset} style={{transition:"stroke-dashoffset 0.6s ease"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontSize:30,fontWeight:800,color}}>{value}</div>
        <div style={{fontSize:11,fontWeight:700,color,marginTop:-2}}>{label}</div>
      </div>
    </div>
  );
}
/* ── শিক্ষার্থীর পারফরমেন্স স্তর নির্ধারণ (সমস্ত বিষয়ের গড়ের উপর ভিত্তি করে) ──
   ভালো  : গড় ≥ 60%  (A- বা উপরে)
   মধ্যম  : গড় ≥ 40%  (B/C)
   দুর্বল : গড় < 40%  (D/F)                                                     */
const getStudentPerfLevel=(studentName,allRes)=>{
  const sr=allRes.filter(r=>r.name===studentName&&!r.absent&&r.marks!=null);
  if(!sr.length)return null;
  const avgPct=sr.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/sr.length;
  if(avgPct>=60)return"good";
  if(avgPct>=40)return"avg";
  return"weak";
};

function ClassHeatmap({STUDENTS,allRes}){
  const bands=[
    {key:"good",label:"ভালো (গড় ≥ ৬০%)",color:C.gr},
    {key:"avg", label:"মধ্যম (৪০–৫৯%)", color:C.am},
    {key:"weak",label:"দুর্বল (< ৪০%)",  color:C.re}
  ];

  const rows=Object.keys(STUDENTS).map(cls=>{
    const names=STUDENTS[cls]||[];
    let good=0,avgB=0,weak=0,noData=0;
    names.forEach(name=>{
      const lvl=getStudentPerfLevel(name,allRes);
      if(lvl==="good")good++;
      else if(lvl==="avg")avgB++;
      else if(lvl==="weak")weak++;
      else noData++;
    });
    const tot=good+avgB+weak; // ডেটা আছে এমন শিক্ষার্থী
    return{cls,tot,totalStudents:names.length,noData,counts:{good,avg:avgB,weak}};
  }).filter(r=>r.tot>0);

  if(rows.length===0)return null;

  return(<div>
    {/* লেজেন্ড */}
    <div style={{display:"flex",gap:10,marginBottom:10,fontSize:10,color:C.mu,flexWrap:"wrap"}}>
      {bands.map(b=>(<div key={b.key} style={{display:"flex",alignItems:"center",gap:4}}>
        <div style={{width:9,height:9,borderRadius:2,background:b.color}}/>{b.label}
      </div>))}
    </div>

    {/* শ্রেণিভিত্তিক সারি */}
    <div style={{display:"grid",gridTemplateColumns:"52px 1fr 60px",gap:"6px 8px",alignItems:"center",fontSize:11}}>
      {rows.map(({cls,tot,totalStudents,counts})=>(
        <React.Fragment key={cls}>
          {/* শ্রেণি লেবেল */}
          <div style={{fontWeight:700,color:C.tx}}>{cls}</div>

          {/* রঙিন বার */}
          <div style={{display:"flex",height:26,borderRadius:6,overflow:"hidden",border:`1px solid ${C.bd}`}}>
            {bands.map(b=>{
              const c=counts[b.key];
              if(!c)return null;
              const w=Math.round(c/tot*100);
              return(<div key={b.key}
                title={`${b.label}: ${c} জন`}
                style={{width:`${w}%`,background:b.color,display:"flex",alignItems:"center",
                  justifyContent:"center",color:"#fff",fontSize:10,fontWeight:700,
                  minWidth:c?18:0,transition:"width 0.4s"}}>
                {w>=12?c:""}
              </div>);
            })}
          </div>

          {/* সারসংখ্যা */}
          <div style={{fontSize:10,color:C.mu,textAlign:"right"}}>
            <span style={{color:C.gr,fontWeight:700}}>{counts.good}</span>
            <span style={{color:C.bd}}> / </span>
            <span style={{color:C.am,fontWeight:700}}>{counts.avg}</span>
            <span style={{color:C.bd}}> / </span>
            <span style={{color:C.re,fontWeight:700}}>{counts.weak}</span>
          </div>
        </React.Fragment>
      ))}
    </div>

    {/* ফুটার নোট */}
    <div style={{marginTop:8,fontSize:10,color:C.mu,textAlign:"center"}}>
      ভালো / মধ্যম / দুর্বল — শিক্ষার্থীর সমস্ত বিষয়ের গড় % এর উপর ভিত্তি করে
    </div>
  </div>);
}
function TeacherOverview({allRes,lessonPlans,obsData,deadlines,dlSubmissions,examSchedule=[],teacherSubjects={}}){
  const kpiAll=useMemo(()=>{
    const scored=TEACHERS.filter(teacher=>!ADMIN_TEACHERS.includes(teacher)).map(teacher=>({teacher,...calcKPI(teacher,allRes,lessonPlans,obsData,deadlines,dlSubmissions,examSchedule,teacherSubjects)}));
    const withScore=scored.filter(k=>k.score>0);
    const withoutScore=scored.filter(k=>k.score===0);
    // dense/joint rank — সমান স্কোর হলে একই র‍্যাংক (আগে raw index i+1 দিয়ে arbitrary rank দেওয়া হতো)
    return[...denseRank(withScore,"score").map(k=>({...k,rank:k._rank})),...withoutScore.map(k=>({...k,rank:null}))];
  },[allRes,lessonPlans,obsData,deadlines,dlSubmissions,examSchedule,teacherSubjects]);

  const activeCount=kpiAll.filter(k=>k.score>0).length;
  const avgScore=activeCount?Math.round(kpiAll.filter(k=>k.score>0).reduce((a,b)=>a+b.score,0)/activeCount):0;
  const top3=kpiAll.slice(0,3);
  const gradeColor=g=>g==="A+"?C.gr:g==="A"?C.te:g==="B"?C.am:g==="C"||g==="D"?C.co:C.mu;

  return(<div>
    {/* সারসংখ্যা হেডার */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{fontSize:12,color:C.mu}}>
        মোট {kpiAll.length} শিক্ষক
        <span style={{color:C.gr,fontWeight:700}}> · {activeCount} সক্রিয়</span>
        {kpiAll.length-activeCount>0&&<span style={{color:C.mu}}> · {kpiAll.length-activeCount} নিষ্ক্রিয়</span>}
      </div>
      <div style={{fontSize:20,fontWeight:800,color:avgScore>=70?C.gr:avgScore>=50?C.am:C.re}}>{avgScore}</div>
    </div>

    {/* শীর্ষ ৩ */}
    {top3.map((k,i)=>(
      <div key={k.teacher} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<top3.length-1?`1px solid ${C.bd}`:"none"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:24,height:24,borderRadius:"50%",background:k.rank===1?C.am+"22":C.teL,color:k.rank===1?C.am:C.te,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11}}>
            {k.rank===1?"🥇":k.rank===2?"🥈":k.rank===3?"🥉":(k.rank||"—")}
          </div>
          <div style={{fontSize:12,fontWeight:600}}>{k.teacher}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{fontWeight:700,fontSize:13,color:k.score>0?gradeColor(k.grade):C.mu}}>{k.score}</div>
          {k.score>0?badge(gradeColor(k.grade),k.grade):badge(C.mu,"—")}
        </div>
      </div>
    ))}

    {/* সম্পূর্ণ তালিকা — স্ক্রোলযোগ্য */}
    <div style={{marginTop:10,maxHeight:180,overflowY:"auto",borderTop:`1px solid ${C.bd}`,paddingTop:8}}>
      {kpiAll.map((k,i)=>(
        <div key={k.teacher} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",borderBottom:i<kpiAll.length-1?`1px solid ${C.bd}22`:"none"}}>
          {/* র‍্যাংক — dense/joint rank, সমান স্কোরে একই র‍্যাংক */}
          <div style={{width:18,fontSize:10,color:C.mu,textAlign:"right",flexShrink:0}}>{k.rank||"—"}</div>
          {/* নাম */}
          <div style={{flex:1,fontSize:11,color:k.score>0?C.tx:C.mu,fontWeight:k.score>0?600:400,
            whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
            {k.teacher}
          </div>
          {/* স্কোর বার */}
          <div style={{width:60,height:6,borderRadius:3,background:"#eee",flexShrink:0}}>
            <div style={{width:`${k.score}%`,height:"100%",borderRadius:3,
              background:k.score>=70?C.gr:k.score>=50?C.am:k.score>0?C.re:"#ddd",
              transition:"width 0.4s"}}/>
          </div>
          {/* স্কোর সংখ্যা */}
          <div style={{width:26,fontSize:11,fontWeight:700,textAlign:"right",flexShrink:0,
            color:k.score>0?gradeColor(k.grade):C.mu}}>
            {k.score||"০"}
          </div>
        </div>
      ))}
    </div>

    {/* গ্রেড বিতরণ বার */}
    <div style={{marginTop:8,height:8,borderRadius:4,background:"#eee",display:"flex",overflow:"hidden"}}>
      {["A+","A","B","C","D"].map(g=>{
        const c=kpiAll.filter(k=>k.grade===g).length;
        const w=Math.round(c/kpiAll.length*100);
        if(!w)return null;
        return <div key={g} title={`${g}: ${c}`} style={{width:`${w}%`,background:gradeColor(g)}}/>;
      })}
      {/* শূন্য স্কোরের অংশ */}
      {(()=>{const z=kpiAll.filter(k=>k.score===0).length;const w=Math.round(z/kpiAll.length*100);return w?<div title={`নিষ্ক্রিয়: ${z}`} style={{width:`${w}%`,background:"#ddd"}}/>:null;})()}

    <div style={{fontSize:10,color:C.mu,marginTop:4,textAlign:"center"}}>গ্রেড বিতরণ — ধূসর = কোনো কাজ নেই</div>
  </div>);
}

/* ══ GRADE BREAKDOWN MODAL ══ */
function GradeBreakdownModal({STUDENTS,allRes,onClose,studentProfiles,setStudentProfiles,currentUser,results}){
  // গ্রেড সংজ্ঞা: পার্সেন্টেজ অনুযায়ী
  const GRADE_BANDS=[
    {key:"A+", label:"A+", min:80, color:"#16a34a", bg:"#f0fdf4"},
    {key:"A",  label:"A",  min:70, color:"#0f6e56", bg:"#e1f5ee"},
    {key:"A-", label:"A−", min:60, color:"#0284c7", bg:"#e0f2fe"},
    {key:"B",  label:"B",  min:50, color:"#7c3aed", bg:"#f5f3ff"},
    {key:"C",  label:"C",  min:40, color:"#854f0b", bg:"#faeeda"},
    {key:"D",  label:"D",  min:33, color:"#c2410c", bg:"#fff7ed"},
    {key:"F",  label:"ফেল ঝুঁকি", min:0, color:"#a32d2d", bg:"#fef2f2"},
  ];

  const getGradeBand=(pct)=>{
    for(const b of GRADE_BANDS) if(pct>=b.min) return b.key;
    return "F";
  };

  // প্রতিটি ছাত্রের গড় পার্সেন্টেজ গণনা
  const studentAvgs={};
  Object.entries(STUDENTS).forEach(([cls,names])=>{
    names.forEach(name=>{
      const sr=allRes.filter(r=>r.name===name&&!r.absent&&r.marks!=null);
      if(sr.length){
        const avg=Math.round(sr.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/sr.length);
        studentAvgs[name]={avg,cls,grade:getGradeBand(avg)};
      }
    });
  });

  // শ্রেণিভিত্তিক গ্রেড breakdown
  const clsBreakdown=Object.keys(STUDENTS).map(cls=>{
    const names=STUDENTS[cls];
    const gradeGroups={};
    GRADE_BANDS.forEach(b=>{gradeGroups[b.key]=[];});
    names.forEach(name=>{
      const d=studentAvgs[name];
      if(d) gradeGroups[d.grade].push({name,avg:d.avg});
    });
    const total=names.length;
    const withData=Object.values(gradeGroups).flat().length;
    return{cls,gradeGroups,total,withData};
  });

  // state: কোন ছাত্র-তালিকা দেখা যাচ্ছে {cls, grade}
  const [drillDown,setDrillDown]=useState(null);
  const [profilePop,setProfilePop]=useState(null);

  const handleCountClick=(cls,grade,e)=>{
    e.stopPropagation();
    if(drillDown&&drillDown.cls===cls&&drillDown.grade===grade){
      setDrillDown(null);
    } else {
      setDrillDown({cls,grade});
    }
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"10px 8px",overflowY:"auto"}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:480,boxShadow:"0 12px 40px rgba(0,0,0,0.2)"}} onClick={e=>e.stopPropagation()}>

        {/* হেডার */}
        <div style={{background:"linear-gradient(135deg,#5344b5,#7c3aed)",padding:"14px 16px",borderRadius:"16px 16px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{color:"#fff",fontWeight:800,fontSize:15}}>📊 শ্রেণিভিত্তিক গ্রেড বিশ্লেষণ</div>
            <div style={{color:"rgba(255,255,255,0.7)",fontSize:11,marginTop:2}}>সংখ্যায় ক্লিক করুন → ছাত্রতালিকা দেখুন</div>
          </div>
          <button onClick={onClose} style={{border:"none",background:"rgba(255,255,255,0.2)",color:"#fff",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontWeight:700,fontSize:14}}>✕</button>
        </div>

        {/* গ্রেড লেজেন্ড */}
        <div style={{padding:"10px 14px",borderBottom:"1px solid #eee",display:"flex",gap:6,flexWrap:"wrap"}}>
          {GRADE_BANDS.map(b=>(
            <div key={b.key} style={{display:"flex",alignItems:"center",gap:3,fontSize:10}}>
              <div style={{width:10,height:10,borderRadius:3,background:b.color}}/>
              <span style={{color:b.color,fontWeight:700}}>{b.label}</span>
              <span style={{color:"#888"}}>{b.min===0?"(<33%)":b.key==="D"?"(33-39%)":b.key==="C"?"(40-49%)":b.key==="B"?"(50-59%)":b.key==="A-"?"(60-69%)":b.key==="A"?"(70-79%)":"(≥80%)"}</span>
            </div>
          ))}
        </div>

        {/* শ্রেণিভিত্তিক টেবিল */}
        <div style={{padding:"10px 14px",maxHeight:"65vh",overflowY:"auto"}}>
          {clsBreakdown.map(({cls,gradeGroups,total,withData})=>(
            <div key={cls} style={{marginBottom:14,borderRadius:10,border:"1px solid #e5e7eb",overflow:"hidden"}}>
              {/* শ্রেণি হেডার */}
              <div style={{background:"linear-gradient(90deg,#5344b510,#7c3aed08)",padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #e5e7eb"}}>
                <div style={{fontWeight:700,fontSize:13,color:"#5344b5"}}>শ্রেণি {cls}</div>
                <div style={{fontSize:11,color:"#6b6b8a"}}>
                  মোট {total} জন
                  {withData>0&&<span style={{color:"#5344b5",marginLeft:4}}>• ডেটা আছে {withData} জন</span>}
                  {withData===0&&<span style={{color:"#999",marginLeft:4,fontStyle:"italic"}}> • এখনো ফলাফল নেই</span>}
                </div>
              </div>

              {withData>0?(
                <div style={{padding:"8px 12px"}}>
                  {/* গ্রেড রো */}
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {GRADE_BANDS.map(b=>{
                      const students=gradeGroups[b.key]||[];
                      if(students.length===0)return null;
                      const isActive=drillDown&&drillDown.cls===cls&&drillDown.grade===b.key;
                      return(
                        <div key={b.key} style={{flex:"1 1 auto",minWidth:60}}>
                          <button
                            onClick={(e)=>handleCountClick(cls,b.key,e)}
                            style={{
                              width:"100%",padding:"8px 6px",
                              background:isActive?b.color:b.bg,
                              border:`2px solid ${b.color}40`,
                              borderRadius:9,cursor:"pointer",
                              transition:"all 0.15s",
                              boxShadow:isActive?`0 3px 10px ${b.color}40`:"none"
                            }}>
                            <div style={{fontSize:20,fontWeight:800,color:isActive?"#fff":b.color,lineHeight:1}}>{students.length}</div>
                            <div style={{fontSize:10,fontWeight:700,color:isActive?"rgba(255,255,255,0.9)":b.color,marginTop:2}}>{b.label}</div>
                          </button>
                        </div>
                      );
                    })}
                  </div>

                  {/* ড্রিল-ডাউন তালিকা */}
                  {drillDown&&drillDown.cls===cls&&(()=>{
                    const band=GRADE_BANDS.find(b=>b.key===drillDown.grade);
                    const students=(gradeGroups[drillDown.grade]||[]).sort((a,b2)=>b2.avg-a.avg);
                    if(!students.length)return null;
                    return(
                      <div style={{marginTop:10,padding:"10px",background:band.bg,borderRadius:10,border:`1px solid ${band.color}25`}}>
                        <div style={{fontWeight:700,fontSize:12,color:band.color,marginBottom:8}}>
                          {band.label} গ্রেড — {students.length} জন ছাত্র
                        </div>
                        {students.map((st,i)=>(
                          <div key={st.name}
                            onClick={()=>setProfilePop({name:st.name,cls})}
                            style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 8px",background:"rgba(255,255,255,0.85)",borderRadius:8,marginBottom:i<students.length-1?5:0,cursor:"pointer",border:`1px solid ${band.color}15`,transition:"background 0.1s"}}
                            onMouseEnter={e=>e.currentTarget.style.background="#fff"}
                            onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.85)"}>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{width:22,height:22,borderRadius:"50%",background:band.color,color:"#fff",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{i+1}</div>
                              <div style={{fontSize:12,fontWeight:600,color:"#1a1a2e"}}>{st.name}</div>
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <span style={{fontWeight:700,color:band.color,fontSize:13}}>{st.avg}%</span>
                              <span style={{fontSize:10,color:"#888"}}>👆</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    );
                  })()}

                  {/* মিনি বার চার্ট */}
                  <div style={{marginTop:8,display:"flex",gap:2,height:6,borderRadius:4,overflow:"hidden"}}>
                    {GRADE_BANDS.map(b=>{
                      const cnt=(gradeGroups[b.key]||[]).length;
                      if(!cnt)return null;
                      const w=withData?Math.round(cnt/withData*100):0;
                      return <div key={b.key} style={{width:`${w}%`,background:b.color,minWidth:cnt>0?3:0}} title={`${b.label}: ${cnt}`}/>;
                    })}
                  </div>
                </div>
              ):(
                <div style={{padding:"12px",textAlign:"center",color:"#999",fontSize:11}}>এখনো কোনো ফলাফল এন্ট্রি হয়নি</div>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* ছাত্র প্রোফাইল পপআপ */}
      {profilePop&&(
        <StudentProfile
          name={profilePop.name}
          cls={profilePop.cls}
          results={results}
          onClose={()=>setProfilePop(null)}
          studentProfiles={studentProfiles}
          setStudentProfiles={setStudentProfiles}
          currentUser={currentUser}
        />
      )}
    </div>
  );
}

// ── ঝুঁকিপূর্ণ ছাত্র সতর্কতা — ক্লিক করে সবার নাম দেখা/লুকানো যায় ──
function AtRiskStudentsCard({STUDENTS,allRes}){
  const [expanded,setExpanded]=useState(false);
  const allStudents=Object.entries(STUDENTS).flatMap(([cls,names])=>names.map(n=>({name:n,cls})));
  const atRisk=allStudents.map(({name,cls})=>{
    const sr=allRes.filter(r=>r.name===name);
    if(sr.length===0)return null;
    const srP=sr.filter(r=>!r.absent);
    const toPct=r=>Math.round(r.marks/(r.fullMarks||100)*100);
    const failCount=srP.filter(r=>toPct(r)<(r.passMarks||33)).length;
    const lowCount=srP.filter(r=>toPct(r)<40).length;
    const sorted=[...srP].sort((a,b)=>(a.examOrder||1)-(b.examOrder||1));
    const dropping=sorted.length>=2&&toPct(sorted[sorted.length-1])<toPct(sorted[0])-10;
    const avg=srP.length?Math.round(srP.reduce((a,b)=>a+toPct(b),0)/srP.length):0;
    if(failCount>=2||lowCount>=3||dropping) return{name,cls,failCount,avg,dropping,reason:failCount>=2?"বহু বিষয়ে ফেল":dropping?"নম্বর কমছে":"ধারাবাহিক দুর্বল"};
    return null;
  }).filter(Boolean);

  if(atRisk.length===0)return null;
  const shown=expanded?atRisk:atRisk.slice(0,5);
  return(
    <Card style={{border:`1px solid ${C.re}40`,background:"#fff"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <span style={{fontSize:18}}>⚠️</span>

        </div>
      </div>
      {shown.map(({name,cls,avg,reason},i)=>(

            <div style={{fontSize:12,fontWeight:600}}>{name}</div>
            <div style={{fontSize:11,color:C.mu}}>শ্রেণি {cls} • {reason}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontWeight:700,color:C.re,fontSize:13}}>{avg}%</div>
            {badge(C.re,"At Risk")}
          </div>
        </div>
      ))}
      {atRisk.length>5&&(
        <div onClick={()=>setExpanded(e=>!e)}
          style={{fontSize:11,color:C.re,marginTop:8,textAlign:"center",cursor:"pointer",fontWeight:700,padding:"6px 0",borderTop:`1px dashed ${C.re}30`}}>
          {expanded?"▲ সংক্ষিপ্ত করুন":`▼ আরও ${atRisk.length-5} জন ছাত্র দেখুন`}
        </div>
      )}
    </Card>
  );
}

function LowAvgStudentsCard({STUDENTS,allRes}){
  const [expanded,setExpanded]=useState(false);
  const allStudents=Object.entries(STUDENTS).flatMap(([cls,names])=>names.map(n=>({name:n,cls})));
  const lowAvg=allStudents.map(({name,cls})=>{
    const sr=allRes.filter(r=>r.name===name&&!r.absent&&r.marks!=null);
    if(!sr.length)return null;
    const avg=Math.round(sr.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/sr.length);
    if(avg<40)return{name,cls,avg};
    return null;
  }).filter(Boolean).sort((a,b)=>a.avg-b.avg);
  if(!lowAvg.length)return null;
  const shown=expanded?lowAvg:lowAvg.slice(0,8);
  return(
    <Card style={{border:`1px solid ${C.am}40`,background:"#fffdf0"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <span style={{fontSize:18}}>🔔</span>
        <div>
          <div style={{fontWeight:700,color:C.am,fontSize:13}}>মনোযোগ প্রয়োজন</div>
          <div style={{fontSize:11,color:C.mu}}>{lowAvg.length} জন ছাত্রের গড় নম্বর ৪০-এর নিচে</div>
        </div>
      </div>
      {shown.map(({name,cls,avg},i)=>(
        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${C.bd}`}}>
          <div>
            <div style={{fontSize:12,fontWeight:600}}>{name}</div>
            <div style={{fontSize:10,color:C.mu}}>শ্রেণি {cls}</div>
          </div>
          <div style={{fontWeight:700,color:avg<30?C.re:C.am,fontSize:13}}>{avg}%</div>
        </div>
      ))}
      {lowAvg.length>8&&(
        <div onClick={()=>setExpanded(e=>!e)}
          style={{fontSize:11,color:C.am,marginTop:8,textAlign:"center",cursor:"pointer",fontWeight:700,padding:"6px 0",borderTop:`1px dashed ${C.am}30`}}>
          {expanded?"▲ সংক্ষিপ্ত করুন":`▼ আরও ${lowAvg.length-8} জন দেখুন`}
        </div>
      )}
    </Card>
  );
}

function Dashboard({results,lessonPlans,onExport,STUDENTS,obsData={},deadlines=[],dlSubmissions={},lastExportTs=null,studentProfiles={},setStudentProfiles,studentDepartments={},currentUser="",examSchedule=[],setExamSchedule=()=>{},isAdmin=false,teacherSubjects={},
  dailyRoutine=[],setDailyRoutine=()=>{},meetingAgenda=[],setMeetingAgenda=()=>{},specialTasks=[],setSpecialTasks=()=>{},routineSubtasks={},setRoutineSubtasks=()=>{},lastCarryDate=null,setLastCarryDate=()=>{}}){STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const [dashProfile,setDashProfile]=useState(null);// {type:"teacher"|"student", name, cls}

  // এই সপ্তাহের পরীক্ষা গণনা
  const todayStr=new Date().toISOString().slice(0,10);
  const getThisWeekRange=()=>{const d=new Date();const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);const mon=new Date(d.setDate(diff));const sat=new Date(mon);sat.setDate(mon.getDate()+5);return{s:mon.toISOString().slice(0,10),e:sat.toISOString().slice(0,10)};};
  const {s:ws,e:we}=getThisWeekRange();

  const allRes=Object.values(results).flat();
  // গড় সবসময় % এ — fullMarks যাই হোক তুলনামূলক সঠিক থাকে
  const validRes=allRes.filter(r=>!r.absent&&r.marks!=null);
  const examCount=(()=>{const keys=new Set(validRes.map(r=>`${r.cls}|${r.subject}|${r.examType}|${r.examName||""}`));return keys.size;})();
  const avg=(()=>{if(!validRes.length)return 0;return Math.round(validRes.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/validRes.length);})();
  const lp=(lessonPlans._v2||[]).length + Object.entries(lessonPlans).filter(([k])=>k!=='_v2').reduce((a,[,v])=>a+(Array.isArray(v)?v.length:0),0);
  const total=Object.values(STUDENTS).flat().length;
  const pass=allRes.filter(r=>!r.absent&&r.marks>=(r.passMarks||33)).length;
  const clsData=Object.keys(STUDENTS).map(cls=>({label:cls,value:STUDENTS[cls].length,color:C.pu}));

  // শেষ ব্যাকআপের পর কতদিন পার হয়েছে তা যাচাই (App থেকে prop আসে)
  let daysSinceBackup=null;
  if(lastExportTs)daysSinceBackup=Math.floor((Date.now()-new Date(lastExportTs).getTime())/86400000);
  const needsBackup=(allRes.length>0||lp>0)&&(daysSinceBackup===null||daysSinceBackup>=7);

  // সামগ্রিক স্কুল হেলথ স্কোর (পাস রেট + গড় নম্বরের সমন্বয়)
  const passRatePct=validRes.length?Math.round(pass/validRes.length*100):0;
  const avgPct=avg; // avg এখন % এ, সরাসরি ব্যবহার
  const healthScore=validRes.length?Math.round(passRatePct*0.6+avgPct*0.4):0;
  const healthColor=healthScore>=75?C.gr:healthScore>=50?C.am:C.re;

  // ── চলতি মাস নির্ধারণ ──

    {(()=>{

      const last7=allSkips.filter(s=>{

          ):(
            <div style={{fontSize:11,color:C.gr,fontWeight:600,marginBottom:10,padding:"6px 10px",background:"#f0fdf4",borderRadius:8,border:`1px solid ${C.gr}30`}}>
