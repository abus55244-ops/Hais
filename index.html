</script>
<script>
/* ═══ HAIS PWA Manager v7.0 ═══ */
const HAIS_VERSION=window.__HAIS_APP_VERSION||'8.4';
let haisDeferredPrompt=null;

/* ── Service Worker নিবন্ধন (প্রম্পট-ভিত্তিক আপডেট) ──
   ★ ফিক্স (C4): আগে নতুন ভার্সন পাওয়া মাত্র জোর করে reload হতো — শিক্ষক নম্বর
   টাইপ করার মাঝপথে থাকলে অসম্পূর্ণ এন্ট্রি হারাত। এখন "আপডেট করুন" বাটন
   দেখানো হয়; ব্যবহারকারী চাপলে তবেই নতুন ভার্সন চালু ও reload হয়। */
let haisReloading=false;
let haisUpdateRequested=false;

function haisShowUpdateBanner(onUpdate){
  if(document.getElementById('hais-update-banner'))return;
  const t=document.createElement('div');
  t.id='hais-update-banner';
  t.style.cssText='position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 16px;border-radius:14px;z-index:99999;display:flex;gap:12px;align-items:center;font-size:13px;font-family:sans-serif;box-shadow:0 8px 28px rgba(0,0,0,.35);max-width:92%';
  const s=document.createElement('span');
  s.textContent='🆕 নতুন ভার্সন প্রস্তুত';
  const b=document.createElement('button');
  b.textContent='আপডেট করুন';
  b.style.cssText='border:none;background:#5344b5;color:#fff;padding:8px 14px;border-radius:9px;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap';
  b.onclick=function(){t.remove();onUpdate();};
  const x=document.createElement('button');
  x.textContent='পরে';
  x.style.cssText='border:1px solid #444;background:transparent;color:#aaa;padding:8px 10px;border-radius:9px;font-size:12px;cursor:pointer';
  x.onclick=function(){t.remove();};
  t.appendChild(s);t.appendChild(b);t.appendChild(x);
  document.body.appendChild(t);
}

function haisPromptUpdate(reg){
  const w=reg.waiting;
  if(!w)return;
  haisShowUpdateBanner(function(){
    haisUpdateRequested=true;
    w.postMessage({type:'SKIP_WAITING'});
    /* fallback: controllerchange কোনো কারণে না এলে ২ সেকেন্ড পর reload */
    setTimeout(function(){if(!haisReloading){haisReloading=true;location.reload();}},2000);
  });
}

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js',{scope:'./'})
      .then(function(reg){
        console.log('[HAIS] SW registered ✓ scope:',reg.scope);
        /* পেজ খোলার সময়েই কোনো আপডেট অপেক্ষায় থাকলে বাটন দেখাও */
        if(reg.waiting&&navigator.serviceWorker.controller)haisPromptUpdate(reg);
        /* নতুন ভার্সন পাওয়া গেলে */
        reg.addEventListener('updatefound',function(){
          const nw=reg.installing;
          if(!nw)return;
          nw.addEventListener('statechange',function(){
            if(nw.state==='installed'&&navigator.serviceWorker.controller){
              console.log('[HAIS] নতুন ভার্সন প্রস্তুত — ব্যবহারকারীর অনুমতির অপেক্ষায়');
              haisPromptUpdate(reg);
            }
          });
        });
        /* নতুন SW এক্টিভ হলে: ব্যবহারকারী নিজে আপডেট চাইলে reload;
           অন্য কোনোভাবে বদলালে (যেমন অন্য ট্যাব থেকে) জোর-reload নয়, বাটন দেখাও */
        navigator.serviceWorker.addEventListener('controllerchange',function(){
          if(haisReloading)return;
          if(haisUpdateRequested){
            haisReloading=true;
            location.reload();
          }else{
            haisShowUpdateBanner(function(){haisReloading=true;location.reload();});
          }
        });
        /* অ্যাপ চালুর সময় এবং প্রতি ঘণ্টায় একবার আপডেট চেক (আগে ৩০ সেকেন্ডে ছিল —
           অপ্রয়োজনীয় ব্যাটারি/নেটওয়ার্ক খরচ) */
        reg.update();
        setInterval(function(){reg.update();},60*60*1000);
      })
      .catch(function(err){console.warn('[HAIS] SW registration failed:',err);});
  });
  /* ব্যবহারকারী অ্যাপে ফিরে এলে (ট্যাব ফোকাস/হোমস্ক্রিন থেকে ওপেন) সাথে সাথেও চেক করো */
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='visible'){
      navigator.serviceWorker.getRegistration().then(function(reg){if(reg)reg.update();});
    }
  });
}

/* ── Install Prompt ধরে রাখো ── */
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  haisDeferredPrompt=e;
  console.log('[HAIS] Install prompt ready');
  /* ৩ সেকেন্ড পর install banner দেখাও */
  setTimeout(showInstallBanner,3000);
});

/* ── ইন্সটল সফল হলে ── */
window.addEventListener('appinstalled',function(){
  console.log('[HAIS] App installed successfully ✓');
  haisDeferredPrompt=null;
  const b=document.getElementById('hais-install-banner');
  if(b)b.remove();
  showToast('✅ HAIS সফলভাবে ইন্সটল হয়েছে!',3500);
});

/* ── Install Banner (Android/Desktop Chrome) ── */
function showInstallBanner(){
  /* স্বতন্ত্র মোডে চলছে মানে ইতিমধ্যে ইন্সটল আছে */
  if(window.matchMedia('(display-mode: standalone)').matches)return;
  if(document.getElementById('hais-install-banner'))return;
  if(!haisDeferredPrompt)return;

  const b=document.createElement('div');
  b.id='hais-install-banner';
  b.style.cssText=[
    'position:fixed','bottom:20px','left:50%','transform:translateX(-50%)',
    'background:#fff','border-radius:16px','box-shadow:0 6px 28px rgba(83,68,181,0.28)',
    'padding:14px 16px','z-index:9999','display:flex','align-items:center',
    'gap:12px','font-family:sans-serif','max-width:340px','width:92%',
    'border:1.5px solid #5344b520','animation:slideUp 0.4s ease'
  ].join(';');

  b.innerHTML=`
    <div style="width:44px;height:44px;border-radius:12px;background:#5344b5;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5L7.5 12H11V7h2v5h3.5L12 16.5z" fill="#fff"/></svg>
    </div>
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:2px">HAIS অ্যাপ ইন্সটল করুন</div>
      <div style="font-size:11px;color:#6b6b8a;line-height:1.4">অফলাইনে কাজ করবে • হোমস্ক্রিনে থাকবে</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">
      <button id="hais-install-btn" style="padding:7px 13px;border-radius:9px;border:none;background:#5344b5;color:#fff;cursor:pointer;font-weight:700;font-size:12px;white-space:nowrap">ইন্সটল</button>
      <button id="hais-install-close" style="padding:4px 13px;border-radius:9px;border:1px solid #ddd;background:transparent;color:#6b6b8a;cursor:pointer;font-size:11px">পরে</button>
    </div>`;

  /* keyframe যোগ করো */
  if(!document.getElementById('hais-anim-style')){
    const s=document.createElement('style');
    s.id='hais-anim-style';
    s.textContent='@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
    document.head.appendChild(s);
  }

  document.body.appendChild(b);

  document.getElementById('hais-install-btn').addEventListener('click',function(){
    b.remove();
    if(haisDeferredPrompt){
      haisDeferredPrompt.prompt();
      haisDeferredPrompt.userChoice.then(function(r){
        console.log('[HAIS] Install choice:',r.outcome);
        haisDeferredPrompt=null;
      });
    }
  });
  document.getElementById('hais-install-close').addEventListener('click',function(){
    b.remove();
  });

  /* ৩০ সেকেন্ড পর আপনা আপনি সরে যাক */
  setTimeout(function(){if(b.parentNode)b.remove();},30000);
}

/* ── iOS Safari ইন্সটল গাইড ── */
function showIOSGuide(){
  if(!window.navigator.standalone&&/iphone|ipad|ipod/i.test(navigator.userAgent)){
    /* প্রথমবার দেখালে পরে আর না */
    if(sessionStorage.getItem('hais-ios-shown'))return;
    sessionStorage.setItem('hais-ios-shown','1');
    setTimeout(function(){
      const g=document.createElement('div');
      g.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ddd;border-radius:16px 16px 0 0;padding:20px 16px 32px;z-index:9999;font-family:sans-serif;box-shadow:0 -4px 20px rgba(0,0,0,0.15)';
      g.innerHTML=`
        <div style="text-align:center;margin-bottom:14px">
          <div style="font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:6px">📱 HAIS হোমস্ক্রিনে যোগ করুন</div>
          <div style="font-size:12px;color:#6b6b8a;line-height:1.6">
            নিচে <b>Share বাটন</b> (⬆) চাপুন<br>তারপর <b>"Add to Home Screen"</b> নির্বাচন করুন
          </div>
        </div>
        <div style="display:flex;justify-content:center;gap:20px;margin-bottom:14px;font-size:12px;color:#5344b5;font-weight:600">
          <span>① Share ⬆</span><span>→</span><span>② Add to Home Screen</span><span>→</span><span>③ Add</span>
        </div>
        <button onclick="this.parentNode.remove()" style="display:block;width:100%;padding:10px;border-radius:10px;border:none;background:#5344b5;color:#fff;font-weight:700;font-size:14px;cursor:pointer">বুঝেছি!</button>`;
      document.body.appendChild(g);
      setTimeout(function(){if(g.parentNode)g.remove();},15000);
    },4000);
  }
}

/* ── Toast বার্তা ── */
function showToast(msg,ms){
  ms=ms||2500;
  const t=document.createElement('div');
  t.style.cssText='position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:10px;z-index:9999;font-family:sans-serif;font-size:13px;pointer-events:none;opacity:0;transition:opacity 0.3s';
  t.textContent=msg;
  document.body.appendChild(t);
  requestAnimationFrame(function(){t.style.opacity='1';});
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove();},300);},ms);
}

/* ── iOS গাইড চালাও ── */
window.addEventListener('load',showIOSGuide);

/* ── অনলাইন/অফলাইন নোটিফিকেশন ── */
window.addEventListener('online',function(){showToast('✅ ইন্টারনেট সংযোগ পুনরুদ্ধার',2000);});
window.addEventListener('offline',function(){showToast('⚠️ অফলাইন মোড — ডেটা সেভ হবে পরে',3000);});
</script>
</body>
</html>
