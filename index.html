/* ══ EXAM ENTRY ══ */
function ExamEntry({results,setResults,currentUser="",isAdmin=true,isRep=false,teacherSubjects={},STUDENTS,studentProfiles={},setStudentProfiles=()=>{},studentDepartments={}}){STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const canSelectTeacher=isAdmin||isRep; // Admin বা Rep উভয়েই যেকোনো শিক্ষক select করতে পারবেন
  const [cls,setCls]=useState("VI");
  const [sub,setSub]=useState((SUBJECTS_BY_CLASS["VI"]||SUBJECTS)[0]);
  const [ex,setEx]=useState("Half-Yearly Exam");
  const [examName,setExamName]=useState("");
  const [examDate,setExamDate]=useState("");
  const [marks,setMarks]=useState({});
  const [absent,setAbsent]=useState({});// {name: true/false}
  const [lowScoreReasons,setLowScoreReasons]=useState({}); // {name: reasonText} — ৫০%-এর নিচে হলে বাধ্যতামূলক
  const [teacher,setTeacher]=useState(canSelectTeacher?TEACHERS[0]:(currentUser||TEACHERS[0]));
  const [fullMarks,setFullMarks]=useState(100);
  const [passMarks,setPassMarks]=useState(33);
  const [msg,setMsg]=useState("");
  const exList=["IV","V"].includes(cls)?EXAM_LOWER:EXAM_UPPER;
  const clsSubjects=SUBJECTS_BY_CLASS[cls]||SUBJECTS;
  // এই শিক্ষকের জন্য নির্ধারিত বিষয় থাকলে শুধু সেগুলোই দেখানো হবে
  const allowedSubjects=useMemo(()=>{
    const mapped=resolveTeacherSubjects(teacherSubjects,teacher);
    if(!mapped||!mapped.length)return clsSubjects;
    // নতুন ফরম্যাট: [{cls,sub},...] — শ্রেণিভিত্তিক ফিল্টার
    if(typeof mapped[0]==="object"){
      const forCls=mapped.filter(x=>x.cls===cls).map(x=>x.sub);
      return forCls.length?clsSubjects.filter(s=>forCls.includes(s)):clsSubjects;
    }
    // পুরনো ফরম্যাট string[] — পিছনে সামঞ্জস্য
    return clsSubjects.filter(s=>mapped.includes(s));
  },[clsSubjects,teacherSubjects,teacher,cls]);

  useEffect(()=>{
    if(allowedSubjects.length&&!allowedSubjects.includes(sub))setSub(allowedSubjects[0]);
  },[allowedSubjects]);

  const handleClsChange=(c)=>{
    setCls(c);
    const subs=SUBJECTS_BY_CLASS[c]||SUBJECTS;
    setSub(subs[0]);
    setMarks({});setAbsent({});setLowScoreReasons({});
  };

  const handleTeacherChange=(t)=>{
    setTeacher(t);
    setMarks({});setAbsent({});setLowScoreReasons({});
  };

  const handleFullMarks=(val)=>{
    const fm=parseInt(val)||100;
    setFullMarks(fm);
    setPassMarks(Math.round(fm*0.33));
  };

  const getDynGrade=(m,fm)=>{
    const pct=m/fm*100;
    if(pct>=80)return["A+",C.gr];if(pct>=70)return["A",C.te];if(pct>=60)return["A-",C.te];
    if(pct>=50)return["B",C.am];if(pct>=40)return["C",C.am];
    if(m>=passMarks)return["D",C.co];return["F",C.re];
  };

  const toggleAbsent=(name)=>{
    setAbsent(p=>({...p,[name]:!p[name]}));
    if(!absent[name])setMarks(p=>{const n={...p};delete n[name];return n;});
  };

  // ── বিভাগ (গ্রুপ) অনুযায়ী রোস্টার — নবম/দশম শ্রেণিতে বিষয়টি কোনো নির্দিষ্ট বিভাগের হলে
  // শুধুমাত্র সেই বিভাগের ছাত্রদেরই তালিকায় দেখানো হয়, বাকিদের নয় ──
  const subjGroups=groupsOfSubject(sub);
  const groupFilterActive=GROUP_CLASSES.includes(cls)&&subjGroups.length>0;
  const rosterAll=STUDENTS[cls]||[];
  const rosterStudents=groupFilterActive?rosterAll.filter(n=>subjGroups.includes(studentDepartments[n])):rosterAll;
  const unassignedInClass=GROUP_CLASSES.includes(cls)?rosterAll.filter(n=>!studentDepartments[n]):[];

  // লাইভ প্রিভিউ — absent বাদ দিয়ে
  const presentStudents=rosterStudents.filter(n=>!absent[n]);
  const entered=presentStudents.map(n=>marks[n]).filter(v=>v!==""&&v!==undefined&&v!==null);
  const liveAvg=entered.length?Math.round(entered.reduce((a,b)=>a+parseInt(b),0)/entered.length):null;
  const livePass=entered.filter(v=>parseInt(v)>=passMarks).length;
  const liveFail=entered.filter(v=>parseInt(v)<passMarks).length;
  const liveAbsent=Object.values(absent).filter(Boolean).length;
  const liveAvgPct=liveAvg?Math.round(liveAvg/fullMarks*100):null;

  // ── ৫০%-এর নিচে নম্বর পাওয়া ছাত্রদের জন্য কারণ বাধ্যতামূলক ──
  const pendingLowScoreReasons=rosterStudents.filter(name=>{
    if(absent[name]||!marks[name])return false;
    const m=parseInt(marks[name]);
    if(isNaN(m))return false;
    const pct=m/fullMarks*100;
    return pct<50&&!(lowScoreReasons[name]||"").trim();
  });

  const save=async()=>{
    if(pendingLowScoreReasons.length>0)return; // নিরাপত্তা-চেক — বাটন এমনিতেই disabled থাকে
    const nowISO=new Date().toISOString();
    const trimName=examName.trim();
    const entries=rosterStudents
      .filter(name=>!absent[name])
      .map(name=>{
        const m=marks[name]!==""&&marks[name]!==undefined?parseInt(marks[name])||0:0;
        const isLow=m/fullMarks*100<50;
        return{
          name,cls,subject:sub,examType:ex,
          examName:trimName,examDate:examDate.trim(),
          marks:m,
          fullMarks,passMarks,
          examOrder:EXAM_ORDER[ex]||1,
          teacher,absent:false,savedAt:nowISO,
          // ── কম নম্বরের কারণ (৫০%-এর নিচে হলে বাধ্যতামূলকভাবে নেওয়া হয়েছে) ──
          ...(isLow?{lowScoreReason:(lowScoreReasons[name]||"").trim()}:{}),
        };
      });
    // absent রেকর্ড আলাদাভাবে (KPI হিসাবে বাদ যাবে)
    const absentEntries=rosterStudents
      .filter(name=>absent[name])
      .map(name=>({
        name,cls,subject:sub,examType:ex,
        examName:trimName,examDate:examDate.trim(),
        marks:null,fullMarks,passMarks,
        examOrder:EXAM_ORDER[ex]||1,
        teacher,absent:true,savedAt:nowISO
      }));
    const allEntries=[...entries,...absentEntries];
    // ১. React state আপডেট (local instant)
    setResults(p=>{
      const prev={...p};
      const existing=prev[cls]||[];
      const filtered=existing.filter(r=>!(r.subject===sub&&r.examType===ex&&(trimName?r.examName===trimName:true)));
      prev[cls]=[...filtered,...allEntries];
      return prev;
    });
    // ২. Firebase-এ granular write — একসাথে একাধিক শিক্ষক save করলেও কেউ কারো ডেটা মুছবে না
    setMsg("⏳ সংরক্ষণ হচ্ছে...");
    const ok=await fbSaveResultEntries(allEntries);

    // ৩. কম নম্বরের কারণ শিক্ষার্থীর প্রোফাইলে লগ করা (যাতে ইতিহাস ধরে রাখা যায়)
    const lowEntries=entries.filter(e=>e.lowScoreReason);
    lowEntries.forEach(e=>{
      setStudentProfiles(prev=>{
        const existingLogs=(prev[e.name]||{}).lowScoreReasons||[];
        const updated={...(prev[e.name]||{}),lowScoreReasons:[...existingLogs,{
          id:Date.now().toString()+Math.random().toString(36).slice(2,6),
          subject:e.subject,cls:e.cls,examType:e.examType,examName:e.examName,
          marks:e.marks,fullMarks:e.fullMarks,pct:Math.round(e.marks/e.fullMarks*100),
          reason:e.lowScoreReason,teacher:e.teacher,date:e.examDate||new Date().toLocaleDateString("bn-BD"),
        }]};
        fbSaveStudentProfile(e.name,updated); // granular Firebase write
        return{...prev,[e.name]:updated};
      });
    });

    setMarks({});setAbsent({});setExamDate("");setExamName("");setLowScoreReasons({});
    if(ok){
      setMsg(`✓ সংরক্ষিত! উপস্থিত: ${entries.length} | অনুপস্থিত: ${absentEntries.length}`);
    }else{
      setMsg(`⚠️ Local সংরক্ষিত, Firebase sync পরে হবে`);
    }
    setTimeout(()=>setMsg(""),3500);
  };

  return(<div>
    <H2>📝 পরীক্ষার নম্বর এন্ট্রি</H2>
    <Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <div><div style={{fontSize:11,color:C.mu,marginBottom:4}}>শ্রেণি</div><select value={cls} onChange={e=>handleClsChange(e.target.value)}>{Object.keys(STUDENTS).map(c=><option key={c} value={c}>শ্রেণি {c}</option>)}</select></div>
        <div><div style={{fontSize:11,color:C.mu,marginBottom:4}}>বিষয়{resolveTeacherSubjects(teacherSubjects,teacher)?.length?" (আপনার জন্য নির্ধারিত)":""}</div>
          <select value={sub} onChange={e=>setSub(e.target.value)}>
            {GROUP_CLASSES.includes(cls)?(<>
              <optgroup label="আবশ্যিক বিষয়">
                {allowedSubjects.filter(s=>!groupsOfSubject(s).length).map(s=><option key={s}>{s}</option>)}
              </optgroup>
              {GROUPS.map(g=>{
                const opts=allowedSubjects.filter(s=>GROUP_SUBJECTS[g].includes(s));
                return opts.length?(<optgroup key={g} label={`বিভাগীয় বিষয় — ${g}`}>{opts.map(s=><option key={s}>{s}</option>)}</optgroup>):null;
              })}
            </>):allowedSubjects.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <div><div style={{fontSize:11,color:C.mu,marginBottom:4}}>পরীক্ষার ধরন</div><select value={ex} onChange={e=>setEx(e.target.value)}>{exList.map(e=><option key={e}>{e}</option>)}</select></div>
        <div>
          <div style={{fontSize:11,color:C.mu,marginBottom:4}}>শিক্ষক</div>
          {canSelectTeacher
            ?<div>
              <select value={teacher} onChange={e=>handleTeacherChange(e.target.value)} style={{width:"100%"}}>{TEACHERS.map(t=><option key={t}>{t}</option>)}</select>
              {isRep&&<div style={{fontSize:10,color:"#e67e22",marginTop:3,fontWeight:600}}>⚡ প্রতিনিধি হিসেবে ইনপুট দিচ্ছেন</div>}
            </div>
            :<div style={{padding:"8px 12px",background:"#f5f5f5",borderRadius:8,fontSize:14,fontWeight:600,color:C.pu}}>{teacher}</div>}
        </div>
        <div>
          <div style={{fontSize:11,color:C.mu,marginBottom:4}}>পরীক্ষার নাম/নম্বর</div>
          <input type="text" placeholder="যেমন: মাসিক পরীক্ষা-২" value={examName} onChange={e=>setExamName(e.target.value)}/>
        </div>
        <div>
          <div style={{fontSize:11,color:C.mu,marginBottom:4}}>তারিখ</div>
          <input type="date" value={examDate} onChange={e=>setExamDate(e.target.value)} style={{padding:"8px 12px",border:"1px solid rgba(0,0,0,0.15)",borderRadius:8,fontSize:14,width:"100%",outline:"none"}}/>
        </div>
        <div>
          <div style={{fontSize:11,color:C.mu,marginBottom:4}}>পূর্ণ নম্বর</div>
          <input type="number" min="1" max="200" value={fullMarks}
            onChange={e=>handleFullMarks(e.target.value)}
            style={{padding:"8px 12px",border:`1px solid ${C.pu}`,borderRadius:8,fontSize:14,width:"100%",fontWeight:700,color:C.pu}}/>
        </div>
        <div>

      {/* তথ্য বার */}
      <div style={{fontSize:11,color:C.mu,marginBottom:8,padding:"6px 10px",background:C.puL,borderRadius:6,display:"flex",gap:8,flexWrap:"wrap"}}>
        <span>শ্রেণি {cls}</span><span>|</span>
        <span>{sub}</span><span>|</span><span>{ex}</span>
        {examName&&(<><span>|</span><span>{examName}</span></>)}
        {examDate&&(<><span>|</span><span>📅 {examDate}</span></>)}
        <span>|</span>
        <span style={{color:C.pu,fontWeight:700}}>পূর্ণ নম্বর: {fullMarks}</span><span>|</span>
        <span style={{color:C.gr,fontWeight:700}}>পাস: {passMarks}</span>
      </div>

      {/* অনুপস্থিত নোট */}
      <div style={{background:"#fff8e1",border:`1px solid ${C.am}40`,borderRadius:8,padding:"7px 11px",marginBottom:10,fontSize:12,color:C.am}}>
        💡 যে ছাত্র পরীক্ষায় <strong>অনুপস্থিত</strong> ছিল তার পাশের <strong>অনু.</strong> বাটনে ক্লিক করুন — সে KPI ও ফলাফল হিসাব থেকে বাদ পড়বে
      </div>

      {/* বিভাগ (গ্রুপ) ফিল্টার নোট — শুধুমাত্র নবম/দশম শ্রেণিতে বিভাগীয় বিষয়ের ক্ষেত্রে */}
      {groupFilterActive&&(
        <div style={{background:C.puL,border:`1px solid ${C.pu}40`,borderRadius:8,padding:"7px 11px",marginBottom:10,fontSize:12,color:C.pu}}>
          🎓 <strong>{sub}</strong> শুধুমাত্র <strong>{subjGroups.join(" / ")}</strong> বিভাগের ছাত্রদের বিষয় — তাই নিচে শুধু এই বিভাগের/এই বিভাগগুলোর <strong>{rosterStudents.length} জন</strong> ছাত্র দেখানো হচ্ছে।
          {unassignedInClass.length>0&&<span> ⚠️ শ্রেণি {cls}-এ <strong>{unassignedInClass.length} জন</strong> ছাত্রের বিভাগ এখনো নির্ধারণ করা হয়নি (ছাত্র ব্যবস্থাপনা পেজ থেকে ঠিক করুন) — তারা এই তালিকায় নেই।</span>}
        </div>
      )}
      {GROUP_CLASSES.includes(cls)&&!subjGroups.length&&unassignedInClass.length>0&&(
        <div style={{background:"#f3f0ff",border:`1px solid ${C.pu}30`,borderRadius:8,padding:"7px 11px",marginBottom:10,fontSize:11.5,color:C.mu}}>
          ℹ️ শ্রেণি {cls}-এ <strong>{unassignedInClass.length} জন</strong> ছাত্রের বিভাগ এখনো নির্ধারণ করা হয়নি। আবশ্যিক বিষয় হওয়ায় তারা এই তালিকায় আছে, তবে বিভাগীয় বিষয়ে নম্বর দিতে হলে আগে তাদের বিভাগ ঠিক করুন।
        </div>
      )}

      {/* লাইভ প্রিভিউ */}
      {(entered.length>0||liveAbsent>0)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",gap:6,marginBottom:10}}>
          <div style={{background:C.puL,borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:700,color:C.pu}}>{entered.length}</div>
            <div style={{fontSize:10,color:C.mu}}>এন্ট্রি</div>
          </div>
          <div style={{background:"#fff3e0",borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:700,color:C.am}}>{liveAvg||"—"}</div>
            <div style={{fontSize:10,color:C.mu}}>গড়</div>
          </div>
          <div style={{background:C.grL,borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:700,color:C.gr}}>{livePass}</div>
            <div style={{fontSize:10,color:C.mu}}>পাস</div>
          </div>
          <div style={{background:C.reL,borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:700,color:C.re}}>{liveFail}</div>
            <div style={{fontSize:10,color:C.mu}}>ফেল</div>
          </div>
          <div style={{background:"#f3f0ff",borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:700,color:"#7c3aed"}}>{liveAbsent}</div>
            <div style={{fontSize:10,color:C.mu}}>অনুপস্থিত</div>
          </div>
        </div>
      )}

      <div style={{overflowX:"auto"}}><table>
        <thead><tr><th>#</th><th>নাম</th><th>অনু.</th><th>নম্বর /{fullMarks}</th><th>%</th><th>গ্রেড</th></tr></thead>
        <tbody>
          {rosterStudents.map((name,i)=>{
            const isAbs=!!absent[name];
            const m=parseInt(marks[name]||"");
            const pct=(!isAbs&&marks[name])?Math.round(m/fullMarks*100):null;
            const [g,gc]=(!isAbs&&marks[name])?getDynGrade(m,fullMarks):["—",C.mu];
            const isPassing=!isAbs&&marks[name]&&m>=passMarks;
            const isLow=pct!==null&&pct<50;
            const reasonMissing=isLow&&!(lowScoreReasons[name]||"").trim();
            return(<React.Fragment key={i}>
            <tr style={{background:isAbs?"#f3f0ff":marks[name]?(isPassing?"#f0fff4":"#fff5f5"):"transparent",opacity:isAbs?0.65:1}}>
              <td style={{color:C.mu,fontSize:11}}>{i+1}</td>
              <td style={{fontWeight:500,fontSize:12,textDecoration:isAbs?"line-through":"none",color:isAbs?"#7c3aed":C.tx}}>{name}</td>
              <td>
                <button onClick={()=>toggleAbsent(name)}
                  style={{padding:"3px 8px",borderRadius:6,border:`1px solid ${isAbs?"#7c3aed":C.bd}`,background:isAbs?"#7c3aed":"transparent",color:isAbs?"#fff":C.mu,cursor:"pointer",fontSize:11,fontWeight:isAbs?700:400}}>
                  {isAbs?"✓অনু.":"অনু."}
                </button>
              </td>
              <td>
                {isAbs
                  ?<span style={{fontSize:11,color:"#7c3aed",fontStyle:"italic"}}>অনুপস্থিত</span>
                  :<input type="number" min="0" max={fullMarks} placeholder="০"
                    style={{width:58,padding:"4px 6px",borderRadius:6,border:`1px solid ${marks[name]?(isPassing?C.gr:C.re):C.bd}`,fontSize:13,textAlign:"center"}}
                    value={marks[name]||""}
                    onChange={e=>setMarks(p=>({...p,[name]:e.target.value}))}/>
                }
              </td>
              <td style={{fontSize:12}}>{pct!==null?`${pct}%`:"—"}</td>
              <td>{badge(gc,g)}</td>
            </tr>
            {/* ── ৫০%-এর নিচে হলে কারণ বাধ্যতামূলক — পরবর্তী এন্ট্রি ব্লক থাকবে যতক্ষণ না পূরণ হয় ── */}
            {isLow&&(
              <tr style={{background:"#fff5f5"}}>
                <td colSpan="6" style={{padding:"6px 10px 10px"}}>
                  <div style={{fontSize:11,color:C.re,fontWeight:700,marginBottom:3}}>
                    ⚠️ {name} — {pct}% (৫০%-এর নিচে)। ফলাফল খারাপ হওয়ার কারণ লিখুন (বাধ্যতামূলক):
                  </div>
                  <input type="text" placeholder="যেমন: পরীক্ষার আগে অসুস্থ ছিল / পাঠ বুঝতে সমস্যা হয়েছিল..."
                    value={lowScoreReasons[name]||""}
                    onChange={e=>setLowScoreReasons(p=>({...p,[name]:e.target.value}))}
                    style={{width:"100%",padding:"6px 8px",borderRadius:6,border:`1px solid ${reasonMissing?C.re:C.gr}`,fontSize:12,boxSizing:"border-box"}}/>
                </td>
              </tr>
            )}
            </React.Fragment>);
          })}
        </tbody>
      </table></div>

      {pendingLowScoreReasons.length>0&&(
        <div style={{background:"#fff5f5",border:`1px solid ${C.re}40`,borderRadius:8,padding:"8px 12px",marginTop:10,fontSize:12,color:C.re,fontWeight:700}}>
          🔒 সংরক্ষণ করার আগে নিচের {pendingLowScoreReasons.length} জনের কম নম্বরের কারণ লিখুন: {pendingLowScoreReasons.join(", ")}
        </div>
      )}
      <div style={{marginTop:12,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        <button onClick={save} disabled={pendingLowScoreReasons.length>0} style={{padding:"9px 20px",borderRadius:8,border:"none",background:pendingLowScoreReasons.length>0?"#ccc":C.pu,color:"#fff",cursor:pendingLowScoreReasons.length>0?"not-allowed":"pointer",fontWeight:700,fontSize:14}}>{pendingLowScoreReasons.length>0?"🔒 কারণ পূরণ করুন":"✅ সংরক্ষণ করুন"}</button>
        {msg&&<span style={{color:C.gr,fontWeight:700,fontSize:13}}>{msg}</span>}
      </div>
    </Card>
  </div>);
}

/* ══ RESULTS ══ */
function Results({results,setResults,currentUser="",isAdmin=false,STUDENTS,studentProfiles={},setStudentProfiles=()=>{},studentDepartments={},obsData={}}){STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const [tab,setTab]=useState("summary");const [fCls,setFCls]=useState("সব");const [fSub,setFSub]=useState("সব");const [fEx,setFEx]=useState("সব");const [selStudent,setSelStudent]=useState("");const [selProfile,setSelProfile]=useState(null);
  const [editRec,setEditRec]=useState(null);// {cls,idx,rec} editing
  const [editMark,setEditMark]=useState("");
  const [delConfirm,setDelConfirm]=useState(null);// {cls,subject,examType,examName} exam-level delete
  const [delMsg,setDelMsg]=useState("");
  // ── নতুন: পরীক্ষা-গ্রুপ বাল্ক এডিট ──
  const [examEditGroup,setExamEditGroup]=useState(null); // {cls,subject,examType,examName,examDate}
  const [bulkMarks,setBulkMarks]=useState({}); // {name: markString}

  // একটি রেকর্ড এডিট করুন
  const doEditMark=async()=>{
    if(!editRec)return;
    const m=parseInt(editMark);
    if(isNaN(m)||m<0||m>editRec.rec.fullMarks)return;
    let updatedEntry=null;
    setResults(prev=>{
      const cls=[...(prev[editRec.cls]||[])];
      const idx=cls.findIndex((r)=>r.name===editRec.rec.name&&r.subject===editRec.rec.subject&&r.examType===editRec.rec.examType&&r.examName===editRec.rec.examName&&r.cls===editRec.cls);
      if(idx>=0){cls[idx]={...cls[idx],marks:m,savedAt:new Date().toISOString()};updatedEntry=cls[idx];}
      return{...prev,[editRec.cls]:cls};
    });
    setEditRec(null);setEditMark("");
    // Firebase granular update
    if(updatedEntry)await fbUpdateResultEntry(updatedEntry);
    setDelMsg("✅ নম্বর সংশোধন সম্পন্ন!");
    setTimeout(()=>setDelMsg(""),3000);
  };

  // ── বাল্ক এডিট: পরীক্ষা গ্রুপ খুলুন ──
  const openExamEdit=(g,rows)=>{
    setExamEditGroup(g);
    const init={};
    rows.forEach(r=>{init[r.name]=r.absent?"অনুপস্থিত":String(r.marks??"");});
    setBulkMarks(init);
  };

  // ── বাল্ক সেভ ──
  const saveBulkMarks=async()=>{
    if(!examEditGroup)return;
    const {cls,subject,examType,examName}=examEditGroup;
    const nowISO=new Date().toISOString();
    let updatedEntries=[];
    setResults(prev=>{
      const clsArr=[...(prev[cls]||[])];
      Object.entries(bulkMarks).forEach(([name,val])=>{
        if(val==="অনুপস্থিত")return;
        const m=parseInt(val);
        if(isNaN(m))return;
        const idx=clsArr.findIndex(r=>r.name===name&&r.subject===subject&&r.examType===examType&&(examName?r.examName===examName:!r.examName)&&r.cls===cls);
        if(idx>=0){clsArr[idx]={...clsArr[idx],marks:m,absent:false,savedAt:nowISO};updatedEntries.push(clsArr[idx]);}
      });
      return{...prev,[cls]:clsArr};
    });
    // Firebase granular update
    if(updatedEntries.length)await fbSaveResultEntries(updatedEntries);
    setExamEditGroup(null);setBulkMarks({});
    setDelMsg("✅ সকল নম্বর সংরক্ষিত হয়েছে!");
    setTimeout(()=>setDelMsg(""),3000);
  };

  // পুরো একটি পরীক্ষা ডিলেট করুন (শুধু Admin)

// সাবমিশন উইন্ডো: বৃহস্পতিবার ৪:০০ PM → পরবর্তী শনিবার রাত ১২:০০ AM
function getWeeklyLPWindow(){
  const now=new Date();
  const day=now.getDay(); // 0=Sun,1=Mon,...,4=Thu,5=Fri,6=Sat
  const hour=now.getHours();
  const min=now.getMinutes();

  // বৃহস্পতিবার = 4, শনিবার = 6
  // উইন্ডো খোলে: বৃহস্পতিবার ৪:০০ PM
  // উইন্ডো বন্ধ: পরবর্তী শনিবার রাত ১২:০০ AM (midnight)

  let windowOpen=false;
  let windowStart=null;
  let windowEnd=null;
  let targetWeekStart=null; // পরবর্তী সপ্তাহের শনিবার

  // বর্তমান সময় থেকে সবচেয়ে কাছের বৃহস্পতিবার ৪:০০ PM খুঁজি
  const getLastThursday4PM=()=>{
    const d=new Date(now);
    // এই সপ্তাহের বৃহস্পতিবার
    const diffToThu=((4-day)+7)%7;
    const thisThu=new Date(d);
    thisThu.setDate(d.getDate()-(day===4&&(hour*60+min)>=16*60?0:((day-4+7)%7)));
    // যদি আজ বৃহস্পতিবার এবং ৪টার পরে
    if(day===4&&(hour*60+min)>=16*60){
      thisThu.setDate(d.getDate());
    } else {
      // গত বৃহস্পতিবার
      thisThu.setDate(d.getDate()-((day-4+7)%7||7));
    }
    thisThu.setHours(16,0,0,0);
    return thisThu;
  };

  const lastThu4PM=getLastThursday4PM();
  // পরবর্তী শনিবার রাত ১২টা
  const nextSatMidnight=new Date(lastThu4PM);
  // বৃহস্পতিবার থেকে ২ দিন পরে = শনিবার
  nextSatMidnight.setDate(lastThu4PM.getDate()+2);
  nextSatMidnight.setHours(23,59,59,999);

  windowStart=lastThu4PM;
  windowEnd=nextSatMidnight;
  windowOpen=(now>=windowStart&&now<=windowEnd);

  // পরবর্তী সপ্তাহের শনিবার (সাবমিশনের পর সপ্তাহ)
  // উইন্ডো খোলে যে বৃহস্পতিবারে, পরের দিন শুক্রবার, তারপর শনিবার = টার্গেট সপ্তাহ শুরু
  const nextSat=new Date(lastThu4PM);
  nextSat.setDate(lastThu4PM.getDate()+2);
  nextSat.setHours(0,0,0,0);
  targetWeekStart=nextSat;

  return{windowOpen,windowStart,windowEnd,targetWeekStart};
}

// পরবর্তী সপ্তাহের ৬ দিনের তারিখ (শনি–বৃহস্পতি, শুক্র বাদ)
function getWeekDays(weekStart){
  const days=[];
  const dayNames=["শনিবার","রবিবার","সোমবার","মঙ্গলবার","বুধবার","বৃহস্পতিবার"];
  // weekStart = শনিবার
  for(let i=0;i<6;i++){
    const d=new Date(weekStart);
    d.setDate(weekStart.getDate()+i);
    const dd=String(d.getDate()).padStart(2,"0");
    const mm=String(d.getMonth()+1).padStart(2,"0");
    const yy=d.getFullYear();
    days.push({label:`${dayNames[i]} (${dd}.${mm}.${yy})`,date:d.toISOString().split("T")[0]});
  }
  return days;
}

// শিক্ষকের নির্ধারিত বিষয়+শ্রেণি তালিকা বের করা
// ── FIX: teacherSubjects লুকআপে সামান্য নাম-অমিল (স্পেস/কেস ভিন্নতা) সহনশীল করা ──
// অ্যাডমিন ম্যাপিং করার সময় যে নাম বেছে নিয়েছেন, আর শিক্ষক লগইন করার সময় যে নাম ব্যবহৃত হয়
// তার মধ্যে সামান্য পার্থক্য (অতিরিক্ত স্পেস, কেস ভিন্নতা) থাকলেও সঠিক ম্যাপিং খুঁজে পাওয়া যাবে।
function resolveTeacherSubjects(teacherSubjects,teacherName){
  if(!teacherName||!teacherSubjects)return null;
  if(teacherSubjects[teacherName]!==undefined)return teacherSubjects[teacherName];
  const norm=s=>String(s||"").trim().toLowerCase().replace(/\s+/g," ");
  const target=norm(teacherName);
  const foundKey=Object.keys(teacherSubjects).find(k=>norm(k)===target);
  return foundKey?teacherSubjects[foundKey]:null;
}
function getTeacherAssignments(teacher,teacherSubjects){
  const mapped=resolveTeacherSubjects(teacherSubjects,teacher);
  if(!mapped||!mapped.length)return[];
  if(typeof mapped[0]==="object"){
    return mapped; // [{cls,sub},...] format
  }
  // ── FIX: পুরনো format (শুধু subject নামের array, ক্লাস-নির্দিষ্ট তথ্য ছাড়া) ──
  // আগে এটাকে {cls:"",sub} হিসেবে রূপান্তর করা হতো, যেটা সপ্তাহভিত্তিক ভিউতে "শ্রেণি" ফাঁকা
  // দেখাত এবং প্রকৃতপক্ষে অকার্যকর একটা এন্ট্রি তৈরি করত। এখন সেই বিষয়টা যে যে ক্লাসে পড়ানো হয়
  // (SUBJECTS_BY_CLASS অনুযায়ী) সবগুলোতে সঠিকভাবে সম্প্রসারণ করা হয়, যাতে প্রতিটি ক্লাস-বিষয়
  // কম্বিনেশনের জন্য আলাদা, কার্যকর এন্ট্রি তৈরি হয়।
  const expanded=[];
  mapped.forEach(sub=>{
    Object.entries(SUBJECTS_BY_CLASS).forEach(([cls,subs])=>{
      if(subs.includes(sub))expanded.push({cls,sub});
    });
  });
  return expanded.length?expanded:mapped.map(sub=>({cls:"",sub}));
}

// উইন্ডো টাইমার ফরম্যাট
function formatCountdown(ms){
  if(ms<=0)return"০ মিনিট";
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  if(h>0)return`${h} ঘণ্টা ${m} মিনিট`;
  return`${m} মিনিট`;
}

// SHA-256 হ্যাশ ফাংশন (WebCrypto — সব আধুনিক ব্রাউজারে আছে)
const hashPassword=async(pass)=>{
  const enc=new TextEncoder().encode(pass);
  const buf=await crypto.subtle.digest("SHA-256",enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
};

  /* sync get — CredStore.get() এর পুরনো ব্যবহার LockoutStore-এ। এখন async করা হয়েছে */
  async getAsync(){
    const r=await HAISDB.get(this._KEY);return r||{};
  },
  /* পিছনে-সামঞ্জস্যের জন্য sync ফল দেয় — IDB cache থেকে */
  get(){
    // এই পদ্ধতি শুধু নন-async context-এ ব্যবহার হয় (যেখানে আগে sync ছিল)
    // IDB-তে async, তাই এখন সরাসরি async verify ব্যবহার করা হয়
    return {};
  },
  async verify(name,pass){
    const creds=await this.getAsync();
    if(!creds[name])return false;
    const h=await hashPassword(pass);
    return h===creds[name];
  },
  async change(name,newPass){

    creds[name]=await hashPassword(newPass);
    try{await HAISDB.set(this._KEY,creds);return true;}catch(e){return false;}
  },
  /* ── রিকভারি PIN ── */
  async setPin(pin){
    const h=await hashPassword(pin);
    try{await HAISDB.set(this._PIN_KEY,h);return true;}catch(e){return false;}
  },
  async verifyPin(pin){
    try{
      const stored=await HAISDB.get(this._PIN_KEY);
      if(!stored)return false;
      const h=await hashPassword(pin);
      return h===stored;
    }catch(e){return false;}
  },
  async hasPin(){
    const v=await HAISDB.get(this._PIN_KEY);return !!v;
  }
};

// Brute-force লকআউট ম্যানেজার — IndexedDB (sync-style: IDB cache)
// লকআউট ডেটা মেমোরিতে cache করা হয়; app চালু থাকলে কার্যকর
const _lockoutCache={};
const LockoutStore={
  _KEY:"hais_lockout_v1",
  /* async init — app শুরুতে IDB থেকে লোড */
  async loadCache(){

  _save(){HAISDB.setSync(this._KEY,{..._lockoutCache});},
  get(name){
    return _lockoutCache[name]||{attempts:0,lockedUntil:0};
  },
  set(name,data){
    _lockoutCache[name]=data;this._save();
  },
  isLocked(name){
    const s=this.get(name);
    if(s.lockedUntil&&Date.now()<s.lockedUntil)return true;
    if(s.lockedUntil&&Date.now()>=s.lockedUntil){this.reset(name);}
    return false;
  },
  recordFail(name){
    const s=this.get(name);
    const attempts=(s.attempts||0)+1;
    const lockedUntil=attempts>=MAX_ATTEMPTS?Date.now()+LOCKOUT_MS:s.lockedUntil||0;
    this.set(name,{attempts,lockedUntil});
    return{attempts,locked:attempts>=MAX_ATTEMPTS};
  },
  reset(name){this.set(name,{attempts:0,lockedUntil:0});},
  getRemainingMinutes(name){
    const s=this.get(name);
    if(!s.lockedUntil)return 0;
    return Math.ceil((s.lockedUntil-Date.now())/60000);
  }
};

// Session বৈধতা যাচাই
const isSessionValid=(authData)=>{
  if(!authData||!authData.user||!authData.loginAt)return false;
  return(Date.now()-new Date(authData.loginAt).getTime())<SESSION_TTL_MS;
};

// পাসওয়ার্ড শক্তি যাচাই
const checkPasswordStrength=(pass)=>{
  if(pass.length<8)return{ok:false,msg:"পাসওয়ার্ড কমপক্ষে ৮ অক্ষরের হতে হবে"};
  if(!/[A-Z]/.test(pass))return{ok:false,msg:"কমপক্ষে একটি বড় হাতের অক্ষর (A-Z) দরকার"};
  if(!/[0-9]/.test(pass))return{ok:false,msg:"কমপক্ষে একটি সংখ্যা দরকার"};
  return{ok:true,msg:""};
};

    if(pin.length<4){setErr("PIN কমপক্ষে ৪ সংখ্যার হতে হবে");return;}

function LoginScreen({onLogin}){
  const [mode,setMode]=useState("login"); // login | register | verify | forgot
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [confirmPass,setConfirmPass]=useState("");
  const [teacherName,setTeacherName]=useState(TEACHERS[0]);
  const [err,setErr]=useState("");
  const [msg,setMsg]=useState("");
  const [showPass,setShowPass]=useState(false);
  const [loading,setLoading]=useState(false);

  const ADMIN_EMAIL="sayedhps299@gmail.com";

  /* ── whitelist চেক — Firebase DB-তে আছে কিনা ── */
  const checkWhitelist=async(emailVal)=>{
    if(!window.__fbReady)return false;
    /* admin সবসময় অনুমোদিত */
    if(emailVal===ADMIN_EMAIL)return true;
    try{
      const snap=await window.__fbDB.ref("hais_whitelist/"+emailVal.replace(/\./g,"_").replace(/@/g,"__at__")).once("value");
      return snap.exists();
    }catch(e){return false;}
  };

  /* ── লগইন ── */
  const handleLogin=async()=>{
    if(loading)return;
    if(!email.trim()){setErr("ইমেইল লিখুন");return;}
    if(!password){setErr("পাসওয়ার্ড লিখুন");return;}
    setErr("");setLoading(true);
    try{
      const cred=await window.__fbAuth.signInWithEmailAndPassword(email.trim(),password);
      const fbUser=cred.user;
      if(!fbUser.emailVerified&&fbUser.email!==ADMIN_EMAIL){
        await window.__fbAuth.signOut();
        setLoading(false);
        setMode("verify");
        setMsg("আপনার email verify করা হয়নি। নিচের বাটনে চাপুন।");
        return;
      }
      /* displayName থেকে শিক্ষকের নাম */
      const name=fbUser.displayName||TEACHERS.find(t=>
        fbUser.email.toLowerCase().includes(t.split(" ").pop().toLowerCase())
      )||fbUser.email;
      const isAdminUser=fbUser.email===ADMIN_EMAIL;
      onLogin(isAdminUser?ADMIN_TEACHER:name, fbUser);
    }catch(e){
      setLoading(false);
      if(e.code==="auth/user-not-found"||e.code==="auth/wrong-password"||e.code==="auth/invalid-credential"){
        setErr("❌ ইমেইল বা পাসওয়ার্ড ভুল।");
      }else if(e.code==="auth/too-many-requests"){
        setErr("🔒 অনেকবার ভুল চেষ্টা। কিছুক্ষণ পরে আবার চেষ্টা করুন।");
      }else{
        setErr("❌ লগইন হয়নি। আবার চেষ্টা করুন।");
      }
    }
  };

  /* ── রেজিস্ট্রেশন ── */
  const handleRegister=async()=>{
    if(loading)return;
    if(!email.trim()){setErr("ইমেইল লিখুন");return;}
    if(password.length<8){setErr("পাসওয়ার্ড কমপক্ষে ৮ অক্ষরের হতে হবে");return;}
    if(password!==confirmPass){setErr("পাসওয়ার্ড দুটি মিলছে না");return;}

      return;

    try{
      const cred=await window.__fbAuth.createUserWithEmailAndPassword(email.trim(),password);

/* ══ WEEKLY LESSON PLAN FORM COMPONENT ══ */
function WeeklyLPForm({teacher,assignment,weekDays,weekLabel,onSubmit,onCancel,existingPlan=null}){
  // প্রতিটি দিনের জন্য {lessonPlan:"", hw:""} state
  const initRows=weekDays.map(d=>({
    date:d.date,
    dayLabel:d.label,
    lessonPlan:existingPlan?.rows?.find(r=>r.date===d.date)?.lessonPlan||"",
    hw:existingPlan?.rows?.find(r=>r.date===d.date)?.hw||""
  }));
  const [rows,setRows]=React.useState(initRows);
  const [err,setErr]=React.useState("");

  const updateRow=(i,field,val)=>{
    setRows(prev=>prev.map((r,idx)=>idx===i?{...r,[field]:val}:r));
  };

  const submit=()=>{
    const filled=rows.filter(r=>r.lessonPlan.trim());
    if(!filled.length){setErr("কমপক্ষে একটি দিনের পাঠ পরিকল্পনা লিখুন।");return;}
    setErr("");
    onSubmit({
      id:existingPlan?.id||Date.now().toString(),
      teacher,
      cls:assignment.cls,
      subject:assignment.sub,
      weekLabel,
      rows,
      status:LP_STATUS.PENDING,
      submittedAt:new Date().toISOString(),
      reviewedAt:null,
      adminNote:"",
      type:"weekly"
    });
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:600,overflowY:"auto",padding:"14px 10px"}}>
      <div style={{background:"#fff",borderRadius:16,maxWidth:600,margin:"0 auto",boxShadow:"0 8px 32px rgba(83,68,181,0.2)",overflow:"hidden"}}>
        {/* হেডার */}
        <div style={{background:"linear-gradient(135deg,#5344b5,#7c3aed)",padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{color:"#fff",fontWeight:800,fontSize:15}}>📋 সাপ্তাহিক পাঠ পরিকল্পনা</div>
            <div style={{color:"rgba(255,255,255,0.8)",fontSize:11,marginTop:2}}>
              {assignment.cls?"শ্রেণি "+assignment.cls+" • ":""}{assignment.sub} • {weekLabel}
            </div>
          </div>
          <button onClick={onCancel} style={{border:"none",background:"rgba(255,255,255,0.2)",color:"#fff",borderRadius:8,padding:"5px 11px",cursor:"pointer",fontWeight:700,fontSize:14}}>✕</button>
        </div>

        <div style={{padding:"14px 16px"}}>
          {/* শিক্ষক তথ্য */}
          <div style={{background:"#f3eeff",borderRadius:10,padding:"8px 12px",marginBottom:14,fontSize:12,color:"#5344b5",fontWeight:600}}>
            👤 {teacher}
          </div>

          {/* ছক */}
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={{background:"#ede9fd"}}>
                  <th style={{padding:"8px 10px",textAlign:"left",color:"#5344b5",fontWeight:700,border:"1px solid #e0d9f7",width:"24%"}}>তারিখ ও বার</th>
                  <th style={{padding:"8px 10px",textAlign:"left",color:"#5344b5",fontWeight:700,border:"1px solid #e0d9f7",width:"40%"}}>পাঠ পরিকল্পনা</th>
                  <th style={{padding:"8px 10px",textAlign:"left",color:"#5344b5",fontWeight:700,border:"1px solid #e0d9f7",width:"22%"}}>H.W</th>
                  <th style={{padding:"8px 10px",textAlign:"center",color:"#e67e22",fontWeight:700,border:"1px solid #e0d9f7",width:"14%"}}>📝 পরীক্ষা</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((row,i)=>(
                  <tr key={i} style={{background:row.hasExam?"#fff8e1":(i%2===0?"#fff":"#fafafe")}}>
                    <td style={{padding:"8px 10px",border:"1px solid #e0d9f7",fontSize:11,color:"#444",fontWeight:600,verticalAlign:"top"}}>{row.dayLabel}</td>
                    <td style={{padding:"6px 8px",border:"1px solid #e0d9f7",verticalAlign:"top"}}>
                      <textarea value={row.lessonPlan} onChange={e=>updateRow(i,"lessonPlan",e.target.value)}
                        placeholder="পাঠ পরিকল্পনা লিখুন..."
                        style={{width:"100%",minHeight:54,padding:"5px 7px",border:"1px solid #ddd",borderRadius:6,fontSize:11,fontFamily:"sans-serif",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
                    </td>
                    <td style={{padding:"6px 8px",border:"1px solid #e0d9f7",verticalAlign:"top"}}>
                      <textarea value={row.hw} onChange={e=>updateRow(i,"hw",e.target.value)}
                        placeholder="গৃহকাজ..."
                        style={{width:"100%",minHeight:54,padding:"5px 7px",border:"1px solid #ddd",borderRadius:6,fontSize:11,fontFamily:"sans-serif",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
                    </td>
                    <td style={{padding:"6px 8px",border:"1px solid #e0d9f7",verticalAlign:"top",textAlign:"center"}}>
                      <label style={{cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>

                      </label>
                      {row.hasExam&&(
                        <input type="text" value={row.examNote||""} onChange={e=>updateRow(i,"examNote",e.target.value)}

            </table>
          </div>

          {err&&<div style={{background:"#fff0f0",border:"1px solid #f8717140",borderRadius:8,padding:"8px 12px",marginTop:10,fontSize:12,color:"#ef4444",fontWeight:600}}>⚠ {err}</div>}

          <div style={{display:"flex",gap:10,marginTop:14}}>
            <button onClick={submit}
              style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:"#5344b5",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14}}>
              📤 জমা দিন
            </button>
            <button onClick={onCancel}
              style={{padding:"11px 16px",borderRadius:10,border:"1px solid #ddd",background:"transparent",cursor:"pointer",color:"#888",fontSize:13}}>
              বাতিল
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function LPSubmitForm({currentUser,onSubmit,onCancel,initial=null,teacherSubjects={}}){
  const today=new Date().toLocaleDateString("bn-BD");
  const isAdmin=(currentUser==="ADMIN");
  const isRep=(currentUser===REP_TEACHER);
  const canSelectTeacher=isAdmin||isRep;
  const [teacher,setTeacher]=useState(initial?.teacher||(canSelectTeacher?TEACHERS[0]:currentUser)||TEACHERS[0]);
  const [cls,setCls]=useState(initial?.cls||"VI");
  const selTeacher=canSelectTeacher?teacher:currentUser;
  const clsSubjects=SUBJECTS_BY_CLASS[cls]||SUBJECTS;
  const allowedSubjects=useMemo(()=>{
    const mapped=resolveTeacherSubjects(teacherSubjects,selTeacher);
    if(!mapped||!mapped.length)return clsSubjects;
    if(typeof mapped[0]==="object"){
      const forCls=mapped.filter(x=>x.cls===cls).map(x=>x.sub);
      return forCls.length?clsSubjects.filter(s=>forCls.includes(s)):clsSubjects;
    }
    return clsSubjects.filter(s=>mapped.includes(s));
  },[clsSubjects,teacherSubjects,selTeacher,cls]);
  const [sub,setSub]=useState(initial?.subject||allowedSubjects[0]||(SUBJECTS_BY_CLASS["VI"]||SUBJECTS)[0]);

  useEffect(()=>{
    if(allowedSubjects.length&&!allowedSubjects.includes(sub))setSub(allowedSubjects[0]);
  },[allowedSubjects]);

  const handleClsChange=(c)=>{
    setCls(c);
    setSub((SUBJECTS_BY_CLASS[c]||SUBJECTS)[0]);
  };
  const [week,setWeek]=useState(initial?.week||"");
  const [topic,setTopic]=useState(initial?.topic||"");
  const [objectives,setObjectives]=useState(initial?.objectives||"");
  const [methodology,setMethodology]=useState(initial?.methodology||"");
  const [materials,setMaterials]=useState(initial?.materials||"");
  const [activities,setActivities]=useState(initial?.activities||"");
  const [assessment,setAssessment]=useState(initial?.assessment||"");
  const [homework,setHomework]=useState(initial?.homework||"");
  const [reflection,setReflection]=useState(initial?.reflection||"");
  const [err,setErr]=useState("");

  const validate=()=>{
    if(!topic.trim())return"পাঠের শিরোনাম আবশ্যক";
    if(!week.trim())return"সপ্তাহ/তারিখ আবশ্যক";
    if(!objectives.trim())return"শিক্ষার উদ্দেশ্য আবশ্যক";
    if(!methodology.trim())return"শিক্ষণ পদ্ধতি আবশ্যক";
    if(!activities.trim())return"পাঠ কার্যক্রম আবশ্যক";
    if(!assessment.trim())return"মূল্যায়ন পদ্ধতি আবশ্যক";
    return null;
  };

  const submit=()=>{
    const e=validate();
    if(e){setErr(e);return;}
    setErr("");
    onSubmit({
      id:initial?.id||Date.now().toString(),
      teacher:selTeacher,cls,subject:sub,week,topic,
      objectives,methodology,materials,activities,
      assessment,homework,reflection,
      status:LP_STATUS.PENDING,
      adminNote:"",
      submittedAt:new Date().toISOString(),
      reviewedAt:null
    });
  };

  const FLabel=({children,req})=><div style={{fontSize:11,color:C.mu,marginBottom:3}}>{children}{req&&<span style={{color:C.re}}> *</span>}</div>;
  const TA=({val,onChange,placeholder,rows=2})=>(
    <textarea value={val} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
      style={{width:"100%",padding:"8px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13,fontFamily:"sans-serif",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
  );

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:500,overflowY:"auto",padding:"16px 12px"}}>
      <div style={{background:"#fff",borderRadius:16,padding:18,maxWidth:560,margin:"0 auto",boxShadow:"0 8px 32px rgba(83,68,181,0.18)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <div style={{fontWeight:700,fontSize:16,color:C.pu}}>📋 লেসন প্ল্যান ফর্ম</div>
            <div style={{fontSize:11,color:C.mu,marginTop:2}}>Heritage Public School • আন্তর্জাতিক মানের পাঠ পরিকল্পনা</div>
          </div>
          <button onClick={onCancel} style={{border:"none",background:C.reL,color:C.re,borderRadius:8,padding:"5px 11px",cursor:"pointer",fontWeight:700,fontSize:14}}>✕</button>
        </div>

        {/* ── সেকশন ১: পরিচিতি ── */}
        <div style={{background:C.puL,borderRadius:10,padding:"12px",marginBottom:14,border:`1px solid ${C.pu}25`}}>
          <div style={{fontWeight:700,fontSize:12,color:C.pu,marginBottom:10}}>① মূল তথ্য</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            {isAdmin?(
              <div><FLabel req>শিক্ষক</FLabel>
                <select value={teacher} onChange={e=>setTeacher(e.target.value)} style={{width:"100%",padding:"8px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13}}>
                  {TEACHERS.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
            ):isRep?(
              <div><FLabel req>শিক্ষক (প্রতিনিধি হিসেবে)</FLabel>
                <select value={teacher} onChange={e=>setTeacher(e.target.value)} style={{width:"100%",padding:"8px",border:`1px solid #e67e22`,borderRadius:8,fontSize:13}}>
                  {TEACHERS.map(t=><option key={t}>{t}</option>)}
                </select>
                <div style={{fontSize:10,color:"#e67e22",marginTop:3,fontWeight:600}}>⚡ প্রতিনিধি হিসেবে জমা দিচ্ছেন</div>
              </div>
            ):(
              <div><FLabel>শিক্ষক</FLabel>
                <div style={{padding:"8px 10px",background:"#f5f5f5",borderRadius:8,fontSize:13,fontWeight:600,color:C.pu}}>{currentUser}</div>
              </div>
            )}
            <div><FLabel req>শ্রেণি</FLabel>
              <select value={cls} onChange={e=>handleClsChange(e.target.value)} style={{width:"100%",padding:"8px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13}}>
                {Object.keys(STUDENTS).map(c=><option key={c} value={c}>শ্রেণি {c}</option>)}
              </select>
            </div>
            <div><FLabel req>বিষয়{resolveTeacherSubjects(teacherSubjects,selTeacher)?.length?" (নির্ধারিত)":""}</FLabel>
              <select value={sub} onChange={e=>setSub(e.target.value)} style={{width:"100%",padding:"8px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13}}>
                {allowedSubjects.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div><FLabel req>সপ্তাহ / তারিখ</FLabel>
              <input type="text" placeholder="যেমন: সপ্তাহ-১৫, ১৬ জুন" value={week} onChange={e=>setWeek(e.target.value)}
                style={{width:"100%",padding:"8px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13}}/>
            </div>
          </div>
          <div><FLabel req>পাঠের শিরোনাম / টপিক</FLabel>
            <input type="text" placeholder="পাঠের মূল বিষয়বস্তু লিখুন..." value={topic} onChange={e=>setTopic(e.target.value)}
              style={{width:"100%",padding:"8px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13}}/>
          </div>
        </div>

        {/* ── সেকশন ২: শিক্ষার উদ্দেশ্য ── */}
        <div style={{background:"#f0fff4",borderRadius:10,padding:"12px",marginBottom:14,border:`1px solid ${C.gr}25`}}>
          <div style={{fontWeight:700,fontSize:12,color:C.gr,marginBottom:10}}>② শিক্ষার উদ্দেশ্য (Learning Objectives)</div>
          <FLabel req>পাঠ শেষে শিক্ষার্থীরা কী জানবে / পারবে?</FLabel>
          <TA val={objectives} onChange={setObjectives} placeholder="১. ... ২. ... ৩. ... (Bloom's Taxonomy অনুসরণ করুন)" rows={3}/>
        </div>

        {/* ── সেকশন ৩: পদ্ধতি ── */}
        <div style={{background:"#fff8e1",borderRadius:10,padding:"12px",marginBottom:14,border:`1px solid ${C.am}25`}}>
          <div style={{fontWeight:700,fontSize:12,color:C.am,marginBottom:10}}>③ শিক্ষণ পদ্ধতি ও উপকরণ</div>
          <div style={{marginBottom:8}}>
            <FLabel req>শিক্ষণ পদ্ধতি (Teaching Method)</FLabel>
            <TA val={methodology} onChange={setMethodology} placeholder="যেমন: প্রশ্নোত্তর, গ্রুপ আলোচনা, প্রদর্শনী পদ্ধতি..."/>
          </div>
          <div>
            <FLabel>শিক্ষা উপকরণ (Materials)</FLabel>
            <TA val={materials} onChange={setMaterials} placeholder="যেমন: বোর্ড, চার্ট, মডেল, ডিজিটাল কন্টেন্ট..."/>
          </div>
        </div>

        {/* ── সেকশন ৪: কার্যক্রম ── */}
        <div style={{background:"#f3eeff",borderRadius:10,padding:"12px",marginBottom:14,border:`1px solid ${C.pu}20`}}>
          <div style={{fontWeight:700,fontSize:12,color:C.pu,marginBottom:10}}>④ পাঠ কার্যক্রম (Lesson Activities)</div>
          <FLabel req>সময়ভিত্তিক কার্যক্রমের বিবরণ</FLabel>
          <TA val={activities} onChange={setActivities} rows={4}
            placeholder={`ভূমিকা (৫ মি.): ...\nমূল পাঠ (৩০ মি.): ...\nঅনুশীলন (১০ মি.): ...\nসমাপ্তি (৫ মি.): ...`}/>
        </div>

        {/* ── সেকশন ৫: মূল্যায়ন ও গৃহকাজ ── */}
        <div style={{background:"#faf0f0",borderRadius:10,padding:"12px",marginBottom:14,border:`1px solid ${C.co}25`}}>
          <div style={{fontWeight:700,fontSize:12,color:C.co,marginBottom:10}}>⑤ মূল্যায়ন ও গৃহকাজ</div>
          <div style={{marginBottom:8}}>
            <FLabel req>মূল্যায়ন পদ্ধতি (Assessment)</FLabel>
            <TA val={assessment} onChange={setAssessment} placeholder="যেমন: মৌখিক প্রশ্ন, কুইজ, পর্যবেক্ষণ, লিখিত উত্তর..."/>
          </div>
          <div>
            <FLabel>গৃহকাজ / অনুশীলন (Homework)</FLabel>
            <TA val={homework} onChange={setHomework} placeholder="পরবর্তী ক্লাসের আগে শিক্ষার্থীরা কী করবে..."/>
          </div>
        </div>

        {/* ── সেকশন ৬: প্রতিফলন ── */}
        <div style={{background:"#e8f5e9",borderRadius:10,padding:"12px",marginBottom:14,border:`1px solid ${C.gr}20`}}>
          <div style={{fontWeight:700,fontSize:12,color:C.te,marginBottom:10}}>⑥ পাঠ প্রতিফলন (Self-Reflection)</div>
          <FLabel>পাঠ দেওয়ার পরের অনুভূতি ও উন্নতির পরিকল্পনা</FLabel>
          <TA val={reflection} onChange={setReflection} placeholder="কী ভালো হয়েছে? কোথায় উন্নতি দরকার? পরের বার কীভাবে ভালো করব?"/>
        </div>

        {err&&<div style={{background:C.reL,border:`1px solid ${C.re}40`,borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:13,color:C.re,fontWeight:600}}>⚠ {err}</div>}

        <div style={{display:"flex",gap:10}}>
          <button onClick={submit} style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:C.pu,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14}}>
            📤 জমা দিন (Submit)
          </button>
          <button onClick={onCancel} style={{padding:"11px 16px",borderRadius:10,border:`1px solid ${C.bd}`,background:"transparent",cursor:"pointer",color:C.mu,fontSize:13}}>বাতিল</button>
        </div>
      </div>
    </div>
  );
}

        {/* হেডার */}

        </div>

        <div style={{height:1,background:C.bd,marginBottom:14}}/>

        <Section emoji="📋" title="পাঠ কার্যক্রম" content={plan.activities} color={C.pu}/>
        <Section emoji="✅" title="মূল্যায়ন পদ্ধতি" content={plan.assessment} color={C.co}/>
        <Section emoji="🏠" title="গৃহকাজ" content={plan.homework} color={C.te}/>

        {/* পূর্ববর্তী মন্তব্য */}

            <button onClick={()=>{if(!action){setAction("revision");onRevision(plan.id,note);}}}

// মূল LessonPlans কম্পোনেন্ট — Dynamic Weekly সিস্টেম
function LessonPlans({lessonPlans,setLessonPlans,lpRole,setLpRole,teacherSubjects={},STUDENTS,examSchedule=[],setExamSchedule=()=>{}}){
  STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const [viewPlan,setViewPlan]=useState(null);
  const [showForm,setShowForm]=useState(null); // {assignment:{cls,sub}}
  const [tab,setTab]=useState("weekly"); // "weekly" | "history"
  const [filterTeacher,setFilterTeacher]=useState("সব");
  const [filterStatus,setFilterStatus]=useState("সব");
  const [msg,setMsg]=useState(null);
  const [tick,setTick]=useState(0);

  const isAdmin=(lpRole===LP_ROLES.ADMIN);
  const isRep=(lpRole===REP_TEACHER);
  const currentTeacher=isAdmin?null:lpRole;
  // Rep এর জন্য — কোন শিক্ষকের পক্ষে জমা দিচ্ছেন
  const [repTargetTeacher,setRepTargetTeacher]=useState(TEACHERS.filter(t=>t!==REP_TEACHER)[0]||TEACHERS[0]);

  // প্রতি মিনিটে রি-রেন্ডার (উইন্ডো টাইমার আপডেটের জন্য)
  useEffect(()=>{
    const iv=setInterval(()=>setTick(t=>t+1),60000);
    return()=>clearInterval(iv);
  },[]);

  const {windowOpen,windowStart,windowEnd,targetWeekStart}=getWeeklyLPWindow();
  const weekDays=targetWeekStart?getWeekDays(targetWeekStart):[];
  const weekLabel=targetWeekStart?(()=>{
    const s=weekDays[0]?.date||"";
    const e=weekDays[5]?.date||"";
    return`${s} – ${e}`;
  })():"";

  const flash=(text,type="success")=>{setMsg({text,type});setTimeout(()=>setMsg(null),4000);};

  // সব weekly plan
  const allPlans=useMemo(()=>(lessonPlans._v2||[]).filter(p=>p.type==="weekly"),[lessonPlans]);
  // পুরনো (non-weekly) plan
  const oldPlans=useMemo(()=>(lessonPlans._v2||[]).filter(p=>p.type!=="weekly"),[lessonPlans]);

  // ── FIX: গুরুতর বাগ — effectiveTeacher তার ঘোষণার আগেই ব্যবহৃত হচ্ছিল (TDZ error) ──
  // আগে myAssignments-এর useMemo dependency array-তে effectiveTeacher রেফারেন্স করা হতো,
  // অথচ সেটা ঘোষিত হতো তার নিচে — এতে "Cannot access 'effectiveTeacher' before initialization"
  // এরর হয়ে পুরো লেসন প্ল্যান পেজ রেন্ডার হওয়ার আগেই ক্র্যাশ করত (প্রতিটি ব্যবহারকারীর জন্য)।
  // এখন এটা আগে ঘোষণা করে তারপর ব্যবহার করা হচ্ছে।
  const effectiveTeacher=isRep?repTargetTeacher:currentTeacher; // Rep হলে target teacher

  // শিক্ষকের নির্ধারিত বিষয়+শ্রেণি
  const myAssignments=useMemo(()=>{
    if(isAdmin)return[];
    return getTeacherAssignments(effectiveTeacher,teacherSubjects);
  },[isAdmin,effectiveTeacher,teacherSubjects]);

  // এই সপ্তাহে শিক্ষক ইতিমধ্যে কোন বিষয়ে জমা দিয়েছেন?
  const submittedThisWeek=useMemo(()=>{
    if(!effectiveTeacher)return{};
    const map={};
    allPlans.filter(p=>p.teacher===effectiveTeacher&&p.weekLabel===weekLabel).forEach(p=>{
      map[`${p.cls}__${p.subject}`]=p;
    });
    return map;
  },[allPlans,effectiveTeacher,weekLabel]);

  // জমা দেওয়া
  const handleSubmit=(plan)=>{
    // একই সপ্তাহে একই বিষয়ে আগে জমা থাকলে replace
    setLessonPlans(prev=>{
      const existing=(prev._v2||[]);
      const filtered=existing.filter(p=>!(p.type==="weekly"&&p.teacher===plan.teacher&&p.cls===plan.cls&&p.subject===plan.subject&&p.weekLabel===plan.weekLabel));
      return{...prev,_v2:[...filtered,plan]};
    });
    setShowForm(null);
    flash("✓ পাঠ পরিকল্পনা সফলভাবে জমা দেওয়া হয়েছে! অনুমোদনের জন্য অপেক্ষা করুন।");
  };

  // Admin অনুমোদন — approve হলে exam entries extract করে examSchedule এ যোগ
  const handleApprove=(id)=>{
    const allV2=lessonPlans._v2||[];
    const plan=allV2.find(p=>p.id===id);
    setLessonPlans(prev=>({...prev,_v2:(prev._v2||[]).map(p=>p.id===id?{...p,status:LP_STATUS.APPROVED,reviewedAt:new Date().toISOString()}:p)}));
    // Weekly LP থেকে পরীক্ষার এন্ট্রি extract
    if(plan&&plan.type==="weekly"&&plan.rows){
      const newExams=plan.rows
        .filter(r=>r.hasExam)
        .map(r=>({
          id:`${plan.id}__${r.date}`,
          teacher:plan.teacher,
          cls:plan.cls||"",
          subject:plan.subject||"",
          date:r.date,
          dayLabel:r.dayLabel,
          weekLabel:plan.weekLabel||"",
          examNote:r.examNote||"",
          status:"pending" // pending | taken | nottaken | excused
        }));
      if(newExams.length>0){
        setExamSchedule(prev=>{
          // একই id এর পুরনো entry replace করো
          const ids=new Set(newExams.map(e=>e.id));
          return [...prev.filter(e=>!ids.has(e.id)),...newExams];
        });
      }
    }
    setViewPlan(null);
    flash("✅ পাঠ পরিকল্পনা অনুমোদন করা হয়েছে।");
  };

  // ফিল্টার (history tab)
  const filteredHistory=useMemo(()=>{
    let list=[...allPlans].reverse();
    if(!isAdmin)list=list.filter(p=>p.teacher===currentTeacher);
    if(filterTeacher!=="সব")list=list.filter(p=>p.teacher===filterTeacher);
    if(filterStatus!=="সব")list=list.filter(p=>p.status===filterStatus);
    return list;
  },[allPlans,isAdmin,currentTeacher,filterTeacher,filterStatus]);

  const pendingCount=allPlans.filter(p=>p.status===LP_STATUS.PENDING).length;
  const myPendingCount=isAdmin?pendingCount:allPlans.filter(p=>p.teacher===currentTeacher&&p.status===LP_STATUS.PENDING).length;

  const statusColor={pending:"#f59e0b",approved:"#22c55e",rejected:"#ef4444"};
  const statusLabel={pending:"⏳ অপেক্ষমান",approved:"✅ অনুমোদিত",rejected:"✗ প্রত্যাখ্যাত"};

  // সময় বাকি / পর্যন্ত
  const now=new Date();
  const timeInfo=(()=>{
    if(windowOpen){
      const ms=windowEnd-now;
      return{text:`সাবমিশন বন্ধ হবে ${formatCountdown(ms)} পরে`,color:"#22c55e",open:true};
    } else {
      const ms=windowStart-now;
      if(ms>0)return{text:`পরবর্তী উইন্ডো ${formatCountdown(ms)} পরে (বৃহস্পতিবার ৪:০০ PM)`,color:"#f59e0b",open:false};
      return{text:"উইন্ডো বন্ধ",color:"#ef4444",open:false};
    }
  })();

  return(<div>
    {/* ফর্ম মোডাল */}
    {showForm&&windowOpen&&(
      <WeeklyLPForm
        teacher={effectiveTeacher}
        assignment={showForm.assignment}
        weekDays={weekDays}
        weekLabel={weekLabel}
        existingPlan={showForm.existing||null}
        onSubmit={handleSubmit}
        onCancel={()=>setShowForm(null)}/>
    )}

    {/* ভিউ মোডাল */}
    {viewPlan&&(
      <WeeklyLPViewModal
        plan={viewPlan}
        onClose={()=>setViewPlan(null)}
        isAdmin={isAdmin}
        onApprove={handleApprove}/>
    )}

    <H2>📚 লেসন প্ল্যান ব্যবস্থাপনা</H2>

    {msg&&(
      <div style={{background:msg.type==="success"?"#f0fdf4":"#fff0f0",border:`1px solid ${msg.type==="success"?"#22c55e":"#ef4444"}40`,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,fontWeight:600,color:msg.type==="success"?"#16a34a":"#dc2626"}}>
        {msg.text}
      </div>
    )}

    {/* লগইন কার্ড */}
    <Card style={{padding:"10px 12px",marginBottom:12,background:isAdmin?"linear-gradient(135deg,#5344b508,#7c3aed08)":"linear-gradient(135deg,#0f6e5608,#e1f5ee)",border:`1px solid ${isAdmin?"#5344b5":"#0f6e56"}25`}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:26}}>{isAdmin?"👑":isRep?"⚡":"👤"}</div>
          <div>
            <div style={{fontWeight:700,fontSize:13,color:isAdmin?"#5344b5":isRep?"#e67e22":"#0f6e56"}}>{isAdmin?"একাডেমিক ইনচার্জ":isRep?"প্রতিনিধি: "+currentTeacher:currentTeacher}</div>
            <div style={{fontSize:11,color:"#666",marginTop:1}}>{isAdmin?"সকল পাঠ পরিকল্পনা দেখতে ও অনুমোদন দিতে পারবেন":isRep?"অন্য শিক্ষকের পক্ষে পাঠ পরিকল্পনা জমা দিতে পারবেন":"পাঠ পরিকল্পনা জমা দিতে ও নিজের প্ল্যানের অবস্থা দেখতে পারবেন"}</div>
            {isRep&&(
              <div style={{marginTop:6,display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:11,color:"#e67e22",fontWeight:700}}>কার পক্ষে:</span>
                <select value={repTargetTeacher} onChange={e=>setRepTargetTeacher(e.target.value)}
                  style={{fontSize:12,padding:"3px 7px",border:"1px solid #e67e22",borderRadius:6,color:"#e67e22",fontWeight:600,outline:"none"}}>
                  {TEACHERS.filter(t=>t!==REP_TEACHER).map(t=><option key={t} value={t}>{t}</option>)}
                </select>
              </div>
            )}
          </div>
        </div>
        {/* উইন্ডো স্ট্যাটাস */}
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:10,fontWeight:700,color:timeInfo.color,background:timeInfo.color+"15",border:`1px solid ${timeInfo.color}40`,borderRadius:8,padding:"4px 8px"}}>
            {timeInfo.open?"🟢 উইন্ডো খোলা":"🔴 উইন্ডো বন্ধ"}
          </div>
          <div style={{fontSize:9,color:"#888",marginTop:3}}>{timeInfo.text}</div>
        </div>
      </div>
    </Card>

    {/* ট্যাব */}
    <div style={{display:"flex",gap:6,marginBottom:12}}>
      {[["weekly","📋 এই সপ্তাহ"],["history","📂 ইতিহাস"]].map(([k,l])=>(
        <button key={k} onClick={()=>setTab(k)}
          style={{padding:"8px 16px",borderRadius:10,border:"none",background:tab===k?"#5344b5":"#ede9fd",color:tab===k?"#fff":"#5344b5",cursor:"pointer",fontWeight:700,fontSize:13}}>
          {l}{k==="history"&&pendingCount>0&&isAdmin?` (${pendingCount}⏳)`:""}
        </button>
      ))}
    </div>

    {/* ══ এই সপ্তাহের ভিউ ══ */}
    {tab==="weekly"&&(
      <div>
        {/* সপ্তাহের তথ্য */}
        <Card style={{padding:"10px 14px",marginBottom:12,background:"#f8f7ff",border:"1px solid #5344b520"}}>
          <div style={{fontWeight:700,fontSize:13,color:"#5344b5",marginBottom:4}}>📅 পরবর্তী সপ্তাহ</div>
          <div style={{fontSize:12,color:"#555"}}>{weekDays[0]?.label?.split("(")[1]?.replace(")","") || "—"} থেকে {weekDays[5]?.label?.split("(")[1]?.replace(")","") || "—"}</div>
          {!windowOpen&&(
            <div style={{marginTop:8,padding:"8px 10px",background:"#fff8e1",border:"1px solid #f59e0b40",borderRadius:8,fontSize:12,color:"#92400e"}}>
              ⚠️ সাবমিশন উইন্ডো বন্ধ। প্রতি বৃহস্পতিবার বিকেল ৪:০০ PM থেকে শনিবার রাত ১২:০০ AM পর্যন্ত জমা দেওয়া যাবে।
            </div>
          )}
        </Card>

        {/* শিক্ষকের বিষয়ভিত্তিক ছক (teacher view) */}
        {!isAdmin&&(
          <div>
            {myAssignments.length===0?(
              <Card>
                <div style={{textAlign:"center",padding:28,color:"#888",fontSize:13}}>
                  📌 অনুগ্রহ করে একাডেমিক ইনচার্জকে আপনার জন্য বিষয় নির্ধারণ করে দিতে বলুন।
                </div>
              </Card>
            ):(
              myAssignments.map((asgn,i)=>{
                const key=`${asgn.cls}__${asgn.sub}`;
                const submitted=submittedThisWeek[key];
                const sc=submitted?statusColor[submitted.status]||"#888":null;
                const sl=submitted?statusLabel[submitted.status]||"":null;
                return(
                  <Card key={i} style={{marginBottom:10,border:`1px solid ${submitted?"#5344b530":"#e0d9f7"}`,background:submitted?"#fafffe":"#fff"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:13,color:"#5344b5"}}>
                          {asgn.sub}{asgn.cls&&<span style={{fontSize:11,color:"#888",marginLeft:6}}>• শ্রেণি {asgn.cls}</span>}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        {submitted&&(
                          <span style={{background:sc+"22",color:sc,border:`1px solid ${sc}55`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>{sl}</span>
                        )}
                        {windowOpen?(
                          <button
                            onClick={()=>setShowForm({assignment:asgn,existing:submitted||null})}
                            style={{padding:"7px 14px",borderRadius:8,border:"none",background:submitted?"#f59e0b":"#5344b5",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12}}>
                            {submitted?"✏️ সম্পাদনা":"➕ জমা দিন"}
                          </button>
                        ):(
                          <span style={{fontSize:11,color:"#f59e0b",fontWeight:600}}>🔒 উইন্ডো বন্ধ</span>
                        )}
                        {submitted&&(
                          <button onClick={()=>setViewPlan(submitted)}
                            style={{padding:"7px 10px",borderRadius:8,border:"1px solid #5344b530",background:"#f3eeff",color:"#5344b5",cursor:"pointer",fontSize:12}}>
                            👁️
                          </button>
                        )}
                      </div>
                    </div>

                    {/* submitted plan এর preview */}
                    {submitted&&(
                      <div style={{background:"#f8f7ff",borderRadius:8,padding:"8px 10px",fontSize:11,color:"#555"}}>
                        <div style={{marginBottom:4,fontWeight:600,color:"#5344b5"}}>জমা দেওয়া পরিকল্পনার সারসংক্ষেপ:</div>
                        {(submitted.rows||[]).filter(r=>r.lessonPlan).slice(0,2).map((r,j)=>(
                          <div key={j} style={{marginBottom:3}}>
                            <span style={{fontWeight:600}}>{r.dayLabel.split("(")[0].trim()}: </span>
                            <span style={{color:"#444"}}>{r.lessonPlan.substring(0,60)}{r.lessonPlan.length>60?"...":""}</span>
                          </div>
                        ))}
                        {(submitted.rows||[]).filter(r=>r.lessonPlan).length>2&&(
                          <div style={{color:"#888",fontSize:10}}>...আরো {(submitted.rows||[]).filter(r=>r.lessonPlan).length-2} দিন</div>
                        )}
                      </div>
                    )}
                  </Card>
                );
              })
            )}
          </div>
        )}

        {/* Admin view — সব শিক্ষকের এই সপ্তাহের স্ট্যাটাস */}
        {isAdmin&&(
          <div>
            {pendingCount>0&&(
              <div style={{marginBottom:10,padding:"10px 14px",background:"#fff8e1",border:"1px solid #f59e0b40",borderRadius:10,fontSize:13,fontWeight:700,color:"#92400e"}}>
                ⏳ {pendingCount}টি পাঠ পরিকল্পনা অনুমোদনের অপেক্ষায়
              </div>
            )}
            {/* এই সপ্তাহের অপেক্ষমান */}
            {allPlans.filter(p=>p.status===LP_STATUS.PENDING&&p.weekLabel===weekLabel).length>0&&(
              <Card style={{marginBottom:10}}>
                <div style={{fontWeight:700,fontSize:12,color:"#f59e0b",marginBottom:8}}>⏳ এই সপ্তাহের অপেক্ষমান পরিকল্পনা</div>
                {allPlans.filter(p=>p.status===LP_STATUS.PENDING&&p.weekLabel===weekLabel).map((p,i)=>(
                  <div key={p.id} onClick={()=>setViewPlan(p)}
                    style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"#fff8e1",border:"1px solid #f59e0b40",borderRadius:8,marginBottom:6,cursor:"pointer"}}>
                    <div>
                      <div style={{fontWeight:600,fontSize:12,color:"#333"}}>{p.teacher} — {p.subject}{p.cls&&` (শ্রেণি ${p.cls})`}</div>
                      <div style={{fontSize:10,color:"#888",marginTop:2}}>{p.weekLabel}</div>
                    </div>
                    <button style={{padding:"5px 12px",borderRadius:8,border:"none",background:"#22c55e",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:11}}>
                      ✅ অনুমোদন
                    </button>
                  </div>
                ))}
              </Card>
            )}
            {/* শিক্ষকভিত্তিক এই সপ্তাহের স্ট্যাটাস */}
            <Card>
              <div style={{fontWeight:700,fontSize:12,color:"#5344b5",marginBottom:10}}>📊 শিক্ষকভিত্তিক এই সপ্তাহের অবস্থা</div>
              {TEACHERS.map(t=>{
                const tAssign=getTeacherAssignments(t,teacherSubjects);
                if(!tAssign.length)return null;
                const tPlans=allPlans.filter(p=>p.teacher===t&&p.weekLabel===weekLabel);
                const tApproved=tPlans.filter(p=>p.status===LP_STATUS.APPROVED).length;
                const tPending=tPlans.filter(p=>p.status===LP_STATUS.PENDING).length;
                const tMissing=tAssign.length-tPlans.length;
                return(
                  <div key={t} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid #f0eeff"}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:12,color:"#333"}}>{t}</div>
                      <div style={{fontSize:10,color:"#888",marginTop:2}}>{tAssign.length}টি বিষয়</div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      {tApproved>0&&<span style={{fontSize:10,color:"#22c55e",fontWeight:700}}>✅{tApproved}</span>}
                      {tPending>0&&<span style={{fontSize:10,color:"#f59e0b",fontWeight:700}}>⏳{tPending}</span>}
                      {tMissing>0&&<span style={{fontSize:10,color:"#ef4444",fontWeight:700}}>❌{tMissing}</span>}
                    </div>
                  </div>
                );
              }).filter(Boolean)}
            </Card>
          </div>
        )}
      </div>
    )}

    {/* ══ ইতিহাস ট্যাব ══ */}
    {tab==="history"&&(
      <div>
        {/* ফিল্টার */}
        <Card style={{padding:"8px 12px",marginBottom:10}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{fontSize:12,padding:"5px 8px"}}>
              <option value="সব">সব অবস্থা</option>
              <option value="pending">⏳ অপেক্ষমান</option>
              <option value="approved">✅ অনুমোদিত</option>
            </select>
            {isAdmin&&(
              <select value={filterTeacher} onChange={e=>setFilterTeacher(e.target.value)} style={{fontSize:12,padding:"5px 8px"}}>
                <option value="সব">সব শিক্ষক</option>
                {TEACHERS.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            )}
            <span style={{fontSize:11,color:"#888"}}>{filteredHistory.length}টি</span>
          </div>
        </Card>

        {filteredHistory.length===0?(
          <Card><div style={{textAlign:"center",color:"#888",padding:28,fontSize:13}}>কোনো পাঠ পরিকল্পনা পাওয়া যায়নি।</div></Card>
        ):(
          filteredHistory.map((p,i)=>{
            const sc=statusColor[p.status]||"#888";
            const sl=statusLabel[p.status]||p.status;
            return(
              <div key={p.id} onClick={()=>setViewPlan(p)}
                style={{background:"#fff",borderRadius:10,border:`1px solid ${p.status===LP_STATUS.PENDING&&isAdmin?"#f59e0b80":"#e0d9f7"}`,padding:"10px 12px",marginBottom:8,cursor:"pointer"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13,color:"#333",marginBottom:3}}>
                      {isAdmin&&<span style={{color:"#5344b5",fontWeight:700}}>{p.teacher} • </span>}
                      {p.subject}{p.cls&&` (শ্রেণি ${p.cls})`}
                    </div>
                    <div style={{fontSize:11,color:"#888"}}>{p.weekLabel}</div>
                  </div>
                  <span style={{background:sc+"22",color:sc,border:`1px solid ${sc}55`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,flexShrink:0}}>{sl}</span>
                </div>
              </div>
            );
          })
        )}
      </div>
    )}
  </div>);
}

/* ══════════════════════════════════════════════
   ★★★ KPI MODULE — UPGRADED ★★★
══════════════════════════════════════════════ */
function KPI({results,lessonPlans,obsData={},deadlines=[],dlSubmissions={},STUDENTS,examSchedule=[],teacherSubjects={}}){STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const [tab,setTab]=useState("ranking");
  const [selTeacher,setSelTeacher]=useState("");
  const [selProfile,setSelProfile]=useState(null);
  const [rankPeriod,setRankPeriod]=useState("yearly"); // "monthly" | "yearly" — র‍্যাংকিং ট্যাবের জন্য
  const allRes=Object.values(results).flat();

  // ── নির্বাচিত সময়কালের (মাসিক/বাৎসরিক) জন্য ফলাফল ও পাঠ পরিকল্পনা ফিল্টার — সবার জন্য একই
  // period-filtered ডেটাসেট, যাতে subject/class কঠিনতা-ফ্যাক্টর normalization সবার জন্য সমান হয় ──
  const periodRes=useMemo(()=>allRes.filter(r=>inRankPeriod(r.examDate||r.savedAt,rankPeriod,new Date())),[allRes,rankPeriod]);
  const periodLPs=useMemo(()=>({
    _v2:(lessonPlans._v2||[]).filter(p=>inRankPeriod(p.submittedAt||p.reviewedAt,rankPeriod,new Date())),
    ...Object.fromEntries(Object.entries(lessonPlans||{}).filter(([k])=>k!=="_v2")),
  }),[lessonPlans,rankPeriod]);
  const periodObsData=useMemo(()=>({
    ...obsData,
    peerObservations:(obsData.peerObservations||[]).filter(o=>inRankPeriod(o.dateISO,rankPeriod,new Date())),
  }),[obsData,rankPeriod]);

  // সব শিক্ষকের KPI গণনা (অ্যাডমিন/হেড স্যার/পরিচালক বাদে — সাধারণ শিক্ষকের সাথে তুলনা যথাযথ নয়)
  // — dense/joint rank (সমান স্কোরে একই র‍্যাংক) + কনফিডেন্স (কম ডেটা হলে নির্ভরযোগ্যতা কম) ──
  const kpiAll=useMemo(()=>{
    const scored=TEACHERS.filter(t=>!ADMIN_TEACHERS.includes(t)).map(teacher=>({teacher,...calcKPI(teacher,periodRes,periodLPs,periodObsData,deadlines,dlSubmissions,examSchedule,teacherSubjects)}));
    const withScore=scored.filter(k=>k.score>0);
    const withoutScore=scored.filter(k=>k.score===0);
    return[
      ...denseRank(withScore,"score").map(k=>({...k,rank:k._rank,total:withScore.length,confidence:Math.min(1,k.count/TEACHER_RANK_SHRINK_K)})),
      ...withoutScore.map(k=>({...k,rank:null,total:withScore.length,confidence:0})),
    ];
  },[periodRes,periodLPs,periodObsData,deadlines,dlSubmissions,examSchedule,teacherSubjects]);

  const gradeColor=g=>g==="A+"?C.gr:g==="A"?C.te:g==="B"?C.am:g==="C"||g==="D"?C.co:C.mu;

  // নির্বাচিত শিক্ষকের বিস্তারিত তথ্য (সব-সময়ের ডেটা — "বিস্তারিত" ট্যাব সবসময় সম্পূর্ণ ইতিহাস দেখায়)
  const detail=selTeacher?kpiAll.find(k=>k.teacher===selTeacher):null;
  const detailRes=selTeacher?allRes.filter(r=>r.teacher===selTeacher):[];

  // নির্বাচিত শিক্ষকের ছাত্রভিত্তিক উন্নতি
  // নির্বাচিত শিক্ষকের কম-নম্বর প্যাটার্ন বিশ্লেষণ ও স্বয়ংক্রিয় পরামর্শ
  const lowScoreAdvisory=useMemo(()=>{
    if(!selTeacher)return null;
    return computeTeacherLowScoreAdvisory(selTeacher,allRes);
  },[selTeacher,allRes]);

  const studentImprovements=useMemo(()=>{
    if(!selTeacher)return[];
    const map={};
    detailRes.forEach(r=>{
      const key=`${r.name}__${r.subject}`;
      if(!map[key])map[key]=[];
      map[key].push(r);
    });
    return Object.values(map).filter(e=>e.length>=2).map(entries=>{
      const sorted=[...entries].sort((a,b)=>(a.examOrder||1)-(b.examOrder||1));
      const first=sorted[0].marks,last=sorted[sorted.length-1].marks,imp=last-first;
      return{name:sorted[0].name,subject:sorted[0].subject,first,last,imp};
    }).sort((a,b)=>b.imp-a.imp);
  },[selTeacher,detailRes]);

  const subjectPerf=useMemo(()=>{
    if(!selTeacher)return[];
    return SUBJECTS.map(sub=>{
      const sr=detailRes.filter(r=>r.subject===sub);
      if(!sr.length)return null;
      const avg=Math.round(sr.reduce((a,b)=>a+b.marks,0)/sr.length);
      const srP=sr.filter(r=>!r.absent);const pass=srP.filter(r=>r.marks>=(r.passMarks||33)).length;
      return{sub,avg,pass,fail:sr.length-pass,count:sr.length};
    }).filter(Boolean);
  },[selTeacher,detailRes]);

  const tabs=[{id:"ranking",label:"🏆 র‍্যাংকিং"},{id:"scorecard",label:"📊 স্কোরকার্ড"},{id:"detail",label:"🔍 বিস্তারিত"}];

    {/* KPI নিয়মের ব্যাখ্যা */}

        {[["🎯 ছাত্র উন্নতি","২৮%","দুর্বল ছাত্রের উন্নতিতে বেশি ক্রেডিট",C.gr],["💪 দুর্বল ছাত্র বোনাস","১৮%","ফেল→পাস = সর্বোচ্চ পুরস্কার",C.co],["📈 ধারাবাহিকতা","১৪%","গড় নম্বর বজায় রাখা",C.te],["📚 পাঠ পরিকল্পনা","৫%","নিয়মিত পাঠ সাবমিট",C.pu],["🔔 ডেডলাইন পালন","১০%","সময়মতো জমা না দিলে পেনাল্টি",C.re],["📅 উপস্থিতি","৫%","সময়মতো উপস্থিতি",C.am],["🔍 পরিদর্শন","৫%","ক্লাস পর্যবেক্ষণ স্কোর",C.pu],["📖 সিলেবাস","৫%","বাস্তব কভারেজ হার",C.te],["⭐ ফিডব্যাক","৫%","ছাত্রদের রেটিং",C.gr],["🎓 প্রশিক্ষণ","৫%","ওয়ার্কশপ অংশগ্রহণ",C.co]].map(([t,w,d,c])=>(
          <div key={t} style={{background:c+"12",border:`1px solid ${c}25`,borderRadius:8,padding:"8px 10px"}}>
            <div style={{fontWeight:700,fontSize:12,color:c}}>{t} <span style={{background:c,color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:10}}>{w}</span></div>
            <div style={{fontSize:11,color:C.mu,marginTop:3}}>{d}</div>
          </div>
        ))}
      </div>
      <div style={{marginTop:10,padding:"7px 10px",background:C.reL,borderRadius:7,border:`1px solid ${C.re}30`}}>
        <span style={{color:C.re,fontWeight:700,fontSize:12}}>★ বিশেষ নিয়ম: </span>

      <Card>

        <div style={{fontSize:11,color:C.mu,marginBottom:8}}>👆 নামে ক্লিক করলে প্রোফাইল দেখা যাবে। সমান স্কোরে একই র‍্যাংক (যুগ্ম র‍্যাংক)।</div>

                {lowScoreAdvisory.reasonStats.missingReasonCount>0&&` • কারণ লেখা হয়নি এমন পুরনো এন্ট্রি: ${lowScoreAdvisory.reasonStats.missingReasonCount}`}
              </div>
            )}
          </Card>
        )}

        {/* বিষয়ভিত্তিক পারফরম্যান্স */}
        {subjectPerf.length>0&&(<Card>
          <H3>বিষয়ভিত্তিক পারফরম্যান্স</H3>
          <table><thead><tr><th>বিষয়</th><th>গড়</th><th>পাস</th><th>ফেল</th></tr></thead><tbody>
            {subjectPerf.map(({sub,avg,pass,fail})=>{const[,gc]=getGrade(avg);return(<tr key={sub}><td style={{fontWeight:600}}>{sub}</td><td style={{fontWeight:700,color:gc}}>{avg}</td><td style={{color:C.gr,fontWeight:600}}>{pass}</td><td style={{color:C.re,fontWeight:600}}>{fail}</td></tr>);})}
          </tbody></table>
        </Card>)}

        {/* ছাত্রভিত্তিক উন্নতি */}
        {studentImprovements.length>0&&(<Card>
          <H3>ছাত্রভিত্তিক উন্নতি (KPI ভিত্তি)</H3>
          <table><thead><tr><th>ছাত্র</th><th>বিষয়</th><th>শুরু</th><th>শেষ</th><th>উন্নতি</th><th>ক্রেডিট</th></tr></thead><tbody>
            {studentImprovements.map(({name,subject,first,last,imp},i)=>{
              const credit=first<33&&imp>0?"সর্বোচ্চ":first<50&&imp>0?"বেশি":first<70&&imp>0?"মাঝারি":"কম";
              const cc=credit==="সর্বোচ্চ"?C.gr:credit==="বেশি"?C.te:credit==="মাঝারি"?C.am:C.mu;
              return(<tr key={i}><td style={{fontSize:11,fontWeight:500}}>{name}</td><td style={{fontSize:11}}>{subject}</td><td style={{color:C.co,fontWeight:600}}>{first}</td><td style={{color:C.gr,fontWeight:600}}>{last}</td><td>{badge(imp>0?C.gr:C.re,`${imp>0?"+":""}${imp}`)}</td><td>{badge(cc,credit)}</td></tr>);
            })}
          </tbody></table>
        </Card>)}

        {studentImprovements.length===0&&detail.count===0&&(<Card><div style={{textAlign:"center",color:C.mu,padding:20,fontSize:13}}>এই শিক্ষকের কোনো ফলাফল এন্ট্রি নেই।<br/><span style={{fontSize:11}}>পরীক্ষা মডিউলে শিক্ষক নির্বাচন করে ফলাফল দিন।</span></div></Card>)}
      </div>)}

      {!selTeacher&&(<Card><div style={{textAlign:"center",color:C.mu,padding:30,fontSize:13}}>উপরে একজন শিক্ষক বেছে নিন<br/><span style={{fontSize:11}}>বিস্তারিত KPI রিপোর্ট দেখতে পাবেন</span></div></Card>)}
    </div>)}
  </div>);
}

/* ══════════════════════════════════════════════
