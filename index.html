  if(mark>=80)return{grade:"A+",gpa:5.0,color:C.gr,label:"A+"};
  if(mark>=70)return{grade:"A",gpa:4.0,color:C.gr,label:"A"};
  if(mark>=60)return{grade:"A-",gpa:3.5,color:"#2e7d32",label:"A-"};
  if(mark>=50)return{grade:"B",gpa:3.0,color:C.am,label:"B"};
  if(mark>=40)return{grade:"C",gpa:2.0,color:C.co,label:"C"};
  if(mark>=33)return{grade:"D",gpa:1.0,color:C.re,label:"D"};
  return{grade:"F",gpa:0,color:"#333",label:"F"};
}

function calcPredictedGPA(subjectMarks,optionalMark,weeklyReports,studentName){
  if(!subjectMarks||subjectMarks.length===0)return null;

  // বিষয়ভিত্তিক GPA
  const gpas=subjectMarks.map(s=>sscGradeInfo(s.mark).gpa);
  const baseGPA=parseFloat((gpas.reduce((a,b)=>a+b,0)/gpas.length).toFixed(2));

  // Optional bonus
  let bonus=0;
  if(optionalMark!=null){
    const optGPA=sscGradeInfo(optionalMark).gpa;
    bonus=Math.max(0,optGPA-2.0);
  }

  // সাপ্তাহিক রিপোর্টের trend adjustment (±0.3 পর্যন্ত)
  let trendAdj=0;
  let trendLabel="";
  if(weeklyReports&&studentName){
    const reports=Object.values(weeklyReports).filter(r=>r.student===studentName)
      .sort((a,b)=>new Date(b.savedAt||0)-new Date(a.savedAt||0)).slice(0,4);
    if(reports.length>=2){
      const avgTarget=reports.reduce((a,r)=>a+(r.targetScore||0),0)/reports.length;
      const avgHabit=reports.reduce((a,r)=>{
        let done=0,total=0;
        Object.values(r.habitData||{}).forEach(days=>Object.values(days).forEach(v=>{total++;if(v)done++;}));
        return a+(total>0?(done/total)*100:50);
      },0)/reports.length;
      // target ৮০%+ → +0.2, habit ৭০%+ → +0.1
      if(avgTarget>=80){trendAdj+=0.2; trendLabel="📈 টার্গেট পূরণের হার ভালো";}
      else if(avgTarget>=60){trendAdj+=0.1; trendLabel="📊 মাঝারি অগ্রগতি";}
      else if(avgTarget<40){trendAdj-=0.2; trendLabel="📉 টার্গেট পূরণ হচ্ছে না";}
      if(avgHabit>=70)trendAdj+=0.1;
      else if(avgHabit<40)trendAdj-=0.1;
    }
  }

  const finalGPA=parseFloat(Math.min(5.0,Math.max(0,baseGPA+bonus+trendAdj)).toFixed(2));

  // বিষয়ভিত্তিক দুর্বলতা
  const weakSubjects=subjectMarks.filter(s=>s.mark!=null&&s.mark<50).map(s=>s.subject);
  const failSubjects=subjectMarks.filter(s=>s.mark!=null&&s.mark<33).map(s=>s.subject);

  // GPA বাড়ানোর সুপারিশ
  const suggestions=[];
  const sortedByMark=[...subjectMarks].filter(s=>s.mark!=null&&s.mark!=="").sort((a,b)=>a.mark-b.mark);
  if(failSubjects.length>0) suggestions.push(`🚨 ${failSubjects[0]} — ৩৩-এর নিচে, F grade ঝুঁকি`);
  if(weakSubjects.length>0&&!failSubjects.includes(weakSubjects[0])) suggestions.push(`⚠️ ${weakSubjects[0]} — উন্নতি করলে GPA বাড়বে`);
  if(sortedByMark.length>0&&sortedByMark[0].mark>=33&&sortedByMark[0].mark<60) suggestions.push(`📚 ${sortedByMark[0].subject} (${sortedByMark[0].mark}) — সবচেয়ে বেশি মনোযোগ দরকার`);
  if(trendAdj<0) suggestions.push("⏰ সাপ্তাহিক টার্গেট পূরণের হার বাড়াতে হবে");
  if(bonus===0&&optionalMark==null) suggestions.push("💡 Optional বিষয়ে ভালো করলে GPA বোনাস পাবে");

  return{baseGPA,bonus,trendAdj:parseFloat(trendAdj.toFixed(2)),trendLabel,finalGPA,weakSubjects,failSubjects,suggestions};
}

function calcRiskScore(profile,weeklyReports,studentName){
  // 0–100 risk score — ৭টি সিগন্যাল
  let risk=0;
  const breakdown={};
  const reports=Object.values(weeklyReports||{}).filter(r=>r.student===studentName).sort((a,b)=>new Date(b.savedAt||0)-new Date(a.savedAt||0));
  const last3=reports.slice(0,3);

  // ১. টার্গেট পূরণের হার (ওজন: ২৫)
  if(last3.length>0){
    const avgTarget=last3.reduce((a,r)=>a+(r.targetScore||0),0)/last3.length;
    const s=Math.max(0,25-avgTarget*0.25);
    risk+=s; breakdown.target={score:Math.round(s),label:"টার্গেট পূরণ",detail:`গড় ${Math.round(avgTarget)}%`};
  } else {risk+=15; breakdown.target={score:15,label:"টার্গেট পূরণ",detail:"ডেটা নেই"};}

  // ২. Self vs Teacher gap (ওজন: ২০)
  const gapReports=last3.filter(r=>r.selfScore!=null&&r.teacherScore!=null);
  if(gapReports.length>0){
    const avgGap=gapReports.reduce((a,r)=>a+Math.abs((r.selfScore||0)-(r.teacherScore||0)),0)/gapReports.length;
    const s=Math.min(20,avgGap*0.4);
    risk+=s; breakdown.gap={score:Math.round(s),label:"Self vs Teacher Gap",detail:`গড় ব্যবধান ${Math.round(avgGap)}%`};
  } else {breakdown.gap={score:0,label:"Self vs Teacher Gap",detail:"যাচাই নেই"};}

  // ৩. মনোবল (ওজন: ১৫)
  const moraleReports=last3.filter(r=>r.morale!=null);
  if(moraleReports.length>0){
    const avgMorale=moraleReports.reduce((a,r)=>a+(r.morale||3),0)/moraleReports.length;
    const s=Math.max(0,(3-avgMorale)*5);
    risk+=s; breakdown.morale={score:Math.round(s),label:"মনোবল",detail:`গড় ${avgMorale.toFixed(1)}/৫`};
  } else {breakdown.morale={score:0,label:"মনোবল",detail:"ডেটা নেই"};}

  // ৪. পড়ার সময় (ওজন: ১৫)
  const hoursReports=last3.filter(r=>r.avgHours!=null);
  if(hoursReports.length>0){
    const avgHours=hoursReports.reduce((a,r)=>a+(parseFloat(r.avgHours)||0),0)/hoursReports.length;
    const s=Math.max(0,(5-avgHours)*3);
    risk+=s; breakdown.hours={score:Math.round(s),label:"পড়ার সময়",detail:`গড় ${avgHours.toFixed(1)} ঘণ্টা/দিন`};
  } else {breakdown.hours={score:0,label:"পড়ার সময়",detail:"ডেটা নেই"};}

  // ৫. অভ্যাস পালনের হার (ওজন: ১০)
  const habitReports=last3.filter(r=>r.habitData&&Object.keys(r.habitData).length>0);
  if(habitReports.length>0){
    const avgHabit=habitReports.reduce((a,r)=>{
      let done=0,total=0;
      Object.values(r.habitData||{}).forEach(days=>Object.values(days).forEach(v=>{total++;if(v)done++;}));
      return a+(total>0?(done/total)*100:50);
    },0)/habitReports.length;
    const s=Math.max(0,(60-avgHabit)*0.17);
    risk+=s; breakdown.habit={score:Math.round(s),label:"অভ্যাস পালন",detail:`গড় ${Math.round(avgHabit)}%`};
  } else {breakdown.habit={score:0,label:"অভ্যাস পালন",detail:"ডেটা নেই"};}

  // ৬. উদ্বেগ ও সমস্যা (ওজন: ১০)
  const lastReport=last3[0];
  if(lastReport){
    let s=0;
    if(lastReport.anxiety==="সবসময়")s+=8;
    else if(lastReport.anxiety==="প্রায়ই")s+=5;
    else if(lastReport.anxiety==="মাঝে মাঝে")s+=2;
    s+=Math.min(7,(lastReport.problems||[]).length*2);
    s=Math.min(10,s);
    risk+=s; breakdown.anxiety={score:Math.round(s),label:"উদ্বেগ ও সমস্যা",detail:`${(lastReport.problems||[]).length}টি সমস্যা · উদ্বেগ: ${lastReport.anxiety||"—"}`};
  } else {breakdown.anxiety={score:0,label:"উদ্বেগ ও সমস্যা",detail:"ডেটা নেই"};}

  // ৭. GPA পূর্বানুমান (ওজন: ৫)
  if(profile?.subjectMarks?.length>0){
    const validMarks=profile.subjectMarks.filter(s=>s.mark!=null&&s.mark!=="");
    const gpa=validMarks.length>0?calcPredictedGPA(validMarks,profile.optionalMark,weeklyReports,studentName):null;
    if(gpa){
      const s=Math.max(0,(3.0-gpa.finalGPA)*1.5);
      risk+=s; breakdown.gpa={score:Math.round(s),label:"সম্ভাব্য GPA",detail:`GPA ${gpa.finalGPA}`};
    }
  } else {breakdown.gpa={score:0,label:"সম্ভাব্য GPA",detail:"নম্বর নেই"};}

  const total=Math.min(100,Math.round(risk));
  return{score:total,breakdown,reportsCount:last3.length};
}

// backward compat wrapper
function calcRiskScoreSimple(profile,weeklyReports,studentName){
  const r=calcRiskScore(profile,weeklyReports,studentName);
  return typeof r==="object"?r.score:r;
}

function RiskBadge({score}){
  const s=typeof score==="object"?score.score:score;
  const color=s>=70?"#b22222":s>=40?C.am:C.gr;
  const label=s>=70?"🚨 সংকটাপন্ন":s>=40?"⚠️ সতর্কতা":"✅ স্বাভাবিক";
  return <span style={{background:color+"22",border:`1px solid ${color}`,color,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>{label} ({s})</span>;
}

                {deptSubjects.map(subj=>{
                  const mark=getMark(subj);
                  const g=mark!==""&&mark!=null?sscGradeInfo(parseFloat(mark)):null;
                  return(
                    <div key={subj} style={{padding:"7px 8px",background:"#f5f5f5",borderRadius:8}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:mark!==""&&mark!=null?4:0}}>
                        <div style={{flex:1,fontSize:12,fontWeight:500}}>{subj}</div>
                        <input type="number" min="0" max="100" value={mark} onChange={e=>isAdmin&&handleSaveMark(subj,e.target.value)}
                          disabled={!isAdmin} placeholder="—"
                          style={{width:50,padding:"4px 6px",border:`1px solid ${g?g.color:C.bd}`,borderRadius:6,fontSize:12,fontWeight:700,textAlign:"center",outline:"none",background:"#fff"}}/>
                        {g&&<span style={{fontSize:11,fontWeight:700,color:g.color,minWidth:22}}>{g.grade}</span>}
                      </div>
                      {mark!==""&&mark!=null&&(
                        <div style={{background:"#e0e0e0",borderRadius:20,height:5,overflow:"hidden"}}>
                          <div style={{width:`${mark}%`,height:5,background:g?.color||C.gr,borderRadius:20}}/>
                        </div>
                      )}
                    </div>
                  );
                })}
                <div style={{padding:"6px 8px",background:"#fff8e1",borderRadius:8,border:"1px dashed #C8960C"}}>
                  <div style={{fontSize:11,color:"#854f0b",fontWeight:600,marginBottom:4}}>🌟 Optional বিষয় (GPA বোনাস)</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{flex:1,fontSize:12}}>Optional নম্বর (১০০-এ)</div>
                    <input type="number" min="0" max="100" value={optionalMark??""} onChange={e=>isAdmin&&setOptionalMark(e.target.value===""?null:parseFloat(e.target.value))}
                      disabled={!isAdmin} placeholder="—"
                      style={{width:50,padding:"4px 6px",border:`1px solid ${C.am}`,borderRadius:6,fontSize:12,fontWeight:700,textAlign:"center",outline:"none"}}/>
                    {optionalMark!=null&&<span style={{fontSize:11,fontWeight:700,color:sscGradeInfo(optionalMark).color}}>{sscGradeInfo(optionalMark).grade}</span>}
                  </div>
                </div>
              </div>
              {isAdmin&&<button onClick={handleSave} style={{width:"100%",marginTop:12,padding:"10px",background:"#1B3A6B",color:"#fff",border:"none",borderRadius:10,fontWeight:700,cursor:"pointer",fontSize:13}}>💾 নম্বর সংরক্ষণ</button>}
            </div>
          )}
          {tab==="reports"&&(
            <div>
              {myReports.length===0?(
                <div style={{textAlign:"center",padding:24,color:C.mu,fontSize:12}}>এখনো কোনো সাপ্তাহিক রিপোর্ট নেই।</div>
              ):(
                <div>
                  {/* ── Sparkline Charts ── */}
                  {(()=>{
                    const sorted=[...myReports].reverse(); // পুরনো থেকে নতুন
                    const n=sorted.length;
                    if(n<1)return null;

                    const W=300,H=50,pad=6;
                    const drawLine=(points,color)=>{
                      if(points.length<2)return null;
                      const xs=points.map((_,i)=>pad+(i/(n-1||1))*(W-pad*2));
                      const max=Math.max(...points,1);
                      const min=Math.min(...points,0);
                      const range=max-min||1;
                      const ys=points.map(v=>H-pad-((v-min)/range)*(H-pad*2));
                      const d=xs.map((x,i)=>`${i===0?"M":"L"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
                      const last=points[points.length-1];
                      const lastColor=color;
                      return(
                        <g>
                          <path d={d} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
                          {xs.map((x,i)=>(
                            <circle key={i} cx={x} cy={ys[i]} r="3" fill={color} opacity="0.8"/>
                          ))}
                          <text x={xs[xs.length-1]+4} y={ys[ys.length-1]+4} fontSize="8" fill={lastColor} fontWeight="700">{last}</text>
                        </g>
                      );
                    };

                    const metrics=[
                      {label:"🎯 টার্গেট পূরণ (%)",key:"targetScore",color:"#1B3A6B",max:100},
                      {label:"📚 Self Score (%)",key:"selfScore",color:"#1a6b3a",max:100},
                      {label:"✅ Teacher Score (%)",key:"teacherScore",color:"#854f0b",max:100},
                      {label:"💪 মনোবল (১–৫)",key:"morale",color:C.am,max:5},
                      {label:"⏰ পড়ার সময় (ঘণ্টা/দিন)",key:"avgHours",color:"#5c35a0",max:12},
                    ];

                    return(
                      <div style={{marginBottom:12}}>
                        <div style={{fontSize:11,fontWeight:700,color:C.mu,marginBottom:8}}>📈 সাপ্তাহিক Trend Chart</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                          {metrics.map(m=>{
                            const pts=sorted.map(([,r])=>r[m.key]??null).filter(v=>v!=null);
                            if(pts.length===0)return null;
                            const latest=pts[pts.length-1];
                            const prev=pts.length>1?pts[pts.length-2]:null;
                            const trend=prev!=null?(latest>prev?"↑":latest<prev?"↓":"→"):null;
                            const trendColor=trend==="↑"?C.gr:trend==="↓"?C.re:C.mu;
                            return(
                              <div key={m.key} style={{background:"#f9f9f9",border:`1px solid #e0e0e0`,borderRadius:10,padding:"8px 10px",flex:"1 1 140px",minWidth:140}}>
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                                  <div style={{fontSize:9,color:C.mu,fontWeight:600}}>{m.label}</div>
                                  {trend&&<span style={{fontSize:12,fontWeight:800,color:trendColor}}>{trend}</span>}
                                </div>
                                <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block",overflow:"visible"}}>
                                  {/* Grid lines */}
                                  {[0,0.5,1].map(t=>(
                                    <line key={t} x1={pad} y1={pad+(1-t)*(H-pad*2)} x2={W-pad} y2={pad+(1-t)*(H-pad*2)}
                                      stroke="#e0e0e0" strokeWidth="1" strokeDasharray="3,3"/>
                                  ))}
                                  {drawLine(pts,m.color)}
                                </svg>
                                <div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:C.mu,marginTop:2}}>
                                  <span>{sorted[0]?.[1]?.weekLabel?.slice(5)||"শুরু"}</span>
                                  <span style={{fontWeight:700,color:m.color}}>{latest}{m.key==="morale"?"⭐":m.key==="avgHours"?"ঘণ্টা":"%"}</span>
                                </div>
                              </div>
                            );
                          })}
                        </div>

                        {/* সপ্তাহ labels */}
                        <div style={{fontSize:9,color:C.mu,marginTop:4,textAlign:"center"}}>
                          {n}টি সপ্তাহের ডেটা দেখানো হচ্ছে
                        </div>
                      </div>
                    );
                  })()}

                  {/* ── Weekly Report Cards ── */}
                  <div style={{fontSize:11,color:C.mu,marginBottom:8,fontWeight:600}}>📋 সাপ্তাহিক রিপোর্টের বিবরণ</div>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {myReports.slice(0,6).map(([wk,r])=>{
                      const habitDone=Object.values(r.habitData||{}).reduce((a,days)=>a+Object.values(days||{}).filter(Boolean).length,0);
                      const habitTotal=Object.values(r.habitData||{}).reduce((a,days)=>a+Object.values(days||{}).length,0);
                      const habitPct=habitTotal>0?Math.round((habitDone/habitTotal)*100):null;
                      return(
                        <div key={wk} style={{background:"#f5f5f5",borderRadius:10,padding:"10px 12px",border:`1px solid ${(r.targetScore||0)>=70?"#a5d6a7":(r.targetScore||0)>=40?"#ffe082":"#ef9a9a"}`}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                            <div style={{fontWeight:700,fontSize:12,color:C.tx}}>📅 {r.weekLabel||wk}</div>
                            <div style={{fontWeight:800,fontSize:13,color:(r.targetScore||0)>=70?C.gr:(r.targetScore||0)>=40?C.am:C.re}}>
                              {r.targetScore||0}% টার্গেট
                            </div>
                          </div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,fontSize:10,color:C.mu,marginBottom:4}}>
                            <div>📚 Self: <b style={{color:C.tx}}>{r.selfScore??"-"}%</b></div>
                            <div>✅ Teacher: <b style={{color:C.tx}}>{r.teacherScore??"-"}%</b></div>
                            <div>⏰ পড়া: <b style={{color:C.tx}}>{r.avgHours??"-"} ঘণ্টা/দিন</b></div>
                            <div>💪 মনোবল: <b style={{color:C.tx}}>{"⭐".repeat(r.morale||0)||"-"}</b></div>
                            {habitPct!=null&&<div>📋 অভ্যাস: <b style={{color:habitPct>=70?C.gr:habitPct>=40?C.am:C.re}}>{habitPct}%</b></div>}
                            {r.anxiety&&<div>😟 উদ্বেগ: <b style={{color:C.tx}}>{r.anxiety}</b></div>}
                          </div>
                          {r.problems?.length>0&&(
                            <div style={{fontSize:9,color:C.re,background:"#fdecea",borderRadius:6,padding:"3px 7px"}}>
                              🚨 {r.problems.slice(0,2).join(" · ")}{r.problems.length>2?` +${r.problems.length-2}টি`:""}
                            </div>
                          )}
                          {r.teacherNote&&(
                            <div style={{marginTop:4,fontSize:9,color:"#1B3A6B",background:"#eaf1fb",borderRadius:6,padding:"3px 7px",fontStyle:"italic"}}>
                              💬 {r.teacherNote}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Weekly Report Entry Modal ──────────────────────
function WeeklyReportModal({student,weekKey,weekLabel,target,existingReport,onSave,onClose,isAdmin,dept,deptSubjects}){
  const er=existingReport||{};
  // ── State ──────────────────────────────────────────
  const [entryTab,setEntryTab]=useState("subjects"); // subjects | daily | signals | teacher

  // বিষয়ভিত্তিক অগ্রগতি
  const allSubjects=[...COMMON_7_SUBJ,...(deptSubjects||[])];
  const [subjectData,setSubjectData]=useState(er.subjectData||{});
  const updateSubject=(subj,field,val)=>setSubjectData(prev=>({...prev,[subj]:{...(prev[subj]||{}),[field]:val}}));

  // দৈনিক পড়ার সময়
  const [dailyHours,setDailyHours]=useState(er.dailyHours||{});
  const updateHours=(day,val)=>setDailyHours(prev=>({...prev,[day]:val}));
  const totalHours=Object.values(dailyHours).reduce((a,b)=>a+(parseFloat(b)||0),0);
  const avgHours=totalHours>0?(totalHours/7).toFixed(1):0;

  // অভ্যাস ট্র্যাকার
  const [habitData,setHabitData]=useState(er.habitData||{});
  const toggleHabit=(habit,day)=>setHabitData(prev=>({...prev,[habit]:{...(prev[habit]||{}),[day]:!(prev[habit]||{})[day]}}));
  const habitScore=()=>{
    let done=0,total=0;
    HABITS.forEach(h=>DAYS_BN.forEach(d=>{total++;if((habitData[h]||{})[d])done++;}));
    return total>0?Math.round((done/total)*100):0;
  };

  // সমস্যা সংকেত
  const [problems,setProblems]=useState(er.problems||[]);
  const toggleProblem=p=>setProblems(prev=>prev.includes(p)?prev.filter(x=>x!==p):[...prev,p]);
  const [anxiety,setAnxiety]=useState(er.anxiety||"");
  const [hardestSubject,setHardestSubject]=useState(er.hardestSubject||"");
  const [helpNeeded,setHelpNeeded]=useState(er.helpNeeded||"");
  const [morale,setMorale]=useState(er.morale||3);
  const [discipline,setDiscipline]=useState(er.discipline||"আংশিক");

  // শিক্ষকের যাচাই
  const [teacherScore,setTeacherScore]=useState(er.teacherScore??null);
  const [gap,setGap]=useState(er.gap||"মিলেছে");
  const [teacherNote,setTeacherNote]=useState(er.teacherNote||"");
  const [nextInstruction,setNextInstruction]=useState(er.nextInstruction||"");

  // সামগ্রিক self score হিসাব (বিষয়ভিত্তিক গড়)
  const subjectScores=allSubjects.map(s=>parseFloat(subjectData[s]?.progress)||0);
  const selfScore=subjectScores.length>0?Math.round(subjectScores.reduce((a,b)=>a+b,0)/subjectScores.length):0;

  // টার্গেট পূরণ %
  const targetScore=Math.round(
    selfScore*0.3+
    (teacherScore!=null?teacherScore:selfScore)*0.3+
    Math.min(100,(avgHours/(target?.hoursTarget||6))*100)*0.15+
    (morale/5*100)*0.15+
    habitScore()*0.1
  );

  const handleSave=()=>{
    onSave(weekKey,student,{
      student,weekKey,weekLabel,
      subjectData,dailyHours,habitData,
      problems,anxiety,hardestSubject,helpNeeded,
      morale,discipline,
      selfScore,teacherScore,gap,teacherNote,nextInstruction,
      targetScore,avgHours:parseFloat(avgHours),totalHours,
      savedAt:new Date().toISOString()
    });
    onClose();
  };

  const tabStyle=(id)=>({
    padding:"6px 10px",borderRadius:"8px 8px 0 0",border:"none",
    borderBottom:entryTab===id?`2px solid #1a6b3a`:"2px solid transparent",
    background:"transparent",color:entryTab===id?"#1a6b3a":C.mu,
    cursor:"pointer",fontSize:11,fontWeight:entryTab===id?700:400,whiteSpace:"nowrap"
  });

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:9999,overflowY:"auto",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"16px 8px"}}>
      <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:480,boxShadow:"0 8px 40px rgba(0,0,0,0.2)"}}>

        {/* Header */}
        <div style={{background:"#1a6b3a",borderRadius:"16px 16px 0 0",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{color:"#fff",fontWeight:800,fontSize:14}}>📋 সাপ্তাহিক রিপোর্ট ইনপুট</div>
            <div style={{color:"rgba(255,255,255,0.8)",fontSize:11}}>{student} · {weekLabel}</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:20,padding:"4px 10px",cursor:"pointer"}}>✕</button>
        </div>

        {/* Progress Bar */}
        <div style={{padding:"8px 16px",background:"#f0faf4",borderBottom:`1px solid #ddd`,display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1,background:"#ddd",borderRadius:20,height:8,overflow:"hidden"}}>
            <div style={{width:`${targetScore}%`,height:8,background:targetScore>=70?"#1a6b3a":targetScore>=40?C.am:C.re,borderRadius:20,transition:"width 0.4s"}}/>
          </div>
          <div style={{fontWeight:800,fontSize:14,color:targetScore>=70?"#1a6b3a":targetScore>=40?C.am:C.re,minWidth:44}}>{targetScore}%</div>
          <div style={{fontSize:10,color:C.mu}}>টার্গেট পূরণ</div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:2,padding:"8px 12px 0",borderBottom:`1px solid ${C.bd}`,overflowX:"auto"}}>
          {[{id:"subjects",label:"📚 বিষয়"},{id:"daily",label:"⏰ দিনলিপি"},{id:"signals",label:"💪 সংকেত"},{id:"teacher",label:"✅ যাচাই"}].map(t=>(
            <button key={t.id} onClick={()=>setEntryTab(t.id)} style={tabStyle(t.id)}>{t.label}</button>
          ))}
        </div>

        <div style={{padding:"12px 16px",maxHeight:"60vh",overflowY:"auto"}}>

          {/* ── TAB 1: বিষয়ভিত্তিক অগ্রগতি ── */}
          {entryTab==="subjects"&&(
            <div>
              <div style={{fontSize:10,color:C.mu,marginBottom:8}}>প্রতিটি বিষয়ে টার্গেট পূরণ হয়েছে কিনা এবং অগ্রগতি % দিন</div>

              {/* সাধারণ বিষয় */}
              <div style={{fontSize:10,fontWeight:700,color:"#1B3A6B",background:"#eaf1fb",padding:"4px 8px",borderRadius:6,marginBottom:6}}>▸ সাধারণ বিষয়</div>
              {COMMON_7_SUBJ.map(subj=>{
                const sd=subjectData[subj]||{};
                return(
                  <div key={subj} style={{marginBottom:6,padding:"7px 10px",background:C.gray,borderRadius:8}}>
                    <div style={{fontWeight:600,fontSize:11,marginBottom:5,color:C.tx}}>{subj}</div>
                    <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                      <div style={{fontSize:10,color:C.mu}}>পড়েছি?</div>
                      {["হ্যাঁ","না"].map(v=>(
                        <button key={v} onClick={()=>updateSubject(subj,"read",v)}
                          style={{padding:"3px 10px",borderRadius:12,border:`1px solid ${sd.read===v?"#1a6b3a":C.bd}`,background:sd.read===v?"#e8f5ee":"#fff",color:sd.read===v?"#1a6b3a":C.mu,cursor:"pointer",fontSize:10,fontWeight:sd.read===v?700:400}}>{v}</button>
                      ))}
                      <div style={{fontSize:10,color:C.mu,marginLeft:4}}>অগ্রগতি:</div>
                      <input type="number" min="0" max="100" value={sd.progress||""} onChange={e=>updateSubject(subj,"progress",e.target.value)}
                        placeholder="%" style={{width:44,padding:"3px 5px",border:`1px solid ${C.bd}`,borderRadius:6,fontSize:11,textAlign:"center",outline:"none"}}/>
                      <span style={{fontSize:10,color:C.mu}}>%</span>
                    </div>
                    <div style={{marginTop:4}}>
                      <input value={sd.note||""} onChange={e=>updateSubject(subj,"note",e.target.value)}
                        placeholder="কোথায় আটকেছি (ঐচ্ছিক)..."
                        style={{width:"100%",padding:"3px 7px",border:`1px solid ${C.bd}`,borderRadius:6,fontSize:10,outline:"none"}}/>
                    </div>
                  </div>
                );
              })}

              {/* বিভাগীয় বিষয় */}
              {deptSubjects&&deptSubjects.length>0&&(
                <>
                  <div style={{fontSize:10,fontWeight:700,color:"#854f0b",background:"#fff8e1",padding:"4px 8px",borderRadius:6,marginBottom:6,marginTop:4}}>▸ বিভাগীয় বিষয়</div>
                  {deptSubjects.map(subj=>{
                    const sd=subjectData[subj]||{};
                    return(
                      <div key={subj} style={{marginBottom:6,padding:"7px 10px",background:"#fff8e1",borderRadius:8,border:`1px solid #ffe082`}}>
                        <div style={{fontWeight:700,fontSize:11,marginBottom:5,color:"#854f0b",fontStyle:"italic"}}>{subj}</div>
                        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                          <div style={{fontSize:10,color:C.mu}}>পড়েছি?</div>
                          {["হ্যাঁ","না"].map(v=>(
                            <button key={v} onClick={()=>updateSubject(subj,"read",v)}
                              style={{padding:"3px 10px",borderRadius:12,border:`1px solid ${sd.read===v?"#854f0b":C.bd}`,background:sd.read===v?"#fff8e1":"#fff",color:sd.read===v?"#854f0b":C.mu,cursor:"pointer",fontSize:10,fontWeight:sd.read===v?700:400}}>{v}</button>
                          ))}
                          <div style={{fontSize:10,color:C.mu,marginLeft:4}}>অগ্রগতি:</div>
                          <input type="number" min="0" max="100" value={sd.progress||""} onChange={e=>updateSubject(subj,"progress",e.target.value)}
                            placeholder="%" style={{width:44,padding:"3px 5px",border:`1px solid #ffe082`,borderRadius:6,fontSize:11,textAlign:"center",outline:"none"}}/>
                          <span style={{fontSize:10,color:C.mu}}>%</span>
                        </div>
                        <div style={{marginTop:4}}>
                          <input value={sd.note||""} onChange={e=>updateSubject(subj,"note",e.target.value)}
                            placeholder="কোথায় আটকেছি (ঐচ্ছিক)..."
                            style={{width:"100%",padding:"3px 7px",border:`1px solid #ffe082`,borderRadius:6,fontSize:10,outline:"none"}}/>
                        </div>
                      </div>
                    );
                  })}
                </>
              )}
            </div>
          )}

          {/* ── TAB 2: দৈনিক দিনলিপি ── */}
          {entryTab==="daily"&&(
            <div>
              {/* দৈনিক ঘণ্টা */}
              <div style={{fontSize:10,fontWeight:700,color:C.mu,marginBottom:6}}>⏰ প্রতিদিন মোট পড়ার সময় (ঘণ্টা)</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:8}}>
                {DAYS_BN.map(d=>(
                  <div key={d} style={{textAlign:"center"}}>
                    <div style={{background:"#1B3A6B",color:"#fff",fontSize:8,fontWeight:700,padding:"2px 0",borderRadius:"4px 4px 0 0"}}>{d}</div>
                    <input type="number" min="0" max="16" step="0.5" value={dailyHours[d]||""} onChange={e=>updateHours(d,e.target.value)}
                      placeholder="০" style={{width:"100%",padding:"4px 2px",border:`1px solid ${C.bd}`,borderRadius:"0 0 4px 4px",fontSize:12,textAlign:"center",outline:"none"}}/>
                  </div>
                ))}
              </div>
              <div style={{background:"#eaf1fb",borderRadius:8,padding:"6px 10px",marginBottom:14,display:"flex",gap:16,fontSize:11}}>
                <span>মোট: <b>{totalHours.toFixed(1)} ঘণ্টা</b></span>
                <span>গড়: <b>{avgHours} ঘণ্টা/দিন</b></span>
                <span>লক্ষ্য: <b>{target?.hoursTarget||6} ঘণ্টা/দিন</b></span>
              </div>

              {/* অভ্যাস ট্র্যাকার */}
              <div style={{fontSize:10,fontWeight:700,color:C.mu,marginBottom:6}}>📋 আবাসিক দিনলিপি — প্রতিদিনের অভ্যাস</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:9}}>
                  <thead>
                    <tr>
                      <th style={{textAlign:"left",padding:"4px 6px",background:"#f0f0f0",border:`1px solid ${C.bd}`,fontSize:9,minWidth:130}}>অভ্যাস</th>
                      {DAYS_BN.map(d=><th key={d} style={{padding:"4px 6px",background:"#f0f0f0",border:`1px solid ${C.bd}`,fontSize:9,textAlign:"center"}}>{d}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {HABITS.map(habit=>(
                      <tr key={habit}>
                        <td style={{padding:"3px 6px",border:`1px solid ${C.bd}`,fontSize:9,fontWeight:600}}>{habit}</td>
                        {DAYS_BN.map(d=>{
                          const done=(habitData[habit]||{})[d];
                          return(
                            <td key={d} onClick={()=>toggleHabit(habit,d)}
                              style={{padding:"3px",border:`1px solid ${C.bd}`,textAlign:"center",cursor:"pointer",
                                background:done?"#e8f5ee":"#fff",fontSize:13}}>
                              {done?"✓":""}
                            </td>
                          );
                        })}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{marginTop:8,fontSize:10,color:C.mu,textAlign:"right"}}>
                অভ্যাস পালনের হার: <b style={{color:habitScore()>=70?"#1a6b3a":habitScore()>=40?C.am:C.re}}>{habitScore()}%</b>
              </div>
            </div>
          )}

          {/* ── TAB 3: সংকেত ── */}
          {entryTab==="signals"&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {/* মনোবল */}
              <div style={{background:"#fff8e1",borderRadius:10,padding:"10px 12px"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#854f0b",marginBottom:8}}>💪 মনোবল (১–৫)</div>
                <div style={{display:"flex",gap:6}}>
                  {[{n:1,e:"😞"},{n:2,e:"😟"},{n:3,e:"😐"},{n:4,e:"🙂"},{n:5,e:"😊"}].map(({n,e})=>(
                    <button key={n} onClick={()=>setMorale(n)} style={{flex:1,padding:"8px 0",borderRadius:8,
                      border:`2px solid ${morale===n?"#C8960C":C.bd}`,
                      background:morale===n?"#fff8e1":"#fff",cursor:"pointer",fontSize:16,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <span>{e}</span>
                      <span style={{fontSize:9,color:C.mu}}>{n}</span>
                    </button>
                  ))}
                </div>
              </div>

              {/* শৃঙ্খলা */}
              <div style={{background:C.gray,borderRadius:10,padding:"10px 12px"}}>
                <div style={{fontSize:11,fontWeight:700,marginBottom:8}}>📋 শৃঙ্খলা</div>
                <div style={{display:"flex",gap:6}}>
                  {["সম্পূর্ণ","আংশিক","মানিনি"].map(d=>(
                    <button key={d} onClick={()=>setDiscipline(d)} style={{flex:1,padding:"6px 0",borderRadius:8,
                      border:`1px solid ${discipline===d?"#1a6b3a":C.bd}`,
                      background:discipline===d?"#e8f5ee":"#fff",
                      color:discipline===d?"#1a6b3a":C.mu,cursor:"pointer",fontSize:11,fontWeight:discipline===d?700:400}}>{d}</button>
                  ))}
                </div>
              </div>

              {/* SSC উদ্বেগ */}
              <div style={{background:C.gray,borderRadius:10,padding:"10px 12px"}}>
                <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>😟 পরীক্ষার উদ্বেগ</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {["একদমই না","সামান্য","মাঝে মাঝে","প্রায়ই","সবসময়"].map(a=>(
                    <button key={a} onClick={()=>setAnxiety(a)} style={{padding:"4px 10px",borderRadius:12,
                      border:`1px solid ${anxiety===a?"#b22222":C.bd}`,
                      background:anxiety===a?"#fdecea":"#fff",
                      color:anxiety===a?"#b22222":C.mu,cursor:"pointer",fontSize:10,fontWeight:anxiety===a?700:400}}>{a}</button>
                  ))}
                </div>
                <div style={{marginTop:8}}>
                  <div style={{fontSize:10,color:C.mu,marginBottom:4}}>সবচেয়ে কঠিন বিষয়</div>
                  <input value={hardestSubject} onChange={e=>setHardestSubject(e.target.value)} placeholder="বিষয়ের নাম..."
                    style={{width:"100%",padding:"5px 8px",border:`1px solid ${C.bd}`,borderRadius:6,fontSize:11,outline:"none"}}/>
                </div>
              </div>

              {/* সমস্যা সংকেত */}
              <div style={{background:"#fdecea",borderRadius:10,padding:"10px 12px",border:`1px solid #ffcdd2`}}>
                <div style={{fontSize:11,fontWeight:700,color:"#b22222",marginBottom:8}}>🚨 সমস্যা সংকেত (একাধিক বাছাই করা যাবে)</div>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {PROBLEMS_LIST.map(p=>(
                    <button key={p} onClick={()=>toggleProblem(p)} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",
                      borderRadius:8,border:`1px solid ${problems.includes(p)?"#b22222":C.bd}`,
                      background:problems.includes(p)?"#fdecea":"#fff",cursor:"pointer",textAlign:"left",fontSize:11,
                      color:problems.includes(p)?"#b22222":C.tx}}>
                      <span style={{fontSize:14}}>{problems.includes(p)?"☑":"☐"}</span>{p}
                    </button>
                  ))}
                </div>
              </div>

              {/* শিক্ষকের সাহায্য */}
              <div style={{background:C.gray,borderRadius:10,padding:"10px 12px"}}>
                <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>🙋 শিক্ষকের কাছে সাহায্য চাই</div>
                <textarea value={helpNeeded} onChange={e=>setHelpNeeded(e.target.value)} rows={2}
                  placeholder="কোন বিষয়ে বা কী ধরনের সাহায্য দরকার..."
                  style={{width:"100%",padding:"6px 8px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:11,outline:"none",resize:"vertical",boxSizing:"border-box"}}/>
              </div>
            </div>
          )}

          {/* ── TAB 4: শিক্ষকের যাচাই ── */}
          {entryTab==="teacher"&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{background:"#eaf1fb",borderRadius:10,padding:"10px 12px"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#1B3A6B",marginBottom:8}}>✅ Teacher Verification Score</div>
                <div style={{fontSize:10,color:C.mu,marginBottom:4}}>আসলে কতটুকু হয়েছে? ({teacherScore??selfScore}%)</div>
                <input type="range" min="0" max="100" value={teacherScore??selfScore} onChange={e=>setTeacherScore(parseInt(e.target.value))} style={{width:"100%"}}/>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:C.mu}}><span>কিছুই না</span><span>সম্পূর্ণ</span></div>

                <div style={{marginTop:10}}>
                  <div style={{fontSize:10,color:C.mu,marginBottom:4}}>Self vs Teacher Gap</div>
                  <div style={{display:"flex",gap:6}}>
                    {["মিলেছে","সামান্য বেশি","অনেক বেশি"].map(g=>(
                      <button key={g} onClick={()=>setGap(g)} style={{flex:1,padding:"5px 4px",borderRadius:8,
                        border:`1px solid ${gap===g?"#1B3A6B":C.bd}`,
                        background:gap===g?"#eaf1fb":"#fff",color:gap===g?"#1B3A6B":C.mu,
                        cursor:"pointer",fontSize:10,fontWeight:gap===g?700:400}}>{g}</button>
                    ))}
                  </div>
                </div>
              </div>

              <div style={{background:C.gray,borderRadius:10,padding:"10px 12px"}}>
                <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>📝 বিশেষ পর্যবেক্ষণ</div>
                <textarea value={teacherNote} onChange={e=>setTeacherNote(e.target.value)} rows={3}
                  placeholder="এই সপ্তাহে ছাত্র সম্পর্কে বিশেষ মন্তব্য..."
                  style={{width:"100%",padding:"6px 8px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:11,outline:"none",resize:"vertical",boxSizing:"border-box"}}/>
              </div>

              <div style={{background:C.gray,borderRadius:10,padding:"10px 12px"}}>
                <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>📌 পরবর্তী সপ্তাহের নির্দেশনা</div>
                <textarea value={nextInstruction} onChange={e=>setNextInstruction(e.target.value)} rows={2}
                  placeholder="আগামী সপ্তাহে বিশেষভাবে কী করতে হবে..."
                  style={{width:"100%",padding:"6px 8px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:11,outline:"none",resize:"vertical",boxSizing:"border-box"}}/>
              </div>

              {/* Summary */}
              <div style={{background:targetScore>=70?"#e8f5ee":targetScore>=40?"#fff8e1":"#fdecea",borderRadius:10,padding:"10px 12px"}}>
                <div style={{fontSize:11,fontWeight:700,marginBottom:8}}>📊 সামগ্রিক সারসংক্ষেপ</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:10}}>
                  <div>Self Score: <b>{selfScore}%</b></div>
                  <div>Teacher Score: <b>{teacherScore??"-"}%</b></div>
                  <div>গড় পড়ার সময়: <b>{avgHours} ঘণ্টা/দিন</b></div>
                  <div>অভ্যাস পালন: <b>{habitScore()}%</b></div>
                  <div>মনোবল: <b>{"⭐".repeat(morale)}</b></div>
                  <div>সমস্যা: <b>{problems.length}টি</b></div>
                </div>
                <div style={{marginTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:11,color:C.mu}}>সামগ্রিক টার্গেট পূরণ</span>
                  <span style={{fontWeight:800,fontSize:20,color:targetScore>=70?"#1a6b3a":targetScore>=40?C.am:C.re}}>{targetScore}%</span>
                </div>
              </div>
            </div>
          )}
        </div>

        {/* Footer Buttons */}
        <div style={{padding:"10px 16px",borderTop:`1px solid ${C.bd}`,display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"9px",background:C.gray,border:`1px solid ${C.bd}`,borderRadius:10,cursor:"pointer",fontSize:12,color:C.mu}}>বাতিল</button>
          <button onClick={handleSave} style={{flex:2,padding:"9px",background:"#1a6b3a",color:"#fff",border:"none",borderRadius:10,fontWeight:700,cursor:"pointer",fontSize:13}}>💾 রিপোর্ট সংরক্ষণ</button>
        </div>
      </div>
    </div>
  );
}

// ── SSC Print Tab Component ──────────────────────────
const COMMON_7_SUBJ=["বাংলা প্রথম পত্র","বাংলা দ্বিতীয় পত্র","English প্রথম পত্র","English দ্বিতীয় পত্র","গণিত","ধর্ম ও নৈতিক শিক্ষা","তথ্য ও যোগাযোগ প্রযুক্তি"];
const DEPT_PRINT_SUBJECTS={
  science:{label:"বিজ্ঞান",en:"Science",subjects:["পদার্থবিজ্ঞান","রসায়ন","জীববিজ্ঞান","উচ্চতর গণিত","বাংলাদেশ ও বিশ্বপরিচয়"]},
  arts:{label:"মানবিক",en:"Arts",subjects:["ইতিহাস ও বিশ্বসভ্যতা","ভূগোল ও পরিবেশ","অর্থনীতি","কৃষি শিক্ষা","বিজ্ঞান"]},
  commerce:{label:"ব্যবসায়",en:"Commerce",subjects:["হিসাববিজ্ঞান","ব্যবসায় উদ্যোগ","ফিনান্স ও ব্যাংকিং","কৃষি শিক্ষা","বিজ্ঞান"]}
};
const DAYS_BN=["রবি","সোম","মঙ্গল","বুধ","বৃহ","শুক্র","শনি"];
const HABITS=["ফজরের নামাজ","জোহরের নামাজ","আসরের নামাজ","মাগরিব ও এশার নামাজ","সকালের রুটিন মেনেছি","ক্লাসে মনোযোগী ছিলাম","না বোঝা বিষয় জিজ্ঞেস করেছি","নির্ধারিত পড়া শেষ করেছি","রাতের পড়া সম্পন্ন","নির্ধারিত সময়ে ঘুমিয়েছি"];
const PROBLEMS_LIST=["মনোযোগ ধরে রাখতে পারছি না","বিষয়টি বুঝতে পারছি না","অনুশীলনের সুযোগ পাচ্ছি না","শরীর অসুস্থ","হতাশ / উদ্বিগ্ন অনুভব করছি","শিক্ষকের সাথে কথা বলতে চাই","পরিবারের চিন্তা","পর্যাপ্ত ঘুম হচ্ছে না","সময় ব্যবস্থাপনায় সমস্যা"];

function buildPrintForm(deptKey){
  const dept=DEPT_PRINT_SUBJECTS[deptKey];
  const sq=`<span style="width:10px;height:10px;border:2px solid #000;display:inline-block;vertical-align:middle;flex-shrink:0"></span>`;
  const subjectRow=(name,isDept)=>`<tr>
    <td style="font-weight:${isDept?800:700};font-size:9.5px;padding:3px 4px;border:1px solid #888;${isDept?"font-style:italic":""}">${name}</td>
    <td style="border:1px solid #888;padding:3px 4px"><span style="border-bottom:1.5px solid #888;display:block;min-height:12px"></span></td>
    <td style="border:1px solid #888;padding:3px 4px;text-align:center;font-size:8.5px">${sq} হ্যাঁ &nbsp;${sq} না</td>
    <td style="border:1px solid #888;padding:3px 4px;text-align:center"><span style="border-bottom:1.5px solid #000;display:inline-block;width:30px;height:12px"></span>%</td>
    <td style="border:1px solid #888;padding:3px 4px"><span style="border-bottom:1.5px solid #888;display:block;min-height:12px"></span></td>
  </tr>`;

  return`<!DOCTYPE html><html lang="bn"><head><meta charset="UTF-8"/>
  <title>SSC Self-Report ফর্ম — ${dept.label} বিভাগ</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:Arial,sans-serif;font-size:10.5px;color:#000;background:#fff;}
    @media print{
      body{background:#fff;}
      button{display:none!important;}
      .form-page{padding:7mm 9mm;width:210mm;min-height:294mm;}
      *{color:#000!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    }
    @media screen{

      </Card>
    </div>
  );
}

// ── SSC Command Center Main Component ──────────────
function SSCCommandCenter({sscData,setSscData,results,STUDENTS,isAdmin,currentUser}){

    const day=d.getDay();

    setSscData(prev=>({...prev,profiles:{...prev.profiles,[student]:{...(prev.profiles||{})[student],...data}}}));

  const saveTargets=(wk,wkLabel,form)=>{
    setSscData(prev=>({...prev,weeklyTargets:{...(prev.weeklyTargets||{}),[wk]:form}}));
  };

  const saveReport=(wk,student,data)=>{
    setSscData(prev=>({...prev,weeklyReports:{...(prev.weeklyReports||{}),[`${wk}_${student}`]:data}}));
  };

  const riskScores=students.map(s=>({name:s,risk:calcRiskScore(profiles[s],weeklyReports,s),riskObj:calcRiskScore(profiles[s],weeklyReports,s)}));
  const highRisk=riskScores.filter(s=>s.riskObj.score>=70).length;
  const medRisk=riskScores.filter(s=>s.riskObj.score>=40&&s.riskObj.score<70).length;
  const onTrack=riskScores.filter(s=>s.riskObj.score<40).length;

  const weekReportKeys=Object.keys(weeklyReports).filter(k=>k.startsWith(selectedWeek));
  const completionRate=students.length>0?Math.round((weekReportKeys.length/students.length)*100):0;

        <div>
          <div style={{color:"rgba(255,255,255,0.7)",fontSize:11,fontWeight:600,letterSpacing:1}}>SSC ২০২৭ · দশম শ্রেণি</div>
          <div style={{color:"#fff",fontWeight:800,fontSize:18}}>{students.length} জন পরীক্ষার্থী</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:"rgba(255,255,255,0.7)",fontSize:11}}>পরীক্ষা পর্যন্ত বাকি</div>
          <div style={{color:"#C8960C",fontWeight:800,fontSize:24}}>{daysLeft} দিন</div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:12,overflowX:"auto",padding:"0 0 4px"}}>
        {[{id:"dashboard",label:"📊 ড্যাশবোর্ড"},{id:"weekly",label:"🎯 সাপ্তাহিক"},{id:"students",label:"👨‍🎓 ছাত্র তালিকা"},{id:"prediction",label:"🔮 পূর্বানুমান"},{id:"setup",label:"⚙️ সেটআপ"},{id:"print",label:"🖨️ প্রিন্ট ফর্ম"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"7px 12px",borderRadius:20,border:`1px solid ${tab===t.id?"#1B3A6B":C.bd}`,background:tab===t.id?"#1B3A6B":"transparent",color:tab===t.id?"#fff":C.mu,cursor:"pointer",fontSize:11,fontWeight:tab===t.id?700:400,whiteSpace:"nowrap",flexShrink:0}}>{t.label}</button>
        ))}
      </div>

      {/* ─ DASHBOARD TAB ─ */}
      {tab==="dashboard"&&(
        <div>
          {/* KPI Cards */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
            {[
              {label:"✅ স্বাভাবিক",val:onTrack,color:C.gr,bg:"#e8f5ee"},
              {label:"⚠️ সতর্কতা",val:medRisk,color:C.am,bg:"#fff8e1"},
              {label:"🚨 সংকটাপন্ন",val:highRisk,color:"#b22222",bg:"#fdecea"},

              <Card key={k.label} style={{padding:"10px 8px",textAlign:"center",background:k.bg,border:`1px solid ${k.color}22`}}>

            <div style={{background:"#eee",borderRadius:20,height:8,overflow:"hidden",marginBottom:8}}>

            <H3>🚨 At-Risk Radar</H3>

            {(()=>{

                return r?.anxiety==="সবসময়"||r?.anxiety==="প্রায়ই";

                    <div style={{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:8,padding:"7px 10px",fontSize:11}}>

                    </div>
                  )}
                  {noData.length>0&&(
                    <div style={{background:"#f5f5f5",border:`1px solid ${C.bd}`,borderRadius:8,padding:"7px 10px",fontSize:11}}>
                      📭 <b style={{color:C.mu}}>{noData.length} জনের কোনো রিপোর্ট নেই</b>
                    </div>

                </div>
              );
            })()}
            {/* Radar List */}
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {riskScores.sort((a,b)=>b.riskObj.score-a.riskObj.score).map(({name,riskObj})=>{
                const s=riskObj.score;
                const color=s>=70?"#b22222":s>=40?C.am:C.gr;
                const [expanded,setExpanded]=React.useState(false);
                return(
                  <div key={name} style={{background:s>=70?"#fdecea":s>=40?"#fff8e1":"#f5f5f5",borderRadius:8,border:`1px solid ${color}22`,overflow:"hidden"}}>
                    <div onClick={()=>setExpanded(e=>!e)}
                      style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",cursor:"pointer"}}>
                      <div style={{flex:1,fontSize:12,fontWeight:600,color:C.tx}}>{name}</div>
                      <div style={{width:90,background:"#e0e0e0",borderRadius:20,height:8,overflow:"hidden"}}>
                        <div style={{width:`${s}%`,height:8,background:color,borderRadius:20,transition:"width 0.5s"}}/>
                      </div>
                      <div style={{fontWeight:800,fontSize:13,color,minWidth:28}}>{s}</div>
                      <span style={{fontSize:10,color:C.mu}}>{expanded?"▲":"▼"}</span>
                    </div>
                    {expanded&&(
                      <div style={{padding:"6px 10px 8px",borderTop:`1px solid ${color}22`,display:"flex",flexDirection:"column",gap:3}}>
                        {Object.values(riskObj.breakdown||{}).map(b=>(
                          <div key={b.label} style={{display:"flex",alignItems:"center",gap:6,fontSize:10}}>
                            <div style={{width:70,color:C.mu}}>{b.label}</div>
                            <div style={{flex:1,background:"#e0e0e0",borderRadius:20,height:5,overflow:"hidden"}}>
                              <div style={{width:`${Math.min(100,(b.score/25)*100)}%`,height:5,background:b.score>15?"#b22222":b.score>8?C.am:C.gr,borderRadius:20}}/>
                            </div>
                            <div style={{fontWeight:700,color:b.score>15?"#b22222":b.score>8?C.am:C.gr,minWidth:20,fontSize:10}}>{b.score}</div>
                            <div style={{fontSize:9,color:C.mu,minWidth:80}}>{b.detail}</div>
                          </div>
                        ))}
                        {riskObj.reportsCount===0&&(
                          <div style={{fontSize:10,color:C.mu,fontStyle:"italic"}}>⚠️ কোনো সাপ্তাহিক রিপোর্ট নেই — ডিফল্ট স্কোর দেখাচ্ছে</div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </Card>
          {/* Subject Health */}
          <Card>
            <H3>📚 বিষয়ভিত্তিক Batch গড়</H3>
            <div style={{marginTop:8}}>
              {["বাংলা প্রথম পত্র","English প্রথম পত্র","গণিত","পদার্থবিজ্ঞান","রসায়ন"].map(subj=>{
                const marks=students.map(s=>profiles[s]?.subjectMarks?.find(m=>m.subject===subj)?.mark).filter(m=>m!=null&&m!="");
                const avg=marks.length>0?Math.round(marks.reduce((a,b)=>a+b,0)/marks.length):null;
                const g=avg!=null?sscGradeInfo(avg):null;
                return(
                  <div key={subj} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:`1px solid ${C.bd}`}}>
                    <div style={{flex:1,fontSize:11}}>{subj}</div>
                    {avg!=null?(
                      <>
                        <div style={{width:80,background:"#eee",borderRadius:20,height:6,overflow:"hidden"}}>
                          <div style={{width:`${avg}%`,height:6,background:g.color,borderRadius:20}}/>
                        </div>
                        <span style={{fontSize:11,fontWeight:700,color:g.color,minWidth:30}}>{avg}</span>
                        <span style={{fontSize:10,color:g.color,fontWeight:700}}>{g.grade}</span>
                      </>
                    ):<span style={{fontSize:10,color:C.mu}}>ডেটা নেই</span>}
                  </div>
                );
              })}
            </div>
          </Card>

          {/* Batch Weekly Trend */}
          {(()=>{
            // সব সপ্তাহের unique keys বের করি
            const allWeeks=[...new Set(Object.values(weeklyReports||{}).map(r=>r.weekKey).filter(Boolean))].sort();
            if(allWeeks.length<2)return null;
            const W=320,H=60,pad=8;

            const batchMetric=(key)=>allWeeks.map(wk=>{
              const reps=Object.values(weeklyReports).filter(r=>r.weekKey===wk&&r[key]!=null);
              return reps.length>0?Math.round(reps.reduce((a,r)=>a+(parseFloat(r[key])||0),0)/reps.length):null;
            });

            const targetPts=batchMetric("targetScore");
            const moralePts=batchMetric("morale");
            const hoursPts=batchMetric("avgHours");

            const drawSVGLine=(pts,color)=>{
              const valid=pts.map((v,i)=>({v,i})).filter(x=>x.v!=null);
              if(valid.length<2)return null;
              const max=Math.max(...valid.map(x=>x.v),1);
              const min=Math.min(...valid.map(x=>x.v),0);
              const range=max-min||1;
              const xStep=(W-pad*2)/(allWeeks.length-1||1);
              const points=valid.map(x=>({
                x:pad+x.i*xStep,
                y:H-pad-((x.v-min)/range)*(H-pad*2)
              }));
              const d=points.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
              return(
                <g>
                  <path d={d} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
                  {points.map((p,i)=>(
                    <circle key={i} cx={p.x} cy={p.y} r="3.5" fill={color}/>
                  ))}
                </g>
              );
            };

            const latestTarget=targetPts.filter(v=>v!=null).slice(-1)[0];
            const prevTarget=targetPts.filter(v=>v!=null).slice(-2,-1)[0];
            const trend=latestTarget&&prevTarget?(latestTarget>prevTarget?"↑ উন্নতি":latestTarget<prevTarget?"↓ অবনতি":"→ একই"):null;

            return(
              <Card style={{marginTop:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <H3>📈 Batch সাপ্তাহিক Trend</H3>
                  {trend&&<span style={{fontSize:11,fontWeight:700,color:trend.includes("↑")?C.gr:trend.includes("↓")?C.re:C.mu}}>{trend}</span>}
                </div>
                <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block",overflow:"visible",marginBottom:4}}>
                  {/* Grid */}
                  {[0,0.5,1].map(t=>(
                    <line key={t} x1={pad} y1={pad+(1-t)*(H-pad*2)} x2={W-pad} y2={pad+(1-t)*(H-pad*2)}
                      stroke="#e8e8e8" strokeWidth="1" strokeDasharray="4,4"/>
                  ))}
                  {drawSVGLine(targetPts,"#1B3A6B")}
                  {drawSVGLine(moralePts.map(v=>v!=null?v*20:null),"#C8960C")}
                  {drawSVGLine(hoursPts.map(v=>v!=null?v*8:null),"#1a6b3a")}
                </svg>
                {/* X-axis labels */}
                <div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:C.mu,marginBottom:6}}>
                  {allWeeks.map((wk,i)=>(
                    <span key={wk} style={{fontSize:7}}>{wk.slice(5)}</span>

                {/* Legend */}
                <div style={{display:"flex",gap:10,fontSize:9,color:C.mu}}>
                  <span><span style={{display:"inline-block",width:12,height:3,background:"#1B3A6B",borderRadius:2,marginRight:3,verticalAlign:"middle"}}/>টার্গেট % (Batch গড়)</span>
                  <span><span style={{display:"inline-block",width:12,height:3,background:"#C8960C",borderRadius:2,marginRight:3,verticalAlign:"middle"}}/>মনোবল (×২০)</span>
                  <span><span style={{display:"inline-block",width:12,height:3,background:"#1a6b3a",borderRadius:2,marginRight:3,verticalAlign:"middle"}}/>পড়ার সময় (×৮)</span>
                </div>
                <div style={{marginTop:6,fontSize:9,color:C.mu}}>
                  {allWeeks.length}টি সপ্তাহের ডেটা · {Object.keys(weeklyReports).length}টি মোট রিপোর্ট
                </div>
              </Card>
            );
          })()}
        </div>
      )}
      {tab==="weekly"&&(
        <div>
          {/* IT Executive Banner */}
          <div style={{background:"linear-gradient(135deg,#1a6b3a,#2d9e5f)",borderRadius:12,padding:"10px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:20}}>💻</div>
            <div style={{flex:1}}>
              <div style={{color:"#fff",fontWeight:800,fontSize:13}}>IT Executive ডেটা ইনপুট প্যানেল</div>
              <div style={{color:"rgba(255,255,255,0.8)",fontSize:10}}>প্রিন্ট ফর্ম দেখে প্রতিটি ছাত্রের "রিপোর্ট দিন" বাটনে ক্লিক করে ডেটা ইনপুট করুন</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.2)",borderRadius:8,padding:"6px 10px",textAlign:"center"}}>

              <div style={{color:"rgba(255,255,255,0.8)",fontSize:9}}>সম্পন্ন</div>
            </div>
          </div>
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <H3>🎯 সাপ্তাহিক টার্গেট ও রিপোর্ট</H3>
              {isAdmin&&(
                <button onClick={()=>setShowTargetModal(true)} style={{padding:"6px 12px",background:"#1B3A6B",color:"#fff",border:"none",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ টার্গেট দিন</button>
              )}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <span style={{fontSize:11,color:C.mu}}>সপ্তাহ:</span>
              <input type="date" value={selectedWeek} onChange={e=>setSelectedWeek(e.target.value)}
                style={{padding:"4px 8px",border:`1px solid ${C.bd}`,borderRadius:6,fontSize:12,outline:"none"}}/>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {students.map(student=>{
                const target=currentTargets[student];
                const reportKey=`${selectedWeek}_${student}`;
                const report=weeklyReports[reportKey];
                const risk=calcRiskScore(profiles[student],weeklyReports,student);
                const dept=profiles[student]?.dept;
                const deptInfo=dept?SSC_DEPARTMENTS[dept]:null;
                const inputComplete=report&&report.subjectData&&Object.keys(report.subjectData).length>0;

                      </div>
                    </div>

                        {report.teacherScore!=null&&<span>✅ Teacher: <b style={{color:report.teacherScore>=70?C.gr:report.teacherScore>=40?C.am:C.re}}>{report.teacherScore}%</b></span>}
                        <span>🎯 টার্গেট: <b style={{color:report.targetScore>=70?C.gr:report.targetScore>=40?C.am:C.re}}>{report.targetScore}%</b></span>
                        <span>⏰ গড়: <b>{report.avgHours||"—"} ঘণ্টা</b></span>
                        <span>💪 মনোবল: <b>{"⭐".repeat(report.morale||0)||"—"}</b></span>
                        {report.problems?.length>0&&<span style={{color:C.re}}>🚨 {report.problems.length}টি সমস্যা</span>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </Card>
        </div>
      )}

      {/* ─ STUDENTS TAB ─ */}
      {tab==="students"&&(
        <div>
          <Card>
            <H3>👨‍🎓 সকল ছাত্রের তালিকা</H3>
            <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:8}}>
              {students.map((student,i)=>{
                const profile=profiles[student];
                const dept=profile?.dept||"—";
                const deptInfo=SSC_DEPARTMENTS[dept];
                const gpa=profile?.subjectMarks?calcPredictedGPA(profile.subjectMarks.filter(s=>s.mark!=null),profile?.optionalMark,weeklyReports,student):null;
                const risk=calcRiskScore(profile,weeklyReports,student);
                return(
                  <div key={student} onClick={()=>setSelStudent(student)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"#f5f5f5",borderRadius:10,cursor:"pointer",transition:"background 0.15s"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#e8eef5"}
                    onMouseLeave={e=>e.currentTarget.style.background="#f5f5f5"}>
                    <div style={{width:28,height:28,borderRadius:"50%",background:"#1B3A6B22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#1B3A6B",flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:12,color:C.tx}}>{student}</div>
                      {deptInfo&&<span style={{fontSize:10,background:deptInfo.bg,color:deptInfo.color,padding:"1px 6px",borderRadius:8,fontWeight:600}}>{deptInfo.label}</span>}
                    </div>
                    <div style={{textAlign:"right"}}>
                      {gpa?<div style={{fontWeight:800,fontSize:14,color:gpa.finalGPA>=4.0?C.gr:gpa.finalGPA>=3.0?C.am:C.re}}>GPA {gpa.finalGPA}</div>:<div style={{fontSize:10,color:C.mu}}>নম্বর নেই</div>}
                      <RiskBadge score={risk}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>
        </div>
      )}

      {/* ─ PREDICTION TAB ─ */}
      {tab==="prediction"&&(
        <div>
          {/* Batch Summary */}
          <Card style={{marginBottom:10}}>
            <H3>🔮 SSC ফলাফল পূর্বানুমান ইঞ্জিন</H3>
            <div style={{fontSize:11,color:C.mu,marginBottom:10,lineHeight:1.6}}>
              বিষয়ভিত্তিক নম্বর + সাপ্তাহিক টার্গেট পূরণের হার + অভ্যাস — এই তিনটির সমন্বয়ে GPA পূর্বানুমান করা হচ্ছে।
            </div>
            {/* Batch GPA counters */}
            {(()=>{
              const gpas=students.map(s=>{
                const p=profiles[s];
                if(!p?.subjectMarks)return null;
                return calcPredictedGPA(p.subjectMarks.filter(m=>m.mark!=null&&m.mark!==""),p.optionalMark,weeklyReports,s);
              }).filter(Boolean);
              const aPlus=gpas.filter(g=>g.finalGPA>=4.75).length;
              const a=gpas.filter(g=>g.finalGPA>=3.75&&g.finalGPA<4.75).length;
              const aMinus=gpas.filter(g=>g.finalGPA>=3.25&&g.finalGPA<3.75).length;
              const below=gpas.filter(g=>g.finalGPA<3.25).length;
              const noData=students.length-gpas.length;
              const avgGPA=gpas.length>0?(gpas.reduce((a,g)=>a+g.finalGPA,0)/gpas.length).toFixed(2):null;
              return(
                <div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,marginBottom:10}}>
                    {[
                      {label:"A+",val:aPlus,color:C.gr,bg:"#e8f5ee"},
                      {label:"A",val:a,color:"#2e7d32",bg:"#f1f8f2"},
                      {label:"A-",val:aMinus,color:C.am,bg:"#fff8e1"},
                      {label:"B↓",val:below,color:C.re,bg:"#fdecea"},
                      {label:"ডেটা নেই",val:noData,color:C.mu,bg:"#f5f5f5"},
                    ].map(k=>(
                      <div key={k.label} style={{background:k.bg,border:`1px solid ${k.color}33`,borderRadius:10,padding:"8px 4px",textAlign:"center"}}>
                        <div style={{fontSize:16,fontWeight:800,color:k.color}}>{k.val}</div>
                        <div style={{fontSize:9,color:k.color,fontWeight:600}}>{k.label}</div>
                      </div>
                    ))}
                  </div>
                  {avgGPA&&(
                    <div style={{background:"#eaf1fb",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{fontSize:11,color:"#1B3A6B",fontWeight:600}}>Batch গড় সম্ভাব্য GPA</div>
                      <div style={{fontSize:22,fontWeight:800,color:"#1B3A6B"}}>{avgGPA}</div>
                    </div>
                  )}
                </div>
              );
            })()}
          </Card>

          {/* Per-student prediction cards */}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {students.map(student=>{
              const profile=profiles[student];
              const dept=profile?.dept;
              const deptInfo=dept?SSC_DEPARTMENTS[dept]:null;
              const validMarks=(profile?.subjectMarks||[]).filter(s=>s.mark!=null&&s.mark!=="");
              const gpa=validMarks.length>0?calcPredictedGPA(validMarks,profile?.optionalMark,weeklyReports,student):null;
              const [expanded,setExpanded]=React.useState(false);

              return(
                <Card key={student} style={{padding:"10px 12px"}}>
                  <div onClick={()=>setExpanded(e=>!e)} style={{cursor:"pointer"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:gpa?4:0}}>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:12,color:C.tx}}>{student}</div>
                        {deptInfo&&<span style={{fontSize:9,color:deptInfo.color,fontWeight:600}}>{deptInfo.label}</span>}
                      </div>
                      {gpa?(
                        <div style={{textAlign:"right"}}>
                          <div style={{fontWeight:800,fontSize:18,color:gpa.finalGPA>=4.0?C.gr:gpa.finalGPA>=3.0?C.am:C.re}}>
                            GPA {gpa.finalGPA}
                          </div>
                          <div style={{fontSize:9,color:C.mu}}>
                            বেস {gpa.baseGPA}
                            {gpa.bonus>0&&<span style={{color:"#854f0b"}}> +{gpa.bonus.toFixed(1)} বোনাস</span>}
                            {gpa.trendAdj!==0&&<span style={{color:gpa.trendAdj>0?C.gr:C.re}}> {gpa.trendAdj>0?"+":""}{gpa.trendAdj} trend</span>}
                          </div>
                        </div>
                      ):(
                        <span style={{fontSize:10,color:C.mu,fontStyle:"italic"}}>নম্বর দিন →</span>
                      )}
                      <span style={{fontSize:10,color:C.mu}}>{expanded?"▲":"▼"}</span>
                    </div>

                    {/* GPA bar */}
                    {gpa&&(
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <div style={{flex:1,background:"#eee",borderRadius:20,height:6,overflow:"hidden"}}>
                          <div style={{width:`${(gpa.finalGPA/5)*100}%`,height:6,
                            background:gpa.finalGPA>=4.0?C.gr:gpa.finalGPA>=3.0?C.am:C.re,
                            borderRadius:20,transition:"width 0.5s"}}/>
                        </div>
                        <div style={{display:"flex",gap:3}}>
                          {validMarks.slice(0,5).map(s=>{
                            const g=sscGradeInfo(s.mark);
                            return <span key={s.subject} style={{fontSize:8,fontWeight:700,color:g.color,background:g.color+"22",padding:"1px 3px",borderRadius:4}}>{g.grade}</span>;
                          })}
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Expanded detail */}
                  {expanded&&gpa&&(
                    <div style={{marginTop:10,borderTop:`1px solid ${C.bd}`,paddingTop:10}}>
                      {/* বিষয়ভিত্তিক নম্বর breakdown */}
                      <div style={{fontSize:10,fontWeight:700,color:C.mu,marginBottom:6}}>📚 বিষয়ভিত্তিক নম্বর ও গ্রেড</div>
                      <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:10}}>
                        {validMarks.map(s=>{
                          const g=sscGradeInfo(s.mark);
                          return(
                            <div key={s.subject} style={{display:"flex",alignItems:"center",gap:6}}>
                              <div style={{fontSize:10,color:C.tx,width:140,flexShrink:0}}>{s.subject}</div>
                              <div style={{flex:1,background:"#eee",borderRadius:20,height:7,overflow:"hidden"}}>
                                <div style={{width:`${s.mark}%`,height:7,background:g.color,borderRadius:20}}/>
                              </div>
                              <div style={{fontSize:10,fontWeight:700,color:g.color,minWidth:28,textAlign:"right"}}>{s.mark}</div>
                              <span style={{fontSize:10,fontWeight:800,color:g.color,minWidth:22,textAlign:"center",background:g.color+"22",borderRadius:4,padding:"0 4px"}}>{g.grade}</span>
                            </div>
                          );
                        })}
                      </div>

                      {/* Trend label */}
                      {gpa.trendLabel&&(
                        <div style={{background:"#eaf1fb",borderRadius:8,padding:"5px 8px",fontSize:10,color:"#1B3A6B",marginBottom:8}}>
                          {gpa.trendLabel} &nbsp;·&nbsp; সাপ্তাহিক trend adjustment: <b>{gpa.trendAdj>0?"+":""}{gpa.trendAdj}</b>
                        </div>
                      )}

                      {/* Suggestions */}
                      {gpa.suggestions?.length>0&&(
                        <div style={{background:"#fff8e1",borderRadius:8,padding:"8px 10px",marginBottom:8}}>
                          <div style={{fontSize:10,fontWeight:700,color:"#854f0b",marginBottom:5}}>💡 GPA উন্নতির পরামর্শ</div>
                          {gpa.suggestions.map((s,i)=>(
                            <div key={i} style={{fontSize:10,color:C.tx,marginBottom:3,paddingLeft:4}}>{s}</div>
                          ))}
                        </div>
                      )}

                      {/* Fail warning */}
                      {gpa.failSubjects?.length>0&&(
                        <div style={{background:"#fdecea",border:`1px solid #ef9a9a`,borderRadius:8,padding:"7px 10px",fontSize:10,color:"#b22222",fontWeight:700}}>
                          🚨 F Grade ঝুঁকি: {gpa.failSubjects.join(", ")} — তাৎক্ষণিক পদক্ষেপ নিন
                        </div>
                      )}

                      <button onClick={()=>setSelStudent(student)}
                        style={{marginTop:8,width:"100%",padding:"7px",background:"#1B3A6B",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:700}}>
                        👤 বিস্তারিত প্রোফাইল দেখুন
                      </button>
                    </div>
                  )}

                  {expanded&&!gpa&&(
                    <div style={{marginTop:8,borderTop:`1px solid ${C.bd}`,paddingTop:8,textAlign:"center"}}>
                      <div style={{fontSize:11,color:C.mu,marginBottom:8}}>বিষয়ভিত্তিক নম্বর দিলে GPA পূর্বানুমান দেখা যাবে</div>
                      <button onClick={()=>setSelStudent(student)}
                        style={{padding:"7px 16px",background:"#1a6b3a",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:700}}>
                        📝 নম্বর দিন
                      </button>
                    </div>
                  )}
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {/* ─ SETUP TAB ─ */}
      {tab==="setup"&&(
        <div>
          <Card style={{marginBottom:12}}>
            <H3>⚙️ ছাত্রের বিভাগ নির্ধারণ (Quick Setup)</H3>
            <div style={{fontSize:11,color:C.mu,marginBottom:12}}>প্রতিটি ছাত্রের বিভাগ একবারে সেট করুন। এরপর বিষয়ভিত্তিক নম্বর দেওয়া যাবে।</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {students.map((student,i)=>{
                const profile=profiles[student]||{};
                const currentDept=profile.dept||null;
                return(
                  <div key={student} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#f5f5f5",borderRadius:10}}>
                    <div style={{width:24,fontSize:11,color:C.mu,fontWeight:600}}>{i+1}</div>
                    <div style={{flex:1,fontSize:12,fontWeight:600,color:C.tx}}>{student}</div>
                    <div style={{display:"flex",gap:4}}>
                      {Object.entries(SSC_DEPARTMENTS).map(([k,v])=>(
                        <button key={k} onClick={()=>isAdmin&&updateProfile(student,{dept:k})}
                          style={{padding:"4px 8px",borderRadius:12,border:`1px solid ${currentDept===k?v.color:C.bd}`,background:currentDept===k?v.bg:"#fff",color:currentDept===k?v.color:C.mu,cursor:isAdmin?"pointer":"default",fontSize:10,fontWeight:currentDept===k?700:400}}>{v.label}</button>
                      ))}
                    </div>
                    {currentDept&&<span style={{fontSize:10,color:C.gr}}>✓</span>}
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:12,padding:"10px 12px",background:"#eaf1fb",borderRadius:10,fontSize:11,color:"#1B3A6B"}}>
              ✅ {students.filter(s=>profiles[s]?.dept).length}/{students.length} জনের বিভাগ নির্ধারিত হয়েছে
            </div>
          </Card>
          {/* Batch Mark Entry Shortcut */}
          <Card>
            <H3>📝 দ্রুত নম্বর এন্ট্রি</H3>
            <div style={{fontSize:11,color:C.mu,marginBottom:10}}>যেকোনো ছাত্রের নাম ক্লিক করলে তার নম্বর ট্যাব খুলবে।</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {students.map(student=>{
                const profile=profiles[student]||{};
                const hasMarks=(profile.subjectMarks||[]).filter(m=>m.mark!=null&&m.mark!=="").length;
                const dept=profile.dept;
                const deptInfo=dept?SSC_DEPARTMENTS[dept]:null;
                return(
                  <button key={student} onClick={()=>{setSelStudent(student);}}
                    style={{padding:"5px 10px",borderRadius:12,border:`1px solid ${hasMarks>0?(deptInfo?.color||C.bd):C.bd}`,background:hasMarks>0?(deptInfo?.bg||"#fff"):"#fff",color:hasMarks>0?(deptInfo?.color||C.mu):C.mu,cursor:"pointer",fontSize:11,fontWeight:hasMarks>0?600:400}}>
                    {student.split(" ")[student.split(" ").length-1]} {hasMarks>0?`(${hasMarks})`:""}</button>
                );
              })}
            </div>
          </Card>
        </div>
      )}

      {/* ─ PRINT TAB ─ */}
      {tab==="print"&&(
        <SSCPrintTab students={students} profiles={profiles} sscDaysLeft={sscDaysLeft} weekLabel={weekLabel}/>
      )}

      {/* Modals */}
      {selStudent&&(
        <SSCStudentModal
          student={selStudent}
          profile={profiles[selStudent]||{}}
          weeklyReports={weeklyReports}
          onSave={(data)=>updateProfile(selStudent,data)}
          onClose={()=>setSelStudent(null)}
          isAdmin={isAdmin}
        />
      )}
      {showTargetModal&&(
        <WeeklyTargetModal
          students={students}
          targets={currentTargets}
          weekKey={selectedWeek}
          weekLabel={weekLabel}
          onSave={saveTargets}
          onClose={()=>setShowTargetModal(false)}
        />
      )}
      {showReportModal&&(
        <WeeklyReportModal
          student={showReportModal}
          weekKey={selectedWeek}
          weekLabel={weekLabel}
          target={currentTargets[showReportModal]}
          existingReport={weeklyReports[`${selectedWeek}_${showReportModal}`]}
          onSave={saveReport}
          onClose={()=>setShowReportModal(null)}
          isAdmin={isAdmin}
          dept={profiles[showReportModal]?.dept||"science"}
          deptSubjects={DEPT_PRINT_SUBJECTS[profiles[showReportModal]?.dept||"science"]?.subjects||[]}
        />
      )}
    </div>
  );
}

    COORD_APP_TASK_MAP[t.appPage].push(t.id);
  }
}));
const ALL_COORD_TASK_IDS=COORD_TASK_GROUPS.flatMap(g=>g.tasks.map(t=>t.id));

      if(!grpTasks.length)return{...kpi,score:0,done:0,total:0};
      const tw=grpTasks.reduce((a,t)=>a+t.weight,0);
      const dw=grpTasks.filter(t=>taskStatus[t.id]?.done).reduce((a,t)=>a+t.weight,0);
      const score=tw>0?Math.round((dw/tw)*100):0;
      return{...kpi,score,done:grpTasks.filter(t=>taskStatus[t.id]?.done).length,total:grpTasks.length};
    });
  },[taskStatus]);
  const overallScore=useMemo(()=>{

    return Math.round(kpiScores.reduce((a,k)=>a+(k.score*k.weight/100),0)/tw*100);
  },[kpiScores]);
  const grade=overallScore>=90?"A+":overallScore>=75?"A":overallScore>=60?"B":overallScore>=45?"C":"D";

        <div style={{width:`${overallScore}%`,height:"100%",background:"#fff",borderRadius:4,transition:"width 0.6s ease"}}/>
      </div>
      <div style={{marginTop:6,fontSize:11,opacity:0.75,textAlign:"center"}}>{totalDone}/{totalAll} কাজ সম্পন্ন</div>
    </div>
    <div style={{display:"flex",gap:4,marginBottom:12}}>
      {tabs.map(t=>(

          style={{flex:1,padding:"8px 4px",borderRadius:10,border:`1px solid ${tab===t.id?C.pu:C.bd}`,

            cursor:"pointer",fontWeight:tab===t.id?700:500,fontSize:11}}>
          {t.label}
        </button>
      ))}
    </div>
    {tab==="overview"&&(<div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <Card style={{textAlign:"center",padding:"12px 10px"}}>
          <div style={{fontSize:28,fontWeight:800,color:gradeCol}}>{overallScore}</div>
          <div style={{fontSize:11,color:C.mu}}>সামগ্রিক স্কোর</div>
        </Card>
        <Card style={{textAlign:"center",padding:"12px 10px"}}>
          <div style={{fontSize:28,fontWeight:800,color:C.gr}}>{totalDone}</div>

        </Card>
      </div>

              </div>
            </div>
            <div style={{fontWeight:800,fontSize:22,color:kpi.color}}>{kpi.score}</div>
          </div>
          <div style={{height:7,background:"#eee",borderRadius:4,overflow:"hidden"}}>
            <div style={{width:`${kpi.score}%`,height:"100%",background:kpi.color,borderRadius:4,transition:"width 0.5s"}}/>

        </div>
      </Card>
    </div>)}
    {tab==="app_tasks"&&(<div>

            return(<div key={task.id} style={{
              display:"flex",alignItems:"flex-start",gap:8,padding:"9px 10px",
              borderRadius:9,marginBottom:5,
              background:done?C.grL:"#fafafa",
              border:`1px solid ${done?C.gr+"40":C.bd}`}}>
              <div style={{flexShrink:0,width:24,height:24,borderRadius:"50%",

                alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,marginTop:1}}>
                {done?"✓":"○"}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:done?600:500,fontSize:12,color:done?C.gr:C.tx,
                  textDecoration:done?"line-through":"none"}}>{task.title}</div>
                <div style={{fontSize:10,color:C.mu,marginTop:2}}>{task.desc}</div>
                <div style={{marginTop:5,display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                  <button onClick={()=>onPageJump(task.appPage)}
                    style={{padding:"2px 9px",borderRadius:10,border:`1px solid ${group.color}50`,
                      background:group.color+"15",color:group.color,cursor:"pointer",fontSize:10,fontWeight:700}}>
                    📱 {task.appPage} পেজে যাও
                  </button>
                  <span style={{background:C.puL,color:C.pu,border:`1px solid ${C.pu}25`,
                    borderRadius:10,padding:"2px 7px",fontSize:10,fontWeight:700}}>
                    ওজন {task.weight}%
                  </span>
                  {done&&taskStatus[task.id]?.doneAt&&(
                    <span style={{background:C.grL,color:C.gr,borderRadius:10,padding:"2px 7px",fontSize:10,fontWeight:700}}>
                      ✓ {taskStatus[task.id].doneAt}
                    </span>
                  )}
                </div>
              </div>
            </div>);
          })}
        </Card>);
      })}
    </div>)}
    {tab==="manual_tasks"&&(<div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>

            {COORD_TASK_GROUPS.flatMap(g=>g.tasks).filter(t=>t.type==="manual"&&taskStatus[t.id]?.done).length}
          </div>
          <div style={{fontSize:11,color:C.mu}}>✅ সম্পন্ন</div>
        </Card>
        <Card style={{padding:"11px 12px",textAlign:"center",border:`1px solid ${C.am}30`}}>

          <div style={{fontSize:11,color:C.mu}}>⏳ বাকি আছে</div>
