const {useState,useMemo,useEffect}=React;
const IDB_NAME="HAIS_DB";
const IDB_STORE="kv";
const IDB_VER=1;
const FB_PATH="hais_data_v3";

/* ══ IndexedDB KV Wrapper ══
   সব key-value অপারেশন এখানে — localStorage-এর জায়গায় IndexedDB */
const HAISDB={
  _db:null,
  open(){
    if(this._db)return Promise.resolve(this._db);
    return new Promise((res,rej)=>{
      const req=indexedDB.open(IDB_NAME,IDB_VER);
      req.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains(IDB_STORE))
          db.createObjectStore(IDB_STORE);
      };
      req.onsuccess=e=>{this._db=e.target.result;res(this._db);};
      req.onerror=e=>rej(e.target.error);
    });
  },
  async get(key){
    const db=await this.open();
    return new Promise((res,rej)=>{
      const tx=db.transaction(IDB_STORE,"readonly");
      const req=tx.objectStore(IDB_STORE).get(key);
      req.onsuccess=()=>res(req.result??null);
      req.onerror=e=>rej(e.target.error);
    });
  },
  async set(key,val){
    const db=await this.open();
    return new Promise((res,rej)=>{
      const tx=db.transaction(IDB_STORE,"readwrite");
      const req=tx.objectStore(IDB_STORE).put(val,key);
      req.onsuccess=()=>res(true);
      req.onerror=e=>rej(e.target.error);
    });
  },
  async remove(key){
    const db=await this.open();
    return new Promise((res,rej)=>{
      const tx=db.transaction(IDB_STORE,"readwrite");
      const req=tx.objectStore(IDB_STORE).delete(key);
      req.onsuccess=()=>res(true);
      req.onerror=e=>rej(e.target.error);
    });
  },
  /* sync-style সেট — autosave-এ fire-and-forget */
  setSync(key,val){this.set(key,val).catch(e=>console.error("IDB set:",e));},
};

/* ── Firebase helpers ── */
const fbSave=async(data)=>{
  if(!window.__fbReady)return false;
  try{await window.__fbDB.ref(FB_PATH).set(data);return true;}catch(e){console.error("FB save:",e);return false;}
};
/* partial আপডেট — শুধু যেসব top-level key পরিবর্তন হয়েছে সেগুলোই পাঠায়,
   বাকি ব্যবহারকারীর ডিভাইসে থাকা stale ডেটা দিয়ে বাকি ফিল্ড ওভাররাইট হবে না */
const fbUpdate=async(partial)=>{
  if(!window.__fbReady)return false;
  try{await window.__fbDB.ref(FB_PATH).update(partial);return true;}catch(e){console.error("FB update:",e);return false;}
};
const fbLoad=async()=>{
  if(!window.__fbReady)return null;
  try{const s=await window.__fbDB.ref(FB_PATH).once("value");return s.exists()?s.val():null;}catch(e){return null;}
};
/* realtime listener — অন্য কোনো ডিভাইস ডেটা পরিবর্তন করলে সাথে সাথে এই কলব্যাক চলবে */
const fbListen=(cb)=>{
  if(!window.__fbReady){setTimeout(()=>cb(null),500);return ()=>{};}
  const ref=window.__fbDB.ref(FB_PATH);
  const handler=snap=>{cb(snap.exists()?snap.val():null);};
  ref.on("value",handler);
  return ()=>ref.off("value",handler);
};

/* ── IndexedDB থেকে একবারে সব পড়া ── */
const loadFromIDB=async()=>{
  try{
    // প্রথমে নতুন key চেষ্টা করো
    const data=await HAISDB.get("hais_data_v3");
    if(data)return data;
    // পুরনো v2 থেকে মাইগ্রেট করো
    const old=await HAISDB.get("hais_data_v2");
    if(old){
      console.info("HAIS: পুরনো v2 ডেটা থেকে মাইগ্রেশন হচ্ছে...");
      const migrated={results:old.results||{},lessonPlans:old.lessonPlans||{},obsData:old.obsData||{},deadlines:old.deadlines||[],dlSubmissions:old.dlSubmissions||{},teacherSubjects:old.teacherSubjects||{},customStudents:old.customStudents||{},savedAt:old.savedAt||new Date().toISOString()};
      await HAISDB.set("hais_data_v3",migrated);
      return migrated;
    }
    // localStorage থেকে এক-বার মাইগ্রেট (v6 → v7 আপগ্রেড)
    try{
      const lsRaw=localStorage.getItem("hais_data_v3");
      if(lsRaw){
        const lsData=JSON.parse(lsRaw);
        console.info("HAIS v7: localStorage → IndexedDB মাইগ্রেশন");
        await HAISDB.set("hais_data_v3",lsData);
        localStorage.removeItem("hais_data_v3");
        return lsData;
      }
    }catch(e){}
  }catch(e){console.error("HAIS IDB লোড সমস্যা:",e);}
  return null;
};

function BarChart({data,height=90,color=C.pu}){
  if(!data||data.length===0)return null;
  const max=Math.max(...data.map(d=>d.value),1);
  const W=Math.max(300,data.length*44);
  const bw=Math.min(34,Math.floor((W/data.length)*0.65));

  const W=280;const vals=points.map(p=>p.v);const mn=Math.min(...vals)-5,mx=Math.max(...vals)+5;const range=mx-mn||1;
  const px=(i)=>Math.round((i/(points.length-1))*(W-30))+15;
  const py=(v)=>Math.round(height-((v-mn)/range)*(height-16))-8;
  const pathD=points.map((p,i)=>`${i===0?"M":"L"}${px(i)},${py(p.v)}`).join(" ");
  const trend=vals[vals.length-1]-vals[0];const tColor=trend>=0?C.gr:C.re;
  return(<div><svg width="100%" viewBox={`0 0 ${W} ${height+20}`} style={{display:"block"}}><path d={pathD} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>{points.map((p,i)=>(<g key={i}><circle cx={px(i)} cy={py(p.v)} r={4} fill={color}/><text x={px(i)} y={py(p.v)-8} textAnchor="middle" fontSize={10} fill={color} fontWeight={700}>{p.v}</text><text x={px(i)} y={height+14} textAnchor="middle" fontSize={8} fill={C.mu}>{p.label}</text></g>))}<line x1={0} y1={height} x2={W} y2={height} stroke={C.bd} strokeWidth={0.8}/></svg><div style={{fontSize:12,color:tColor,fontWeight:700,textAlign:"right",marginTop:2}}>{trend>=0?"▲ উন্নতি":"▼ হ্রাস"}: {Math.abs(trend)} নম্বর</div></div>);
}

function DonutChart({pass,fail,total}){
  if(total===0)return null;
  const r=38,cx=50,cy=50,circ=2*Math.PI*r,passFrac=pass/total,passArc=circ*passFrac,failArc=circ*(1-passFrac);
  return(<svg width={100} height={100} viewBox="0 0 100 100"><circle cx={cx} cy={cy} r={r} fill="none" stroke={C.reL} strokeWidth={12}/><circle cx={cx} cy={cy} r={r} fill="none" stroke={C.gr} strokeWidth={12} strokeDasharray={`${passArc} ${failArc}`} strokeDashoffset={circ/4} strokeLinecap="round"/><text x={cx} y={cy-4} textAnchor="middle" fontSize={15} fontWeight={700} fill={C.pu}>{Math.round(passFrac*100)}%</text><text x={cx} y={cy+12} textAnchor="middle" fontSize={9} fill={C.mu}>পাস রেট</text></svg>);
}

/* ══ বাল্ক উপস্থিতি কম্পোনেন্ট ══ */
function BulkAttendance({obsData,setObsData}){
  const today=new Date().toLocaleDateString("bn-BD");
  const todayISO=new Date().toISOString().slice(0,10);
  // প্রতিটি শিক্ষকের জন্য ডিফল্ট "present"
  const initStatus=()=>{const s={};TEACHERS.forEach(t=>s[t]="present");return s;};
  const [statuses,setStatuses]=useState(initStatus);
  const [saved,setSaved]=useState(false);
  const [attDate,setAttDate]=useState(todayISO);

  // আজকে কে কে আগে সেভ করেছে সেটা দেখার জন্য
  const savedToday=useMemo(()=>{
    const s={};
    TEACHERS.forEach(t=>{
      const list=(obsData[t]||{}).attendance||[];
      const entry=list.find(a=>a.isoDate===attDate);
      if(entry)s[t]=entry.status;
    });
    return s;
  },[obsData,attDate]);

  const hasSavedToday=Object.keys(savedToday).length>0;

  // তারিখ পরিবর্তনে statuses রিসেট করো, পুরনো ডেটা লোড করো
  useEffect(()=>{
    const s=initStatus();
    TEACHERS.forEach(t=>{
      const list=(obsData[t]||{}).attendance||[];
      const entry=list.find(a=>a.isoDate===attDate);
      if(entry)s[t]=entry.status;
    });
    setStatuses(s);
    setSaved(false);
  },[attDate]);

  const setStatus=(teacher,status)=>{
    setStatuses(prev=>({...prev,[teacher]:status}));
    setSaved(false);
  };

  const markAll=(status)=>{
    const s={};TEACHERS.forEach(t=>s[t]=status);
    setStatuses(s);setSaved(false);
  };

  const saveBulk=()=>{
    const dateLabel=new Date(attDate+"T00:00:00").toLocaleDateString("bn-BD");
    setObsData(prev=>{
      const updated={...prev};
      TEACHERS.forEach(t=>{
        const existing=(updated[t]||{}).attendance||[];
        // একই তারিখে আগে থাকলে রিপ্লেস, না থাকলে যোগ
        const filtered=existing.filter(a=>a.isoDate!==attDate);
        const newEntry={date:dateLabel,isoDate:attDate,status:statuses[t]};
        updated[t]={...(updated[t]||{}),attendance:[...filtered,newEntry]};
      });
      return updated;
    });
    setSaved(true);
  };

  const statusConfig={
    present:{label:"উপস্থিত",color:C.gr,icon:"✓"},
    late:{label:"দেরিতে",color:C.am,icon:"⏰"},
    absent:{label:"অনুপস্থিত",color:C.re,icon:"✗"},
  };

  const counts={
    present:TEACHERS.filter(t=>statuses[t]==="present").length,
    late:TEACHERS.filter(t=>statuses[t]==="late").length,
    absent:TEACHERS.filter(t=>statuses[t]==="absent").length,
  };

  return(<div>
    <Card>
      <H3>📅 সকল শিক্ষকের উপস্থিতি</H3>

      {/* তারিখ নির্বাচন */}
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:12,color:C.mu,flexShrink:0}}>তারিখ:</div>
        <input type="date" value={attDate} onChange={e=>setAttDate(e.target.value)}
          style={{flex:1,padding:"7px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13,outline:"none"}}/>
      </div>

      {/* সবাইকে একসাথে মার্ক */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        <div style={{fontSize:11,color:C.mu,alignSelf:"center",marginRight:2}}>সবাইকে:</div>
        {Object.entries(statusConfig).map(([st,cfg])=>(
          <button key={st} onClick={()=>markAll(st)}
            style={{padding:"5px 10px",borderRadius:7,border:`1px solid ${cfg.color}`,background:cfg.color+"18",color:cfg.color,cursor:"pointer",fontSize:11,fontWeight:700}}>
            {cfg.icon} সব {cfg.label}
          </button>
        ))}
      </div>

      {/* প্রতিটি শিক্ষক */}
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
        {TEACHERS.map((t,i)=>{
          const st=statuses[t]||"present";
          const cfg=statusConfig[st];
          return(
            <div key={t} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:9,background:cfg.color+"12",border:`1px solid ${cfg.color}30`,transition:"background 0.2s"}}>
              {/* ক্রমিক ও নাম */}
              <div style={{minWidth:22,fontSize:11,color:C.mu,textAlign:"right"}}>{i+1}.</div>
              <div style={{flex:1,fontSize:13,fontWeight:600,color:C.tx}}>{t}</div>
              {/* তিনটি অপশন */}
              <div style={{display:"flex",gap:4,flexShrink:0}}>
                {Object.entries(statusConfig).map(([s,c])=>(
                  <button key={s} onClick={()=>setStatus(t,s)}
                    title={c.label}
                    style={{
                      width:34,height:30,borderRadius:7,border:`1.5px solid ${st===s?c.color:C.bd}`,
                      background:st===s?c.color:"#fff",color:st===s?"#fff":C.mu,
                      cursor:"pointer",fontSize:13,fontWeight:700,
                      transition:"all 0.15s",
                      display:"flex",alignItems:"center",justifyContent:"center"
                    }}>
                    {c.icon}
                  </button>
                ))}
              </div>
              {/* বর্তমান স্ট্যাটাস লেবেল */}
              <div style={{minWidth:56,fontSize:10,fontWeight:700,color:cfg.color,textAlign:"right"}}>{cfg.label}</div>
            </div>
          );
        })}
      </div>

      {/* সারসংক্ষেপ */}
      <div style={{display:"flex",gap:8,marginBottom:12,justifyContent:"center"}}>
        <div style={{textAlign:"center",padding:"6px 12px",borderRadius:8,background:C.gr+"18",border:`1px solid ${C.gr}30`}}>
          <div style={{fontSize:18,fontWeight:700,color:C.gr}}>{counts.present}</div>
          <div style={{fontSize:10,color:C.gr}}>উপস্থিত</div>
        </div>
        <div style={{textAlign:"center",padding:"6px 12px",borderRadius:8,background:C.am+"18",border:`1px solid ${C.am}30`}}>
          <div style={{fontSize:18,fontWeight:700,color:C.am}}>{counts.late}</div>
          <div style={{fontSize:10,color:C.am}}>দেরিতে</div>
        </div>
        <div style={{textAlign:"center",padding:"6px 12px",borderRadius:8,background:C.re+"18",border:`1px solid ${C.re}30`}}>
          <div style={{fontSize:18,fontWeight:700,color:C.re}}>{counts.absent}</div>
          <div style={{fontSize:10,color:C.re}}>অনুপস্থিত</div>
        </div>
        <div style={{textAlign:"center",padding:"6px 12px",borderRadius:8,background:C.pu+"18",border:`1px solid ${C.pu}30`}}>
          <div style={{fontSize:18,fontWeight:700,color:C.pu}}>{TEACHERS.length}</div>
          <div style={{fontSize:10,color:C.pu}}>মোট</div>
        </div>
      </div>

      {/* সেভ বাটন */}
      <button onClick={saveBulk}
        style={{width:"100%",padding:"11px",borderRadius:9,border:"none",background:saved?C.gr:C.pu,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14,transition:"background 0.3s",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        {saved?"✅ সেভ হয়ে গেছে!":"💾 সকলের উপস্থিতি সেভ করুন"}
      </button>
      {saved&&<div style={{textAlign:"center",fontSize:11,color:C.gr,marginTop:6}}>✓ সকল শিক্ষকের প্রোফাইলে উপস্থিতি যোগ হয়েছে</div>}
    </Card>

    {/* সাম্প্রতিক রেকর্ড সারসংক্ষেপ */}
    <Card>
      <H3>📊 উপস্থিতির সারসংক্ষেপ (সর্বশেষ ৫ দিন)</H3>
      {TEACHERS.map(t=>{
        const list=(obsData[t]||{}).attendance||[];
        if(!list.length)return null;
        const recent=[...list].sort((a,b)=>(b.isoDate||"")>(a.isoDate||"")&&-1||1).slice(-5).reverse();
        const total=list.length;
        const pres=list.filter(a=>a.status==="present").length;
        const late=list.filter(a=>a.status==="late").length;
        const pct=total?Math.round((pres+late*0.5)/total*100):0;
        return(<div key={t} style={{padding:"8px 0",borderBottom:`1px solid ${C.bd}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div style={{fontSize:12,fontWeight:600,color:C.tx}}>{t}</div>
            <span style={{fontSize:11,fontWeight:700,color:pct>=85?C.gr:pct>=70?C.am:C.re}}>{pct}%</span>
          </div>
          <div style={{display:"flex",gap:3}}>
            {recent.map((a,i)=>(
              <div key={i} title={`${a.date}: ${a.status==="present"?"উপস্থিত":a.status==="late"?"দেরিতে":"অনুপস্থিত"}`}
                style={{width:18,height:18,borderRadius:4,background:a.status==="present"?C.gr:a.status==="late"?C.am:C.re,flexShrink:0}}/>
            ))}
          </div>
        </div>);
      }).filter(Boolean)}
      {TEACHERS.every(t=>!(obsData[t]||{}).attendance?.length)&&
        <div style={{textAlign:"center",color:C.mu,padding:16,fontSize:13}}>এখনো কোনো উপস্থিতি রেকর্ড নেই</div>}
    </Card>
  </div>);
}

/* ══ শিক্ষক পর্যবেক্ষণ মডিউল ══ */
function TeacherObservation({obsData,setObsData}){
  const [tab,setTab]=useState("attendance");
  const [selTeacher,setSelTeacher]=useState(TEACHERS[0]);

  const obs=obsData[selTeacher]||{attendance:[],inspections:[],syllabus:[],trainings:[],feedback:[]};

  const updateObs=(field,val)=>{
    setObsData(prev=>({...prev,[selTeacher]:{...(prev[selTeacher]||{}), [field]:val}}));
  };

  /* সিলেবাস কভারেজ */
  const sylList=obs.syllabus||[];
  const coveredTopics=sylList.filter(s=>s.covered).length;
  const totalTopics=sylList.length;
  const sylPct=totalTopics?Math.round(coveredTopics/totalTopics*100):0;

  /* ফিডব্যাক গড় */
  const fbList=obs.feedback||[];
  const avgFb=fbList.length?Math.round(fbList.reduce((a,b)=>a+(b.rating||0),0)/fbList.length*10)/10:0;

  /* পরিদর্শন গড় */
  const insList=obs.inspections||[];
  const avgIns=insList.length?Math.round(insList.reduce((a,b)=>a+(b.score||0),0)/insList.length*10)/10:0;

  /* উপস্থিতি হিসাব (নির্বাচিত শিক্ষকের) */
  const attList=obs.attendance||[];
  const presentDays=attList.filter(a=>a.status==="present").length;
  const lateCount=attList.filter(a=>a.status==="late").length;
  const totalDays=attList.length;
  const attPct=totalDays?Math.round((presentDays+lateCount*0.5)/totalDays*100):0;

  const addInspection=(score,remarks)=>{
    const today=new Date().toLocaleDateString("bn-BD");
    updateObs("inspections",[...insList,{date:today,score:parseInt(score)||0,remarks}]);
  };

  const toggleSyllabus=(idx)=>{
    const updated=sylList.map((s,i)=>i===idx?{...s,covered:!s.covered}:s);
    updateObs("syllabus",updated);
  };

  const addSyllabusTopic=(topic,subject)=>{
    updateObs("syllabus",[...sylList,{topic,subject,covered:false}]);
  };

  const addTraining=(name,date,hours)=>{
    updateObs("trainings",[...(obs.trainings||[]),{name,date,hours:parseInt(hours)||0}]);
  };

  const addFeedback=(cls,rating,comment)=>{
    updateObs("feedback",[...fbList,{cls,rating:parseInt(rating)||3,comment,date:new Date().toLocaleDateString("bn-BD")}]);
  };

  return(<div>
    <H2>👁 শিক্ষক পর্যবেক্ষণ</H2>

    {/* ট্যাব বার */}
    <div style={{display:"flex",gap:4,overflowX:"auto",marginBottom:10,WebkitOverflowScrolling:"touch"}}>
      {[
        {id:"attendance",label:"📅 উপস্থিতি"},
        {id:"inspection",label:"🔍 পরিদর্শন"},
        {id:"syllabus",label:"📖 সিলেবাস"},
        {id:"training",label:"🎓 প্রশিক্ষণ"},
        {id:"feedback",label:"⭐ ফিডব্যাক"},
      ].map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"6px 10px",borderRadius:14,border:`1px solid ${tab===t.id?C.pu:C.bd}`,background:tab===t.id?C.puL:"transparent",color:tab===t.id?C.pu:C.mu,cursor:"pointer",fontSize:11,fontWeight:tab===t.id?700:400,whiteSpace:"nowrap",flexShrink:0}}>{t.label}</button>))}
    </div>

    {/* ── উপস্থিতি ট্যাব — বাল্ক সিস্টেম ── */}
    {tab==="attendance"&&(<BulkAttendance obsData={obsData} setObsData={setObsData}/>)}

    {/* শিক্ষক নির্বাচন (উপস্থিতি ছাড়া অন্য ট্যাবের জন্য) */}
    {tab!=="attendance"&&(<Card style={{padding:"10px 12px",marginBottom:10}}>
      <div style={{fontSize:12,color:C.mu,marginBottom:5}}>শিক্ষক নির্বাচন</div>
      <select value={selTeacher} onChange={e=>setSelTeacher(e.target.value)} style={{width:"100%"}}>
        {TEACHERS.map(t=><option key={t} value={t}>{t}</option>)}
      </select>
    </Card>)}

    {/* নির্বাচিত শিক্ষকের সারসংক্ষেপ (উপস্থিতি ছাড়া) */}
    {tab!=="attendance"&&(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
      <Stat label="উপস্থিতি হার" value={totalDays?`${attPct}%`:"—"} color={attPct>=85?C.gr:attPct>=70?C.am:C.re} sub={`${totalDays}টি কার্যদিবস`}/>
      <Stat label="সিলেবাস কভার" value={totalTopics?`${sylPct}%`:"—"} color={sylPct>=75?C.gr:sylPct>=50?C.am:C.re} sub={`${coveredTopics}/${totalTopics} টপিক`}/>
      <Stat label="পরিদর্শন স্কোর" value={insList.length?`${avgIns}/10`:"—"} color={avgIns>=7?C.gr:avgIns>=5?C.am:C.re} sub={`${insList.length}টি পরিদর্শন`}/>
      <Stat label="ছাত্র ফিডব্যাক" value={fbList.length?`${avgFb}/5`:"—"} color={avgFb>=4?C.gr:avgFb>=3?C.am:C.re} sub={`${fbList.length}টি রেটিং`}/>
    </div>)}

    {/* ── পরিদর্শন ট্যাব ── */}
    {tab==="inspection"&&(<div>
      <Card>
        <H3>🔍 ক্লাস পরিদর্শন রিপোর্ট</H3>
        <InspectionForm onAdd={addInspection}/>
        {insList.length>0&&(<div style={{marginTop:12}}>
          {[...insList].reverse().map((ins,i)=>(
            <div key={i} style={{padding:"10px",background:C.bg,borderRadius:8,marginBottom:8,border:`1px solid ${C.bd}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:12,color:C.mu}}>{ins.date}</span>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{fontSize:16,fontWeight:700,color:ins.score>=7?C.gr:ins.score>=5?C.am:C.re}}>{ins.score}/10</div>
                  {["⭐","⭐","⭐","⭐","⭐"].slice(0,Math.round(ins.score/2)).join("")}
                </div>
              </div>
              {ins.remarks&&<div style={{fontSize:12,color:C.tx,fontStyle:"italic"}}>"{ins.remarks}"</div>}
            </div>
          ))}
        </div>)}
        {insList.length===0&&<div style={{textAlign:"center",color:C.mu,padding:16,fontSize:13}}>এখনো কোনো পরিদর্শন রেকর্ড নেই</div>}
      </Card>
    </div>)}

    {/* ── সিলেবাস ট্যাব ── */}
    {tab==="syllabus"&&(<div>
      <Card>
        <H3>📖 সিলেবাস কভারেজ ট্র্যাকার</H3>
        <div style={{background:C.puL,borderRadius:8,padding:"8px 10px",marginBottom:10,fontSize:12,color:C.pu}}>
          💡 বাস্তবে কোন কোন টপিক পড়ানো হয়েছে তা টিক দিন — শুধু প্ল্যান জমা নয়
        </div>
        <SyllabusForm onAdd={addSyllabusTopic}/>
        {sylList.length>0&&(<div style={{marginTop:12}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:8}}>
            <span style={{color:C.mu}}>মোট টপিক: {totalTopics}</span>
            <span style={{fontWeight:700,color:sylPct>=75?C.gr:sylPct>=50?C.am:C.re}}>কভার: {sylPct}% ({coveredTopics}/{totalTopics})</span>
          </div>
          {["বাংলা","English","গণিত","বিজ্ঞান","সমাজ","ধর্ম","ICT"].map(sub=>{
            const subTopics=sylList.filter(s=>s.subject===sub);
            if(!subTopics.length)return null;
            const cov=subTopics.filter(s=>s.covered).length;
            return(<div key={sub} style={{marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:700,color:C.pu,marginBottom:4}}>{sub} ({cov}/{subTopics.length})</div>
              {subTopics.map((s,idx)=>{
                const realIdx=sylList.findIndex(x=>x===s);
                return(<div key={idx} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 6px",borderRadius:6,background:s.covered?C.grL:"#f8f7ff",marginBottom:3,cursor:"pointer"}} onClick={()=>toggleSyllabus(realIdx)}>
                  <span style={{fontSize:18,lineHeight:1}}>{s.covered?"✅":"⬜"}</span>
                  <span style={{fontSize:12,textDecoration:s.covered?"line-through":"none",color:s.covered?C.mu:C.tx}}>{s.topic}</span>
                </div>);
              })}
            </div>);
          })}
        </div>)}
        {sylList.length===0&&<div style={{textAlign:"center",color:C.mu,padding:16,fontSize:13}}>টপিক যোগ করুন</div>}
      </Card>

  ]},
];
const DANIELSON_RATING_LABELS=["","Unsatisfactory","Basic","Proficient","Distinguished"];
const DANIELSON_RATING_COLORS=["",C.re,C.am,C.te,C.gr];

function calcPeerObsTotal(scores){
  const vals=[];
  DANIELSON_DOMAINS.forEach(d=>d.items.forEach((_,i)=>{
    const v=scores?.[d.key]?.[i];
    if(v) vals.push(v);
  }));
  if(!vals.length)return 0;
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length; // ১-৪ স্কেল
  return Math.round((avg-1)/3*100); // ১-৪ → ০-১০০
}

  const [improvements,setImprovements]=useState("");

  const setRating=(domKey,idx,val)=>{
    setScores(prev=>({...prev,[domKey]:prev[domKey].map((v,i)=>i===idx?val:v)}));

  const totalScore=calcPeerObsTotal(scores);

            <div style={{fontSize:12,marginBottom:6}}>{idx+1}. {item}</div>

              {[1,2,3,4].map(v=>(
                <button key={v} onClick={()=>setRating(dom.key,idx,v)} style={{flex:1,padding:"6px 2px",borderRadius:6,border:`1px solid ${scores[dom.key][idx]===v?DANIELSON_RATING_COLORS[v]:C.bd}`,background:scores[dom.key][idx]===v?DANIELSON_RATING_COLORS[v]+"22":"#fff",color:scores[dom.key][idx]===v?DANIELSON_RATING_COLORS[v]:C.mu,cursor:"pointer",fontSize:10,fontWeight:scores[dom.key][idx]===v?700:400}}>

function PeerObservation({obsData,setObsData,currentUser,isAdmin,STUDENTS}){
  STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const peerObservations=obsData.peerObservations||[];
  const [mode,setMode]=useState("new"); // new | history
  const [observedTeacher,setObservedTeacher]=useState(TEACHERS.find(t=>t!==currentUser)||TEACHERS[0]);
  const [cls,setCls]=useState(Object.keys(STUDENTS)[0]);
  const [subject,setSubject]=useState(SUBJECTS_BY_CLASS[Object.keys(STUDENTS)[0]]?.[0]||SUBJECTS[0]);
  const [showForm,setShowForm]=useState(false);

  const today=new Date().toLocaleDateString("bn-BD");
  const todayISO=new Date().toISOString().slice(0,10);

  const addObservation=({scores,strengths,improvements,totalScore})=>{
    const rec={
      id:Date.now().toString()+"_pobs",
      observerTeacher:currentUser,
      observedTeacher,
      date:today,
      dateISO:todayISO,
      cls,
      subject,
      scores,
      strengths,
      improvements,
      totalScore,
      isAdminObs:isAdmin,
    };
    setObsData(prev=>({...prev,peerObservations:[...(prev.peerObservations||[]),rec]}));
    setShowForm(false);
  };

  const deleteObservation=(id)=>{
    if(!window.confirm("এই পর্যবেক্ষণ রেকর্ডটি মুছে ফেলতে চান?"))return;
    setObsData(prev=>({...prev,peerObservations:(prev.peerObservations||[]).filter(o=>o.id!==id)}));
  };

  const myObservations=peerObservations.filter(o=>o.observerTeacher===currentUser);
  const myReceivedObservations=peerObservations.filter(o=>o.observedTeacher===currentUser);

  // ── অ্যাডমিন রিপোর্ট: গত ৭ দিনে কে পর্যবেক্ষণ করেননি ──
  const sevenDaysAgo=Date.now()-7*86400000;
  const recentObservers=new Set(peerObservations.filter(o=>{
    const t=o.dateISO?new Date(o.dateISO).getTime():0;
    return t>=sevenDaysAgo;
  }).map(o=>o.observerTeacher));

        <select value={observedTeacher} onChange={e=>setObservedTeacher(e.target.value)} style={{width:"100%"}}>
          {TEACHERS.filter(t=>isAdmin||t!==currentUser).map(t=><option key={t} value={t}>{t}</option>)}
        </select>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:C.mu,marginBottom:3}}>শ্রেণি</div>
          <select value={cls} onChange={e=>{setCls(e.target.value);setSubject(SUBJECTS_BY_CLASS[e.target.value]?.[0]||SUBJECTS[0]);}} style={{width:"100%"}}>

      <button onClick={()=>setShowForm(true)} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:C.pu,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>পর্যবেক্ষণ ফর্ম শুরু করুন →</button>

    {mode==="new"&&showForm&&(
      <DanielsonForm observerTeacher={currentUser} observedTeacher={observedTeacher} date={today} cls={cls} subject={subject} isAdminObs={isAdmin} onSave={addObservation} onCancel={()=>setShowForm(false)}/>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <Stat label="আমি করেছি" value={myObservations.length} color={C.pu}/>

    {isAdmin&&(<Card style={{marginTop:14}}>

      <div style={{fontSize:11,color:C.mu,marginBottom:8}}>গত ৭ দিনে যেসব শিক্ষক কোনো ক্লাস পর্যবেক্ষণ করেননি:</div>
      {nonObservers.length===0?(
        <div style={{color:C.gr,fontWeight:700,fontSize:12}}>✓ সবাই গত ৭ দিনে অন্তত একটি পর্যবেক্ষণ করেছেন</div>
      ):(
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {nonObservers.map(t=>(<span key={t} style={{padding:"4px 9px",borderRadius:14,background:C.reL,color:C.re,fontSize:11,fontWeight:700,border:`1px solid ${C.re}40`}}>{t}</span>))}
        </div>
      )}

        <thead><tr><th>শিক্ষক</th><th>করেছেন</th><th>হয়েছেন</th><th>গড় স্কোর</th></tr></thead>
        <tbody>
          {TEACHERS.map(t=>{
            const did=peerObservations.filter(o=>o.observerTeacher===t).length;
            const got=peerObservations.filter(o=>o.observedTeacher===t);
            const avgScore=got.length?Math.round(got.reduce((a,b)=>a+b.totalScore,0)/got.length):null;
            return(<tr key={t}>
              <td style={{fontSize:12,fontWeight:600,color:recentObservers.has(t)?C.tx:C.re}}>{t}{!recentObservers.has(t)&&" ⚠"}</td>
              <td style={{color:C.pu,fontWeight:700}}>{did}</td>
              <td style={{color:C.te,fontWeight:700}}>{got.length}</td>
              <td style={{color:avgScore===null?C.mu:avgScore>=70?C.gr:avgScore>=50?C.am:C.re,fontWeight:700}}>{avgScore===null?"—":avgScore}</td>
            </tr>);
          })}
        </tbody>
      </table>
    </Card>)}
  </div>);
}

/* KPI গণনা ফাংশন — কেন্দ্রীয় */
function calcKPI(teacher, allRes, lessonPlans, obsData={}, deadlines=[], dlSubmissions={}){
  const tr=allRes.filter(r=>r.teacher===teacher&&!r.absent);
  // নতুন v2 ফরম্যাট থেকে approved plan গণনা
  // weekly approved plans — নতুন সিস্টেম
  const weeklyApproved=(lessonPlans._v2||[]).filter(p=>p.teacher===teacher&&p.type==="weekly"&&p.status==="approved");
  // non-weekly approved plans (v2 পুরনো)
  const v2Plans=(lessonPlans._v2||[]).filter(p=>p.teacher===teacher&&p.type!=="weekly"&&p.status==="approved");
  // পুরনো ফরম্যাট (backward compat)
  const oldPlans=(lessonPlans[teacher]||[]);
  // weekly missed (submitted but not approved yet OR not submitted at all) — KPI penalty
  // এই সপ্তাহের উইন্ডো বন্ধ হওয়ার পরে না দিলে missed
  const weeklyMissed=(lessonPlans._weeklyMissed||{})[teacher]||0;
  const lp=weeklyApproved.length*2+v2Plans.length+oldPlans.length; // weekly approved = double credit
  const obs=obsData[teacher]||{};

  // ডেডলাইন পেনাল্টি
  const {missed:dlMissed,total:dlTotal,rate:dlRate}=calcDeadlinePenalty(teacher,deadlines,dlSubmissions);
  const dlScore=dlTotal>0?dlRate:100; // ডেটা না থাকলে ১০০%

  // ছাত্রভিত্তিক গ্রুপ করা
  const studentMap={};
  tr.forEach(r=>{
    const key=`${r.name}__${r.subject}`;
    if(!studentMap[key])studentMap[key]=[];
    studentMap[key].push(r);
  });

  let improvementScore=0, weakStudentBonus=0, consistencyScore=0, entryCount=0;

  Object.values(studentMap).forEach(entries=>{
    if(entries.length<2)return;
    const sorted=[...entries].sort((a,b)=>(a.examOrder||1)-(b.examOrder||1));
    const first=sorted[0].marks, last=sorted[sorted.length-1].marks;
    const imp=last-first;

    // উন্নতি স্কোর (দুর্বল ছাত্রে বেশি ক্রেডিট)
    let baseImpScore=0;
    if(imp>0){
      if(first<33) baseImpScore=imp*2.5;
      else if(first<50) baseImpScore=imp*2.0;
      else if(first<70) baseImpScore=imp*1.2;
      else baseImpScore=imp*0.5;
    }
    improvementScore+=Math.min(100,baseImpScore);

    // দুর্বল ছাত্র বোনাস
    if(first<40 && imp>10) weakStudentBonus+=25;
    else if(first<33 && imp>0) weakStudentBonus+=15;

    // ধারাবাহিকতা স্কোর
    const avg=sorted.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/sorted.length;
    consistencyScore+=Math.min(100,avg);
    entryCount++;
  });

  // পর্যবেক্ষণ স্কোর
  const attList=obs.attendance||[];
  const presentDays=attList.filter(a=>a.status==="present").length;
  const lateCount=attList.filter(a=>a.status==="late").length;
  const totalDays=attList.length;
  const attScore=totalDays?Math.min(100,Math.round((presentDays+lateCount*0.5)/totalDays*100)):0;

  const insList=obs.inspections||[];
  const insScore=insList.length?Math.min(100,Math.round(insList.reduce((a,b)=>a+(b.score||0),0)/insList.length*10)):0;

  const sylList=obs.syllabus||[];
  const coveredTopics=sylList.filter(s=>s.covered).length;
  const totalTopics=sylList.length;
  const sylScore=totalTopics?Math.min(100,Math.round(coveredTopics/totalTopics*100)):0;

  const fbList=obs.feedback||[];
  const fbScore=fbList.length?Math.min(100,Math.round(fbList.reduce((a,b)=>a+(b.rating||0),0)/fbList.length*20)):0;

  const trainingList=obs.trainings||[];
  const trainingScore=Math.min(100,trainingList.length*20);

  const hasObsData=(attList.length+insList.length+sylList.length+fbList.length+trainingList.length)>0;
  const hasDlData=dlTotal>0;

  // ── পিয়ার ক্লাস পর্যবেক্ষণ (peerObservations) ──
  const peerObs=obsData.peerObservations||[];
  // এই শিক্ষক পর্যবেক্ষক হিসেবে — গত ৭ দিনে অন্তত ১টি পর্যবেক্ষণ করলে বোনাস, না করলে পেনাল্টি
  const sevenDaysAgo=Date.now()-7*86400000;
  const myObserverEntries=peerObs.filter(o=>o.observerTeacher===teacher);
  const observedThisWeek=myObserverEntries.some(o=>{
    const t=o.dateISO?new Date(o.dateISO).getTime():0;
    return t>=sevenDaysAgo;
  });
  const hasAnyPeerObsData=peerObs.length>0;
  const peerObsParticipationScore=hasAnyPeerObsData?(observedThisWeek?5:-5):0;

  // এই শিক্ষক পর্যবেক্ষিত হিসেবে — প্রাপ্ত সব পর্যবেক্ষণের গড় স্কোর ("ক্লাস মান")
  const myReceivedEntries=peerObs.filter(o=>o.observedTeacher===teacher);
  const classQualityScore=myReceivedEntries.length?Math.round(myReceivedEntries.reduce((a,b)=>a+(b.totalScore||0),0)/myReceivedEntries.length):null;
  const hasClassQualityData=classQualityScore!==null;

  // একটিমাত্র এন্ট্রি থাকলেও consistency স্কোর হিসাব (improvement-এর জন্য ২টি লাগে)
  const singleEntries=Object.values(studentMap).filter(e=>e.length===1);
  let singleConsScore=0;
  singleEntries.forEach(entries=>{
    const r=entries[0];
    const pct=Math.round(r.marks/(r.fullMarks||100)*100);
    singleConsScore+=Math.min(100,pct);
  });
  const totalEntryCount=entryCount+singleEntries.length;
  const totalConsScore=consistencyScore+singleConsScore;

  if(totalEntryCount===0&&lp===0&&!hasObsData&&!hasAnyPeerObsData)return{score:0,grade:"—",impScore:0,weakBonus:0,consScore:0,lpScore:0,attScore:0,insScore:0,sylScore:0,fbScore:0,trainingScore:0,dlScore:100,dlMissed:0,dlTotal:0,count:tr.length,lp,breakdown:[]};

  const avgImp=entryCount?Math.min(100,Math.round(improvementScore/entryCount)):0;
  const avgWeak=entryCount?Math.min(100,Math.round(weakStudentBonus/entryCount)):0;
  // consistency: পেয়ারড + সিঙ্গেল উভয় এন্ট্রির গড়
  const avgCons=totalEntryCount?Math.min(100,Math.round(totalConsScore/totalEntryCount)):0;
  const lpScore=Math.min(100,lp*10);

  // ডেডলাইন penalty: miss করলে স্কোর কমে
  const dlPenalty=hasDlData?Math.round((100-dlScore)*0.15):0; // সর্বোচ্চ ১৫ পয়েন্ট কাটা

  // ওজনভিত্তিক চূড়ান্ত স্কোর (obs data যুক্ত হলে ওজন পুনর্বণ্টন)
  let rawScore;
  if(hasObsData){
    const obsAvg=Math.round((attScore+insScore+sylScore+fbScore+trainingScore)/5);
    rawScore=Math.min(100,Math.round(avgImp*0.28+avgWeak*0.18+avgCons*0.14+lpScore*0.05+obsAvg*0.25+dlScore*0.10));
  } else {
    rawScore=Math.min(100,Math.round(avgImp*0.38+avgWeak*0.28+avgCons*0.19+lpScore*0.05+dlScore*0.10));
  }
  const finalScoreBase=Math.max(0,rawScore-dlPenalty);

  // ক্লাস মান (peer observation গড় স্কোর) — ১৫% ওজনে যুক্ত হবে
  const finalScoreWithQuality=hasClassQualityData
    ?Math.round(finalScoreBase*0.85+classQualityScore*0.15)
    :finalScoreBase;

  // পর্যবেক্ষণ অংশগ্রহণ বোনাস/পেনাল্টি (+5/-5)
  const finalScore=Math.max(0,Math.min(100,finalScoreWithQuality+peerObsParticipationScore));

  const grade=finalScore>=85?"A+":finalScore>=70?"A":finalScore>=55?"B":finalScore>=40?"C":finalScore>0?"D":"—";

  const breakdown=[
    {label:"ছাত্র উন্নতি",value:avgImp,weight:hasObsData?28:38,color:C.gr},
    {label:"দুর্বল ছাত্র বোনাস",value:avgWeak,weight:hasObsData?18:28,color:C.co},
    {label:"ধারাবাহিকতা",value:avgCons,weight:hasObsData?14:19,color:C.te},
    {label:"পাঠ পরিকল্পনা",value:lpScore,weight:5,color:C.pu},
    {label:"ডেডলাইন পালন",value:dlScore,weight:10,color:dlScore>=90?C.gr:dlScore>=70?C.am:C.re},
  ];
  if(hasObsData){
    breakdown.push({label:"উপস্থিতি",value:attScore,weight:5,color:C.am});
    breakdown.push({label:"পরিদর্শন স্কোর",value:insScore,weight:5,color:C.pu});
    breakdown.push({label:"সিলেবাস কভারেজ",value:sylScore,weight:5,color:C.te});
    breakdown.push({label:"ছাত্র ফিডব্যাক",value:fbScore,weight:5,color:C.gr});
    breakdown.push({label:"প্রশিক্ষণ",value:trainingScore,weight:5,color:C.co});
  }
  if(hasClassQualityData){
    breakdown.push({label:"ক্লাস মান (পিয়ার পর্যবেক্ষণ)",value:classQualityScore,weight:15,color:classQualityScore>=70?C.gr:classQualityScore>=50?C.am:C.re});
  }
  if(hasAnyPeerObsData){
    breakdown.push({label:"পর্যবেক্ষণ অংশগ্রহণ",value:peerObsParticipationScore,weight:0,color:peerObsParticipationScore>0?C.gr:C.re,isBonus:true});
  }

  return{score:finalScore,grade,impScore:avgImp,weakBonus:avgWeak,consScore:avgCons,lpScore,
    attScore,insScore,sylScore,fbScore,trainingScore,dlScore,dlMissed,dlTotal,hasObsData,hasDlData,
    classQualityScore,hasClassQualityData,peerObsParticipationScore,hasAnyPeerObsData,observedThisWeek,
    count:tr.length,lp,breakdown};
}

/* টপ পারফর্মার — শ্রেণিভিত্তিক সেরা ৩ ছাত্র + ট্রেন্ড অ্যারো */
function TopStudentPerformers({STUDENTS,allRes}){
  const [selCls,setSelCls]=useState("all");
  const classes=Object.keys(STUDENTS);

  const rows=useMemo(()=>{
    const allStudents=Object.entries(STUDENTS).flatMap(([cls,names])=>names.map(n=>({name:n,cls})));
    return allStudents.map(({name,cls})=>{
      const sr=allRes.filter(r=>r.name===name&&!r.absent&&r.marks!=null);
      if(!sr.length)return null;
      const avg=Math.round(sr.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/sr.length);
      // ট্রেন্ড: সর্বশেষ পরীক্ষার নম্বর - প্রথম পরীক্ষার নম্বর (% হিসেবে)
      const sorted=[...sr].sort((a,b)=>(a.examOrder||1)-(b.examOrder||1));
      const first=Math.round(sorted[0].marks/(sorted[0].fullMarks||100)*100);
      const last=Math.round(sorted[sorted.length-1].marks/(sorted[sorted.length-1].fullMarks||100)*100);
      const trend=sorted.length>=2?last-first:null;
      const [grade,gc]=getGrade(avg,100,33);
      return{name,cls,avg,trend,grade,gc,count:sr.length};
    }).filter(Boolean);
  },[allRes,STUDENTS]);

  const filtered=selCls==="all"?rows:rows.filter(r=>r.cls===selCls);
  const top=filtered.sort((a,b)=>b.avg-a.avg).slice(0,5);

  if(!rows.length)return(<div style={{fontSize:12,color:C.mu,textAlign:"center",padding:12}}>এখনো কোনো ফলাফল নেই</div>);

  const trendIcon=(t)=>{
    if(t===null)return<span style={{fontSize:11,color:C.mu}}>—</span>;
    if(t>5)return<span style={{fontSize:12,fontWeight:700,color:C.gr}}>▲{t}</span>;
    if(t>0)return<span style={{fontSize:12,fontWeight:700,color:"#7bc47b"}}>↗{t}</span>;
    if(t===0)return<span style={{fontSize:12,color:C.mu}}>→</span>;
    if(t>-5)return<span style={{fontSize:12,fontWeight:700,color:C.co}}>↘{Math.abs(t)}</span>;
    return<span style={{fontSize:12,fontWeight:700,color:C.re}}>▼{Math.abs(t)}</span>;
  };

  return(<div>
    {/* শ্রেণি ফিল্টার */}
    <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
      <button onClick={()=>setSelCls("all")} style={{padding:"3px 10px",borderRadius:14,border:`1px solid ${selCls==="all"?C.pu:C.bd}`,background:selCls==="all"?C.puL:"transparent",color:selCls==="all"?C.pu:C.mu,cursor:"pointer",fontSize:11,fontWeight:selCls==="all"?700:400}}>সব</button>
      {classes.map(cls=>(
        <button key={cls} onClick={()=>setSelCls(cls)} style={{padding:"3px 10px",borderRadius:14,border:`1px solid ${selCls===cls?C.pu:C.bd}`,background:selCls===cls?C.puL:"transparent",color:selCls===cls?C.pu:C.mu,cursor:"pointer",fontSize:11,fontWeight:selCls===cls?700:400}}>{cls}</button>
      ))}
    </div>
    {/* তালিকা */}
    {top.length===0&&<div style={{fontSize:12,color:C.mu,textAlign:"center",padding:8}}>এই শ্রেণিতে ডেটা নেই</div>}
    {top.map((s,i)=>(
      <div key={s.name+s.cls} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 6px",borderBottom:`1px solid ${C.bd}`,borderRadius:i===0?8:0,background:i===0?"linear-gradient(90deg,#ede9fd55,transparent)":"transparent"}}>
        {/* র‍্যাংক */}

/* স্কুলের সামগ্রিক পরীক্ষাভিত্তিক ট্রেন্ড প্যানেল */
function SchoolTrendPanel({allRes}){
  const examOrder={"Chapter Final":1,"First Term":2,"Fortnightly Exam":2,"Second Term":3,"Half-Yearly Exam":3,"Third Term":4,"Annual Exam":4};

  const trendByExam=useMemo(()=>{
    const examMap={};
    allRes.filter(r=>!r.absent&&r.marks!=null).forEach(r=>{
      const key=r.examType||"অজানা";
      if(!examMap[key])examMap[key]={total:0,count:0,order:examOrder[key]||9};
      examMap[key].total+=Math.round(r.marks/(r.fullMarks||100)*100);
      examMap[key].count++;
    });
    return Object.entries(examMap)
      .map(([exam,{total,count,order}])=>({exam,avg:Math.round(total/count),count,order}))
      .sort((a,b)=>a.order-b.order);
  },[allRes]);

  if(trendByExam.length<2)return null;

  const maxAvg=Math.max(...trendByExam.map(e=>e.avg));
  const minAvg=70; // বার চার্টের বেস
  const first=trendByExam[0].avg;
  const last=trendByExam[trendByExam.length-1].avg;
  const overallTrend=last-first;
  const trendColor=overallTrend>0?C.gr:overallTrend<0?C.re:C.mu;
  const trendText=overallTrend>0?`▲ সামগ্রিক উন্নতি +${overallTrend}%`:overallTrend<0?`▼ সামগ্রিক হ্রাস ${overallTrend}%`:"→ স্থিতিশীল";

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{fontSize:11,color:C.mu}}>{trendByExam.length}টি পরীক্ষার তুলনামূলক বিশ্লেষণ</div>
      <div style={{fontSize:12,fontWeight:700,color:trendColor}}>{trendText}</div>
    </div>
    {/* মিনি বার চার্ট */}
    <div style={{display:"flex",gap:4,alignItems:"flex-end",height:64,marginBottom:6}}>
      {trendByExam.map((e,i)=>{
        const prev=i>0?trendByExam[i-1].avg:null;
        const barColor=prev===null?C.pu:e.avg>prev?C.gr:e.avg<prev?C.re:C.am;
        const heightPct=Math.max(10,Math.round(((e.avg-(minAvg-5))/(maxAvg-(minAvg-5)+5))*54));
        return(
          <div key={e.exam} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <div style={{fontSize:9,fontWeight:700,color:barColor}}>{e.avg}%</div>
            <div style={{width:"100%",height:heightPct,background:barColor,borderRadius:"3px 3px 0 0",opacity:0.85,transition:"height 0.4s",minWidth:18,position:"relative"}}>
              {i>0&&trendByExam[i].avg!==trendByExam[i-1].avg&&(
                <div style={{position:"absolute",top:-14,left:"50%",transform:"translateX(-50%)",fontSize:10,fontWeight:700,color:barColor}}>
                  {trendByExam[i].avg>trendByExam[i-1].avg?"↑":"↓"}
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
    {/* লেবেল */}
    <div style={{display:"flex",gap:4}}>
      {trendByExam.map(e=>(
        <div key={e.exam} style={{flex:1,fontSize:8,color:C.mu,textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={e.exam}>
          {e.exam.replace(" পত্র","").split(" ")[0]}
        </div>
      ))}
    </div>
    {/* অংশগ্রহণ সংখ্যা */}
    <div style={{display:"flex",gap:4,marginTop:2}}>
      {trendByExam.map(e=>(
        <div key={e.exam} style={{flex:1,fontSize:8,color:C.bd,textAlign:"center"}}>{e.count}</div>
      ))}
    </div>
  </div>);
}

function HealthGauge({value,color,label}){
  const size=140,stroke=14,r=(size-stroke)/2,cx=size/2,cy=size/2;
  const circ=2*Math.PI*r;
  const pct=Math.max(0,Math.min(100,value));
  const offset=circ-(pct/100)*circ;
  return(
    <div style={{position:"relative",width:size,height:size}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#eee" strokeWidth={stroke}/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={offset} style={{transition:"stroke-dashoffset 0.6s ease"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontSize:30,fontWeight:800,color}}>{value}</div>
        <div style={{fontSize:11,fontWeight:700,color,marginTop:-2}}>{label}</div>
      </div>
    </div>
  );
}
/* ── শিক্ষার্থীর পারফরমেন্স স্তর নির্ধারণ (সমস্ত বিষয়ের গড়ের উপর ভিত্তি করে) ──
   ভালো  : গড় ≥ 60%  (A- বা উপরে)
   মধ্যম  : গড় ≥ 40%  (B/C)
   দুর্বল : গড় < 40%  (D/F)                                                     */
const getStudentPerfLevel=(studentName,allRes)=>{
  const sr=allRes.filter(r=>r.name===studentName&&!r.absent&&r.marks!=null);
  if(!sr.length)return null;
  const avgPct=sr.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/sr.length;
  if(avgPct>=60)return"good";
  if(avgPct>=40)return"avg";
  return"weak";
};

function ClassHeatmap({STUDENTS,allRes}){
  const bands=[
    {key:"good",label:"ভালো (গড় ≥ ৬০%)",color:C.gr},
    {key:"avg", label:"মধ্যম (৪০–৫৯%)", color:C.am},
    {key:"weak",label:"দুর্বল (< ৪০%)",  color:C.re}
  ];

  const rows=Object.keys(STUDENTS).map(cls=>{
    const names=STUDENTS[cls]||[];
    let good=0,avgB=0,weak=0,noData=0;
    names.forEach(name=>{
      const lvl=getStudentPerfLevel(name,allRes);
      if(lvl==="good")good++;
      else if(lvl==="avg")avgB++;
      else if(lvl==="weak")weak++;
      else noData++;
    });
    const tot=good+avgB+weak; // ডেটা আছে এমন শিক্ষার্থী
    return{cls,tot,totalStudents:names.length,noData,counts:{good,avg:avgB,weak}};
  }).filter(r=>r.tot>0);

  if(rows.length===0)return null;

  return(<div>
    {/* লেজেন্ড */}
    <div style={{display:"flex",gap:10,marginBottom:10,fontSize:10,color:C.mu,flexWrap:"wrap"}}>
      {bands.map(b=>(<div key={b.key} style={{display:"flex",alignItems:"center",gap:4}}>
        <div style={{width:9,height:9,borderRadius:2,background:b.color}}/>{b.label}
      </div>))}
    </div>

    {/* শ্রেণিভিত্তিক সারি */}
    <div style={{display:"grid",gridTemplateColumns:"52px 1fr 60px",gap:"6px 8px",alignItems:"center",fontSize:11}}>
      {rows.map(({cls,tot,totalStudents,counts})=>(
        <React.Fragment key={cls}>
          {/* শ্রেণি লেবেল */}
          <div style={{fontWeight:700,color:C.tx}}>{cls}</div>

          {/* রঙিন বার */}
          <div style={{display:"flex",height:26,borderRadius:6,overflow:"hidden",border:`1px solid ${C.bd}`}}>
            {bands.map(b=>{
              const c=counts[b.key];
              if(!c)return null;
              const w=Math.round(c/tot*100);
              return(<div key={b.key}
                title={`${b.label}: ${c} জন`}
                style={{width:`${w}%`,background:b.color,display:"flex",alignItems:"center",
                  justifyContent:"center",color:"#fff",fontSize:10,fontWeight:700,
                  minWidth:c?18:0,transition:"width 0.4s"}}>
                {w>=12?c:""}
              </div>);
            })}
          </div>

          {/* সারসংখ্যা */}
          <div style={{fontSize:10,color:C.mu,textAlign:"right"}}>
            <span style={{color:C.gr,fontWeight:700}}>{counts.good}</span>
            <span style={{color:C.bd}}> / </span>
            <span style={{color:C.am,fontWeight:700}}>{counts.avg}</span>
            <span style={{color:C.bd}}> / </span>
            <span style={{color:C.re,fontWeight:700}}>{counts.weak}</span>
          </div>
        </React.Fragment>
      ))}
    </div>

    {/* ফুটার নোট */}
    <div style={{marginTop:8,fontSize:10,color:C.mu,textAlign:"center"}}>
      ভালো / মধ্যম / দুর্বল — শিক্ষার্থীর সমস্ত বিষয়ের গড় % এর উপর ভিত্তি করে
    </div>
  </div>);
}

    {key:"A",  label:"A",  min:70, color:"#0f6e56", bg:"#e1f5ee"},

    {key:"F",  label:"ফেল ঝুঁকি", min:0, color:"#a32d2d", bg:"#fef2f2"},
  ];

  const getGradeBand=(pct)=>{
    for(const b of GRADE_BANDS) if(pct>=b.min) return b.key;
    return "F";
  };

              {withData>0?(
                <div style={{padding:"8px 12px"}}>
                  {/* গ্রেড রো */}
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {GRADE_BANDS.map(b=>{
                      const students=gradeGroups[b.key]||[];
                      if(students.length===0)return null;
                      const isActive=drillDown&&drillDown.cls===cls&&drillDown.grade===b.key;
                      return(
                        <div key={b.key} style={{flex:"1 1 auto",minWidth:60}}>
                          <button
                            onClick={(e)=>handleCountClick(cls,b.key,e)}
                            style={{
                              width:"100%",padding:"8px 6px",
                              background:isActive?b.color:b.bg,
                              border:`2px solid ${b.color}40`,
                              borderRadius:9,cursor:"pointer",
                              transition:"all 0.15s",
                              boxShadow:isActive?`0 3px 10px ${b.color}40`:"none"
                            }}>
                            <div style={{fontSize:20,fontWeight:800,color:isActive?"#fff":b.color,lineHeight:1}}>{students.length}</div>
                            <div style={{fontSize:10,fontWeight:700,color:isActive?"rgba(255,255,255,0.9)":b.color,marginTop:2}}>{b.label}</div>
                          </button>
                        </div>
                      );
                    })}
                  </div>

                  {/* ড্রিল-ডাউন তালিকা */}
                  {drillDown&&drillDown.cls===cls&&(()=>{
                    const band=GRADE_BANDS.find(b=>b.key===drillDown.grade);
                    const students=(gradeGroups[drillDown.grade]||[]).sort((a,b2)=>b2.avg-a.avg);
                    if(!students.length)return null;
                    return(
                      <div style={{marginTop:10,padding:"10px",background:band.bg,borderRadius:10,border:`1px solid ${band.color}25`}}>
                        <div style={{fontWeight:700,fontSize:12,color:band.color,marginBottom:8}}>
                          {band.label} গ্রেড — {students.length} জন ছাত্র
                        </div>
                        {students.map((st,i)=>(
                          <div key={st.name}
                            onClick={()=>setProfilePop({name:st.name,cls})}
                            style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 8px",background:"rgba(255,255,255,0.85)",borderRadius:8,marginBottom:i<students.length-1?5:0,cursor:"pointer",border:`1px solid ${band.color}15`,transition:"background 0.1s"}}
                            onMouseEnter={e=>e.currentTarget.style.background="#fff"}
                            onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.85)"}>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{width:22,height:22,borderRadius:"50%",background:band.color,color:"#fff",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{i+1}</div>
                              <div style={{fontSize:12,fontWeight:600,color:"#1a1a2e"}}>{st.name.split(" ").slice(0,3).join(" ")}</div>
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <span style={{fontWeight:700,color:band.color,fontSize:13}}>{st.avg}%</span>
                              <span style={{fontSize:10,color:"#888"}}>👆</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    );
                  })()}

                  {/* মিনি বার চার্ট */}
                  <div style={{marginTop:8,display:"flex",gap:2,height:6,borderRadius:4,overflow:"hidden"}}>
                    {GRADE_BANDS.map(b=>{
                      const cnt=(gradeGroups[b.key]||[]).length;
                      if(!cnt)return null;
                      const w=withData?Math.round(cnt/withData*100):0;
                      return <div key={b.key} style={{width:`${w}%`,background:b.color,minWidth:cnt>0?3:0}} title={`${b.label}: ${cnt}`}/>;
                    })}
                  </div>
                </div>
              ):(
                <div style={{padding:"12px",textAlign:"center",color:"#999",fontSize:11}}>এখনো কোনো ফলাফল এন্ট্রি হয়নি</div>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* ছাত্র প্রোফাইল পপআপ */}
      {profilePop&&(
        <StudentProfile
          name={profilePop.name}
          cls={profilePop.cls}
          results={results}
          onClose={()=>setProfilePop(null)}
          studentProfiles={studentProfiles}
          setStudentProfiles={setStudentProfiles}
          currentUser={currentUser}
        />
      )}
    </div>
  );
}

function Dashboard({results,lessonPlans,onExport,STUDENTS,obsData={},deadlines=[],dlSubmissions={},lastExportTs=null,studentProfiles={},setStudentProfiles,currentUser=""}){STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const [dashProfile,setDashProfile]=useState(null);// {type:"teacher"|"student", name, cls}
  const [showHealthModal,setShowHealthModal]=useState(false);
  const allRes=Object.values(results).flat();
  // গড় সবসময় % এ — fullMarks যাই হোক তুলনামূলক সঠিক থাকে
  const validRes=allRes.filter(r=>!r.absent&&r.marks!=null);
  const examCount=(()=>{const keys=new Set(validRes.map(r=>`${r.cls}|${r.subject}|${r.examType}|${r.examName||""}`));return keys.size;})();
  const avg=(()=>{if(!validRes.length)return 0;return Math.round(validRes.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/validRes.length);})();
  const lp=(lessonPlans._v2||[]).length + Object.entries(lessonPlans).filter(([k])=>k!=='_v2').reduce((a,[,v])=>a+(Array.isArray(v)?v.length:0),0);
  const total=Object.values(STUDENTS).flat().length;
  const pass=allRes.filter(r=>!r.absent&&r.marks>=(r.passMarks||33)).length;
  const clsData=Object.keys(STUDENTS).map(cls=>({label:cls,value:STUDENTS[cls].length,color:C.pu}));

  // শেষ ব্যাকআপের পর কতদিন পার হয়েছে তা যাচাই (App থেকে prop আসে)
  let daysSinceBackup=null;
  if(lastExportTs)daysSinceBackup=Math.floor((Date.now()-new Date(lastExportTs).getTime())/86400000);
  const needsBackup=(allRes.length>0||lp>0)&&(daysSinceBackup===null||daysSinceBackup>=7);

  // সামগ্রিক স্কুল হেলথ স্কোর (পাস রেট + গড় নম্বরের সমন্বয়)
  const passRatePct=validRes.length?Math.round(pass/validRes.length*100):0;
  const avgPct=avg; // avg এখন % এ, সরাসরি ব্যবহার
  const healthScore=validRes.length?Math.round(passRatePct*0.6+avgPct*0.4):0;
  const healthColor=healthScore>=75?C.gr:healthScore>=50?C.am:C.re;
  const healthLabel=healthScore>=75?"চমৎকার":healthScore>=50?"মধ্যম":allRes.length?"নজর প্রয়োজন":"ডেটা নেই";

  // ── চলতি মাস নির্ধারণ ──
  const nowD=new Date();
  const curYear=nowD.getFullYear();
  const curMonth=nowD.getMonth(); // 0-based
  const monthNames=["জানুয়ারি","ফেব্রুয়ারি","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টেম্বর","অক্টোবর","নভেম্বর","ডিসেম্বর"];
  const curMonthLabel=monthNames[curMonth]+" "+curYear;

  // ── চলতি মাসের ফলাফল ফিল্টার ──
  // savedAt থাকলে সেটা, না থাকলে examDate, না থাকলে বাদ
  const isThisMonth=(dateStr)=>{
    if(!dateStr)return false;
    try{const d=new Date(dateStr);return d.getFullYear()===curYear&&d.getMonth()===curMonth;}catch(e){return false;}
  };
  const monthRes=allRes.filter(r=>{
    if(r.savedAt&&isThisMonth(r.savedAt))return true;
    if(r.examDate&&isThisMonth(r.examDate))return true;
    return false;
  });

  // ── চলতি মাসের lesson plans ──
  const monthLPs={
    _v2:(lessonPlans._v2||[]).filter(p=>isThisMonth(p.submittedAt)||isThisMonth(p.reviewedAt)),
    ...Object.fromEntries(Object.entries(lessonPlans).filter(([k])=>k!=='_v2'))
  };

  // ── চলতি মাসের obsData (পিয়ার পর্যবেক্ষণ) ──
  const monthObsData={
    ...obsData,
    peerObservations:(obsData.peerObservations||[]).filter(o=>isThisMonth(o.dateISO))
  };

  // ── মাসের সেরা শিক্ষক: চলতি মাসের KPI ──
  const kpiAllDash=TEACHERS.map(teacher=>({teacher,...calcKPI(teacher,monthRes,monthLPs,monthObsData,deadlines,dlSubmissions)})).filter(k=>k.score>0).sort((a,b)=>b.score-a.score);
  const teacherOfMonth=kpiAllDash.length>0?kpiAllDash[0]:null;

  // ── মাসের সেরা ছাত্র: চলতি মাসের ফলাফল ──
  const allStudentsList=Object.entries(STUDENTS).flatMap(([cls,names])=>names.map(n=>({name:n,cls})));
  const studentScores=allStudentsList.map(({name,cls})=>{
    const sr=monthRes.filter(r=>r.name===name&&!r.absent&&r.marks!=null);
    if(!sr.length)return null;
    const avg2=Math.round(sr.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/sr.length);
    const sorted2=[...sr].sort((a,b)=>(a.examOrder||1)-(b.examOrder||1));
    const trend2=sorted2.length>=2?Math.round(sorted2[sorted2.length-1].marks/(sorted2[sorted2.length-1].fullMarks||100)*100)-Math.round(sorted2[0].marks/(sorted2[0].fullMarks||100)*100):0;
    const [grade2,gc2]=getGrade(avg2,100,33);
    return{name,cls,avg:avg2,trend:trend2,grade:grade2,gc:gc2,count:sr.length};
  }).filter(Boolean).sort((a,b)=>b.avg-a.avg);
  const studentOfMonth=studentScores.length>0?studentScores[0]:null;

  // ── কতটুকু মাস পেরিয়েছে (প্রগতি বার) ──
  const totalDaysInMonth=new Date(curYear,curMonth+1,0).getDate();
  const daysPassed=nowD.getDate();
  const monthProgress=Math.round(daysPassed/totalDaysInMonth*100);

  return(<div>
    <H2>📊 একাডেমিক ড্যাশবোর্ড</H2>

    {/* ── মাসের সেরা কার্ড (ডায়নামিক) ── */}
    <div style={{background:"linear-gradient(135deg,#3a2d9e,#5344b5,#7c3aed)",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 6px 24px rgba(83,68,181,0.3)"}}>
      {/* হেডার */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{color:"#fff",fontWeight:800,fontSize:15,letterSpacing:0.3}}>🏆 {curMonthLabel}-এর সেরা</div>
        <div style={{fontSize:10,color:"rgba(255,255,255,0.7)",textAlign:"right"}}>
          <div>দিন {daysPassed}/{totalDaysInMonth}</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.5)"}}>লাইভ র‍্যাংকিং</div>
        </div>
      </div>

      {/* মাসের প্রগতি বার */}
      <div style={{marginBottom:12}}>
        <div style={{height:5,borderRadius:4,background:"rgba(255,255,255,0.15)",overflow:"hidden"}}>
          <div style={{height:"100%",width:`${monthProgress}%`,borderRadius:4,background:"linear-gradient(90deg,#ffd700,#ffaa00)",transition:"width 0.5s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:3,fontSize:9,color:"rgba(255,255,255,0.5)"}}>
          <span>মাসের শুরু</span>
          <span style={{color:"#ffd700",fontWeight:700}}>{monthProgress}% সম্পন্ন</span>
          <span>মাসের শেষ = চূড়ান্ত বিজয়ী</span>
        </div>
      </div>

      {(teacherOfMonth||studentOfMonth)?(
        <>
          {/* শীর্ষ দুইজন */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            {/* শিক্ষক */}
            <div onClick={()=>teacherOfMonth&&setDashProfile({type:"teacher",name:teacherOfMonth.teacher})}
              style={{background:"rgba(255,255,255,0.12)",borderRadius:12,padding:"12px 10px",textAlign:"center",border:"1px solid rgba(255,215,0,0.3)",cursor:teacherOfMonth?"pointer":"default",transition:"background 0.15s"}}
              onMouseEnter={e=>{if(teacherOfMonth)e.currentTarget.style.background="rgba(255,255,255,0.22)";}}
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.12)";}}>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.6)",fontWeight:600,letterSpacing:1,marginBottom:4}}>👩‍🏫 শিক্ষক</div>
              {teacherOfMonth?(
                <>
                  <div style={{fontSize:20,marginBottom:3}}>🥇</div>
                  <div style={{fontSize:12,fontWeight:800,color:"#fff",lineHeight:1.3,marginBottom:5}}>{teacherOfMonth.teacher.split(" ").slice(-2).join(" ")}</div>
                  <div style={{display:"inline-block",background:"rgba(255,215,0,0.2)",border:"1px solid rgba(255,215,0,0.5)",borderRadius:20,padding:"2px 9px",fontSize:12,color:"#ffd700",fontWeight:800}}>KPI {teacherOfMonth.score}</div>
                  <div style={{marginTop:4,fontSize:9,color:"rgba(255,255,255,0.55)"}}>গ্রেড {teacherOfMonth.grade} • <span style={{color:"rgba(255,215,0,0.7)"}}>👆 প্রোফাইল</span></div>
                </>
              ):<div style={{fontSize:11,color:"rgba(255,255,255,0.4)",padding:"10px 0"}}>ডেটা নেই</div>}
            </div>
            {/* ছাত্র */}
            <div onClick={()=>studentOfMonth&&setDashProfile({type:"student",name:studentOfMonth.name,cls:studentOfMonth.cls})}
              style={{background:"rgba(255,255,255,0.12)",borderRadius:12,padding:"12px 10px",textAlign:"center",border:"1px solid rgba(255,215,0,0.3)",cursor:studentOfMonth?"pointer":"default",transition:"background 0.15s"}}
              onMouseEnter={e=>{if(studentOfMonth)e.currentTarget.style.background="rgba(255,255,255,0.22)";}}
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.12)";}}>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.6)",fontWeight:600,letterSpacing:1,marginBottom:4}}>🎓 ছাত্র</div>
              {studentOfMonth?(
                <>
                  <div style={{fontSize:20,marginBottom:3}}>🥇</div>
                  <div style={{fontSize:12,fontWeight:800,color:"#fff",lineHeight:1.3,marginBottom:5}}>{studentOfMonth.name.split(" ").slice(0,2).join(" ")}</div>
                  <div style={{display:"inline-block",background:"rgba(255,215,0,0.2)",border:"1px solid rgba(255,215,0,0.5)",borderRadius:20,padding:"2px 9px",fontSize:12,color:"#ffd700",fontWeight:800}}>{studentOfMonth.avg}%</div>
                  <div style={{marginTop:4,fontSize:9,color:"rgba(255,255,255,0.55)"}}>শ্রেণি {studentOfMonth.cls} • <span style={{color:"rgba(255,215,0,0.7)"}}>👆 প্রোফাইল</span></div>
                </>
              ):<div style={{fontSize:11,color:"rgba(255,255,255,0.4)",padding:"10px 0"}}>ডেটা নেই</div>}
            </div>
          </div>

          {/* হাড্ডাহাড্ডি র‍্যাংকিং */}
          {(kpiAllDash.length>1||studentScores.length>1)&&(
            <div style={{borderTop:"1px solid rgba(255,255,255,0.12)",paddingTop:10}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:7,textAlign:"center",letterSpacing:0.5}}>⚔️ হাড্ডাহাড্ডি প্রতিযোগিতা</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {/* শিক্ষক র‍্যাংকিং */}
                <div>
                  {kpiAllDash.slice(0,5).map((k,i)=>(
                    <div key={k.teacher} onClick={()=>setDashProfile({type:"teacher",name:k.teacher})}
                      style={{display:"flex",alignItems:"center",gap:5,padding:"4px 4px",borderBottom:"1px solid rgba(255,255,255,0.06)",cursor:"pointer",borderRadius:4,transition:"background 0.12s"}}
                      onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.1)"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <span style={{fontSize:11,minWidth:16}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`}</span>
                      <span style={{flex:1,fontSize:10,color:i===0?"#fff":"rgba(255,255,255,0.65)",fontWeight:i===0?700:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{k.teacher.split(" ").pop()}</span>
                      <span style={{fontSize:10,fontWeight:700,color:i===0?"#ffd700":"rgba(255,255,255,0.5)"}}>{k.score}</span>
                    </div>
                  ))}
                </div>
                {/* ছাত্র র‍্যাংকিং */}
                <div>
                  {studentScores.slice(0,5).map((s,i)=>(
                    <div key={s.name} onClick={()=>setDashProfile({type:"student",name:s.name,cls:s.cls})}
                      style={{display:"flex",alignItems:"center",gap:5,padding:"4px 4px",borderBottom:"1px solid rgba(255,255,255,0.06)",cursor:"pointer",borderRadius:4,transition:"background 0.12s"}}
                      onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.1)"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <span style={{fontSize:11,minWidth:16}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`}</span>
                      <span style={{flex:1,fontSize:10,color:i===0?"#fff":"rgba(255,255,255,0.65)",fontWeight:i===0?700:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name.split(" ")[0]}</span>
                      <span style={{fontSize:10,fontWeight:700,color:i===0?"#ffd700":"rgba(255,255,255,0.5)"}}>{s.avg}%</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </>
      ):(
        <div style={{textAlign:"center",padding:"16px 0",color:"rgba(255,255,255,0.45)",fontSize:12}}>
          এই মাসে এখনো কোনো ডেটা এন্ট্রি হয়নি<br/>
          <span style={{fontSize:10}}>ফলাফল বা পাঠ পরিকল্পনা যোগ করলে র‍্যাংকিং শুরু হবে</span>
        </div>
      )}
    </div>
    <Card style={{textAlign:"center",cursor:"pointer",border:`2px solid ${healthColor}30`,transition:"box-shadow 0.2s"}}
      onClick={()=>setShowHealthModal(true)}
      onMouseEnter={e=>{e.currentTarget.style.boxShadow=`0 6px 20px ${healthColor}25`;}}
      onMouseLeave={e=>{e.currentTarget.style.boxShadow="none";}}>
      <H3 style={{textAlign:"center",justifyContent:"center"}}>🏫 প্রতিষ্ঠানের সামগ্রিক স্বাস্থ্য স্কোর</H3>
      <div style={{display:"flex",justifyContent:"center"}}>
        <HealthGauge value={healthScore} color={healthColor} label={healthLabel}/>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:18,marginTop:10,fontSize:11,color:C.mu}}>
        <div><span style={{fontWeight:700,color:C.gr}}>{passRatePct}%</span> পাস রেট</div>
        <div><span style={{fontWeight:700,color:C.am}}>{avgPct}%</span> গড় স্কোর</div>
      </div>
      <div style={{marginTop:8,fontSize:11,color:healthColor,fontWeight:600}}>👆 শ্রেণিভিত্তিক গ্রেড বিশ্লেষণ দেখুন</div>
    </Card>
    {showHealthModal&&(
      <GradeBreakdownModal
        STUDENTS={STUDENTS}
        allRes={allRes}
        onClose={()=>setShowHealthModal(false)}
        studentProfiles={studentProfiles}
        setStudentProfiles={setStudentProfiles}
        currentUser={currentUser}
        results={results}
      />
    )}
    {needsBackup&&(
      <Card style={{background:C.amL,border:`1px solid ${C.am}40`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <div>
          <div style={{fontWeight:700,color:C.am,fontSize:13}}>📥 ব্যাকআপ নিন</div>
          <div style={{fontSize:11,color:C.mu,marginTop:2}}>{daysSinceBackup===null?"এখনো কোনো ব্যাকআপ ফাইল ডাউনলোড করা হয়নি":`শেষ ব্যাকআপ ${daysSinceBackup} দিন আগে`}। ডেটা ডিভাইসে স্বয়ংক্রিয়ভাবে সংরক্ষিত হলেও, অ্যাপ আনইনস্টল বা ক্যাশ মুছে গেলে তা হারাতে পারে — তাই নিয়মিত ব্যাকআপ ফাইল ডাউনলোড করুন।</div>
        </div>

    {/* ⚠️ ঝুঁকিপূর্ণ ছাত্র সতর্কতা */}
    {(()=>{
      // প্রতিটি ছাত্রের সব ফলাফল বিশ্লেষণ
      const allStudents=Object.entries(STUDENTS).flatMap(([cls,names])=>names.map(n=>({name:n,cls})));
      const atRisk=allStudents.map(({name,cls})=>{
        const sr=allRes.filter(r=>r.name===name);
        if(sr.length===0)return null;
        const srP=sr.filter(r=>!r.absent);
        const toPct=r=>Math.round(r.marks/(r.fullMarks||100)*100);
        const failCount=srP.filter(r=>toPct(r)<(r.passMarks||33)).length;
        const lowCount=srP.filter(r=>toPct(r)<40).length;
        // নম্বর কমছে কিনা (% এ তুলনা)
        const sorted=[...srP].sort((a,b)=>(a.examOrder||1)-(b.examOrder||1));
        const dropping=sorted.length>=2&&toPct(sorted[sorted.length-1])<toPct(sorted[0])-10;
        const avg=srP.length?Math.round(srP.reduce((a,b)=>a+toPct(b),0)/srP.length):0;
        if(failCount>=2||lowCount>=3||dropping) return{name,cls,failCount,avg,dropping,reason:failCount>=2?"বহু বিষয়ে ফেল":dropping?"নম্বর কমছে":"ধারাবাহিক দুর্বল"};
        return null;
      }).filter(Boolean);

      if(atRisk.length===0)return null;

        <Card style={{border:`1px solid ${C.re}40`,background:"#fff"}}>

    {(()=>{

      // সব ছাত্রের skipLog একত্রিত করো
      const allSkips=[];
      Object.entries(studentProfiles||{}).forEach(([sName,prof])=>{
        (prof.classSkipLog||[]).forEach(s=>{
          allSkips.push({...s,studentName:sName});
        });

      if(allSkips.length===0)return null;

      const todaySkips=allSkips.filter(s=>s.isoDate===todayISO);

      const last7=allSkips.filter(s=>{

        return diff<=7;
      });

      // সর্বাধিক ফাঁকিবাজ (সামগ্রিক)
      const byStudent={};

            </div>

          {/* সর্বাধিক ফাঁকিবাজ */}
          {topSkippers.length>0&&(
            <div>
              <div style={{fontWeight:700,fontSize:11,color:C.mu,marginBottom:6}}>🔺 সর্বাধিক ক্লাস ফাঁকি (সামগ্রিক)</div>
              {topSkippers.map(([name,count],i)=>{

                  </div>

              })}
            </div>
          )}
        </Card>
      );
    })()}

    {/* সাম্প্রতিক কার্যক্রম */}
    {(allRes.length>0||Object.values(lessonPlans).flat().length>0)&&(

          );
        })}
        {Object.values(lessonPlans).flat().slice(-3).reverse().map((p,i)=>(

          </div>

      </Card>
    )}

    {/* ── ড্যাশবোর্ড থেকে প্রোফাইল পপআপ ── */}
    {dashProfile&&dashProfile.type==="teacher"&&(
      <TeacherProfile name={dashProfile.name} results={results} lessonPlans={lessonPlans} obsData={obsData} onClose={()=>setDashProfile(null)}/>

      <StudentProfile name={dashProfile.name} cls={dashProfile.cls} results={results} onClose={()=>setDashProfile(null)} studentProfiles={studentProfiles} setStudentProfiles={setStudentProfiles} currentUser={currentUser}/>

}

/* ══ STUDENTS ══ */
function SubjectMiniBar({pct,color}){
  return(<div style={{display:"flex",alignItems:"center",gap:5,marginTop:3}}>
    <div style={{flex:1,height:7,background:"#eee",borderRadius:4,overflow:"hidden"}}>
      <div style={{width:`${Math.min(pct,100)}%`,height:"100%",background:color,borderRadius:4,transition:"width 0.4s"}}/>
    </div>
    <span style={{fontSize:10,fontWeight:700,color,minWidth:30}}>{pct}%</span>
  </div>);
}

function SubjectSparkLine({points,color=C.pu}){
  if(!points||points.length<2)return(<div style={{fontSize:10,color:C.mu,textAlign:"center",padding:"4px 0"}}>একটিমাত্র পরীক্ষা</div>);
  const W=150,H=36;
  const vals=points.map(p=>p.v);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const range=mx-mn||1;
  const px=(i)=>Math.round((i/(points.length-1))*(W-12))+6;
  const py=(v)=>Math.round(H-4-((v-mn)/range)*(H-10));
  const path=points.map((p,i)=>`${i===0?"M":"L"}${px(i)},${py(p.v)}`).join(" ");
  const trend=vals[vals.length-1]-vals[0];
  return(<div>
    <svg width={W} height={H+16} style={{display:"block",overflow:"visible"}}>
      <path d={path} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round"/>
      {points.map((p,i)=>(
        <g key={i}>
          <circle cx={px(i)} cy={py(p.v)} r={3} fill={color}/>
          <text x={px(i)} y={py(p.v)-5} textAnchor="middle" fontSize={8} fill={color} fontWeight={700}>{p.v}</text>
          <text x={px(i)} y={H+14} textAnchor="middle" fontSize={7} fill={C.mu}>{p.label}</text>
        </g>
      ))}
    </svg>
    <div style={{fontSize:9,fontWeight:700,color:trend>=0?C.gr:C.re,textAlign:"right",marginTop:-2}}>
      {trend>=0?"▲":"▼"} {Math.abs(trend)}
    </div>
  </div>);
}

function StudentProfile({name,cls,results,onClose,studentProfiles,setStudentProfiles,currentUser}){

    setStudentProfiles(prev=>({...prev,[name]:{...(prev[name]||{}),[field]:val}}));
  };
  const srP=sr.filter(r=>!r.absent);
  const pass=srP.filter(r=>r.marks>=(r.passMarks||33)).length;
  const avgPct=srP.length?Math.round(srP.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/srP.length):0;

    const avgM=Math.round(subR.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/subR.length);
    const bestM=subR.reduce((a,b)=>((b.marks/(b.fullMarks||100))>(a.marks/(a.fullMarks||100)))?b:a);

    const trend=sparkPts.length>=2?sparkPts[sparkPts.length-1].v-sparkPts[0].v:null;
    return{sub,subR,avgM,bestM,worstM,subPass,subGC,sparkPts,trend,count:subR.length};
  }).filter(Boolean);

  const bestSubject=subjectStats.length?[...subjectStats].sort((a,b)=>b.avgM-a.avgM)[0]:null;

            <div>
              <div style={{fontWeight:700,fontSize:17,color:"#fff",letterSpacing:0.3}}>{name}</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.75)",marginTop:3,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span>শ্রেণি {cls} • {srP.length}টি পরীক্ষা</span>

                  const allResFlat=Object.values(results).flat();

                  if(!lvl)return null;
                  const cfg={
                    good:{label:"✅ ভালো",bg:"rgba(74,222,128,0.25)",border:"rgba(74,222,128,0.6)"},
