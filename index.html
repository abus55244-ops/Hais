function NotificationPanel({deadline, dlSubmissions, onClose}){
  const info=dlTypeInfo(deadline.type);
  const targetTeachers=deadline.teachers&&deadline.teachers.length>0?deadline.teachers:TEACHERS;
  const subs=dlSubmissions[deadline.id]||{};
  const {diff,submittedCount,totalTargets}=dlStatus(deadline,dlSubmissions);
  const pending=targetTeachers.filter(t=>subs[t]!=="done");
  const done=targetTeachers.filter(t=>subs[t]==="done");

  const copyNotice=()=>{
    const due=new Date(deadline.dueDate).toLocaleDateString("bn-BD");
    // ── FIX: আগে এখানে 'lines' নিজের সংজ্ঞার ভেতরেই নিজেকে রেফারেন্স করছিল (TDZ error) —
    // "কপি নোটিশ" বাটনে ক্লিক করলেই ক্র্যাশ করত। এখন আগে raw লাইনগুলো তৈরি করে, তারপর পরপর
    // দুটো খালি লাইন এড়াতে আলাদা ধাপে ফিল্টার করা হচ্ছে।
    const rawLines=[
      `📢 Heritage Public School — ${info.emoji} ${info.label} নোটিশ`,
      ``,
      `বিষয়: ${deadline.title}`,
      `ডেডলাইন: ${due}`,
      deadline.note?`বিশেষ নির্দেশ: ${deadline.note}`:"",
      ``,
      `⚠️ এখনো জমা দেননি:`,
      ...pending.map(t=>`• ${t}`),
      ``,
      `অনুগ্রহ করে নির্ধারিত সময়ের মধ্যে জমা দিন।`,
      `— একাডেমিক ইনচার্জ, Heritage Public School`,
    ].filter(l=>l!==undefined);
    const lines=rawLines.filter((l,i)=>!(l===""&&rawLines[i-1]==="")).join("\n");
    navigator.clipboard.writeText(lines).then(()=>alert("✓ নোটিশ কপি হয়েছে! WhatsApp/বার্তায় পেস্ট করুন।"));
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:700,overflowY:"auto",padding:"16px 12px"}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:16,padding:18,maxWidth:500,margin:"0 auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <div style={{fontWeight:700,fontSize:15,color:info.color}}>{info.emoji} {deadline.title}</div>
            <div style={{fontSize:12,color:C.mu,marginTop:3}}>{info.label} • ডেডলাইন: {new Date(deadline.dueDate).toLocaleDateString("bn-BD")}</div>
            <div style={{fontSize:12,marginTop:4,fontWeight:700,color:diff<0?C.re:diff===0?C.co:C.am}}>
              {diff<0?`⚠️ ${Math.abs(diff)} দিন অতিক্রান্ত হয়েছে`:diff===0?"🔴 আজই শেষ দিন":`🟡 ${diff} দিন বাকি`}
            </div>
          </div>
          <button onClick={onClose} style={{border:"none",background:C.reL,color:C.re,borderRadius:8,padding:"5px 10px",cursor:"pointer",fontWeight:700}}>✕</button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          <div style={{background:C.grL,border:`1px solid ${C.gr}30`,borderRadius:8,padding:"10px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:700,color:C.gr}}>{submittedCount}</div>
            <div style={{fontSize:11,color:C.mu}}>জমা দিয়েছেন</div>
          </div>
          <div style={{background:C.reL,border:`1px solid ${C.re}30`,borderRadius:8,padding:"10px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:700,color:C.re}}>{pending.length}</div>
            <div style={{fontSize:11,color:C.mu}}>বাকি আছেন</div>
          </div>
        </div>

        {pending.length>0&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:C.re,marginBottom:6}}>⏳ এখনো জমা দেননি ({pending.length} জন):</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {pending.map(t=><span key={t} style={{fontSize:11,background:C.reL,color:C.re,padding:"3px 8px",borderRadius:12,border:`1px solid ${C.re}30`}}>{t}</span>)}
            </div>
          </div>
        )}

        {done.length>0&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:C.gr,marginBottom:6}}>✅ জমা দিয়েছেন ({done.length} জন):</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {done.map(t=><span key={t} style={{fontSize:11,background:C.grL,color:C.gr,padding:"3px 8px",borderRadius:12,border:`1px solid ${C.gr}30`}}>{t}</span>)}
            </div>
          </div>
        )}

        {deadline.note&&(
          <div style={{background:C.amL,border:`1px solid ${C.am}30`,borderRadius:8,padding:"8px 10px",marginBottom:14,fontSize:12,color:C.am}}>
            <span style={{fontWeight:700}}>📌 নির্দেশনা: </span>{deadline.note}
          </div>
        )}

        <div style={{display:"flex",gap:8}}>
          {pending.length>0&&(
            <button onClick={copyNotice}
              style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#25d366,#128c7e)",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>
              📋 নোটিশ কপি করুন (WhatsApp)
            </button>
          )}
          {pending.length===0&&(
            <div style={{flex:1,padding:"10px",borderRadius:10,background:C.grL,color:C.gr,fontWeight:700,fontSize:13,textAlign:"center"}}>
              ✅ সবাই জমা দিয়েছেন
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function DeadlineModule({deadlines,setDeadlines,dlSubmissions,setDlSubmissions,currentUser,isAdmin}){
  const [tab,setTab]=useState(isAdmin?"manage":"my");
  const [showForm,setShowForm]=useState(false);
  const [notifDl,setNotifDl]=useState(null);
  const [filterType,setFilterType]=useState("সব");

  // নতুন deadline ফর্ম state
  const [form,setForm]=useState({title:"",type:"lesson_plan",dueDate:"",note:"",teachers:[]});
  const [formErr,setFormErr]=useState("");

  const today=new Date(); today.setHours(0,0,0,0);

  // শিক্ষক যেসব deadline-এ আছেন
  const myDeadlines=useMemo(()=>{
    if(isAdmin)return deadlines;
    return deadlines.filter(dl=>{
      const t=dl.teachers&&dl.teachers.length>0?dl.teachers:TEACHERS;
      return t.includes(currentUser);
    });
  },[deadlines,currentUser,isAdmin]);

  const filtered=filterType==="সব"?myDeadlines:myDeadlines.filter(d=>d.type===filterType);
  const sorted=[...filtered].sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));

  // আমার জন্য pending deadline
  const myPending=myDeadlines.filter(dl=>{
    const subs=dlSubmissions[dl.id]||{};
    const due=new Date(dl.dueDate); due.setHours(0,0,0,0);
    return !isAdmin&&subs[currentUser]!=="done"&&due>=today;
  });
  const myOverdue=myDeadlines.filter(dl=>{
    const subs=dlSubmissions[dl.id]||{};
    const due=new Date(dl.dueDate); due.setHours(0,0,0,0);
    return !isAdmin&&subs[currentUser]!=="done"&&due<today;
  });

  const submitDeadline=()=>{
    if(!form.title.trim()){setFormErr("শিরোনাম আবশ্যক");return;}
    if(!form.dueDate){setFormErr("তারিখ আবশ্যক");return;}
    setFormErr("");
    const newDl={
      id:Date.now().toString(),
      title:form.title,
      type:form.type,
      dueDate:form.dueDate,
      note:form.note,
      teachers:form.teachers,
      createdAt:new Date().toISOString(),
      createdBy:currentUser
    };
    fbSaveDeadline(newDl); // granular Firebase write
    setDeadlines(prev=>[...prev,newDl]);
    setForm({title:"",type:"lesson_plan",dueDate:"",note:"",teachers:[]});
    setShowForm(false);
  };

  const markDone=(dlId,teacher)=>{
    setDlSubmissions(prev=>{
      const updated={...(prev[dlId]||{}),[teacher]:"done"};
      fbSaveDlSubmission(dlId,teacher,"done"); // granular Firebase write
      return{...prev,[dlId]:updated};
    });
  };
  const markUndone=(dlId,teacher)=>{
    setDlSubmissions(prev=>{
      const copy={...prev,[dlId]:{...(prev[dlId]||{})}};
      delete copy[dlId][teacher];
      fbSaveDlSubmission(dlId,teacher,null); // granular Firebase write (null = মুছে দেওয়া)
      return copy;
    });
  };
  const deleteDl=(id)=>{
    if(!window.confirm("এই ডেডলাইনটি মুছে ফেলবেন?"))return;
    fbDeleteDeadline(id); // granular Firebase delete
    setDeadlines(prev=>prev.filter(d=>d.id!==id));
    setDlSubmissions(prev=>{const c={...prev};delete c[id];return c;});
  };

  const toggleTeacher=(t)=>{
    setForm(prev=>({...prev,teachers:prev.teachers.includes(t)?prev.teachers.filter(x=>x!==t):[...prev.teachers,t]}));
  };

  // admin stats
  const overdueCount=deadlines.filter(dl=>{
    const due=new Date(dl.dueDate); due.setHours(0,0,0,0);
    const subs=dlSubmissions[dl.id]||{};
    const targets=dl.teachers&&dl.teachers.length>0?dl.teachers:TEACHERS;
    return due<today&&targets.some(t=>subs[t]!=="done");
  }).length;
  const todayCount=deadlines.filter(dl=>{
    const due=new Date(dl.dueDate); due.setHours(0,0,0,0);
    return due.getTime()===today.getTime();
  }).length;

  return(<div>
    {notifDl&&<NotificationPanel deadline={notifDl} dlSubmissions={dlSubmissions} onClose={()=>setNotifDl(null)}/>}

    <H2>🔔 ডেডলাইন ব্যবস্থাপনা</H2>

    {/* সারসংক্ষেপ */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      {isAdmin?(
        <>
          <Stat label="মোট ডেডলাইন" value={deadlines.length} color={C.pu} sub="সক্রিয়"/>
          <Stat label="অতিক্রান্ত" value={overdueCount} color={overdueCount>0?C.re:C.gr} sub="সময় পেরিয়ে গেছে"/>
          <Stat label="আজকের ডেডলাইন" value={todayCount} color={todayCount>0?C.co:C.gr} sub="আজকে শেষ"/>
          <Stat label="সম্পন্ন" value={deadlines.filter(dl=>{const targets=dl.teachers&&dl.teachers.length>0?dl.teachers:TEACHERS;const subs=dlSubmissions[dl.id]||{};return targets.every(t=>subs[t]==="done");}).length} color={C.te} sub="সবাই জমা দিয়েছেন"/>
        </>
      ):(
        <>
          <Stat label="আমার বাকি" value={myPending.length} color={myPending.length>0?C.am:C.gr} sub="জমা দিতে হবে"/>
          <Stat label="সময় পেরিয়েছে" value={myOverdue.length} color={myOverdue.length>0?C.re:C.gr} sub="মিস হয়েছে"/>
        </>
      )}
    </div>

    {/* ট্যাব */}
    <div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap"}}>
      {isAdmin&&<button onClick={()=>setTab("manage")} style={{padding:"6px 12px",borderRadius:14,border:`1px solid ${tab==="manage"?C.pu:C.bd}`,background:tab==="manage"?C.puL:"transparent",color:tab==="manage"?C.pu:C.mu,cursor:"pointer",fontSize:12,fontWeight:tab==="manage"?700:400}}>📋 ডেডলাইন পরিচালনা</button>}
      {isAdmin&&<button onClick={()=>setTab("tracker")} style={{padding:"6px 12px",borderRadius:14,border:`1px solid ${tab==="tracker"?C.pu:C.bd}`,background:tab==="tracker"?C.puL:"transparent",color:tab==="tracker"?C.pu:C.mu,cursor:"pointer",fontSize:12,fontWeight:tab==="tracker"?700:400}}>📊 শিক্ষকভিত্তিক ট্র্যাকার</button>}
      {!isAdmin&&<button onClick={()=>setTab("my")} style={{padding:"6px 12px",borderRadius:14,border:`1px solid ${tab==="my"?C.pu:C.bd}`,background:tab==="my"?C.puL:"transparent",color:tab==="my"?C.pu:C.mu,cursor:"pointer",fontSize:12,fontWeight:tab==="my"?700:400}}>📅 আমার ডেডলাইন</button>}
    </div>

    {/* ─── ADMIN: ডেডলাইন পরিচালনা ─── */}
    {tab==="manage"&&isAdmin&&(
      <div>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
          <button onClick={()=>setShowForm(p=>!p)}
            style={{padding:"9px 16px",borderRadius:10,border:"none",background:C.pu,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>
            ＋ নতুন ডেডলাইন
          </button>
          <select value={filterType} onChange={e=>setFilterType(e.target.value)}
            style={{padding:"7px 10px",borderRadius:8,border:`1px solid ${C.bd}`,fontSize:12}}>
            <option value="সব">সব ধরন</option>
            {DL_TYPES.map(d=><option key={d.id} value={d.id}>{d.emoji} {d.label}</option>)}
          </select>
        </div>

        {/* নতুন ডেডলাইন ফর্ম */}
        {showForm&&(
          <Card style={{border:`2px solid ${C.pu}40`,background:C.puL}}>
            <H3 style={{color:C.pu}}>📋 নতুন ডেডলাইন তৈরি করুন</H3>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,color:C.mu,marginBottom:3}}>শিরোনাম *</div>
              <input type="text" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}
                placeholder="যেমন: সাপ্তাহিক লেসন প্ল্যান জমা — সপ্তাহ ২৫"
                style={{width:"100%",padding:"8px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div>
                <div style={{fontSize:11,color:C.mu,marginBottom:3}}>ধরন *</div>
                <select value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))}
                  style={{width:"100%",padding:"8px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13}}>
                  {DL_TYPES.map(d=><option key={d.id} value={d.id}>{d.emoji} {d.label}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:11,color:C.mu,marginBottom:3}}>ডেডলাইন তারিখ *</div>
                <input type="date" value={form.dueDate} onChange={e=>setForm(p=>({...p,dueDate:e.target.value}))}
                  style={{width:"100%",padding:"8px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13}}/>
              </div>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,color:C.mu,marginBottom:3}}>বিশেষ নির্দেশনা (ঐচ্ছিক)</div>
              <textarea value={form.note} onChange={e=>setForm(p=>({...p,note:e.target.value}))} rows={2}
                placeholder="শিক্ষকদের জন্য বিশেষ নির্দেশ..."
                style={{width:"100%",padding:"8px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13,fontFamily:"sans-serif",resize:"vertical"}}/>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:C.mu,marginBottom:5}}>প্রযোজ্য শিক্ষক (খালি রাখলে সবার জন্য)</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {TEACHERS.map(t=>{
                  const sel=form.teachers.includes(t);
                  return(<button key={t} onClick={()=>toggleTeacher(t)}
                    style={{padding:"4px 9px",borderRadius:12,border:`1px solid ${sel?C.pu:C.bd}`,background:sel?C.puL:"transparent",color:sel?C.pu:C.mu,cursor:"pointer",fontSize:11,fontWeight:sel?700:400}}>
                    {t}
                  </button>);
                })}
              </div>
              {form.teachers.length===0&&<div style={{fontSize:11,color:C.mu,marginTop:4}}>✓ সকল শিক্ষকের জন্য প্রযোজ্য</div>}
            </div>
            {formErr&&<div style={{color:C.re,fontSize:12,marginBottom:8,fontWeight:600}}>⚠ {formErr}</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={submitDeadline}
                style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:C.pu,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>
                ✓ ডেডলাইন সেট করুন
              </button>
              <button onClick={()=>{setShowForm(false);setFormErr("");}}
                style={{padding:"10px 16px",borderRadius:10,border:`1px solid ${C.bd}`,background:"transparent",cursor:"pointer",fontSize:13}}>
                বাতিল
              </button>
            </div>
          </Card>
        )}

        {/* ডেডলাইন তালিকা */}
        {sorted.length===0?(
          <Card><div style={{textAlign:"center",color:C.mu,padding:24,fontSize:13}}>কোনো ডেডলাইন নেই। উপরে ＋ বোতামে ক্লিক করুন।</div></Card>
        ):(
          sorted.map(dl=>{
            const info=dlTypeInfo(dl.type);
            const st=dlStatus(dl,dlSubmissions);
            const targets=dl.teachers&&dl.teachers.length>0?dl.teachers:TEACHERS;
            return(
              <Card key={dl.id} style={{border:`1px solid ${st.color}30`,borderLeft:`4px solid ${st.color}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:info.color}}>{info.emoji} {dl.title}</div>
                    <div style={{fontSize:11,color:C.mu,marginTop:2}}>
                      {info.label} • {new Date(dl.dueDate).toLocaleDateString("bn-BD")}
                      {dl.teachers&&dl.teachers.length>0?` • ${dl.teachers.length} জন শিক্ষক`:" • সকল শিক্ষক"}
                    </div>
                    {dl.note&&<div style={{fontSize:11,color:C.mu,marginTop:3,fontStyle:"italic"}}>📌 {dl.note}</div>}
                    {/* প্রগ্রেস বার */}
                    <div style={{marginTop:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
                        <span style={{color:C.mu}}>অগ্রগতি</span>
                        <span style={{fontWeight:700,color:st.color}}>{st.submittedCount}/{st.totalTargets}</span>
                      </div>
                      <div style={{height:6,background:"#eee",borderRadius:3}}>
                        <div style={{width:`${st.totalTargets?st.submittedCount/st.totalTargets*100:0}%`,height:"100%",background:st.color,borderRadius:3,transition:"width 0.4s"}}/>
                      </div>
                    </div>
                    {/* প্রতিটি শিক্ষকের অবস্থা */}
                    <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:4}}>
                      {targets.map(t=>{
                        const subs=dlSubmissions[dl.id]||{};
                        const done=subs[t]==="done";
                        return(
                          <button key={t} onClick={()=>done?markUndone(dl.id,t):markDone(dl.id,t)}
                            title={`${t} — ${done?"সম্পন্ন (ক্লিক করলে বাতিল হবে)":"বাকি (ক্লিক করলে সম্পন্ন হিসেবে চিহ্নিত হবে)"}`}
                            style={{padding:"3px 8px",borderRadius:12,border:`1px solid ${done?C.gr:C.re}40`,background:done?C.grL:C.reL,color:done?C.gr:C.re,cursor:"pointer",fontSize:10,fontWeight:600}}>
                            {done?"✓":"✗"} {t}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
                    <span style={{fontSize:11,fontWeight:700,color:st.color,background:st.color+"15",padding:"3px 8px",borderRadius:10,border:`1px solid ${st.color}30`,whiteSpace:"nowrap"}}>{st.label}</span>
                    <button onClick={()=>setNotifDl(dl)}
                      style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${C.pu}40`,background:C.puL,color:C.pu,cursor:"pointer",fontSize:11,fontWeight:600}}>
                      🔔 নোটিশ
                    </button>
                    <button onClick={()=>deleteDl(dl.id)}
                      style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${C.re}30`,background:C.reL,color:C.re,cursor:"pointer",fontSize:11}}>
                      🗑 মুছুন
                    </button>
                  </div>
                </div>
              </Card>
            );
          })
        )}
      </div>
    )}

    {/* ─── ADMIN: শিক্ষকভিত্তিক ট্র্যাকার ─── */}
    {tab==="tracker"&&isAdmin&&(
      <div>
        <Card>
          <H3>📊 প্রতিটি শিক্ষকের ডেডলাইন পালনের হার</H3>
          <div style={{fontSize:11,color:C.mu,marginBottom:10}}>অতিক্রান্ত ডেডলাইনের উপর ভিত্তি করে হিসাব। KPI-তে এই স্কোর যুক্ত হয়।</div>
          {TEACHERS.map(t=>{
            const {missed,total,rate}=calcDeadlinePenalty(t,deadlines,dlSubmissions);
            if(total===0)return(
              <div key={t} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:`1px solid ${C.bd}`}}>
                <div style={{flex:1,fontSize:12,fontWeight:600}}>{t}</div>
                <div style={{fontSize:11,color:C.mu}}>ডেটা নেই</div>
              </div>
            );
            const color=rate>=90?C.gr:rate>=70?C.am:C.re;
            return(
              <div key={t} style={{padding:"8px 0",borderBottom:`1px solid ${C.bd}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <div style={{fontWeight:600,fontSize:12}}>{t}</div>
                  <div style={{fontSize:12,fontWeight:700,color}}>{rate}%</div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.mu,marginBottom:4}}>
                  <span>মোট: {total}টি ডেডলাইন</span>
                  <span style={{color:missed>0?C.re:C.gr}}>মিস: {missed}টি</span>
                </div>
                <div style={{height:5,background:"#eee",borderRadius:3}}>
                  <div style={{width:`${rate}%`,height:"100%",background:color,borderRadius:3}}/>
                </div>
              </div>
            );
          })}
        </Card>
      </div>
    )}

    {/* ─── TEACHER: আমার ডেডলাইন ─── */}
    {tab==="my"&&!isAdmin&&(
      <div>
        {myOverdue.length>0&&(
          <Card style={{border:`2px solid ${C.re}50`,background:C.reL}}>
            <div style={{fontWeight:700,color:C.re,marginBottom:8}}>⚠️ সময় পেরিয়ে যাওয়া ডেডলাইন ({myOverdue.length}টি)</div>
            {myOverdue.map(dl=>{
              const info=dlTypeInfo(dl.type);
              const subs=dlSubmissions[dl.id]||{};
              const done=subs[currentUser]==="done";
              const due=new Date(dl.dueDate);
              const diff=Math.round((today-due)/(1000*60*60*24));
              return(
                <div key={dl.id} style={{background:"#fff",borderRadius:8,padding:"10px 12px",marginBottom:8,border:`1px solid ${C.re}30`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:13}}>{info.emoji} {dl.title}</div>
                      <div style={{fontSize:11,color:C.re,marginTop:2,fontWeight:600}}>{diff} দিন আগে শেষ হয়েছিল — {done?"আপনি জমা দিয়েছেন ✅":"আপনি জমা দেননি ❌"}</div>
                      {dl.note&&<div style={{fontSize:11,color:C.mu,marginTop:3}}>📌 {dl.note}</div>}
                    </div>
                    {!done&&<button onClick={()=>markDone(dl.id,currentUser)}
                      style={{padding:"6px 12px",borderRadius:8,border:"none",background:C.gr,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12,flexShrink:0}}>
                      ✓ জমা দিয়েছি
                    </button>}
                  </div>
                </div>
              );
            })}
          </Card>
        )}

        {myPending.length===0&&myOverdue.length===0&&(
          <Card><div style={{textAlign:"center",color:C.gr,padding:24,fontSize:13}}>✅ আপনার কোনো বকেয়া ডেডলাইন নেই!</div></Card>
        )}

        {myPending.map(dl=>{
          const info=dlTypeInfo(dl.type);
          const subs=dlSubmissions[dl.id]||{};
          const done=subs[currentUser]==="done";
          const due=new Date(dl.dueDate); due.setHours(0,0,0,0);
          const diff=Math.round((due-today)/(1000*60*60*24));
          const urgColor=diff===0?C.re:diff<=3?C.co:C.am;
          return(
            <Card key={dl.id} style={{border:`1px solid ${urgColor}40`,borderLeft:`4px solid ${urgColor}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13,color:info.color}}>{info.emoji} {dl.title}</div>
                  <div style={{fontSize:11,color:C.mu,marginTop:2}}>{info.label} • {new Date(dl.dueDate).toLocaleDateString("bn-BD")}</div>
                  {dl.note&&<div style={{fontSize:11,color:C.mu,marginTop:3,fontStyle:"italic"}}>📌 {dl.note}</div>}
                  <div style={{fontSize:12,fontWeight:700,color:urgColor,marginTop:6}}>
                    {diff===0?"🔴 আজই শেষ দিন!":diff<=3?`🟡 মাত্র ${diff} দিন বাকি`:`📅 ${diff} দিন বাকি`}
                  </div>
                </div>
                {done?(
                  <div>
                    <div style={{color:C.gr,fontWeight:700,fontSize:13}}>✅ জমা দিয়েছেন</div>
                    <button onClick={()=>markUndone(dl.id,currentUser)} style={{marginTop:4,padding:"4px 8px",borderRadius:8,border:`1px solid ${C.re}30`,background:C.reL,color:C.re,cursor:"pointer",fontSize:10}}>পূর্বাবস্থায় ফেরান</button>
                  </div>
                ):(
                  <button onClick={()=>markDone(dl.id,currentUser)}
                    style={{padding:"8px 14px",borderRadius:10,border:"none",background:C.gr,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13,flexShrink:0}}>
                    ✓ জমা দিয়েছি
                  </button>
                )}
              </div>
            </Card>
          );
        })}

        {/* সম্পন্ন ডেডলাইন */}
        {myDeadlines.filter(dl=>{const subs=dlSubmissions[dl.id]||{};return subs[currentUser]==="done";}).length>0&&(

      </div>
    )}
  </div>);
}

/* ── Whitelist Manager — Admin শিক্ষকদের email অনুমোদন করবেন ── */
function WhitelistManager(){
  const [emails,setEmails]=useState([]);
  const [newEmail,setNewEmail]=useState("");
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState("");

  const fbKey=(email)=>email.replace(/\./g,"_").replace(/@/g,"__at__");

  /* Firebase থেকে whitelist লোড */
  useEffect(()=>{
    if(!window.__fbReady)return;
    window.__fbDB.ref("hais_whitelist").once("value").then(snap=>{
      if(snap.exists()){
        setEmails(Object.keys(snap.val()).map(k=>k.replace(/__at__/g,"@").replace(/_/g,".")));
      }
    });
  },[]);

  const addEmail=async()=>{
    if(!newEmail.trim()||!newEmail.includes("@")){setMsg("❌ সঠিক ইমেইল লিখুন");return;}
    setLoading(true);
    try{
      await window.__fbDB.ref("hais_whitelist/"+fbKey(newEmail.trim())).set({addedAt:new Date().toISOString()});
      setEmails(prev=>[...prev,newEmail.trim()]);
      setNewEmail("");
      setMsg("✅ ইমেইল যোগ করা হয়েছে");
      setTimeout(()=>setMsg(""),3000);
    }catch(e){setMsg("❌ যোগ করা যায়নি");}
    setLoading(false);
  };

  const removeEmail=async(email)=>{
    if(!window.confirm(`${email} মুছে ফেলবেন?`))return;
    await window.__fbDB.ref("hais_whitelist/"+fbKey(email)).remove();
    setEmails(prev=>prev.filter(e=>e!==email));
  };

  return(
    <div>
      <H2>📋 অনুমোদিত ইমেইল তালিকা</H2>
      <Card>
        <div style={{fontSize:12,color:C.mu,marginBottom:10,lineHeight:1.6}}>
          এখানে যোগ করা ইমেইল দিয়েই শিক্ষকরা নতুন account খুলতে পারবেন। অন্য কেউ চেষ্টা করলে বাধা পাবে।
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input type="email" placeholder="শিক্ষকের ইমেইল যোগ করুন..." value={newEmail}
            onChange={e=>setNewEmail(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&addEmail()}
            style={{flex:1,padding:"9px 12px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13,outline:"none"}}/>
          <button onClick={addEmail} disabled={loading}
            style={{padding:"9px 16px",borderRadius:8,border:"none",background:C.pu,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13,flexShrink:0}}>
            {loading?"...":"+ যোগ করুন"}
          </button>
        </div>
        {msg&&<div style={{fontSize:12,color:msg.includes("✅")?C.gr:C.re,marginBottom:8,fontWeight:600}}>{msg}</div>}
        {emails.length===0?(
          <div style={{textAlign:"center",color:C.mu,padding:16,fontSize:12}}>এখনো কোনো ইমেইল যোগ করা হয়নি</div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {emails.map(email=>(
              <div key={email} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:C.puL,borderRadius:8,border:`1px solid ${C.pu}20`}}>
                <div style={{fontSize:13,color:C.tx}}>📧 {email}</div>
                <button onClick={()=>removeEmail(email)}
                  style={{border:"none",background:C.reL,color:C.re,borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>
                  ✕ মুছুন
                </button>
              </div>
            ))}
          </div>
        )}
      </Card>
    </div>
  );
}

      if(!grpTasks.length)return{...kpi,score:0,done:0,total:0};

      const dw=grpTasks.filter(t=>taskStatus[t.id]?.done).reduce((a,t)=>a+t.weight,0);
      const score=tw>0?Math.round((dw/tw)*100):0;
      return{...kpi,score,done:grpTasks.filter(t=>taskStatus[t.id]?.done).length,total:grpTasks.length};
    });
  },[taskStatus]);
  const overallScore=useMemo(()=>{
    const tw=COORD_KPI_WEIGHTS.reduce((a,k)=>a+k.weight,0);
    return Math.round(kpiScores.reduce((a,k)=>a+(k.score*k.weight/100),0)/tw*100);
  },[kpiScores]);
  const grade=overallScore>=90?"A+":overallScore>=75?"A":overallScore>=60?"B":overallScore>=45?"C":"D";
  const gradeCol=grade==="A+"?C.gr:grade==="A"?C.te:grade==="B"?C.am:C.re;

        </div>

      <div style={{marginTop:12,height:7,background:"#ffffff30",borderRadius:4,overflow:"hidden"}}>
        <div style={{width:`${overallScore}%`,height:"100%",background:"#fff",borderRadius:4,transition:"width 0.6s ease"}}/>
      </div>
      <div style={{marginTop:6,fontSize:11,opacity:0.75,textAlign:"center"}}>{totalDone}/{totalAll} কাজ সম্পন্ন</div>
    </div>
    <div style={{display:"flex",gap:4,marginBottom:12}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)}

            cursor:"pointer",fontWeight:tab===t.id?700:500,fontSize:11}}>
          {t.label}
        </button>
      ))}
    </div>
    {tab==="overview"&&(<div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <Card style={{textAlign:"center",padding:"12px 10px"}}>
          <div style={{fontSize:28,fontWeight:800,color:gradeCol}}>{overallScore}</div>
          <div style={{fontSize:11,color:C.mu}}>সামগ্রিক স্কোর</div>
        </Card>
        <Card style={{textAlign:"center",padding:"12px 10px"}}>
          <div style={{fontSize:28,fontWeight:800,color:C.gr}}>{totalDone}</div>
          <div style={{fontSize:11,color:C.mu}}>{totalAll}টির মধ্যে সম্পন্ন</div>
        </Card>
      </div>
      {kpiScores.map(kpi=>(

              <div>

              </div>
            </div>
            <div style={{fontWeight:800,fontSize:22,color:kpi.color}}>{kpi.score}</div>
          </div>
          <div style={{height:7,background:"#eee",borderRadius:4,overflow:"hidden"}}>
            <div style={{width:`${kpi.score}%`,height:"100%",background:kpi.color,borderRadius:4,transition:"width 0.5s"}}/>

      <Card style={{background:C.puL,border:`1px solid ${C.pu}25`,padding:"12px 14px"}}>

        {COORD_KPI_WEIGHTS.map(k=>(

            <span style={{fontSize:13,minWidth:18}}>{k.icon}</span>
            <div style={{flex:1,fontSize:11,color:C.tx}}>{k.label}</div>
            <div style={{width:55,height:5,background:"#ddd",borderRadius:3,overflow:"hidden"}}>
              <div style={{width:`${k.weight*4.5}%`,height:"100%",background:k.color,borderRadius:3}}/>
            </div>
            <span style={{fontWeight:700,fontSize:11,color:k.color,minWidth:26}}>{k.weight}%</span>
          </div>
        ))}
        <div style={{marginTop:8,padding:"7px 10px",background:"#fff",borderRadius:8,fontSize:11,color:C.mu,lineHeight:1.6}}>
          💡 আন্তর্জাতিক মানের স্কুলে Academic Coordinator-এর মূল দায়িত্ব শিক্ষক পারফরম্যান্স (২২%) ও ছাত্র অগ্রগতি (১৯%) নিশ্চিত করা।
        </div>
      </Card>
    </div>)}
    {tab==="app_tasks"&&(<div>

    {tab==="manual_tasks"&&(<div>

              border:`1px solid ${done?C.gr+"50":C.am+"40"}`,background:done?C.grL:"#fffbf5"}}>
              <div style={{padding:"9px 11px"}}>
                <div style={{fontWeight:600,fontSize:12,color:C.tx,marginBottom:3}}>{task.title}</div>
                <div style={{fontSize:11,color:C.mu,marginBottom:5,lineHeight:1.5}}>{task.desc}</div>
                <span style={{background:group.color+"18",color:group.color,border:`1px solid ${group.color}30`,borderRadius:10,padding:"2px 8px",fontSize:10,fontWeight:700}}>
                  ওজন {task.weight}%
                </span>
                {done&&taskStatus[task.id]?.doneAt&&(
                  <span style={{marginLeft:5,background:C.grL,color:C.gr,borderRadius:10,padding:"2px 8px",fontSize:10,fontWeight:700}}>

                    color:done?"#fff":C.gr,fontWeight:700,fontSize:11,
                    borderRight:`1px solid ${done?C.gr+"30":C.am+"30"}`,
                    cursor:done?"default":"pointer"}}>
                  ✅ সম্পন্ন হয়েছে
                </button>
                <button onClick={()=>done&&onToggle(task.id)}
                  style={{flex:1,padding:"8px 0",border:"none",background:!done?"#f59e0b":"transparent",
                    color:!done?"#fff":C.am,fontWeight:700,fontSize:11,cursor:!done?"default":"pointer"}}>
                  ⏳ এখনো বাকি
                </button>
              </div>
            </div>);
          })}
        </Card>);
      })}
    </div>)}
  </div>);
}

  "বাংলাদেশ ও বিশ্বপরিচয়":"গুরুত্বপূর্ণ তথ্য ও সাল আলাদা নোটে টুকে বারবার পর্যালোচনা করুন।",
  "কৃষি শিক্ষা":"ব্যবহারিক উদাহরণসহ পড়ুন এবং চিত্র দেখে দেখে মনে রাখার চেষ্টা করুন।",
  "ধর্ম":"মূল বিষয়বস্তু বুঝে পড়ুন এবং উদাহরণসহ ব্যাখ্যা করার অভ্যাস করুন।"
};
const DEFAULT_TIP="প্রতিদিন নির্দিষ্ট সময় ধরে এই বিষয়ের পুরনো প্রশ্ন সমাধান করুন এবং কোথায় ভুল হচ্ছে তা শিক্ষকের সাহায্যে চিহ্নিত করে সংশোধন করুন।";
const SR_DAYS=["রবি","সোম","মঙ্গল","বুধ","বৃহ","শুক্র","শনি"];
const SR_HABITS=["ফজরের নামাজ","জোহরের নামাজ","আসরের নামাজ","মাগরিব ও এশার নামাজ","সকালের রুটিন মেনেছি","ক্লাসে মনোযোগী ছিলাম","না বোঝা বিষয় জিজ্ঞেস করেছি","নির্ধারিত পড়া শেষ করেছি","রাতের পড়া সম্পন্ন","নির্ধারিত সময়ে ঘুমিয়েছি"];
const SR_PROBLEM_FLAGS=["মনোযোগ ধরে রাখতে পারছি না","বিষয়টি বুঝতে পারছি না","অনুশীলনের সুযোগ পাচ্ছি না","শরীর অসুস্থ","হতাশ/উদ্বিগ্ন অনুভব করছি","শিক্ষকের সাথে কথা বলতে চাই","পরিবারের চিন্তা","পর্যাপ্ত ঘুম হচ্ছে না","সময় ব্যবস্থাপনায় সমস্যা"];
const SR_MOODS=["খুব খারাপ","খারাপ","স্বাভাবিক","ভালো","অসাধারণ"];
const SR_STRESS=["একদমই না","সামান্য","মাঝে মাঝে","প্রায়ই","সবসময়"];

const sscScale=(pct)=>{
  if(pct>=80)return["A+",C.gr];if(pct>=70)return["A",C.te];if(pct>=60)return["A-",C.te];
  if(pct>=50)return["B",C.am];if(pct>=40)return["C",C.am];if(pct>=33)return["D",C.co];
  return["F",C.re];
};

function SSCTarget({results,STUDENTS,currentUser,isAdmin,weeklyTargets,setWeeklyTargets,targetFulfillments,setTargetFulfillments,selfReports,setSelfReports,studentProfiles,setStudentProfiles}){
  STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const students=STUDENTS[SSC_CLASS]||[];
  const subjects=SUBJECTS_BY_CLASS[SSC_CLASS]||[];
  const [subTab,setSubTab]=useState("set"); // set | track | predict
  const [selSubject,setSelSubject]=useState(null);
  const [selWeek,setSelWeek]=useState(null);
  const [msg,setMsg]=useState("");

  /* ── সাপ্তাহিক টার্গেট সংরক্ষণ/মুছা ── */
  const realTargets=useMemo(()=>Object.values(weeklyTargets||{}).filter(t=>t&&t.subject&&!t.isWeekMeta),[weeklyTargets]);
  const weekCountOf=(subject)=>{
    const meta=weeklyTargets[`wkcount__${_fbKey(subject)}`];
    return Math.max(10,meta?.count||10);
  };
  const addWeek=(subject)=>{
    const id=`wkcount__${_fbKey(subject)}`;
    const cur=weekCountOf(subject);
    const obj={id,subject,isWeekMeta:true,count:cur+1};
    setWeeklyTargets(prev=>({...prev,[id]:obj}));
    fbSaveWeeklyTarget(obj);
  };
  const targetsFor=(subject,week)=>realTargets.filter(t=>t.subject===subject&&t.week===week);
  const saveTarget=(obj)=>{
    setWeeklyTargets(prev=>({...prev,[obj.id]:obj}));
    fbSaveWeeklyTarget(obj);
    setMsg("✅ টার্গেট সংরক্ষিত হয়েছে");setTimeout(()=>setMsg(""),1800);
  };
  const deleteTarget=(id)=>{
    if(!window.confirm("এই টার্গেটটি মুছে ফেলতে চান?"))return;
    setWeeklyTargets(prev=>{const n={...prev};delete n[id];return n;});
    fbDeleteWeeklyTarget(id);
  };

  /* ── পূরণ রেকর্ড সংরক্ষণ ── */
  const fkey=(targetId,student)=>`${targetId}__${_fbKey(student)}`;
  const saveFulfillment=(targetId,student,patch)=>{
    const id=fkey(targetId,student);
    const existing=targetFulfillments[id]||{};
    const rec={id,targetId,student,cls:SSC_CLASS,status:"none",percent:0,problem:"",...existing,...patch,notedBy:currentUser,notedAt:new Date().toISOString()};
    setTargetFulfillments(prev=>({...prev,[id]:rec}));
    fbSaveFulfillment(rec);
  };

  /* ════════ ১) টার্গেট নির্ধারণ ট্যাব ════════ */
  function TargetSetView(){
    const [text,setText]=useState("");
    const [scope,setScope]=useState("all");
    const [custom,setCustom]=useState([]);
    const [editing,setEditing]=useState(null);

    if(!selSubject){
      return(<div>
        <H3>বিষয় নির্বাচন করুন</H3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8}}>
          {subjects.map(s=>{
            const cnt=realTargets.filter(t=>t.subject===s).length;
            return(<Card key={s} onClick={()=>setSelSubject(s)} style={{cursor:"pointer",textAlign:"center",padding:"14px 8px"}}>
              <div style={{fontWeight:700,fontSize:13,color:C.pu}}>{s}</div>
              <div style={{fontSize:11,color:C.mu,marginTop:4}}>{cnt} টি টার্গেট</div>
            </Card>);
          })}
        </div>
      </div>);
    }
    if(!selWeek){
      const wc=weekCountOf(selSubject);
      const weeks=Array.from({length:wc},(_,i)=>i+1);
      return(<div>
        <button onClick={()=>setSelSubject(null)} style={{marginBottom:10,background:"none",border:"none",color:C.pu,cursor:"pointer",fontSize:13}}>← বিষয় তালিকায় ফিরুন</button>
        <H3>{selSubject} — সপ্তাহ নির্বাচন করুন</H3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:8}}>
          {weeks.map(w=>{
            const cnt=targetsFor(selSubject,w).length;
            return(<Card key={w} onClick={()=>setSelWeek(w)} style={{cursor:"pointer",textAlign:"center",padding:"12px 6px",borderColor:cnt?C.pu+"55":C.bd}}>
              <div style={{fontWeight:700,color:C.pu}}>সপ্তাহ {w}</div>
              <div style={{fontSize:10,color:C.mu,marginTop:2}}>{cnt?`${cnt} টি টার্গেট`:"খালি"}</div>
            </Card>);
          })}
          <Card onClick={()=>addWeek(selSubject)} style={{cursor:"pointer",textAlign:"center",padding:"12px 6px",background:C.puL}}>
            <div style={{fontWeight:700,color:C.pu}}>+ নতুন সপ্তাহ</div>
          </Card>
        </div>
      </div>);
    }
    const wTargets=targetsFor(selSubject,selWeek);
    const startEdit=(t)=>{setEditing(t.id);setText(t.text);setScope(t.scope);setCustom(t.students||[]);};
    const resetForm=()=>{setEditing(null);setText("");setScope("all");setCustom([]);};
    const submit=()=>{
      if(!text.trim()){setMsg("⚠️ টার্গেটের বিবরণ লিখুন");setTimeout(()=>setMsg(""),1800);return;}
      if(scope==="custom"&&custom.length===0){setMsg("⚠️ অন্তত একজন শিক্ষার্থী নির্বাচন করুন");setTimeout(()=>setMsg(""),1800);return;}
      const id=editing||`tgt_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
      saveTarget({id,subject:selSubject,week:selWeek,cls:SSC_CLASS,text:text.trim(),scope,students:scope==="custom"?custom:[],createdBy:currentUser,createdAt:new Date().toISOString()});
      resetForm();
    };
    const toggleCustom=(name)=>setCustom(p=>p.includes(name)?p.filter(n=>n!==name):[...p,name]);

    return(<div>
      <button onClick={()=>setSelWeek(null)} style={{marginBottom:10,background:"none",border:"none",color:C.pu,cursor:"pointer",fontSize:13}}>← সপ্তাহ তালিকায় ফিরুন</button>
      <H3>{selSubject} — সপ্তাহ {selWeek} এর টার্গেট</H3>
      {wTargets.length===0&&<div style={{color:C.mu,fontSize:12,marginBottom:10}}>এই সপ্তাহে এখনো কোনো টার্গেট যুক্ত করা হয়নি।</div>}
      {wTargets.map(t=>(
        <Card key={t.id} style={{borderLeft:`4px solid ${C.pu}`}}>
          <div style={{fontSize:13,marginBottom:6,whiteSpace:"pre-wrap"}}>{t.text}</div>
          <div style={{fontSize:11,color:C.mu}}>
            👥 {t.scope==="all"?`সকল শিক্ষার্থী (${students.length} জন)`:`নির্বাচিত ${(t.students||[]).length} জন: ${(t.students||[]).join(", ")}`}
          </div>
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <button onClick={()=>startEdit(t)} style={{fontSize:11,padding:"4px 10px",borderRadius:6,border:`1px solid ${C.bd}`,background:"#fff",cursor:"pointer"}}>✏️ এডিট</button>
            <button onClick={()=>deleteTarget(t.id)} style={{fontSize:11,padding:"4px 10px",borderRadius:6,border:`1px solid ${C.re}40`,background:C.reL,color:C.re,cursor:"pointer"}}>🗑️ মুছুন</button>
          </div>
        </Card>
      ))}
      <Card style={{background:C.puL}}>
        <H3>{editing?"টার্গেট সম্পাদনা করুন":"নতুন টার্গেট লিখুন"}</H3>
        <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="এই সপ্তাহের টার্গেট লিখুন..." rows={3} style={{width:"100%",padding:8,borderRadius:8,border:`1px solid ${C.bd}`,fontSize:13,fontFamily:"inherit",marginBottom:10}}/>
        <div style={{fontSize:12,fontWeight:700,marginBottom:6}}>এই টার্গেট কাদের জন্য?</div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <button onClick={()=>setScope("all")} style={{flex:1,padding:8,borderRadius:8,border:`1px solid ${scope==="all"?C.pu:C.bd}`,background:scope==="all"?C.pu:"#fff",color:scope==="all"?"#fff":C.tx,cursor:"pointer",fontSize:12,fontWeight:700}}>সকল শিক্ষার্থী</button>
          <button onClick={()=>setScope("custom")} style={{flex:1,padding:8,borderRadius:8,border:`1px solid ${scope==="custom"?C.pu:C.bd}`,background:scope==="custom"?C.pu:"#fff",color:scope==="custom"?"#fff":C.tx,cursor:"pointer",fontSize:12,fontWeight:700}}>নির্দিষ্ট শিক্ষার্থী</button>
        </div>
        {scope==="custom"&&(
          <div style={{maxHeight:180,overflowY:"auto",background:"#fff",borderRadius:8,padding:8,marginBottom:10,border:`1px solid ${C.bd}`}}>
            {students.map(n=>(
              <label key={n} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,padding:"3px 0",cursor:"pointer"}}>
                <input type="checkbox" checked={custom.includes(n)} onChange={()=>toggleCustom(n)}/>{n}
              </label>
            ))}
          </div>
        )}
        <div style={{display:"flex",gap:8}}>
          <button onClick={submit} style={{flex:1,padding:10,borderRadius:8,border:"none",background:C.pu,color:"#fff",fontWeight:700,cursor:"pointer"}}>{editing?"আপডেট করুন":"টার্গেট সংরক্ষণ করুন"}</button>
          {editing&&<button onClick={resetForm} style={{padding:"10px 14px",borderRadius:8,border:`1px solid ${C.bd}`,background:"#fff",cursor:"pointer"}}>বাতিল</button>}
        </div>
      </Card>
    </div>);
  }

  /* ════════ ২) পূরণ ট্র্যাকিং ট্যাব ════════ */
  function TrackView(){
    const [tSub,setTSub]=useState(subjects[0]);
    const [tWeek,setTWeek]=useState(1);
    const wc=weekCountOf(tSub);
    const wTargets=targetsFor(tSub,tWeek);
    const applicable=(t)=>t.scope==="all"?students:(t.students||[]);
    const statusLabel={complete:["✅ সম্পূর্ণ",C.gr],partial:["🟡 আংশিক",C.am],none:["❌ অপূর্ণ",C.re]};

    return(<div>
      <H3>টার্গেট পূরণ ট্র্যাকিং</H3>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <select value={tSub} onChange={e=>{setTSub(e.target.value);setTWeek(1);}} style={{padding:8,borderRadius:8,border:`1px solid ${C.bd}`,fontSize:13}}>
          {subjects.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <select value={tWeek} onChange={e=>setTWeek(parseInt(e.target.value))} style={{padding:8,borderRadius:8,border:`1px solid ${C.bd}`,fontSize:13}}>
          {Array.from({length:wc},(_,i)=>i+1).map(w=><option key={w} value={w}>সপ্তাহ {w}</option>)}
        </select>
      </div>
      {wTargets.length===0&&<div style={{color:C.mu,fontSize:12}}>এই বিষয় ও সপ্তাহে কোনো টার্গেট নেই। আগে "টার্গেট নির্ধারণ" ট্যাব থেকে যুক্ত করুন।</div>}
      {wTargets.map(t=>(
        <Card key={t.id}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>{t.text}</div>
          {applicable(t).map(name=>{
            const rec=targetFulfillments[fkey(t.id,name)]||{status:"none",percent:0,problem:""};
            return(<div key={name} style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",padding:"6px 0",borderTop:`1px solid ${C.bd}`}}>
              <div style={{flex:"1 1 140px",fontSize:12,fontWeight:600}}>{name}</div>
              <select value={rec.status} onChange={e=>saveFulfillment(t.id,name,{status:e.target.value,percent:e.target.value==="complete"?100:e.target.value==="none"?0:rec.percent})} style={{fontSize:11,padding:"4px 6px",borderRadius:6,border:`1px solid ${C.bd}`}}>
                <option value="complete">✅ সম্পূর্ণ</option>
                <option value="partial">🟡 আংশিক</option>
                <option value="none">❌ অপূর্ণ</option>
              </select>
              {rec.status==="partial"&&(
                <input type="number" min={0} max={100} value={rec.percent} onChange={e=>saveFulfillment(t.id,name,{percent:Math.max(0,Math.min(100,parseInt(e.target.value)||0))})} style={{width:60,fontSize:11,padding:"4px 6px",borderRadius:6,border:`1px solid ${C.bd}`}} placeholder="%"/>
              )}
              <input value={rec.problem} onChange={e=>saveFulfillment(t.id,name,{problem:e.target.value})} placeholder="সমস্যা/মন্তব্য (ঐচ্ছিক)" style={{flex:"2 1 160px",fontSize:11,padding:"4px 8px",borderRadius:6,border:`1px solid ${C.bd}`}}/>
              {badge(statusLabel[rec.status][1],statusLabel[rec.status][0])}
            </div>);
          })}
        </Card>
      ))}
    </div>);
  }

  /* ════════ ৩) সম্ভাব্য ফলাফল পূর্বাভাস ════════ */
  function PredictView(){
    const stats=useMemo(()=>{
      return students.map(name=>{
        const entries=(results[SSC_CLASS]||[]).filter(e=>e.name===name);
        const examPct=entries.length?Math.round(entries.reduce((a,e)=>a+(e.marks/(e.fullMarks||100)*100),0)/entries.length):null;
        const fRecs=Object.values(targetFulfillments).filter(r=>r.student===name&&r.cls===SSC_CLASS);
        const fulfillPct=fRecs.length?Math.round(fRecs.reduce((a,r)=>a+(r.percent||0),0)/fRecs.length):null;
        const combined=examPct!=null?(fulfillPct!=null?Math.round(examPct*0.6+fulfillPct*0.4):examPct):(fulfillPct||0);
        const bySubject={};
        entries.forEach(e=>{
          if(!bySubject[e.subject])bySubject[e.subject]=[];
          bySubject[e.subject].push(e.marks/(e.fullMarks||100)*100);
        });
        const weakSubjects=Object.entries(bySubject).map(([s,arr])=>({subject:s,avg:Math.round(arr.reduce((a,b)=>a+b,0)/arr.length)})).filter(x=>x.avg<50).sort((a,b)=>a.avg-b.avg);
        return{name,examPct,fulfillPct,combined,weakSubjects};
      }).sort((a,b)=>b.combined-a.combined);
    },[results,targetFulfillments,students]);

    return(<div>
      <H3>সম্ভাব্য এসএসসি ফলাফল পূর্বাভাস</H3>
      <div style={{fontSize:11,color:C.mu,marginBottom:12,background:C.puL,padding:10,borderRadius:8}}>
        💡 পূর্বাভাস = পরীক্ষার গড় নম্বরের ৬০% + সাপ্তাহিক টার্গেট পূরণের হারের ৪০% (weighted)। গবেষণা অনুযায়ী নিয়মিত retrieval practice ও spaced repetition দুর্বল বিষয়ে উন্নতিতে সহায়ক।
      </div>
      {stats.map(s=>{
        const[grade,gcolor]=sscScale(s.combined);
        return(<Card key={s.name}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontWeight:700,fontSize:13}}>{s.name}</div>
            {badge(gcolor,`সম্ভাব্য গ্রেড ${grade}`)}
          </div>
          <div style={{display:"flex",gap:14,fontSize:11,color:C.mu,marginBottom:6}}>
            <span>পরীক্ষার গড়: {s.examPct!=null?`${s.examPct}%`:"তথ্য নেই"}</span>
            <span>টার্গেট পূরণ: {s.fulfillPct!=null?`${s.fulfillPct}%`:"তথ্য নেই"}</span>
            <span>সম্মিলিত স্কোর: {s.combined}%</span>
          </div>
          {s.weakSubjects.length>0&&(
            <div style={{marginTop:6,borderTop:`1px solid ${C.bd}`,paddingTop:6}}>
              <div style={{fontSize:11,fontWeight:700,color:C.re,marginBottom:4}}>⚠️ দুর্বল বিষয় ও করণীয়:</div>
              {s.weakSubjects.map(w=>(
                <div key={w.subject} style={{fontSize:11,marginBottom:3}}>
                  <b>{w.subject}</b> ({w.avg}%) — {STUDY_TIPS[w.subject]||DEFAULT_TIP}
                </div>
              ))}
            </div>
          )}
        </Card>);
      })}
    </div>);
  }

}

  // selfWriteRef: আমরা নিজে যে savedAt পাঠিয়েছি সেটা রাখে, যাতে নিজের লেখা ডেটা শুনে আবার নিজেকেই ওভাররাইট না করে (echo ঠেকানো)
  const selfWriteRef=React.useRef(null);
  // skipNextFbPushRef: remote থেকে ডেটা apply করার পরের রেন্ডারে Firebase-এ আবার push করা ঠেকায়
  const skipNextFbPushRef=React.useRef(false);
  // prevValuesRef: গত সেভে কোন কোন top-level field-এর মান কী ছিল — partial update-এর জন্য ডিফ করতে লাগে

        setFbLoaded(true);

      // Pre-fetch এখনো চলছে — শেষ হওয়ার অপেক্ষা করো
      await waitForAuth();

          const tsV2b=data.teacherSubjects_v2?fbTeacherSubjectsV2ToState(data.teacherSubjects_v2):null;
          if(tsV2b)setTeacherSubjects(prev=>mergeObjState(data.teacherSubjects,tsV2b));
          else if(data.teacherSubjects!==undefined)setTeacherSubjects(data.teacherSubjects);

          if(data.customStudents!==undefined)setCustomStudents(data.customStudents);

          else if(data.selfReports!==undefined)setSelfReports(data.selfReports);

          if(spV2b)setStudentProfiles(prev=>mergeObjState(data.studentProfiles,spV2b));

    const ref=window.__fbReady?window.__fbDB.ref(FB_PATH):null;
    const handler=ref?snap=>{
      if(!snap.exists())return;
      const data=snap.val();
      if(data.savedAt&&selfWriteRef.current&&data.savedAt===selfWriteRef.current)return;
      // remote update — auto-save block করো, React batch render শেষে reset
      skipNextFbPushRef.current=true;
      const v2state=data.results_v2?fbResultsV2ToState(data.results_v2):null;
      const mergedResults=v2state?(data.results?mergeResults(data.results,v2state):v2state):(data.results||undefined);
      if(mergedResults!==undefined)setResults(mergedResults);
      if(data.examSchedule!==undefined)setExamSchedule(data.examSchedule);
      if(data.lessonPlans!==undefined)setLessonPlans(data.lessonPlans);
      if(data.customTeachers!==undefined)setCustomTeachers(data.customTeachers);
      if(data.removedTeachers!==undefined)setRemovedTeachers(data.removedTeachers);
      TEACHERS=[...DEFAULT_TEACHERS.filter(t=>!(data.removedTeachers||[]).includes(t)),...(data.customTeachers||customTeachers)];
      const obsV2c=data.obsData_v2?fbObsDataV2ToState(data.obsData_v2):null;
      const peerObsV2c=data.peerObservations_v2?fbPeerObservationsV2ToArray(data.peerObservations_v2):null;
      const hwIncV2c=data.homeworkIncidents_v2?fbHomeworkIncidentsV2ToArray(data.homeworkIncidents_v2):null;
      const hwActV2c=data.homeworkActions_v2?fbHomeworkActionsV2ToArray(data.homeworkActions_v2):null;
      if(obsV2c||peerObsV2c||hwIncV2c||hwActV2c){
        setObsData(prev=>{
          const base=mergeObjState(data.obsData,obsV2c||{});
          if(peerObsV2c)base.peerObservations=peerObsV2c;
          if(hwIncV2c)base.homeworkIncidents=hwIncV2c;
          if(hwActV2c)base.homeworkActions=hwActV2c;
          return base;
        });
      }else if(data.obsData!==undefined)setObsData(data.obsData);

      const dlV2c=data.deadlines_v2?fbDeadlinesV2ToArray(data.deadlines_v2):null;
      if(dlV2c)setDeadlines(dlV2c);
      else if(data.deadlines!==undefined)setDeadlines(data.deadlines);

      const dlSubV2c=data.dlSubmissions_v2?fbDlSubmissionsV2ToState(data.dlSubmissions_v2):null;
      if(dlSubV2c)setDlSubmissions(prev=>mergeObjState(data.dlSubmissions,dlSubV2c));
      else if(data.dlSubmissions!==undefined)setDlSubmissions(data.dlSubmissions);

      const tsV2c=data.teacherSubjects_v2?fbTeacherSubjectsV2ToState(data.teacherSubjects_v2):null;
      if(tsV2c)setTeacherSubjects(prev=>mergeObjState(data.teacherSubjects,tsV2c));
      else if(data.teacherSubjects!==undefined)setTeacherSubjects(data.teacherSubjects);

      if(data.customStudents!==undefined)setCustomStudents(data.customStudents);
      if(data.weeklyTargets_v2!==undefined)setWeeklyTargets(prev=>mergeObjState(data.weeklyTargets,data.weeklyTargets_v2));
      else if(data.weeklyTargets!==undefined)setWeeklyTargets(data.weeklyTargets);
      if(data.targetFulfillment_v2!==undefined)setTargetFulfillments(prev=>mergeObjState(data.targetFulfillments,data.targetFulfillment_v2));
      else if(data.targetFulfillments!==undefined)setTargetFulfillments(data.targetFulfillments);
      if(data.selfReports_v2!==undefined)setSelfReports(prev=>mergeObjState(data.selfReports,data.selfReports_v2));
      else if(data.selfReports!==undefined)setSelfReports(data.selfReports);

      const spV2c=data.studentProfiles_v2?fbStudentProfilesV2ToState(data.studentProfiles_v2):null;
      if(spV2c)setStudentProfiles(prev=>mergeObjState(data.studentProfiles,spV2c));
      else if(data.studentProfiles!==undefined)setStudentProfiles(data.studentProfiles);
      if(data.studentDepartments!==undefined)setStudentDepartments(data.studentDepartments);

      HAISDB.setSync("hais_data_v3",data);
      setTimeout(()=>{skipNextFbPushRef.current=false;},500);
    }:null;
    loadFromFirebase();
    if(ref&&handler)ref.on("value",handler);
    return()=>{if(ref&&handler)ref.off("value",handler);};
  },[dbReady]);

  // ── Auto-save: তাৎক্ষণিক IndexedDB + শুধু পরিবর্তিত field-ই Firebase-এ পাঠানো (partial update) ──
  useEffect(()=>{
    if(!dbReady||!fbLoaded)return;
    // Firebase থেকে ডেটা apply শেষ হওয়ার আগে auto-save চলবে না (race condition fix)
    if(!fbApplyDoneRef.current)return;
    const current={results,lessonPlans,obsData,deadlines,dlSubmissions,teacherSubjects,customStudents,customTeachers,removedTeachers,studentProfiles,studentDepartments,examSchedule,dailyRoutine,meetingAgenda,specialTasks,routineSubtasks,lastCarryDate,weeklyTargets,targetFulfillments,selfReports};
    // remote থেকে আসা আপডেট — নিজেরটাই আবার Firebase-এ পাঠানোর দরকার নেই
    if(skipNextFbPushRef.current){
      prevValuesRef.current=current;
      return;
    }
    // সম্পূর্ণ শূন্য হলে Firebase-এ push করব না — data loss ঠেকাতে
    const hasAnyData=
      Object.keys(results).length>0||
      Object.keys(lessonPlans).length>0||
      Object.keys(obsData).length>0||
      deadlines.length>0||
      Object.keys(dlSubmissions).length>0;
    if(!hasAnyData&&!prevValuesRef.current){
      prevValuesRef.current=current;
      return;
    }
    userEditedRef.current=true;
    const savedAt=new Date().toISOString();
    const payload={...current,savedAt};
    // IndexedDB-তে তাৎক্ষণিক local save
    HAISDB.setSync("hais_data_v3",payload);
    // কোন কোন top-level field পরিবর্তিত হয়েছে
    const prev=prevValuesRef.current;
    // results বাদ দাও — এটা ExamEntry থেকে granular write হয়, এখানে পাঠালে race condition হবে
    // granular write হয় এমন field গুলো bulk auto-save থেকে বাদ — race condition প্রতিরোধ
    const GRANULAR_FIELDS=["results","teacherSubjects","deadlines","dlSubmissions","obsData","studentProfiles","studentDepartments","weeklyTargets","targetFulfillments","selfReports"];
    const changedKeys=!prev
      ?Object.keys(current).filter(k=>!GRANULAR_FIELDS.includes(k))
      :Object.keys(current).filter(k=>!GRANULAR_FIELDS.includes(k)&&current[k]!==prev[k]);
    prevValuesRef.current=current;
    if(changedKeys.length===0)return;
    // Firebase-এ 1.5s debounce — শুধু পরিবর্তিত field পাঠানো (results ছাড়া)
    const t=setTimeout(async()=>{
      const partial={savedAt};
      changedKeys.forEach(k=>{partial[k]=current[k];});
      selfWriteRef.current=savedAt;
      const ok=await fbUpdate(partial);
      if(ok){setLastSaved(new Date());setSaveError(false);}
      else{setSaveError(true);setLastSaved(new Date());}
    },1500);
    return()=>clearTimeout(t);
  },[results,lessonPlans,obsData,deadlines,dlSubmissions,teacherSubjects,customStudents,customTeachers,removedTeachers,studentProfiles,studentDepartments,weeklyTargets,targetFulfillments,selfReports,dbReady,fbLoaded]);

  const handlePageChange=(newPage,opts={})=>{
    if(!opts.isPopState&&newPage!==page){
      const newDepth=navDepth+1;
      window.history.pushState({haisPage:newPage,haisDepth:newDepth},"");
      setNavDepth(newDepth);
    }
    setPage(newPage);
    setShowMoreSheet(false);
    if(currentUser!==ADMIN_TEACHER)return;
    const autoIds=COORD_APP_TASK_MAP[newPage]||[];
    if(!autoIds.length)return;
    setCoordTaskStatus(prev=>{
      const updated={...prev};
      autoIds.forEach(id=>{
        if(!prev[id]?.done){
          const d=new Date().toLocaleDateString("bn-BD",{day:"numeric",month:"short"});
          updated[id]={done:true,doneAt:d};
        }
      });
      return updated;
    });
  };

  // ── পেছনে ফেরা: বর্তমান পেজের ঠিক আগের পেজে ফিরে যাওয়া (ব্রাউজার history.back() ব্যবহার করে,
  // যাতে হেডারের ← বাটন আর ফোনের হার্ডওয়্যার ব্যাক বাটন — দুটোই একই, সামঞ্জস্যপূর্ণভাবে কাজ করে) ──
  const goBack=()=>{
    if(navDepth>0)window.history.back();
  };

  const handleCoordToggle=(taskId)=>{
    setCoordTaskStatus(prev=>{
      const cur=prev[taskId];
      const nowDone=!cur.done;
      return{...prev,[taskId]:{done:nowDone,
        doneAt:nowDone?new Date().toLocaleDateString("bn-BD",{day:"numeric",month:"short"}):null}};
    });
  };

  const allStudents=Object.entries(STUDENTS).flatMap(([cls,names])=>names.map(n=>({name:n,cls})));
  const searchResults=useMemo(()=>{
    if(searchQ.trim().length<2)return[];
    const q=searchQ.toLowerCase();
    const students=allStudents.filter(s=>s.name.toLowerCase().includes(q)).map(s=>({...s,type:"student"}));
    const teachers=TEACHERS.filter(t=>t.toLowerCase().includes(q)).map(t=>({name:t,type:"teacher"}));
    return[...students,...teachers].slice(0,8);
  },[searchQ]);

  const exportJSON=()=>{
    const a=document.createElement("a");
    a.href="data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify({results,lessonPlans,obsData,deadlines,dlSubmissions,teacherSubjects,customStudents,customTeachers,removedTeachers,studentProfiles,studentDepartments,exportedAt:new Date().toISOString()},null,2));
    a.download=`HAIS_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();

    setShowExportMenu(false);
  };

  const importJSON=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!d||(!d.results&&!d.lessonPlans)){
          setImportMsg("✗ এটি সঠিক HAIS ব্যাকআপ ফাইল নয়।");
          setTimeout(()=>setImportMsg(""),3500);
          return;
        }
        if(!window.confirm("এই ব্যাকআপ ফাইল থেকে পুনরুদ্ধার করলে বর্তমান সব ডেটা প্রতিস্থাপিত হবে। আপনি কি নিশ্চিত?"))return;
        setResults(d.results||{});
        setLessonPlans(d.lessonPlans||{});
        setObsData(d.obsData||{});
        if(d.deadlines)setDeadlines(d.deadlines);
        if(d.dlSubmissions)setDlSubmissions(d.dlSubmissions);
        if(d.teacherSubjects)setTeacherSubjects(d.teacherSubjects);
        if(d.customStudents)setCustomStudents(d.customStudents);
        if(d.customTeachers)setCustomTeachers(d.customTeachers);
        if(d.removedTeachers)setRemovedTeachers(d.removedTeachers);
        TEACHERS=[...DEFAULT_TEACHERS.filter(t=>!(d.removedTeachers||[]).includes(t)),...(d.customTeachers||[])];
        if(d.studentProfiles)setStudentProfiles(d.studentProfiles);
        if(d.studentDepartments)setStudentDepartments(d.studentDepartments);
        // lpRole import করা হচ্ছে না — এটি session-নির্ভর ব্যক্তিগত তথ্য
        setImportMsg("✓ ডেটা সফলভাবে পুনরুদ্ধার করা হয়েছে!");
        setTimeout(()=>setImportMsg(""),3500);
      }catch(err){
        setImportMsg("✗ ফাইলটি পড়া যায়নি। সঠিক JSON ব্যাকআপ ফাইল কিনা যাচাই করুন।");
        setTimeout(()=>setImportMsg(""),3500);
      }
    };
    reader.readAsText(file);
    e.target.value="";
    setShowExportMenu(false);
  };

  const printReport=(reportType="full")=>{
    const allRes=Object.values(results).flat();
    const validRes=allRes.filter(r=>!r.absent&&r.marks!=null);
    const total=Object.values(STUDENTS).flat().length;
    const avg=validRes.length?Math.round(validRes.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/validRes.length):0;
    const pass=validRes.filter(r=>r.marks>=(r.passMarks||33)).length;
    const passRate=validRes.length?Math.round(pass/validRes.length*100):0;
    const reportDate=new Date().toLocaleDateString("bn-BD");
    const reportTime=new Date().toLocaleTimeString("bn-BD");

    /* ── শ্রেণিভিত্তিক বিশ্লেষণ ── */
    const clsData=Object.keys(STUDENTS).map(cls=>{
      const cr=validRes.filter(r=>r.cls===cls);
      if(!cr.length)return{cls,students:STUDENTS[cls].length,avg:0,pass:0,fail:0,ap:0,empty:true};
      const cavg=Math.round(cr.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/cr.length);
      const cp=cr.filter(r=>r.marks>=(r.passMarks||33)).length;
      const aplus=cr.filter(r=>(r.marks/(r.fullMarks||100)*100)>=80).length;
      return{cls,students:STUDENTS[cls].length,avg:cavg,pass:cp,fail:cr.length-cp,ap:aplus,empty:false};
    });

    const clsRows=clsData.map(d=>{
      if(d.empty)return`<tr><td><b>শ্রেণি ${d.cls}</b></td><td>${d.students}</td><td colspan="5" style="color:#999;text-align:center">ডেটা নেই</td></tr>`;
      const barW=d.avg;
      const barC=d.avg>=70?"#3b6d11":d.avg>=50?"#854f0b":"#a32d2d";
      return`<tr>
        <td><b>শ্রেণি ${d.cls}</b></td>
        <td style="text-align:center">${d.students}</td>
        <td>
          <div style="display:flex;align-items:center;gap:6px">
            <div style="flex:1;height:8px;background:#eee;border-radius:4px">
              <div style="width:${barW}%;height:100%;background:${barC};border-radius:4px"></div>
            </div>
            <span style="font-weight:700;color:${barC};min-width:32px">${d.avg}%</span>
          </div>
        </td>
        <td style="text-align:center;color:#3b6d11;font-weight:700">${d.pass}</td>
        <td style="text-align:center;color:#a32d2d;font-weight:700">${d.fail}</td>
        <td style="text-align:center;color:#854f0b;font-weight:700">${d.ap}</td>
        <td style="text-align:center">${d.students?Math.round(d.pass/d.students*100)+"%" : "—"}</td>
      </tr>`;
    }).join("");

    /* ── শিক্ষক KPI তালিকা ── */
    const kpiRows=TEACHERS.map(teacher=>{
      const kpi=calcKPI(teacher,allRes,lessonPlans,obsData,deadlines,dlSubmissions,examSchedule,teacherSubjects);
      if(kpi.score===0)return"";
      const gc=kpi.grade==="A+"?"#3b6d11":kpi.grade==="A"?"#0f6e56":kpi.grade==="B"?"#854f0b":kpi.grade==="C"||kpi.grade==="D"?"#993c1d":"#6b6b8a";
      const barW=kpi.score;
      return`<tr>
        <td style="font-weight:600">${teacher}</td>
        <td>
          <div style="display:flex;align-items:center;gap:6px">
            <div style="flex:1;height:8px;background:#eee;border-radius:4px">
              <div style="width:${barW}%;height:100%;background:${gc};border-radius:4px"></div>

            <span style="font-weight:700;color:${gc};min-width:28px">${kpi.score}</span>

        <td style="text-align:center">${kpi.count}</td>
        <td style="text-align:center">${kpi.lp}</td>
      </tr>`;
    }).filter(Boolean).join("");

    /* ── বিষয়ভিত্তিক বিশ্লেষণ ── */
    const subjectMap={};
    validRes.forEach(r=>{
      if(!subjectMap[r.subject])subjectMap[r.subject]={total:0,sum:0,pass:0};
      subjectMap[r.subject].total++;
      subjectMap[r.subject].sum+=r.marks/(r.fullMarks||100)*100;
      if(r.marks>=(r.passMarks||33))subjectMap[r.subject].pass++;
    });
    const subjectRows=Object.entries(subjectMap)
      .map(([sub,d])=>({sub,avg:Math.round(d.sum/d.total),pass:d.pass,total:d.total,rate:Math.round(d.pass/d.total*100)}))
      .sort((a,b)=>b.avg-a.avg)
      .map(d=>{
        const c=d.avg>=70?"#3b6d11":d.avg>=50?"#854f0b":"#a32d2d";
        return`<tr><td style="font-weight:500">${d.sub}</td><td style="text-align:center;font-weight:700;color:${c}">${d.avg}%</td><td style="text-align:center">${d.total}</td><td style="text-align:center;color:#3b6d11">${d.pass}</td><td style="text-align:center;color:#a32d2d">${d.total-d.pass}</td><td style="text-align:center;font-weight:700;color:${c}">${d.rate}%</td></tr>`;
      }).join("");

    /* ── স্বাস্থ্য গেজ SVG ── */
    const healthScore=validRes.length?Math.round(passRate*0.6+avg*0.4):0;
    const healthC=healthScore>=75?"#3b6d11":healthScore>=50?"#854f0b":"#a32d2d";
    const r=45,circ=2*Math.PI*r,arc=circ*(healthScore/100);
    const gaugeSVG=`<svg width="120" height="120" viewBox="0 0 120 120">
      <circle cx="60" cy="60" r="${r}" fill="none" stroke="#eee" stroke-width="12"/>
      <circle cx="60" cy="60" r="${r}" fill="none" stroke="${healthC}" stroke-width="12" stroke-linecap="round"
        stroke-dasharray="${arc} ${circ-arc}" stroke-dashoffset="${circ/4}" transform="rotate(0,60,60)"/>
      <text x="60" y="56" text-anchor="middle" font-size="22" font-weight="800" fill="${healthC}">${healthScore}</text>
      <text x="60" y="72" text-anchor="middle" font-size="10" fill="#6b6b8a">${healthScore>=75?"চমৎকার":healthScore>=50?"মধ্যম":"নজর প্রয়োজন"}</text>
    </svg>`;

    const w=window.open("","_blank");
    w.document.write(`<!DOCTYPE html>

      {page==="arch"        &&(ADMIN_TEACHERS.includes(currentUser)?<Architecture/>:<div style={{textAlign:"center",padding:40,color:C.re,fontWeight:700}}>🔒 এই পেজটি শুধুমাত্র অ্যাডমিনের জন্য</div>)}
      {page==="whitelist"  &&(ADMIN_TEACHERS.includes(currentUser)?<WhitelistManager/>:<div style={{textAlign:"center",padding:40,color:C.re,fontWeight:700}}>🔒 এই পেজটি শুধুমাত্র অ্যাডমিনের জন্য</div>)}
      {page==="coord"       &&(currentUser===ADMIN_TEACHER?<CoordinatorDashboard taskStatus={coordTaskStatus} onToggle={handleCoordToggle} onPageJump={handlePageChange}/>:<div style={{textAlign:"center",padding:40,color:C.re,fontWeight:700}}>🔒 এই পেজটি শুধুমাত্র একাডেমিক ইনচার্জের জন্য</div>)}
      {page==="aic_obs"     &&(currentUser===ADMIN_TEACHER?<AICObservation obsData={obsData} setObsData={setObsData} currentUser={currentUser}/>:<div style={{textAlign:"center",padding:40,color:C.re,fontWeight:700}}>🔒 এই পেজটি শুধুমাত্র একাডেমিক ইনচার্জের জন্য</div>)}
      {page==="monthly_report" &&(ADMIN_TEACHERS.includes(currentUser)?<MonthlyReport results={results} lessonPlans={lessonPlans} obsData={obsData} deadlines={deadlines} dlSubmissions={dlSubmissions} examSchedule={examSchedule} teacherSubjects={teacherSubjects} STUDENTS={STUDENTS} currentUser={currentUser} onClose={()=>handlePageChange("dashboard")}/>:<div style={{textAlign:"center",padding:40,color:C.re,fontWeight:700}}>🔒 এই পেজটি শুধুমাত্র অ্যাডমিনের জন্য</div>)}
            </div>
          </div>

          {/* ── মোবাইল বটম ট্যাব বার ── */}
          <div className="app-bottom-tabs">
            {bottomTabs.map(p=>{
              const{icon,text}=splitNavLabel(p.label);
              return(
                <button key={p.id} className={"bottom-tab"+(page===p.id?" active":"")} onClick={()=>handlePageChange(p.id)}>
                  <span className="bt-icon">{icon}</span><span>{text}</span>
                </button>
              );
            })}
            <button className={"bottom-tab"+(showMoreSheet?" active":"")} onClick={()=>setShowMoreSheet(true)}>
              <span className="bt-icon">☰</span><span>আরও</span>
            </button>
          </div>
        </div>
    </div>

    {/* ── মোবাইল "আরও" শিট — বাকি সব মেনু আইটেম ── */}
    {showMoreSheet&&(<>
      <div className="app-more-sheet-backdrop" onClick={()=>setShowMoreSheet(false)}/>
      <div className="app-more-sheet">
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.bd}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:700,fontSize:14,color:C.pu}}>☰ সব মেনু</div>
          <button onClick={()=>setShowMoreSheet(false)} style={{border:"none",background:C.puL,color:C.pu,borderRadius:8,padding:"5px 10px",fontWeight:700,cursor:"pointer"}}>✕ বন্ধ</button>
        </div>
        {morePages.map(p=>(
          <div key={p.id} onClick={()=>handlePageChange(p.id)} style={{padding:"13px 18px",fontSize:13.5,color:page===p.id?C.pu:C.tx,fontWeight:page===p.id?700:400,background:page===p.id?C.puL:"transparent",cursor:"pointer",borderBottom:`1px solid ${C.bd}`}}>{p.label}</div>
        ))}
      </div>
    </>)}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
/* ═══ HAIS PWA Manager v7.0 ═══ */
const HAIS_VERSION='7.3';
let haisDeferredPrompt=null;

/* ── Service Worker নিবন্ধন (Auto-Update মোড) ──
   কোনো ব্যবহারকারীর ক্লিকের অপেক্ষা না করে নতুন ভার্সন পাওয়া গেলেই
   নিজে নিজে কাজে লেগে যাবে এবং পেজ রিলোড হয়ে যাবে */
let haisReloading=false;
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js',{scope:'./'})
      .then(function(reg){
        console.log('[HAIS] SW registered ✓ scope:',reg.scope);
        /* নতুন ভার্সন পাওয়া গেলে */
        reg.addEventListener('updatefound',function(){
          const nw=reg.installing;
          nw.addEventListener('statechange',function(){
            if(nw.state==='installed'&&navigator.serviceWorker.controller){
              console.log('[HAIS] নতুন ভার্সন ইন্সটল হয়েছে, এক্টিভ করা হচ্ছে...');
              showToast('🆕 নতুন আপডেট পাওয়া গেছে — লোড হচ্ছে...',2500);
              /* নতুন SW-কে সাথে সাথে এক্টিভ হতে বলো */
              if(nw.state==='installed')nw.postMessage({type:'SKIP_WAITING'});
            }
          });
        });
        /* নতুন SW এক্টিভ হলে পেজ রিলোড করো (একবারই) */
        navigator.serviceWorker.addEventListener('controllerchange',function(){
          if(haisReloading)return;
          haisReloading=true;
          setTimeout(function(){location.reload();},800);
        });
        /* অ্যাপ চালু হওয়ার সাথে সাথে এবং প্রতি ৩০ সেকেন্ডে আপডেট চেক করো */
        reg.update();
        setInterval(function(){reg.update();},30000);
      })
      .catch(function(err){console.warn('[HAIS] SW registration failed:',err);});
  });
  /* ব্যবহারকারী অ্যাপে ফিরে এলে (ট্যাব ফোকাস/হোমস্ক্রিন থেকে ওপেন) সাথে সাথেও চেক করো */
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='visible'){
      navigator.serviceWorker.getRegistration().then(function(reg){if(reg)reg.update();});
    }
  });
}

/* ── Install Prompt ধরে রাখো ── */
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  haisDeferredPrompt=e;
  console.log('[HAIS] Install prompt ready');
  /* ৩ সেকেন্ড পর install banner দেখাও */
  setTimeout(showInstallBanner,3000);
});

/* ── ইন্সটল সফল হলে ── */
window.addEventListener('appinstalled',function(){
  console.log('[HAIS] App installed successfully ✓');
  haisDeferredPrompt=null;
  const b=document.getElementById('hais-install-banner');
  if(b)b.remove();
  showToast('✅ HAIS সফলভাবে ইন্সটল হয়েছে!',3500);
});

/* ── Install Banner (Android/Desktop Chrome) ── */
function showInstallBanner(){
  /* স্বতন্ত্র মোডে চলছে মানে ইতিমধ্যে ইন্সটল আছে */
  if(window.matchMedia('(display-mode: standalone)').matches)return;
  if(document.getElementById('hais-install-banner'))return;
  if(!haisDeferredPrompt)return;

  const b=document.createElement('div');
  b.id='hais-install-banner';
  b.style.cssText=[
    'position:fixed','bottom:20px','left:50%','transform:translateX(-50%)',
    'background:#fff','border-radius:16px','box-shadow:0 6px 28px rgba(83,68,181,0.28)',
    'padding:14px 16px','z-index:9999','display:flex','align-items:center',
    'gap:12px','font-family:sans-serif','max-width:340px','width:92%',
    'border:1.5px solid #5344b520','animation:slideUp 0.4s ease'
  ].join(';');

  b.innerHTML=`
    <div style="width:44px;height:44px;border-radius:12px;background:#5344b5;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5L7.5 12H11V7h2v5h3.5L12 16.5z" fill="#fff"/></svg>
    </div>
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:2px">HAIS অ্যাপ ইন্সটল করুন</div>
      <div style="font-size:11px;color:#6b6b8a;line-height:1.4">অফলাইনে কাজ করবে • হোমস্ক্রিনে থাকবে</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">
      <button id="hais-install-btn" style="padding:7px 13px;border-radius:9px;border:none;background:#5344b5;color:#fff;cursor:pointer;font-weight:700;font-size:12px;white-space:nowrap">ইন্সটল</button>
      <button id="hais-install-close" style="padding:4px 13px;border-radius:9px;border:1px solid #ddd;background:transparent;color:#6b6b8a;cursor:pointer;font-size:11px">পরে</button>
    </div>`;

  /* keyframe যোগ করো */
  if(!document.getElementById('hais-anim-style')){
    const s=document.createElement('style');
    s.id='hais-anim-style';
    s.textContent='@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
    document.head.appendChild(s);
  }

  document.body.appendChild(b);

  document.getElementById('hais-install-btn').addEventListener('click',function(){
    b.remove();
    if(haisDeferredPrompt){
      haisDeferredPrompt.prompt();
      haisDeferredPrompt.userChoice.then(function(r){
        console.log('[HAIS] Install choice:',r.outcome);
        haisDeferredPrompt=null;
      });
    }
  });
  document.getElementById('hais-install-close').addEventListener('click',function(){
    b.remove();
  });

  /* ৩০ সেকেন্ড পর আপনা আপনি সরে যাক */
  setTimeout(function(){if(b.parentNode)b.remove();},30000);
}

/* ── iOS Safari ইন্সটল গাইড ── */
function showIOSGuide(){
  if(!window.navigator.standalone&&/iphone|ipad|ipod/i.test(navigator.userAgent)){
    /* প্রথমবার দেখালে পরে আর না */
    if(sessionStorage.getItem('hais-ios-shown'))return;
    sessionStorage.setItem('hais-ios-shown','1');
    setTimeout(function(){
      const g=document.createElement('div');
      g.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ddd;border-radius:16px 16px 0 0;padding:20px 16px 32px;z-index:9999;font-family:sans-serif;box-shadow:0 -4px 20px rgba(0,0,0,0.15)';
      g.innerHTML=`
        <div style="text-align:center;margin-bottom:14px">
          <div style="font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:6px">📱 HAIS হোমস্ক্রিনে যোগ করুন</div>
          <div style="font-size:12px;color:#6b6b8a;line-height:1.6">
            নিচে <b>Share বাটন</b> (⬆) চাপুন<br>তারপর <b>"Add to Home Screen"</b> নির্বাচন করুন
          </div>
        </div>
        <div style="display:flex;justify-content:center;gap:20px;margin-bottom:14px;font-size:12px;color:#5344b5;font-weight:600">
          <span>① Share ⬆</span><span>→</span><span>② Add to Home Screen</span><span>→</span><span>③ Add</span>
        </div>
        <button onclick="this.parentNode.remove()" style="display:block;width:100%;padding:10px;border-radius:10px;border:none;background:#5344b5;color:#fff;font-weight:700;font-size:14px;cursor:pointer">বুঝেছি!</button>`;
      document.body.appendChild(g);
      setTimeout(function(){if(g.parentNode)g.remove();},15000);
    },4000);
  }
}

/* ── Toast বার্তা ── */
function showToast(msg,ms){
  ms=ms||2500;
  const t=document.createElement('div');
  t.style.cssText='position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:10px;z-index:9999;font-family:sans-serif;font-size:13px;pointer-events:none;opacity:0;transition:opacity 0.3s';
  t.textContent=msg;
  document.body.appendChild(t);
  requestAnimationFrame(function(){t.style.opacity='1';});
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove();},300);},ms);
}

/* ── iOS গাইড চালাও ── */
window.addEventListener('load',showIOSGuide);

/* ── অনলাইন/অফলাইন নোটিফিকেশন ── */
window.addEventListener('online',function(){showToast('✅ ইন্টারনেট সংযোগ পুনরুদ্ধার',2000);});
window.addEventListener('offline',function(){showToast('⚠️ অফলাইন মোড — ডেটা সেভ হবে পরে',3000);});
</script>
</body>
