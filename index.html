<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect}=React;
function Portal({children}){
  // পপআপ/মডালকে সরাসরি <body>-এর নিচে রেন্ডার করে — যাতে কোনো parent-এর CSS transform/animation
  // (যেমন পেজ ট্রানজিশন fade) থাকলেও position:fixed মডাল ভুল জায়গায় (পুরো পেজের মাঝে, স্ক্রল করে
  // অনেক নিচে/উপরে) না গিয়ে সবসময় বর্তমান ভিউপোর্টের মাঝখানেই সঠিকভাবে দেখায়।
  return ReactDOM.createPortal(children,document.body);
}
const IDB_NAME="HAIS_DB";
const IDB_STORE="kv";
const IDB_VER=1;
const FB_PATH="hais_data_v3";

/* ══ IndexedDB KV Wrapper ══
   সব key-value অপারেশন এখানে — localStorage-এর জায়গায় IndexedDB */
const HAISDB={
  _db:null,
  open(){
    if(this._db)return Promise.resolve(this._db);
    return new Promise((res,rej)=>{
      const req=indexedDB.open(IDB_NAME,IDB_VER);
      req.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains(IDB_STORE))
          db.createObjectStore(IDB_STORE);
      };
      req.onsuccess=e=>{this._db=e.target.result;res(this._db);};
      req.onerror=e=>rej(e.target.error);
    });
  },
  async get(key){
    const db=await this.open();
    return new Promise((res,rej)=>{
      const tx=db.transaction(IDB_STORE,"readonly");
      const req=tx.objectStore(IDB_STORE).get(key);
      req.onsuccess=()=>res(req.result??null);
      req.onerror=e=>rej(e.target.error);
    });
  },
  async set(key,val){
    const db=await this.open();
    return new Promise((res,rej)=>{
      const tx=db.transaction(IDB_STORE,"readwrite");
      const req=tx.objectStore(IDB_STORE).put(val,key);
      req.onsuccess=()=>res(true);
      req.onerror=e=>rej(e.target.error);
    });
  },
  async remove(key){
    const db=await this.open();
    return new Promise((res,rej)=>{
      const tx=db.transaction(IDB_STORE,"readwrite");
      const req=tx.objectStore(IDB_STORE).delete(key);
      req.onsuccess=()=>res(true);
      req.onerror=e=>rej(e.target.error);
    });
  },
  /* sync-style সেট — autosave-এ fire-and-forget */
  setSync(key,val){this.set(key,val).catch(e=>console.error("IDB set:",e));},
};

/* ── Firebase helpers ── */
const fbSave=async(data)=>{
  if(!window.__fbReady)return false;
  try{await window.__fbDB.ref(FB_PATH).set(data);return true;}catch(e){console.error("FB save:",e);return false;}
};
/* partial আপডেট — শুধু যেসব top-level key পরিবর্তন হয়েছে সেগুলোই পাঠায়,
   বাকি ব্যবহারকারীর ডিভাইসে থাকা stale ডেটা দিয়ে বাকি ফিল্ড ওভাররাইট হবে না */
const fbUpdate=async(partial)=>{
  if(!window.__fbReady)return false;
  try{await window.__fbDB.ref(FB_PATH).update(partial);return true;}catch(e){console.error("FB update:",e);return false;}
};
/* ── Granular results write — race condition সম্পূর্ণ দূর করে ──
   প্রতিটি entry আলাদা Firebase path-এ লেখা হয়, ফলে একসাথে
   একাধিক শিক্ষক save করলেও কেউ কারো ডেটা মুছতে পারে না।
   key = cls__subject__examType__examName__studentName (/ বাদ দিয়ে __ দিয়ে) */
const _fbKey=(s)=>String(s||"").replace(/[.#$[\]/]/g,"_").replace(/\s+/g,"_");
const fbSaveResultEntries=async(entries)=>{
  if(!window.__fbReady||!entries||!entries.length)return false;
  try{
    const updates={};
    entries.forEach(e=>{
      const k=[e.cls,e.subject,e.examType,e.examName||"noname",e.name].map(_fbKey).join("__");
      updates[`${FB_PATH}/results_v2/${k}`]=e;
    });
    await window.__fbDB.ref("/").update(updates);
    return true;
  }catch(err){console.error("FB granular save:",err);return false;}
};
/* একটি নির্দিষ্ট exam এর সব entry মুছে ফেলা */
const fbDeleteResultExam=async(cls,subject,examType,examName)=>{
  if(!window.__fbReady)return false;
  try{
    const prefix=[cls,subject,examType,examName||"noname"].map(_fbKey).join("__");
    const snap=await window.__fbDB.ref(`${FB_PATH}/results_v2`).orderByKey().startAt(prefix+"__").endAt(prefix+"__\uf8ff").once("value");
    if(!snap.exists())return true;
    const del={};
    snap.forEach(c=>{del[`${FB_PATH}/results_v2/${c.key}`]=null;});
    await window.__fbDB.ref("/").update(del);
    return true;
  }catch(err){console.error("FB delete exam:",err);return false;}
};
/* একটি নির্দিষ্ট student entry আপডেট */
const fbUpdateResultEntry=async(entry)=>{
  if(!window.__fbReady||!entry)return false;
  try{
    const k=[entry.cls,entry.subject,entry.examType,entry.examName||"noname",entry.name].map(_fbKey).join("__");
    await window.__fbDB.ref(`${FB_PATH}/results_v2/${k}`).set(entry);
    return true;
  }catch(err){console.error("FB update entry:",err);return false;}
};
/* Firebase results_v2 থেকে flat array বানানো */
const fbResultsV2ToState=(v2obj)=>{
  if(!v2obj)return null;
  const byClass={};
  Object.values(v2obj).forEach(e=>{
    if(!e||!e.cls)return;
    if(!byClass[e.cls])byClass[e.cls]=[];
    byClass[e.cls].push(e);
  });
  return byClass;
};
/* পুরনো results (array-based) এবং নতুন results_v2 (granular) মার্জ করা —
   একই cls+subject+examType+examName+name থাকলে সবচেয়ে নতুন savedAt জেতে */
const mergeResults=(oldR,newR)=>{
  const merged={};
  const allCls=new Set([...Object.keys(oldR||{}),...Object.keys(newR||{})]);
  allCls.forEach(cls=>{
    const map={};
    (oldR[cls]||[]).forEach(e=>{
      const k=`${e.subject}||${e.examType}||${e.examName||""}||${e.name}`;
      map[k]=e;
    });
    (newR[cls]||[]).forEach(e=>{
      const k=`${e.subject}||${e.examType}||${e.examName||""}||${e.name}`;
      const existing=map[k];
      // নতুনটা বা savedAt বেশি হলে replace
      if(!existing||!existing.savedAt||(e.savedAt&&e.savedAt>existing.savedAt))map[k]=e;
    });
    merged[cls]=Object.values(map);
  });
  return merged;
};
/* ══ অতিরিক্ত granular write — সকল ডেটা টাইপের জন্য race-condition নিরাপত্তা ══
   প্রতিটি function নির্দিষ্ট sub-path এ লেখে, ফলে একই সময়ে একাধিক ব্যবহারকারী
   ভিন্ন ভিন্ন record edit করলেও কারো ডেটা মুছে যায় না। */

// ── teacherSubjects: প্রতিটি শিক্ষকের mapping আলাদা path এ ──
const fbSaveTeacherSubject=async(teacherName,subjectList)=>{
  if(!window.__fbReady)return false;
  try{
    const k=_fbKey(teacherName);
    await window.__fbDB.ref(`${FB_PATH}/teacherSubjects_v2/${k}`).set(subjectList);
    return true;
  }catch(err){console.error("FB teacherSubjects save:",err);return false;}
};
const fbTeacherSubjectsV2ToState=(v2obj)=>{
  if(!v2obj)return null;
  const state={};
  // key থেকে আসল নাম বের করা সম্ভব না (sanitize হয়েছে), তাই key-কেই নাম হিসেবে রিভার্স ম্যাপ করি TEACHERS দিয়ে
  TEACHERS.forEach(t=>{
    const k=_fbKey(t);
    if(v2obj[k]!==undefined)state[t]=v2obj[k];
  });
  return state;
};

// ── deadlines: প্রতিটি deadline আলাদা path এ (id ভিত্তিক) ──
const fbSaveDeadline=async(deadline)=>{
  if(!window.__fbReady||!deadline?.id)return false;
  try{
    await window.__fbDB.ref(`${FB_PATH}/deadlines_v2/${deadline.id}`).set(deadline);
    return true;
  }catch(err){console.error("FB deadline save:",err);return false;}
};
const fbDeleteDeadline=async(id)=>{
  if(!window.__fbReady||!id)return false;
  try{
    await window.__fbDB.ref(`${FB_PATH}/deadlines_v2/${id}`).remove();
    return true;
  }catch(err){console.error("FB deadline delete:",err);return false;}
};
const fbDeadlinesV2ToArray=(v2obj)=>{
  if(!v2obj)return null;
  return Object.values(v2obj);
};

// ── dlSubmissions: deadlineId__teacherKey path এ আলাদা entry ──
const fbSaveDlSubmission=async(deadlineId,teacherName,submissionData)=>{
  if(!window.__fbReady||!deadlineId)return false;
  try{
    const k=_fbKey(teacherName);
    await window.__fbDB.ref(`${FB_PATH}/dlSubmissions_v2/${deadlineId}/${k}`).set(submissionData);
    return true;
  }catch(err){console.error("FB dlSubmission save:",err);return false;}
};
const fbDlSubmissionsV2ToState=(v2obj)=>{
  if(!v2obj)return null;
  const state={};
  Object.entries(v2obj).forEach(([deadlineId,teacherMap])=>{
    state[deadlineId]={};
    TEACHERS.forEach(t=>{
      const k=_fbKey(t);
      if(teacherMap&&teacherMap[k]!==undefined)state[deadlineId][t]=teacherMap[k];
    });
  });

/* realtime listener — অন্য কোনো ডিভাইস ডেটা পরিবর্তন করলে সাথে সাথে এই কলব্যাক চলবে */
const fbListen=(cb)=>{
  if(!window.__fbReady){setTimeout(()=>cb(null),500);return ()=>{};}
  const ref=window.__fbDB.ref(FB_PATH);
  const handler=snap=>{cb(snap.exists()?snap.val():null);};
  ref.on("value",handler);
  return ()=>ref.off("value",handler);
};

/* ── IndexedDB থেকে একবারে সব পড়া ── */
const loadFromIDB=async()=>{
  try{
    // ১. নতুন key চেষ্টা
    const data=await HAISDB.get("hais_data_v3");
    if(data&&(data.results||data.lessonPlans))return data;

    // ২. পুরনো v2 থেকে মাইগ্রেট
    const old=await HAISDB.get("hais_data_v2");
    if(old&&(old.results||old.lessonPlans)){
      console.info("HAIS: পুরনো v2 ডেটা থেকে মাইগ্রেশন হচ্ছে...");
      const migrated={results:old.results||{},lessonPlans:old.lessonPlans||{},obsData:old.obsData||{},deadlines:old.deadlines||[],dlSubmissions:old.dlSubmissions||{},teacherSubjects:old.teacherSubjects||{},customStudents:old.customStudents||{},savedAt:old.savedAt||new Date().toISOString()};
      await HAISDB.set("hais_data_v3",migrated);
      return migrated;
    }

    // ৩. localStorage থেকে মাইগ্রেট (v6→v7)
    const lsKeys=["hais_data_v3","hais_data_v2","hais_data_v1","hais_results","haisData","hais_backup"];
    for(const key of lsKeys){
      try{
        const lsRaw=localStorage.getItem(key);
        if(lsRaw){
          const lsData=JSON.parse(lsRaw);
          if(lsData&&(lsData.results||lsData.lessonPlans)){
            console.info("HAIS: localStorage("+key+") → IndexedDB মাইগ্রেশন ✓");
            await HAISDB.set("hais_data_v3",lsData);
            localStorage.removeItem(key);
            return lsData;
          }
        }
      }catch(e){}
    }

    // ৪. sessionStorage থেকেও চেষ্টা
    try{
      const ssRaw=sessionStorage.getItem("hais_data_v3")||sessionStorage.getItem("hais_data_v2");
      if(ssRaw){
        const ssData=JSON.parse(ssRaw);
        if(ssData&&(ssData.results||ssData.lessonPlans)){
          console.info("HAIS: sessionStorage থেকে ডেটা উদ্ধার ✓");
          await HAISDB.set("hais_data_v3",ssData);
          return ssData;
        }
      }
    }catch(e){}

    // ৫. পুরনো IDB database নাম চেষ্টা
    const oldDBNames=["HAIS_DB_v6","HAIS_DB_v5","HAISDatabase","hais_idb"];
    for(const dbName of oldDBNames){
      try{
        const oldData=await new Promise((res)=>{
          const req=indexedDB.open(dbName);
          req.onsuccess=e=>{
            const db=e.target.result;
            const stores=Array.from(db.objectStoreNames);
            if(!stores.length){res(null);return;}
            const tx=db.transaction(stores[0],"readonly");
            const getAllReq=tx.objectStore(stores[0]).getAll();
            getAllReq.onsuccess=()=>res(getAllReq.result?.[0]||null);
            getAllReq.onerror=()=>res(null);
          };
          req.onerror=()=>res(null);
        });
        if(oldData&&(oldData.results||oldData.lessonPlans)){
          console.info("HAIS: পুরনো IDB("+dbName+") থেকে ডেটা উদ্ধার ✓");
          await HAISDB.set("hais_data_v3",oldData);
          return oldData;
        }
      }catch(e){}
    }

  }catch(e){console.error("HAIS IDB লোড সমস্যা:",e);}
  return null;
};

// ★★★ কম নম্বরের কারণ — শ্রেণিবিন্যাস ও শিক্ষক-উপদেশ ★★★
// নিয়ম-ভিত্তিক (keyword + পরিসংখ্যান) বিশ্লেষণ — প্রকৃত AI/ভাষা-বোঝা না, তবে নিরাপদ (কোনো
// বহিরাগত API/key লাগে না) এবং কার্যকর প্যাটার্ন ধরতে পারে।
// ══════════════════════════════════════════════
const REASON_TEACHING_KEYWORDS=["বুঝতে","বুঝাতে","ব্যাখ্যা","পড়ানো","শেখানো","পাঠদান","পুনরায় পড়ানো","আরও সময়","অতিরিক্ত ক্লাস","পদ্ধতি","দ্রুত শেষ","সময় কম ছিল"];
const REASON_STUDENT_KEYWORDS=["অনুপস্থিত","পড়েনি","মনোযোগ","অমনোযোগী","বাসার সমস্যা","অসুস্থ","প্রস্তুতি","হোমওয়ার্ক করেনি","বাড়ির কাজ করেনি","অলসতা","খেলাধুলা","মোবাইল","পড়াশোনায় অনিয়মিত"];
function classifyLowScoreReason(text){
  const t=(text||"").trim();
  if(t.length<15)return{category:"unclear",vague:true};
  const teachHit=REASON_TEACHING_KEYWORDS.some(k=>t.includes(k));
  const studHit=REASON_STUDENT_KEYWORDS.some(k=>t.includes(k));
  if(teachHit&&!studHit)return{category:"teaching",vague:false};
  if(studHit&&!teachHit)return{category:"student",vague:false};
  if(teachHit&&studHit)return{category:"mixed",vague:false};
  return{category:"unclear",vague:false};
}
// একজন শিক্ষকের কম-নম্বর প্যাটার্ন বিশ্লেষণ করে স্বয়ংক্রিয় পরামর্শ তৈরি করে
function computeTeacherLowScoreAdvisory(teacher, allRes){
  const mine=allRes.filter(r=>r.teacher===teacher&&!r.absent&&r.marks!=null);
  if(!mine.length)return null;
  const pctOf=r=>r.marks/(r.fullMarks||100)*100;
  const myLow=mine.filter(r=>pctOf(r)<50);
  if(myLow.length===0)return{myFailRate:0,myLowCount:0,myTotal:mine.length,othersFailRate:null,repeatFailStudents:0,reasonStats:{studentBlame:0,teachingBlame:0,mixedBlame:0,vagueCount:0,total:0,missingReasonCount:0},templateSuspect:false,advisory:null};
  const myFailRate=Math.round(myLow.length/mine.length*100);

  // একই বিষয়ে অন্য শিক্ষকদের গড় ফেল-হার (৫০%-এর নিচে) তুলনা
  const subjectsTaught=[...new Set(mine.map(r=>r.subject))];
  let otherLowTotal=0,otherTotal=0;
  subjectsTaught.forEach(subject=>{
    const subjRes=allRes.filter(r=>r.subject===subject&&r.teacher!==teacher&&!r.absent&&r.marks!=null);
    otherTotal+=subjRes.length;
    otherLowTotal+=subjRes.filter(r=>pctOf(r)<50).length;
  });
  const othersFailRate=otherTotal?Math.round(otherLowTotal/otherTotal*100):null;

  // বারবার (২+ বার) ৫০%-এর নিচে পাওয়া ছাত্র
  const studentLowCount={};
  myLow.forEach(r=>{studentLowCount[r.name]=(studentLowCount[r.name]||0)+1;});
  const repeatFailStudents=Object.values(studentLowCount).filter(c=>c>=2).length;

  // শিক্ষকের দেওয়া কারণ বিশ্লেষণ
  const reasons=myLow.filter(r=>r.lowScoreReason&&r.lowScoreReason.trim());
  let studentBlame=0,teachingBlame=0,mixedBlame=0,vagueCount=0;
  reasons.forEach(r=>{
    const c=classifyLowScoreReason(r.lowScoreReason);
    if(c.vague)vagueCount++;
    else if(c.category==="student")studentBlame++;
    else if(c.category==="teaching")teachingBlame++;
    else if(c.category==="mixed")mixedBlame++;
  });
  const reasonCounts={};
  reasons.forEach(r=>{const norm=r.lowScoreReason.trim().toLowerCase();reasonCounts[norm]=(reasonCounts[norm]||0)+1;});
  const templateSuspect=Object.values(reasonCounts).some(c=>c>=3);

  // পরামর্শ (অগ্রাধিকার-ক্রমে) — সবচেয়ে গুরুত্বপূর্ণ সংকেতটাই দেখানো হয়
  let advisory=null;
  if(studentBlame>0&&teachingBlame===0&&othersFailRate!=null&&myFailRate>othersFailRate+10){
    advisory={level:"warn",text:`আপনার দেওয়া অধিকাংশ কারণ (${studentBlame}/${reasons.length}) শিক্ষার্থীকে দায়ী করে, কিন্তু পরিসংখ্যান বলছে আপনার ক্লাসের ফলাফল একই বিষয়ে অন্যদের তুলনায় বেশি খারাপ (${myFailRate}% বনাম ${othersFailRate}%) — শুধু শিক্ষার্থীর দোষ না ধরে নিজের পাঠদান পদ্ধতিও একবার পর্যালোচনা করার পরামর্শ দেওয়া হচ্ছে।`};
  }else if(myLow.length>=3&&othersFailRate!=null&&myFailRate>othersFailRate+15){
    advisory={level:"warn",text:`এই সময়ে আপনার ক্লাসে ৫০%-এর নিচে নম্বর পাওয়ার হার ${myFailRate}%, যেখানে একই বিষয়ে অন্য শিক্ষকদের গড় হার ${othersFailRate}%। এই পার্থক্য উল্লেখযোগ্য — পাঠদান পদ্ধতি একবার পর্যালোচনা করার পরামর্শ দেওয়া হচ্ছে।`};
  }else if(repeatFailStudents>=2){
    advisory={level:"info",text:`${repeatFailStudents} জন শিক্ষার্থী বারবার (২ বা ততোধিকবার) ৫০%-এর নিচে পাচ্ছে। এদের জন্য পৃথক মনোযোগ বা রেমেডিয়াল সহায়তা বিবেচনা করা যেতে পারে।`};
  }else if(templateSuspect){
    advisory={level:"info",text:`লক্ষ্য করা যাচ্ছে একই ধরনের কারণ বারবার লেখা হয়েছে — প্রতিটি ছাত্রের জন্য যদি সত্যিই ভিন্ন পরিস্থিতি থাকে, তাহলে আরও নির্দিষ্ট করে লেখার অনুরোধ থাকবে।`};
  }else if(myLow.length>0){
    advisory={level:"ok",text:"কম নম্বরের হার স্বাভাবিক পরিসরে আছে — বর্তমানে বিশেষ কোনো পর্যবেক্ষণ প্রয়োজন নেই।"};
  }

  return{
    myFailRate,othersFailRate,myLowCount:myLow.length,myTotal:mine.length,
    repeatFailStudents,
    reasonStats:{studentBlame,teachingBlame,mixedBlame,vagueCount,total:reasons.length,missingReasonCount:myLow.length-reasons.length},
    templateSuspect,advisory,
  };
}

function BarChart({data,height=90,color=C.pu}){
  if(!data||data.length===0)return null;
  const max=Math.max(...data.map(d=>d.value),1);
  const W=Math.max(300,data.length*44);
  const bw=Math.min(34,Math.floor((W/data.length)*0.65));
  return(<div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}><svg width={W} height={height+36} style={{display:"block"}}>{data.map((d,i)=>{const x=i*(W/data.length)+(W/data.length-bw)/2;const bh=max>0?Math.round((d.value/max)*(height-10)):0;const y=height-bh;const barC=d.color||color;return(<g key={i}><rect x={x} y={y} width={bw} height={bh} rx={4} fill={barC} opacity={0.85}/><text x={x+bw/2} y={y-4} textAnchor="middle" fontSize={10} fill={barC} fontWeight={700}>{d.value||""}</text><text x={x+bw/2} y={height+14} textAnchor="middle" fontSize={9} fill={C.mu}>{d.label}</text></g>);})}<line x1={0} y1={height} x2={W} y2={height} stroke={C.bd} strokeWidth={1}/></svg></div>);
}

function LineChart({points,color=C.pu,height=70,showAvg=true}){
  if(!points||points.length<2)return(<div style={{textAlign:"center",color:C.mu,fontSize:12,padding:16}}>কমপক্ষে ২টি পরীক্ষার ফলাফল দরকার</div>);
  const W=280;const vals=points.map(p=>p.v);const mn=Math.min(...vals)-5,mx=Math.max(...vals)+5;const range=mx-mn||1;
  const px=(i)=>Math.round((i/(points.length-1))*(W-30))+15;
  const py=(v)=>Math.round(height-((v-mn)/range)*(height-16))-8;
  const pathD=points.map((p,i)=>`${i===0?"M":"L"}${px(i)},${py(p.v)}`).join(" ");
  const areaD=`${pathD} L${px(points.length-1)},${height} L${px(0)},${height} Z`;
  const trend=vals[vals.length-1]-vals[0];const tColor=trend>=0?C.gr:C.re;
  const avgV=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  const avgY=py(avgV);
  const gid="lcGrad_"+color.replace(/[^a-zA-Z0-9]/g,"")+"_"+height+"_"+points.length;
  return(<div>
    <svg width="100%" viewBox={`0 0 ${W} ${height+20}`} style={{display:"block"}}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.30"/>

      {showAvg&&<line x1={0} y1={avgY} x2={W} y2={avgY} stroke={color} strokeWidth={1} strokeDasharray="4,3" opacity={0.4}/>}
      {showAvg&&<text x={W} y={avgY-3} textAnchor="end" fontSize={7.5} fontWeight={700} fill={color} opacity={0.7}>গড় {avgV}</text>}
      {/* গ্রেডিয়েন্ট এরিয়া ফিল */}
      <path d={areaD} fill={`url(#${gid})`} stroke="none"/>
      <path d={pathD} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
      {points.map((p,i)=>(<g key={i}><circle cx={px(i)} cy={py(p.v)} r={4} fill={color}/><text x={px(i)} y={py(p.v)-8} textAnchor="middle" fontSize={10} fill={color} fontWeight={700}>{p.v}</text><text x={px(i)} y={height+14} textAnchor="middle" fontSize={8} fill={C.mu}>{p.label}</text></g>))}
      <line x1={0} y1={height} x2={W} y2={height} stroke={C.bd} strokeWidth={0.8}/>
    </svg>
    <div style={{fontSize:12,color:tColor,fontWeight:700,textAlign:"right",marginTop:2}}>{trend>=0?"▲ উন্নতি":"▼ হ্রাস"}: {Math.abs(trend)} নম্বর</div>
  </div>);
}

      {/* তারিখ নির্বাচন */}
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:12,color:C.mu,flexShrink:0}}>তারিখ:</div>
        <input type="date" value={attDate} onChange={e=>setAttDate(e.target.value)}
          style={{flex:1,padding:"7px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13,outline:"none"}}/>
      </div>

      {/* সবাইকে একসাথে মার্ক */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        <div style={{fontSize:11,color:C.mu,alignSelf:"center",marginRight:2}}>সবাইকে:</div>
        {Object.entries(statusConfig).map(([st,cfg])=>(
          <button key={st} onClick={()=>markAll(st)}
            style={{padding:"5px 10px",borderRadius:7,border:`1px solid ${cfg.color}`,background:cfg.color+"18",color:cfg.color,cursor:"pointer",fontSize:11,fontWeight:700}}>
            {cfg.icon} সব {cfg.label}
          </button>
        ))}
      </div>

      {/* প্রতিটি শিক্ষক */}
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
        {attTeachers.map((t,i)=>{
          const st=statuses[t]||"present";
          const cfg=statusConfig[st];
          return(
            <div key={t} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:9,background:cfg.color+"12",border:`1px solid ${cfg.color}30`,transition:"background 0.2s"}}>
              {/* ক্রমিক ও নাম */}
              <div style={{minWidth:22,fontSize:11,color:C.mu,textAlign:"right"}}>{i+1}.</div>
              <div style={{flex:1,fontSize:13,fontWeight:600,color:C.tx}}>{t}</div>
              {/* তিনটি অপশন */}
              <div style={{display:"flex",gap:4,flexShrink:0}}>
                {Object.entries(statusConfig).map(([s,c])=>(
                  <button key={s} onClick={()=>setStatus(t,s)}
                    title={c.label}
                    style={{
                      width:34,height:30,borderRadius:7,border:`1.5px solid ${st===s?c.color:C.bd}`,
                      background:st===s?c.color:"#fff",color:st===s?"#fff":C.mu,
                      cursor:"pointer",fontSize:13,fontWeight:700,
                      transition:"all 0.15s",
                      display:"flex",alignItems:"center",justifyContent:"center"
                    }}>
                    {c.icon}
                  </button>
                ))}
              </div>
              {/* বর্তমান স্ট্যাটাস লেবেল */}
              <div style={{minWidth:56,fontSize:10,fontWeight:700,color:cfg.color,textAlign:"right"}}>{cfg.label}</div>
            </div>
          );
        })}
      </div>

      {/* সারসংক্ষেপ */}
      <div style={{display:"flex",gap:8,marginBottom:12,justifyContent:"center"}}>
        <div style={{textAlign:"center",padding:"6px 12px",borderRadius:8,background:C.gr+"18",border:`1px solid ${C.gr}30`}}>
          <div style={{fontSize:18,fontWeight:700,color:C.gr}}>{counts.present}</div>
          <div style={{fontSize:10,color:C.gr}}>উপস্থিত</div>
        </div>
        <div style={{textAlign:"center",padding:"6px 12px",borderRadius:8,background:C.am+"18",border:`1px solid ${C.am}30`}}>
          <div style={{fontSize:18,fontWeight:700,color:C.am}}>{counts.late}</div>
          <div style={{fontSize:10,color:C.am}}>দেরিতে</div>
        </div>
        <div style={{textAlign:"center",padding:"6px 12px",borderRadius:8,background:C.re+"18",border:`1px solid ${C.re}30`}}>
          <div style={{fontSize:18,fontWeight:700,color:C.re}}>{counts.absent}</div>
          <div style={{fontSize:10,color:C.re}}>অনুপস্থিত</div>
        </div>
        <div style={{textAlign:"center",padding:"6px 12px",borderRadius:8,background:"#6366f118",border:"1px solid #6366f130"}}>
          <div style={{fontSize:18,fontWeight:700,color:"#6366f1"}}>{counts.leave}</div>
          <div style={{fontSize:10,color:"#6366f1"}}>ছুটিতে</div>
        </div>
        <div style={{textAlign:"center",padding:"6px 12px",borderRadius:8,background:C.pu+"18",border:`1px solid ${C.pu}30`}}>
          <div style={{fontSize:18,fontWeight:700,color:C.pu}}>{attTeachers.length}</div>
          <div style={{fontSize:10,color:C.pu}}>মোট</div>
        </div>
      </div>

      {/* সেভ বাটন */}
      <button onClick={saveBulk}
        style={{width:"100%",padding:"11px",borderRadius:9,border:"none",background:saved?C.gr:C.pu,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14,transition:"background 0.3s",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        {saved?"✅ সেভ হয়ে গেছে!":"💾 সকলের উপস্থিতি সেভ করুন"}
      </button>
      {saved&&<div style={{textAlign:"center",fontSize:11,color:C.gr,marginTop:6}}>✓ সকল শিক্ষকের প্রোফাইলে উপস্থিতি যোগ হয়েছে</div>}
    </Card>

    {/* সাম্প্রতিক রেকর্ড সারসংক্ষেপ */}
    <Card>
      <H3>📊 উপস্থিতির সারসংক্ষেপ (সর্বশেষ ৫ দিন)</H3>
      {attTeachers.map(t=>{
        const list=(obsData[t]||{}).attendance||[];
        if(!list.length)return null;
        const recent=[...list].sort((a,b)=>(b.isoDate||"")>(a.isoDate||"")&&-1||1).slice(-5).reverse();
        const total=list.length;
        const pres=list.filter(a=>a.status==="present").length;
        const late=list.filter(a=>a.status==="late").length;
        const pct=total?Math.round((pres+late*0.5)/total*100):0;
        return(<div key={t} style={{padding:"8px 0",borderBottom:`1px solid ${C.bd}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div style={{fontSize:12,fontWeight:600,color:C.tx}}>{t}</div>
            <span style={{fontSize:11,fontWeight:700,color:pct>=85?C.gr:pct>=70?C.am:C.re}}>{pct}%</span>
          </div>
          <div style={{display:"flex",gap:3}}>
            {recent.map((a,i)=>(
              <div key={i} title={`${a.date}: ${a.status==="present"?"উপস্থিত":a.status==="late"?"দেরিতে":a.status==="leave"?"ছুটিতে":"অনুপস্থিত"}`}
                style={{width:18,height:18,borderRadius:4,background:a.status==="present"?C.gr:a.status==="late"?C.am:a.status==="leave"?"#6366f1":C.re,flexShrink:0}}/>
            ))}
          </div>
        </div>);
      }).filter(Boolean)}
      {attTeachers.every(t=>!(obsData[t]||{}).attendance?.length)&&
        <div style={{textAlign:"center",color:C.mu,padding:16,fontSize:13}}>এখনো কোনো উপস্থিতি রেকর্ড নেই</div>}
      <div style={{textAlign:"center",color:C.mu,fontSize:10.5,marginTop:8}}>ℹ️ প্রধান শিক্ষক ও পরিচালকের উপস্থিতি এই পর্যালোচনার আওতাভুক্ত নয়</div>
    </Card>
  </div>);
}

/* ══ শিক্ষক পর্যবেক্ষণ মডিউল ══ */
function TeacherObservation({obsData,setObsData,STUDENTS}){
  STUDENTS=STUDENTS||DEFAULT_STUDENTS; // ── FIX: আগে এই prop টাই পাস হতো না, ফলে ফিডব্যাক ট্যাব খুললেই ক্র্যাশ করত ──
  const [tab,setTab]=useState("attendance");
  const [selTeacher,setSelTeacher]=useState(TEACHERS[0]);

  const obs=obsData[selTeacher]||{attendance:[],inspections:[],syllabus:[],trainings:[],feedback:[]};

  const updateObs=(field,val)=>{
    setObsData(prev=>{
      const updated={...(prev[selTeacher]||{}), [field]:val};
      fbSaveObsData(selTeacher,updated); // granular Firebase write
      return{...prev,[selTeacher]:updated};
    });
  };

  /* সিলেবাস কভারেজ */
  const sylList=obs.syllabus||[];
  const coveredTopics=sylList.filter(s=>s.covered).length;
  const totalTopics=sylList.length;
  const sylPct=totalTopics?Math.round(coveredTopics/totalTopics*100):0;

  /* ফিডব্যাক গড় */
  const fbList=obs.feedback||[];
  const avgFb=fbList.length?Math.round(fbList.reduce((a,b)=>a+(b.rating||0),0)/fbList.length*10)/10:0;

  /* পরিদর্শন গড় */
  const insList=obs.inspections||[];
  const avgIns=insList.length?Math.round(insList.reduce((a,b)=>a+(b.score||0),0)/insList.length*10)/10:0;

  /* উপস্থিতি হিসাব (নির্বাচিত শিক্ষকের) */
  const attList=obs.attendance||[];
  const presentDays=attList.filter(a=>a.status==="present").length;
  const lateCount=attList.filter(a=>a.status==="late").length;
  const totalDays=attList.length;
  const attPct=totalDays?Math.round((presentDays+lateCount*0.5)/totalDays*100):0;

  const addInspection=(score,remarks)=>{
    const today=new Date().toLocaleDateString("bn-BD");
    updateObs("inspections",[...insList,{date:today,score:parseInt(score)||0,remarks}]);
  };

  const toggleSyllabus=(idx)=>{
    const updated=sylList.map((s,i)=>i===idx?{...s,covered:!s.covered}:s);
    updateObs("syllabus",updated);
  };

  const addSyllabusTopic=(topic,subject)=>{
    updateObs("syllabus",[...sylList,{topic,subject,covered:false}]);
  };

  const addTraining=(name,date,hours)=>{
    updateObs("trainings",[...(obs.trainings||[]),{name,date,hours:parseInt(hours)||0}]);
  };

  const addFeedback=(cls,rating,comment)=>{
    updateObs("feedback",[...fbList,{cls,rating:parseInt(rating)||3,comment,date:new Date().toLocaleDateString("bn-BD")}]);
  };

  return(<div>
    <H2>👁 শিক্ষক পর্যবেক্ষণ</H2>

    {/* ট্যাব বার */}
    <div style={{display:"flex",gap:4,overflowX:"auto",marginBottom:10,WebkitOverflowScrolling:"touch"}}>
      {[
        {id:"attendance",label:"📅 উপস্থিতি"},
        {id:"inspection",label:"🔍 পরিদর্শন"},
        {id:"syllabus",label:"📖 সিলেবাস"},
        {id:"training",label:"🎓 প্রশিক্ষণ"},
        {id:"feedback",label:"⭐ ফিডব্যাক"},
      ].map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"6px 10px",borderRadius:14,border:`1px solid ${tab===t.id?C.pu:C.bd}`,background:tab===t.id?C.puL:"transparent",color:tab===t.id?C.pu:C.mu,cursor:"pointer",fontSize:11,fontWeight:tab===t.id?700:400,whiteSpace:"nowrap",flexShrink:0}}>{t.label}</button>))}
    </div>

    {/* ── উপস্থিতি ট্যাব — বাল্ক সিস্টেম ── */}
    {tab==="attendance"&&(<BulkAttendance obsData={obsData} setObsData={setObsData}/>)}

    {/* শিক্ষক নির্বাচন (উপস্থিতি ছাড়া অন্য ট্যাবের জন্য) */}
    {tab!=="attendance"&&(<Card style={{padding:"10px 12px",marginBottom:10}}>
      <div style={{fontSize:12,color:C.mu,marginBottom:5}}>শিক্ষক নির্বাচন</div>
      <select value={selTeacher} onChange={e=>setSelTeacher(e.target.value)} style={{width:"100%"}}>
        {TEACHERS.map(t=><option key={t} value={t}>{t}</option>)}
      </select>
    </Card>)}

    {/* নির্বাচিত শিক্ষকের সারসংক্ষেপ (উপস্থিতি ছাড়া) */}
    {tab!=="attendance"&&(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
      <Stat label="উপস্থিতি হার" value={totalDays?`${attPct}%`:"—"} color={attPct>=85?C.gr:attPct>=70?C.am:C.re} sub={`${totalDays}টি কার্যদিবস`}/>
      <Stat label="সিলেবাস কভার" value={totalTopics?`${sylPct}%`:"—"} color={sylPct>=75?C.gr:sylPct>=50?C.am:C.re} sub={`${coveredTopics}/${totalTopics} টপিক`}/>
      <Stat label="পরিদর্শন স্কোর" value={insList.length?`${avgIns}/10`:"—"} color={avgIns>=7?C.gr:avgIns>=5?C.am:C.re} sub={`${insList.length}টি পরিদর্শন`}/>
      <Stat label="ছাত্র ফিডব্যাক" value={fbList.length?`${avgFb}/5`:"—"} color={avgFb>=4?C.gr:avgFb>=3?C.am:C.re} sub={`${fbList.length}টি রেটিং`}/>
    </div>)}

    {/* ── পরিদর্শন ট্যাব ── */}
    {tab==="inspection"&&(<div>
      <Card>
        <H3>🔍 ক্লাস পরিদর্শন রিপোর্ট</H3>
        <InspectionForm onAdd={addInspection}/>
        {insList.length>0&&(<div style={{marginTop:12}}>
          {[...insList].reverse().map((ins,i)=>(
            <div key={i} style={{padding:"10px",background:C.bg,borderRadius:8,marginBottom:8,border:`1px solid ${C.bd}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:12,color:C.mu}}>{ins.date}</span>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{fontSize:16,fontWeight:700,color:ins.score>=7?C.gr:ins.score>=5?C.am:C.re}}>{ins.score}/10</div>
                  {["⭐","⭐","⭐","⭐","⭐"].slice(0,Math.round(ins.score/2)).join("")}
                </div>
              </div>
              {ins.remarks&&<div style={{fontSize:12,color:C.tx,fontStyle:"italic"}}>"{ins.remarks}"</div>}
            </div>
          ))}
        </div>)}
        {insList.length===0&&<div style={{textAlign:"center",color:C.mu,padding:16,fontSize:13}}>এখনো কোনো পরিদর্শন রেকর্ড নেই</div>}
      </Card>
    </div>)}

    {/* ── সিলেবাস ট্যাব ── */}
    {tab==="syllabus"&&(<div>
      <Card>
        <H3>📖 সিলেবাস কভারেজ ট্র্যাকার</H3>
        <div style={{background:C.puL,borderRadius:8,padding:"8px 10px",marginBottom:10,fontSize:12,color:C.pu}}>
          💡 বাস্তবে কোন কোন টপিক পড়ানো হয়েছে তা টিক দিন — শুধু প্ল্যান জমা নয়
        </div>
        <SyllabusForm onAdd={addSyllabusTopic}/>
        {sylList.length>0&&(<div style={{marginTop:12}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:8}}>
            <span style={{color:C.mu}}>মোট টপিক: {totalTopics}</span>
            <span style={{fontWeight:700,color:sylPct>=75?C.gr:sylPct>=50?C.am:C.re}}>কভার: {sylPct}% ({coveredTopics}/{totalTopics})</span>
          </div>
          {["বাংলা","English","গণিত","বিজ্ঞান","সমাজ","ধর্ম","ICT"].map(sub=>{
            const subTopics=sylList.filter(s=>s.subject===sub);
            if(!subTopics.length)return null;
            const cov=subTopics.filter(s=>s.covered).length;
            return(<div key={sub} style={{marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:700,color:C.pu,marginBottom:4}}>{sub} ({cov}/{subTopics.length})</div>
              {subTopics.map((s,idx)=>{
                const realIdx=sylList.findIndex(x=>x===s);
                return(<div key={idx} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 6px",borderRadius:6,background:s.covered?C.grL:"#f8f7ff",marginBottom:3,cursor:"pointer"}} onClick={()=>toggleSyllabus(realIdx)}>
                  <span style={{fontSize:18,lineHeight:1}}>{s.covered?"✅":"⬜"}</span>
                  <span style={{fontSize:12,textDecoration:s.covered?"line-through":"none",color:s.covered?C.mu:C.tx}}>{s.topic}</span>
                </div>);
              })}
            </div>);
          })}
        </div>)}
        {sylList.length===0&&<div style={{textAlign:"center",color:C.mu,padding:16,fontSize:13}}>টপিক যোগ করুন</div>}
      </Card>
    </div>)}

    {/* ── প্রশিক্ষণ ট্যাব ── */}
    {tab==="training"&&(<div>
      <Card>
        <H3>🎓 পেশাগত প্রশিক্ষণ / ওয়ার্কশপ</H3>
        <TrainingForm onAdd={addTraining}/>
        {(obs.trainings||[]).length>0&&(<div style={{marginTop:12}}>
          <div style={{fontSize:12,color:C.mu,marginBottom:6}}>
            মোট ওয়ার্কশপ: {(obs.trainings||[]).length}টি •
            মোট ঘণ্টা: {(obs.trainings||[]).reduce((a,b)=>a+(b.hours||0),0)} ঘণ্টা
          </div>
          {[...(obs.trainings||[])].reverse().map((tr,i)=>(
            <div key={i} style={{padding:"9px 10px",background:C.teL,borderRadius:8,marginBottom:6,border:`1px solid ${C.te}20`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontWeight:600,fontSize:13,color:C.te}}>{tr.name}</div>
                {badge(C.te,`${tr.hours} ঘণ্টা`)}
              </div>
              <div style={{fontSize:11,color:C.mu,marginTop:3}}>{tr.date}</div>
            </div>
          ))}
        </div>)}
        {(obs.trainings||[]).length===0&&<div style={{textAlign:"center",color:C.mu,padding:16,fontSize:13}}>কোনো প্রশিক্ষণ রেকর্ড নেই</div>}
      </Card>
    </div>)}

    {/* ── ফিডব্যাক ট্যাব ── */}
    {tab==="feedback"&&(<div>
      <Card>
        <H3>⭐ ছাত্র ফিডব্যাক রেটিং</H3>
        <div style={{background:C.amL,borderRadius:8,padding:"8px 10px",marginBottom:10,fontSize:12,color:C.am}}>
          💡 বয়স অনুযায়ী সহজ রেটিং: ১ = খুব খারাপ, ২ = খারাপ, ৩ = মাঝামাঝি, ৪ = ভালো, ৫ = চমৎকার
        </div>
        <FeedbackForm onAdd={addFeedback} STUDENTS={STUDENTS}/>
        {fbList.length>0&&(<div style={{marginTop:12}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10,padding:"8px 10px",background:C.bg,borderRadius:8}}>
            <div style={{fontSize:28,fontWeight:700,color:avgFb>=4?C.gr:avgFb>=3?C.am:C.re}}>{avgFb}</div>
            <div>
              <div style={{fontSize:16}}>{["","😢","😞","😐","😊","🤩"][Math.round(avgFb)]}</div>
              <div style={{fontSize:11,color:C.mu}}>গড় রেটিং ({fbList.length}টি মতামত)</div>
            </div>
          </div>
          {/* রেটিং বিতরণ */}
          {[5,4,3,2,1].map(star=>{
            const cnt=fbList.filter(f=>f.rating===star).length;
            const pct=fbList.length?Math.round(cnt/fbList.length*100):0;
            return(<div key={star} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <span style={{fontSize:11,minWidth:16,color:C.mu,textAlign:"right"}}>{star}⭐</span>
              <div style={{flex:1,height:8,background:"#eee",borderRadius:4}}>
                <div style={{width:`${pct}%`,height:"100%",background:star>=4?C.gr:star===3?C.am:C.re,borderRadius:4,transition:"width 0.4s"}}/>
              </div>
              <span style={{fontSize:11,color:C.mu,minWidth:24}}>{cnt}</span>
            </div>);
          })}
          {/* সাম্প্রতিক মতামত */}
          <div style={{marginTop:10}}>
            {[...fbList].reverse().slice(0,5).map((fb,i)=>(
              <div key={i} style={{padding:"7px 9px",borderRadius:7,background:C.bg,marginBottom:5,border:`1px solid ${C.bd}`}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2}}>
                  <span style={{color:C.mu}}>{fb.cls} শ্রেণি • {fb.date}</span>

/* ══ পিয়ার ক্লাস পর্যবেক্ষণ (Danielson Framework) ══ */
const DANIELSON_DOMAINS=[
  {key:"A",label:"Domain A — পরিকল্পনা ও প্রস্তুতি",color:C.pu,items:[

  ]},

  ]},

  ]},
];
const DANIELSON_RATING_LABELS=["","Unsatisfactory","Basic","Proficient","Distinguished"];
const DANIELSON_RATING_COLORS=["",C.re,C.am,C.te,C.gr];

function calcPeerObsTotal(scores){
  const vals=[];
  DANIELSON_DOMAINS.forEach(d=>d.items.forEach((_,i)=>{
    const v=scores?.[d.key]?.[i];
    if(v) vals.push(v);
  }));
  if(!vals.length)return 0;
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length; // ১-৪ স্কেল
  return Math.round((avg-1)/3*100); // ১-৪ → ০-১০০
}

function DanielsonForm({observerTeacher,observedTeacher,date,cls,subject,onSave,onCancel,isAdminObs}){
  const initScores={};
  DANIELSON_DOMAINS.forEach(d=>{initScores[d.key]=d.items.map(()=>3);});
  const [scores,setScores]=useState(initScores);
  const [evidence,setEvidence]=useState({}); // "domKey_idx" -> text, শুধু চরম রেটিং (১ বা ৪) হলে বাধ্যতামূলক
  const [strengths,setStrengths]=useState("");
  const [improvements,setImprovements]=useState("");
  const [observerTakeaway,setObserverTakeaway]=useState("");

  // ── FIX: ন্যূনতম সময় গেট ──
  // ফর্ম খোলার সাথে সাথেই জমা দেওয়া যায় না — বাস্তবে ক্লাস পর্যবেক্ষণ না করেও নম্বর বসিয়ে
  // দেওয়া ঠেকাতে, ফর্মটা একটা যুক্তিসঙ্গত সময় (১৫ মিনিট) খোলা থাকতে হবে জমা দেওয়ার আগে।
  const MIN_MINUTES=15;
  const [startedAt]=useState(Date.now());
  const [nowTick,setNowTick]=useState(Date.now());
  useEffect(()=>{
    const iv=setInterval(()=>setNowTick(Date.now()),1000);
    return ()=>clearInterval(iv);
  },[]);
  const elapsedMs=nowTick-startedAt;
  const timeOk=elapsedMs>=MIN_MINUTES*60000;
  const remainingSec=Math.max(0,Math.ceil((MIN_MINUTES*60000-elapsedMs)/1000));
  const remMin=Math.floor(remainingSec/60), remSec=remainingSec%60;

  const setRating=(domKey,idx,val)=>{
    setScores(prev=>({...prev,[domKey]:prev[domKey].map((v,i)=>i===idx?val:v)}));
  };
  const setEv=(domKey,idx,text)=>setEvidence(prev=>({...prev,[`${domKey}_${idx}`]:text}));

  const totalScore=calcPeerObsTotal(scores);
  const totalColor=totalScore>=85?C.gr:totalScore>=65?C.te:totalScore>=45?C.am:C.re;

  // ── FIX: চরম রেটিং (১=Unsatisfactory বা ৪=Distinguished) দিলে সেই নির্দিষ্ট আইটেমের
  // জন্য একটা concrete প্রমাণ লেখা বাধ্যতামূলক — নাম্বার শুধু ক্লিক করে দেওয়া যাবে না ──
  const missingEvidence=[];
  DANIELSON_DOMAINS.forEach(d=>d.items.forEach((item,idx)=>{
    const v=scores[d.key][idx];
    if((v===1||v===4)&&!(evidence[`${d.key}_${idx}`]||"").trim())missingEvidence.push({dom:d.label,item});
  }));
  const strengthsOk=strengths.trim().length>=20;
  const improvementsOk=improvements.trim().length>=20;
  const allOk=timeOk&&missingEvidence.length===0&&strengthsOk&&improvementsOk;

  return(<Card>
    <H3>📝 পর্যবেক্ষণ ফর্ম পূরণ করুন</H3>
    <div style={{background:C.bg,borderRadius:8,padding:10,marginBottom:12,fontSize:12}}>
      <div><b>পর্যবেক্ষক:</b> {observerTeacher}</div>
      <div><b>পর্যবেক্ষিত শিক্ষক:</b> {observedTeacher}</div>
      <div><b>শ্রেণি/বিষয়:</b> {cls} • {subject}</div>
      <div><b>তারিখ:</b> {date}</div>
    </div>

    <div style={{background:timeOk?C.grL:C.amL,border:`1px solid ${timeOk?C.gr:C.am}40`,borderRadius:8,padding:"8px 10px",marginBottom:12,fontSize:12,color:timeOk?C.gr:C.am,fontWeight:700}}>
      {timeOk?"✅ ন্যূনতম পর্যবেক্ষণ সময় পূর্ণ হয়েছে":`⏳ পুরো ক্লাস মনোযোগ দিয়ে পর্যবেক্ষণ করুন — জমা দেওয়া যাবে ${remMin} মিনিট ${remSec} সেকেন্ড পরে`}
    </div>

    {DANIELSON_DOMAINS.map(dom=>(
      <div key={dom.key} style={{marginBottom:14}}>
        <H3 style={{color:dom.color}}>{dom.label}</H3>
        {dom.items.map((item,idx)=>{
          const v=scores[dom.key][idx];
          const needsEvidence=v===1||v===4;
          const evKey=`${dom.key}_${idx}`;
          return(
          <div key={idx} style={{marginBottom:8,padding:"8px 10px",background:C.bg,borderRadius:8}}>
            <div style={{fontSize:12,marginBottom:6}}>{idx+1}. {item}</div>
            <div style={{display:"flex",gap:4}}>
              {[1,2,3,4].map(val=>(
                <button key={val} onClick={()=>setRating(dom.key,idx,val)} style={{flex:1,padding:"6px 2px",borderRadius:6,border:`1px solid ${v===val?DANIELSON_RATING_COLORS[val]:C.bd}`,background:v===val?DANIELSON_RATING_COLORS[val]+"22":"#fff",color:v===val?DANIELSON_RATING_COLORS[val]:C.mu,cursor:"pointer",fontSize:10,fontWeight:v===val?700:400}}>
                  {val}<br/>{DANIELSON_RATING_LABELS[val]}
                </button>
              ))}
            </div>
            {needsEvidence&&(
              <div style={{marginTop:6}}>
                <div style={{fontSize:10,color:C.re,fontWeight:700,marginBottom:3}}>
                  ✍️ এই রেটিংয়ের জন্য নির্দিষ্ট প্রমাণ লিখুন (কী দেখেছেন/শুনেছেন) — বাধ্যতামূলক
                </div>
                <input type="text" value={evidence[evKey]||""} onChange={e=>setEv(dom.key,idx,e.target.value)} placeholder="নির্দিষ্ট উদাহরণ লিখুন..." style={{width:"100%",padding:"6px 8px",borderRadius:6,border:`1px solid ${(evidence[evKey]||"").trim()?C.bd:C.re}`,fontSize:11,boxSizing:"border-box"}}/>
              </div>
            )}
          </div>);
        })}
      </div>
    ))}

    <H3>Strengths (শক্তিশালী দিক)</H3>
    <div style={{fontSize:10,color:C.mu,marginBottom:4}}>নির্দিষ্ট উদাহরণ সহ লিখুন — কমপক্ষে ২০ অক্ষর (খালি/এক শব্দের মন্তব্য গ্রহণযোগ্য না)</div>
    <textarea value={strengths} onChange={e=>setStrengths(e.target.value)} placeholder="শিক্ষকের ভালো দিকগুলো নির্দিষ্ট উদাহরণসহ লিখুন..." style={{width:"100%",minHeight:60,marginBottom:4,border:`1px solid ${strengthsOk?C.bd:C.re}`,boxSizing:"border-box"}}/>
    {!strengthsOk&&<div style={{fontSize:10,color:C.re,marginBottom:8}}>আরও {20-strengths.trim().length} অক্ষর লিখুন</div>}

    <H3>Areas for Improvement (উন্নতির ক্ষেত্র)</H3>
    <div style={{fontSize:10,color:C.mu,marginBottom:4}}>গঠনমূলক ও নির্দিষ্ট পরামর্শ — কমপক্ষে ২০ অক্ষর</div>
    <textarea value={improvements} onChange={e=>setImprovements(e.target.value)} placeholder="উন্নতির জন্য নির্দিষ্ট পরামর্শ লিখুন..." style={{width:"100%",minHeight:60,marginBottom:4,border:`1px solid ${improvementsOk?C.bd:C.re}`,boxSizing:"border-box"}}/>
    {!improvementsOk&&<div style={{fontSize:10,color:C.re,marginBottom:8}}>আরও {20-improvements.trim().length} অক্ষর লিখুন</div>}

    <H3>🎓 পর্যবেক্ষক হিসেবে আমি কী শিখলাম (ঐচ্ছিক)</H3>
    <div style={{fontSize:10,color:C.mu,marginBottom:4}}>ক্লাস পর্যবেক্ষণ শুধু মূল্যায়নের জন্য না — আপনার নিজের শেখারও একটা সুযোগ। অন্য শিক্ষকের কোনো ভালো কৌশল দেখলে লিখুন, নিজের ক্লাসেও প্রয়োগ করতে পারবেন।</div>
    <textarea value={observerTakeaway} onChange={e=>setObserverTakeaway(e.target.value)} placeholder="যা শিখলাম বা নিজের ক্লাসে প্রয়োগ করতে চাই..." style={{width:"100%",minHeight:50,marginBottom:10,boxSizing:"border-box"}}/>

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:totalColor+"15",border:`1px solid ${totalColor}30`,borderRadius:8,marginBottom:12}}>
      <span style={{fontSize:12,fontWeight:700}}>মোট স্কোর (Overall Score)</span>
      <span style={{fontSize:22,fontWeight:700,color:totalColor}}>{totalScore}/100</span>
    </div>

    {!allOk&&(
      <div style={{fontSize:11,color:C.re,marginBottom:10}}>
        জমা দেওয়ার আগে ঠিক করুন: {!timeOk&&"ন্যূনতম সময় এখনো পূর্ণ হয়নি। "}{missingEvidence.length>0&&`${missingEvidence.length}টি চরম রেটিংয়ের প্রমাণ বাকি। `}{!strengthsOk&&"Strengths সংক্ষিপ্ত। "}{!improvementsOk&&"Areas for Improvement সংক্ষিপ্ত।"}
      </div>
    )}

    <div style={{display:"flex",gap:8}}>
      <button onClick={onCancel} style={{flex:1,padding:"10px",borderRadius:8,border:`1px solid ${C.bd}`,background:"#fff",color:C.mu,cursor:"pointer",fontWeight:700,fontSize:13}}>বাতিল</button>
      <button onClick={()=>allOk&&onSave({scores,evidence,strengths,improvements,observerTakeaway,totalScore})} disabled={!allOk} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:allOk?C.pu:"#ccc",color:"#fff",cursor:allOk?"pointer":"not-allowed",fontWeight:700,fontSize:13}}>✓ পর্যবেক্ষণ সংরক্ষণ করুন</button>
    </div>
  </Card>);
}

function PeerObservationReportCard({rec,onDelete,currentUser,onReflect}){
  const tColor=rec.totalScore>=85?C.gr:rec.totalScore>=65?C.te:rec.totalScore>=45?C.am:C.re;
  const [reflectDraft,setReflectDraft]=useState(rec.observedReflection||"");
  const [editingReflect,setEditingReflect]=useState(false);
  const canReflect=currentUser&&currentUser===rec.observedTeacher&&onReflect;
  return(<Card style={{padding:"10px 12px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div>
        <div style={{fontWeight:700,fontSize:13}}>{rec.observedTeacher}</div>
        <div style={{fontSize:11,color:C.mu}}>পর্যবেক্ষক: {rec.observerTeacher}{rec.isAdminObs?" (অ্যাডমিন)":""}</div>
        <div style={{fontSize:11,color:C.mu}}>{rec.cls} শ্রেণি • {rec.subject} • {rec.date}</div>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:20,fontWeight:700,color:tColor}}>{rec.totalScore}</div>
        {onDelete&&<button onClick={()=>onDelete(rec.id)} style={{marginTop:4,border:"none",background:"transparent",color:C.re,cursor:"pointer",fontSize:11}}>✕ মুছুন</button>}
      </div>
    </div>
    {(rec.strengths||rec.improvements)&&(<div style={{marginTop:8,fontSize:11}}>
      {rec.strengths&&<div style={{marginBottom:4}}><b style={{color:C.gr}}>শক্তিশালী দিক:</b> {rec.strengths}</div>}
      {rec.improvements&&<div><b style={{color:C.am}}>উন্নতির ক্ষেত্র:</b> {rec.improvements}</div>}
    </div>)}
    {rec.observerTakeaway&&(<div style={{marginTop:6,fontSize:11,background:C.puL,borderRadius:6,padding:"6px 8px"}}>
      <b style={{color:C.pu}}>🎓 পর্যবেক্ষক যা শিখলেন:</b> {rec.observerTakeaway}
    </div>)}
    {/* ── মিউচুয়াল বেনিফিট: পর্যবেক্ষিত শিক্ষক নিজে একটা প্রতিক্রিয়া/প্রতিফলন যোগ করতে পারবেন ── */}
    {rec.observedReflection&&!editingReflect&&(<div style={{marginTop:6,fontSize:11,background:C.teL,borderRadius:6,padding:"6px 8px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div><b style={{color:C.te}}>💬 আমার প্রতিফলন:</b> {rec.observedReflection}</div>
        {canReflect&&<button onClick={()=>setEditingReflect(true)} style={{border:"none",background:"transparent",color:C.te,cursor:"pointer",fontSize:10,flexShrink:0,marginLeft:6}}>✎</button>}
      </div>
    </div>)}
    {canReflect&&(!rec.observedReflection||editingReflect)&&(
      <div style={{marginTop:8}}>
        <div style={{fontSize:10,color:C.mu,marginBottom:4}}>💬 এই পর্যবেক্ষণ নিয়ে আপনার প্রতিক্রিয়া/প্রতিফলন লিখুন (ঐচ্ছিক) — এটা একটা দ্বিমুখী কথোপকথন, শুধু একতরফা রায় না</div>
        <textarea value={reflectDraft} onChange={e=>setReflectDraft(e.target.value)} placeholder="আপনার মতামত বা পরিকল্পনা লিখুন..." style={{width:"100%",minHeight:44,fontSize:11,boxSizing:"border-box"}}/>
        <button onClick={()=>{onReflect(rec.id,reflectDraft.trim());setEditingReflect(false);}} style={{marginTop:4,padding:"5px 10px",borderRadius:6,border:"none",background:C.te,color:"#fff",cursor:"pointer",fontSize:11,fontWeight:700}}>✓ সংরক্ষণ করুন</button>
      </div>
    )}
  </Card>);
}

function PeerObservation({obsData,setObsData,currentUser,isAdmin,STUDENTS}){
  STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const peerObservations=obsData.peerObservations||[];
  const [mode,setMode]=useState("new"); // new | history
  const eligibleTeachers=TEACHERS.filter(t=>(isAdmin||t!==currentUser)&&!ATT_REVIEW_EXCLUDED.includes(t));

  // ── FIX: সম্পর্ক-ভিত্তিক পক্ষপাত কমাতে — যাকে সবচেয়ে বেশিদিন কেউ পর্যবেক্ষণ করেননি, তাকেই
  // ডিফল্টভাবে প্রস্তাব করা হয় (সবসময় "প্রিয়" সহকর্মীকে বেছে নেওয়ার প্রবণতা কমাতে)। শিক্ষক
  // চাইলে বদলাতে পারবেন, কিন্তু ডিফল্ট + তালিকার ক্রম স্কুলজুড়ে ন্যায্য কভারেজের দিকে ঠেলে দেয়।
  const daysSinceObserved=(t)=>{
    const got=peerObservations.filter(o=>o.observedTeacher===t);
    if(!got.length)return Infinity; // কখনো পর্যবেক্ষণ হয়নি — সর্বোচ্চ অগ্রাধিকার
    const latest=Math.max(...got.map(o=>o.dateISO?new Date(o.dateISO).getTime():0));
    return Math.floor((Date.now()-latest)/86400000);
  };
  const sortedByStaleness=[...eligibleTeachers].sort((a,b)=>daysSinceObserved(b)-daysSinceObserved(a));

  const [observedTeacher,setObservedTeacher]=useState(sortedByStaleness[0]||eligibleTeachers[0]||TEACHERS[0]);
  const [cls,setCls]=useState(Object.keys(STUDENTS)[0]);
  const [subject,setSubject]=useState(SUBJECTS_BY_CLASS[Object.keys(STUDENTS)[0]]?.[0]||SUBJECTS[0]);
  const [showForm,setShowForm]=useState(false);

  const today=new Date().toLocaleDateString("bn-BD");
  const todayISO=new Date().toISOString().slice(0,10);

  const myPastObsOfSelected=peerObservations.filter(o=>o.observerTeacher===currentUser&&o.observedTeacher===observedTeacher).length;
  const selectedDaysStale=daysSinceObserved(observedTeacher);

  const addObservation=({scores,evidence,strengths,improvements,observerTakeaway,totalScore})=>{
    const rec={
      id:Date.now().toString()+"_pobs",
      observerTeacher:currentUser,
      observedTeacher,
      date:today,
      dateISO:todayISO,
      cls,
      subject,
      scores,
      evidence,
      strengths,
      improvements,
      observerTakeaway,
      observedReflection:"",
      totalScore,
      isAdminObs:isAdmin,
    };
    fbSavePeerObservation(rec); // granular Firebase write
    setObsData(prev=>({...prev,peerObservations:[...(prev.peerObservations||[]),rec]}));
    setShowForm(false);
  };

  const deleteObservation=(id)=>{
    if(!window.confirm("এই পর্যবেক্ষণ রেকর্ডটি মুছে ফেলতে চান?"))return;
    fbDeletePeerObservation(id); // granular Firebase delete
    setObsData(prev=>({...prev,peerObservations:(prev.peerObservations||[]).filter(o=>o.id!==id)}));
  };

  // ── মিউচুয়াল বেনিফিট: পর্যবেক্ষিত শিক্ষক নিজের প্রতিফলন যোগ করলে সংরক্ষণ ──
  const saveReflection=(id,text)=>{
    const updated=peerObservations.map(o=>o.id===id?{...o,observedReflection:text}:o);
    const rec=updated.find(o=>o.id===id);
    fbSavePeerObservation(rec); // granular Firebase write (আপডেটেড রেকর্ড)
    setObsData(prev=>({...prev,peerObservations:updated}));
  };

  const myObservations=peerObservations.filter(o=>o.observerTeacher===currentUser);
  const myReceivedObservations=peerObservations.filter(o=>o.observedTeacher===currentUser);

  // ── অ্যাডমিন রিপোর্ট: গত ৭ দিনে কে পর্যবেক্ষণ করেননি ──
  const sevenDaysAgo=Date.now()-7*86400000;
  const recentObservers=new Set(peerObservations.filter(o=>{
    const t=o.dateISO?new Date(o.dateISO).getTime():0;
    return t>=sevenDaysAgo;
  }).map(o=>o.observerTeacher));
  const nonObservers=TEACHERS.filter(t=>!recentObservers.has(t));

  // ── FIX: রেটার-লিনিয়েন্সি (উদারতা) স্বচ্ছতা রিপোর্ট, শুধু অ্যাডমিনদের জন্য ──
  // একজন পর্যবেক্ষক নিয়মিত অন্যদের চেয়ে অনেক বেশি নম্বর দিলে (সম্পর্কজনিত পক্ষপাতের সম্ভাব্য
  // লক্ষণ), সেটা এখানে স্পষ্টভাবে চিহ্নিত হবে — যাতে অ্যাডমিন প্যাটার্নটা দেখে যাচাই করতে পারেন।
  const allScoresGiven=peerObservations.map(o=>o.totalScore);
  const overallAvgGiven=allScoresGiven.length?allScoresGiven.reduce((a,b)=>a+b,0)/allScoresGiven.length:null;

  return(<div>
    <H2>🔭 ক্লাস পর্যবেক্ষণ (Peer Observation)</H2>

    <div style={{display:"flex",gap:4,marginBottom:10}}>
      <button onClick={()=>setMode("new")} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${mode==="new"?C.pu:C.bd}`,background:mode==="new"?C.puL:"transparent",color:mode==="new"?C.pu:C.mu,cursor:"pointer",fontWeight:700,fontSize:12}}>+ নতুন পর্যবেক্ষণ</button>
      <button onClick={()=>setMode("history")} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${mode==="history"?C.pu:C.bd}`,background:mode==="history"?C.puL:"transparent",color:mode==="history"?C.pu:C.mu,cursor:"pointer",fontWeight:700,fontSize:12}}>📋 আমার রেকর্ড</button>
    </div>

    {mode==="new"&&!showForm&&(<Card>
      <H3>{isAdmin?"🛡 অ্যাডমিন পর্যবেক্ষণ ফর্ম":"👩‍🏫 শিক্ষকের পর্যবেক্ষণ ফর্ম"}</H3>
      <div style={{fontSize:12,color:C.mu,marginBottom:10}}>
        {isAdmin?"একাডেমিক ইনচার্জ হিসেবে আপনি যেকোনো শিক্ষকের ক্লাস পর্যবেক্ষণ করতে পারবেন।":"আপনি অন্য একজন শিক্ষকের ক্লাস পর্যবেক্ষণ করবেন। যাকে সবচেয়ে বেশিদিন কেউ পর্যবেক্ষণ করেননি তাকে ডিফল্টভাবে দেখানো হচ্ছে — ন্যায্য কভারেজের স্বার্থে।"}
      </div>
      <div style={{marginBottom:6}}>
        <div style={{fontSize:11,color:C.mu,marginBottom:3}}>পর্যবেক্ষিত শিক্ষক</div>
        <select value={observedTeacher} onChange={e=>setObservedTeacher(e.target.value)} style={{width:"100%"}}>
          {sortedByStaleness.map(t=><option key={t} value={t}>{t}{daysSinceObserved(t)===Infinity?" (কখনো হয়নি)":` (${daysSinceObserved(t)} দিন আগে)`}</option>)}
        </select>
      </div>
      {myPastObsOfSelected>=2&&(
        <div style={{background:C.amL,border:`1px solid ${C.am}40`,borderRadius:8,padding:"6px 10px",marginBottom:8,fontSize:11,color:C.am,fontWeight:600}}>
          ⚠️ আপনি ইতিমধ্যে {observedTeacher}-কে {myPastObsOfSelected} বার পর্যবেক্ষণ করেছেন। বৈচিত্র্যের জন্য অন্য কাউকে বেছে নেওয়ার কথা বিবেচনা করুন।
        </div>
      )}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:C.mu,marginBottom:3}}>শ্রেণি</div>
          <select value={cls} onChange={e=>{setCls(e.target.value);setSubject(SUBJECTS_BY_CLASS[e.target.value]?.[0]||SUBJECTS[0]);}} style={{width:"100%"}}>
            {Object.keys(STUDENTS).map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:C.mu,marginBottom:3}}>বিষয়</div>
          <select value={subject} onChange={e=>setSubject(e.target.value)} style={{width:"100%"}}>
            {(SUBJECTS_BY_CLASS[cls]||SUBJECTS).map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>
      </div>
      <button onClick={()=>setShowForm(true)} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:C.pu,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>পর্যবেক্ষণ ফর্ম শুরু করুন →</button>
    </Card>)}

    {mode==="new"&&showForm&&(
      <DanielsonForm observerTeacher={currentUser} observedTeacher={observedTeacher} date={today} cls={cls} subject={subject} isAdminObs={isAdmin} onSave={addObservation} onCancel={()=>setShowForm(false)}/>
    )}

    {mode==="history"&&(<div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <Stat label="আমি করেছি" value={myObservations.length} color={C.pu}/>
        <Stat label="আমি হয়েছি" value={myReceivedObservations.length} color={C.te}/>
      </div>
      <H3>👁 আমি যেসব ক্লাস পর্যবেক্ষণ করেছি</H3>
      {myObservations.length===0&&<div style={{textAlign:"center",color:C.mu,padding:14,fontSize:12}}>এখনো কোনো পর্যবেক্ষণ করেননি</div>}
      {[...myObservations].reverse().map(rec=><PeerObservationReportCard key={rec.id} rec={rec} onDelete={deleteObservation} currentUser={currentUser}/>)}

      <H3 style={{marginTop:14}}>🎯 আমার ক্লাস যেসব পর্যবেক্ষণ হয়েছে</H3>
      {myReceivedObservations.length===0&&<div style={{textAlign:"center",color:C.mu,padding:14,fontSize:12}}>এখনো কোনো পর্যবেক্ষণ হয়নি</div>}
      {[...myReceivedObservations].reverse().map(rec=><PeerObservationReportCard key={rec.id} rec={rec} currentUser={currentUser} onReflect={saveReflection}/>)}
    </div>)}

    {isAdmin&&(<Card style={{marginTop:14}}>
      <H3>🛡 অ্যাডমিন রিপোর্ট — সাপ্তাহিক পর্যবেক্ষণ সারসংক্ষেপ</H3>
      <div style={{fontSize:11,color:C.mu,marginBottom:8}}>গত ৭ দিনে যেসব শিক্ষক কোনো ক্লাস পর্যবেক্ষণ করেননি:</div>
      {nonObservers.length===0?(
        <div style={{color:C.gr,fontWeight:700,fontSize:12}}>✓ সবাই গত ৭ দিনে অন্তত একটি পর্যবেক্ষণ করেছেন</div>
      ):(
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {nonObservers.map(t=>(<span key={t} style={{padding:"4px 9px",borderRadius:14,background:C.reL,color:C.re,fontSize:11,fontWeight:700,border:`1px solid ${C.re}40`}}>{t}</span>))}
        </div>
      )}
      <table style={{marginTop:12}}>
        <thead><tr><th>শিক্ষক</th><th>করেছেন</th><th>হয়েছেন</th><th>গড় স্কোর (প্রাপ্ত)</th><th>গড় স্কোর (প্রদত্ত)</th></tr></thead>
        <tbody>
          {TEACHERS.map(t=>{
            const did=peerObservations.filter(o=>o.observerTeacher===t);
            const got=peerObservations.filter(o=>o.observedTeacher===t);
            const avgScore=got.length?Math.round(got.reduce((a,b)=>a+b.totalScore,0)/got.length):null;
            const avgGiven=did.length?Math.round(did.reduce((a,b)=>a+b.totalScore,0)/did.length):null;
            // ── উদারতা/কঠোরতা ফ্ল্যাগ: ≥৩টা পর্যবেক্ষণ দিয়েছেন এবং স্কুল-গড় থেকে ১৫+ পয়েন্ট বেশি/কম ──
            const isLenientOutlier=avgGiven!==null&&did.length>=3&&overallAvgGiven!==null&&Math.abs(avgGiven-overallAvgGiven)>=15;
            return(<tr key={t}>
              <td style={{fontSize:12,fontWeight:600,color:recentObservers.has(t)?C.tx:C.re}}>{t}{!recentObservers.has(t)&&" ⚠"}</td>
              <td style={{color:C.pu,fontWeight:700}}>{did.length}</td>
              <td style={{color:C.te,fontWeight:700}}>{got.length}</td>
              <td style={{color:avgScore===null?C.mu:avgScore>=70?C.gr:avgScore>=50?C.am:C.re,fontWeight:700}}>{avgScore===null?"—":avgScore}</td>
              <td style={{color:avgGiven===null?C.mu:isLenientOutlier?C.re:C.tx,fontWeight:700}}>{avgGiven===null?"—":avgGiven}{isLenientOutlier&&` ⚠️(${avgGiven>overallAvgGiven?"উদার":"কঠোর"})`}</td>
            </tr>);
          })}
        </tbody>
      </table>
      <div style={{fontSize:10,color:C.mu,marginTop:8}}>💡 "গড় স্কোর (প্রদত্ত)" কলাম দেখায় একজন শিক্ষক পর্যবেক্ষক হিসেবে গড়ে কত নম্বর দেন। স্কুল-গড় থেকে বড় ব্যবধান (⚠️) সম্পর্কভিত্তিক পক্ষপাতের সম্ভাব্য লক্ষণ — নিশ্চিত প্রমাণ না, তবে যাচাই করার মতো একটা প্যাটার্ন।</div>
    </Card>)}
  </div>);
}

/* ══════════════════════════════════════════════
   ★★★ HOMEWORK REPORT — "পড়া করে আসেনি" রিপোর্ট ★★★
   সকল শিক্ষক রিপোর্ট জমা দিতে পারবেন; সকল শিক্ষক+অ্যাডমিন দেখতে পারবেন। শিক্ষার্থীর প্রোফাইলে
   ধারাবাহিক ইতিহাস হিসেবে যুক্ত হয়। রিপোর্ট জমা দিলে শিক্ষকের KPI-তে ছোট বোনাস যোগ হয়
   (calcKPI-তে homeworkReportBonus) — না দিলে কোনো পেনাল্টি নেই, শুধু বোনাস মিস হয়।
   এডমিন প্রতি ছাত্রের জন্য "ব্যবস্থা নেওয়া হয়েছে" (তাৎক্ষণিক সমাধান) বা "ব্যবস্থা চলমান"
   (নির্দিষ্ট তারিখ পর্যন্ত + কী ব্যবস্থা নেওয়া হলো — সেই তারিখে স্বয়ংক্রিয়ভাবে বাদ পড়বে,
   অথবা "শাস্তি শেষ" চেপে আগেভাগেও শেষ করা যাবে) সেট করতে পারবেন।
══════════════════════════════════════════════ */
function HomeworkReport({obsData,setObsData,currentUser,isAdmin,STUDENTS,studentDepartments={}}){
  STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const incidents=obsData.homeworkIncidents||[];
  const actions=obsData.homeworkActions||[];
  const [mode,setMode]=useState("new"); // new | list
  const [cls,setCls]=useState(Object.keys(STUDENTS)[0]);
  const [subject,setSubject]=useState((SUBJECTS_BY_CLASS[Object.keys(STUDENTS)[0]]||SUBJECTS)[0]);
  const [checked,setChecked]=useState({});
  const [ongoingFormFor,setOngoingFormFor]=useState(null); // কোন ছাত্রের জন্য "ব্যবস্থা চলমান" ফর্ম খোলা আছে
  const [ongoingUntil,setOngoingUntil]=useState("");
  const [ongoingText,setOngoingText]=useState("");
  const [expandedHistory,setExpandedHistory]=useState({}); // {name:true}

  const today=new Date().toLocaleDateString("bn-BD");
  const todayISO=new Date().toISOString().slice(0,10);

  const submit=()=>{
    const selected=Object.keys(checked).filter(n=>checked[n]);
    if(!selected.length)return;
    const rec={id:Date.now().toString()+"_hw",teacher:currentUser,cls,subject,date:today,dateISO:todayISO,students:selected};
    fbSaveHomeworkIncident(rec); // granular Firebase write
    setObsData(prev=>({...prev,homeworkIncidents:[...(prev.homeworkIncidents||[]),rec]}));
    setChecked({});
    setMode("list");
  };

  // ── প্রতিটি ছাত্রের বর্তমান অবস্থা: সর্বশেষ ঘটনা বনাম সর্বশেষ action রেকর্ড তুলনা করে ──
  const studentStatus=useMemo(()=>{
    const map={};
    incidents.forEach(inc=>{
      (inc.students||[]).forEach(name=>{
        (map[name]=map[name]||{incidents:[],latestAction:null}).incidents.push(inc);
      });
    });
    actions.forEach(act=>{
      const entry=map[act.studentName];
      if(!entry)return;
      if(!entry.latestAction||new Date(act.setAt)>new Date(entry.latestAction.setAt))entry.latestAction=act;
    });
    const now=new Date();
    Object.values(map).forEach(entry=>{
      entry.incidents.sort((a,b)=>new Date(b.dateISO)-new Date(a.dateISO));
      const latestIncidentTs=new Date(entry.incidents[0].dateISO).getTime();
      const la=entry.latestAction;
      if(!la||new Date(la.setAt).getTime()<latestIncidentTs){entry.active=true;entry.ongoing=false;return;}
      if(la.status==="resolved"){entry.active=false;entry.ongoing=false;return;}
      if(la.status==="ongoing"){
        const untilPassed=la.untilISO&&now>new Date(la.untilISO+"T23:59:59");
        entry.active=!untilPassed;entry.ongoing=!untilPassed;return;
      }
      entry.active=true;entry.ongoing=false;
    });
    return map;
  },[incidents,actions]);

  const activeNames=Object.keys(studentStatus)
    .filter(n=>studentStatus[n].active)
    .sort((a,b)=>{
      const A=studentStatus[a],B=studentStatus[b];
      if(A.ongoing!==B.ongoing)return A.ongoing?1:-1; // চলমান-গুলো পরে
      return new Date(B.incidents[0].dateISO)-new Date(A.incidents[0].dateISO);
    });

  const setAction=(name,status,extra={})=>{
    const rec={id:Date.now().toString()+"_hwa"+Math.random().toString(36).slice(2,5),studentName:name,status,setBy:currentUser,setAt:new Date().toISOString(),...extra};
    fbSaveHomeworkAction(rec); // granular Firebase write
    setObsData(prev=>({...prev,homeworkActions:[...(prev.homeworkActions||[]),rec]}));
    setOngoingFormFor(null);setOngoingUntil("");setOngoingText("");
  };

  const submitOngoing=(name)=>{
    if(!ongoingUntil||!ongoingText.trim())return;
    setAction(name,"ongoing",{untilISO:ongoingUntil,actionText:ongoingText.trim()});
  };

  return(<div>
    <H2>📕 পড়া করে আসেনি — রিপোর্ট</H2>

    <div style={{display:"flex",gap:4,marginBottom:10}}>
      <button onClick={()=>setMode("new")} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${mode==="new"?C.pu:C.bd}`,background:mode==="new"?C.puL:"transparent",color:mode==="new"?C.pu:C.mu,cursor:"pointer",fontWeight:700,fontSize:12}}>+ নতুন রিপোর্ট</button>
      <button onClick={()=>setMode("list")} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${mode==="list"?C.pu:C.bd}`,background:mode==="list"?C.puL:"transparent",color:mode==="list"?C.pu:C.mu,cursor:"pointer",fontWeight:700,fontSize:12}}>📋 তালিকা ({activeNames.length})</button>
    </div>

    {mode==="new"&&(<Card>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:C.mu,marginBottom:3}}>শ্রেণি</div>
          <select value={cls} onChange={e=>{setCls(e.target.value);setSubject((SUBJECTS_BY_CLASS[e.target.value]||SUBJECTS)[0]);setChecked({});}} style={{width:"100%"}}>
            {Object.keys(STUDENTS).map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:C.mu,marginBottom:3}}>বিষয়</div>
          <select value={subject} onChange={e=>setSubject(e.target.value)} style={{width:"100%"}}>
            {GROUP_CLASSES.includes(cls)?(<>
              <optgroup label="আবশ্যিক বিষয়">
                {(SUBJECTS_BY_CLASS[cls]||SUBJECTS).filter(s=>!groupsOfSubject(s).length).map(s=><option key={s} value={s}>{s}</option>)}
              </optgroup>
              {GROUPS.map(g=>{
                const opts=(SUBJECTS_BY_CLASS[cls]||SUBJECTS).filter(s=>GROUP_SUBJECTS[g].includes(s));
                return opts.length?(<optgroup key={g} label={`বিভাগীয় বিষয় — ${g}`}>{opts.map(s=><option key={s} value={s}>{s}</option>)}</optgroup>):null;
              })}
            </>):(SUBJECTS_BY_CLASS[cls]||SUBJECTS).map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>
      </div>
      {(()=>{const hwSubjGroups=groupsOfSubject(subject);const hwGroupActive=GROUP_CLASSES.includes(cls)&&hwSubjGroups.length>0;return hwGroupActive&&(
        <div style={{background:C.puL,border:`1px solid ${C.pu}40`,borderRadius:8,padding:"6px 10px",marginBottom:8,fontSize:11.5,color:C.pu}}>
          🎓 <strong>{subject}</strong> শুধুমাত্র <strong>{hwSubjGroups.join(" / ")}</strong> বিভাগের ছাত্রদের বিষয় — নিচে শুধু তাদেরই দেখানো হচ্ছে।
        </div>
      );})()}
      <div style={{fontSize:12,color:C.mu,marginBottom:8}}>যেসব শিক্ষার্থী পড়া করে আসেনি, তাদের নামে টিক দিন:</div>
      {(()=>{
        const hwSubjGroups=groupsOfSubject(subject);
        const roster=(GROUP_CLASSES.includes(cls)&&hwSubjGroups.length)?(STUDENTS[cls]||[]).filter(n=>hwSubjGroups.includes(studentDepartments[n])):(STUDENTS[cls]||[]);
        return roster.map(name=>(
        <div key={name} onClick={()=>setChecked(p=>({...p,[name]:!p[name]}))}
          style={{display:"flex",alignItems:"center",gap:8,padding:"7px 4px",borderBottom:`1px solid ${C.bd}`,cursor:"pointer"}}>
          <input type="checkbox" checked={!!checked[name]} onChange={()=>{}} style={{width:16,height:16}}/>
          <span style={{fontSize:13}}>{name}</span>
        </div>
        ));
      })()}
      <button onClick={submit} disabled={Object.values(checked).every(v=>!v)} style={{width:"100%",marginTop:14,padding:"10px",borderRadius:8,border:"none",background:Object.values(checked).some(v=>v)?C.pu:"#ccc",color:"#fff",fontWeight:700,fontSize:13,cursor:Object.values(checked).some(v=>v)?"pointer":"not-allowed"}}>
        ✅ রিপোর্ট জমা দিন ({Object.values(checked).filter(Boolean).length} জন নির্বাচিত)
      </button>
    </Card>)}

    {mode==="list"&&(<div>
      {activeNames.length===0&&<Card><div style={{textAlign:"center",color:C.mu,padding:20,fontSize:13}}>বর্তমানে কোনো ছাত্র সক্রিয় তালিকায় নেই — ভালো লক্ষণ।</div></Card>}
      {activeNames.map(name=>{
        const st=studentStatus[name];
        const latest=st.incidents[0];
        const showHistory=!!expandedHistory[name];
        return(<Card key={name} style={{border:`1px solid ${st.ongoing?C.am:C.re}40`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontWeight:700,fontSize:13}}>{name}</div>
              <div style={{fontSize:11,color:C.mu}}>শ্রেণি {latest.cls} • সর্বশেষ: {latest.date} ({latest.subject})</div>
            </div>
            <span style={{padding:"3px 9px",borderRadius:14,background:st.ongoing?C.amL:C.reL,color:st.ongoing?C.am:C.re,fontSize:11,fontWeight:700}}>{st.incidents.length}টি ঘটনা</span>
          </div>

          <div onClick={()=>setExpandedHistory(p=>({...p,[name]:!p[name]}))} style={{fontSize:11,color:C.pu,cursor:"pointer",marginTop:6,fontWeight:600}}>
            {showHistory?"▲ ইতিহাস লুকান":"▼ সম্পূর্ণ ইতিহাস দেখুন"}
          </div>
          {showHistory&&(
            <div style={{marginTop:6,fontSize:11,color:C.mu}}>
              {st.incidents.map(inc=>(
                <div key={inc.id} style={{padding:"4px 0",borderBottom:`1px solid ${C.bd}`}}>{inc.date} — শ্রেণি {inc.cls}, {inc.subject} (রিপোর্ট: {inc.teacher})</div>
              ))}
            </div>
          )}

          {st.ongoing&&(
            <div style={{marginTop:8,background:C.amL,borderRadius:8,padding:"8px 10px",fontSize:11.5,color:C.am}}>
              ⏳ <b>ব্যবস্থা চলমান</b> — {st.latestAction.untilISO} পর্যন্ত। গৃহীত ব্যবস্থা: {st.latestAction.actionText}
            </div>
          )}

          {isAdmin&&(<div style={{marginTop:10}}>
            {!st.ongoing&&ongoingFormFor!==name&&(
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setAction(name,"resolved")} style={{flex:1,padding:"8px",borderRadius:8,border:"none",background:C.gr,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>✅ ব্যবস্থা নেওয়া হয়েছে</button>
                <button onClick={()=>setOngoingFormFor(name)} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${C.am}`,background:"transparent",color:C.am,fontWeight:700,fontSize:12,cursor:"pointer"}}>⏳ ব্যবস্থা চলমান</button>
              </div>
            )}
            {ongoingFormFor===name&&(
              <div style={{background:C.bg,borderRadius:8,padding:"10px",marginTop:4}}>
                <div style={{fontSize:11,color:C.mu,marginBottom:4}}>কত তারিখ পর্যন্ত ব্যবস্থা চলবে?</div>
                <input type="date" value={ongoingUntil} onChange={e=>setOngoingUntil(e.target.value)} min={todayISO} style={{width:"100%",padding:"6px 8px",borderRadius:6,border:`1px solid ${C.bd}`,marginBottom:8,fontSize:12}}/>
                <div style={{fontSize:11,color:C.mu,marginBottom:4}}>কী ব্যবস্থা গ্রহণ করা হলো?</div>
                <textarea value={ongoingText} onChange={e=>setOngoingText(e.target.value)} rows={2} placeholder="যেমন: অভিভাবক ডেকে সতর্ক করা হয়েছে..." style={{width:"100%",padding:"6px 8px",borderRadius:6,border:`1px solid ${C.bd}`,fontSize:12,boxSizing:"border-box"}}/>
                <div style={{display:"flex",gap:8,marginTop:8}}>
                  <button onClick={()=>setOngoingFormFor(null)} style={{flex:1,padding:"7px",borderRadius:6,border:`1px solid ${C.bd}`,background:"#fff",color:C.mu,fontSize:12,cursor:"pointer"}}>বাতিল</button>
                  <button onClick={()=>submitOngoing(name)} disabled={!ongoingUntil||!ongoingText.trim()} style={{flex:1,padding:"7px",borderRadius:6,border:"none",background:C.am,color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>নিশ্চিত করুন</button>
                </div>
              </div>
            )}
            {st.ongoing&&(
              <button onClick={()=>setAction(name,"resolved")} style={{width:"100%",padding:"8px",borderRadius:8,border:`1px solid ${C.gr}`,background:"transparent",color:C.gr,fontWeight:700,fontSize:12,cursor:"pointer"}}>🏁 শাস্তি শেষ</button>
            )}
          </div>)}
        </Card>);
      })}
    </div>)}
  </div>);
}

// সকালের মিটিং এজেন্ডা — {id, text, num, status:"open"|"done"|"carry"|"scheduled", scheduledDate}
const DEFAULT_MEETING_AGENDA=[];
// বিশেষ কাজ তালিকা — একই কাঠামো
const DEFAULT_SPECIAL_TASKS=[];

/* numbered auto-growing list — শিক্ষক মিটিং এজেন্ডা ও বিশেষ কাজ দুটোতেই ব্যবহৃত */
function NumberedTaskList({items,setItems,colorTheme="#6366f1",placeholder="কাজ লিখুন..."}){
  const [calendarFor,setCalendarFor]=useState(null); // item id যার জন্য calendar খোলা
  const [calDate,setCalDate]=useState("");

  // active (আজকের) items — যেগুলো carry বা scheduled-due-today বা নতুন
  const activeItems=items.filter(it=>it.status!=="done");
  // টেক্সট ইনপুট পরিবর্তনে নতুন number বক্স যুক্ত হবে স্বয়ংক্রিয়ভাবে
  const updateText=(id,text)=>{
    setItems(prev=>{
      const updated=prev.map(it=>it.id===id?{...it,text}:it);
      // শেষ item-টিতে টেক্সট লেখা হলে এবং এটাই শেষ active item হলে নতুন খালি item যুক্ত করো
      const lastActive=[...updated].filter(it=>it.status!=="done").slice(-1)[0];
      if(lastActive&&lastActive.id===id&&text.trim()&&!updated.some(it=>it.status!=="done"&&it.text.trim()==="" && it.id!==id)){
        const nextNum=updated.length+1;
        updated.push({id:"item_"+Date.now(),num:nextNum,text:"",status:"open",scheduledDate:null});
      }
      return updated;
    });
  };

  const markDone=(id)=>{
    setItems(prev=>prev.map(it=>it.id===id?{...it,status:"done",doneAt:new Date().toISOString()}:it));
  };
  const markCarry=(id)=>{
    setItems(prev=>prev.map(it=>it.id===id?{...it,status:"carry"}:it));
  };
  const markScheduled=(id,date)=>{
    setItems(prev=>prev.map(it=>it.id===id?{...it,status:"scheduled",scheduledDate:date}:it));
    setCalendarFor(null);setCalDate("");
  };
  const unmark=(id)=>{
    setItems(prev=>prev.map(it=>it.id===id?{...it,status:"open",scheduledDate:null}:it));
  };
  const deleteItem=(id)=>{
    setItems(prev=>{
      const filtered=prev.filter(it=>it.id!==id);
      // renumber
      return filtered.map((it,idx)=>({...it,num:idx+1}));
    });
  };

  // অন্তত একটি খালি item না থাকলে শুরুতে একটি যুক্ত করো
  React.useEffect(()=>{
    if(items.length===0){
      setItems([{id:"item_"+Date.now(),num:1,text:"",status:"open",scheduledDate:null}]);
    }
  },[]);

  const displayItems=items.filter(it=>it.status!=="done"||it.showDone);
  const doneCount=items.filter(it=>it.status==="done").length;
  const [showDoneList,setShowDoneList]=useState(false);

  return(
    <div>
      {items.filter(it=>it.status!=="done").map(it=>(
        <div key={it.id} style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,
          background:it.status==="carry"?"#fff8e1":it.status==="scheduled"?"#eef2ff":"#fff",
          border:`1px solid ${it.status==="carry"?"#f59e0b40":it.status==="scheduled"?"#6366f140":"#e5e7eb"}`,
          borderRadius:8,padding:"6px 8px"}}>
          <span style={{fontSize:12,fontWeight:700,color:colorTheme,minWidth:20}}>{it.num}.</span>
          <input type="text" value={it.text} onChange={e=>updateText(it.id,e.target.value)}
            placeholder={placeholder}
            style={{flex:1,border:"none",outline:"none",fontSize:13,padding:"3px 4px",background:"transparent"}}/>
          {it.text.trim()&&(
            <div style={{display:"flex",gap:3,flexShrink:0}}>
              {it.status==="open"&&(
                <>
                  <button onClick={()=>markDone(it.id)} title="আজ শেষ"
                    style={{background:"#22c55e22",border:"1px solid #22c55e55",borderRadius:6,padding:"3px 6px",cursor:"pointer",fontSize:12}}>✅</button>
                  <button onClick={()=>markCarry(it.id)} title="পরের দিনে যাবে"
                    style={{background:"#f59e0b22",border:"1px solid #f59e0b55",borderRadius:6,padding:"3px 6px",cursor:"pointer",fontSize:12}}>🔁</button>
                  <button onClick={()=>setCalendarFor(it.id)} title="নির্দিষ্ট তারিখে যাবে"
                    style={{background:"#6366f122",border:"1px solid #6366f155",borderRadius:6,padding:"3px 6px",cursor:"pointer",fontSize:12}}>📅</button>
                </>
              )}
              {it.status==="carry"&&(
                <>
                  <span style={{fontSize:10,color:"#f59e0b",fontWeight:700,alignSelf:"center"}}>🔁 আগামীকাল</span>
                  <button onClick={()=>markDone(it.id)} title="আজ শেষ করে দিন"
                    style={{background:"#22c55e22",border:"1px solid #22c55e55",borderRadius:6,padding:"3px 6px",cursor:"pointer",fontSize:12}}>✅</button>
                  <button onClick={()=>unmark(it.id)} title="বাতিল"
                    style={{background:"#f5f5f5",border:"1px solid #ddd",borderRadius:6,padding:"3px 6px",cursor:"pointer",fontSize:11}}>✕</button>
                </>
              )}
              {it.status==="scheduled"&&(
                <>
                  <span style={{fontSize:10,color:"#6366f1",fontWeight:700,alignSelf:"center"}}>📅 {it.scheduledDate}</span>
                  <button onClick={()=>markDone(it.id)} title="আজ শেষ করে দিন"
                    style={{background:"#22c55e22",border:"1px solid #22c55e55",borderRadius:6,padding:"3px 6px",cursor:"pointer",fontSize:12}}>✅</button>
                  <button onClick={()=>unmark(it.id)} title="বাতিল"
                    style={{background:"#f5f5f5",border:"1px solid #ddd",borderRadius:6,padding:"3px 6px",cursor:"pointer",fontSize:11}}>✕</button>
                </>
              )}
            </div>
          )}
          {!it.text.trim()&&items.filter(x=>x.status!=="done").length>1&&(
            <button onClick={()=>deleteItem(it.id)} style={{background:"none",border:"none",color:"#ccc",cursor:"pointer",fontSize:13}}>✕</button>
          )}
          {calendarFor===it.id&&(
            <div style={{position:"absolute",zIndex:50,background:"#fff",border:"1px solid #6366f1",borderRadius:8,padding:8,boxShadow:"0 4px 12px rgba(0,0,0,0.15)",marginTop:30}}>
              <input type="date" value={calDate} onChange={e=>setCalDate(e.target.value)}
                style={{padding:"4px 6px",border:"1px solid #ddd",borderRadius:6,fontSize:12}}/>
              <button onClick={()=>calDate&&markScheduled(it.id,calDate)}
                style={{marginLeft:6,padding:"4px 10px",borderRadius:6,border:"none",background:"#6366f1",color:"#fff",cursor:"pointer",fontSize:12}}>ঠিক আছে</button>
            </div>
          )}
        </div>
      ))}
      {doneCount>0&&(
        <div style={{marginTop:8}}>
          <button onClick={()=>setShowDoneList(v=>!v)} style={{fontSize:11,color:"#22c55e",background:"none",border:"none",cursor:"pointer",fontWeight:700}}>
            {showDoneList?"▲":"▼"} সম্পন্ন হয়েছে ({doneCount}টি)
          </button>
          {showDoneList&&items.filter(it=>it.status==="done").map(it=>(
            <div key={it.id} style={{fontSize:12,color:"#888",padding:"3px 6px",textDecoration:"line-through"}}>
              {it.num}. {it.text}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
