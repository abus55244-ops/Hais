   শুধুমাত্র ADMIN_TEACHER (একাডেমিক ইনচার্জ) দেখতে ও দিতে পারবেন — অন্য কোনো অ্যাডমিন, শিক্ষক
   বা ব্যবহারকারী না। calcKPI() সাম্প্রতিক সর্বোচ্চ ৩টি এন্ট্রি নিয়ে গড় করে, চূড়ান্ত KPI স্কোরের
   ১০% ওজনে যুক্ত করে — জমা দেওয়ার সাথে সাথেই স্বয়ংক্রিয়ভাবে। এই রেটিং/নোট breakdown-এ
   দেখানো হয় না, তাই অন্য কোনো অ্যাডমিন KPI পেজে গেলেও দেখতে পাবেন না।

   ── বায়াস-প্রতিরোধী কাঠামো ──
   একটামাত্র মুক্ত-স্কেল স্কোরের বদলে, ৫টি সুনির্দিষ্ট আচরণগত মানদণ্ডে আলাদাভাবে রেট করতে হয়
   (সামগ্রিক পারফরম্যান্স ও শৃঙ্খলা-কেন্দ্রিক), প্রতিটির নির্দিষ্ট আচরণগত বর্ণনা সহ — যাতে
   "ব্যক্তিগত পছন্দ" নয়, পর্যবেক্ষিত আচরণের ভিত্তিতে নম্বর দেওয়া হয়। চূড়ান্ত স্কোর এই ৫টির
   গড় থেকে গাণিতিকভাবে হিসাব হয়, সরাসরি এডিট করার কোনো উপায় নেই। কোনো মানদণ্ডে চরম রেটিং
   (১ বা ৫) দিলে একটা লিখিত উদাহরণ/ব্যাখ্যা বাধ্যতামূলক — এটা impulsive বা পক্ষপাতদুষ্ট
   extreme রেটিং ঠেকাতে সাহায্য করে।
══════════════════════════════════════════════ */
const AIC_CRITERIA=[
  {key:"punctuality",label:"সময়ানুবর্তিতা",desc:"নির্ধারিত সময়ে ক্লাস, ডিউটি ও দায়িত্বে উপস্থিত হওয়া"},
  {key:"teaching",label:"পাঠদানের মান ও প্রস্তুতি",desc:"পরিদর্শনকালে পাঠ পরিকল্পনা, উপস্থাপনা ও ছাত্র-সম্পৃক্ততার মান"},
  {key:"compliance",label:"নির্দেশনা ও নিয়ম মান্যতা",desc:"স্কুলের সিদ্ধান্ত, নিয়মকানুন ও নির্দেশনা যথাযথভাবে পালন"},
  {key:"conduct",label:"পেশাদার আচরণ ও সম্পর্ক",desc:"সহকর্মী, ছাত্র ও অভিভাবকদের সাথে পেশাদার আচরণ"},
  {key:"initiative",label:"দায়িত্বশীলতা ও উদ্যোগ",desc:"নির্ধারিত কাজের বাইরেও সহযোগিতা, দায়িত্ব নেওয়া ও উদ্যোগ"}
];
const AIC_LEVELS=[
  {v:1,label:"উল্লেখযোগ্য ঘাটতি"},
  {v:2,label:"উন্নতি প্রয়োজন"},
  {v:3,label:"সন্তোষজনক"},
  {v:4,label:"ভালো"},
  {v:5,label:"অনুকরণীয়"}
];
const AIC_DEFAULT_CRITERIA=()=>({punctuality:3,teaching:3,compliance:3,conduct:3,initiative:3});

function AICObservation({obsData,setObsData,currentUser}){
  const evalTeachers=TEACHERS.filter(t=>!ADMIN_TEACHERS.includes(t));
  const [selTeacher,setSelTeacher]=useState(evalTeachers[0]||"");
  const [criteria,setCriteria]=useState(AIC_DEFAULT_CRITERIA());
  const [note,setNote]=useState("");

  if(currentUser!==ADMIN_TEACHER){
    return(<div style={{textAlign:"center",padding:40,color:C.re,fontWeight:700}}>🔒 এই পেজটি শুধুমাত্র একাডেমিক ইনচার্জের জন্য</div>);
  }

  const obs=obsData[selTeacher]||{};
  const aicList=obs.aicObservations||[];
  const sorted=[...aicList].sort((a,b)=>new Date(b.dateISO)-new Date(a.dateISO));
  const last=sorted[0];
  const daysSinceLast=last?Math.floor((Date.now()-new Date(last.dateISO).getTime())/86400000):null;

  // ── চূড়ান্ত স্কোর সবসময় ৫টি মানদণ্ডের গড় থেকে গাণিতিকভাবে বের হয় — সরাসরি এডিটযোগ্য না ──
  const avgCriteria=AIC_CRITERIA.reduce((a,c)=>a+criteria[c.key],0)/AIC_CRITERIA.length;
  const computedScore=Math.round(avgCriteria*20); // ১-৫ স্কেল → ০-১০০
  const hasExtreme=AIC_CRITERIA.some(c=>criteria[c.key]===1||criteria[c.key]===5);
  const noteOk=!hasExtreme||note.trim().length>=10;

  const persist=(updatedList)=>{
    const updated={...obs,aicObservations:updatedList};
    setObsData(prev=>{
      fbSaveObsData(selTeacher,updated); // granular Firebase write
      return{...prev,[selTeacher]:updated};
    });
  };

  const submit=()=>{
    if(!selTeacher||!noteOk)return;
    const rec={id:Date.now().toString(),score:computedScore,criteria:{...criteria},note:note.trim(),dateISO:new Date().toISOString()};
    persist([...aicList,rec]);
    setNote("");setCriteria(AIC_DEFAULT_CRITERIA());
  };

  const deleteObs=(id)=>persist(aicList.filter(o=>o.id!==id));

  return(<div>
    <H2>🔒 আমার ব্যক্তিগত পর্যবেক্ষণ</H2>
    <Card style={{background:C.reL,border:`1px solid ${C.re}30`,marginBottom:10}}>
      <div style={{fontSize:12,color:C.re,fontWeight:700}}>⚠️ শুধুমাত্র আপনি এই পেজ দেখতে পারবেন</div>
      <div style={{fontSize:11,color:C.mu,marginTop:4}}>এই রেটিং ও নোট অন্য কোনো অ্যাডমিন, শিক্ষক বা ব্যবহারকারী দেখতে পাবেন না। নিচের ৫টি মানদণ্ড শিক্ষকের সামগ্রিক পারফরম্যান্স ও শৃঙ্খলা-কেন্দ্রিক — প্রতিটি আলাদাভাবে রেট করুন, চূড়ান্ত স্কোর এদের গড় থেকে স্বয়ংক্রিয়ভাবে বের হবে। জমা দেওয়ার সাথে সাথেই এটা KPI স্কোরে (সাম্প্রতিক সর্বোচ্চ ৩টি এন্ট্রির গড়, ১০% ওজনে) যুক্ত হয়ে যাবে।</div>
    </Card>

    <Card style={{padding:"10px 12px",marginBottom:10}}>
      <div style={{fontSize:12,color:C.mu,marginBottom:5}}>শিক্ষক নির্বাচন</div>
      <select value={selTeacher} onChange={e=>{setSelTeacher(e.target.value);setCriteria(AIC_DEFAULT_CRITERIA());setNote("");}} style={{width:"100%"}}>
        {evalTeachers.map(t=><option key={t} value={t}>{t}</option>)}
      </select>
    </Card>

    {selTeacher&&(<Card style={{marginBottom:10}}>
      <H3>নতুন পর্যবেক্ষণ — {selTeacher}</H3>
      {last&&(
        <div style={{background:C.puL,border:`1px solid ${C.pu}30`,borderRadius:8,padding:"8px 10px",marginBottom:12,fontSize:12,color:C.pu,fontWeight:600}}>
          ℹ️ শেষ পর্যবেক্ষণ {daysSinceLast} দিন আগে দেওয়া হয়েছে
        </div>
      )}

      {AIC_CRITERIA.map(c=>(
        <div key={c.key} style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,color:C.tx}}>{c.label}</div>
          <div style={{fontSize:11,color:C.mu,marginBottom:6}}>{c.desc}</div>
          <div style={{display:"flex",gap:6}}>
            {AIC_LEVELS.map(lv=>(
              <button key={lv.v} onClick={()=>setCriteria({...criteria,[c.key]:lv.v})}
                style={{flex:1,padding:"8px 2px",borderRadius:8,border:`1px solid ${criteria[c.key]===lv.v?C.pu:C.bd}`,
                  background:criteria[c.key]===lv.v?C.pu:"transparent",color:criteria[c.key]===lv.v?"#fff":C.mu,
                  fontWeight:700,cursor:"pointer",fontSize:13}}>{lv.v}</button>
            ))}
          </div>
          <div style={{fontSize:11,color:C.mu,marginTop:4,textAlign:"right"}}>{AIC_LEVELS.find(lv=>lv.v===criteria[c.key])?.label}</div>
        </div>
      ))}

      <div style={{background:C.puL,borderRadius:8,padding:"10px 12px",marginBottom:12,textAlign:"center"}}>
        <div style={{fontSize:11,color:C.mu}}>স্বয়ংক্রিয়ভাবে গণনাকৃত চূড়ান্ত স্কোর (৫ মানদণ্ডের গড়)</div>
        <div style={{fontSize:24,fontWeight:800,color:C.pu}}>{computedScore}/100</div>
      </div>

      <div style={{marginBottom:10}}>
        <div style={{fontSize:12,color:C.mu,marginBottom:5}}>
          নোট / উদাহরণ {hasExtreme?<span style={{color:C.re,fontWeight:700}}>(বাধ্যতামূলক — অন্তত একটি মানদণ্ডে চরম রেটিং দেওয়া হয়েছে)</span>:"(ঐচ্ছিক, শুধু আপনি দেখবেন)"}
        </div>
        <textarea value={note} onChange={e=>setNote(e.target.value)} rows={3} placeholder="নির্দিষ্ট ঘটনা/উদাহরণ লিখুন..." style={{width:"100%",padding:8,borderRadius:8,border:`1px solid ${hasExtreme&&!noteOk?C.re:C.bd}`,fontSize:13,boxSizing:"border-box"}}/>
      </div>

      <button onClick={submit} disabled={!noteOk} style={{width:"100%",padding:"10px 0",borderRadius:8,border:"none",background:noteOk?C.pu:"#ccc",color:"#fff",fontWeight:700,cursor:noteOk?"pointer":"not-allowed",fontSize:13}}>
        {noteOk?"✅ পর্যবেক্ষণ জমা দিন":"✍️ চরম রেটিংয়ের জন্য নোট লিখুন"}
      </button>
    </Card>)}

    {selTeacher&&sorted.length>0&&(<Card>
      <H3>পূর্বের পর্যবেক্ষণ — {selTeacher}</H3>
      {sorted.map(o=>(
        <div key={o.id} style={{padding:"8px 0",borderBottom:`1px solid ${C.bd}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:C.mu}}>{new Date(o.dateISO).toLocaleDateString("bn-BD")}</span>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontWeight:700,color:o.score>=70?C.gr:o.score>=40?C.am:C.re}}>{o.score}/100</span>
              <button onClick={()=>deleteObs(o.id)} style={{border:"none",background:"transparent",color:C.re,cursor:"pointer",fontSize:12}}>✕</button>
            </div>
          </div>
          {o.criteria&&(
            <div style={{fontSize:10,color:C.mu,marginTop:3}}>
              {AIC_CRITERIA.map(c=>`${c.label}:${o.criteria[c.key]}`).join("  ·  ")}
            </div>
          )}
          {o.note&&<div style={{fontSize:12,color:C.tx,marginTop:4}}>{o.note}</div>}
        </div>
      ))}
      <div style={{fontSize:11,color:C.mu,marginTop:8}}>💡 KPI গণনায় সাম্প্রতিক সর্বোচ্চ ৩টি এন্ট্রি ব্যবহৃত হয় (গড় করে ১০% ওজনে)।</div>
    </Card>)}
  </div>);
}

/* ইভেন্ট টেমপ্লেট — একটি ইভেন্টের মধ্যে একাধিক sub-task থাকতে পারে */
/* প্রতিটি sub-task একজন বা একাধিক শিক্ষকের জন্য, নির্দিষ্ট deadline সহ */

const EVENT_TYPES=[
  {id:"exam",         label:"পরীক্ষা",              emoji:"📝", color:"#993c1d"},
  {id:"lesson_plan",  label:"লেসন প্ল্যান জমা",     emoji:"📚", color:"#5344b5"},
  {id:"meeting",      label:"সভা / মিটিং",           emoji:"🤝", color:"#0f6e56"},
  {id:"training",     label:"প্রশিক্ষণ",             emoji:"🎓", color:"#854f0b"},
  {id:"result",       label:"ফলাফল প্রকাশ",          emoji:"📊", color:"#3b6d11"},
  {id:"other",        label:"অন্যান্য",               emoji:"📋", color:"#6b6b8a"},
];
function evtTypeInfo(id){return EVENT_TYPES.find(d=>d.id===id)||EVENT_TYPES[5];}

/* sub-task ধরন — একটি ইভেন্টে বিভিন্ন কাজ থাকতে পারে */
const TASK_TYPES=[
  {id:"question",    label:"প্রশ্নপত্র জমা",   emoji:"❓"},
  {id:"script",      label:"খাতা জমা",          emoji:"📃"},
  {id:"marks",       label:"নম্বর জমা",         emoji:"🔢"},
  {id:"lesson_plan", label:"লেসন প্ল্যান",      emoji:"📚"},
  {id:"attend",      label:"উপস্থিত থাকা",      emoji:"✋"},
  {id:"other",       label:"অন্যান্য",           emoji:"📋"},
];
function taskTypeInfo(id){return TASK_TYPES.find(t=>t.id===id)||TASK_TYPES[5];}

/* একটি ইভেন্টের সব task-এর অবস্থা বের করা */
function evtSummary(event, dlSubmissions, today){
  const tasks=event.tasks||[];
  let totalAssignments=0, doneCount=0, overdueCount=0, upcomingCount=0;
  tasks.forEach(task=>{
    const teachers=task.teachers||[];
    const subs=dlSubmissions[task.id]||{};
    const due=new Date(task.dueDate); due.setHours(0,0,0,0);
    const isPast=due<today;
    teachers.forEach(t=>{
      totalAssignments++;
      const st=subs[t];
      if(st==="done"||st==="late_approved") doneCount++;
      else if(isPast) overdueCount++;
      else upcomingCount++;
    });
  });
  const pct=totalAssignments?Math.round(doneCount/totalAssignments*100):0;
  return{totalAssignments,doneCount,overdueCount,upcomingCount,pct};
}

/* KPI penalty for upcoming events — same logic as deadlines but event-aware */
function calcEventKPI(teacher, deadlines, dlSubmissions){
  /* deadlines এবং events উভয়ের task মিলিয়ে হিসাব */
  return calcDeadlinePenalty(teacher,deadlines,dlSubmissions);
}

/* ── EventTaskSubmissionStatus — KPI এ যা প্রভাব ফেলবে ── */
/* done = সময়মতো, late_approved = অনুমতি সাপেক্ষে দেরিতে, missed = জমা হয়নি */

function UpcomingEventCard({event, dlSubmissions, setDlSubmissions, isAdmin, currentUser, onEdit, onDelete}){
  const [expanded, setExpanded]=useState(false);
  const today=new Date(); today.setHours(0,0,0,0);
  const evtDate=new Date(event.eventDate); evtDate.setHours(0,0,0,0);
  const daysToEvent=Math.round((evtDate-today)/(1000*60*60*24));
  const typeInfo=evtTypeInfo(event.type);
  const {totalAssignments,doneCount,overdueCount,pct}=evtSummary(event,dlSubmissions,today);

  /* এই শিক্ষকের যে task গুলো আছে */
  const myTasks=(event.tasks||[]).filter(task=>task.teachers&&task.teachers.includes(currentUser));

  const markTask=(taskId,teacher,status)=>{
    setDlSubmissions(prev=>({...prev,[taskId]:{...(prev[taskId]||{}),[teacher]:status}}));
  };

  const statusColor=daysToEvent<0?C.re:daysToEvent===0?C.co:daysToEvent<=3?C.am:C.pu;
  const statusLabel=daysToEvent<0?`${Math.abs(daysToEvent)} দিন আগে হয়েছে`:daysToEvent===0?"আজই":daysToEvent<=3?`${daysToEvent} দিন বাকি`:`${daysToEvent} দিন বাকি`;

  return(
    <div style={{background:"#fff",border:`1px solid ${typeInfo.color}30`,borderLeft:`4px solid ${typeInfo.color}`,borderRadius:12,marginBottom:10,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
      {/* হেডার */}
      <div style={{padding:"12px 14px",cursor:"pointer"}} onClick={()=>setExpanded(p=>!p)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:14,color:typeInfo.color}}>{typeInfo.emoji} {event.title}</div>
            <div style={{fontSize:11,color:C.mu,marginTop:3}}>
              {typeInfo.label} • ইভেন্ট: {new Date(event.eventDate).toLocaleDateString("bn-BD")}
              {event.tasks&&event.tasks.length>0&&` • ${event.tasks.length}টি কাজ`}
            </div>
            {event.description&&<div style={{fontSize:11,color:C.mu,marginTop:2,fontStyle:"italic"}}>📌 {event.description}</div>}
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
            <span style={{fontSize:11,fontWeight:700,color:statusColor,background:statusColor+"15",padding:"3px 8px",borderRadius:10,whiteSpace:"nowrap"}}>{statusLabel}</span>
            {totalAssignments>0&&<span style={{fontSize:10,color:C.mu}}>{doneCount}/{totalAssignments} সম্পন্ন</span>}
          </div>
        </div>
        {/* প্রগ্রেস বার */}
        {totalAssignments>0&&(
          <div style={{marginTop:8}}>
            <div style={{height:5,background:"#eee",borderRadius:3}}>
              <div style={{width:`${pct}%`,height:"100%",background:overdueCount>0?C.re:pct===100?C.gr:C.pu,borderRadius:3,transition:"width 0.4s"}}/>
            </div>
            {overdueCount>0&&<div style={{fontSize:10,color:C.re,marginTop:2}}>⚠ {overdueCount}টি কাজ মিস হয়েছে</div>}
          </div>
        )}
        <div style={{fontSize:10,color:C.mu,marginTop:4,textAlign:"right"}}>{expanded?"▲ বন্ধ করুন":"▼ বিস্তারিত দেখুন"}</div>
      </div>

      {/* বিস্তারিত */}
      {expanded&&(
        <div style={{borderTop:`1px solid ${C.bd}`,padding:"12px 14px",background:"#fafaff"}}>
          {(event.tasks||[]).length===0&&<div style={{textAlign:"center",color:C.mu,fontSize:12,padding:12}}>এই ইভেন্টে কোনো কাজ যোগ করা হয়নি।</div>}

          {(event.tasks||[]).map((task,ti)=>{
            const tInfo=taskTypeInfo(task.type);
            const subs=dlSubmissions[task.id]||{};
            const due=new Date(task.dueDate); due.setHours(0,0,0,0);
            const diff=Math.round((due-today)/(1000*60*60*24));
            const isPast=diff<0;
            const taskTeachers=task.teachers||[];
            return(
              <div key={task.id} style={{background:"#fff",border:`1px solid ${C.bd}`,borderRadius:10,marginBottom:8,padding:"10px 12px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div>
                    <span style={{fontWeight:700,fontSize:12}}>{tInfo.emoji} {task.title||tInfo.label}</span>
                    <span style={{fontSize:11,color:C.mu,marginLeft:8}}>ডেডলাইন: {new Date(task.dueDate).toLocaleDateString("bn-BD")}</span>
                  </div>
                  <span style={{fontSize:11,fontWeight:700,color:diff<0?C.re:diff===0?C.co:diff<=3?C.am:C.pu,background:(diff<0?C.re:diff===0?C.co:diff<=3?C.am:C.pu)+"15",padding:"2px 7px",borderRadius:8}}>
                    {diff<0?`${Math.abs(diff)}দিন আগে`:diff===0?"আজই":`${diff}দিন বাকি`}
                  </span>
                </div>
                {task.note&&<div style={{fontSize:11,color:C.am,marginBottom:6}}>📌 {task.note}</div>}

                {/* শিক্ষকদের তালিকা ও অবস্থা */}
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {taskTeachers.map(t=>{
                    const st=subs[t];
                    const isDone=st==="done";
                    const isLate=st==="late_approved";
                    const isMine=t===currentUser;
                    const bgColor=isDone?C.grL:isLate?C.amL:isPast?C.reL:C.puL;
                    const txColor=isDone?C.gr:isLate?C.am:isPast?C.re:C.pu;
                    const icon=isDone?"✅":isLate?"🕐":isPast?"❌":"⏳";
                    return(
                      <div key={t} style={{position:"relative"}}>
                        <div style={{padding:"4px 9px",borderRadius:14,background:bgColor,color:txColor,fontSize:10,fontWeight:700,border:`1px solid ${txColor}30`,cursor:(isAdmin||isMine)?"pointer":"default"}}
                          onClick={()=>{
                            if(!isAdmin&&!isMine)return;
                            if(isDone){markTask(task.id,t,null);}
                            else if(isLate){markTask(task.id,t,null);}
                            else{markTask(task.id,t,"done");}
                          }}
                          title={isAdmin?`${t} — ক্লিক করে পরিবর্তন করুন`:isMine?"ক্লিক করে জমা দিন":t}>
                          {icon} {t}
                          {isMine&&!isDone&&!isLate&&<span style={{fontSize:9,marginLeft:3}}>(আমি)</span>}
                        </div>
                        {/* অ্যাডমিন: দেরি-অনুমোদন বোতাম */}
                        {isAdmin&&isPast&&!isDone&&!isLate&&(
                          <button onClick={(e)=>{e.stopPropagation();markTask(task.id,t,"late_approved");}}
                            style={{position:"absolute",top:-8,right:-8,background:C.am,color:"#fff",border:"none",borderRadius:"50%",width:16,height:16,cursor:"pointer",fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",zIndex:10}}
                            title="দেরি অনুমোদন করুন">✓</button>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}

          {/* অ্যাডমিন নিয়ন্ত্রণ */}
          {isAdmin&&(
            <div style={{display:"flex",gap:6,marginTop:8}}>
              <button onClick={()=>onEdit(event)}
                style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${C.pu}40`,background:C.puL,color:C.pu,cursor:"pointer",fontSize:11,fontWeight:600}}>✏️ সম্পাদনা</button>
              <button onClick={()=>onDelete(event.id)}
                style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${C.re}30`,background:C.reL,color:C.re,cursor:"pointer",fontSize:11}}>🗑 মুছুন</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function EventForm({event, onSave, onCancel}){
  const isEdit=!!event;
  const [title,setTitle]=useState(event?.title||"");
  const [type,setType]=useState(event?.type||"exam");
  const [eventDate,setEventDate]=useState(event?.eventDate||"");
  const [description,setDescription]=useState(event?.description||"");
  const [tasks,setTasks]=useState(event?.tasks||[]);
  const [err,setErr]=useState("");

  /* নতুন task ফর্ম */
  const [taskForm,setTaskForm]=useState({title:"",type:"question",dueDate:"",note:"",teachers:[]});
  const [showTaskForm,setShowTaskForm]=useState(false);

  const toggleTeacher=(t)=>{
    setTaskForm(prev=>({...prev,teachers:prev.teachers.includes(t)?prev.teachers.filter(x=>x!==t):[...prev.teachers,t]}));
  };
  const selectAllTeachers=()=>setTaskForm(prev=>({...prev,teachers:[...TEACHERS]}));
  const clearTeachers=()=>setTaskForm(prev=>({...prev,teachers:[]}));

  const addTask=()=>{
    if(!taskForm.dueDate){alert("কাজের ডেডলাইন তারিখ দিন");return;}
    if(taskForm.teachers.length===0){alert("কমপক্ষে একজন শিক্ষক নির্বাচন করুন");return;}
    const newTask={
      id:Date.now().toString()+"_t",
      title:taskForm.title||taskTypeInfo(taskForm.type).label,
      type:taskForm.type,
      dueDate:taskForm.dueDate,
      note:taskForm.note,
      teachers:taskForm.teachers
    };
    setTasks(prev=>[...prev,newTask]);
    setTaskForm({title:"",type:"question",dueDate:"",note:"",teachers:[]});
    setShowTaskForm(false);
  };

  const removeTask=(id)=>setTasks(prev=>prev.filter(t=>t.id!==id));

  const save=()=>{
    if(!title.trim()){setErr("ইভেন্টের নাম আবশ্যক");return;}
    if(!eventDate){setErr("ইভেন্টের তারিখ আবশ্যক");return;}
    setErr("");
    onSave({
      id:event?.id||Date.now().toString(),
      title,type,eventDate,description,tasks,
      createdAt:event?.createdAt||new Date().toISOString()
    });
  };

  return(
    <div style={{background:C.puL,border:`2px solid ${C.pu}40`,borderRadius:14,padding:14,marginBottom:12}}>
      <H3>{isEdit?"✏️ ইভেন্ট সম্পাদনা":"➕ নতুন ইভেন্ট তৈরি করুন"}</H3>

      {/* ইভেন্টের মূল তথ্য */}
      <div style={{marginBottom:8}}>
        <div style={{fontSize:11,color:C.mu,marginBottom:3}}>ইভেন্টের নাম *</div>
        <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="যেমন: পাক্ষিক পরীক্ষা, লেসন প্ল্যান জমা..." style={{width:"100%"}}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div>
          <div style={{fontSize:11,color:C.mu,marginBottom:3}}>ইভেন্টের ধরন *</div>
          <select value={type} onChange={e=>setType(e.target.value)} style={{width:"100%"}}>
            {EVENT_TYPES.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.label}</option>)}
          </select>
        </div>
        <div>
          <div style={{fontSize:11,color:C.mu,marginBottom:3}}>ইভেন্টের তারিখ *</div>
          <input type="date" value={eventDate} onChange={e=>setEventDate(e.target.value)} style={{width:"100%"}}/>
        </div>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:C.mu,marginBottom:3}}>বিবরণ (ঐচ্ছিক)</div>
        <textarea value={description} onChange={e=>setDescription(e.target.value)} rows={2}
          placeholder="ইভেন্ট সম্পর্কে বিশেষ নির্দেশনা..."
          style={{width:"100%",padding:"8px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13,fontFamily:"sans-serif",resize:"vertical"}}/>
      </div>

      {/* কাজের তালিকা */}
      <div style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontWeight:700,fontSize:12,color:C.tx}}>📋 কাজের তালিকা ({tasks.length}টি)</div>
          <button onClick={()=>setShowTaskForm(p=>!p)}
            style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${C.pu}`,background:C.pu,color:"#fff",cursor:"pointer",fontSize:11,fontWeight:700}}>
            {showTaskForm?"বাতিল":"+ কাজ যোগ করুন"}
          </button>
        </div>

        {/* নতুন কাজ ফর্ম */}
        {showTaskForm&&(
          <div style={{background:"#fff",border:`1px solid ${C.bd}`,borderRadius:10,padding:12,marginBottom:8}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div>
                <div style={{fontSize:10,color:C.mu,marginBottom:3}}>কাজের ধরন</div>
                <select value={taskForm.type} onChange={e=>setTaskForm(p=>({...p,type:e.target.value}))} style={{width:"100%",fontSize:12}}>
                  {TASK_TYPES.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.label}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:10,color:C.mu,marginBottom:3}}>ডেডলাইন তারিখ *</div>
                <input type="date" value={taskForm.dueDate} onChange={e=>setTaskForm(p=>({...p,dueDate:e.target.value}))} style={{width:"100%"}}/>
              </div>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:10,color:C.mu,marginBottom:3}}>কাজের শিরোনাম (ঐচ্ছিক)</div>
              <input type="text" value={taskForm.title} onChange={e=>setTaskForm(p=>({...p,title:e.target.value}))} placeholder="খালি রাখলে ধরন থেকে নেওয়া হবে" style={{width:"100%"}}/>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:10,color:C.mu,marginBottom:3}}>নির্দেশনা (ঐচ্ছিক)</div>
              <input type="text" value={taskForm.note} onChange={e=>setTaskForm(p=>({...p,note:e.target.value}))} placeholder="বিশেষ নির্দেশ..." style={{width:"100%"}}/>
            </div>
            {/* শিক্ষক নির্বাচন */}
            <div style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <div style={{fontSize:10,color:C.mu}}>সংশ্লিষ্ট শিক্ষক *</div>
                <div style={{display:"flex",gap:4}}>
                  <button onClick={selectAllTeachers} style={{fontSize:9,padding:"2px 6px",borderRadius:6,border:`1px solid ${C.pu}`,background:C.puL,color:C.pu,cursor:"pointer"}}>সবাই</button>
                  <button onClick={clearTeachers} style={{fontSize:9,padding:"2px 6px",borderRadius:6,border:`1px solid ${C.re}`,background:C.reL,color:C.re,cursor:"pointer"}}>বাতিল</button>
                </div>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4,maxHeight:120,overflowY:"auto",padding:4,background:"#f8f7ff",borderRadius:8,border:`1px solid ${C.bd}`}}>
                {TEACHERS.map(t=>{
                  const sel=taskForm.teachers.includes(t);
                  return(<button key={t} onClick={()=>toggleTeacher(t)}
                    style={{padding:"3px 8px",borderRadius:10,border:`1px solid ${sel?C.pu:C.bd}`,background:sel?C.puL:"#fff",color:sel?C.pu:C.mu,cursor:"pointer",fontSize:10,fontWeight:sel?700:400}}>
                    {sel?"✓ ":""}{t}
                  </button>);
                })}
              </div>
              <div style={{fontSize:10,color:C.mu,marginTop:3}}>{taskForm.teachers.length} জন শিক্ষক নির্বাচিত</div>
            </div>
            <button onClick={addTask}
              style={{width:"100%",padding:"8px",borderRadius:8,border:"none",background:C.te,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12}}>
              ✓ কাজ যোগ করুন
            </button>
          </div>
        )}

        {/* কাজের তালিকা প্রিভিউ */}
        {tasks.map((task,i)=>{
          const tInfo=taskTypeInfo(task.type);
          return(
            <div key={task.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",background:"#fff",borderRadius:8,marginBottom:5,border:`1px solid ${C.bd}`}}>
              <div>
                <span style={{fontSize:12,fontWeight:600}}>{tInfo.emoji} {task.title}</span>
                <span style={{fontSize:10,color:C.mu,marginLeft:6}}>ডেডলাইন: {new Date(task.dueDate).toLocaleDateString("bn-BD")}</span>
                <span style={{fontSize:10,color:C.pu,marginLeft:6}}>{task.teachers.length} জন শিক্ষক</span>
              </div>
              <button onClick={()=>removeTask(task.id)}
                style={{padding:"3px 8px",borderRadius:6,border:`1px solid ${C.re}30`,background:C.reL,color:C.re,cursor:"pointer",fontSize:10}}>✕</button>
            </div>
          );
        })}
        {tasks.length===0&&!showTaskForm&&<div style={{textAlign:"center",color:C.mu,fontSize:11,padding:8}}>এখনো কোনো কাজ যোগ করা হয়নি</div>}
      </div>

      {err&&<div style={{color:C.re,fontSize:12,marginBottom:8,fontWeight:600}}>⚠ {err}</div>}
      <div style={{display:"flex",gap:8}}>
        <button onClick={save}
          style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:C.pu,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>
          ✓ {isEdit?"পরিবর্তন সংরক্ষণ করুন":"ইভেন্ট তৈরি করুন"}
        </button>
        <button onClick={onCancel}
          style={{padding:"10px 16px",borderRadius:10,border:`1px solid ${C.bd}`,background:"transparent",cursor:"pointer",fontSize:13}}>
          বাতিল
        </button>
      </div>
    </div>
  );
}

function UpcomingEvents({deadlines, setDeadlines, dlSubmissions, setDlSubmissions, currentUser, isAdmin}){
  /* events আলাদা state হিসেবে deadlines এর মধ্যে _events key তে রাখা হবে */
  /* এতে Firebase sync সহজ থাকে এবং KPI সংযোগ রক্ষা হয় */
  const [events, setEvents]=useState([]);
  const [eventsLoaded,setEventsLoaded]=useState(false);

  /* IndexedDB থেকে events লোড */
  useEffect(()=>{
    HAISDB.get("hais_events_v1").then(data=>{
      if(data&&Array.isArray(data)&&data.length>0){setEvents(data);}
      else{
        // localStorage থেকে এক-বার মাইগ্রেট
        try{const ls=localStorage.getItem("hais_events_v1");if(ls){const p=JSON.parse(ls);setEvents(p);localStorage.removeItem("hais_events_v1");}}catch(e){}
      }
      setEventsLoaded(true);
    });
  },[]);

  /* events IndexedDB এ সংরক্ষণ */
  useEffect(()=>{
    if(!eventsLoaded)return;
    HAISDB.setSync("hais_events_v1",events);
    /* Firebase এও সংরক্ষণ করি */
    if(window.__fbReady){
      window.__fbDB.ref("hais_events_v1").set(events).catch(e=>console.error("Events FB save:",e));
    }
  },[events,eventsLoaded]);

  /* Firebase থেকে events লোড */
  useEffect(()=>{
    if(!window.__fbReady)return;
    window.__fbDB.ref("hais_events_v1").once("value").then(snap=>{
      if(snap.exists()&&Array.isArray(snap.val())&&snap.val().length>0){
        setEvents(prev=>{
          if(prev.length>0)return prev; // local data থাকলে override করব না
          return snap.val();
        });
      }
    }).catch(e=>console.error("Events FB load:",e));
  },[]);

  const [showForm,setShowForm]=useState(false);
  const [editEvent,setEditEvent]=useState(null);
  const [filterType,setFilterType]=useState("সব");
  const [viewMode,setViewMode]=useState("upcoming"); /* upcoming / all / my */

  const today=new Date(); today.setHours(0,0,0,0);

  /* ফিল্টার ও সাজানো */
  const filteredEvents=useMemo(()=>{
    let list=[...events];
    if(filterType!=="সব") list=list.filter(e=>e.type===filterType);
    if(viewMode==="upcoming") list=list.filter(e=>{
      const d=new Date(e.eventDate); d.setHours(0,0,0,0);
      return d>=today;
    });
    if(viewMode==="my"&&!isAdmin){
      list=list.filter(e=>(e.tasks||[]).some(t=>t.teachers&&t.teachers.includes(currentUser)));
    }
    /* তারিখের ক্রমানুসারে সাজানো */
    list.sort((a,b)=>new Date(a.eventDate)-new Date(b.eventDate));
    return list;
  },[events,filterType,viewMode,currentUser,isAdmin]);

  /* আমার pending task গুলো */
  const myPendingTasks=useMemo(()=>{
    const result=[];
    events.forEach(evt=>{
      (evt.tasks||[]).forEach(task=>{
        if(!task.teachers||!task.teachers.includes(currentUser))return;
        const subs=dlSubmissions[task.id]||{};
        const st=subs[currentUser];
        if(st==="done"||st==="late_approved")return;
        const due=new Date(task.dueDate); due.setHours(0,0,0,0);
        result.push({...task, eventTitle:evt.title, eventId:evt.id, daysLeft:Math.round((due-today)/(1000*60*60*24))});
      });
    });
    return result.sort((a,b)=>a.daysLeft-b.daysLeft);
  },[events,dlSubmissions,currentUser]);

  /* সামগ্রিক পরিসংখ্যান */
  const stats=useMemo(()=>{
    const upcomingEvts=events.filter(e=>{const d=new Date(e.eventDate);d.setHours(0,0,0,0);return d>=today;});
    let totalTasks=0, doneTasks=0, overdueTasks=0;
    events.forEach(evt=>{
      (evt.tasks||[]).forEach(task=>{
        const subs=dlSubmissions[task.id]||{};
        const due=new Date(task.dueDate); due.setHours(0,0,0,0);
        (task.teachers||[]).forEach(t=>{
          totalTasks++;
          const st=subs[t];
          if(st==="done"||st==="late_approved") doneTasks++;
          else if(due<today) overdueTasks++;
        });
      });
    });
    return{upcoming:upcomingEvts.length,total:events.length,totalTasks,doneTasks,overdueTasks};
  },[events,dlSubmissions]);

  const saveEvent=(evt)=>{
    setEvents(prev=>{
      const idx=prev.findIndex(e=>e.id===evt.id);
      if(idx>=0){const upd=[...prev];upd[idx]=evt;return upd;}
      return [...prev,evt];
    });
    /* ইভেন্টের task গুলোকে deadline penalty system-এ যুক্ত করতে deadlines-এ sync */
    syncEventTasksToDeadlines(evt);
    setShowForm(false);
    setEditEvent(null);
  };

  /* task গুলোকে deadlines format এ sync করি — KPI এ প্রভাব ফেলার জন্য */
  const syncEventTasksToDeadlines=(evt)=>{
    setDeadlines(prev=>{
      /* এই ইভেন্টের পুরনো deadline গুলো সরাই */
      const filtered=prev.filter(d=>!d._eventId||d._eventId!==evt.id);
      /* নতুন task deadline গুলো যোগ করি */
      const newDls=(evt.tasks||[]).map(task=>({
        id:task.id,
        title:`${evt.title} — ${task.title}`,
        type:task.type==="lesson_plan"?"lesson_plan":task.type==="marks"?"marks":task.type==="question"?"question":task.type==="script"?"exam_script":"other",
        dueDate:task.dueDate,
        note:task.note,
        teachers:task.teachers,
        _eventId:evt.id,
        createdAt:evt.createdAt
      }));
      newDls.forEach(d=>fbSaveDeadline(d)); // granular Firebase write
      return [...filtered,...newDls];
    });
  };

  const deleteEvent=(id)=>{
    if(!window.confirm("এই ইভেন্টটি মুছে ফেলবেন? সব কাজের ডেটাও মুছে যাবে।"))return;
    setEvents(prev=>prev.filter(e=>e.id!==id));
    setDeadlines(prev=>{
      const toDelete=prev.filter(d=>d._eventId===id);
      toDelete.forEach(d=>fbDeleteDeadline(d.id)); // granular Firebase delete
      return prev.filter(d=>d._eventId!==id);
    });
  };

  return(<div>
    <H2>📅 আপকামিং ইভেন্ট</H2>

    {/* সারসংক্ষেপ */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      {isAdmin?(
        <>
          <Stat label="আসন্ন ইভেন্ট" value={stats.upcoming} color={C.pu} sub="ভবিষ্যতের"/>
          <Stat label="মোট কাজ" value={stats.totalTasks} color={C.te} sub="সব শিক্ষকের"/>
          <Stat label="সম্পন্ন" value={stats.doneTasks} color={C.gr} sub="জমা দিয়েছেন"/>
          <Stat label="মিস" value={stats.overdueTasks} color={stats.overdueTasks>0?C.re:C.gr} sub="সময় পেরিয়েছে"/>
        </>
      ):(
        <>
          <Stat label="আমার বাকি কাজ" value={myPendingTasks.filter(t=>t.daysLeft>=0).length} color={C.am} sub="জমা দিতে হবে"/>
          <Stat label="মিস হয়েছে" value={myPendingTasks.filter(t=>t.daysLeft<0).length} color={myPendingTasks.filter(t=>t.daysLeft<0).length>0?C.re:C.gr} sub="সময় পেরিয়েছে"/>
        </>
      )}
    </div>

    {/* শিক্ষকের জন্য: আমার বাকি কাজ সংক্ষেপ */}
    {!isAdmin&&myPendingTasks.length>0&&(
      <Card style={{border:`2px solid ${C.am}40`,background:C.amL,marginBottom:10}}>
        <div style={{fontWeight:700,color:C.am,marginBottom:8}}>⚡ আমার আসন্ন কাজ</div>
        {myPendingTasks.slice(0,5).map(task=>{
          const tInfo=taskTypeInfo(task.type);
          const urgColor=task.daysLeft<0?C.re:task.daysLeft===0?C.co:task.daysLeft<=3?C.am:C.pu;
          const subs=dlSubmissions[task.id]||{};
          const done=subs[currentUser]==="done"||subs[currentUser]==="late_approved";
          return(
            <div key={task.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.bd}`,gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:700}}>{tInfo.emoji} {task.title}</div>
                <div style={{fontSize:10,color:C.mu}}>📅 {task.eventTitle}</div>
                {task.note&&<div style={{fontSize:10,color:C.mu,fontStyle:"italic"}}>📌 {task.note}</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                <span style={{fontSize:10,fontWeight:700,color:urgColor}}>
                  {task.daysLeft<0?`${Math.abs(task.daysLeft)}দিন আগে`:task.daysLeft===0?"আজই!":task.daysLeft<=3?`${task.daysLeft}দিন বাকি`:`${task.daysLeft}দিন বাকি`}
                </span>
                {!done&&(
                  <button onClick={()=>setDlSubmissions(prev=>({...prev,[task.id]:{...(prev[task.id]||{}),[currentUser]:"done"}}))}
                    style={{padding:"4px 10px",borderRadius:8,border:"none",background:C.gr,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:11}}>
                    ✓ জমা দিয়েছি
                  </button>
                )}
                {done&&<span style={{fontSize:11,color:C.gr,fontWeight:700}}>✅ জমা দিয়েছেন</span>}
              </div>
            </div>
          );
        })}
        {myPendingTasks.length>5&&<div style={{textAlign:"center",fontSize:11,color:C.mu,marginTop:6}}>আরও {myPendingTasks.length-5}টি কাজ বাকি...</div>}
      </Card>
    )}

    {/* ট্যাব ও ফিল্টার */}
    <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
      {["upcoming","all",...(!isAdmin?["my"]:[])].map(v=>{
        const labels={upcoming:"📅 আসন্ন",all:"📋 সব ইভেন্ট",my:"👤 আমার"};
        return(<button key={v} onClick={()=>setViewMode(v)}
          style={{padding:"6px 12px",borderRadius:14,border:`1px solid ${viewMode===v?C.pu:C.bd}`,background:viewMode===v?C.puL:"transparent",color:viewMode===v?C.pu:C.mu,cursor:"pointer",fontSize:12,fontWeight:viewMode===v?700:400}}>
          {labels[v]}
        </button>);
      })}
      <select value={filterType} onChange={e=>setFilterType(e.target.value)}
        style={{padding:"6px 10px",borderRadius:12,border:`1px solid ${C.bd}`,fontSize:11,marginLeft:"auto"}}>
        <option value="সব">সব ধরন</option>
        {EVENT_TYPES.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.label}</option>)}
      </select>
    </div>

    {/* অ্যাডমিন: নতুন ইভেন্ট বোতাম */}
    {isAdmin&&!showForm&&!editEvent&&(
      <button onClick={()=>setShowForm(true)}
        style={{width:"100%",padding:"10px",borderRadius:10,border:`2px dashed ${C.pu}60`,background:C.puL,color:C.pu,cursor:"pointer",fontWeight:700,fontSize:13,marginBottom:12}}>
        ＋ নতুন ইভেন্ট তৈরি করুন
      </button>
    )}

    {/* ইভেন্ট ফর্ম */}
    {isAdmin&&showForm&&<EventForm onSave={saveEvent} onCancel={()=>setShowForm(false)}/>}
    {isAdmin&&editEvent&&<EventForm event={editEvent} onSave={saveEvent} onCancel={()=>setEditEvent(null)}/>}

    {/* ইভেন্ট তালিকা */}
    {filteredEvents.length===0?(
      <Card><div style={{textAlign:"center",color:C.mu,padding:24,fontSize:13}}>
        {viewMode==="upcoming"?"কোনো আসন্ন ইভেন্ট নেই।":viewMode==="my"?"আপনার জন্য কোনো ইভেন্ট নেই।":"কোনো ইভেন্ট নেই।"}
        {isAdmin&&<div style={{fontSize:11,marginTop:4}}>উপরে ＋ বোতামে ক্লিক করে নতুন ইভেন্ট তৈরি করুন।</div>}
      </div></Card>
    ):(
      filteredEvents.map(evt=>(
        <UpcomingEventCard
          key={evt.id}
          event={evt}
          dlSubmissions={dlSubmissions}
          setDlSubmissions={setDlSubmissions}
          isAdmin={isAdmin}
          currentUser={currentUser}
          onEdit={(e)=>{setEditEvent(e);setShowForm(false);}}
          onDelete={deleteEvent}
        />
      ))
    )}
  </div>);
}

const DL_TYPES=[
  {id:"lesson_plan", label:"লেসন প্ল্যান জমা", emoji:"📚", color:"#5344b5"},
  {id:"exam_script", label:"পরীক্ষার খাতা জমা", emoji:"📝", color:"#0f6e56"},
  {id:"question",    label:"প্রশ্নপত্র জমা",    emoji:"❓", color:"#993c1d"},
  {id:"marks",       label:"নম্বর এন্ট্রি জমা",  emoji:"🔢", color:"#854f0b"},
  {id:"other",       label:"অন্যান্য",            emoji:"📋", color:"#6b6b8a"},
];

function dlTypeInfo(id){return DL_TYPES.find(d=>d.id===id)||DL_TYPES[4];}

// deadline status: upcoming / due_today / overdue / completed
function dlStatus(deadline, dlSubmissions){
  const key=deadline.id;
  const subs=dlSubmissions[key]||{};
  const today=new Date(); today.setHours(0,0,0,0);
  const due=new Date(deadline.dueDate); due.setHours(0,0,0,0);
  const diff=Math.round((due-today)/(1000*60*60*24));

  const targetTeachers=deadline.teachers&&deadline.teachers.length>0?deadline.teachers:TEACHERS;
  const totalTargets=targetTeachers.length;
  const submittedCount=targetTeachers.filter(t=>subs[t]==="done").length;
  const allDone=submittedCount===totalTargets;

  if(allDone)return{status:"completed",diff,submittedCount,totalTargets,color:C.gr,label:"সম্পন্ন"};
  if(diff<0)return{status:"overdue",diff,submittedCount,totalTargets,color:C.re,label:`${Math.abs(diff)} দিন অতিক্রান্ত`};
  if(diff===0)return{status:"due_today",diff,submittedCount,totalTargets,color:C.co,label:"আজই ডেডলাইন"};
  if(diff<=3)return{status:"urgent",diff,submittedCount,totalTargets,color:C.am,label:`${diff} দিন বাকি`};
  return{status:"upcoming",diff,submittedCount,totalTargets,color:C.pu,label:`${diff} দিন বাকি`};
}

// KPI penalty হিসাব: কোনো শিক্ষক কতটি deadline miss করেছেন
function calcDeadlinePenalty(teacher, deadlines, dlSubmissions){
  let missed=0, total=0;
  const today=new Date(); today.setHours(0,0,0,0);
  deadlines.forEach(dl=>{
    const targetTeachers=dl.teachers&&dl.teachers.length>0?dl.teachers:TEACHERS;
    if(!targetTeachers.includes(teacher))return;
    const due=new Date(dl.dueDate); due.setHours(0,0,0,0);
    if(due>=today)return; // ভবিষ্যতের deadline গোনে না
    total++;
    const subs=dlSubmissions[dl.id]||{};
    if(subs[teacher]!=="done")missed++;
  });
  return{missed,total,rate:total?Math.round((total-missed)/total*100):100};
}

// ★★★ মাসিক পূর্ণাঙ্গ রিপোর্ট — ডেটা গণনা ★★★
// একটা নির্দিষ্ট মাসের (year, month — 0-indexed) জন্য, এবং সেই মাসের কতদিন পর্যন্ত (uptoDate)
// তার ভিত্তিতে সব ধরনের অ্যাগ্রিগেট (KPI, উপস্থিতি, ফলাফল-বিশ্লেষণ, লেসন প্ল্যান, ডেডলাইন,
// পর্যবেক্ষণ) একসাথে গণনা করে। এই একই ফাংশন গত কয়েক মাসের সংক্ষিপ্ত ট্রেন্ড বের করতেও
// ব্যবহৃত হয় (শুধু পূর্ণ মাস, uptoDate=মাসের শেষ দিন দিয়ে কল করে)।
// ══════════════════════════════════════════════
function stdDevPct(arr){
  if(arr.length<2)return 0;
  const avg=arr.reduce((a,b)=>a+b,0)/arr.length;
  const variance=arr.reduce((a,b)=>a+Math.pow(b-avg,2),0)/arr.length;
  return Math.round(Math.sqrt(variance));
}
const TEACHER_RANK_SHRINK_K=5; // এই সংখ্যক ফলাফল-এন্ট্রি থাকলে শিক্ষকের KPI র‍্যাংকে "পূর্ণ আস্থা" ধরা হবে

function computeMonthlyReportData(allRes, lessonPlans, obsData, deadlines, dlSubmissions, examSchedule, teacherSubjects, STUDENTS, year, month, uptoDate, period="monthly"){
  const inRange=(dateStr)=>{
    if(!dateStr)return false;
    const d=new Date(dateStr);
    if(isNaN(d.getTime()))return false;
    if(d.getFullYear()!==year)return false;
    if(period==="monthly"&&d.getMonth()!==month)return false; // yearly হলে মাস-নির্বিশেষে পুরো বছর
    if(uptoDate&&d>uptoDate)return false;
    return true;
  };

  const monthRes=allRes.filter(r=>inRange(r.savedAt||r.examDate));
  const validRes=monthRes.filter(r=>!r.absent&&r.marks!=null);
  const pct=r=>Math.round((r.marks/(r.fullMarks||100))*1000)/10;

  // ── সামগ্রিক ফলাফল ──
  const overallAvg=validRes.length?Math.round(validRes.reduce((a,r)=>a+pct(r),0)/validRes.length*10)/10:0;
  const overallPass=validRes.length?Math.round(validRes.filter(r=>r.marks>=(r.passMarks||33)).length/validRes.length*100):0;
  let aPlusCount=0,fCount=0;
  validRes.forEach(r=>{const[g]=getGrade(r.marks,r.fullMarks||100,r.passMarks||33);if(g==="A+")aPlusCount++;if(g==="F")fCount++;});

  // ── শ্রেণিভিত্তিক বিশ্লেষণ ──
  const classBreakdown=Object.keys(STUDENTS||{}).map(cls=>{
    const rows=validRes.filter(r=>r.cls===cls);
    if(!rows.length)return{cls,count:0,avg:null,pass:null,gradeCounts:{}};
    const avg=Math.round(rows.reduce((a,r)=>a+pct(r),0)/rows.length*10)/10;
    const pass=Math.round(rows.filter(r=>r.marks>=(r.passMarks||33)).length/rows.length*100);
    const gradeCounts={};
    rows.forEach(r=>{const[g]=getGrade(r.marks,r.fullMarks||100,r.passMarks||33);gradeCounts[g]=(gradeCounts[g]||0)+1;});
    return{cls,count:rows.length,avg,pass,gradeCounts};
  });

  // ── বিষয়ভিত্তিক দুর্বলতা বিশ্লেষণ ──
  const subjMap={};
  validRes.forEach(r=>{const key=r.subject||"অজানা";(subjMap[key]=subjMap[key]||[]).push({pct:pct(r),pass:r.marks>=(r.passMarks||33)});});
  const subjectBreakdown=Object.entries(subjMap).map(([subject,rows])=>{
    const avg=Math.round(rows.reduce((a,r)=>a+r.pct,0)/rows.length*10)/10;
    const pass=Math.round(rows.filter(r=>r.pass).length/rows.length*100);
    return{subject,avg,pass,count:rows.length,dev:stdDevPct(rows.map(r=>r.pct))};
  }).sort((a,b)=>a.avg-b.avg);

  // ── শ্রেণি–বিষয় ক্রস ম্যাট্রিক্স ──
  const subjectsUsed=Object.keys(subjMap);
  const crossMatrix=Object.keys(STUDENTS||{}).map(cls=>{
    const row={cls};
    subjectsUsed.forEach(subject=>{
      const rows=validRes.filter(r=>r.cls===cls&&r.subject===subject);
      row[subject]=rows.length?Math.round(rows.reduce((a,r)=>a+pct(r),0)/rows.length):null;
    });
    return row;
  });

  // ── ঝুঁকিপূর্ণ শিক্ষার্থী (F গ্রেড আছে এমন) ──
  const studentMap={};
  validRes.forEach(r=>{
    const key=`${r.name}__${r.cls}`;
    (studentMap[key]=studentMap[key]||{name:r.name,cls:r.cls,subjects:[]}).subjects.push({subject:r.subject,pct:pct(r)});
  });
  const atRiskStudents=Object.values(studentMap)
    .map(s=>({...s,weak:s.subjects.filter(x=>x.pct<33),avg:Math.round(s.subjects.reduce((a,x)=>a+x.pct,0)/s.subjects.length)}))
    .filter(s=>s.weak.length>0)
    .sort((a,b)=>a.avg-b.avg);

  // ── KPI র‍্যাংকিং (এই মাসের ডেটা দিয়ে) ──
  const monthLPs={
    _v2:(lessonPlans._v2||[]).filter(p=>inRange(p.submittedAt)||inRange(p.reviewedAt)),
    ...Object.fromEntries(Object.entries(lessonPlans||{}).filter(([k])=>k!=="_v2")),
  };
  const monthObsData={...obsData,peerObservations:(obsData.peerObservations||[]).filter(o=>inRange(o.dateISO))};
  const kpiScored=TEACHERS.filter(t=>!ADMIN_TEACHERS.includes(t))
    .map(t=>({teacher:t,...calcKPI(t,monthRes,monthLPs,monthObsData,deadlines,dlSubmissions,examSchedule,teacherSubjects)}))
    .filter(k=>k.score>0);
  // ── dense/joint rank + confidence (কম ডেটা থাকলে র‍্যাংকের নির্ভরযোগ্যতা কম) ──
  const kpiRanking=denseRank(kpiScored,"score").map(k=>({...k,rank:k._rank,total:k._total,confidence:Math.min(1,k.count/TEACHER_RANK_SHRINK_K)}));

  // ── উপস্থিতি (প্রতি শিক্ষক) ──
  const attendanceReport=TEACHERS.filter(t=>!ADMIN_TEACHERS.includes(t)).map(t=>{
    const att=((obsData[t]||{}).attendance||[]).filter(a=>inRange(a.isoDate));
    const leave=att.filter(a=>a.status==="leave").length;
    const workDays=att.length-leave;
    const present=att.filter(a=>a.status==="present").length;
    const late=att.filter(a=>a.status==="late").length;
    const rate=workDays?Math.round(((present+late*0.5)/workDays)*100):null;
    return{teacher:t,workDays,present,late,leave,rate};
  }).filter(r=>r.workDays>0);

  // ── লেসন প্ল্যান ও ডেডলাইন সম্মতি (প্রতি শিক্ষক) ──
  const lpDeadlineReport=TEACHERS.filter(t=>!ADMIN_TEACHERS.includes(t)).map(t=>{
    const mine=(lessonPlans._v2||[]).filter(p=>p.teacher===t&&inRange(p.submittedAt));
    const approved=mine.filter(p=>p.status===LP_STATUS.APPROVED).length;
    const returned=mine.filter(p=>p.status===LP_STATUS.REVISION).length;
    const rangeDeadlines=(deadlines||[]).filter(dl=>{
      const targetTeachers=dl.teachers&&dl.teachers.length>0?dl.teachers:TEACHERS;
      if(!targetTeachers.includes(t))return false;
      const due=new Date(dl.dueDate);
      if(due.getFullYear()!==year)return false;
      if(period==="monthly"&&due.getMonth()!==month)return false;
      return !uptoDate||due<=uptoDate;
    });
    const missed=rangeDeadlines.filter(dl=>((dlSubmissions[dl.id]||{})[t])!=="done").length;
    return{teacher:t,submitted:mine.length,approved,returned,dlTotal:rangeDeadlines.length,dlMissed:missed};
  });

  // ── পিয়ার পর্যবেক্ষণ সারাংশ ──
  const peerObsInRange=(obsData.peerObservations||[]).filter(o=>inRange(o.dateISO));
  const observersSet=new Set(peerObsInRange.map(o=>o.observerTeacher));
  const nonObservers=TEACHERS.filter(t=>!ADMIN_TEACHERS.includes(t)&&!observersSet.has(t));
  const peerObsAvg=peerObsInRange.length?Math.round(peerObsInRange.reduce((a,o)=>a+o.totalScore,0)/peerObsInRange.length):null;

  return{
    period:{year,month,type:period},
    validCount:validRes.length,
    overallAvg,overallPass,aPlusCount,fCount,
    classBreakdown,subjectBreakdown,crossMatrix,subjectsUsed,
    atRiskStudents,
    kpiRanking,attendanceReport,lpDeadlineReport,
    peerObsCount:peerObsInRange.length,peerObsAvg,nonObservers,
  };
}

/* ══════════════════════════════════════════════
   ★★★ MONTHLY REPORT — মাসিক পূর্ণাঙ্গ প্রতিষ্ঠানিক প্রতিবেদন (PDF) ★★★
   অ্যাডমিন-দের জন্য (Sabbir/Rubel/Sayed)। যেকোনো দিন ডাউনলোড করলে সেই মাসের ১ তারিখ থেকে
   সেদিন পর্যন্ত ডেটা দেখাবে; আগের মাস বেছে নিলে পুরো মাসের ডেটা দেখাবে। "PDF ডাউনলোড করুন"
   বাটন ব্রাউজারের প্রিন্ট ডায়ালগ খোলে (Save as PDF) — বাংলা টেক্সট নিখুঁত থাকে, কোনো বাড়তি
   লাইব্রেরির প্রয়োজন হয় না।
══════════════════════════════════════════════ */
const MONTH_NAMES_BN=["জানুয়ারি","ফেব্রুয়ারি","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টেম্বর","অক্টোবর","নভেম্বর","ডিসেম্বর"];
const HEAT_COLOR=(v)=>{
  if(v==null)return{bg:"#ddd",fg:"#888"};
  if(v>=70)return{bg:"#1e6b3a",fg:"#fff"};
  if(v>=60)return{bg:"#4d8f3a",fg:"#fff"};
  if(v>=50)return{bg:"#a3a53a",fg:"#fff"};
  if(v>=40)return{bg:"#c98a2e",fg:"#fff"};
  if(v>=33)return{bg:"#a35a00",fg:"#fff"};
  return{bg:"#a32d2d",fg:"#fff"};
};

function MonthlyReport({results,lessonPlans,obsData,deadlines,dlSubmissions,examSchedule,teacherSubjects,STUDENTS,currentUser,onClose}){
  STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const allRes=useMemo(()=>Object.values(results||{}).flat(),[results]);
  const now=new Date();

  const [reportPeriod,setReportPeriod]=useState("monthly"); // "monthly" | "yearly"

  // ── মাস নির্বাচন: ডিফল্ট চলতি মাস (আজ পর্যন্ত), বা গত ১১ মাসের যেকোনো একটি (পূর্ণ মাস) ──
  const monthOptions=useMemo(()=>{
    const opts=[];
    for(let i=0;i<12;i++){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);
      opts.push({year:d.getFullYear(),month:d.getMonth(),label:`${MONTH_NAMES_BN[d.getMonth()]} ${d.getFullYear()}`});
    }
    return opts;
  },[]);
  // ── বছর নির্বাচন: চলতি বছর + গত ২ বছর ──
  const yearOptions=useMemo(()=>[now.getFullYear(),now.getFullYear()-1,now.getFullYear()-2],[]);
  const [selYearIdx,setSelYearIdx]=useState(0);
  const selYear=yearOptions[selYearIdx];
  const isCurrentYear=selYearIdx===0;

  const [selIdx,setSelIdx]=useState(0);
  const sel=monthOptions[selIdx];
  const isCurrentMonth=selIdx===0;
  const uptoDate=reportPeriod==="monthly"
    ?(isCurrentMonth?now:new Date(sel.year,sel.month+1,0,23,59,59))
    :(isCurrentYear?now:new Date(selYear,11,31,23,59,59));
  const periodLabel=reportPeriod==="monthly"
    ?(isCurrentMonth?`১ ${MONTH_NAMES_BN[sel.month]} – ${now.toLocaleDateString("bn-BD")}`:`১ – ${new Date(sel.year,sel.month+1,0).getDate()} ${MONTH_NAMES_BN[sel.month]}, ${sel.year}`)
    :(isCurrentYear?`১ জানুয়ারি – ${now.toLocaleDateString("bn-BD")}, ${selYear}`:`পুরো শিক্ষাবর্ষ ${selYear}`);

  const data=useMemo(()=>computeMonthlyReportData(
    allRes,lessonPlans,obsData,deadlines,dlSubmissions,examSchedule,teacherSubjects,STUDENTS,
    reportPeriod==="monthly"?sel.year:selYear, reportPeriod==="monthly"?sel.month:0, uptoDate, reportPeriod
  ),[allRes,lessonPlans,obsData,deadlines,dlSubmissions,examSchedule,teacherSubjects,STUDENTS,sel.year,sel.month,selYear,reportPeriod]);


  // ── ট্রেন্ড: এই মাস + আগের ২ পূর্ণ মাস ──
  const trendMonths=useMemo(()=>{
    return[2,1,0].map(back=>{
      const idx=selIdx+back;
      const m=monthOptions[idx];
      if(!m)return null;
      const isCur=idx===0;
      const upto=isCur?now:new Date(m.year,m.month+1,0,23,59,59);
      const d=computeMonthlyReportData(allRes,lessonPlans,obsData,deadlines,dlSubmissions,examSchedule,teacherSubjects,STUDENTS,m.year,m.month,upto);
      return{label:m.label,...d};
    }).filter(Boolean);
  },[allRes,selIdx]);

  // ── স্বয়ংক্রিয় "বিশেষ দৃষ্টি প্রয়োজন" ফ্ল্যাগ ──
  const flags=useMemo(()=>{
    const out=[];
    data.subjectBreakdown.filter(s=>s.avg<data.overallAvg-10&&s.count>=3).slice(0,3).forEach(s=>{
      out.push({area:"ফলাফল",detail:`"${s.subject}" বিষয়ে গড় (${s.avg}%) সামগ্রিক গড়ের চেয়ে উল্লেখযোগ্যভাবে কম।`});
    });
    data.attendanceReport.filter(a=>a.rate!=null&&a.rate<80).forEach(a=>{
      out.push({area:"উপস্থিতি",detail:`${a.teacher}-এর উপস্থিতির হার (${a.rate}%) প্রত্যাশিত মানের চেয়ে কম।`});
    });
    data.lpDeadlineReport.filter(l=>l.submitted>0||l.dlTotal>0).filter(l=>{
      const rate=l.submitted?Math.round(l.approved/l.submitted*100):100;
      return rate<50||l.dlMissed>=2;
    }).forEach(l=>{
      out.push({area:"লেসন প্ল্যান/ডেডলাইন",detail:`${l.teacher}: ${l.submitted} জমা, ${l.dlMissed} টি ডেডলাইন মিস।`});
    });
    return out.slice(0,8);
  },[data]);

  const trendArrow=(cur,prev)=>{
    if(prev==null||cur==null)return<span style={{color:"#888"}}>—</span>;
    if(cur>prev)return<span style={{color:"#1e6b3a"}}>▲</span>;
    if(cur<prev)return<span style={{color:"#a32d2d"}}>▼</span>;
    return<span style={{color:"#888"}}>—</span>;
  };

  const genTime=now.toLocaleString("bn-BD",{hour:"2-digit",minute:"2-digit"});
  const genDate=now.toLocaleDateString("bn-BD");

  return(<div style={{position:"fixed",inset:0,background:"#e9e9e4",zIndex:9000,overflowY:"auto"}}>
    <style>{`
      @media print{
        body *{visibility:hidden;}
        #mrPrintArea, #mrPrintArea *{visibility:visible;}
        #mrPrintArea{position:absolute;left:0;top:0;width:100%;}
        .mr-toolbar,.mr-picker{display:none!important;}
        @page{size:A4;margin:14mm 12mm;}
      }
      #mrPrintArea table{width:100%;border-collapse:collapse;font-size:11.5px;margin-bottom:6px;}
      #mrPrintArea th{background:#2a2a2a;color:#fff;text-align:left;padding:6px 7px;font-weight:600;font-size:11px;}
      #mrPrintArea td{padding:5px 7px;border-bottom:1px solid #c9c9c9;}
      #mrPrintArea tr:nth-child(even) td{background:#f7f6f2;}
    `}</style>

    <div className="mr-toolbar" style={{maxWidth:820,margin:"0 auto",padding:"16px 16px 0",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
      <button onClick={onClose} style={{padding:"9px 16px",borderRadius:6,border:"1px solid #999",background:"#fff",cursor:"pointer",fontSize:13}}>← ফিরে যান</button>
      <div className="mr-picker" style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{display:"flex",borderRadius:6,overflow:"hidden",border:"1px solid #999"}}>
          {[["monthly","মাসিক"],["yearly","বাৎসরিক"]].map(([p,l])=>(
            <button key={p} onClick={()=>setReportPeriod(p)} style={{padding:"8px 12px",fontSize:12.5,fontWeight:700,border:"none",cursor:"pointer",
              background:reportPeriod===p?"#7a2e2e":"#fff",color:reportPeriod===p?"#fff":"#333"}}>{l}</button>
          ))}
        </div>
        {reportPeriod==="monthly"?(
          <select value={selIdx} onChange={e=>setSelIdx(Number(e.target.value))} style={{padding:"8px 10px",borderRadius:6,fontSize:13}}>
            {monthOptions.map((m,i)=><option key={i} value={i}>{m.label}{i===0?" (চলতি — আজ পর্যন্ত)":""}</option>)}
          </select>
        ):(
          <select value={selYearIdx} onChange={e=>setSelYearIdx(Number(e.target.value))} style={{padding:"8px 10px",borderRadius:6,fontSize:13}}>
            {yearOptions.map((y,i)=><option key={i} value={i}>{y}{i===0?" (চলতি — আজ পর্যন্ত)":""}</option>)}
          </select>
        )}
        <button onClick={()=>window.print()} style={{padding:"11px 20px",borderRadius:6,border:"none",background:"#7a2e2e",color:"#fff",fontWeight:600,fontSize:14,cursor:"pointer",boxShadow:"0 2px 6px rgba(0,0,0,0.15)"}}>📄 PDF ডাউনলোড করুন</button>
      </div>
    </div>

    <div id="mrPrintArea" style={{maxWidth:820,margin:"18px auto 60px",background:"#fdfdfb",padding:"52px 56px 60px",boxShadow:"0 0 0 1px rgba(0,0,0,0.06),0 10px 30px rgba(0,0,0,0.12)",fontFamily:"'Noto Sans Bengali',sans-serif",color:"#1a1a2e"}}>

      {/* লেটারহেড */}
      <div style={{textAlign:"center",borderBottom:"3px double #2a2a2a",paddingBottom:16,marginBottom:22}}>
        <div style={{width:56,height:56,borderRadius:"50%",border:"2px solid #7a2e2e",margin:"0 auto 10px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,color:"#7a2e2e"}}>HP</div>
        <div style={{fontWeight:700,fontSize:26,letterSpacing:0.5,color:"#2a2a2a"}}>Heritage Public School</div>
        <div style={{fontSize:11.5,color:"#5a5a5a",marginTop:3}}>একাডেমিক তত্ত্বাবধান ও শিক্ষক ব্যবস্থাপনা বিভাগ</div>
        <div style={{fontWeight:600,fontSize:17,marginTop:14,color:"#7a2e2e"}}>মাসিক পূর্ণাঙ্গ শিক্ষা কার্যক্রম ও ফলাফল বিশ্লেষণ প্রতিবেদন</div>
        <div style={{fontSize:12,color:"#5a5a5a",marginTop:6,display:"flex",justifyContent:"center",gap:18,flexWrap:"wrap"}}>
          <span><b>প্রতিবেদনকাল:</b> {periodLabel}</span>
          <span><b>প্রস্তুতের তারিখ:</b> {genDate}</span>
          <span><b>প্রস্তুতকারী:</b> {currentUser||"একাডেমিক ইনচার্জ"}</span>
        </div>
      </div>

      <div style={{fontSize:12.3,lineHeight:1.85,textAlign:"justify",marginBottom:8}}>
        এই প্রতিবেদনে <b>{periodLabel}</b> সময়কালে Heritage Public School-এর শিক্ষক কার্যক্রম এবং শিক্ষার্থীদের একাডেমিক ফলাফলের পরিসংখ্যানভিত্তিক বিশ্লেষণ উপস্থাপন করা হয়েছে। তথ্যগুলো HAIS (Heritage Academic Intelligence System)-এ নথিভুক্ত ডেটা থেকে স্বয়ংক্রিয়ভাবে সংগৃহীত ও গণনাকৃত।
      </div>

      {/* ১ নির্বাহী সারসংক্ষেপ */}
      <h2 style={{fontSize:14.5,fontWeight:700,color:"#fff",background:"#2a2a2a",padding:"6px 12px",margin:"26px 0 10px"}}>১। নির্বাহী সারসংক্ষেপ</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:1,background:"#c9c9c9",border:"1px solid #c9c9c9",marginBottom:4}}>
        <SumCell num={`${data.overallAvg}%`} label="সামগ্রিক গড় নম্বর"/>
        <SumCell num={`${data.overallPass}%`} label="সামগ্রিক পাসের হার"/>
        <SumCell num={data.kpiRanking.length?Math.round(data.kpiRanking.reduce((a,k)=>a+k.score,0)/data.kpiRanking.filter(k=>k.score>0).length||0):"—"} label="গড় শিক্ষক KPI স্কোর"/>
        <SumCell num={data.attendanceReport.length?`${Math.round(data.attendanceReport.reduce((a,r)=>a+(r.rate||0),0)/data.attendanceReport.length)}%`:"—"} label="গড় উপস্থিতির হার"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:1,background:"#c9c9c9",border:"1px solid #c9c9c9"}}>
        <SumCell num={data.subjectBreakdown.filter(s=>s.avg<data.overallAvg-10).length} label="সর্বাধিক দুর্বল বিষয় চিহ্নিত"/>
        <SumCell num={data.atRiskStudents.length} label="ঝুঁকিপূর্ণ শিক্ষার্থী (F গ্রেড)"/>
        <SumCell num={data.aPlusCount} label={`A+ প্রাপ্ত (মোট ${data.validCount} এন্ট্রি)`}/>
        <SumCell num={flags.length} label="বিশেষ দৃষ্টি প্রয়োজন এমন ক্ষেত্র"/>
      </div>

      {/* ২ KPI */}
      <h2 style={{fontSize:14.5,fontWeight:700,color:"#fff",background:"#2a2a2a",padding:"6px 12px",margin:"26px 0 10px"}}>২। শিক্ষক KPI র‍্যাংকিং</h2>
      <div style={{fontSize:11,color:"#5a5a5a",margin:"0 0 8px"}}>ℹ️ সমান স্কোর হলে একই ক্রম (যুগ্ম র‍্যাংক) দেখানো হয়। "সীমিত ডেটা" চিহ্নিত এন্ট্রির নির্ভরযোগ্যতা কম, কারণ এই সময়কালে পর্যাপ্ত ফলাফল-এন্ট্রি নেই।</div>
      <table>
        <thead><tr><th style={{width:28}}>ক্রম</th><th>শিক্ষকের নাম</th><th style={{textAlign:"center"}}>স্কোর</th><th style={{textAlign:"center"}}>গ্রেড</th><th style={{textAlign:"center"}}>নির্ভরযোগ্যতা</th></tr></thead>
        <tbody>
          {data.kpiRanking.map(k=>(
            <tr key={k.teacher}>
              <td style={{textAlign:"center",fontWeight:k.rank===1?700:400,color:k.rank===1?"#8a6d00":"inherit"}}>#{k.rank}</td>
              <td>{k.teacher}</td>
              <td style={{textAlign:"center",fontWeight:k.rank===1?700:400}}>{k.score}</td>
              <td style={{textAlign:"center"}}>{k.grade}</td>
              <td style={{textAlign:"center",fontSize:10.5,color:k.confidence<1?"#a35a00":"#1e6b3a"}}>{k.confidence<1?`⚠️ সীমিত (${k.count})`:"পূর্ণ"}</td>
            </tr>
          ))}
        </tbody>
      </table>

      <div style={{pageBreakBefore:"always"}}></div>

      {/* ৩ ফলাফল প্রবণতা */}
      <h2 style={{fontSize:14.5,fontWeight:700,color:"#fff",background:"#2a2a2a",padding:"6px 12px",margin:"26px 0 4px"}}>৩। সামগ্রিক ফলাফল প্রবণতা বিশ্লেষণ</h2>
      <div style={{fontSize:11.5,color:"#5a5a5a",margin:"6px 0 10px"}}>সাম্প্রতিক মাসগুলোর ধারাবাহিক তুলনা।</div>
      <table>
        <thead><tr><th>মাস</th><th style={{textAlign:"center"}}>গড় নম্বর</th><th style={{textAlign:"center"}}>পাসের হার</th><th style={{textAlign:"center"}}>A+ প্রাপ্ত</th><th style={{textAlign:"center"}}>F প্রাপ্ত</th></tr></thead>
        <tbody>
          {trendMonths.map((m,i)=>(
            <tr key={i}>
              <td style={i===trendMonths.length-1?{fontWeight:700}:{}}>{m.label}{i===trendMonths.length-1?" (চলতি)":""}</td>
              <td style={{textAlign:"center"}}>{m.overallAvg}% {i>0&&trendArrow(m.overallAvg,trendMonths[i-1].overallAvg)}</td>
              <td style={{textAlign:"center"}}>{m.overallPass}% {i>0&&trendArrow(m.overallPass,trendMonths[i-1].overallPass)}</td>
              <td style={{textAlign:"center"}}>{m.aPlusCount}</td>
              <td style={{textAlign:"center",color:m.fCount>0?"#a32d2d":"inherit",fontWeight:m.fCount>0?700:400}}>{m.fCount}</td>
            </tr>
          ))}
        </tbody>
      </table>

      {/* ৪ শ্রেণিভিত্তিক */}
      <h2 style={{fontSize:14.5,fontWeight:700,color:"#fff",background:"#2a2a2a",padding:"6px 12px",margin:"26px 0 10px"}}>৪। শ্রেণিভিত্তিক ফলাফল বিশ্লেষণ</h2>
      <table>
        <thead><tr><th>শ্রেণি</th><th style={{textAlign:"center"}}>এন্ট্রি</th><th style={{textAlign:"center"}}>গড় নম্বর</th><th style={{textAlign:"center"}}>পাসের হার</th><th style={{textAlign:"center"}}>A+/A</th><th style={{textAlign:"center"}}>B/C</th><th style={{textAlign:"center"}}>D/F</th></tr></thead>
        <tbody>
          {data.classBreakdown.map(c=>{
            const gc=c.gradeCounts||{};
            const good=(gc["A+"]||0)+(gc["A"]||0);
            const mid=(gc["A-"]||0)+(gc["B"]||0)+(gc["C"]||0);
            const low=(gc["D"]||0)+(gc["F"]||0);
            return(<tr key={c.cls}>
              <td>{c.cls}</td>
              <td style={{textAlign:"center"}}>{c.count}</td>
              <td style={{textAlign:"center"}}>{c.avg==null?"—":c.avg+"%"}</td>
              <td style={{textAlign:"center",color:c.pass!=null&&c.pass<70?"#a35a00":"inherit",fontWeight:c.pass!=null&&c.pass<70?700:400}}>{c.pass==null?"—":c.pass+"%"}</td>
