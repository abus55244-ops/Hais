                // ছাত্রের class খোঁজো
                let stCls="";
                Object.entries(DEFAULT_STUDENTS).forEach(([c,names])=>{if(names.includes(name))stCls=c;});
                return(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:`1px solid ${C.bd}`}}>
                    <div>
                      <span style={{fontSize:12,fontWeight:600}}>{name}</span>
                      {stCls&&<span style={{fontSize:10,color:C.mu}}> • শ্রেণি {stCls}</span>}
                    </div>
                    <div style={{fontWeight:700,color:count>=5?C.re:count>=3?C.am:C.mu,fontSize:13}}>{count}বার</div>
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      );
    })()}

    {/* সাম্প্রতিক কার্যক্রম */}
    {(allRes.length>0||Object.values(lessonPlans).flat().length>0)&&(
      <Card>
        <H3>🕐 সাম্প্রতিক কার্যক্রম</H3>
        {allRes.slice(-5).reverse().map((r,i)=>{
          const[g,gc]=getGrade(r.marks, r.fullMarks||100, r.passMarks||33);
          return(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.bd}`}}>
              <div>
                <div style={{fontSize:12,fontWeight:600}}>{r.name}</div>
                <div style={{fontSize:11,color:C.mu}}>{r.subject} • {r.examType} • শ্রেণি {r.cls}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:700,color:gc,fontSize:14}}>{r.marks}</div>
                {badge(gc,g)}
              </div>
            </div>
          );
        })}
        {Object.values(lessonPlans).flat().slice(-3).reverse().map((p,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.bd}`}}>
            <div>
              <div style={{fontSize:12,fontWeight:600}}>📚 {p.topic}</div>
              <div style={{fontSize:11,color:C.mu}}>{p.teacher} • শ্রেণি {p.cls} • {p.subject}</div>
            </div>
            {badge(C.te,p.week)}
          </div>
        ))}
      </Card>
    )}

    {/* ── ড্যাশবোর্ড থেকে প্রোফাইল পপআপ ── */}
    {dashProfile&&dashProfile.type==="teacher"&&(
      <TeacherProfile name={dashProfile.name} results={results} lessonPlans={lessonPlans} obsData={obsData} onClose={()=>setDashProfile(null)} deadlines={deadlines} dlSubmissions={dlSubmissions} examSchedule={examSchedule} teacherSubjects={teacherSubjects}/>
    )}
    {dashProfile&&dashProfile.type==="student"&&(
      <StudentProfile name={dashProfile.name} cls={dashProfile.cls} results={results} onClose={()=>setDashProfile(null)} studentProfiles={studentProfiles} setStudentProfiles={setStudentProfiles} studentDepartments={studentDepartments} currentUser={currentUser} obsData={obsData}/>
    )}
  </div>);
}

/* ══ STUDENTS ══ */
function SubjectMiniBar({pct,color}){
  return(<div style={{display:"flex",alignItems:"center",gap:5,marginTop:3}}>
    <div style={{flex:1,height:7,background:"#eee",borderRadius:4,overflow:"hidden"}}>
      <div style={{width:`${Math.min(pct,100)}%`,height:"100%",background:color,borderRadius:4,transition:"width 0.4s"}}/>
    </div>
    <span style={{fontSize:10,fontWeight:700,color,minWidth:30}}>{pct}%</span>
  </div>);
}

function SubjectSparkLine({points,color=C.pu}){
  if(!points||points.length<2)return(<div style={{fontSize:10,color:C.mu,textAlign:"center",padding:"4px 0"}}>একটিমাত্র পরীক্ষা</div>);
  const W=150,H=36;
  const vals=points.map(p=>p.v);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const range=mx-mn||1;
  const px=(i)=>Math.round((i/(points.length-1))*(W-12))+6;
  const py=(v)=>Math.round(H-4-((v-mn)/range)*(H-10));
  const path=points.map((p,i)=>`${i===0?"M":"L"}${px(i)},${py(p.v)}`).join(" ");
  const trend=vals[vals.length-1]-vals[0];
  return(<div>
    <svg width={W} height={H+16} style={{display:"block",overflow:"visible"}}>
      <path d={path} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round"/>
      {points.map((p,i)=>(
        <g key={i}>
          <circle cx={px(i)} cy={py(p.v)} r={3} fill={color}/>
          <text x={px(i)} y={py(p.v)-5} textAnchor="middle" fontSize={8} fill={color} fontWeight={700}>{p.v}</text>
          <text x={px(i)} y={H+14} textAnchor="middle" fontSize={7} fill={C.mu}>{p.label}</text>
        </g>
      ))}
    </svg>
    <div style={{fontSize:9,fontWeight:700,color:trend>=0?C.gr:C.re,textAlign:"right",marginTop:-2}}>
      {trend>=0?"▲":"▼"} {Math.abs(trend)}
    </div>
  </div>);
}

function StudentProfile({name,cls,results,onClose,studentProfiles,setStudentProfiles,studentDepartments={},currentUser,obsData={}}){
  const [tab,setTab]=useState("subject");
  const [rankPeriod,setRankPeriod]=useState("yearly"); // "monthly" | "yearly"
  const allRes=Object.values(results).flat();
  const sr=allRes.filter(r=>r.name===name);
  const profile=studentProfiles?.[name]||{};
  const updateProfile=(field,val)=>{
    if(!setStudentProfiles)return;
    setStudentProfiles(prev=>{
      const updated={...(prev[name]||{}),[field]:val};
      fbSaveStudentProfile(name,updated); // granular Firebase write
      return{...prev,[name]:updated};
    });
  };
  const srP=sr.filter(r=>!r.absent);
  const pass=srP.filter(r=>r.marks>=(r.passMarks||33)).length;
  const avgPct=srP.length?Math.round(srP.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/srP.length):0;
  const fail=srP.length-pass;
  const [,gc]=getGrade(avgPct,100,33);

  // বিষয়ভিত্তিক পরিসংখ্যান
  const subjectStats=SUBJECTS.map(sub=>{
    const subR=srP.filter(r=>r.subject===sub&&r.marks!=null);
    if(!subR.length)return null;
    const avgM=Math.round(subR.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/subR.length);
    const bestM=subR.reduce((a,b)=>((b.marks/(b.fullMarks||100))>(a.marks/(a.fullMarks||100)))?b:a);
    const worstM=subR.reduce((a,b)=>((b.marks/(b.fullMarks||100))<(a.marks/(a.fullMarks||100)))?b:a);
    const subPass=subR.filter(r=>r.marks>=(r.passMarks||33)).length;
    const [,subGC]=getGrade(avgM,100,33);
    const sorted=[...subR].sort((a,b)=>(a.examOrder||1)-(b.examOrder||1));
    const sparkPts=sorted.map(r=>({label:r.examType.split(" ")[0],v:Math.round(r.marks/(r.fullMarks||100)*100)}));
    const trend=sparkPts.length>=2?sparkPts[sparkPts.length-1].v-sparkPts[0].v:null;
    return{sub,subR,avgM,bestM,worstM,subPass,subGC,sparkPts,trend,count:subR.length};
  }).filter(Boolean);

  const bestSubject=subjectStats.length?[...subjectStats].sort((a,b)=>b.avgM-a.avgM)[0]:null;
  const worstSubject=subjectStats.length?[...subjectStats].sort((a,b)=>a.avgM-b.avgM)[0]:null;

  // ── শ্রেণি র‍্যাংক (raw%) ও স্কুল র‍্যাংক (SPI, cohort-normalized) — মাসিক/বাৎসরিক টগল-সহ ──
  const rankInfo=useMemo(()=>{
    const {byKey}=computeStudentRankings(allRes,studentDepartments,rankPeriod,new Date());
    const rec=byKey[name+"||"+cls];
    if(!rec)return null;
    const dept=GROUP_CLASSES.includes(cls)?(studentDepartments[name]||null):null;
    return{
      classRank:rec.classRank,classTotal:rec.classTotal,
      schoolRank:rec.schoolRank,schoolTotal:rec.schoolTotal,
      confidence:rec.confidence,examCount:rec.count,cohortN:rec.cohortN,dept,
    };
  },[allRes,name,cls,studentDepartments,rankPeriod]);

  return(
    <Portal>
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:12}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:460,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 12px 40px rgba(83,68,181,0.18)"}} onClick={e=>e.stopPropagation()}>

        {/* হেডার ব্যানার */}
        <div style={{background:"linear-gradient(135deg,#5344b5,#7c3aed)",padding:"16px 18px 14px",borderRadius:"16px 16px 0 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontWeight:700,fontSize:17,color:"#fff",letterSpacing:0.3}}>{name}</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.75)",marginTop:3,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span>শ্রেণি {cls} • {srP.length}টি পরীক্ষা</span>
                {(()=>{
                  const allResFlat=Object.values(results).flat();
                  const lvl=getStudentPerfLevel(name,allResFlat);
                  if(!lvl)return null;
                  const cfg={
                    good:{label:"✅ ভালো",bg:"rgba(74,222,128,0.25)",border:"rgba(74,222,128,0.6)"},
                    avg: {label:"🟡 মধ্যম",bg:"rgba(251,191,36,0.25)",border:"rgba(251,191,36,0.6)"},
                    weak:{label:"🔴 দুর্বল",bg:"rgba(248,113,113,0.25)",border:"rgba(248,113,113,0.6)"}
                  }[lvl];
                  return(
                    <span style={{fontSize:11,fontWeight:700,padding:"2px 10px",borderRadius:20,
                      background:cfg.bg,border:`1px solid ${cfg.border}`,color:"#fff"}}>
                      {cfg.label}
                    </span>
                  );
                })()}
              </div>
            </div>
            <button onClick={onClose} style={{border:"none",background:"rgba(255,255,255,0.2)",color:"#fff",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontWeight:700,fontSize:14}}>✕</button>
          </div>
          {/* সামারি স্ট্যাট */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginTop:12}}>
            {[
              {l:"গড় %",v:avgPct?`${avgPct}%`:"—",c:gc},
              {l:"পাস",v:pass,c:"#4ade80"},
              {l:"ফেল",v:fail,c:fail>0?"#f87171":"rgba(255,255,255,0.5)"},
              {l:"বিষয়",v:subjectStats.length,c:"#c4b5fd"},
            ].map(({l,v,c})=>(
              <div key={l} style={{background:"rgba(255,255,255,0.12)",borderRadius:8,padding:"6px 4px",textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:700,color:c}}>{v}</div>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.7)",marginTop:1}}>{l}</div>
              </div>
            ))}
          </div>
          {/* র‍্যাংক ব্যাজ: শ্রেণি র‍্যাংক (raw%) ও স্কুল র‍্যাংক (SPI, cohort-normalized) — মাসিক/বাৎসরিক */}
          {rankInfo&&(<>
            <div style={{display:"flex",gap:4,marginTop:10}}>
              {[["monthly","এই মাস"],["yearly","এই বছর"]].map(([p,l])=>(
                <button key={p} onClick={()=>setRankPeriod(p)} style={{flex:1,fontSize:10.5,fontWeight:700,padding:"4px 0",borderRadius:7,cursor:"pointer",
                  border:"1px solid rgba(255,255,255,0.35)",background:rankPeriod===p?"rgba(255,255,255,0.9)":"transparent",color:rankPeriod===p?C.pu:"#fff"}}>{l}</button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:6}}>
              {[
                {label:"শ্রেণি র‍্যাংক",sub:"(raw %, একই শ্রেণির মধ্যে)",rank:rankInfo.classRank,total:rankInfo.classTotal},
                {label:"স্কুল র‍্যাংক",sub:rankInfo.dept?`(SPI • ${rankInfo.dept})`:"(SPI • normalized)",rank:rankInfo.schoolRank,total:rankInfo.schoolTotal},
              ].map(({label,sub,rank,total})=>{
                const medal=rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":"🏅";
                return(
                  <div key={label} style={{background:"rgba(255,255,255,0.16)",borderRadius:8,padding:"6px 8px",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:16}}>{medal}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:800,color:"#fff"}}>{rank}<span style={{fontSize:10,fontWeight:500,color:"rgba(255,255,255,0.7)"}}>/{total}</span></div>
                      <div style={{fontSize:8.5,color:"rgba(255,255,255,0.75)"}}>{label}</div>
                      <div style={{fontSize:7.5,color:"rgba(255,255,255,0.55)"}}>{sub}</div>
                    </div>
                  </div>
                );
              })}
            </div>
            {rankInfo.confidence<1&&(
              <div style={{marginTop:6,fontSize:9.5,color:"rgba(255,255,255,0.85)",background:"rgba(0,0,0,0.15)",borderRadius:6,padding:"4px 8px"}}>
                ⚠️ সীমিত ডেটা — এই সময়কালে মাত্র {rankInfo.examCount}টি পরীক্ষার ফলাফল আছে, তাই এই র‍্যাংকের নির্ভরযোগ্যতা কম।
              </div>
            )}
            {GROUP_CLASSES.includes(cls)&&!rankInfo.dept&&(
              <div style={{marginTop:6,fontSize:9.5,color:"rgba(255,255,255,0.85)",background:"rgba(0,0,0,0.15)",borderRadius:6,padding:"4px 8px"}}>
                ℹ️ এই ছাত্রের বিভাগ (বিজ্ঞান/মানবিক/ব্যবসায় শিক্ষা) নির্ধারিত নেই, তাই "অবিভাজিত" গ্রুপে র‍্যাংক করা হয়েছে — Students পেজ থেকে বিভাগ নির্ধারণ করুন।
              </div>
            )}
          </>)}
        </div>

        {/* ট্যাব নেভ */}
        <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.bd}`,background:"#fafafa",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          {[{id:"subject",label:"📚 বিষয়"},{id:"list",label:"📋 তালিকা"},{id:"trend",label:"📈 ট্রেন্ড"},{id:"progress",label:"🎯 প্রগতি"},{id:"behavior",label:"⭐ আচরণ"},{id:"target",label:"🏹 লক্ষ্যমাত্রা"},{id:"contact",label:"📞 যোগাযোগ"},{id:"lowscore",label:"⚠️ কম নম্বরের কারণ"},{id:"homework",label:"📕 পড়া করে আসেনি"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flexShrink:0,padding:"9px 8px",border:"none",borderBottom:tab===t.id?`3px solid ${C.pu}`:"3px solid transparent",background:"transparent",color:tab===t.id?C.pu:C.mu,cursor:"pointer",fontWeight:tab===t.id?700:400,fontSize:10,transition:"all 0.2s",whiteSpace:"nowrap"}}>
              {t.label}
            </button>
          ))}
        </div>

        <div style={{padding:"14px 16px"}}>

          {/* ট্যাব ১: বিষয়ভিত্তিক বিশ্লেষণ */}
          {tab==="subject"&&(<div>
            {/* সেরা ও দুর্বল বিষয় */}
            {bestSubject&&worstSubject&&bestSubject.sub!==worstSubject.sub&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                <div style={{background:C.grL,border:`1px solid ${C.gr}30`,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
                  <div style={{fontSize:18}}>🏆</div>
                  <div style={{fontSize:10,color:C.gr,fontWeight:700,marginTop:2}}>সেরা বিষয়</div>
                  <div style={{fontWeight:700,fontSize:13,color:C.gr,marginTop:2}}>{bestSubject.sub}</div>
                  <div style={{fontSize:12,color:C.mu}}>{bestSubject.avgM}% গড়</div>
                </div>
                <div style={{background:C.reL,border:`1px solid ${C.re}30`,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
                  <div style={{fontSize:18}}>⚠️</div>
                  <div style={{fontSize:10,color:C.re,fontWeight:700,marginTop:2}}>দুর্বল বিষয়</div>
                  <div style={{fontWeight:700,fontSize:13,color:C.re,marginTop:2}}>{worstSubject.sub}</div>
                  <div style={{fontSize:12,color:C.mu}}>{worstSubject.avgM}% গড়</div>
                </div>
              </div>
            )}

            {/* বিষয়ভিত্তিক কার্ড */}
            {subjectStats.length===0?(
              <div style={{textAlign:"center",color:C.mu,padding:20,fontSize:13}}>এখনো কোনো ফলাফল নেই</div>
            ):(
              <div>
                {/* বিষয়ভিত্তিক র‍্যাঙ্কিং বার চার্ট */}
                <div style={{marginBottom:14,padding:"10px 12px",background:"#f8f7ff",borderRadius:10,border:`1px solid ${C.pu}15`}}>
                  <div style={{fontWeight:700,fontSize:12,color:C.pu,marginBottom:10}}>বিষয়ভিত্তিক গড় % তুলনা</div>
                  {[...subjectStats].sort((a,b)=>b.avgM-a.avgM).map(({sub,avgM,subGC})=>(
                    <div key={sub} style={{marginBottom:7}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                        <span style={{fontSize:11,fontWeight:600,color:C.tx}}>{sub}</span>
                        <span style={{fontSize:11,fontWeight:700,color:subGC}}>{avgM}%</span>
                      </div>
                      <SubjectMiniBar pct={avgM} color={subGC}/>
                    </div>
                  ))}
                </div>

                {/* প্রতিটি বিষয়ের বিস্তারিত কার্ড */}
                {subjectStats.map(({sub,subR,avgM,bestM,worstM,subPass,subGC,sparkPts,trend,count})=>{
                  const passColor=subPass===count?C.gr:subPass>0?C.am:C.re;
                  return(<div key={sub} style={{marginBottom:10,borderRadius:10,border:`2px solid ${subGC}25`,overflow:"hidden"}}>

                            </span>
                          </div>
                        )}
                      </div>
                      {/* ডান: স্পার্কলাইন */}

/* ══ WEAKNESS NOTE FORM ══ */
function WeaknessNoteForm({profile,updateProfile,subjectStats,currentUser}){
  const [sub,setSub]=useState(subjectStats.length?subjectStats[0].sub:"");
  const [chapter,setChapter]=useState("");
  const [note,setNote]=useState("");
  const weaknesses=profile.weaknesses||[];

  const addWeakness=()=>{
    if(!sub||!chapter.trim())return;
    const entry={id:Date.now(),subject:sub,chapter:chapter.trim(),note:note.trim(),addedBy:currentUser||"অ্যাডমিন",date:new Date().toLocaleDateString("bn-BD")};
    updateProfile("weaknesses",[...weaknesses,entry]);
    setChapter("");setNote("");
  };

  const removeWeakness=(id)=>updateProfile("weaknesses",weaknesses.filter(w=>w.id!==id));

  return(<div>
    {weaknesses.length>0&&(
      <div style={{marginBottom:10}}>
        {weaknesses.map(w=>(
          <div key={w.id} style={{padding:"8px 10px",background:"#fff",borderRadius:8,border:`1px solid ${C.re}20`,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:700,color:C.re}}>{w.subject} — {w.chapter}</div>
              {w.note&&<div style={{fontSize:11,color:C.mu,marginTop:2}}>{w.note}</div>}
              <div style={{fontSize:10,color:C.mu,marginTop:2}}>{w.addedBy} • {w.date}</div>
            </div>
            <button onClick={()=>removeWeakness(w.id)} style={{padding:"2px 6px",border:"none",background:C.reL,color:C.re,borderRadius:5,cursor:"pointer",fontSize:10,flexShrink:0}}>✕</button>
          </div>
        ))}
      </div>
    )}
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      <select value={sub} onChange={e=>setSub(e.target.value)} style={{fontSize:12,padding:"6px 8px"}}>
        {subjectStats.map(s=><option key={s.sub} value={s.sub}>{s.sub}</option>)}
      </select>
      <input type="text" placeholder="অধ্যায়ের নাম" value={chapter} onChange={e=>setChapter(e.target.value)} style={{fontSize:12,padding:"6px 8px"}}/>
      <input type="text" placeholder="বিশেষ নোট (ঐচ্ছিক)" value={note} onChange={e=>setNote(e.target.value)} style={{fontSize:12,padding:"6px 8px"}}/>
      <button onClick={addWeakness} style={{padding:"7px",background:C.re,color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12}}>+ দুর্বলতা যোগ করুন</button>
    </div>
    {weaknesses.length===0&&<div style={{textAlign:"center",color:C.mu,fontSize:11,padding:"8px 0"}}>এখনো কোনো দুর্বলতা নোট নেই</div>}
  </div>);
}

/* ══ EXAM COMMENT SECTION ══ */
const REASON_OPTIONS=["মনোযোগ বৃদ্ধি","অনুপস্থিতি","পারিবারিক সমস্যা","পরিশ্রম কম","অসুস্থতা","টপিক কঠিন","অন্যান্য"];

function ExamCommentSection({srP,profile,updateProfile,currentUser,results,name}){
  const [editIdx,setEditIdx]=useState(null);
  const [noteText,setNoteText]=useState("");
  const [reason,setReason]=useState(REASON_OPTIONS[0]);
  const examNotes=profile.examNotes||{};

  const saveNote=(examKey)=>{
    if(!noteText.trim()&&!reason)return;
    const updated={...examNotes,[examKey]:{note:noteText.trim(),reason,addedBy:currentUser||"অ্যাডমিন",date:new Date().toLocaleDateString("bn-BD")}};
    updateProfile("examNotes",updated);
    setEditIdx(null);setNoteText("");setReason(REASON_OPTIONS[0]);
  };

  if(srP.length===0)return(<div style={{textAlign:"center",color:C.mu,fontSize:12,padding:12}}>এখনো কোনো ফলাফল নেই</div>);

  return(<div>
    {srP.map((r,i)=>{
      const key=`${r.subject}_${r.examType}`;
      const en=examNotes[key];
      const pct=Math.round(r.marks/(r.fullMarks||100)*100);
      const[,gc]=getGrade(r.marks,r.fullMarks||100,r.passMarks||33);
      return(
        <div key={i} style={{marginBottom:8,padding:"9px 11px",background:"#fff",borderRadius:9,border:`1px solid ${gc}20`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:gc}}>{r.subject}</div>
              <div style={{fontSize:10,color:C.mu}}>{r.examType} • {r.marks}/{r.fullMarks||100} ({pct}%)</div>
            </div>
            <button onClick={()=>{setEditIdx(i);setNoteText(en?.note||"");setReason(en?.reason||REASON_OPTIONS[0]);}}
              style={{padding:"3px 9px",border:`1px solid ${C.pu}40`,background:C.puL,color:C.pu,borderRadius:7,cursor:"pointer",fontSize:10,fontWeight:700,flexShrink:0}}>
              ✏️ {en?"সম্পাদনা":"মন্তব্য"}
            </button>
          </div>
          {en&&(<div style={{marginTop:6,padding:"6px 8px",background:C.bg,borderRadius:7,fontSize:11}}>
            <div style={{fontWeight:700,color:C.pu,marginBottom:2}}>{en.note}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:3}}>
              {badge(C.am,en.reason)}
              <span style={{fontSize:10,color:C.mu}}>{en.addedBy} • {en.date}</span>
            </div>
          </div>)}
          {editIdx===i&&(
            <div style={{marginTop:8,padding:"8px",background:C.puL,borderRadius:8,border:`1px solid ${C.pu}20`}}>
              <textarea value={noteText} onChange={e=>setNoteText(e.target.value)}
                placeholder="মন্তব্য লিখুন..."
                style={{width:"100%",padding:"7px",border:`1px solid ${C.pu}30`,borderRadius:7,fontSize:12,resize:"vertical",minHeight:56,outline:"none",marginBottom:6}}/>
              <select value={reason} onChange={e=>setReason(e.target.value)} style={{width:"100%",fontSize:12,padding:"6px",marginBottom:6}}>
                {REASON_OPTIONS.map(r=><option key={r} value={r}>{r}</option>)}
              </select>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>saveNote(key)} style={{flex:1,padding:"7px",background:C.pu,color:"#fff",border:"none",borderRadius:7,cursor:"pointer",fontWeight:700,fontSize:12}}>✓ সংরক্ষণ</button>
                <button onClick={()=>setEditIdx(null)} style={{padding:"7px 12px",border:`1px solid ${C.bd}`,background:"transparent",borderRadius:7,cursor:"pointer",fontSize:12}}>বাতিল</button>
              </div>
            </div>
          )}
        </div>
      );
    })}
  </div>);
}

/* ══ CLASS SKIP SECTION ══ */
function ClassSkipSection({profile,updateProfile,currentUser,cls,name="",studentDepartments={}}){
  const skipLog=profile.classSkipLog||[];
  const todayISO=new Date().toISOString().slice(0,10);
  const [skipDate,setSkipDate]=useState(todayISO);
  const [skipSubject,setSkipSubject]=useState("");
  const [skipNote,setSkipNote]=useState("");
  const [filterDate,setFilterDate]=useState("");

  const classSubjects=cls?getStudentSubjects(cls,name,studentDepartments):SUBJECTS;

  const addSkip=()=>{
    if(!skipSubject)return;
    const dateLabel=new Date(skipDate+"T00:00:00").toLocaleDateString("bn-BD");
    const entry={
      id:Date.now(),
      date:dateLabel,
      isoDate:skipDate,
      subject:skipSubject,
      note:skipNote.trim(),
      addedBy:currentUser||"শিক্ষক"
    };
    updateProfile("classSkipLog",[...skipLog,entry]);
    setSkipNote("");
  };

  const removeSkip=(id)=>updateProfile("classSkipLog",skipLog.filter(s=>s.id!==id));

  // তারিখ অনুযায়ী গ্রুপ করা
  const filteredLog=filterDate
    ? skipLog.filter(s=>s.isoDate===filterDate)
    : [...skipLog].reverse();

  // সারসংক্ষেপ
  const totalSkips=skipLog.length;
  const todaySkips=skipLog.filter(s=>s.isoDate===todayISO).length;
  const uniqueDates=[...new Set(skipLog.map(s=>s.isoDate))].length;

  // বিষয়ভিত্তিক গণনা
  const subjectCount={};
  skipLog.forEach(s=>{subjectCount[s.subject]=(subjectCount[s.subject]||0)+1;});
  const topSubject=Object.entries(subjectCount).sort((a,b)=>b[1]-a[1])[0];

  return(<div>
    {/* সারসংক্ষেপ */}
    {totalSkips>0&&(
      <div style={{background:"linear-gradient(135deg,#a32d2d10,#c0392b08)",borderRadius:12,padding:"12px 14px",marginBottom:14,border:`1px solid ${C.re}25`}}>
        <div style={{fontSize:11,color:C.mu,marginBottom:6,fontWeight:700}}>📊 ক্লাস ফাঁকির সারসংক্ষেপ</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
          <div style={{background:"rgba(255,255,255,0.85)",borderRadius:8,padding:"7px 6px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:700,color:C.re}}>{totalSkips}</div>
            <div style={{fontSize:9,color:C.mu}}>মোট ফাঁকি</div>
          </div>
          <div style={{background:"rgba(255,255,255,0.85)",borderRadius:8,padding:"7px 6px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:700,color:todaySkips>0?C.re:C.gr}}>{todaySkips}</div>
            <div style={{fontSize:9,color:C.mu}}>আজকে</div>
          </div>
          <div style={{background:"rgba(255,255,255,0.85)",borderRadius:8,padding:"7px 6px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:700,color:C.am}}>{uniqueDates}</div>
            <div style={{fontSize:9,color:C.mu}}>দিনে</div>
          </div>
        </div>
        {topSubject&&(
          <div style={{fontSize:11,color:C.re,fontWeight:600}}>
            🔴 সবচেয়ে বেশি ফাঁকি: <strong>{topSubject[0]}</strong> ({topSubject[1]}বার)
          </div>
        )}
      </div>
    )}

    {/* নতুন এন্ট্রি ফর্ম */}

/* ══ BEHAVIOR RATING SECTION ══ */
const RATING_ITEMS=["মনোযোগ","শ্রেণিকক্ষে অংশগ্রহণ","গৃহকার্য জমা","আচরণ ও শৃঙ্খলা"];

function BehaviorRatingSection({profile,updateProfile,currentUser}){
  const weeklyRatings=profile.weeklyRatings||[];
  const [ratings,setRatings]=useState({মনোযোগ:3,"শ্রেণিকক্ষে অংশগ্রহণ":3,"গৃহকার্য জমা":3,"আচরণ ও শৃঙ্খলা":3});
  const [attendance,setAttendance]=useState("present");
  const [weekLabel,setWeekLabel]=useState("");

  const avgRating=(arr)=>{
    if(!arr.length)return null;
    const sum=arr.reduce((acc,r)=>acc+RATING_ITEMS.reduce((a,k)=>a+(r.ratings?.[k]||0),0)/RATING_ITEMS.length,0);
    return Math.round(sum/arr.length*10)/10;
  };
  const overallAvg=avgRating(weeklyRatings);

  const addRating=()=>{
    const entry={id:Date.now(),week:weekLabel||`সপ্তাহ ${weeklyRatings.length+1}`,date:new Date().toLocaleDateString("bn-BD"),ratings:{...ratings},attendance,addedBy:currentUser||"অ্যাডমিন"};
    updateProfile("weeklyRatings",[...weeklyRatings,entry]);
    setWeekLabel("");
    setRatings({মনোযোগ:3,"শ্রেণিকক্ষে অংশগ্রহণ":3,"গৃহকার্য জমা":3,"আচরণ ও শৃঙ্খলা":3});
    setAttendance("present");
  };

  const StarRating=({item})=>(
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
      <div style={{fontSize:11,color:C.tx,minWidth:120}}>{item}</div>
      <div style={{display:"flex",gap:3}}>
        {[1,2,3,4,5].map(s=>(
          <button key={s} onClick={()=>setRatings(p=>({...p,[item]:s}))}
            style={{width:24,height:24,border:"none",background:ratings[item]>=s?"#f59e0b":"#e5e7eb",borderRadius:"50%",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {ratings[item]>=s?"⭐":"☆"}
          </button>
        ))}
      </div>
      <span style={{fontSize:11,fontWeight:700,color:ratings[item]>=4?C.gr:ratings[item]>=3?C.am:C.re}}>{ratings[item]}/৫</span>
    </div>
  );

  return(<div>
    {/* KPI-style সারসংক্ষেপ */}
    {weeklyRatings.length>0&&(
      <div style={{background:"linear-gradient(135deg,#5344b510,#7c3aed10)",borderRadius:12,padding:"12px 14px",marginBottom:14,border:`1px solid ${C.pu}20`}}>
        <div style={{fontSize:11,color:C.mu,marginBottom:4}}>সামগ্রিক KPI রেটিং</div>
        <div style={{fontSize:32,fontWeight:700,color:overallAvg>=4?C.gr:overallAvg>=3?C.am:C.re}}>{overallAvg}/৫</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:10}}>
          {RATING_ITEMS.map(item=>{
            const avg=weeklyRatings.length?Math.round(weeklyRatings.reduce((a,r)=>a+(r.ratings?.[item]||0),0)/weeklyRatings.length*10)/10:0;
            const c=avg>=4?C.gr:avg>=3?C.am:C.re;
            return(<div key={item} style={{background:"rgba(255,255,255,0.8)",borderRadius:7,padding:"6px 8px"}}>
              <div style={{fontSize:9,color:C.mu}}>{item}</div>
              <div style={{fontWeight:700,color:c,fontSize:14}}>{avg}/৫</div>
            </div>);
          })}
        </div>
        {/* উপস্থিতি সারসংক্ষেপ */}
        <div style={{marginTop:10,display:"flex",gap:8,flexWrap:"wrap"}}>
          {[{key:"present",label:"উপস্থিত",color:C.gr},{key:"late",label:"দেরি",color:C.am},{key:"absent",label:"অনুপস্থিত",color:C.re}].map(({key,label,color})=>{
            const cnt=weeklyRatings.filter(r=>r.attendance===key).length;
            return <div key={key} style={{fontSize:11,color,fontWeight:700}}>{label}: {cnt}</div>;
          })}
        </div>
      </div>
    )}

    {/* নতুন রেটিং ফর্ম */}
    <div style={{background:"#f9f7ff",borderRadius:10,padding:"12px",border:`1px solid ${C.pu}15`}}>
      <div style={{fontWeight:700,fontSize:12,color:C.pu,marginBottom:10}}>➕ এই সপ্তাহের রেটিং দিন</div>
      <input type="text" placeholder="সপ্তাহ লেবেল (যেমন: সপ্তাহ ১)" value={weekLabel} onChange={e=>setWeekLabel(e.target.value)}
        style={{width:"100%",padding:"7px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:12,marginBottom:10,outline:"none"}}/>
      {RATING_ITEMS.map(item=><StarRating key={item} item={item}/>)}
      {/* উপস্থিতি */}
      <div style={{marginTop:6,marginBottom:10}}>
        <div style={{fontSize:11,color:C.tx,marginBottom:6,fontWeight:700}}>উপস্থিতি</div>
        <div style={{display:"flex",gap:6}}>
          {[{v:"present",l:"✓ উপস্থিত",c:C.gr},{v:"late",l:"⏰ দেরিতে",c:C.am},{v:"absent",l:"✗ অনুপস্থিত",c:C.re}].map(({v,l,c})=>(
            <button key={v} onClick={()=>setAttendance(v)}
              style={{flex:1,padding:"7px 4px",border:`1px solid ${attendance===v?c:C.bd}`,background:attendance===v?c+"22":"transparent",color:attendance===v?c:C.mu,borderRadius:8,cursor:"pointer",fontSize:10,fontWeight:attendance===v?700:400}}>
              {l}
            </button>
          ))}
        </div>
      </div>
      <button onClick={addRating} style={{width:"100%",padding:"9px",background:C.pu,color:"#fff",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:13}}>✓ রেটিং সংরক্ষণ</button>
    </div>

    {/* রেটিং ইতিহাস */}
    {weeklyRatings.length>0&&(
      <div style={{marginTop:12}}>
        <div style={{fontWeight:700,fontSize:12,color:C.tx,marginBottom:8}}>ইতিহাস</div>
        {[...weeklyRatings].reverse().slice(0,5).map(r=>{
          const wa=Math.round(RATING_ITEMS.reduce((a,k)=>a+(r.ratings?.[k]||0),0)/RATING_ITEMS.length*10)/10;
          const wc=wa>=4?C.gr:wa>=3?C.am:C.re;
          const attC=r.attendance==="present"?C.gr:r.attendance==="late"?C.am:C.re;
          return(
            <div key={r.id} style={{padding:"8px 10px",background:"#fff",borderRadius:8,border:`1px solid ${C.bd}`,marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <div style={{fontWeight:600,fontSize:12}}>{r.week}</div>
                <div style={{fontWeight:700,color:wc,fontSize:13}}>{wa}/৫</div>
              </div>
              <div style={{fontSize:10,color:C.mu,marginTop:2}}>{r.date} • {badge(attC,r.attendance==="present"?"উপস্থিত":r.attendance==="late"?"দেরিতে":"অনুপস্থিত")}</div>
            </div>
          );
        })}
        {weeklyRatings.length>5&&<div style={{textAlign:"center",fontSize:11,color:C.mu}}>আরও {weeklyRatings.length-5}টি রেটিং আছে</div>}
      </div>
    )}
    {weeklyRatings.length===0&&<div style={{textAlign:"center",color:C.mu,fontSize:12,padding:"12px 0"}}>এখনো কোনো রেটিং নেই</div>}
  </div>);
}

/* ══ TARGET SECTION ══ */
function TargetSection({subjectStats,profile,updateProfile}){
  const targets=profile.targets||{};
  const [editSub,setEditSub]=useState(null);
  const [targetVal,setTargetVal]=useState("");

  const saveTarget=(sub)=>{
    const val=parseInt(targetVal);
    if(isNaN(val)||val<0||val>100)return;
    updateProfile("targets",{...targets,[sub]:val});
    setEditSub(null);setTargetVal("");
  };

  return(<div>
    <div style={{fontWeight:700,fontSize:13,color:C.pu,marginBottom:12}}>🏹 বিষয়ভিত্তিক লক্ষ্যমাত্রা</div>
    {subjectStats.length===0&&<div style={{textAlign:"center",color:C.mu,fontSize:12,padding:12}}>ফলাফল এন্ট্রি করুন, তারপর লক্ষ্যমাত্রা সেট করুন</div>}
    {subjectStats.map(({sub,avgM,subGC})=>{
      const target=targets[sub];
      const achieved=target!==undefined&&avgM>=target;
      const diff=target!==undefined?avgM-target:null;
      return(
        <div key={sub} style={{marginBottom:10,padding:"10px 12px",background:"#fff",borderRadius:10,border:`1px solid ${C.bd}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontWeight:600,fontSize:12,color:C.tx}}>{sub}</div>
            <button onClick={()=>{setEditSub(sub);setTargetVal(target||"");}}
              style={{padding:"3px 9px",border:`1px solid ${C.pu}40`,background:C.puL,color:C.pu,borderRadius:7,cursor:"pointer",fontSize:10,fontWeight:700}}>
              {target!==undefined?"✏️ পরিবর্তন":"+ লক্ষ্য সেট"}
            </button>
          </div>
          {/* বার চার্ট */}
          <div style={{position:"relative",height:22,marginBottom:4}}>
            {/* Actual bar */}
            <div style={{position:"absolute",left:0,top:4,width:`${Math.min(avgM,100)}%`,height:14,background:subGC,borderRadius:4,opacity:0.85,transition:"width 0.4s"}}/>
            {/* Target line */}
            {target!==undefined&&(
              <div style={{position:"absolute",left:`${target}%`,top:0,width:3,height:22,background:"#1a1a2e",borderRadius:2,transition:"left 0.4s"}}/>
            )}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{color:subGC,fontWeight:700}}>বর্তমান: {avgM}%</span>
              {target!==undefined&&<span style={{color:C.mu}}>লক্ষ্য: {target}%</span>}
            </div>
            {target!==undefined&&(
              achieved
                ?<span style={{color:C.gr,fontWeight:700,fontSize:10}}>✅ অর্জিত!</span>
                :<span style={{color:C.re,fontWeight:700,fontSize:10}}>⬆ {Math.abs(diff)}% কম</span>
            )}
          </div>
          {editSub===sub&&(
            <div style={{marginTop:8,display:"flex",gap:6}}>
              <input type="number" min="0" max="100" value={targetVal} onChange={e=>setTargetVal(e.target.value)}
                placeholder="লক্ষ্যমাত্রা % (০-১০০)" style={{flex:1,padding:"6px 10px",border:`1px solid ${C.pu}`,borderRadius:8,fontSize:12,outline:"none"}}/>
              <button onClick={()=>saveTarget(sub)} style={{padding:"6px 14px",background:C.pu,color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12}}>✓</button>
              <button onClick={()=>setEditSub(null)} style={{padding:"6px 10px",border:`1px solid ${C.bd}`,background:"transparent",borderRadius:8,cursor:"pointer",fontSize:12}}>✕</button>
            </div>
          )}
        </div>
      );
    })}
  </div>);
}

/* ══ CONTACT LOG SECTION ══ */
const CONTACT_METHODS=["ফোন","SMS","সরাসরি সাক্ষাৎ","WhatsApp","ডায়েরি"];

function ContactLogSection({profile,updateProfile,currentUser,name}){
  const logs=profile.contactLogs||[];
  const [date,setDate]=useState(new Date().toISOString().slice(0,10));
  const [method,setMethod]=useState(CONTACT_METHODS[0]);
  const [note,setNote]=useState("");

  const addLog=()=>{
    if(!note.trim())return;
    const entry={id:Date.now(),date:new Date(date).toLocaleDateString("bn-BD"),method,note:note.trim(),addedBy:currentUser||"অ্যাডমিন"};
    updateProfile("contactLogs",[...logs,entry]);
    setNote("");
  };

  const copyWhatsApp=()=>{
    const sortedLogs=[...logs].sort((a,b)=>b.id-a.id).slice(0,3);
    const lines=[
      `📋 Heritage Public School — অভিভাবক যোগাযোগ রেকর্ড`,
      `ছাত্র: ${name}`,``,
      ...sortedLogs.map(l=>`📅 ${l.date} [${l.method}]\n   ${l.note}`),
      ``,`— ${currentUser||"কর্তৃপক্ষ"}, Heritage Public School`
    ].join("\n");
    navigator.clipboard.writeText(lines).then(()=>alert("✓ WhatsApp ফরম্যাটে কপি হয়েছে!"));
  };

  const sortedLogs=[...logs].sort((a,b)=>b.id-a.id);

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{fontWeight:700,fontSize:13,color:C.te}}>📞 অভিভাবক যোগাযোগ লগ</div>
      {logs.length>0&&(
        <button onClick={copyWhatsApp}
          style={{padding:"5px 12px",border:`1px solid ${C.gr}40`,background:C.grL,color:C.gr,borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:700}}>
          📋 WhatsApp কপি
        </button>
      )}
    </div>

    {/* নতুন লগ ফর্ম */}
    <div style={{background:"#f0f9f6",borderRadius:10,padding:"12px",border:`1px solid ${C.te}15`,marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:12,color:C.te,marginBottom:8}}>➕ নতুন যোগাযোগ লগ</div>
      <input type="date" value={date} onChange={e=>setDate(e.target.value)}
        style={{width:"100%",padding:"7px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:12,marginBottom:6,outline:"none"}}/>
      <select value={method} onChange={e=>setMethod(e.target.value)} style={{width:"100%",fontSize:12,padding:"7px",marginBottom:6}}>
        {CONTACT_METHODS.map(m=><option key={m} value={m}>{m}</option>)}
      </select>
      <textarea value={note} onChange={e=>setNote(e.target.value)}
        placeholder="যোগাযোগের বিবরণ লিখুন..."
        style={{width:"100%",padding:"7px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:12,resize:"vertical",minHeight:64,outline:"none",marginBottom:6}}/>
      <button onClick={addLog} style={{width:"100%",padding:"8px",background:C.te,color:"#fff",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:13}}>✓ লগ সংরক্ষণ</button>
    </div>

    {/* লগ তালিকা */}
    {sortedLogs.length===0&&<div style={{textAlign:"center",color:C.mu,fontSize:12,padding:12}}>এখনো কোনো যোগাযোগ লগ নেই</div>}
    {sortedLogs.map(l=>(
      <div key={l.id} style={{padding:"10px 12px",background:"#fff",borderRadius:9,border:`1px solid ${C.te}20`,marginBottom:8,position:"relative"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
              {badge(C.te,l.method)}
              <span style={{fontSize:11,color:C.mu}}>{l.date}</span>
            </div>
            <div style={{fontSize:12,color:C.tx,lineHeight:1.5}}>{l.note}</div>
            <div style={{fontSize:10,color:C.mu,marginTop:4}}>{l.addedBy}</div>
          </div>
          <button onClick={()=>updateProfile("contactLogs",logs.filter(x=>x.id!==l.id))}
            style={{padding:"2px 6px",border:"none",background:C.reL,color:C.re,borderRadius:5,cursor:"pointer",fontSize:10,flexShrink:0}}>✕</button>
        </div>
      </div>
    ))}
  </div>);
}

function Students({results,customStudents,setCustomStudents,isAdmin,STUDENTS,studentProfiles,setStudentProfiles,studentDepartments={},setStudentDepartments=()=>{},currentUser,obsData={}}){
  const [cls,setCls]=useState("IV");
  const [q,setQ]=useState("");
  const [sel,setSel]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [newName,setNewName]=useState("");
  const [addMsg,setAddMsg]=useState("");
  const [confirmDel,setConfirmDel]=useState(null);

  const list=(STUDENTS[cls]||[]).filter(n=>n.toLowerCase().includes(q.toLowerCase()));
  const totalAll=Object.values(STUDENTS).flat().length;

  const addStudent=()=>{
    const name=newName.trim().toUpperCase();
    if(!name){setAddMsg("নাম লিখুন!");return;}
    const curList=STUDENTS[cls]||[];
    if(curList.includes(name)){setAddMsg("এই নাম আগেই আছে!");return;}
    const updated={...customStudents,[cls]:[...curList,name]};
    setCustomStudents(updated);
    setNewName("");
    setAddMsg("✅ "+name+" যোগ করা হয়েছে!");
    setTimeout(()=>setAddMsg(""),3000);
  };

  const removeStudent=(name)=>{
    const curList=STUDENTS[cls]||[];
    const updated={...customStudents,[cls]:curList.filter(n=>n!==name)};
    setCustomStudents(updated);
    setConfirmDel(null);
    setAddMsg("🗑 "+name+" বাদ দেওয়া হয়েছে");
    setTimeout(()=>setAddMsg(""),3000);
  };

  // ── SSC (Class X) ছাত্রের বিভাগ নির্ধারণ — School Rank(SPI)-এর cohort ঠিক করতে ব্যবহৃত ──
  const setDept=(name,dept)=>{
    setStudentDepartments(prev=>{
      const updated={...prev};
      if(dept)updated[name]=dept; else delete updated[name];
      return updated;
    });
  };

  return(<div>
    <H2>👨‍🎓 ছাত্র ব্যবস্থাপনা</H2>

    {sel&&<StudentProfile name={sel} cls={cls} results={results} onClose={()=>setSel(null)} studentProfiles={studentProfiles} setStudentProfiles={setStudentProfiles} studentDepartments={studentDepartments} currentUser={currentUser} obsData={obsData}/>}

    {/* মুছে ফেলার confirmation */}
    {confirmDel&&(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:"#fff",borderRadius:14,padding:20,maxWidth:320,width:"100%"}}>
          <div style={{fontWeight:700,fontSize:15,color:C.re,marginBottom:8}}>⚠ নিশ্চিত করুন</div>
          <div style={{fontSize:13,marginBottom:16}}><b>{confirmDel}</b> কে তালিকা থেকে বাদ দিতে চান?<br/><span style={{fontSize:11,color:C.mu}}>এই ছাত্রের পরীক্ষার ডেটা মুছবে না।</span></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>removeStudent(confirmDel)} style={{flex:1,padding:"9px",background:C.re,color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>হ্যাঁ, বাদ দিন</button>
            <button onClick={()=>setConfirmDel(null)} style={{flex:1,padding:"9px",background:C.puL,color:C.pu,border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>বাতিল</button>
          </div>
        </div>
      </div>
    )}

    <Card>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
        <select value={cls} onChange={e=>{setCls(e.target.value);setQ("");setShowAdd(false);}}>
          {Object.keys(STUDENTS).map(c=><option key={c} value={c}>শ্রেণি {c}</option>)}
        </select>
        <input type="text" placeholder="নাম খুঁজুন..." value={q} onChange={e=>setQ(e.target.value)} style={{flex:1,minWidth:130}}/>
        {isAdmin&&<button onClick={()=>setShowAdd(p=>!p)} style={{padding:"8px 12px",background:showAdd?C.reL:C.puL,color:showAdd?C.re:C.pu,border:`1px solid ${showAdd?C.re:C.pu}`,borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12}}>{showAdd?"✕ বন্ধ":"＋ নতুন"}</button>}
      </div>

      {/* নতুন ছাত্র যোগ */}
      {isAdmin&&showAdd&&(
        <div style={{background:C.puL,borderRadius:10,padding:12,marginBottom:10}}>
          <div style={{fontWeight:700,color:C.pu,fontSize:13,marginBottom:8}}>➕ শ্রেণি {cls} তে নতুন ছাত্র যোগ</div>
          <div style={{display:"flex",gap:8}}>
            <input type="text" placeholder="ছাত্রের পুরো নাম (ইংরেজি বড় হাতে)" value={newName}
              onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addStudent()}
              style={{flex:1,padding:"8px 12px",border:`1px solid ${C.pu}`,borderRadius:8,fontSize:13,outline:"none"}}/>
            <button onClick={addStudent} style={{padding:"8px 16px",background:C.pu,color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>যোগ</button>
          </div>
          {addMsg&&<div style={{marginTop:6,fontSize:12,color:addMsg.startsWith("✅")?C.gr:C.re,fontWeight:600}}>{addMsg}</div>}
        </div>
      )}

      <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
        {badge(C.pu,`${(STUDENTS[cls]||[]).length} জন`)}
        {badge(C.mu,`মোট ${totalAll} জন`)}
        {badge(["IV","V"].includes(cls)?C.am:C.te,["IV","V"].includes(cls)?"৪ টার্ম":"৪ ধরন পরীক্ষা")}
      </div>
      <div style={{fontSize:11,color:C.mu,marginBottom:8}}>👆 নামে ক্লিক করলে প্রোফাইল দেখা যাবে</div>

      <div style={{overflowX:"auto"}}>
        <table>
          <thead><tr><th>#</th><th>নাম</th><th>শ্রেণি</th>{GROUP_CLASSES.includes(cls)&&<th>বিভাগ</th>}{isAdmin&&<th>বাদ</th>}</tr></thead>
          <tbody>
            {list.map((n,i)=>(
              <tr key={i}>
                <td style={{color:C.mu,fontSize:11}}>{i+1}</td>
                <td style={{fontWeight:500,color:C.pu,textDecoration:"underline dotted",cursor:"pointer"}} onClick={()=>setSel(n)}>{n}</td>
                <td>{badge(C.te,cls)}</td>
                {GROUP_CLASSES.includes(cls)&&(
                  <td>
                    {isAdmin?(
                      <select value={studentDepartments[n]||""} onChange={e=>setDept(n,e.target.value)} style={{fontSize:11,padding:"3px 6px"}}>
                        <option value="">— নির্ধারিত নেই —</option>
                        {GROUPS.map(d=><option key={d} value={d}>{d}</option>)}
                      </select>
                    ):(studentDepartments[n]?badge(C.am,studentDepartments[n]):<span style={{fontSize:10,color:C.mu}}>—</span>)}
                  </td>
                )}
                {isAdmin&&<td><button onClick={()=>setConfirmDel(n)} style={{padding:"3px 8px",background:C.reL,color:C.re,border:`1px solid ${C.re}40`,borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:700}}>🗑</button></td>}
              </tr>
            ))}
            {list.length===0&&<tr><td colSpan={isAdmin?4:3} style={{textAlign:"center",color:C.mu,padding:20}}>পাওয়া যায়নি</td></tr>}
          </tbody>
        </table>
      </div>
      {GROUP_CLASSES.includes(cls)&&<div style={{fontSize:10.5,color:C.mu,marginTop:6}}>ℹ️ বিভাগ (বিজ্ঞান/মানবিক/ব্যবসায় শিক্ষা) নির্ধারণ করলে "স্কুল র‍্যাংক (SPI)" নিজ বিভাগের মধ্যেই normalize হবে — ভিন্ন বিভাগের ছাত্রের সাথে সরাসরি তুলনা হবে না, এবং শুধুমাত্র প্রাসঙ্গিক বিষয়সমূহ (আবশ্যিক + বিভাগীয়) ফলাফল এন্ট্রি ও রিপোর্টে দেখানো হবে।</div>}
      {isAdmin&&addMsg&&!showAdd&&<div style={{marginTop:8,fontSize:12,color:addMsg.startsWith("✅")?C.gr:C.re,fontWeight:600,textAlign:"center"}}>{addMsg}</div>}
    </Card>
  </div>);
}

/* ══ TEACHERS ══ */
function TeacherProfile({name,results,lessonPlans,obsData={},onClose,isSelf=false,onChangePwd=null,deadlines=[],dlSubmissions={},examSchedule=[],teacherSubjects={}}){
  const [rankPeriod,setRankPeriod]=useState("yearly"); // "monthly" | "yearly"
  const allRes=Object.values(results).flat();
  const tr=allRes.filter(r=>r.teacher===name);
  const lp=(lessonPlans._v2||[]).filter(p=>p.teacher===name&&p.status==="approved").length+(lessonPlans[name]||[]).length;

  // % ভিত্তিক গড়
  const trP=tr.filter(r=>!r.absent);const pass=trP.filter(r=>r.marks>=(r.passMarks||33)).length;
  const avgPct=trP.length?Math.round(trP.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/trP.length):0;

  // ── নির্দিষ্ট সময়কালের (মাসিক/বাৎসরিক) জন্য KPI — ফলাফল ও পাঠ পরিকল্পনা period-filtered;
  // attendance/inspections/syllabus/feedback/training/AIC ডেটা (obsData[teacher]-এর ভেতরে) সব সময়ই
  // all-time থাকে, কারণ এগুলো সাধারণত কম-ফ্রিকোয়েন্সি এন্ট্রি — এটা মাসিক প্রতিবেদনেও (MonthlyReport)
  // একই নিয়মে হয়, স্বচ্ছতার জন্য নিচে স্পষ্টভাবে উল্লেখ করা আছে। লক্ষ্য করুন: সব শিক্ষকের জন্য
  // একই period-filtered ডেটাসেট ব্যবহার করা হয় (কারো জন্য ভিন্ন সময়সীমা না) — যাতে subject/class
  // কঠিনতা-ফ্যাক্টর normalization সবার জন্য সমান ভিত্তিতে হয়।
  const periodRes=useMemo(()=>allRes.filter(r=>inRankPeriod(r.examDate||r.savedAt,rankPeriod,new Date())),[allRes,rankPeriod]);
  const periodLPs=useMemo(()=>({
    _v2:(lessonPlans._v2||[]).filter(p=>inRankPeriod(p.submittedAt||p.reviewedAt,rankPeriod,new Date())),
    ...Object.fromEntries(Object.entries(lessonPlans||{}).filter(([k])=>k!=="_v2")),
  }),[lessonPlans,rankPeriod]);
  const periodObsData=useMemo(()=>({
    ...obsData,
    peerObservations:(obsData.peerObservations||[]).filter(o=>inRankPeriod(o.dateISO,rankPeriod,new Date())),
  }),[obsData,rankPeriod]);

  const kpi=calcKPI(name,periodRes,periodLPs,periodObsData,deadlines,dlSubmissions,examSchedule,teacherSubjects);
  const gc=kpi.grade==="A+"?C.gr:kpi.grade==="A"?C.te:kpi.grade==="B"?C.am:kpi.grade==="D"?C.co:C.mu;

  // ── সব শিক্ষকের মধ্যে বর্তমান KPI র‍্যাংক (অ্যাডমিন বাদে — তুলনা যথাযথ নয়) — dense rank + confidence ──
  const kpiRankInfo=useMemo(()=>{
    if(ADMIN_TEACHERS.includes(name))return null;
    const scored=TEACHERS.filter(t=>!ADMIN_TEACHERS.includes(t))
      .map(t=>{const k=calcKPI(t,periodRes,periodLPs,periodObsData,deadlines,dlSubmissions,examSchedule,teacherSubjects);return{name:t,score:k.score,count:k.count};})
      .filter(t=>t.score>0);
    if(!scored.length)return null;
    const ranked=denseRank(scored,"score");
    const mine=ranked.find(t=>t.name===name);
    if(!mine)return null;
    return{rank:mine._rank,total:mine._total,confidence:Math.min(1,mine.count/TEACHER_RANK_SHRINK_K),count:mine.count};
  },[periodRes,periodLPs,periodObsData,deadlines,dlSubmissions,examSchedule,teacherSubjects,name]);

  // প্রধান শিক্ষক ও পরিচালক — এনাদের প্রোফাইলে নম্বর/পরীক্ষা সংক্রান্ত কোনো তথ্য দেখানো হবে না,
  // এবং এনারা পর্যবেক্ষণ করতে পারলেও কখনো "পর্যবেক্ষিত" হবেন না
  const isMarksExempt=ATT_REVIEW_EXCLUDED.includes(name);
  const obs=obsData[name]||{};
  const commentsList=obs.comments||[];
  const attList=obs.attendance||[];
  const presentDays=attList.filter(a=>a.status==="present").length;
  const lateCount=attList.filter(a=>a.status==="late").length;
  const totalDays=attList.length;
  const attPct=totalDays?Math.round((presentDays+lateCount*0.5)/totalDays*100):null;
  const sylList=obs.syllabus||[];
  const sylPct=sylList.length?Math.round(sylList.filter(s=>s.covered).length/sylList.length*100):null;
  const fbList=obs.feedback||[];
  const avgFb=fbList.length?Math.round(fbList.reduce((a,b)=>a+(b.rating||0),0)/fbList.length*10)/10:null;

  // পিয়ার পর্যবেক্ষণ — করেছেন / হয়েছেন
  const peerObs=obsData.peerObservations||[];
  const observationsMade=peerObs.filter(o=>o.observerTeacher===name);
  const observationsReceived=peerObs.filter(o=>o.observedTeacher===name);
  const avgReceivedScore=observationsReceived.length?Math.round(observationsReceived.reduce((a,b)=>a+(b.totalScore||0),0)/observationsReceived.length):null;

  // পরীক্ষাওয়ারি breakdown — বিষয় × পরীক্ষার নাম
  const examRows=useMemo(()=>{
    // unique: subject + examType + examName combos
    const keys=[...new Set(tr.map(r=>`${r.subject}||${r.examType}||${r.examName||""}||${r.cls}||${r.examDate||""}`))];
    return keys.map(key=>{
      const [subject,examType,examName,cls,examDate]=key.split("||");
      const rows=tr.filter(r=>r.subject===subject&&r.examType===examType&&(examName?r.examName===examName:!r.examName)&&r.cls===cls);
      const present=rows.filter(r=>!r.absent);
      const pass=present.filter(r=>r.marks>=(r.passMarks||33)).length;
      const avgP=present.length?Math.round(present.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/present.length):0;
      const fullMarks=rows[0]?.fullMarks||100;
      return{subject,examType,examName,cls,examDate,rows,present,pass,avgP,fullMarks,count:rows.length};
    })
    // বিষয় → তারিখ অনুযায়ী সাজাও
    .sort((a,b)=>{
      if(a.subject!==b.subject)return a.subject.localeCompare(b.subject);
      if(!a.examDate&&!b.examDate)return 0;
      if(!a.examDate)return 1;if(!b.examDate)return -1;
      return new Date(a.examDate)-new Date(b.examDate);
    });
  },[tr]);

  const [expandedExam,setExpandedExam]=useState(null); // key string of expanded row

  return(
    <Portal>
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:14,padding:18,width:"100%",maxWidth:420,maxHeight:"82vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>

        {/* নিজের প্রোফাইল ব্যানার */}
        {isSelf&&(<div style={{background:"linear-gradient(135deg,#5344b5,#7c3aed)",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{color:"#fff"}}>
            <div style={{fontSize:10,opacity:0.8}}>আপনি দেখছেন</div>
            <div style={{fontSize:13,fontWeight:700}}>👤 আমার প্রোফাইল</div>
          </div>
          {onChangePwd&&<button onClick={()=>{onClose();setTimeout(onChangePwd,100);}} style={{fontSize:11,background:"rgba(255,255,255,0.18)",color:"#fff",border:"1px solid rgba(255,255,255,0.35)",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontWeight:700}}>🔑 পাসওয়ার্ড</button>}
        </div>)}

        {/* হেডার */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:48,height:48,borderRadius:"50%",background:"linear-gradient(135deg,#5344b5,#7c3aed)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:16,flexShrink:0,boxShadow:"0 4px 12px rgba(83,68,181,0.35)"}}>
              {name.split(" ").map(w=>w[0]).filter(Boolean).slice(0,2).join("")}
            </div>
            <div>
              <div style={{fontWeight:700,fontSize:16,color:C.pu}}>{name}</div>
              <div style={{fontSize:11,color:C.mu}}>শিক্ষক • Heritage Public School</div>
              {adminTitle(name)&&<div style={{fontSize:11,color:C.am,fontWeight:600}}>{adminTitle(name)}</div>}
              {name===REP_TEACHER&&<div style={{fontSize:11,color:"#e67e22",fontWeight:600}}>⚡ শিক্ষক প্রতিনিধি</div>}
            </div>
          </div>
          <button onClick={onClose} style={{border:"none",background:C.puL,color:C.pu,borderRadius:8,padding:"5px 10px",cursor:"pointer",fontWeight:700,fontSize:14}}>✕</button>
        </div>

        {/* মাসিক/বাৎসরিক টগল — নিচের KPI স্কোর ও র‍্যাংক এই সময়কাল অনুযায়ী */}
        {!isMarksExempt&&(
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            {[["monthly","এই মাস"],["yearly","এই বছর"]].map(([p,l])=>(
              <button key={p} onClick={()=>setRankPeriod(p)} style={{flex:1,fontSize:11,fontWeight:700,padding:"6px 0",borderRadius:8,cursor:"pointer",
                border:`1px solid ${C.pu}40`,background:rankPeriod===p?C.pu:"#fff",color:rankPeriod===p?"#fff":C.pu}}>{l}</button>
            ))}
          </div>
        )}

        {/* KPI স্কোর — শুধু শিক্ষকতা-সংশ্লিষ্টদের জন্য */}
        {!isMarksExempt&&(<div style={{background:gc+"15",border:`1px solid ${gc}30`,borderRadius:10,padding:"12px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:C.mu}}>KPI স্কোর ({rankPeriod==="monthly"?"এই মাস":"এই বছর"})</div>
            <div style={{fontSize:28,fontWeight:700,color:gc}}>{kpi.score}</div>
            <div style={{fontSize:11,color:C.mu,marginTop:2}}>{kpi.grade==="—"?"এই সময়কালে ডেটা নেই":"গ্রেড: "+kpi.grade}</div>
          </div>
          <div style={{textAlign:"right"}}>
            {badge(gc,kpi.grade)}
            <div style={{fontSize:11,color:C.mu,marginTop:6}}>{kpi.count}টি ফলাফল এন্ট্রি (এই সময়কালে)</div>
            <div style={{fontSize:10,color:C.mu}}>সর্বকালীন মোট: {tr.length}টি এন্ট্রি, {lp}টি পাঠ পরিকল্পনা</div>
          </div>
        </div>)}
        {isMarksExempt&&(<div style={{background:C.puL,border:`1px solid ${C.pu}30`,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
          <div style={{fontSize:12,color:C.pu,fontWeight:700}}>🏛️ প্রশাসনিক দায়িত্ব</div>
          <div style={{fontSize:11,color:C.mu,marginTop:3}}>এই পদের জন্য নম্বর এন্ট্রি বা KPI প্রযোজ্য নয় — তিনি অন্য শিক্ষকদের ক্লাস পর্যবেক্ষণ করতে পারবেন, কিন্তু নিজে পর্যবেক্ষিত হবেন না।</div>
        </div>)}

        {/* KPI র‍্যাংক — সব শিক্ষকের মধ্যে বর্তমান অবস্থান (নির্বাচিত সময়কালে) */}
        {kpiRankInfo&&(<>
          <div style={{background:"linear-gradient(135deg,#5344b515,#7c3aed10)",border:`1px solid ${C.pu}30`,borderRadius:10,padding:"10px 14px",marginBottom:kpiRankInfo.confidence<1?4:12,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>{kpiRankInfo.rank===1?"🥇":kpiRankInfo.rank===2?"🥈":kpiRankInfo.rank===3?"🥉":"🏅"}</span>
            <div>
              <div style={{fontSize:15,fontWeight:800,color:C.pu}}>{kpiRankInfo.rank}<span style={{fontSize:11,fontWeight:500,color:C.mu}}>/{kpiRankInfo.total}</span></div>
              <div style={{fontSize:10.5,color:C.mu}}>সব শিক্ষকের মধ্যে KPI র‍্যাংক ({rankPeriod==="monthly"?"এই মাস":"এই বছর"}) • সমান স্কোর হলে যুগ্ম র‍্যাংক</div>
            </div>
          </div>
          {kpiRankInfo.confidence<1&&(
            <div style={{marginBottom:12,fontSize:10.5,color:C.co,background:C.coL,borderRadius:6,padding:"5px 9px"}}>
              ⚠️ সীমিত ডেটা — এই সময়কালে মাত্র {kpiRankInfo.count}টি ফলাফল-এন্ট্রি আছে, তাই এই র‍্যাংকের নির্ভরযোগ্যতা কম।
            </div>
          )}
        </>)}


        {/* পর্যবেক্ষণ সারসংক্ষেপ */}
        {(attPct!==null||sylPct!==null||avgFb!==null)&&(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
          {attPct!==null&&<Stat label="উপস্থিতি" value={`${attPct}%`} color={attPct>=85?C.gr:attPct>=70?C.am:C.re}/>}
          {sylPct!==null&&<Stat label="সিলেবাস" value={`${sylPct}%`} color={sylPct>=75?C.gr:sylPct>=50?C.am:C.re}/>}
          {avgFb!==null&&<Stat label="ফিডব্যাক" value={`${avgFb}/5`} color={avgFb>=4?C.gr:avgFb>=3?C.am:C.re}/>}
        </div>)}

        {/* পরিসংখ্যান */}
        {!isMarksExempt&&(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
          <Stat label="গড় %" value={tr.length?`${avgPct}%`:"—"} color={C.te}/>
          <Stat label="পাস" value={tr.length?`${pass}/${tr.length}`:"—"} color={C.gr}/>
          <Stat label="ফেল" value={tr.length?tr.length-pass:"—"} color={tr.length-pass>0?C.re:C.mu}/>
        </div>)}

        {/* বিষয়ভিত্তিক পরীক্ষাওয়ারি পারফরম্যান্স */}
        {!isMarksExempt&&examRows.length>0&&(
          <div style={{marginBottom:14}}>
            <H3>📚 বিষয়ভিত্তিক পারফরম্যান্স</H3>
            <div style={{fontSize:11,color:C.mu,marginBottom:8}}>পরীক্ষার নামে ক্লিক করলে ছাত্রদের নম্বর দেখাবে</div>
            {(()=>{
              // বিষয় গ্রুপ করো
              const bySubject={};
              examRows.forEach(row=>{
                if(!bySubject[row.subject])bySubject[row.subject]=[];
                bySubject[row.subject].push(row);
              });
              return Object.entries(bySubject).map(([subject,rows])=>{
                // বিষয়ের সামগ্রিক গড়
                const allPresent=rows.flatMap(r=>r.present);
                const subAvg=allPresent.length?Math.round(allPresent.reduce((a,r)=>a+(r.marks/(r.fullMarks||100)*100),0)/allPresent.length):0;
                const subPass=allPresent.filter(r=>r.marks>=(r.passMarks||33)).length;
                const [,subGc]=getGrade(subAvg,100,33);
                return(
                  <div key={subject} style={{marginBottom:10,border:`1px solid ${C.bd}`,borderRadius:10,overflow:"hidden"}}>
                    {/* বিষয় হেডার */}
                    <div style={{background:subGc+"12",padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${C.bd}`}}>
                      <div style={{fontWeight:700,fontSize:13,color:C.tx}}>{subject}</div>
                      <div style={{display:"flex",gap:10,alignItems:"center"}}>
                        <span style={{fontSize:12,fontWeight:700,color:subGc}}>{subAvg}%</span>
                        <span style={{fontSize:11,color:C.gr}}>{subPass}/{allPresent.length} পাস</span>
                        <span style={{fontSize:11,color:C.mu}}>{rows.length}টি পরীক্ষা</span>
                      </div>
                    </div>
                    {/* পরীক্ষাওয়ারি সারি */}
                    {rows.map((ex,ei)=>{
                      const exKey=`${subject}||${ex.examType}||${ex.examName}||${ex.cls}`;
                      const isOpen=expandedExam===exKey;
                      const [,egc]=getGrade(ex.avgP,100,33);
                      const dateLabel=ex.examDate?(()=>{try{return new Date(ex.examDate).toLocaleDateString("bn-BD",{day:"numeric",month:"short"});}catch(e){return ex.examDate;}})():"";
                      return(
                        <div key={ei}>
                          {/* পরীক্ষার সারি */}
                          <div
                            onClick={()=>setExpandedExam(isOpen?null:exKey)}
                            style={{display:"flex",alignItems:"center",gap:6,padding:"8px 12px",cursor:"pointer",background:isOpen?C.puL:"#fff",borderBottom:ei<rows.length-1||isOpen?`1px solid ${C.bd}22`:"none",transition:"background 0.15s"}}
                          >
                            {/* toggle ত্রিকোণ */}
                            <span style={{fontSize:10,color:C.mu,flexShrink:0,transition:"transform 0.2s",display:"inline-block",transform:isOpen?"rotate(90deg)":"rotate(0deg)"}}>▶</span>
                            {/* পরীক্ষার নাম */}
                            <div style={{flex:1,minWidth:0}}>
                              <span style={{fontSize:12,fontWeight:600,color:isOpen?C.pu:C.tx}}>{ex.examType}</span>
                              {ex.examName&&<span style={{fontSize:11,color:C.mu}}> — {ex.examName}</span>}
                              {dateLabel&&<span style={{fontSize:10,color:C.mu}}> • 📅{dateLabel}</span>}
                              <span style={{fontSize:10,color:C.mu}}> • শ্রেণি {ex.cls}</span>
                            </div>
                            {/* স্ট্যাট */}
                            <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                              <span style={{fontSize:12,fontWeight:700,color:egc}}>{ex.avgP}%</span>
                              <span style={{fontSize:11,color:C.gr,minWidth:36}}>{ex.pass}/{ex.present.length}</span>
                              <span style={{fontSize:10,background:C.bg,borderRadius:5,padding:"2px 6px",color:C.mu}}>{ex.fullMarks}নম্বর</span>
                            </div>
                          </div>

                          {/* ছাত্রদের নম্বর — expandable */}
                          {isOpen&&(
                            <div style={{background:"#fafafe",borderBottom:ei<rows.length-1?`1px solid ${C.bd}22`:"none"}}>
                              {/* মিনি স্ট্যাট বার */}
                              <div style={{display:"flex",gap:12,padding:"6px 14px",fontSize:11,color:C.mu,borderBottom:`1px solid ${C.bd}22`}}>
                                <span>মোট: {ex.rows.length} জন</span>
                                <span style={{color:C.gr}}>পাস: {ex.pass}</span>
                                <span style={{color:C.re}}>ফেল: {ex.present.length-ex.pass}</span>
                                {ex.rows.filter(r=>r.absent).length>0&&<span style={{color:"#7c3aed"}}>অনুপস্থিত: {ex.rows.filter(r=>r.absent).length}</span>}
                              </div>
                              {/* ছাত্রের গ্রিড */}
                              <div style={{padding:"8px 10px",display:"flex",flexWrap:"wrap",gap:5}}>
                                {[...ex.rows].sort((a,b)=>{
                                  if(a.absent&&!b.absent)return 1;
                                  if(!a.absent&&b.absent)return -1;
                                  return(b.marks||0)-(a.marks||0);
                                }).map((r,ri)=>{
                                  if(r.absent)return(
                                    <div key={ri} style={{background:"#f3f0ff",border:"1px solid #7c3aed30",borderRadius:7,padding:"5px 8px",fontSize:11,minWidth:80}}>
                                      <div style={{fontWeight:600,color:"#7c3aed",fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:90}}>{r.name}</div>
                                      <div style={{color:"#7c3aed",fontWeight:700,fontSize:11}}>অনুপস্থিত</div>
                                    </div>
                                  );
                                  const pct=Math.round(r.marks/(r.fullMarks||100)*100);
                                  const [grd,mgc]=getGrade(r.marks,r.fullMarks||100,r.passMarks||33);
                                  return(
                                    <div key={ri} style={{background:mgc+"14",border:`1px solid ${mgc}30`,borderRadius:7,padding:"5px 8px",fontSize:11,minWidth:80}}>
                                      <div style={{fontWeight:600,color:C.tx,fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:90}}>{r.name}</div>
                                      <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                                        <span style={{color:mgc,fontWeight:800,fontSize:14}}>{r.marks}</span>
                                        <span style={{color:C.mu,fontSize:9}}>/{r.fullMarks||100}</span>
                                        <span style={{fontSize:10,fontWeight:700,color:mgc,marginLeft:2}}>{grd}</span>
                                      </div>
                                      <div style={{height:3,borderRadius:2,background:"#eee",marginTop:3}}>
                                        <div style={{width:`${pct}%`,height:"100%",background:mgc,borderRadius:2}}/>
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              });
            })()}
          </div>
        )}

        {!isMarksExempt&&tr.length===0&&(
          <div style={{textAlign:"center",color:C.mu,padding:20,fontSize:13}}>
            এখনো কোনো ফলাফল এন্ট্রি নেই<br/>
            <span style={{fontSize:11}}>পরীক্ষা মডিউলে এই শিক্ষককে নির্বাচন করুন</span>
          </div>
        )}

        {/* পর্যবেক্ষণ করেছেন */}
        <div style={{marginTop:14}}>
          <H3>🔭 পর্যবেক্ষণ করেছেন ({observationsMade.length})</H3>
          {observationsMade.length===0?(
            <div style={{textAlign:"center",color:C.mu,padding:10,fontSize:12}}>এখনো কোনো ক্লাস পর্যবেক্ষণ করেননি</div>
          ):(
            [...observationsMade].reverse().slice(0,5).map(o=>(
              <div key={o.id} style={{padding:"7px 9px",borderRadius:7,background:C.bg,marginBottom:5,border:`1px solid ${C.bd}`,fontSize:11}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span>{o.observedTeacher} • {o.cls} শ্রেণি • {o.date}</span>
                  <span style={{fontWeight:700,color:o.totalScore>=70?C.gr:o.totalScore>=50?C.am:C.re}}>{o.totalScore}</span>
                </div>
              </div>
            ))
          )}
        </div>

        {/* পর্যবেক্ষিত হয়েছেন — প্রধান শিক্ষক/পরিচালক এর জন্য প্রযোজ্য নয় */}
        {!isMarksExempt&&(<div style={{marginTop:14}}>
          <H3>🎯 পর্যবেক্ষিত হয়েছেন ({observationsReceived.length}{avgReceivedScore!==null?` • গড় ${avgReceivedScore}`:""})</H3>
          {observationsReceived.length===0?(
            <div style={{textAlign:"center",color:C.mu,padding:10,fontSize:12}}>এখনো কোনো ক্লাস পর্যবেক্ষণ হয়নি</div>
          ):(
            [...observationsReceived].reverse().slice(0,5).map(o=>(
              <div key={o.id} style={{padding:"7px 9px",borderRadius:7,background:C.bg,marginBottom:5,border:`1px solid ${C.bd}`,fontSize:11}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span>পর্যবেক্ষক: {o.observerTeacher} • {o.cls} শ্রেণি • {o.date}</span>
                  <span style={{fontWeight:700,color:o.totalScore>=70?C.gr:o.totalScore>=50?C.am:C.re}}>{o.totalScore}</span>
                </div>
              </div>
            ))
          )}
        </div>)}

        {/* পরীক্ষা সম্পাদনার তালিকা */}
        {!isMarksExempt&&(()=>{
          const myExams=examSchedule.filter(e=>e.teacher===name);
          if(!myExams.length)return null;
          const taken=myExams.filter(e=>e.status==="taken");
          const notTaken=myExams.filter(e=>e.status==="nottaken");
          const excused=myExams.filter(e=>e.status==="excused");
          return(
            <div style={{marginTop:14,background:"#fff8e1",border:"1px solid #e67e2240",borderRadius:10,padding:"10px 12px"}}>
              <H3>📝 পরীক্ষা সম্পাদনা ({myExams.length}টি নির্ধারিত)</H3>
              <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                <span style={{background:"#22c55e22",color:"#22c55e",border:"1px solid #22c55e55",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>✅ নিয়েছেন: {taken.length}</span>
                <span style={{background:"#ef444422",color:"#ef4444",border:"1px solid #ef444455",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>❌ নেননি: {notTaken.length}</span>
                {excused.length>0&&<span style={{background:"#6366f122",color:"#6366f1",border:"1px solid #6366f155",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>⚠️ ছাড়: {excused.length}</span>}
              </div>
              {notTaken.length>0&&(
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:11,color:"#ef4444",fontWeight:700,marginBottom:4}}>নেননি এমন পরীক্ষা:</div>
                  {notTaken.map(e=>(
                    <div key={e.id} style={{fontSize:11,color:"#555",padding:"4px 0",borderBottom:"1px solid #f5e8cc"}}>
                      ❌ {e.dayLabel}{e.subject?` • ${e.subject}`:""}{e.examNote?` • ${e.examNote}`:""}
                    </div>
                  ))}
                </div>
              )}
              {taken.length>0&&(
                <details>
                  <summary style={{fontSize:11,color:"#22c55e",cursor:"pointer",fontWeight:700,marginBottom:4}}>নিয়েছেন এমন পরীক্ষা ({taken.length}টি)</summary>
                  {taken.map(e=>(
                    <div key={e.id} style={{fontSize:11,color:"#555",padding:"4px 0",borderBottom:"1px solid #f5e8cc"}}>
                      ✅ {e.dayLabel}{e.subject?` • ${e.subject}`:""}
                    </div>
                  ))}
                </details>
              )}
            </div>
          );
        })()}

        {/* 💬 মন্তব্য ও পরামর্শ — অ্যাডমিন কর্তৃক প্রদত্ত */}
        <div style={{marginTop:14}}>
          <H3>💬 মন্তব্য ও পরামর্শ ({commentsList.length})</H3>
          {commentsList.length===0?(
            <div style={{textAlign:"center",color:C.mu,padding:10,fontSize:12}}>এখনো কোনো মন্তব্য বা পরামর্শ দেওয়া হয়নি</div>
          ):(
            [...commentsList].reverse().map(c=>(
              <div key={c.id} style={{padding:"8px 10px",borderRadius:8,background:C.amL,marginBottom:6,border:`1px solid ${C.am}30`}}>
                <div style={{fontSize:12,color:C.tx,lineHeight:1.5}}>{c.text}</div>
                <div style={{fontSize:10,color:C.mu,marginTop:4,textAlign:"right"}}>— {c.author} • {c.date}</div>
              </div>
            ))
          )}
        </div>
      </div>
    </div>
    </Portal>
  );
}

function Teachers({results,lessonPlans,obsData={},setObsData=()=>{},currentUser="",teacherSubjects={},setTeacherSubjects=()=>{},isAdmin=false,customTeachers=[],setCustomTeachers=()=>{},removedTeachers=[],setRemovedTeachers=()=>{},STUDENTS,examSchedule=[]}){STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const [q,setQ]=useState("");
  const [sel,setSel]=useState(null);
  const [tab,setTab]=useState("list");
  const [mapTeacher,setMapTeacher]=useState(TEACHERS[0]);
  const [newTeacherName,setNewTeacherName]=useState("");
  const [teacherErr,setTeacherErr]=useState("");
  const [commentTeacher,setCommentTeacher]=useState(null); // মন্তব্য দেওয়ার জন্য নির্বাচিত শিক্ষক
  const [commentText,setCommentText]=useState("");
  const [commentSaved,setCommentSaved]=useState(false);
  const allRes=Object.values(results).flat();

  const addComment=()=>{
    const text=commentText.trim();
    if(!text||!commentTeacher)return;
    const rec={id:Date.now().toString()+"_cmt",text,author:currentUser||"অ্যাডমিন",date:new Date().toLocaleDateString("bn-BD"),isoDate:new Date().toISOString().slice(0,10)};
    setObsData(prev=>{
      const updated={...prev};
      const existing=(updated[commentTeacher]||{}).comments||[];
      updated[commentTeacher]={...(updated[commentTeacher]||{}),comments:[...existing,rec]};
      fbSaveObsData(commentTeacher,updated[commentTeacher]); // granular Firebase write
      return updated;
    });
    setCommentText("");
    setCommentSaved(true);
    setTimeout(()=>setCommentSaved(false),2000);
  };

  const addTeacher=()=>{
    const name=newTeacherName.trim().toUpperCase();
    if(!name){setTeacherErr("নাম লিখুন");return;}
    if(TEACHERS.includes(name)){setTeacherErr("এই শিক্ষক ইতিমধ্যে আছেন");return;}
    setCustomTeachers(prev=>{
      const updated=[...prev,name];
      TEACHERS=[...DEFAULT_TEACHERS.filter(t=>!removedTeachers.includes(t)),...updated];
      return updated;
    });
    CredStore.registerNew(name); // নতুন শিক্ষকের পাসওয়ার্ড সেট
    setNewTeacherName("");
    setTeacherErr("");
  };

  const removeTeacher=(name)=>{
    const isDefault=DEFAULT_TEACHERS.includes(name);
    const warnMsg=isDefault
      ?`"${name}" — এটি একজন মূল তালিকার শিক্ষক। মুছে ফেললে তার পুরনো ফলাফল/KPI/পর্যবেক্ষণ ডেটা তালিকায় থাকবে, কিন্তু তিনি আর সক্রিয় শিক্ষক তালিকায় দেখাবেন না বা লগইন করতে পারবেন না। নিশ্চিত?`
      :`"${name}" কে তালিকা থেকে বাদ দিতে চান?`;
    if(!window.confirm(warnMsg))return;
    if(isDefault){
      setRemovedTeachers(prev=>{
        const updated=[...prev,name];
        TEACHERS=[...DEFAULT_TEACHERS.filter(t=>!updated.includes(t)),...customTeachers];
        return updated;
      });
    }else{
      setCustomTeachers(prev=>{
        const updated=prev.filter(t=>t!==name);
        TEACHERS=[...DEFAULT_TEACHERS.filter(t=>!removedTeachers.includes(t)),...updated];
        return updated;
      });
    }
  };
  const list=TEACHERS.filter(t=>t.toLowerCase().includes(q.toLowerCase()));

  const toggleMapSubject=(item)=>{
    setTeacherSubjects(prev=>{
      const cur=prev[mapTeacher]||[];
      const isObj=typeof item==="object";
      const exists=isObj
        ?cur.some(x=>typeof x==="object"&&x.cls===item.cls&&x.sub===item.sub)
        :cur.some(x=>typeof x==="string"&&x===item);
      const next=exists
        ?(isObj?cur.filter(x=>!(typeof x==="object"&&x.cls===item.cls&&x.sub===item.sub)):cur.filter(x=>x!==item))
        :[...cur,item];
      fbSaveTeacherSubject(mapTeacher,next); // granular Firebase write — race condition নিরাপদ
      return{...prev,[mapTeacher]:next};
    });
  };
  const clearMapping=()=>setTeacherSubjects(prev=>{
    fbSaveTeacherSubject(mapTeacher,[]);
    return{...prev,[mapTeacher]:[]};
  });
  const mapSelected=teacherSubjects[mapTeacher]||[];

  // প্রতিটি শিক্ষকের কাজের চাপ হিসাব
  const workload=TEACHERS.map(t=>{
    const tr=allRes.filter(r=>r.teacher===t);
    const subjects=[...new Set(tr.map(r=>r.subject))];
    const classes=[...new Set(tr.map(r=>r.cls))];
    const lp=((lessonPlans._v2||[]).filter(p=>p.teacher===t).length)+(lessonPlans[t]||[]).length;
    const total=tr.length+lp;
    return{t,subjects,classes,lp,results:tr.length,total};
  }).sort((a,b)=>b.total-a.total);

  const maxTotal=Math.max(...workload.map(w=>w.total),1);

  return(<div>
    <H2>👩‍🏫 শিক্ষক ব্যবস্থাপনা</H2>
    {sel&&<TeacherProfile name={sel} results={results} lessonPlans={lessonPlans} obsData={obsData} onClose={()=>setSel(null)} examSchedule={examSchedule} teacherSubjects={teacherSubjects}/>}

    {/* ট্যাব */}
