              </div>
            </div>

            {/* Section B: পরীক্ষাভিত্তিক মন্তব্য */}
            <div style={{padding:"12px",background:"#f0f9f6",borderRadius:10,border:`1px solid ${C.te}15`}}>
              <div style={{fontWeight:700,fontSize:13,color:C.te,marginBottom:10}}>💬 পরীক্ষাভিত্তিক মন্তব্য ও কারণ</div>
              <ExamCommentSection srP={srP} profile={profile} updateProfile={updateProfile} currentUser={currentUser} results={results} name={name}/>
            </div>
          </div>)}

          {/* ══ ট্যাব: আচরণ ও উপস্থিতি ══ */}
          {tab==="behavior"&&(<div>
            <BehaviorRatingSection profile={profile} updateProfile={updateProfile} currentUser={currentUser}/>
            <div style={{marginTop:16,paddingTop:14,borderTop:`2px dashed ${C.re}30`}}>
              <div style={{fontWeight:700,fontSize:13,color:C.re,marginBottom:10}}>🚫 ক্লাস ফাঁকির রেকর্ড</div>
              <ClassSkipSection profile={profile} updateProfile={updateProfile} currentUser={currentUser} cls={cls}/>
            </div>
          </div>)}

          {/* ══ ট্যাব: লক্ষ্যমাত্রা ══ */}
          {tab==="target"&&(<div>
            <TargetSection subjectStats={subjectStats} profile={profile} updateProfile={updateProfile}/>
          </div>)}

          {/* ══ ট্যাব: অভিভাবক যোগাযোগ ══ */}
          {tab==="contact"&&(<div>
            <ContactLogSection profile={profile} updateProfile={updateProfile} currentUser={currentUser} name={name}/>
          </div>)}

        </div>
      </div>
    </div>
  );
}

/* ══ WEAKNESS NOTE FORM ══ */
function WeaknessNoteForm({profile,updateProfile,subjectStats,currentUser}){
  const [sub,setSub]=useState(subjectStats.length?subjectStats[0].sub:"");
  const [chapter,setChapter]=useState("");
  const [note,setNote]=useState("");
  const weaknesses=profile.weaknesses||[];

  const addWeakness=()=>{
    if(!sub||!chapter.trim())return;
    const entry={id:Date.now(),subject:sub,chapter:chapter.trim(),note:note.trim(),addedBy:currentUser||"অ্যাডমিন",date:new Date().toLocaleDateString("bn-BD")};
    updateProfile("weaknesses",[...weaknesses,entry]);
    setChapter("");setNote("");
  };

  const removeWeakness=(id)=>updateProfile("weaknesses",weaknesses.filter(w=>w.id!==id));

  return(<div>
    {weaknesses.length>0&&(
      <div style={{marginBottom:10}}>
        {weaknesses.map(w=>(
          <div key={w.id} style={{padding:"8px 10px",background:"#fff",borderRadius:8,border:`1px solid ${C.re}20`,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:700,color:C.re}}>{w.subject} — {w.chapter}</div>
              {w.note&&<div style={{fontSize:11,color:C.mu,marginTop:2}}>{w.note}</div>}
              <div style={{fontSize:10,color:C.mu,marginTop:2}}>{w.addedBy} • {w.date}</div>
            </div>
            <button onClick={()=>removeWeakness(w.id)} style={{padding:"2px 6px",border:"none",background:C.reL,color:C.re,borderRadius:5,cursor:"pointer",fontSize:10,flexShrink:0}}>✕</button>
          </div>
        ))}
      </div>
    )}
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      <select value={sub} onChange={e=>setSub(e.target.value)} style={{fontSize:12,padding:"6px 8px"}}>
        {subjectStats.map(s=><option key={s.sub} value={s.sub}>{s.sub}</option>)}
      </select>
      <input type="text" placeholder="অধ্যায়ের নাম" value={chapter} onChange={e=>setChapter(e.target.value)} style={{fontSize:12,padding:"6px 8px"}}/>
      <input type="text" placeholder="বিশেষ নোট (ঐচ্ছিক)" value={note} onChange={e=>setNote(e.target.value)} style={{fontSize:12,padding:"6px 8px"}}/>
      <button onClick={addWeakness} style={{padding:"7px",background:C.re,color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12}}>+ দুর্বলতা যোগ করুন</button>
    </div>
    {weaknesses.length===0&&<div style={{textAlign:"center",color:C.mu,fontSize:11,padding:"8px 0"}}>এখনো কোনো দুর্বলতা নোট নেই</div>}
  </div>);
}

/* ══ EXAM COMMENT SECTION ══ */
const REASON_OPTIONS=["মনোযোগ বৃদ্ধি","অনুপস্থিতি","পারিবারিক সমস্যা","পরিশ্রম কম","অসুস্থতা","টপিক কঠিন","অন্যান্য"];

function ExamCommentSection({srP,profile,updateProfile,currentUser,results,name}){
  const [editIdx,setEditIdx]=useState(null);
  const [noteText,setNoteText]=useState("");
  const [reason,setReason]=useState(REASON_OPTIONS[0]);
  const examNotes=profile.examNotes||{};

  const saveNote=(examKey)=>{
    if(!noteText.trim()&&!reason)return;
    const updated={...examNotes,[examKey]:{note:noteText.trim(),reason,addedBy:currentUser||"অ্যাডমিন",date:new Date().toLocaleDateString("bn-BD")}};
    updateProfile("examNotes",updated);
    setEditIdx(null);setNoteText("");setReason(REASON_OPTIONS[0]);
  };

  if(srP.length===0)return(<div style={{textAlign:"center",color:C.mu,fontSize:12,padding:12}}>এখনো কোনো ফলাফল নেই</div>);

  return(<div>
    {srP.map((r,i)=>{
      const key=`${r.subject}_${r.examType}`;
      const en=examNotes[key];
      const pct=Math.round(r.marks/(r.fullMarks||100)*100);
      const[,gc]=getGrade(r.marks,r.fullMarks||100,r.passMarks||33);
      return(
        <div key={i} style={{marginBottom:8,padding:"9px 11px",background:"#fff",borderRadius:9,border:`1px solid ${gc}20`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:gc}}>{r.subject}</div>
              <div style={{fontSize:10,color:C.mu}}>{r.examType} • {r.marks}/{r.fullMarks||100} ({pct}%)</div>
            </div>
            <button onClick={()=>{setEditIdx(i);setNoteText(en?.note||"");setReason(en?.reason||REASON_OPTIONS[0]);}}
              style={{padding:"3px 9px",border:`1px solid ${C.pu}40`,background:C.puL,color:C.pu,borderRadius:7,cursor:"pointer",fontSize:10,fontWeight:700,flexShrink:0}}>
              ✏️ {en?"সম্পাদনা":"মন্তব্য"}
            </button>
          </div>
          {en&&(<div style={{marginTop:6,padding:"6px 8px",background:C.bg,borderRadius:7,fontSize:11}}>
            <div style={{fontWeight:700,color:C.pu,marginBottom:2}}>{en.note}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:3}}>
              {badge(C.am,en.reason)}
              <span style={{fontSize:10,color:C.mu}}>{en.addedBy} • {en.date}</span>
            </div>
          </div>)}
          {editIdx===i&&(
            <div style={{marginTop:8,padding:"8px",background:C.puL,borderRadius:8,border:`1px solid ${C.pu}20`}}>
              <textarea value={noteText} onChange={e=>setNoteText(e.target.value)}
                placeholder="মন্তব্য লিখুন..."
                style={{width:"100%",padding:"7px",border:`1px solid ${C.pu}30`,borderRadius:7,fontSize:12,resize:"vertical",minHeight:56,outline:"none",marginBottom:6}}/>
              <select value={reason} onChange={e=>setReason(e.target.value)} style={{width:"100%",fontSize:12,padding:"6px",marginBottom:6}}>
                {REASON_OPTIONS.map(r=><option key={r} value={r}>{r}</option>)}
              </select>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>saveNote(key)} style={{flex:1,padding:"7px",background:C.pu,color:"#fff",border:"none",borderRadius:7,cursor:"pointer",fontWeight:700,fontSize:12}}>✓ সংরক্ষণ</button>
                <button onClick={()=>setEditIdx(null)} style={{padding:"7px 12px",border:`1px solid ${C.bd}`,background:"transparent",borderRadius:7,cursor:"pointer",fontSize:12}}>বাতিল</button>
              </div>
            </div>
          )}
        </div>
      );
    })}
  </div>);
}

/* ══ CLASS SKIP SECTION ══ */
function ClassSkipSection({profile,updateProfile,currentUser,cls}){
  const skipLog=profile.classSkipLog||[];
  const todayISO=new Date().toISOString().slice(0,10);
  const [skipDate,setSkipDate]=useState(todayISO);
  const [skipSubject,setSkipSubject]=useState("");
  const [skipNote,setSkipNote]=useState("");
  const [filterDate,setFilterDate]=useState("");

  const classSubjects=cls?(SUBJECTS_BY_CLASS[cls]||SUBJECTS):SUBJECTS;

  const addSkip=()=>{
    if(!skipSubject)return;
    const dateLabel=new Date(skipDate+"T00:00:00").toLocaleDateString("bn-BD");
    const entry={
      id:Date.now(),
      date:dateLabel,
      isoDate:skipDate,
      subject:skipSubject,
      note:skipNote.trim(),
      addedBy:currentUser||"শিক্ষক"
    };
    updateProfile("classSkipLog",[...skipLog,entry]);
    setSkipNote("");
  };

  const removeSkip=(id)=>updateProfile("classSkipLog",skipLog.filter(s=>s.id!==id));

  // তারিখ অনুযায়ী গ্রুপ করা
  const filteredLog=filterDate
    ? skipLog.filter(s=>s.isoDate===filterDate)
    : [...skipLog].reverse();

  // সারসংক্ষেপ
  const totalSkips=skipLog.length;
  const todaySkips=skipLog.filter(s=>s.isoDate===todayISO).length;
  const uniqueDates=[...new Set(skipLog.map(s=>s.isoDate))].length;

  // বিষয়ভিত্তিক গণনা
  const subjectCount={};
  skipLog.forEach(s=>{subjectCount[s.subject]=(subjectCount[s.subject]||0)+1;});
  const topSubject=Object.entries(subjectCount).sort((a,b)=>b[1]-a[1])[0];

  return(<div>
    {/* সারসংক্ষেপ */}
    {totalSkips>0&&(
      <div style={{background:"linear-gradient(135deg,#a32d2d10,#c0392b08)",borderRadius:12,padding:"12px 14px",marginBottom:14,border:`1px solid ${C.re}25`}}>
        <div style={{fontSize:11,color:C.mu,marginBottom:6,fontWeight:700}}>📊 ক্লাস ফাঁকির সারসংক্ষেপ</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
          <div style={{background:"rgba(255,255,255,0.85)",borderRadius:8,padding:"7px 6px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:700,color:C.re}}>{totalSkips}</div>
            <div style={{fontSize:9,color:C.mu}}>মোট ফাঁকি</div>
          </div>
          <div style={{background:"rgba(255,255,255,0.85)",borderRadius:8,padding:"7px 6px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:700,color:todaySkips>0?C.re:C.gr}}>{todaySkips}</div>
            <div style={{fontSize:9,color:C.mu}}>আজকে</div>
          </div>
          <div style={{background:"rgba(255,255,255,0.85)",borderRadius:8,padding:"7px 6px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:700,color:C.am}}>{uniqueDates}</div>
            <div style={{fontSize:9,color:C.mu}}>দিনে</div>
          </div>
        </div>
        {topSubject&&(
          <div style={{fontSize:11,color:C.re,fontWeight:600}}>
            🔴 সবচেয়ে বেশি ফাঁকি: <strong>{topSubject[0]}</strong> ({topSubject[1]}বার)
          </div>
        )}
      </div>
    )}

    {/* নতুন এন্ট্রি ফর্ম */}
    <div style={{background:"#fff5f5",borderRadius:10,padding:"12px",border:`1px solid ${C.re}20`,marginBottom:12}}>
      <div style={{fontWeight:700,fontSize:12,color:C.re,marginBottom:10}}>🚫 ক্লাস ফাঁকির তথ্য যোগ করুন</div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        <input type="date" value={skipDate} onChange={e=>setSkipDate(e.target.value)}
          style={{padding:"7px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13,outline:"none"}}/>
        <select value={skipSubject} onChange={e=>setSkipSubject(e.target.value)}
          style={{padding:"7px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13,outline:"none",background:"#fff"}}>
          <option value="">-- বিষয় নির্বাচন করুন --</option>
          {classSubjects.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <input type="text" placeholder="বিশেষ নোট (ঐচ্ছিক)" value={skipNote} onChange={e=>setSkipNote(e.target.value)}
          style={{padding:"7px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:13,outline:"none"}}/>
        <button onClick={addSkip} disabled={!skipSubject}
          style={{padding:"9px",background:skipSubject?C.re:"#ccc",color:"#fff",border:"none",borderRadius:9,cursor:skipSubject?"pointer":"not-allowed",fontWeight:700,fontSize:13}}>
          ✓ ক্লাস ফাঁকি রেকর্ড করুন
        </button>
      </div>
    </div>

    {/* ফিল্টার */}
    {totalSkips>0&&(
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:11,color:C.mu,flexShrink:0}}>তারিখ ফিল্টার:</div>
        <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)}
          style={{flex:1,padding:"5px 8px",border:`1px solid ${C.bd}`,borderRadius:7,fontSize:12,outline:"none"}}/>
        {filterDate&&<button onClick={()=>setFilterDate("")}
          style={{padding:"5px 9px",border:`1px solid ${C.bd}`,background:"transparent",borderRadius:7,cursor:"pointer",fontSize:11}}>✕ সব</button>}
      </div>
    )}

    {/* রেকর্ড তালিকা */}
    {filteredLog.length>0?(
      <div>
        <div style={{fontWeight:700,fontSize:12,color:C.tx,marginBottom:8}}>
          📋 রেকর্ড {filterDate?"(ফিল্টার করা)":"(সর্বশেষ)"}
        </div>
        {filteredLog.slice(0,20).map(s=>(
          <div key={s.id} style={{padding:"9px 11px",background:"#fff",borderRadius:9,border:`1px solid ${C.re}20`,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontWeight:700,fontSize:12,color:C.re}}>{s.subject}</span>
                {badge(C.re,"ফাঁকি")}
              </div>
              <div style={{fontSize:11,color:C.mu,marginTop:3}}>📅 {s.date}</div>
              {s.note&&<div style={{fontSize:11,color:C.tx,marginTop:2}}>💬 {s.note}</div>}
              <div style={{fontSize:10,color:C.mu,marginTop:2}}>👤 {s.addedBy}</div>
            </div>
            <button onClick={()=>removeSkip(s.id)}
              style={{padding:"3px 8px",border:"none",background:C.reL,color:C.re,borderRadius:6,cursor:"pointer",fontSize:10,fontWeight:700,flexShrink:0}}>✕</button>
          </div>
        ))}
        {filteredLog.length>20&&<div style={{textAlign:"center",fontSize:11,color:C.mu}}>আরও {filteredLog.length-20}টি রেকর্ড আছে</div>}
      </div>
    ):(
      <div style={{textAlign:"center",color:C.mu,fontSize:12,padding:"14px 0"}}>
        {filterDate?"এই তারিখে কোনো ফাঁকির তথ্য নেই":"এখনো কোনো ক্লাস ফাঁকির রেকর্ড নেই ✅"}
      </div>
    )}
  </div>);
}

/* ══ BEHAVIOR RATING SECTION ══ */
const RATING_ITEMS=["মনোযোগ","শ্রেণিকক্ষে অংশগ্রহণ","গৃহকার্য জমা","আচরণ ও শৃঙ্খলা"];

function BehaviorRatingSection({profile,updateProfile,currentUser}){
  const weeklyRatings=profile.weeklyRatings||[];
  const [ratings,setRatings]=useState({মনোযোগ:3,"শ্রেণিকক্ষে অংশগ্রহণ":3,"গৃহকার্য জমা":3,"আচরণ ও শৃঙ্খলা":3});
  const [attendance,setAttendance]=useState("present");
  const [weekLabel,setWeekLabel]=useState("");

  const avgRating=(arr)=>{
    if(!arr.length)return null;
    const sum=arr.reduce((acc,r)=>acc+RATING_ITEMS.reduce((a,k)=>a+(r.ratings?.[k]||0),0)/RATING_ITEMS.length,0);
    return Math.round(sum/arr.length*10)/10;
  };
  const overallAvg=avgRating(weeklyRatings);

  const addRating=()=>{
    const entry={id:Date.now(),week:weekLabel||`সপ্তাহ ${weeklyRatings.length+1}`,date:new Date().toLocaleDateString("bn-BD"),ratings:{...ratings},attendance,addedBy:currentUser||"অ্যাডমিন"};
    updateProfile("weeklyRatings",[...weeklyRatings,entry]);
    setWeekLabel("");
    setRatings({মনোযোগ:3,"শ্রেণিকক্ষে অংশগ্রহণ":3,"গৃহকার্য জমা":3,"আচরণ ও শৃঙ্খলা":3});
    setAttendance("present");
  };

  const StarRating=({item})=>(
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
      <div style={{fontSize:11,color:C.tx,minWidth:120}}>{item}</div>
      <div style={{display:"flex",gap:3}}>
        {[1,2,3,4,5].map(s=>(
          <button key={s} onClick={()=>setRatings(p=>({...p,[item]:s}))}
            style={{width:24,height:24,border:"none",background:ratings[item]>=s?"#f59e0b":"#e5e7eb",borderRadius:"50%",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {ratings[item]>=s?"⭐":"☆"}
          </button>
        ))}
      </div>
      <span style={{fontSize:11,fontWeight:700,color:ratings[item]>=4?C.gr:ratings[item]>=3?C.am:C.re}}>{ratings[item]}/৫</span>
    </div>
  );

  return(<div>
    {/* KPI-style সারসংক্ষেপ */}
    {weeklyRatings.length>0&&(
      <div style={{background:"linear-gradient(135deg,#5344b510,#7c3aed10)",borderRadius:12,padding:"12px 14px",marginBottom:14,border:`1px solid ${C.pu}20`}}>
        <div style={{fontSize:11,color:C.mu,marginBottom:4}}>সামগ্রিক KPI রেটিং</div>
        <div style={{fontSize:32,fontWeight:700,color:overallAvg>=4?C.gr:overallAvg>=3?C.am:C.re}}>{overallAvg}/৫</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:10}}>
          {RATING_ITEMS.map(item=>{
            const avg=weeklyRatings.length?Math.round(weeklyRatings.reduce((a,r)=>a+(r.ratings?.[item]||0),0)/weeklyRatings.length*10)/10:0;
            const c=avg>=4?C.gr:avg>=3?C.am:C.re;
            return(<div key={item} style={{background:"rgba(255,255,255,0.8)",borderRadius:7,padding:"6px 8px"}}>
              <div style={{fontSize:9,color:C.mu}}>{item}</div>
              <div style={{fontWeight:700,color:c,fontSize:14}}>{avg}/৫</div>
            </div>);
          })}
        </div>
        {/* উপস্থিতি সারসংক্ষেপ */}
        <div style={{marginTop:10,display:"flex",gap:8,flexWrap:"wrap"}}>
          {[{key:"present",label:"উপস্থিত",color:C.gr},{key:"late",label:"দেরি",color:C.am},{key:"absent",label:"অনুপস্থিত",color:C.re}].map(({key,label,color})=>{
            const cnt=weeklyRatings.filter(r=>r.attendance===key).length;
            return <div key={key} style={{fontSize:11,color,fontWeight:700}}>{label}: {cnt}</div>;
          })}
        </div>
      </div>
    )}

    {/* নতুন রেটিং ফর্ম */}
    <div style={{background:"#f9f7ff",borderRadius:10,padding:"12px",border:`1px solid ${C.pu}15`}}>
      <div style={{fontWeight:700,fontSize:12,color:C.pu,marginBottom:10}}>➕ এই সপ্তাহের রেটিং দিন</div>
      <input type="text" placeholder="সপ্তাহ লেবেল (যেমন: সপ্তাহ ১)" value={weekLabel} onChange={e=>setWeekLabel(e.target.value)}
        style={{width:"100%",padding:"7px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:12,marginBottom:10,outline:"none"}}/>
      {RATING_ITEMS.map(item=><StarRating key={item} item={item}/>)}
      {/* উপস্থিতি */}
      <div style={{marginTop:6,marginBottom:10}}>
        <div style={{fontSize:11,color:C.tx,marginBottom:6,fontWeight:700}}>উপস্থিতি</div>
        <div style={{display:"flex",gap:6}}>

/* ══ TARGET SECTION ══ */
function TargetSection({subjectStats,profile,updateProfile}){
  const targets=profile.targets||{};
  const [editSub,setEditSub]=useState(null);
  const [targetVal,setTargetVal]=useState("");

  const saveTarget=(sub)=>{
    const val=parseInt(targetVal);
    if(isNaN(val)||val<0||val>100)return;
    updateProfile("targets",{...targets,[sub]:val});
    setEditSub(null);setTargetVal("");
  };

  return(<div>
    <div style={{fontWeight:700,fontSize:13,color:C.pu,marginBottom:12}}>🏹 বিষয়ভিত্তিক লক্ষ্যমাত্রা</div>
    {subjectStats.length===0&&<div style={{textAlign:"center",color:C.mu,fontSize:12,padding:12}}>ফলাফল এন্ট্রি করুন, তারপর লক্ষ্যমাত্রা সেট করুন</div>}
    {subjectStats.map(({sub,avgM,subGC})=>{
      const target=targets[sub];
      const achieved=target!==undefined&&avgM>=target;
      const diff=target!==undefined?avgM-target:null;
      return(
        <div key={sub} style={{marginBottom:10,padding:"10px 12px",background:"#fff",borderRadius:10,border:`1px solid ${C.bd}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontWeight:600,fontSize:12,color:C.tx}}>{sub}</div>
            <button onClick={()=>{setEditSub(sub);setTargetVal(target||"");}}
              style={{padding:"3px 9px",border:`1px solid ${C.pu}40`,background:C.puL,color:C.pu,borderRadius:7,cursor:"pointer",fontSize:10,fontWeight:700}}>
              {target!==undefined?"✏️ পরিবর্তন":"+ লক্ষ্য সেট"}
            </button>
          </div>
          {/* বার চার্ট */}
          <div style={{position:"relative",height:22,marginBottom:4}}>
            {/* Actual bar */}
            <div style={{position:"absolute",left:0,top:4,width:`${Math.min(avgM,100)}%`,height:14,background:subGC,borderRadius:4,opacity:0.85,transition:"width 0.4s"}}/>
            {/* Target line */}
            {target!==undefined&&(
              <div style={{position:"absolute",left:`${target}%`,top:0,width:3,height:22,background:"#1a1a2e",borderRadius:2,transition:"left 0.4s"}}/>
            )}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{color:subGC,fontWeight:700}}>বর্তমান: {avgM}%</span>
              {target!==undefined&&<span style={{color:C.mu}}>লক্ষ্য: {target}%</span>}
            </div>
            {target!==undefined&&(
              achieved
                ?<span style={{color:C.gr,fontWeight:700,fontSize:10}}>✅ অর্জিত!</span>
                :<span style={{color:C.re,fontWeight:700,fontSize:10}}>⬆ {Math.abs(diff)}% কম</span>
            )}
          </div>
          {editSub===sub&&(
            <div style={{marginTop:8,display:"flex",gap:6}}>
              <input type="number" min="0" max="100" value={targetVal} onChange={e=>setTargetVal(e.target.value)}
                placeholder="লক্ষ্যমাত্রা % (০-১০০)" style={{flex:1,padding:"6px 10px",border:`1px solid ${C.pu}`,borderRadius:8,fontSize:12,outline:"none"}}/>
              <button onClick={()=>saveTarget(sub)} style={{padding:"6px 14px",background:C.pu,color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12}}>✓</button>
              <button onClick={()=>setEditSub(null)} style={{padding:"6px 10px",border:`1px solid ${C.bd}`,background:"transparent",borderRadius:8,cursor:"pointer",fontSize:12}}>✕</button>
            </div>
          )}
        </div>
      );
    })}
  </div>);
}

  const addLog=()=>{
    if(!note.trim())return;
    const entry={id:Date.now(),date:new Date(date).toLocaleDateString("bn-BD"),method,note:note.trim(),addedBy:currentUser||"অ্যাডমিন"};
    updateProfile("contactLogs",[...logs,entry]);
    setNote("");
  };

  const copyWhatsApp=()=>{
    const sortedLogs=[...logs].sort((a,b)=>b.id-a.id).slice(0,3);

        placeholder="যোগাযোগের বিবরণ লিখুন..."

function Students({results,customStudents,setCustomStudents,isAdmin,STUDENTS,studentProfiles,setStudentProfiles,currentUser}){

      </div>
      {isAdmin&&addMsg&&!showAdd&&<div style={{marginTop:8,fontSize:12,color:addMsg.startsWith("✅")?C.gr:C.re,fontWeight:600,textAlign:"center"}}>{addMsg}</div>}
    </Card>
  </div>);
}

/* ══ TEACHERS ══ */
function TeacherProfile({name,results,lessonPlans,obsData={},onClose,isSelf=false,onChangePwd=null}){
  const allRes=Object.values(results).flat();
  const tr=allRes.filter(r=>r.teacher===name);
  const lp=(lessonPlans._v2||[]).filter(p=>p.teacher===name&&p.status==="approved").length+(lessonPlans[name]||[]).length;

  // % ভিত্তিক গড়
  const trP=tr.filter(r=>!r.absent);const pass=trP.filter(r=>r.marks>=(r.passMarks||33)).length;
  const avgPct=trP.length?Math.round(trP.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/trP.length):0;
  const kpi=calcKPI(name,allRes,lessonPlans,obsData);
  const gc=kpi.grade==="A+"?C.gr:kpi.grade==="A"?C.te:kpi.grade==="B"?C.am:kpi.grade==="D"?C.co:C.mu;

  const obs=obsData[name]||{};
  const attList=obs.attendance||[];
  const presentDays=attList.filter(a=>a.status==="present").length;
  const lateCount=attList.filter(a=>a.status==="late").length;
  const totalDays=attList.length;
  const attPct=totalDays?Math.round((presentDays+lateCount*0.5)/totalDays*100):null;
  const sylList=obs.syllabus||[];
  const sylPct=sylList.length?Math.round(sylList.filter(s=>s.covered).length/sylList.length*100):null;
  const fbList=obs.feedback||[];
  const avgFb=fbList.length?Math.round(fbList.reduce((a,b)=>a+(b.rating||0),0)/fbList.length*10)/10:null;

  // পিয়ার পর্যবেক্ষণ — করেছেন / হয়েছেন
  const peerObs=obsData.peerObservations||[];
  const observationsMade=peerObs.filter(o=>o.observerTeacher===name);
  const observationsReceived=peerObs.filter(o=>o.observedTeacher===name);
  const avgReceivedScore=observationsReceived.length?Math.round(observationsReceived.reduce((a,b)=>a+(b.totalScore||0),0)/observationsReceived.length):null;

  // পরীক্ষাওয়ারি breakdown — বিষয় × পরীক্ষার নাম
  const examRows=useMemo(()=>{
    // unique: subject + examType + examName combos
    const keys=[...new Set(tr.map(r=>`${r.subject}||${r.examType}||${r.examName||""}||${r.cls}||${r.examDate||""}`))];
    return keys.map(key=>{
      const [subject,examType,examName,cls,examDate]=key.split("||");
      const rows=tr.filter(r=>r.subject===subject&&r.examType===examType&&(examName?r.examName===examName:!r.examName)&&r.cls===cls);
      const present=rows.filter(r=>!r.absent);
      const pass=present.filter(r=>r.marks>=(r.passMarks||33)).length;
      const avgP=present.length?Math.round(present.reduce((a,b)=>a+(b.marks/(b.fullMarks||100)*100),0)/present.length):0;
      const fullMarks=rows[0]?.fullMarks||100;
      return{subject,examType,examName,cls,examDate,rows,present,pass,avgP,fullMarks,count:rows.length};
    })
    // বিষয় → তারিখ অনুযায়ী সাজাও
    .sort((a,b)=>{
      if(a.subject!==b.subject)return a.subject.localeCompare(b.subject);
      if(!a.examDate&&!b.examDate)return 0;
      if(!a.examDate)return 1;if(!b.examDate)return -1;
      return new Date(a.examDate)-new Date(b.examDate);
    });
  },[tr]);

  const [expandedExam,setExpandedExam]=useState(null); // key string of expanded row

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:14,padding:18,width:"100%",maxWidth:420,maxHeight:"82vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>

        {/* নিজের প্রোফাইল ব্যানার */}
        {isSelf&&(<div style={{background:"linear-gradient(135deg,#5344b5,#7c3aed)",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{color:"#fff"}}>
            <div style={{fontSize:10,opacity:0.8}}>আপনি দেখছেন</div>
            <div style={{fontSize:13,fontWeight:700}}>👤 আমার প্রোফাইল</div>
          </div>
          {onChangePwd&&<button onClick={()=>{onClose();setTimeout(onChangePwd,100);}} style={{fontSize:11,background:"rgba(255,255,255,0.18)",color:"#fff",border:"1px solid rgba(255,255,255,0.35)",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontWeight:700}}>🔑 পাসওয়ার্ড</button>}
        </div>)}

        {/* হেডার */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:48,height:48,borderRadius:"50%",background:"linear-gradient(135deg,#5344b5,#7c3aed)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:16,flexShrink:0,boxShadow:"0 4px 12px rgba(83,68,181,0.35)"}}>
              {name.split(" ").map(w=>w[0]).filter(Boolean).slice(0,2).join("")}
            </div>
            <div>
              <div style={{fontWeight:700,fontSize:16,color:C.pu}}>{name}</div>
              <div style={{fontSize:11,color:C.mu}}>শিক্ষক • Heritage Public School</div>
              {name===ADMIN_TEACHER&&<div style={{fontSize:11,color:C.am,fontWeight:600}}>👑 একাডেমিক ইনচার্জ</div>}
            </div>
          </div>
          <button onClick={onClose} style={{border:"none",background:C.puL,color:C.pu,borderRadius:8,padding:"5px 10px",cursor:"pointer",fontWeight:700,fontSize:14}}>✕</button>
        </div>

        {/* KPI স্কোর */}
        <div style={{background:gc+"15",border:`1px solid ${gc}30`,borderRadius:10,padding:"12px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:C.mu}}>KPI স্কোর</div>
            <div style={{fontSize:28,fontWeight:700,color:gc}}>{kpi.score}</div>
            <div style={{fontSize:11,color:C.mu,marginTop:2}}>{kpi.grade==="—"?"ডেটা নেই":"গ্রেড: "+kpi.grade}</div>
          </div>
          <div style={{textAlign:"right"}}>
            {badge(gc,kpi.grade)}
            <div style={{fontSize:11,color:C.mu,marginTop:6}}>{tr.length}টি ফলাফল এন্ট্রি</div>
            <div style={{fontSize:11,color:C.mu}}>{lp}টি পাঠ পরিকল্পনা</div>
          </div>
        </div>

        {/* পর্যবেক্ষণ সারসংক্ষেপ */}
        {(attPct!==null||sylPct!==null||avgFb!==null)&&(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
          {attPct!==null&&<Stat label="উপস্থিতি" value={`${attPct}%`} color={attPct>=85?C.gr:attPct>=70?C.am:C.re}/>}
          {sylPct!==null&&<Stat label="সিলেবাস" value={`${sylPct}%`} color={sylPct>=75?C.gr:sylPct>=50?C.am:C.re}/>}
          {avgFb!==null&&<Stat label="ফিডব্যাক" value={`${avgFb}/5`} color={avgFb>=4?C.gr:avgFb>=3?C.am:C.re}/>}
        </div>)}

        {/* পরিসংখ্যান */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
          <Stat label="গড় %" value={tr.length?`${avgPct}%`:"—"} color={C.te}/>
          <Stat label="পাস" value={tr.length?`${pass}/${tr.length}`:"—"} color={C.gr}/>
          <Stat label="ফেল" value={tr.length?tr.length-pass:"—"} color={tr.length-pass>0?C.re:C.mu}/>
        </div>

        {/* বিষয়ভিত্তিক পরীক্ষাওয়ারি পারফরম্যান্স */}
        {examRows.length>0&&(
          <div style={{marginBottom:14}}>
            <H3>📚 বিষয়ভিত্তিক পারফরম্যান্স</H3>
            <div style={{fontSize:11,color:C.mu,marginBottom:8}}>পরীক্ষার নামে ক্লিক করলে ছাত্রদের নম্বর দেখাবে</div>
            {(()=>{
              // বিষয় গ্রুপ করো
              const bySubject={};
              examRows.forEach(row=>{
                if(!bySubject[row.subject])bySubject[row.subject]=[];
                bySubject[row.subject].push(row);
              });
              return Object.entries(bySubject).map(([subject,rows])=>{
                // বিষয়ের সামগ্রিক গড়
                const allPresent=rows.flatMap(r=>r.present);
                const subAvg=allPresent.length?Math.round(allPresent.reduce((a,r)=>a+(r.marks/(r.fullMarks||100)*100),0)/allPresent.length):0;
                const subPass=allPresent.filter(r=>r.marks>=(r.passMarks||33)).length;
                const [,subGc]=getGrade(subAvg,100,33);
                return(
                  <div key={subject} style={{marginBottom:10,border:`1px solid ${C.bd}`,borderRadius:10,overflow:"hidden"}}>
                    {/* বিষয় হেডার */}
                    <div style={{background:subGc+"12",padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${C.bd}`}}>
                      <div style={{fontWeight:700,fontSize:13,color:C.tx}}>{subject}</div>
                      <div style={{display:"flex",gap:10,alignItems:"center"}}>
                        <span style={{fontSize:12,fontWeight:700,color:subGc}}>{subAvg}%</span>
                        <span style={{fontSize:11,color:C.gr}}>{subPass}/{allPresent.length} পাস</span>
                        <span style={{fontSize:11,color:C.mu}}>{rows.length}টি পরীক্ষা</span>
                      </div>
                    </div>
                    {/* পরীক্ষাওয়ারি সারি */}
                    {rows.map((ex,ei)=>{
                      const exKey=`${subject}||${ex.examType}||${ex.examName}||${ex.cls}`;
                      const isOpen=expandedExam===exKey;
                      const [,egc]=getGrade(ex.avgP,100,33);
                      const dateLabel=ex.examDate?(()=>{try{return new Date(ex.examDate).toLocaleDateString("bn-BD",{day:"numeric",month:"short"});}catch(e){return ex.examDate;}})():"";
                      return(
                        <div key={ei}>
                          {/* পরীক্ষার সারি */}
                          <div
                            onClick={()=>setExpandedExam(isOpen?null:exKey)}
                            style={{display:"flex",alignItems:"center",gap:6,padding:"8px 12px",cursor:"pointer",background:isOpen?C.puL:"#fff",borderBottom:ei<rows.length-1||isOpen?`1px solid ${C.bd}22`:"none",transition:"background 0.15s"}}
                          >
                            {/* toggle ত্রিকোণ */}
                            <span style={{fontSize:10,color:C.mu,flexShrink:0,transition:"transform 0.2s",display:"inline-block",transform:isOpen?"rotate(90deg)":"rotate(0deg)"}}>▶</span>
                            {/* পরীক্ষার নাম */}
                            <div style={{flex:1,minWidth:0}}>
                              <span style={{fontSize:12,fontWeight:600,color:isOpen?C.pu:C.tx}}>{ex.examType}</span>
                              {ex.examName&&<span style={{fontSize:11,color:C.mu}}> — {ex.examName}</span>}
                              {dateLabel&&<span style={{fontSize:10,color:C.mu}}> • 📅{dateLabel}</span>}
                              <span style={{fontSize:10,color:C.mu}}> • শ্রেণি {ex.cls}</span>
                            </div>
                            {/* স্ট্যাট */}
                            <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                              <span style={{fontSize:12,fontWeight:700,color:egc}}>{ex.avgP}%</span>
                              <span style={{fontSize:11,color:C.gr,minWidth:36}}>{ex.pass}/{ex.present.length}</span>
                              <span style={{fontSize:10,background:C.bg,borderRadius:5,padding:"2px 6px",color:C.mu}}>{ex.fullMarks}নম্বর</span>
                            </div>
                          </div>

                          {/* ছাত্রদের নম্বর — expandable */}
                          {isOpen&&(
                            <div style={{background:"#fafafe",borderBottom:ei<rows.length-1?`1px solid ${C.bd}22`:"none"}}>
                              {/* মিনি স্ট্যাট বার */}
                              <div style={{display:"flex",gap:12,padding:"6px 14px",fontSize:11,color:C.mu,borderBottom:`1px solid ${C.bd}22`}}>
                                <span>মোট: {ex.rows.length} জন</span>
                                <span style={{color:C.gr}}>পাস: {ex.pass}</span>
                                <span style={{color:C.re}}>ফেল: {ex.present.length-ex.pass}</span>
                                {ex.rows.filter(r=>r.absent).length>0&&<span style={{color:"#7c3aed"}}>অনুপস্থিত: {ex.rows.filter(r=>r.absent).length}</span>}
                              </div>
                              {/* ছাত্রের গ্রিড */}
                              <div style={{padding:"8px 10px",display:"flex",flexWrap:"wrap",gap:5}}>
                                {[...ex.rows].sort((a,b)=>{
                                  if(a.absent&&!b.absent)return 1;
                                  if(!a.absent&&b.absent)return -1;
                                  return(b.marks||0)-(a.marks||0);
                                }).map((r,ri)=>{
                                  if(r.absent)return(
                                    <div key={ri} style={{background:"#f3f0ff",border:"1px solid #7c3aed30",borderRadius:7,padding:"5px 8px",fontSize:11,minWidth:80}}>
                                      <div style={{fontWeight:600,color:"#7c3aed",fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:90}}>{r.name.split(" ")[0]}</div>
                                      <div style={{color:"#7c3aed",fontWeight:700,fontSize:11}}>অনুপস্থিত</div>
                                    </div>
                                  );
                                  const pct=Math.round(r.marks/(r.fullMarks||100)*100);
                                  const [grd,mgc]=getGrade(r.marks,r.fullMarks||100,r.passMarks||33);
                                  return(
                                    <div key={ri} style={{background:mgc+"14",border:`1px solid ${mgc}30`,borderRadius:7,padding:"5px 8px",fontSize:11,minWidth:80}}>
                                      <div style={{fontWeight:600,color:C.tx,fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:90}}>{r.name.split(" ")[0]}</div>
                                      <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                                        <span style={{color:mgc,fontWeight:800,fontSize:14}}>{r.marks}</span>
                                        <span style={{color:C.mu,fontSize:9}}>/{r.fullMarks||100}</span>
                                        <span style={{fontSize:10,fontWeight:700,color:mgc,marginLeft:2}}>{grd}</span>
                                      </div>
                                      <div style={{height:3,borderRadius:2,background:"#eee",marginTop:3}}>
                                        <div style={{width:`${pct}%`,height:"100%",background:mgc,borderRadius:2}}/>
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              });
            })()}
          </div>
        )}

        {tr.length===0&&(
          <div style={{textAlign:"center",color:C.mu,padding:20,fontSize:13}}>
            এখনো কোনো ফলাফল এন্ট্রি নেই<br/>
            <span style={{fontSize:11}}>পরীক্ষা মডিউলে এই শিক্ষককে নির্বাচন করুন</span>
          </div>
        )}

        {/* পর্যবেক্ষণ করেছেন */}
        <div style={{marginTop:14}}>
          <H3>🔭 পর্যবেক্ষণ করেছেন ({observationsMade.length})</H3>
          {observationsMade.length===0?(
            <div style={{textAlign:"center",color:C.mu,padding:10,fontSize:12}}>এখনো কোনো ক্লাস পর্যবেক্ষণ করেননি</div>
          ):(
            [...observationsMade].reverse().slice(0,5).map(o=>(
              <div key={o.id} style={{padding:"7px 9px",borderRadius:7,background:C.bg,marginBottom:5,border:`1px solid ${C.bd}`,fontSize:11}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span>{o.observedTeacher} • {o.cls} শ্রেণি • {o.date}</span>
                  <span style={{fontWeight:700,color:o.totalScore>=70?C.gr:o.totalScore>=50?C.am:C.re}}>{o.totalScore}</span>
                </div>
              </div>
            ))
          )}
        </div>

        {/* পর্যবেক্ষিত হয়েছেন */}
        <div style={{marginTop:14}}>
          <H3>🎯 পর্যবেক্ষিত হয়েছেন ({observationsReceived.length}{avgReceivedScore!==null?` • গড় ${avgReceivedScore}`:""})</H3>
          {observationsReceived.length===0?(
            <div style={{textAlign:"center",color:C.mu,padding:10,fontSize:12}}>এখনো কোনো ক্লাস পর্যবেক্ষণ হয়নি</div>
          ):(
            [...observationsReceived].reverse().slice(0,5).map(o=>(
              <div key={o.id} style={{padding:"7px 9px",borderRadius:7,background:C.bg,marginBottom:5,border:`1px solid ${C.bd}`,fontSize:11}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span>পর্যবেক্ষক: {o.observerTeacher} • {o.cls} শ্রেণি • {o.date}</span>
                  <span style={{fontWeight:700,color:o.totalScore>=70?C.gr:o.totalScore>=50?C.am:C.re}}>{o.totalScore}</span>
                </div>
              </div>
            ))
          )}
        </div>
      </div>
    </div>
  );
}

function Teachers({results,lessonPlans,obsData={},teacherSubjects={},setTeacherSubjects=()=>{},isAdmin=false,customTeachers=[],setCustomTeachers=()=>{},STUDENTS}){STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const [q,setQ]=useState("");
  const [sel,setSel]=useState(null);
  const [tab,setTab]=useState("list");
  const [mapTeacher,setMapTeacher]=useState(TEACHERS[0]);
  const [newTeacherName,setNewTeacherName]=useState("");
  const [teacherErr,setTeacherErr]=useState("");
  const allRes=Object.values(results).flat();

  const addTeacher=()=>{
    const name=newTeacherName.trim().toUpperCase();
    if(!name){setTeacherErr("নাম লিখুন");return;}
    if(TEACHERS.includes(name)){setTeacherErr("এই শিক্ষক ইতিমধ্যে আছেন");return;}
    setCustomTeachers(prev=>{
      const updated=[...prev,name];
      TEACHERS=[...DEFAULT_TEACHERS,...updated];
      return updated;
    });
    CredStore.registerNew(name); // নতুন শিক্ষকের পাসওয়ার্ড সেট
    setNewTeacherName("");
    setTeacherErr("");
  };

  const removeTeacher=(name)=>{
    if(DEFAULT_TEACHERS.includes(name)){setTeacherErr("ডিফল্ট শিক্ষক মুছে ফেলা যাবে না");setTimeout(()=>setTeacherErr(""),2500);return;}
    if(!window.confirm(`"${name}" কে তালিকা থেকে বাদ দিতে চান?`))return;
    setCustomTeachers(prev=>{
      const updated=prev.filter(t=>t!==name);
      TEACHERS=[...DEFAULT_TEACHERS,...updated];
      return updated;
    });
  };
  const list=TEACHERS.filter(t=>t.toLowerCase().includes(q.toLowerCase()));

  const toggleMapSubject=(item)=>{
    setTeacherSubjects(prev=>{
      const cur=prev[mapTeacher]||[];
      const isObj=typeof item==="object";
      const exists=isObj
        ?cur.some(x=>typeof x==="object"&&x.cls===item.cls&&x.sub===item.sub)
        :cur.some(x=>typeof x==="string"&&x===item);
      const next=exists
        ?(isObj?cur.filter(x=>!(typeof x==="object"&&x.cls===item.cls&&x.sub===item.sub)):cur.filter(x=>x!==item))
        :[...cur,item];
      return{...prev,[mapTeacher]:next};
    });
  };
  const clearMapping=()=>setTeacherSubjects(prev=>({...prev,[mapTeacher]:[]}));
  const mapSelected=teacherSubjects[mapTeacher]||[];

  // প্রতিটি শিক্ষকের কাজের চাপ হিসাব
  const workload=TEACHERS.map(t=>{
    const tr=allRes.filter(r=>r.teacher===t);
    const subjects=[...new Set(tr.map(r=>r.subject))];
    const classes=[...new Set(tr.map(r=>r.cls))];
    const lp=((lessonPlans._v2||[]).filter(p=>p.teacher===t).length)+(lessonPlans[t]||[]).length;
    const total=tr.length+lp;
    return{t,subjects,classes,lp,results:tr.length,total};
  }).sort((a,b)=>b.total-a.total);

  const maxTotal=Math.max(...workload.map(w=>w.total),1);

  return(<div>
    <H2>👩‍🏫 শিক্ষক ব্যবস্থাপনা</H2>
    {sel&&<TeacherProfile name={sel} results={results} lessonPlans={lessonPlans} obsData={obsData} onClose={()=>setSel(null)}/>}

    {/* ট্যাব */}
    <div style={{display:"flex",gap:6,marginBottom:10}}>
      {[{id:"list",label:"📋 তালিকা"},{id:"workload",label:"⚖️ কাজের চাপ"},...(isAdmin?[{id:"mapping",label:"🔗 বিষয় ম্যাপিং"}]:[])].map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"7px 14px",borderRadius:16,border:`1px solid ${tab===t.id?C.pu:C.bd}`,background:tab===t.id?C.puL:"transparent",color:tab===t.id?C.pu:C.mu,cursor:"pointer",fontSize:12,fontWeight:tab===t.id?700:400}}>
          {t.label}
        </button>
      ))}
    </div>

    {/* তালিকা ট্যাব */}
    {tab==="list"&&(<div>
      {/* নতুন শিক্ষক যোগ — শুধু অ্যাডমিন */}
      {isAdmin&&(<Card style={{background:C.puL,border:`1px solid ${C.pu}30`,marginBottom:10}}>
        <H3>➕ নতুন শিক্ষক যোগ করুন</H3>
        <div style={{display:"flex",gap:8}}>
          <input type="text" placeholder="শিক্ষকের পুরো নাম লিখুন (বড় হাতে)..." value={newTeacherName}
            onChange={e=>{setNewTeacherName(e.target.value);setTeacherErr("");}}
            onKeyDown={e=>e.key==="Enter"&&addTeacher()}
            style={{flex:1,padding:"8px 12px",border:`1px solid ${teacherErr?C.re:C.pu}30`,borderRadius:8,fontSize:13}}/>
          <button onClick={addTeacher} style={{padding:"8px 16px",background:C.pu,color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:13}}>যোগ</button>
        </div>
        {teacherErr&&<div style={{color:C.re,fontSize:12,marginTop:5,fontWeight:600}}>⚠ {teacherErr}</div>}
        {customTeachers.length>0&&<div style={{fontSize:11,color:C.pu,marginTop:6,fontWeight:600}}>✓ {customTeachers.length}জন নতুন শিক্ষক যোগ করা হয়েছে</div>}
      </Card>)}
      <Card>
        <input type="text" placeholder="শিক্ষকের নাম খুঁজুন..." value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:10}}/>
        <div style={{marginBottom:8,display:"flex",gap:6}}>{badge(C.te,`${TEACHERS.length} জন শিক্ষক`)}</div>
        <div style={{fontSize:11,color:C.mu,marginBottom:8}}>👆 নামে ক্লিক করলে প্রোফাইল দেখা যাবে</div>
        <table><thead><tr><th>#</th><th>নাম</th><th>ফলাফল</th><th>পাঠ</th>{isAdmin&&<th></th>}</tr></thead><tbody>
          {list.map((t,i)=>{
            const w=workload.find(w=>w.t===t);
            const isCustom=customTeachers.includes(t);
            return(<tr key={i}>
              <td style={{color:C.mu,fontSize:11}}>{i+1}</td>
              <td style={{fontWeight:500,color:C.pu,textDecoration:"underline dotted",cursor:"pointer"}} onClick={()=>setSel(t)}>
                {t}{isCustom&&<span style={{fontSize:10,color:C.gr,marginLeft:4}}>★</span>}
              </td>
              <td>{badge(C.te,`${w?.results||0}টি`)}</td>
              <td>{badge(C.am,`${w?.lp||0}টি`)}</td>
              {isAdmin&&<td>
                {isCustom&&<button onClick={()=>removeTeacher(t)}
                  style={{padding:"3px 8px",borderRadius:6,border:`1px solid ${C.re}40`,background:C.reL,color:C.re,cursor:"pointer",fontSize:11}}>
                  🗑
                </button>}
              </td>}
            </tr>);
          })}
        </tbody></table>
      </Card>
    </div>)}

    {/* কাজের চাপ ট্যাব */}
    {tab==="workload"&&(<div>
      <Card style={{background:C.puL,border:`1px solid ${C.pu}30`,marginBottom:10}}>
        <div style={{fontSize:12,color:C.pu}}>⚖️ কাজের চাপ = ফলাফল এন্ট্রি + পাঠ পরিকল্পনার মোট সংখ্যা</div>
      </Card>
      <Card>
        <H3>শিক্ষকভিত্তিক কাজের চাপ</H3>
        {workload.filter(w=>w.total>0).length===0&&(
          <div style={{textAlign:"center",color:C.mu,padding:20,fontSize:13}}>এখনো কোনো ডেটা নেই</div>
        )}
        {workload.filter(w=>w.total>0).map(({t,subjects,classes,lp,results:res,total},i)=>{
          const load=total/maxTotal*100;
          const lc=load>=75?C.re:load>=50?C.am:C.gr;
          const label=load>=75?"বেশি চাপ":load>=50?"মাঝারি":"কম চাপ";
          return(
            <div key={i} style={{marginBottom:14,paddingBottom:14,borderBottom:`1px solid ${C.bd}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{fontWeight:600,fontSize:13,cursor:"pointer",color:C.pu,textDecoration:"underline dotted"}} onClick={()=>setSel(t)}>{t}</div>
                {badge(lc,label)}
              </div>
              <div style={{height:8,background:"#eee",borderRadius:4,marginBottom:6}}>
                <div style={{width:`${load}%`,height:"100%",background:lc,borderRadius:4,transition:"width 0.4s"}}/>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <span style={{fontSize:11,color:C.mu}}>📝 {res}টি ফলাফল</span>
                <span style={{fontSize:11,color:C.mu}}>📚 {lp}টি পাঠ</span>
                {classes.length>0&&<span style={{fontSize:11,color:C.mu}}>🏫 শ্রেণি: {classes.join(", ")}</span>}
                {subjects.length>0&&<span style={{fontSize:11,color:C.mu}}>📖 বিষয়: {subjects.join(", ")}</span>}
              </div>
            </div>
          );
        })}
      </Card>

      {/* সবচেয়ে বেশি ও কম কাজের শিক্ষক */}
      {workload.filter(w=>w.total>0).length>=2&&(()=>{
        const active=workload.filter(w=>w.total>0);
        const busiest=active[0];
        const lightest=active[active.length-1];
        return(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Card style={{background:C.reL,border:`1px solid ${C.re}30`,textAlign:"center"}}>
              <div style={{fontSize:18}}>🔥</div>
              <div style={{fontWeight:700,color:C.re,fontSize:12,marginTop:4}}>সবচেয়ে ব্যস্ত</div>
              <div style={{fontWeight:700,fontSize:13,color:C.re,marginTop:4}}>{busiest.t.split(" ").pop()}</div>
              <div style={{fontSize:11,color:C.mu}}>{busiest.total}টি কাজ</div>
            </Card>
            <Card style={{background:C.grL,border:`1px solid ${C.gr}30`,textAlign:"center"}}>
              <div style={{fontSize:18}}>😌</div>
              <div style={{fontWeight:700,color:C.gr,fontSize:12,marginTop:4}}>সবচেয়ে কম চাপ</div>
              <div style={{fontWeight:700,fontSize:13,color:C.gr,marginTop:4}}>{lightest.t.split(" ").pop()}</div>
              <div style={{fontSize:11,color:C.mu}}>{lightest.total}টি কাজ</div>
            </Card>
          </div>
        );
      })()}
    </div>)}

    {/* বিষয় ম্যাপিং ট্যাব — শুধু অ্যাডমিন (শ্রেণি+বিষয় কম্বো) */}
    {tab==="mapping"&&isAdmin&&(<div>
      <Card style={{background:C.puL,border:`1px solid ${C.pu}30`,marginBottom:10}}>
        <div style={{fontSize:12,color:C.pu,lineHeight:1.6}}>🔗 প্রতিটি শিক্ষকের জন্য <strong>শ্রেণি + বিষয়</strong> কম্বিনেশন বরাদ্দ করুন। একই বিষয় ভিন্ন শ্রেণিতে ভিন্ন শিক্ষক পড়াতে পারবেন। কিছু নির্বাচন না করলে শিক্ষক সব দেখতে পাবেন।</div>
      </Card>
      <Card>
        <div style={{fontSize:11,color:C.mu,marginBottom:4}}>শিক্ষক নির্বাচন করুন</div>
        <select value={mapTeacher} onChange={e=>setMapTeacher(e.target.value)} style={{marginBottom:14}}>
          {TEACHERS.map(t=><option key={t} value={t}>{t}{t===ADMIN_TEACHER?" 👑":""}</option>)}
        </select>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:12,fontWeight:700,color:C.pu}}>
            {mapSelected.length===0?"কোনো নির্দিষ্ট বরাদ্দ নেই (সব দেখতে পাবেন)":`${mapSelected.length}টি শ্রেণি-বিষয় বরাদ্দ`}
          </div>
          {mapSelected.length>0&&<button onClick={clearMapping} style={{border:"none",background:"transparent",color:C.re,fontSize:11,cursor:"pointer",fontWeight:600}}>✕ সব বাতিল</button>}
        </div>
        {mapSelected.length>0&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12,padding:"8px 10px",background:C.puL,borderRadius:8}}>
            {mapSelected.map((item,i)=>{
              const label=typeof item==="string"?item:`${item.cls} — ${item.sub}`;
              return(<span key={i} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:16,background:C.pu,color:"#fff",fontSize:11,fontWeight:600}}>
                {label}
                <span style={{cursor:"pointer",opacity:0.75,fontSize:12}} onClick={()=>toggleMapSubject(item)}>✕</span>
              </span>);
            })}
          </div>
        )}
        {Object.entries(SUBJECTS_BY_CLASS).map(([cls,subs])=>(
          <div key={cls} style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:C.tx,marginBottom:5,background:"#f0eeff",padding:"4px 8px",borderRadius:6,display:"inline-block"}}>📚 শ্রেণি {cls}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:4}}>
              {subs.map(sub=>{
                const isOn=mapSelected.some(x=>typeof x==="object"&&x.cls===cls&&x.sub===sub);
                const item={cls,sub};
                return(<button key={sub} onClick={()=>toggleMapSubject(item)}
                  style={{padding:"5px 10px",borderRadius:14,border:`1px solid ${isOn?C.pu:C.bd}`,background:isOn?C.pu:"transparent",color:isOn?"#fff":C.mu,cursor:"pointer",fontSize:11,fontWeight:isOn?700:400,transition:"all 0.15s"}}>
                  {isOn?"✓ ":""}{sub}
                </button>);
              })}
            </div>
          </div>
        ))}
      </Card>
      <Card>
        <H3>সারসংক্ষেপ — কে কোন শ্রেণির কোন বিষয় পড়ান</H3>
        {TEACHERS.map(t=>{
          const items=teacherSubjects[t]||[];
          if(!items.length)return null;
          const byClass={};
          items.forEach(x=>{
            const cls=typeof x==="object"?x.cls:"?";
            const sub=typeof x==="object"?x.sub:x;
            if(!byClass[cls])byClass[cls]=[];
            byClass[cls].push(sub);
          });
          return(<div key={t} style={{marginBottom:12,paddingBottom:12,borderBottom:`1px solid ${C.bd}`,cursor:"pointer"}} onClick={()=>setMapTeacher(t)}>
            <div style={{fontWeight:700,fontSize:12,color:t===mapTeacher?C.pu:C.tx,marginBottom:5}}>{t}{t===mapTeacher&&" ✏️"}</div>
            {Object.entries(byClass).map(([cls,subs])=>(
              <div key={cls} style={{display:"flex",gap:6,alignItems:"flex-start",marginBottom:3}}>
                <span style={{fontSize:11,fontWeight:700,color:C.pu,minWidth:52,flexShrink:0}}>শ্রেণি {cls}:</span>
                <span style={{fontSize:11,color:C.mu}}>{subs.join(", ")}</span>
              </div>
            ))}
          </div>);
        })}
        {TEACHERS.every(t=>!(teacherSubjects[t]||[]).length)&&(
          <div style={{textAlign:"center",color:C.mu,padding:16,fontSize:12}}>এখনো কোনো বরাদ্দ নেই</div>
        )}
      </Card>
    </div>)}
  </div>);
}


/* ══ EXAM ENTRY ══ */
function ExamEntry({results,setResults,currentUser="",isAdmin=true,teacherSubjects={},STUDENTS}){STUDENTS=STUDENTS||DEFAULT_STUDENTS;
  const [cls,setCls]=useState("VI");
  const [sub,setSub]=useState((SUBJECTS_BY_CLASS["VI"]||SUBJECTS)[0]);
  const [ex,setEx]=useState("Half-Yearly Exam");
  const [examName,setExamName]=useState("");
  const [examDate,setExamDate]=useState("");
  const [marks,setMarks]=useState({});
  const [absent,setAbsent]=useState({});// {name: true/false}
  const [teacher,setTeacher]=useState(isAdmin?TEACHERS[0]:(currentUser||TEACHERS[0]));
  const [fullMarks,setFullMarks]=useState(100);
  const [passMarks,setPassMarks]=useState(33);
  const [msg,setMsg]=useState("");
  const exList=["IV","V"].includes(cls)?EXAM_LOWER:EXAM_UPPER;
  const clsSubjects=SUBJECTS_BY_CLASS[cls]||SUBJECTS;
  // এই শিক্ষকের জন্য নির্ধারিত বিষয় থাকলে শুধু সেগুলোই দেখানো হবে
  const allowedSubjects=useMemo(()=>{
    const mapped=teacherSubjects[teacher];
    if(!mapped||!mapped.length)return clsSubjects;
    // নতুন ফরম্যাট: [{cls,sub},...] — শ্রেণিভিত্তিক ফিল্টার
    if(typeof mapped[0]==="object"){
      const forCls=mapped.filter(x=>x.cls===cls).map(x=>x.sub);
      return forCls.length?clsSubjects.filter(s=>forCls.includes(s)):clsSubjects;
    }
    // পুরনো ফরম্যাট string[] — পিছনে সামঞ্জস্য
    return clsSubjects.filter(s=>mapped.includes(s));
  },[clsSubjects,teacherSubjects,teacher,cls]);

  useEffect(()=>{
    if(allowedSubjects.length&&!allowedSubjects.includes(sub))setSub(allowedSubjects[0]);
  },[allowedSubjects]);

  const handleClsChange=(c)=>{
    setCls(c);
    const subs=SUBJECTS_BY_CLASS[c]||SUBJECTS;
    setSub(subs[0]);
    setMarks({});setAbsent({});
  };

  const handleTeacherChange=(t)=>{
    setTeacher(t);
    setMarks({});setAbsent({});
  };

  const handleFullMarks=(val)=>{
    const fm=parseInt(val)||100;
    setFullMarks(fm);
    setPassMarks(Math.round(fm*0.33));
  };

  const getDynGrade=(m,fm)=>{
    const pct=m/fm*100;
    if(pct>=80)return["A+",C.gr];if(pct>=70)return["A",C.te];if(pct>=60)return["A-",C.te];
    if(pct>=50)return["B",C.am];if(pct>=40)return["C",C.am];
    if(m>=passMarks)return["D",C.co];return["F",C.re];
  };

  const toggleAbsent=(name)=>{
    setAbsent(p=>({...p,[name]:!p[name]}));
    if(!absent[name])setMarks(p=>{const n={...p};delete n[name];return n;});
  };

  // লাইভ প্রিভিউ — absent বাদ দিয়ে
  const presentStudents=STUDENTS[cls].filter(n=>!absent[n]);
  const entered=presentStudents.map(n=>marks[n]).filter(v=>v!==""&&v!==undefined&&v!==null);
  const liveAvg=entered.length?Math.round(entered.reduce((a,b)=>a+parseInt(b),0)/entered.length):null;
  const livePass=entered.filter(v=>parseInt(v)>=passMarks).length;
  const liveFail=entered.filter(v=>parseInt(v)<passMarks).length;
  const liveAbsent=Object.values(absent).filter(Boolean).length;
  const liveAvgPct=liveAvg?Math.round(liveAvg/fullMarks*100):null;

  const save=()=>{
    const nowISO=new Date().toISOString();
    const entries=STUDENTS[cls]
      .filter(name=>!absent[name])// absent বাদ দাও
      .map(name=>({
        name,cls,subject:sub,examType:ex,
        examName:examName.trim(),examDate:examDate.trim(),
        marks:marks[name]!==""&&marks[name]!==undefined?parseInt(marks[name])||0:0,
        fullMarks,passMarks,
        examOrder:EXAM_ORDER[ex]||1,
        teacher,
        absent:false,
        savedAt:nowISO
      }));
    // absent রেকর্ড আলাদাভাবে (KPI হিসাবে বাদ যাবে)
    const absentEntries=STUDENTS[cls]
      .filter(name=>absent[name])
      .map(name=>({
        name,cls,subject:sub,examType:ex,
        examName:examName.trim(),examDate:examDate.trim(),
        marks:null,fullMarks,passMarks,
        examOrder:EXAM_ORDER[ex]||1,
        teacher,absent:true,
        savedAt:nowISO
      }));
    setResults(p=>{
      const prev={...p};
      const existing=prev[cls]||[];
      // একই শ্রেণি+বিষয়+পরীক্ষার ধরনের পুরনো এন্ট্রি বাদ দাও (replace করা হবে)
      const filtered=existing.filter(r=>!(r.subject===sub&&r.examType===ex&&(examName.trim()?r.examName===examName.trim():true)));
      prev[cls]=[...filtered,...entries,...absentEntries];
      return prev;
    });
    setMarks({});setAbsent({});setExamDate("");setExamName("");
    setMsg(`✓ সংরক্ষিত! উপস্থিত: ${entries.length} | অনুপস্থিত: ${absentEntries.length}`);
    setTimeout(()=>setMsg(""),3000);
  };

  return(<div>
    <H2>📝 পরীক্ষার নম্বর এন্ট্রি</H2>
    <Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <div><div style={{fontSize:11,color:C.mu,marginBottom:4}}>শ্রেণি</div><select value={cls} onChange={e=>handleClsChange(e.target.value)}>{Object.keys(STUDENTS).map(c=><option key={c} value={c}>শ্রেণি {c}</option>)}</select></div>
        <div><div style={{fontSize:11,color:C.mu,marginBottom:4}}>বিষয়{teacherSubjects[teacher]&&teacherSubjects[teacher].length?" (আপনার জন্য নির্ধারিত)":""}</div><select value={sub} onChange={e=>setSub(e.target.value)}>{allowedSubjects.map(s=><option key={s}>{s}</option>)}</select></div>
        <div><div style={{fontSize:11,color:C.mu,marginBottom:4}}>পরীক্ষার ধরন</div><select value={ex} onChange={e=>setEx(e.target.value)}>{exList.map(e=><option key={e}>{e}</option>)}</select></div>
        <div>
          <div style={{fontSize:11,color:C.mu,marginBottom:4}}>শিক্ষক</div>
          {isAdmin
            ?<select value={teacher} onChange={e=>handleTeacherChange(e.target.value)}>{TEACHERS.map(t=><option key={t}>{t}</option>)}</select>
            :<div style={{padding:"8px 12px",background:"#f5f5f5",borderRadius:8,fontSize:14,fontWeight:600,color:C.pu}}>{teacher}</div>}
        </div>
        <div>
          <div style={{fontSize:11,color:C.mu,marginBottom:4}}>পরীক্ষার নাম/নম্বর</div>
          <input type="text" placeholder="যেমন: মাসিক পরীক্ষা-২" value={examName} onChange={e=>setExamName(e.target.value)}/>
        </div>
        <div>
          <div style={{fontSize:11,color:C.mu,marginBottom:4}}>তারিখ</div>
          <input type="date" value={examDate} onChange={e=>setExamDate(e.target.value)} style={{padding:"8px 12px",border:"1px solid rgba(0,0,0,0.15)",borderRadius:8,fontSize:14,width:"100%",outline:"none"}}/>
        </div>
        <div>
          <div style={{fontSize:11,color:C.mu,marginBottom:4}}>পূর্ণ নম্বর</div>
          <input type="number" min="1" max="200" value={fullMarks}
            onChange={e=>handleFullMarks(e.target.value)}
            style={{padding:"8px 12px",border:`1px solid ${C.pu}`,borderRadius:8,fontSize:14,width:"100%",fontWeight:700,color:C.pu}}/>
        </div>
        <div>
          <div style={{fontSize:11,color:C.mu,marginBottom:4}}>পাস নম্বর</div>
          <input type="number" min="1" max={fullMarks} value={passMarks}
            onChange={e=>setPassMarks(parseInt(e.target.value)||1)}
            style={{padding:"8px 12px",border:`1px solid ${C.gr}`,borderRadius:8,fontSize:14,width:"100%",fontWeight:700,color:C.gr}}/>
        </div>
      </div>

      {/* তথ্য বার */}
      <div style={{fontSize:11,color:C.mu,marginBottom:8,padding:"6px 10px",background:C.puL,borderRadius:6,display:"flex",gap:8,flexWrap:"wrap"}}>
        <span>শ্রেণি {cls}</span><span>|</span>
        <span>{sub}</span><span>|</span><span>{ex}</span>
        {examName&&(<><span>|</span><span>{examName}</span></>)}
        {examDate&&(<><span>|</span><span>📅 {examDate}</span></>)}
        <span>|</span>
        <span style={{color:C.pu,fontWeight:700}}>পূর্ণ নম্বর: {fullMarks}</span><span>|</span>
        <span style={{color:C.gr,fontWeight:700}}>পাস: {passMarks}</span>
      </div>

      {/* অনুপস্থিত নোট */}
      <div style={{background:"#fff8e1",border:`1px solid ${C.am}40`,borderRadius:8,padding:"7px 11px",marginBottom:10,fontSize:12,color:C.am}}>
        💡 যে ছাত্র পরীক্ষায় <strong>অনুপস্থিত</strong> ছিল তার পাশের <strong>অনু.</strong> বাটনে ক্লিক করুন — সে KPI ও ফলাফল হিসাব থেকে বাদ পড়বে
      </div>

      {/* লাইভ প্রিভিউ */}
      {(entered.length>0||liveAbsent>0)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",gap:6,marginBottom:10}}>
          <div style={{background:C.puL,borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:700,color:C.pu}}>{entered.length}</div>
            <div style={{fontSize:10,color:C.mu}}>এন্ট্রি</div>
          </div>
          <div style={{background:"#fff3e0",borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:700,color:C.am}}>{liveAvg||"—"}</div>
            <div style={{fontSize:10,color:C.mu}}>গড়</div>
          </div>
          <div style={{background:C.grL,borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:700,color:C.gr}}>{livePass}</div>
            <div style={{fontSize:10,color:C.mu}}>পাস</div>
          </div>
          <div style={{background:C.reL,borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:700,color:C.re}}>{liveFail}</div>
            <div style={{fontSize:10,color:C.mu}}>ফেল</div>
          </div>
          <div style={{background:"#f3f0ff",borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:700,color:"#7c3aed"}}>{liveAbsent}</div>
            <div style={{fontSize:10,color:C.mu}}>অনুপস্থিত</div>
          </div>
        </div>
      )}

      <div style={{overflowX:"auto"}}><table>
        <thead><tr><th>#</th><th>নাম</th><th>অনু.</th><th>নম্বর /{fullMarks}</th><th>%</th><th>গ্রেড</th></tr></thead>
        <tbody>
          {STUDENTS[cls].map((name,i)=>{
            const isAbs=!!absent[name];
            const m=parseInt(marks[name]||"");
            const pct=(!isAbs&&marks[name])?Math.round(m/fullMarks*100):null;
            const [g,gc]=(!isAbs&&marks[name])?getDynGrade(m,fullMarks):["—",C.mu];
            const isPassing=!isAbs&&marks[name]&&m>=passMarks;
            return(<tr key={i} style={{background:isAbs?"#f3f0ff":marks[name]?(isPassing?"#f0fff4":"#fff5f5"):"transparent",opacity:isAbs?0.65:1}}>
              <td style={{color:C.mu,fontSize:11}}>{i+1}</td>
              <td style={{fontWeight:500,fontSize:12,textDecoration:isAbs?"line-through":"none",color:isAbs?"#7c3aed":C.tx}}>{name}</td>
              <td>
                <button onClick={()=>toggleAbsent(name)}

// সাবমিশন উইন্ডো: বৃহস্পতিবার ৪:০০ PM → পরবর্তী শনিবার রাত ১২:০০ AM
function getWeeklyLPWindow(){
  const now=new Date();
  const day=now.getDay(); // 0=Sun,1=Mon,...,4=Thu,5=Fri,6=Sat
  const hour=now.getHours();
  const min=now.getMinutes();

  // বৃহস্পতিবার = 4, শনিবার = 6
  // উইন্ডো খোলে: বৃহস্পতিবার ৪:০০ PM
  // উইন্ডো বন্ধ: পরবর্তী শনিবার রাত ১২:০০ AM (midnight)

  let windowOpen=false;
  let windowStart=null;
  let windowEnd=null;
  let targetWeekStart=null; // পরবর্তী সপ্তাহের শনিবার

  // বর্তমান সময় থেকে সবচেয়ে কাছের বৃহস্পতিবার ৪:০০ PM খুঁজি
  const getLastThursday4PM=()=>{
    const d=new Date(now);
    // এই সপ্তাহের বৃহস্পতিবার
    const diffToThu=((4-day)+7)%7;
    const thisThu=new Date(d);
    thisThu.setDate(d.getDate()-(day===4&&(hour*60+min)>=16*60?0:((day-4+7)%7)));
    // যদি আজ বৃহস্পতিবার এবং ৪টার পরে
    if(day===4&&(hour*60+min)>=16*60){
      thisThu.setDate(d.getDate());
    } else {
      // গত বৃহস্পতিবার
      thisThu.setDate(d.getDate()-((day-4+7)%7||7));
    }
    thisThu.setHours(16,0,0,0);
    return thisThu;
  };

  const lastThu4PM=getLastThursday4PM();
  // পরবর্তী শনিবার রাত ১২টা
  const nextSatMidnight=new Date(lastThu4PM);
  // বৃহস্পতিবার থেকে ২ দিন পরে = শনিবার
  nextSatMidnight.setDate(lastThu4PM.getDate()+2);
  nextSatMidnight.setHours(23,59,59,999);

  windowStart=lastThu4PM;
  windowEnd=nextSatMidnight;
  windowOpen=(now>=windowStart&&now<=windowEnd);

  // পরবর্তী সপ্তাহের শনিবার (সাবমিশনের পর সপ্তাহ)
  // উইন্ডো খোলে যে বৃহস্পতিবারে, পরের দিন শুক্রবার, তারপর শনিবার = টার্গেট সপ্তাহ শুরু
  const nextSat=new Date(lastThu4PM);
  nextSat.setDate(lastThu4PM.getDate()+2);
  nextSat.setHours(0,0,0,0);
  targetWeekStart=nextSat;

  return{windowOpen,windowStart,windowEnd,targetWeekStart};
}

// পরবর্তী সপ্তাহের ৬ দিনের তারিখ (শনি–বৃহস্পতি, শুক্র বাদ)
function getWeekDays(weekStart){
  const days=[];
  const dayNames=["শনিবার","রবিবার","সোমবার","মঙ্গলবার","বুধবার","বৃহস্পতিবার"];
  // weekStart = শনিবার
  for(let i=0;i<6;i++){
    const d=new Date(weekStart);
    d.setDate(weekStart.getDate()+i);
    const dd=String(d.getDate()).padStart(2,"0");
    const mm=String(d.getMonth()+1).padStart(2,"0");
    const yy=d.getFullYear();
    days.push({label:`${dayNames[i]} (${dd}.${mm}.${yy})`,date:d.toISOString().split("T")[0]});
  }
  return days;
}

// শিক্ষকের নির্ধারিত বিষয়+শ্রেণি তালিকা বের করা
function getTeacherAssignments(teacher,teacherSubjects){
  const mapped=teacherSubjects[teacher];
  if(!mapped||!mapped.length)return[];
  if(typeof mapped[0]==="object"){
    return mapped; // [{cls,sub},...] format
  }
  // পুরনো format: শুধু subject array
  return mapped.map(sub=>({cls:"",sub}));
}

// উইন্ডো টাইমার ফরম্যাট
function formatCountdown(ms){
  if(ms<=0)return"০ মিনিট";
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  if(h>0)return`${h} ঘণ্টা ${m} মিনিট`;
  return`${m} মিনিট`;
}

/* ══ AUTH SYSTEM (Secured v2) ══ */
const ADMIN_TEACHER="MD ABU SAYED";
const LS_AUTH_KEY="hais_auth_v2";
const LS_PASS_KEY="hais_creds_v1";
const MAX_ATTEMPTS=5;         // সর্বোচ্চ ব্যর্থ চেষ্টা
const LOCKOUT_MS=10*60*1000;  // ১০ মিনিট লকআউট
const SESSION_TTL_MS=8*60*60*1000; // ৮ ঘণ্টা session মেয়াদ

// SHA-256 হ্যাশ ফাংশন (WebCrypto — সব আধুনিক ব্রাউজারে আছে)
const hashPassword=async(pass)=>{
  const enc=new TextEncoder().encode(pass);
  const buf=await crypto.subtle.digest("SHA-256",enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
};

// ডিফল্ট পাসওয়ার্ড (শুধু প্রথমবার সেট করতে ব্যবহার)
// শিক্ষক: নামের শেষ অংশ lowercase + "@Hais2025"
// অ্যাডমিন: আলাদা শক্তিশালী পাসওয়ার্ড
const _getDefaultRaw=(name)=>{
  if(name===ADMIN_TEACHER)return"Admin@Hais#2025";
  const parts=name.trim().split(/\s+/);
  return parts[parts.length-1].toLowerCase()+"@Hais2025";
};

// ক্রেডেনশিয়াল স্টোর — IndexedDB-তে hashed পাসওয়ার্ড রাখা
const CredStore={
  _KEY:"hais_creds_v1",
  _PIN_KEY:"hais_recovery_pin_v1",
  async init(){
    // ইতিমধ্যে আছে কিনা দেখো
    const r=await HAISDB.get(this._KEY);
    if(r&&r[ADMIN_TEACHER])return;
    // localStorage থেকে এক-বার মাইগ্রেট (v6→v7)
    try{
      const ls=localStorage.getItem("hais_creds_v1");
      if(ls){const parsed=JSON.parse(ls);await HAISDB.set(this._KEY,parsed);localStorage.removeItem("hais_creds_v1");return;}
    }catch(e){}
    // প্রথমবার: সকল শিক্ষকের ডিফল্ট হ্যাশড পাসওয়ার্ড তৈরি করো
    const creds={};
    for(const t of TEACHERS){creds[t]=await hashPassword(_getDefaultRaw(t));}
    await HAISDB.set(this._KEY,creds);
  },
  async registerNew(name){
    const creds=await this.getAsync();
    if(!creds[name]){
      creds[name]=await hashPassword(_getDefaultRaw(name));
      await HAISDB.set(this._KEY,creds);
    }
  },
  /* sync get — CredStore.get() এর পুরনো ব্যবহার LockoutStore-এ। এখন async করা হয়েছে */
  async getAsync(){
    const r=await HAISDB.get(this._KEY);return r||{};
  },
  /* পিছনে-সামঞ্জস্যের জন্য sync ফল দেয় — IDB cache থেকে */
  get(){
    // এই পদ্ধতি শুধু নন-async context-এ ব্যবহার হয় (যেখানে আগে sync ছিল)
    // IDB-তে async, তাই এখন সরাসরি async verify ব্যবহার করা হয়
    return {};
  },
  async verify(name,pass){
    const creds=await this.getAsync();
    if(!creds[name])return false;
    const h=await hashPassword(pass);
    return h===creds[name];
  },
  async change(name,newPass){
    const creds=await this.getAsync();
    creds[name]=await hashPassword(newPass);
    try{await HAISDB.set(this._KEY,creds);return true;}catch(e){return false;}
  },
  /* ── রিকভারি PIN ── */
  async setPin(pin){
    const h=await hashPassword(pin);
    try{await HAISDB.set(this._PIN_KEY,h);return true;}catch(e){return false;}
  },
  async verifyPin(pin){
    try{
      const stored=await HAISDB.get(this._PIN_KEY);
      if(!stored)return false;
      const h=await hashPassword(pin);
      return h===stored;
    }catch(e){return false;}
  },
  async hasPin(){
    const v=await HAISDB.get(this._PIN_KEY);return !!v;
  }
};

// Brute-force লকআউট ম্যানেজার — IndexedDB (sync-style: IDB cache)
// লকআউট ডেটা মেমোরিতে cache করা হয়; app চালু থাকলে কার্যকর
const _lockoutCache={};
const LockoutStore={
  _KEY:"hais_lockout_v1",
  /* async init — app শুরুতে IDB থেকে লোড */
  async loadCache(){
    const d=await HAISDB.get(this._KEY);
    if(d)Object.assign(_lockoutCache,d);
  },
  _save(){HAISDB.setSync(this._KEY,{..._lockoutCache});},
  get(name){
    return _lockoutCache[name]||{attempts:0,lockedUntil:0};
  },
  set(name,data){
    _lockoutCache[name]=data;this._save();
  },
  isLocked(name){
    const s=this.get(name);
    if(s.lockedUntil&&Date.now()<s.lockedUntil)return true;
    if(s.lockedUntil&&Date.now()>=s.lockedUntil){this.reset(name);}
    return false;
  },
  recordFail(name){
    const s=this.get(name);
    const attempts=(s.attempts||0)+1;
    const lockedUntil=attempts>=MAX_ATTEMPTS?Date.now()+LOCKOUT_MS:s.lockedUntil||0;
    this.set(name,{attempts,lockedUntil});
    return{attempts,locked:attempts>=MAX_ATTEMPTS};
  },
  reset(name){this.set(name,{attempts:0,lockedUntil:0});},
  getRemainingMinutes(name){
    const s=this.get(name);
    if(!s.lockedUntil)return 0;
    return Math.ceil((s.lockedUntil-Date.now())/60000);
  }
};

// Session বৈধতা যাচাই
const isSessionValid=(authData)=>{
  if(!authData||!authData.user||!authData.loginAt)return false;
  return(Date.now()-new Date(authData.loginAt).getTime())<SESSION_TTL_MS;
};

// পাসওয়ার্ড শক্তি যাচাই
const checkPasswordStrength=(pass)=>{
  if(pass.length<8)return{ok:false,msg:"পাসওয়ার্ড কমপক্ষে ৮ অক্ষরের হতে হবে"};

  if(!/[0-9]/.test(pass))return{ok:false,msg:"কমপক্ষে একটি সংখ্যা দরকার"};
  return{ok:true,msg:""};
};
